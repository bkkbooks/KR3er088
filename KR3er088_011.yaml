body:
  text: 卷十一肝臟肝臟脈論第一論曰夫人稟天地而生故內有五臟六腑精氣骨髓筋脈外有四肢九竅皮毛爪齒咽喉唇舌肛門胞囊以此總而成軀故將息得理則百脈安和役用非宜即為五勞七傷六極之患有方可救雖病無他無法可憑奄然永往所以此之中帙卷卷皆備述五臟六腑等血脈根源循環流注與九竅應會處所並論五臟六腑等輕重大小長短闊狹受盛多少仍列對治方法丸散酒煎湯膏摩熨及灸針孔穴並窮於此矣其能留心於醫術者可考而行之其冷熱虛實風氣准藥性而用之則內外百疴無所逃矣凡五臟在天為五星在地為五嶽約時為五行在人為五藏五藏者精神魂魄意也論陰陽察虛實知病源用補瀉應稟三百六十五節終會通十二經焉論曰肝主魂為郎官隨神往來謂之魂魂者肝之藏也目者肝之官肝氣通於目目和則能辨五色矣左目甲右目乙循環紫宮榮華於爪外主筋內主血肝重四斤四兩左三葉右四葉凡七葉有六童子三玉女守之神名藍藍主藏魂號為魂臟隨節應會故云肝藏血血舍魂在氣為語在液為淚肝氣虛則恐實則怒肝氣虛則夢見園苑生草得其時夢伏樹下不敢起肝氣盛則夢怒厥氣客於肝則夢山林樹木凡人臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝凡肝臟象木與膽合為腑其經足厥陰與少陽為表裡其脈弦相於冬旺於春春時萬物始生其氣來濡而弱寬而虛故脈為弦濡即不可發汗弱則不可下寬者開開者通通者利故名曰寬而虛春脈如弦春脈肝也東方木也萬物之所以始生也故其氣來濡弱輕虛而滑端直以長故曰弦反此者病何如而反其氣來實而弦此謂太過病在外其氣來不實而微此謂不及病在內太過則令人善忘忘當作怒忽忽眩冒而癲疾不及則令人胸痛引背兩脅胠滿肝脈來濡弱招招如揭竿末梢曰平巢源作綽綽如按琴瑟之弦如揭長竿春以胃氣為本肝脈來盈實而滑如循長竿曰肝病肝脈來急而益勁如新張弓弦曰肝死真肝脈至內外急如循刀刃責責然巢源作賾賾然如按琴瑟弦巢源作如新張弓弦色青白不澤毛折乃死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病肝藏血血舍魂悲哀動中則傷魂魂傷則狂妄其精不守一作狂妄不精不敢正當人令人陰縮而攣筋兩脅肋骨舉一作不舉毛悴色夭死於秋足厥陰氣絕則筋縮引卵與舌厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本故脈弗營則筋縮急筋縮急則引卵與舌故唇青舌卷卵縮則筋先死庚篤辛死金勝木也肝死臟浮之弱按之中如索不來或曲如蛇行者死春肝木旺其脈弦細而長曰平反得沉濡而滑者是腎之乘肝母之歸子為虛邪雖病易治反得浮大而洪者是心之乘肝子之乘母為實邪雖病自愈反得微澀而短千金翼云微浮而短澀者是肺之乘肝金之剋木為賊邪大逆十死不治反得大而緩者是脾之乘肝土之陵木為微邪雖病即瘥心乘肝必吐利肺乘肝即為癰腫左手關上陰絕者無肝脈也若癃遺溺難言脅下有邪氣善吐刺足少陽治陽左手關上陰實者肝實也苦肉中痛動善轉筋吐刺足厥陰治陰肝脈來濯濯如倚竿如琴瑟弦再至曰平三至曰離經病四至脫精五至死六至命盡足厥陰脈也肝脈急甚為惡言一作妄言微急為肥氣在脅下如覆杯緩甚為嘔微緩為水瘕痹大甚為內癰善嘔衄微大為肝痹縮咳引少腹小甚為多飲微小為消癉滑甚為頹疝微滑為遺溺澀甚為淡飲微澀為瘛瘲筋攣肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其濡而散色澤者當病溢飲溢飲者渴暴多飲而溢入肌膚腸胃之外也素問溢入作易入青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛扁鵲云肝有病則目奪精虛則寒寒則陰氣壯壯則夢山樹等實則熱熱則陽氣壯壯則夢怒肝在聲為呼在變動為握在志為怒怒傷肝精氣並於肝則憂肝虛則恐實則怒怒而不已亦生憂矣色主春病變於色者取之滎病先發於肝者頭目眩脅痛支滿一日至脾閉塞不通身痛體重二日至胃而腹脹三日至腎少腹腰脊痛脛酸十日不已死冬日入夏早食病在肝平旦慧下晡甚夜半靜假令肝病西行若食雞肉得之當以秋時發病以庚辛日也家有血腥死女子見之以明要為災不者若感金銀物得之凡肝病之狀必兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之若欲治之當取其經足厥陰與少陽氣逆則頭目痛耳聾不聰頰腫取血者肝脈沉之而急浮之亦然苦脅痛有氣支滿引少腹而痛時小便難苦目眩頭痛腰背痛足為寒時癃女人月事不來時亡時有得之少時有所墮墜肝病其色青手足拘急脅下苦滿或時眩冒其脈弦長此為可治宜服防風竹瀝湯秦艽散春當刺大敦夏刺行間冬刺曲泉皆補之季夏刺太衝秋刺中郄皆瀉之又當灸期門百壯背第九椎五十壯邪在肝則兩脅中痛寒中惡血在內胻善瘈節時腫取之行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其瘈凡有所墮墜惡血留內若有所大怒氣上而不能下積於左脅下則傷肝肝中風者頭目瞤兩脅痛行常傴令人嗜甘如阻婦狀肝中寒者其人洗洗惡寒翕翕發熱面翕然赤涔涔有汗胸中煩熱肝中寒者其人兩臂不舉舌本又作大燥善太息胸中痛不得轉側時盜汗咳食已吐其汁肝主胸中喘怒罵其脈沉胸中又窒欲令人推按之有熱鼻窒肝傷其人脫肉又臥口欲得張時時手足青目瞑瞳仁痛此為肝臟傷所致也肝水者其人腹大不能自轉側而脅下腹中痛時時津液微生小便續通肝脹者脅下滿而痛引少腹肝著其病人常欲蹈其胸上先未苦時但欲飲熱診得肝積脈弦而細兩脅下痛邪氣走心下足脛寒脅痛引少腹男子積疝女子瘕淋身無膏澤善轉筋爪甲枯黑春瘥秋劇色青也肝之積名曰肥氣在左脅下如覆杯有頭足如龜鱉狀久久不愈發咳逆痎瘧連歲月不已以季夏戊己日得之何也肺病傳肝肝當傳脾脾適以季夏旺旺者不受邪肝復欲還肺肺不肯受因留結為積故知肥氣以季夏得之肝病胸滿脅脹善恚怒叫呼身體有熱而復惡寒四肢不舉面白身體滑其脈當弦長而急今反短澀其色當青而反白者此是金之剋木為大逆十死不治襄公問扁鵲曰吾欲不診脈察其音觀其色知其病生死可得聞乎答曰乃聖道之大要師所不傳黃帝貴之過於金玉入門見病觀其色聞其呼吸則知往來出入吉凶之相角音人者主肝聲也肝聲呼其音琴其志怒其經足厥陰厥逆少陽則營衛不通陰陽交雜陰氣外傷陽氣內擊擊則寒寒則虛虛則猝然喑啞不聲此為厲風入肝續命湯主之方在第八卷中但踞坐不得低頭面目青黑四肢緩弱遺矢便利甚則不可治賒則旬月之內桂枝酒主之方在第八卷中又呼而哭哭而反吟此為金剋木陰擊陽陰氣起而陽氣伏伏則實實則熱熱則喘喘則逆逆則悶悶則恐畏目視不明語聲切急謬說有人此為邪熱傷肝甚則不可治若唇色雖青向眼不應可治地黃煎主之方在下肝虛實篇中肝病為瘧者令人色蒼蒼然太息其狀若死者烏梅丸主之方在第十卷中若其人本來少於悲恚忽爾嗔怒出言反常乍寬乍急言未竟以手向眼如有所畏若不即病禍必至矣此肝病聲之候也若其人虛則為寒風所傷若實則為熱氣所損陽則瀉之陰則補之青為肝肝合筋青如翠羽者吉肝主目目是肝之餘其人木形相比於上角蒼色小頭長面大肩平背直身小手足有材好勞心小力多憂勞於事耐春夏不耐秋冬秋冬感而生病足厥陰佗佗然脅廣合堅脆傾正則肝應之正青色小理者則肝小小則臟安無脅下之病粗理者則肝大大則虛虛則寒逼胃迫咽善膈中且脅下痛廣脅反骹者則肝高高則實實則肝熱上支賁加脅下急為息賁合脅危一作兔骹者則肝下下則逼胃脅下空空則易受邪脅骨堅者則肝堅堅則臟安難傷脅骨弱者則肝脆脆則善病消癉易傷脅腹好相者則肝端正端正則和利難傷脅骨偏舉者則肝偏傾偏傾則脅下偏痛凡人分部陷起者必有病生膽少陽為肝之部而肝氣通於內外部亦隨而應之沉濁為內浮清為外若色從外走內者病從外生部處起若色從內出外者病從內生部處陷納病前治陰後治陽外病前治陽後治陰陽主外陰主內凡人死生休否則臟神前變形於外人肝前病目則為之無色若肝前死目則為之脫精若天中等分墓色應之必死不治看應增損斟酌賒促賒則不出四百日內促則不延旬月之間肝病少愈而猝死何以知之曰青白色如拇指大黶點見顏頰上此必猝死肝絕八日死何以知之面青目赤但欲伏眠視而不見人汗出如水不止一日二日死面黑目青者不死青如草滋死吉凶之色在於分部順順而見青白入目必病不出其年若年上不應三年之中禍必應也春木肝脈色青主足少陽脈也春取絡脈分肉春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉之間其脈根本並在竅陰之間應在窗籠之前窗籠者耳前上下脈以手按之動者是也其筋起於小趾次趾之上結外踝上循胻外廉結於膝外廉其支者別起於外輔骨上走髀前者結伏兔之上後者結於尻其直者上䏚乘季脅上走腋前廉挾於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於鼽其支者結於目外眥為外維其脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至銳眥後其支者別銳眥下大迎合手少陽於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上出小趾次趾之端其支者別跗上入大趾之間循大趾歧內出其端還貫入爪甲出三毛合足厥陰為表裡厥陰之本在行間上五寸應在背俞同會於手太陰其足少陽之別名曰光明去踝五寸是也別走厥陰下絡足趺主肝生病病實則膽熱熱則厥厥則陽病陽脈反逆大於寸口一倍病則胸中有熱心脅頭頷痛缺盆腋下腫虛則膽寒寒則痿躄躄則陰病陰脈反小於寸口病則胸中有寒少氣口苦身體無膏澤外至胻絕骨外踝前及諸節皆痛若陰陽俱靜與其俱動如引繩俱頓者病也此盡是足少陽膽經筋脈支別為病今取足厥陰肝經附於後足厥陰之脈起於大趾聚毛之際上循足趺上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中環陰器抵少腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔一本云其支者從少腹與太陰少陽結於腰髁下第三第四骨空中其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺中是動則病腰痛不可以俯仰丈夫㿗疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞泄狐疝遺溺閉癃盛者則寸口大一倍於人迎虛者則寸口反小於人迎也足厥陰之別名曰蠡溝去內踝上五寸別走少陽其別者循經上睪結於莖其病氣逆則睪腫猝疝實則挺長熱虛則暴癢取之所別足厥陰之筋起於大趾之上上結於內踝之前上循胻上結內輔之下上循陰股結於陰器結絡諸筋春三月者主肝膽青筋牽病也其源從少陰而涉足少陽少陽之氣始發少陰之氣始衰陰陽怫鬱於腠理皮毛之病俱生表裡之疴因起從少陽發動反少陰氣則臟腑受癘而生其病相反若腑虛則為陰邪所傷腰背強急腳縮不伸胻中欲折目中生花若臟實則為陽毒所損澀澀前寒而後熱頸外雙筋牽不得屈伸頸直背強眼赤黃若欲轉動合身回側故曰青筋牽病方在傷寒上卷扁鵲曰灸肝肺二俞主治丹毒牽病當依源處治調其陽理其陰臟腑之疾不生矣肝虛實第二脈四條方十一首灸法一首肝實熱左手關上脈陰實者足厥陰經也病苦心下堅滿常兩脅痛息忿忿如怒狀名曰肝實熱也治肝實熱陽氣伏邪熱喘逆悶恐目視物無明狂悸非意而言竹瀝泄熱湯方竹瀝一升麻黃三分石膏八分生薑芍藥各四分大青梔子仁升麻茯苓玄參知母各三分生葛八分上十二味㕮咀以水九升煮取二升半去滓下竹瀝煮兩三沸分三服須利下芒硝三分去芍藥加生地黃五分刪繁方無石膏生薑芍藥生葛用人參三分前胡湯方治肝實熱目痛胸滿氣急塞瀉肝前胡秦皮細辛梔子仁黃芩升麻蕤仁決明子各三兩苦竹葉切一升車前葉切一升芒硝三兩上十一味㕮咀以水九升煮取三升去滓下芒消分三服又一方有柴胡三兩共十二味防風煮散方治肝實熱夢怒虛驚防風茯苓葳蕤白朮橘皮丹參各一兩三分細辛二兩甘草一兩升麻黃芩各一兩半大棗三七枚射干一兩酸棗仁三分上十三味治下篩為粗散以方寸兩匕帛裹以井花水二升煮時時動裹子煎取一升分服之日二遠志煮散方治肝邪熱出言反常乍寬乍急遠志射干杏仁大青各一兩半茯神葛根甘草麥門冬各一兩芍藥二兩三分桂心三分石膏二兩知母升麻各五分上十三味治下篩為粗散以水二升五合煮竹葉一升取汁用煮藥一匕半煎取八合為一服日二以綿裹散煮之地黃煎方治邪熱傷肝好生悲怒所作不定自驚恐生地黃淡竹葉生薑車前草干藍各切一升丹參玄參各四兩茯苓二兩石膏五兩赤蜜一升上十味㕮咀以水九升煮取三升去滓停冷下蜜更煎三兩沸分三服肝膽俱實左手關上脈陰陽俱實者足厥陰與少陽經俱實也病苦胃脹嘔逆食不消名曰肝膽俱實也肝虛寒左手關上脈陰虛者足厥陰經也病苦脅下堅寒熱腹滿不欲飲食腹脹悒悒不樂婦人月經不利腰腹痛名曰肝虛寒也補肝湯方治肝氣不足兩脅下滿筋急不得大息四肢厥冷發搶心腹痛目不明瞭及婦人心痛乳癰膝熱消渴爪甲枯口面青者甘草桂心山茱萸各一兩千金翼作烏頭細辛桃仁千金翼作蕤仁柏子仁茯苓防風各二兩大棗二十四枚上九味㕮咀以水九升煮取五升去滓分三服補肝散治左脅偏痛久宿食不消並目䀮䀮昏風淚出見物不審而逆風寒偏甚消食破氣止淚方山茱萸桂心薯蕷天雄茯苓人參各五分川芎白朮獨活五加皮大黃各七分防風乾薑丹參厚朴細辛桔梗各一兩半甘菊花甘草各一兩貫眾半兩橘皮三分陳麥曲大麥糵各一升上二十三味治下篩酒下方寸匕日二若食不消食後服若止痛食前服之補肝酒治肝虛寒或高風眼淚等雜病釀松膏酒方松脂十斤細銼以水淹浸一周日煮之細細接取上膏水竭更添之脂盡更水煮如前煙盡去火停冷脂當沉下取一斤釀米一石水七斗好曲末二斗如家常釀酒法仍冷下飯封一百日脂米曲並消盡酒香滿一室細細飲之此酒須一倍加曲又方取枸杞子搗碎先納絹袋中率一斗枸杞子二斗酒漬訖密封泥甕勿泄曝乾天陰勿出三七日滿旦溫酒服任性飲忌醋防風補煎方治肝虛寒目䀮䀮視物不明諦視生花防風細辛川芎白蘚皮獨活甘草各三兩橘皮二兩大棗三七枚甘竹葉切一斗蜜五合上十味㕮咀以水一斗二升先煮九味取四升去滓下蜜更煎兩沸分四服日三夜一若五六月以燥器貯冷水藏之檳榔湯方治肝虛寒脅下痛脹滿氣急目昏濁視物不明檳榔二十四枚母姜七兩附子七枚茯苓橘皮桂心各三兩桔梗白朮各四兩吳茱萸五兩上九味㕮咀以水九升煮取三升去滓分溫三服若氣喘者加川芎三兩半夏四兩甘草二兩肝虛目不明灸肝俞二百壯小兒斟酌可灸三七壯肝膽俱虛左手關上脈陰陽俱虛者足厥陰與少陽經俱虛也病如恍惚屍厥不知人妄見少氣不能言時時自驚名曰肝膽俱虛也肝勞第三論一首方二首論曰肝勞病者補心氣以益之心旺則感於肝矣人逆春氣則足少陽不生而肝氣納變順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣豬膏酒方治肝勞虛寒關格勞澀閉塞不通毛悴色夭豬膏薑汁各四升上二味以微火煎取三升下酒五合和煎分為三服虎骨酒補方治肝虛寒勞損口苦關節骨疼痛筋攣縮煩悶虎骨一升炙焦碎如雀頭丹參八兩乾地黃七兩地骨皮乾薑川芎各四兩豬椒根白朮五加皮枳實各五兩上十味㕮咀絹袋盛以酒四斗浸四日初服六七合漸加至一升日再服筋極第四論三首方七首灸法七首論曰夫六極者天氣通於肺地氣通於咽風氣應於肝雷氣動於心穀氣感於脾雨氣潤於腎六經為川腸胃為海九竅為水注之氣所以竅應於五臟五臟邪傷則六腑生極故曰五臟六極也論曰凡筋極者主肝也肝應筋筋與肝合肝有病從筋生又曰以春遇病為筋痹筋痹不已復感於邪內舍於肝則陽氣入於內陰氣出於外若陰氣外出出則虛虛則筋虛筋虛則善悲色青蒼白見於目下若傷寒則筋不能動十指爪皆痛數好轉筋其源以春甲乙日得之傷風風在筋為肝虛風也若陽氣內發發則實實則筋實筋實則善怒嗌乾傷熱則咳咳則脅下痛不能轉側又腳下滿痛故曰肝實風也然則因其輕而揚之因其重而減之因其衰而彰之審其陰陽以別柔剛陽病治陰陰病治陽善治病者病在皮毛肌膚筋脈而治之次治六腑若至五臟則半死矣扁鵲云筋絕不治九日死何以知之手足爪甲青黑呼罵口不息筋應足厥陰足厥陰氣絕則筋縮引卵與舌筋先死矣治筋實極則咳咳則兩脅下