寒熱鬼注長病咳逆唾噫闢除眾惡殺鬼逐邪氣鬼擊客忤中惡胸中結氣咽中閉塞有進有退繞臍惻惻隨上下按之挑手心中慍慍如有蟲狀毒注相染滅門方雄黃油煮一日丹砂礜石當歸大黃各二兩巴豆一兩芫青五枚桂心三兩真珠附子各一兩半蜈蚣一枚烏頭八枚犀角鬼臼射罔黎蘆各一兩麝香牛黃人參各半兩杏仁四十枚蜥蜴一枚斑蝥七枚樗雞三七枚地膽三七枚上二十四味末之蜜和搗三萬杵丸如小豆先食飲服二丸日二不知稍加之以藥二丸安門戶上令眾惡不近傷寒服之無不即瘥若至病家及視病人夜行獨宿服二丸眾惡不敢近此方與第十七卷屍疰篇方重蜥蜴丸治症堅水腫蜚屍遁屍百注屍注骨血相注惡氣鬼忤蠱毒邪氣往來夢寤存亡留飲結積虎狼所齧猘犬所咋鴆毒入人五臟服藥已消殺其毒食不消婦人邪鬼忤亦能遣之方蜥蜴二枚蜈蚣二枚地膽五十枚䗪蟲三十枚杏仁三十枚蜣螂十四枚虻蟲三十枚朴硝一兩十八銖澤漆桃奴犀角鬼督郵桑赤雞各十八銖芍藥虎骨各一兩半甘草一兩巴豆一兩十八銖款冬花十八銖甘遂一兩六銖乾薑一兩上二十味末之別制巴豆杏仁如膏納藥末研調下蜜搗二萬杵丸如麻子先食飲服三丸日一不知加之不敢吐下者一丸日一服有人風冷注癖堅二十年者得瘥此方與第十七卷中屍疰篇方重大五明狼毒丸治堅癖痞在人胸脅或在心腹方狼毒乾地黃各四兩附子大黃蓯蓉人參當歸各一兩半夏二兩乾薑桂心各一兩半細辛五味子蜀椒䕡茹熬令煙盡各一兩芫花莽草厚朴防己旋覆花各半兩巴豆二十四枚杏仁三十枚上二十一味末之蜜和服如梧子二丸日二夜一以知為度小狼毒丸治病與前同方狼毒三兩旋覆花二兩附子半夏白附子䕡茹各二兩上六味末之蜜和搗五千杵飲服如梧子三丸加至十丸日三肘後方無半夏白附子䕡茹只三味狼毒丸治堅癖方狼毒五兩半夏杏仁各三兩桂心四兩附子蜀椒細辛各二兩上七味末之別搗杏仁蜜和飲服如大豆二丸甘遂湯方治暴堅久痞腹有堅甘遂黃芩芒硝桂心細辛各一兩大黃三兩上六味㕮咀以水八升煮取二升半分三服治卒暴症腹中有物堅如石痛如斫刺晝夜啼呼不治百日必死方牛膝二斤㕮咀曝之令乾以酒一斗浸之密塞器口煎取半服半升一服便吐去宿食神效治卒暴症方取商陸根搗碎蒸之以新布籍腹上以藥鋪著布上以衣物覆其上冷復易之數日用之旦夕勿息又方蒜十片取五月五日戶上者去皮桂一尺二寸灶中黃土如雞子大一枚上三味合搗以淳苦酒和塗布上以掩病處不過三日消凡蒜亦佳肘後方不用桂野葛膏治暴症方野葛一尺當歸附子雄黃油煮一日細辛各一兩烏頭二兩巴豆一百枚蜀椒半兩上八味㕮咀以大醋浸一宿豬膏二斤煎附子色黃去滓納雄黃粉攪至凝敷布上以掩症上復以油重布上復安十重紙以熨斗盛火著上常令熱日三夜二須膏干益良硝石大丸治十二癥瘕及婦人帶下絕產無子並欲服寒食散而腹中有癥瘕實者當先服大丸下之乃服寒食散大丸不下水穀但下病耳不令人困方硝石六兩朴硝亦得大黃八兩人參甘草各二兩上四味末之以三年苦酒三升置銅器中以竹箸柱器中一升作一刻凡三升作三刻以置火上先納大黃常攪不息使微沸盡一刻乃納余藥又盡一刻有餘一刻極微火使可丸如雞子中黃欲合藥當先齋戒一宿勿令小兒女人奴婢等見之欲下病者用二丸若不能服大丸者可分作小丸不可過四丸也欲令大不欲令細能不分為善若人羸者可少食強者不須食二十日五度服其和調半日乃下若婦人服之下者或如雞肝或如米汁正赤黑或一升或三升下後慎風冷作一杯粥食之然後作羹臛自養如產婦法六月則有子禁生魚豬肉辛菜若寒食散者自如藥法不與此同日一服土瓜丸治諸臟寒氣積聚煩滿熱飲食中蠱毒或食生物及水中蠱卵生入腹而成蟲蛇若為魚鱉留飲宿食婦人產瘕帶下百病陰陽不通利大小便不節絕傷墮落寒熱交結唇口焦黑身體消瘦嗜臥少食多魘產乳胞中余疾股裡熱心腹中急結痛引陰中方土瓜根末桔梗末各半升大黃一斤蒸二升米下曝乾杏仁一升上四味末之蜜丸如梧子空腹飲服三丸日三不知加之以知為度治凡所食不消方取其餘類燒作末酒服方寸匕便吐去宿食即瘥有食桃不消作病者以時無桃就樹間得槁桃燒服之登時吐病出甚良治猝食不消欲成症積方煎艾汁如飴取半升一服之便刺吐去宿食神良今古錄驗方白艾五尺圍一束薏苡根一大把二味煎治食魚肉等成癥結在腹內並諸毒氣方狗屎五升燒末綿裹之以酒一斗浸再宿濾取清分十服日三服三日使盡隨所食癥結即便出矣治雜中食瘀實不消心腹堅痛者方以水三升煮白鹽一升令消分三服刺吐去食也並治暴症治症堅心下有物大如杯不得食食則腹滿心腹絞痛方葶藶子大黃各二兩澤漆四兩上三味末之別研葶藶為膏下二味搗五百杵入蜜更搗千杵服如梧子五丸不知加之日三服治少腹堅大如盤胸中脹食不消婦人瘦瘠者方暖水服發灰一方寸匕日再服並灸肋端又方飲服上好曲末方寸匕日三瘥又灸三焦俞隨年壯治伏梁氣方白馬尿銅器中承取旦旦服一升治癥瘕方槲樹白皮煎令可丸服之取知病動若下減之治患癥結病及爪病似爪形日月形或在臍左右或在臍上下若鱉在左右脅下或當心如合子大復有手腳治之法先針其足以椒熨之方取一新盆子受一斗者盆底鑽一百二十孔孔上著椒三合上著一重紙紙上著冷灰一升灰上著熱灰半升上著剛炭火一斤經一食頃盆底熱徹當病上初安氈一重即安火盆火盆大熱以漸更加一重若火更熱不可忍加至三重暫歇食一口冷飲還上火消二分許即停經三日勿著及至七日決得頓瘥然後食美食自補若小不瘥作露宿丸服之方在第十六卷中治腹中積症方葶藶子一升熬酒五升浸七日服三合日三治蛇症方白馬尾切長五分以酒服方寸匕大者自出更服二分者一方寸匕中者亦出更服三分者一方寸匕小者復出不可頓作一服殺人馬尾一本作馬毛大黃湯方治蛇症大黃茯苓各半兩一本作黃芩烏賊骨二枚皂莢六枚如豬牙者甘草如指大者一尺芒硝如雞子一枚上六味㕮咀以水六升煮三沸去滓納硝適寒溫盡服之十日一劑作如上法欲服之宿無食平旦服當下病根也治鱉症腹堅硬腫起大如盤睡臥不得方取藍一斤搗水三升絞取汁服一升日二又方蒴藋根白皮一握研取汁以水和頓服之又方白馬尿一升雞子三枚取白合煎取二合空腹頓服之不移時當吐病出治食中得病為鱉症在心下堅強方雞屎一升炒令黃取五合以酒一升浸更取半搗為末以所浸酒服方寸匕日二三日中作一劑治蛟龍病開皇六年三月八日有人食芹得之其人病發似癲癇面色青黃因食寒食餳過多便吐出蛟龍有頭及尾從茲有人患此疾令服寒食餳三斗大驗山野人有齧蝨在腹生長為蝨症病治之方故敗篦子一枚故敗梳一枚上二物各破為兩份各取一份燒為末又取一份以水五升煮取一升以服前燒末頓服須斯出矣治米症常欲食米若不得米則胸中清水出方雞屎一升白米五合上二味合炒令米焦搗末以水二升頓服取盡須臾吐出病如研米若無米當出痰永憎米不復食治肉症思肉不已食訖復思者方空腹飲白馬尿三升吐肉出肉不出必死治發症由人因食而入久即胸間如有蟲上下去來惟欲飲油一日之中乃至三二升不欲飲食者方油一升以香澤煎之大𨪊勞貯之安病人頭邊令口鼻臨油上勿令得飲敷鼻面令有香氣當叫喚取飲不得與之必當疲極大睡其發症當從口出飲油人專守視之並置石灰一裹見症出以灰粉手捉症抽出須臾抽盡即是發也初從腹中出形如不流水中濃菜隨髮長短形亦如之又方酒三升煮豬脂二升三沸一服一升日二白馬尿服之亦佳無馬白牛亦得癥瘕灸內踝後宛宛中隨年壯又灸氣海百壯久冷及婦人癥瘕腸鳴泄利繞臍絞痛灸天樞百壯三報之萬勿針穴在挾臍兩邊各二寸積聚堅滿灸脾募百壯穴在章門季肋端心下堅積聚冷脹灸上脘百壯三報之穴在巨闕下一寸許積聚堅大如盤冷脹灸胃脘二百壯三報之穴在巨闕下二寸
