數緊去但數膿為已成也桔梗湯治咳胸中滿而振寒脈數咽乾而不渴時時出濁唾腥臭久久吐膿如米粥是為肺癰方桔梗三兩集驗方用二兩古今録驗方用一兩甘草二兩上二味㕮咀以水三升煮取一升去滓分二服必吐膿血也一方有款冬花一兩半瀉肺湯治肺癰喘不得臥方葶藶三兩為末大棗二十枚上二味㕮咀以水二升先煮棗取二升去棗納葶藶二方寸匕煮取七合頓服令盡三日服一劑可至三四劑治肺癰胸脅脹一身面目浮腫鼻塞清涕出不聞香臭咳逆上氣喘鳴迫塞宜先進小青龍湯卻服前藥小青龍湯方見前第九卷傷寒門皂莢丸治肺癰初起咳逆上氣時時濁唾但坐不得臥方皂莢八兩為末蜜丸如梧子大以大棗膏和湯服三丸日三服夜一服必效方以酥炙皂莢黃昏湯治咳有微熱煩滿胸心甲錯是為肺癰者方黃昏手掌大一塊是合昏皮也㕮咀以水三升煮取一升分二服葦莖湯方薏苡仁瓜瓣各半升桃仁三十枚葦莖切二升水二斗煮取五升去滓上四味㕮咀納葦汁中煮取二升服一升當有所見吐膿血桂枝去芍藥加皂莢湯治肺癰吐涎沫不止方桂枝生薑各三兩甘草二兩皂莢一兩大棗十五枚上五味㕮咀以水七升煮取三升去滓分三服飛尸鬼疰第八論一首方四十二首灸法十四首論曰凡諸心腹痛服衆方熱藥入腹寂然不動但益氣息急者此尸疰病也宜先服甘草汁一升消息少時服瞿麥湯盡一劑得下便覺稍寬並暴癥堅結宿食及女人血堅痛發作無定者神良五疰湯治卒中賊風遁尸鬼邪心腹刺痛大脹急方大黃甘草各三兩當歸芍藥各二兩烏頭十枚桂心四兩生薑蜜各一斤上八味㕮咀別漬大黃以水九升煮取三升烏頭別納蜜中煎令得一升和湯中去滓分服三合如人行二十里久更進一服日三不知加至四合蜈蚣湯治惡疰邪氣往來心痛徹背或走入皮膚移動不定苦熱四肢煩痛羸乏短氣方蜈蚣一枚牛黃一分丹砂人參各三分大黃二兩鬼臼細辛當歸桂心乾薑各一兩黃芩麝香各半兩附子四枚上十三味㕮咀以水一斗煮取三升去滓下牛黃麝香末分三服治卒中惡賊風寒冷入腹便絞痛或飛尸遁尸發作無時搶心胸滿脅痛如刀刺口噤者方吳茱萸桂心芍藥各二兩乾地黃乾薑茯苓甘草細辛當歸羊脂各一兩梔子仁十五枚上十一味㕮咀以水八升煮取三升去滓納脂煬盡分三服欲利者加大黃三兩治卒中惡風角弓反張或飛尸遁尸心腹絞痛方乾地黃川芎當歸茯苓甘草各一兩芍藥吳茱萸桂心乾薑各二兩梔子仁十四枚上十味㕮咀以水八升煮取三升分三服痛甚者加羊脂三兩人參當歸芍藥各一兩心腹堅急加大黃三兩桃皮湯治中惡氣心腹痛胸脅脹滿短氣方桃白皮一握東引者真珠附子各一兩梔子仁十四枚當歸三兩吳茱萸五合豉五合桂心二兩上八味㕮咀以水五升煮取二升去滓同真珠末分作二服一方無當歸以下四味桃奴湯治中惡諸尸蠱疰心腹卒絞痛方桃奴人參當歸乾薑各二兩川芎甘草各三兩桂心茯苓鬼箭羽犀角丹砂麝香各一兩上十二味㕮咀以水九升煮取二升半去滓分三服未食服大便不通腹滿加大黃三兩芒硝二兩胡洽無丹砂川芎有雄黃一兩治卒中風寒冷溫氣入腹虛脹急滿搶心胸久痛氣息不通脈弦緊汗不出及傷寒方吳茱萸當歸麻黃獨活甘草桔梗茯苓各二兩桂心青木香大黃石膏犀角各二兩上十二味㕮咀以水一斗煮取三升分三服日三治風冷入腹忽絞痛緊急如吹大小便閉小腹有氣結如斗大脹滿其脈弦緊或沉遲者方瞿麥當歸鬼箭羽豬苓桔梗吳茱萸海藻川芎防己各二兩桂心大黃各三兩一方有犀角二兩上十一味㕮咀以水九升煮取三升分三服治諸雜疰相連續死及治三十年衆疰方桃根白皮一斤㕮咀以水二斗煮取一斗去滓分八九服須令二日服盡崔氏用桃根白皮治疰心腹痛不可忍者又方桃仁十四枚搗研酒服又方小芥子末雞子白和敷尸疰鬼疰者即五尸之中尸疰又挾諸鬼邪為害也其變動乃有三十六種至九十九種大略令人寒熱淋瀝沉沉默默不得知其所苦而無處不惡纍年積月漸就頓滯以至於死死後復注易旁人乃至滅門覺如此候者宜急療之方獺肝一具陰乾治下篩水服一方寸匕日三一具不瘥更作小附著散治飛尸賊風發時急痛不在一處針之則移發一日半日乃瘥須臾復發者方細辛天雄甘草各一分一作莽草桂心三分烏頭附子乾薑各一兩真珠雄黃各半兩上九味治下篩酒服方寸匕不知稍增以知為度胡洽不用桂心附子有蜀椒四分大附著散治五尸疰忤與前狀同者方天雄桂心各半兩細辛乾薑雄黃黃芩黃連由跋椒目各一兩金牙犀角麝香牛黃各一分真珠三分蜈蚣三枚上十五味治下篩酒服一錢匕日三服以知為度金牙散治鬼疰風邪鬼語尸疰或在腰脊胸脅流無常處不喜見人志意不定面目脫色目赤鼻張唇乾甲黃者方金牙雄黃鐵精曾青真珠丹砂野葛川芎露蜂房大黃甘草蛇蛻皮䕡茹乾漆各一分石長生貍骨一作鸛骨鬼臼鬼箭羽桔梗烏頭鬼督郵椒目狼毒蕪荑藜蘆雷丸芫菁滑石各二分一作硝石毒公鱉甲牛黃人參胡燕屎狼毒桂心各四分寒水石蜈蚣蜥蜴附子各一枚蜣螂亭長各七枚石膏五分徐長卿斑蝥各十四枚貝母二枚上四十五味治下篩先食以酒服一刀圭日二不知漸加之蟲隨大小便出崔氏名蜀金牙散大金牙散治一切疰病方見十二卷膽腑門白朮散治風入臟腑悶絶常自躁痛或風疰入身令疰鬼疰飛尸惡氣腫起或左或右或前或後或內或外針灸流移無有常處驚悸腹脹氣滿心頭滿或恍惚悲懼不能飲食或進或退陰下濕癢或大便有血小便赤黃房中勞極方白朮十四枚附子秦艽人參牡蠣蜀椒細辛黃芩川芎牛膝各三分乾薑桂心防風各五分獨活柴胡桔梗茯苓當歸各四分烏頭天雄甘草莽草麻黃石南杜仲栝蔞根各二分上二十六味治下篩平旦酒服五分匕訖如人行七里久勢欲解更飲酒五合為佳太乙備急散治卒中惡客忤五尸入腹鬼刺鬼痱及中蠱疰吐血下血及心腹卒痛腹滿傷寒熱毒病六七日方雄黃桂心芫花各二兩丹砂蜀椒各一兩藜蘆巴豆各一分野葛三分附子五分上九味巴豆別研如脂余合治下篩以巴豆合和更搗置銅器中密貯之勿泄有急疾水服錢五匕可加至半錢匕老小半之病在頭當鼻衄在膈上吐在膈下利在四肢當汗出此所謂如湯沃雪手下皆愈方宜祕之非賢不傳龍牙散治百疰邪鬼飛尸萬病方龍牙茯苓各二兩半雄黃芍藥棗膏各五分乾地黃石斛胡燕屎各三分鬼箭羽烏頭羌活露蜂房曾青真珠桂心杏仁防風桃奴鬼臼鸛骨各一兩人參大黃各一兩半白朮二兩蘇子四合橘皮甘草川芎遠志鱉甲鬼督郵銅鏡鼻各半兩貍陰二具蜈蚣一枚上三十三味治下篩酒服一刀圭以知為度當有蟲從大便出治鬼疰蠱疰毒氣變化無常方犀角麝香丹砂雄黃鹿角龍骨鮫魚皮蜈蚣丁香蘘荷根蜀椒乾薑各一分貝子十枚上十三味治下篩酒服方寸匕加至二匕日三備急丸治卒中惡風氣忤迷絶不知人方見前第十二卷膽腑門中墨奴散治卒得惡疰腹脹方釜下墨一合鹽二合上二味合治以水一升半煮取八合一服令盡須臾吐下即瘥治暴心痛面無顏色欲死者方以布裹鹽如彈丸大燒令赤置酒中消服之利即愈治哭疰方梳齒間刮取垢水服之又方亂髮一兩臘月豬脂一合上二味取豬脂煎發令消煬服之蟲死矣又方熬大豆帛裹尉之治一切病食疰方凡食上得病為食疰取釜下土如雞子大為末醋泔清一升和服之行五十步吐即瘥又方還取本食種數多少相似各少許和合布裹燒灰如杏仁大水服之鸛骨丸治飛尸遁尸積聚胸痛連背走無常處或在臟或腫在腹或奄奄然而痛者方鸛骨三寸丹砂一作丹參牡蠣一作牡丹雄黃莽草各四分藜蘆桂心野葛各二分斑蝥芫青各十四枚蜈蚣一枚巴豆四十枚上十二味為末蜜丸如小豆每服二丸日三以知為度蜥蜴丸治癥堅水腫蜚尸遁尸寒尸喪尸尸注骨血相注惡氣鬼忤蛄毒邪氣往來夢寐存亡流飲結積虎狼所齧猰犬所咋鴆毒入人五臟服藥以殺其毒毒即消婦人邪氣鬼忤亦能遣之之方方見前第十一卷肝臟門積聚篇中桔梗丸治毒疰鬼疰食疰冷疰痰飲宿食不消酒癖諸病方桔梗藜蘆皂莢巴豆附子各二兩上五味為末蜜和搗萬杵丸如梧子大宿不食平旦飲服二丸仰臥服勿眠至食時膈上吐膈下下去惡物如蝌蚪蝦蟆子或長一二尺下後當大虛口乾可作雞羹飲五合太極飲食粥一升三四日病未盡更服忌如藥法十疰丸主十種疰氣疰勞疰鬼疰冷疰生人疰死人疰尸疰食疰水疰土疰等方雄黃巴各各二兩人參甘草麥門冬細辛一作蒿本桔梗附子皂莢蜀椒各一兩上十味為末蜜丸如梧子空心服五丸日三稍加以知為度太乙神明陷冰丸治諸病破積聚心下支滿寒熱鬼疰長病咳逆唾噫闢除衆惡鬼逐邪氣鬼擊客忤中惡胸中結氣咽喉閉塞有進有退繞臍絞痛惻惻隨上下按之挑手心中慍慍如有蟲狀毒疰相染甚至滅門者方雄黃二兩當歸三兩丹砂礬石一作礜石桂心大黃各二兩芫青五枚藜蘆附子各一兩半人參真珠麝香鬼臼犀角牛黃各一兩蜈蚣一枚射罔一兩烏頭八枚杏仁三十枚蜥蜴一枚樗雞地膽各七枚斑蝥七枚巴豆一分上二十四味為末蜜和搗三萬杵丸如小豆先食服二丸日再不知稍增又以二丸著門上令衆邪不近傷寒服之無不愈若至病家及視病人夜行獨宿服二丸衆邪不能近也胡洽無桂心芫青人參真珠犀角麝香射罔牛黃蜥蜴烏頭樗雞當歸十二味藥只十二味與積聚篇同江南度世丸治萬病症結積聚伏尸長病寒熱疰氣流行皮中久病著床肌肉消盡四肢煩熱嘔逆不食傷寒時氣惡疰汗出口噤不開心痛方蜀椒三兩人參細辛甘草各二兩茯苓真珠大黃乾薑丹砂野葛桂心雄黃麝香鬼臼各一兩烏頭牛黃各二分附子紫菀各六分巴豆六十枚蜈蚣二枚上二十味為末蜜丸如小豆飲服二丸加至四丸日一服加獺肝一具更良大度世丸治萬病與前狀同者方牛黃大黃雄黃真珠丹砂人參附子細辛甘草射罔鬼臼莽草各一兩蜀椒麝香鬼箭羽桂心茯苓紫菀各二兩乾薑三兩野葛一尺蜥蜴蜈蚣各一枚地膽五十枚芫青二十枚樗雞二十枚巴豆仁八十枚上二十六味為末蜜丸如小豆大飲服二丸日二先食服之治疰病相染易及霍亂中惡小兒客忤長病方獺肝一具蜈蚣一枚麝香二分雄黃莽草丹砂鬼臼犀角大黃巴豆牛黃各一兩上十一味為末蜜丸如麻子空腹服二丸至三丸以知為度雷氏千金丸治行諸氣宿食不消飲食中惡心腹痛如刺及瘧方硝石三分大黃五分桂心乾薑各二兩巴豆仁六十枚上五味為末搗三千杵蜜丸如大豆服二丸神驗無比已死者折齒灌之治卒得尸疰毒痛往來方杏仁亂髮灰等分上二味研如脂丸如梧子每服酒下三丸日三姚氏以豬膏和丸治遁尸尸疰心腹刺痛不可忍者方桂心乾薑各一兩巴豆仁二兩上三味治下篩以上醋和如泥敷病上干即易之治遁尸尸疰心腹及身有痛處不得近者方取艾小挼令碎著痛上厚一寸余熱湯和灰令強熱置艾上冷即易不過二三度瘥治遁尸飛尸又治暴風毒腫流入四肢頭面方白芥子一升蒸熟搗以黃丹二兩攪和分作兩分用疏布袋盛更蒸使熱敷痛上當更迭蒸袋常使熱敷之如此三五次即定治人皮膚中痛名症疰方醋和燕窠土敷之治走疰方燒車釭令熱暫入水以濕布裹尉病上治三十年氣疰方豉心半升生椒一合上二味以水二升煮取半升適寒溫用竹筒吸取汁令病者側臥手擘大孔射灌之少時當出惡物此法垂死悉治得瘥百千不可具説灸法凡五尸者飛尸遁尸風尸沉尸尸疰也今皆取一方兼治之其狀腹痛脹急不得氣息上衝心胸旁攻兩脅或塊壘踴起或攣引腰背治之之法灸乳後三寸男左女右可二七壯不止者多其壯數取愈止又灸兩手大拇指頭各七壯又灸心下三寸十壯又灸乳下一寸隨病左右多壯數又以細繩量患人兩乳頭內即裁斷中屈之又從乳頭向外量使當肋鏬於繩頭灸三壯或七壯男左女右卒疰忤攻心胸灸第七椎隨年壯又灸心下一寸三壯又灸手肘紋隨年壯一切病食疰灸手小指頭隨年壯男左女右五毒疰不能飲食百病灸心下三寸胃脘十壯水疰口中湧水經云肺來乘腎食後吐水灸肺俞又灸三陰交又灸期門穴在乳下二肋間瀉肺補腎也各隨年壯一切疰無新久先仰臥灸兩乳邊斜下三寸第三肋間隨年壯可至三百壯又治諸氣神良一名疰
