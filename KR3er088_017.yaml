body:
  text: 卷十七肺臟方凡八類肺臟脈論第一論一首論曰肺主魄魄臟者任物之精也為上將軍使在上行所以肺為五臟之華蓋並精出入謂之魄魄者肺之藏也鼻者肺之官肺氣通於鼻鼻和則能知香臭矣循環紫宮上出於頰候於鼻下回肺中榮華於發外主氣內主胸與乳相當左乳庚右乳辛肺重三斤三兩六葉兩耳凡八葉有十四童子七女子守之神名鳥鴻主藏魄號為魄臟隨節應會故云肺藏氣氣舍魄在氣為咳在液為涕肺氣虛則鼻息利少氣實則喘喝胸憑仰息肺氣虛而夢見白物見人斬血藉藉得其時則夢見兵戰肺氣盛則夢恐懼哭泣厥氣客於肺則夢飛揚見金鐵之器及奇物凡肺臟象金與大腸合為腑其經手太陰與陽明為表裡其脈浮相於季夏旺於秋秋時萬物之所終宿葉落柯萋萋枝條其杌然獨在其脈為微浮衛氣遲營氣數數則在上遲則在下故名曰毛陽當陷而不陷陰當升而不升為邪所中二氣感激故為風寒所中陽中邪則卷陰中邪則緊卷則惡寒緊則為栗寒栗相搏故名曰瘧弱則發熱浮乃來出旦中旦發暮中暮發臟有遠近脈有遲疾周有度數行有漏刻遲在上傷毛採數在下傷下焦中焦有惡則見有善則匿陽氣下陷陰氣則溫陽反在下陰反在巔故名曰長而且留秋脈如浮秋脈肺也西方金也萬物之所以收成也故其氣來輕虛而浮來急去散故曰浮反此者病何如而反其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人氣逆而背痛慍慍然不及則令人喘呼吸少氣而咳上氣見血下聞病音肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本肺脈來不上不下如循雞羽曰肺病巢源無不字肺脈來如物之浮如風吹毛曰肺死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病肺藏氣氣舍魄喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏手太陰氣絶則皮毛焦太陰者行氣溫皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷者則爪一作皮枯毛折毛折者則氣先死丙篤丁死火勝金也肺死臟浮之虛按之弱如蔥葉下無根者死秋金肺旺其脈微澀而短曰平反得大而緩者是脾之乘肺母之歸子為虛邪雖病易治反得沉濡而滑者是腎之乘肺子之乘母為實邪雖病自愈反得浮大而洪者是心之乘肺火之剋金為賊邪大逆十死不治反得弦細而長者是肝之乘肺木之凌金為微邪雖病即瘥肝乘肺必作虛右手關前寸口陰絶者無肺脈也苦短氣咳逆喉中塞噫逆刺手陽明治陽右手關前寸口陰實者肺實也苦少氣胸中滿膨膨與肩相引刺手太陰治陰肺脈來泛泛輕如微風吹鳥背上毛再至曰平三至曰離經病四至脫精五至死六至命盡手太陰脈也肺脈急甚為癲疾微急為肺寒熱怠惰咳唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿漏風一作偏風頭以下汗出不可止大甚為脛腫微大為肺痹引胸背起腰內小甚為飧泄微小為消疸滑甚為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻在頸肢腋之間下不勝其上其能喜酸肺脈搏堅而長當病唾血其濡而散者當病漏一作灌汗至今不復散發白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也黃帝問曰經脈十二而手太陰之脈獨動不休何也手太陰本在寸口中岐伯對曰足陽明胃脈也胃者五臟六腑之海胃脈在足趺上大趾間上行三寸骨解中是也其精氣上清注於肺肺氣從太陰而行之其行之也以息往來故人一呼脈再動一吸脈亦再動呼吸不已脈動不止黃帝問曰氣口何以獨為五臟主岐伯對曰胃者水穀之海六腑胃居其大五味入於口藏於胃以養五臟氣氣口者太陰是也臟腑之氣味皆出於胃變見於氣口氣口屬腑臟主即呼寸口者也扁鵲曰肺有病則鼻口張實熱則喘逆胸憑仰息其陽氣壯則夢恐懼等虛寒則咳息下利少氣其陰氣壯則夢涉水等肺在聲為哭在變動為咳在志為憂憂傷肺精氣並於肺則悲也味主秋結滿而血者病在胸及以飲食不節得病者取之合故命曰味主合病先發於肺喘咳三日之肝脅痛支滿一日之脾閉塞不通身痛體重五日之胃腹脹十日不已死冬日入夏日出病在肺下晡慧日中甚夜半靜假令肺病南行若食馬肉及獐肉得之不者當以夏時發得病以丙丁日也宜赤藥凡肺病之狀必喘咳逆氣肩息背痛汗出尻陰股膝攣髀腨胻足皆痛虛則少氣不能報息耳聾咽乾取其經手太陰足太陽之外厥陰內少陰血者肺脈沉之而數浮之而喘苦淅淅寒熱腹滿腸中熱小便赤肩背痛從腰以上汗出得之房內汗出當風肺病其色白身體但寒無熱時時咳其脈微遲為可治宜服五味子大補肺湯瀉肺散春當刺少商夏刺魚際皆瀉之季夏刺太淵秋刺經渠冬刺尺澤皆補之又當灸膻中百壯背第三椎二十五壯邪在肺則皮膚痛發寒熱上氣氣喘汗出咳動肩背取之膺中外俞背第三椎之旁以手重按之快然乃刺之取之缺盆中以越之形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行肺氣傷其人勞倦則咳唾血其脈細緊浮數皆吐血此為躁擾嗔怒得之肺傷氣壅所致也肺中風者口燥而喘身運而重冒而腫脹肺中寒者其人吐濁涕肺水者其人身體腫而小便難時時大便如鴨溏肺脹者虛而滿喘咳目如脫狀其脈浮大趺陽脈浮緩少陽脈微緊微為血虛緊為微寒此為鼠乳診得肺積脈浮而手按之辟易脅下時時痛逆背相引痛少氣善忘目瞑結癰皮膚寒秋愈夏劇主皮中時痛如蝨緣之狀甚者如針刺之狀時癢色白也肺之積名曰息賁在右脅下覆大如杯久久不愈病灑灑寒熱氣逆喘咳發肺癰以春甲乙日得之何也心病傳肺肺當傳肝肝適以春旺旺者不受邪肺復欲還心心不肯受因留結為積故知息賁以春得之肺病身當有熱咳嗽短氣唾出膿血其脈當短澀今反浮大其色當白而反赤者此是火之剋金為大逆十死不治商音人者主肺聲也肺聲哭其音磬其志樂其經手太陰厥逆陽明則營衛不通陰陽反祚陽氣內擊陰氣外傷傷則寒寒則虛虛則厲風所中噓吸戰掉語聲嘶塞而散下氣息短憊四肢僻弱面色青葩遺矢便利甚則不可治依源麻黃續命湯主之方在第八卷賊風篇中又言音喘急短氣好唾此為火剋金陽擊陰陰氣沉陽氣升升則實實則熱熱則狂狂則閉眼悸言非常所説口赤而張飲無時度此熱傷肺肺化為血不治若面赤而鼻不欹可治也肺病為瘧者令人心寒寒甚則熱熱間善驚如有所見者恆山湯主之方見第十卷溫瘧篇中若其人本來語聲雄烈忽爾不亮拖氣用力方得出言而反於常人呼與語直視不應雖曰未病勢當不久此則肺病聲之候也察觀疾病表裡相應依源審治乃不失也白為肺肺合皮白如豕膏者吉肺主鼻鼻是肺之餘其人金形相比於上商白色小頭方面小肩背小腹小手足發動身輕精瘦急心靜悍性喜為吏治耐秋冬不耐春夏春夏感而生病主壬太陰廉廉然肩膺厚薄正竦則肺應之正白色小理者則肺小小則少飲不病喘喝粗理者則肺大大則虛虛則寒喘鳴多飲善病胸喉痹逆氣巨肩反膺陷喉者則肺高高則實實則熱上氣肩急咳逆合腋張脅者則肺下下則逼賁迫肝善脅下痛鼻塞或壅而涕生息肉好肩背厚者則肺堅堅則不病咳上氣肩背薄者則肺脆脆則易傷於熱喘息鼻衄肩膺好者則肺端正端正則和利難傷膺偏欹者則肺偏傾偏傾則病胸偏痛鼻亦偏疾凡人分部陷起者必有病生大腸陽明為肺之部而臟氣通於內外部亦隨而應之沉濁為內浮清為外若外病內入則所部起內病里出則所部陷外入前治陽後治陰內出前治陰後治陽實瀉虛補陽主外陰主內凡人死生休否則臟神前變形於外人肺前病鼻則為之孔開焦枯若肺前死鼻則為之梁折孔閉青黑色若天中等分墓色應之必死不治看色深淺斟酌賒促遠不出一年促不延時月肺疾少愈而卒死何以知之曰赤黑如拇指靨點見顏頰上此必卒死肺絶三日死何以知之曰口張但氣出而不還面白目青是謂亂經飲酒當風風入肺經膽氣妄泄目則為青雖有天救不可復生面黃目白如枯骨死吉凶之色在於分部順順面見赤白入鼻必病不出其年若年上不應三年之中禍必應也秋金肺脈色白主手太陰脈也秋取經輸秋者金始治肺將收殺金將勝火陽氣在合陰氣初勝濕氣及體陰氣未盛未能深入故取輸以瀉陰邪取合以虛陽邪陽氣始衰故取於合其脈本在寸口之中掌後兩筋間二寸中應在腋下動脈其脈根於太倉太倉在臍上三寸一夫是也其筋起於手大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下上出缺盆結肩髃前上結缺盆下結胸裡散貫賁下抵季脅其脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中後循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直次指內廉出其端合手陽明為表裡陽明之本在肘骨中同會於手太陰太陰之別名列缺起於腋下分間並太陰之經直入掌中散入於魚際別走手陽明主肺生病病實則大腸熱熱則手兌掌起起則陽病陽脈反逆大於寸口脈三倍病則咳上氣喘喝煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風汗出中風虛則大腸寒寒則欠咳小便遺數數則陰病陰脈反小於寸口一倍病則肩背寒痛少氣不足以息季脅空痛尿色變卒遺矢無度秋三月者主肺大腸白氣貍病也其源從太陽擊手太陰太陰受淫邪之氣則經絡壅滯毛皮緊豎發泄邪生則臟傷腑溫隨秋受癘其病相反若腑虛則為陰邪所傷乍寒乍熱損肺傷氣暴嗽嘔逆若臟實則為陽毒所損體熱生斑氣喘引飲故曰白氣貍病也扁鵲云灸心肺二俞主治丹毒白貍病當依源為療調其陽理其陰則臟腑之病不生矣肺虛實第二脈四首方二十首灸法三首肺實熱右手寸口氣口以前脈陰實者手太陰經也病苦肺脹汗出若露上氣喘逆咽中塞如欲嘔狀名曰肺實熱也治肺實熱胸憑仰息泄氣除熱方石膏八兩白前杏仁各三兩白朮橘皮各五兩枸杞根皮切二升赤蜜七合上七味㕮咀以水七升煮取二升去滓下蜜煮三沸分三服治肺熱悶不止胸中喘急驚悸客熱來去欲死不堪服藥泄胸中喘氣方桃皮芫花各一升上二味㕮咀以水四斗煮取一斗五升去滓以故布手巾納汁中敷胸溫四肢不盈數日即歇橘皮湯治肺熱氣上咳息奔喘方橘皮麻黃柴胡乾紫蘇刪繁作干蘭各三兩杏仁宿薑各四兩石膏八兩上七味㕮咀以水九升煮麻黃兩沸去沫下藥煮取三升去滓分三服不瘥與兩劑治肺熱喘息鼻衄血方羚羊角元參射干雞蘇芍藥升麻柏皮各三兩生地切一升梔子仁四兩淡竹茹雞子大一枚上十味㕮咀以水九升煮取三升分三服須利者下芒硝三兩更煮三沸治肺熱飲酒當風風入肺膽氣妄泄目青氣喘者方麻黃四兩甘草五味子各三兩杏仁五十粒母薑五兩淡竹葉切一升上六味㕮咀以水七升先煮麻黃去沫下諸藥煮取三升去滓分三服瀉肺散治酒客勞倦或出當風喜怒氣舍於肺面目黃腫起即頭眩咳逆上氣時忽忽欲絶心下弦急不能飲食或吐膿血胸痛引背支滿欲嘔方五味子百部各二兩半茯苓附子肉蓯蓉石斛當歸遠志川續斷各一兩細辛甘草各七分防風川椒紫菀桂心乾薑款冬花各一兩半桃仁六十枚杏仁三十枚上十九味治下篩酒服方寸匕日三後稍加至二匕灸法肺脹氣搶脅下熱痛灸陰都隨年壯穴在挾胃脘兩邊相去一寸胃脘在心下三寸肺脹脅滿嘔吐上氣等病灸大椎並兩乳上第三肋間各七壯肺與大腸俱實右手寸口氣口以前脈陰陽俱實者手太陰與陽明經俱實也病苦頭痛目眩驚狂喉痹痛手臂卷唇吻不收名曰肺與大腸俱實也煮散治肺與大腸俱實令人氣憑滿方麻黃茯苓各六分黃耆大青桂心各三分細辛杏仁各五分石膏二兩丹參半兩五味子甘草橘皮貝母川芎各一兩枳實三枚上十五味治下篩為粗散帛裹一方寸匕半以井花水一升五合煮取七合為三服日再肺虛冷右手寸口氣口以前脈陰虛者手太陰經也病苦少氣不足以息咽乾不津液名曰肺虛冷也治肺虛冷聲嘶傷語言用力戰掉緩弱虛瘠風入肺方防風獨活川芎秦椒乾薑黃耆各四十二銖天雄麻黃山萸肉五味子各三十八銖甘草三十六銖秦艽桂心山藥杜仲人參細辛防己各三十銖菊花紫菀各二十四銖貫衆二枚附子七分上二十二味治下篩以酒服方寸匕日二服一方有石膏六分當歸五分酥蜜膏酒治肺氣虛寒癘風所傷語聲嘶塞氣息喘憊咳唾止氣嗽通聲方酥崖蜜飴糖生薑汁生百部汁棗肉杏仁各一升研甘皮五具末上八味合和微火煎常攪三上三下約一炊久取薑汁等各減半止溫酒一升服方寸匕細細咽之日二夜一又方豬胰三具大棗百枚上二味以酒五升漬之秋冬七日春夏五日出布絞去滓七日服盡二七日忌鹽羊胰亦得治咳嗽胸脅支滿多喘上氣尤良肘後方治久咳上氣二十年諸治不痊者治肺寒損傷氣嗽及涕唾鼻塞方棗肉二斤研作脂杏仁一升熬研為脂酥生薑汁白糖白蜜生百部汁各一升上七味合和微火煎常攪約一炊久下之細細溫清酒服二合日二又方專取豬胰滌除痰垢大棗通行津液漬酒治證如前或易羊胰入肺尤捷又方即酥蜜膏酒倍用棗肉杏仁之通津而去甘皮之耗氣補肺湯治肺氣不足逆滿上氣咽中悶塞短氣寒從背起口中如含霜雪言語失聲甚者吐血方五味子三兩乾薑桂心款冬花各二兩麥冬一升桑根白皮一斤大棗一百枚粳米一合上八味㕮咀以水一斗先煮桑白皮五沸下藥煮取三升分三服又方黃耆五兩甘草鍾乳人參各二兩乾地黃桂心茯苓白石英桑白皮厚朴乾薑紫菀橘皮當歸五味子遠志麥冬各三兩大棗二十枚上十八味㕮咀以水一斗四升煮取四升分五服日三夜二又方治肺氣不足咳逆上氣牽繩而坐吐沫唾血不能飲食方蘇子一升桑白皮五兩半夏六兩紫菀人參甘草五味子杏仁各二兩款冬花射干各一兩麻黃乾薑桂心各三兩細辛一兩半上十四味㕮咀以水一斗二升煮取三升半分五服日三夜二又方治肺氣不足咳逆短氣寒從背起口中如含霜雪語無聲音而渴舌本乾燥方五味子蘇子各一升白石英鍾乳各三兩款冬花竹葉橘皮桂心桑白皮茯苓紫菀各二兩麥冬四兩生薑五兩杏仁五十枚粳米二合大棗十枚上十六味㕮咀以水一斗三升先煮桑白皮粳米大棗以米熟去滓納諸藥煮取五升分六服日三又方治肺氣不足心腹支滿咳嗽喘逆上氣唾膿血胸背痛手足煩熱惕然自驚皮毛起或哭或歌或怒乾嘔心煩耳中聞風雨聲面色白方款冬花桂心各二兩桑白皮一斤生薑五味子鍾乳各三兩麥冬四兩粳米五合大棗十枚上九味㕮咀以水一斗二升先煮粳米棗令熟去滓納藥煎取二升分三服溫服之一方用白石英二兩廣濟有紫菀人參各二兩名紫菀湯麻子湯治肺氣不足咳唾膿血氣短不得臥方麻子一升桑皮餳各一斤桂心人參各二兩阿膠紫菀各一兩生薑三兩乾地黃四兩上九味㕮咀以酒一斗五升水一斗五升合煮取四升分五服餳煎治肺氣不足咽喉苦幹方作餳任多少取干棗一升去核熟搗水五升和使相得絞去滓澄去上清取濁者納飴中攪火上煎勿令堅令連服如雞子大漸漸服之日三夜二治肺風氣痿絶四肢滿脹喘逆胸滿方灸肺俞各二壯肺俞對乳引繩度之在第三椎下兩旁相去各一寸五分肺與大腸俱虛右手寸口氣口以前脈陰陽俱虛者手太陰與陽明經俱虛也病苦耳鳴嘈嘈時妄見光明情中不樂或如恐怖名曰肺與大腸俱虛也小建中湯治肺與大腸俱不足虛寒乏氣小腹拘急腰痛羸瘠百病方大棗十二枚生薑桂心各三兩甘草二兩芍藥六兩上五味㕮咀以水八升煮取三升去滓合飴糖八兩煮三沸分三服肘後用黃耆人參各二兩名黃耆建中湯肺勞第三論一首方三首灸法一首論曰凡肺勞病者補腎氣以益之腎旺則感於肺矣人逆秋氣則手太陰不收肺氣焦滿順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣麻黃引氣湯治肺勞實氣喘鼻張面目苦腫方麻黃杏仁生薑半夏各五分紫蘇四分白前細辛桂心各三分橘皮二分石膏八兩竹葉切一升上十一味㕮咀以水一斗煮取三升去滓分三服半夏湯治肺勞虛寒心腹冷氣逆遊氣胸脅氣滿從胸達背痛憂氣往來嘔逆飲食即吐虛乏不足方半夏一升生薑一斤桂心四兩甘草厚朴各二兩人參橘皮麥冬各三兩上八味㕮咀以水一斗煮取四升分四服腹痛加當歸二兩厚朴湯治肺勞風虛冷痰澼水氣晝夜不得臥頭不得近枕上氣胸滿喘息氣絶此痰水盛溢方厚朴麻黃桂心黃芩石膏大戟橘皮各二兩枳實甘草秦艽杏仁茯苓各三兩細辛二兩半夏一升生薑十兩大棗十五枚上十六味㕮咀以水一斗三升煮取四升去滓分五服治喉痹氣逆咳嗽口中唾涎方灸肺俞七壯亦可隨年壯至百壯氣極第四論一首方六首灸法二首論曰凡氣極者主肺也肺應氣氣與肺合又曰以秋遇病為皮痹皮痹不已復感於邪內舍於肺則寒濕之氣客於六腑也若肺有病則先發氣氣上衝胸常欲自恚以秋庚辛日傷風邪之氣為肺風肺風之狀多汗若陰傷則寒寒則虛虛則氣逆咳咳則短氣暮則甚陰氣至