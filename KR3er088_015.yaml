body:
  text: 卷十五脾臟方凡十類脾臟脈論第一論一首論曰脾主意脾臟者意之舍意者存憶之志也為諫論大夫並四臟之所受心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智意者脾之藏也口唇者脾之官脾氣通於口口和則能別五穀味矣故云口為戊舌唇為己循環中宮上出頤頰次候於唇下回脾中榮華於舌外主肉內主味脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五臟神名俾俾主藏營一作意秩祿號為意臟隨節應會故曰脾藏營營舍意在氣為噫在液為涎脾氣虛則四肢不用五臟不安實則腹脹涇溲不利脾氣虛則夢飲食不足得其時則夢築垣蓋屋脾氣盛則夢歌樂體重手足不舉厥氣客於脾則夢丘陵大澤壞屋風雨凡脾臟象土與胃合為腑其經足太陰與陽明為表裡其脈緩相於夏旺於季夏脾者土也敦而福敦者厚也萬物衆色不同故名曰得福者廣也萬物懸根掛莖其葉在巔蜎蜚蠕動蚑蠷喘息皆蒙土恩德則為緩恩則為遲故令太陰緩而遲尺寸不同酸鹹苦辛大妙而生互行其時而以各行皆不群行儘可常服土寒則溫土熱則涼土有一子名曰金懷挾抱之不離其身金乃畏火恐熱來熏遂棄其母逃於水中水為金子而藏火神閉門塞戶內外不通此謂冬時土失其子其氣衰微水為洋溢浸漬其地走擊皮膚面目浮腫歸於四肢愚醫見水直往下之虛脾空胃水遂居之肺為喘浮肝反畏肺故下沉沒下有荊棘恐傷其身避在一邊以為水流心衰則伏肝微則沉故令脈伏而沉上醫遠一作來占因轉孔穴利其溲便遂通水道甘液下流停其陰陽喘息則微汗出正流肝著其根心氣因起陽行四肢肺氣亭亭喘息則安腎為安聲其味為咸倚坐母敗汙臭如腥土得其子即成為山金得其母名曰丘矣四時之序逆順之變異也然脾脈獨何主脾脈者土也孤臟以灌四旁者也其善者不可得見惡者可見惡者何如其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中太過則令人四肢沉重不舉不及則令人九竅壅塞不通名曰重強脾脈來而和柔相離如雞踐地曰平長夏以胃為本脾脈來實而盈數如雞舉足曰脾病脾脈來堅鋭如雞之喙雞一作鳥如鳥之距如屋之漏如水之流曰脾死真脾脈至弱而乍疏乍散一作數色黃青不澤毛折乃死長夏胃微濡弱曰平弱多胃少曰脾病但代無胃曰死濡弱有石曰冬病石甚曰今病脾藏營營舍意憂愁不解則傷意意傷則悶亂四肢不舉毛悴色夭死於春足太陰氣絶則脈不營其口唇口唇者肌肉之本也脈弗營則肌肉濡肌肉濡則人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也脾死臟浮之大緩一作堅按之中如覆杯潔潔狀如搖者死六月季夏建末也坤末之間土之位脾旺之時其脈大阿阿而緩曰平反得浮大而洪者是心之乘脾母之歸子為虛邪雖病易治反得微澀而短者是肺之乘脾子之乘母為實邪雖病自愈反得眩而長者是肝之乘脾木之剋土為賊邪大逆十死不治反得沉濡而滑者是腎之乘脾水之凌土為微邪雖病即瘥右手關上陰絶者無脾脈也苦少氣下利腹滿身重四肢不欲動善嘔刺足陽明治陽右手關上陰實者脾實也苦腸中伏伏如堅狀大便難刺足太陰治陰脾脈長長而弱來疏去穊一作數再至曰平三至曰離經病四至脫精五至死六至命盡足太陰脈也脾脈急甚為瘛瘲微急為膈中滿食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無疾大甚為擊僕微大為脾疝氣裹大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為㿗癃微滑為蟲毒蛔腸鳴熱澀甚為腸㿗微澀為內潰多下膿血脾脈搏堅而長其色黃病少氣其軟而散色不澤者當病足䯒腫若水狀黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風扁鵲曰脾有病則色萎黃實則舌本強直虛則多癖善吞注利其實若陽氣壯則夢飲食之類脾在聲為歌在變動為噫在志為思思傷脾精氣並於脾則飢音主長夏病變於音者取之經恐懼而不解則傷精精傷則骨酸痿厥精時自下則病精是故五臟主藏精者也不可傷傷則守失而陰虛虛則無氣無氣則死病先發於脾閉塞不通身痛體重一日之胃而腹脹二日之腎少腹腰脊痛脛酸三日之膀胱背膂筋痛小便閉十日不已死冬人定夏晏食病在脾日昳慧平旦甚日中持下晡靜素問作日出甚王冰云日中持者繆也假令脾病東行若食雉兔肉及諸木果實得之不者當以春時發得病以甲乙日也凡脾病之狀必身重善飢足痿不收素問作善肌肉痿足不收甲乙作苦飢肌肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化取其經足太陰陽明少陰血者脾脈沉之而濡浮之而虛苦腹脹煩滿胃中有熱不嗜食食而不化大便難四肢苦痹時不仁得之房內月使不來來而頻並脾病其色黃飲食不消腹苦脹滿體重節痛大便不利其脈微緩而長此為可治宜服平胃丸瀉脾丸茱萸丸附子湯春當刺隱白冬刺陰陵泉皆瀉之夏刺大都季夏刺公孫秋刺商丘皆補之又當灸章門五十壯背第十一椎百壯邪在脾胃肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調其三里有所擊僕若醉飽入房汗出當風則傷脾脾傷則中氣陰陽離別陽不從陰故以三分候死生脾中風者翕翕發熱形如醉人腹中煩重皮肉瞤瞤而短氣也脾中寒脾水者其人腹大四肢苦重津液不生但苦少氣小便難脾脹者善噦四肢急一作實體重不能衣一作收趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約脾約者其人大便堅小便利而反不渴脾氣弱病利下白腸垢大便堅不能更衣汗出不止名曰脾氣弱或五液注下青黃赤白黑寸口脈弦而滑弦則為痛滑則為實痛即為急實即為踴痛踴相搏胸脅搶急趺陽脈浮而澀浮即胃氣微澀即脾氣衰微衰相搏即呼吸不得此為脾家失度寸口脈雙緊即為入其氣不出無表有里心下痞堅趺陽脈微而澀微即無胃氣澀則傷脾寒在於膈而反下之寒積不消胃微脾傷穀氣不行食已自噫寒在胸膈上虛下實穀氣不通為閉塞之病寸口脈緩而遲緩則為陽衛氣長遲則為陰榮氣促一云不足榮衛俱和剛柔相得三焦相承其氣必強趺陽脈滑而緊滑即胃氣實緊即脾氣傷得食而不消者此脾不治也能食而腹不滿此為胃氣有餘腹滿而不能食心下如飢此為胃氣不行心氣虛也得食而滿者此為脾家不治病人鼻下平者胃病也微赤者病發癰微黑者有熱青者有寒白者不治唇黑者胃先病微燥而渴者可治不渴者不可治臍反出者此為脾先落一云先終凡人病脈已解而反暮微煩者人見病者瘥安而強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈診得脾積脈浮大而長飢則減飽則見䐜起與谷爭減心下纍纍如桃李起見於外腹滿嘔泄腸鳴四肢重足脛腫厥不能臥是主肌肉損色黃也脾之積名曰痞氣在胃脘覆如大盤久久不愈病四肢不收黃疸食飲不為肌膚以冬壬癸日得之肝病傳脾脾當傳腎腎適以冬旺旺者不受邪脾復欲還肝肝不肯受因留結為積故知痞氣以冬得之脾病其色黃體青失溲直視唇反張爪甲青飲食吐逆體重節痛四肢不舉其脈當浮大而緩今反弦急其色當黃而反青者此是木之剋土為逆十死不治宮音人者主脾聲也脾聲歌其音鼓其志愁其經足太陰厥逆陽明則榮衛不通陰陽翻祚陽氣內擊陰氣外傷傷則寒寒則虛虛則舉體消瘦語音沉澀如破鼓之聲舌強不轉而好咽唾口噤唇黑四肢不舉身重如山便利無度甚者不可治依源麻黃湯主之方在別卷中又言聲優懼舌本捲縮此是木剋土陽擊陰陰氣伏陽氣起起則實實則熱熱則悶亂體重不能轉側語聲拖聲氣深不轉而心急此為邪熱傷脾甚則不可治若唇雖萎黃語音若轉可治脾病為瘧者令人寒腹中痛熱則腸中鳴鳴已汗出恆山丸主之方見別卷中若其人本來少於瞋怒而忽反常瞋喜無度正言而鼻笑不答於人此脾病聲之候也不盈旬月禍必至矣陰陽之疾經絡之源究尋其病取其所理然後行治萬無遺一也黃為脾脾合肉黃如鱔腹者吉脾主口唇唇是脾余其人土形相比於上宮黃色大頭圓面美肩背大腹好股胻小手足多肉上下相稱行安地舉足心平好利人不喜權勢喜附人耐秋冬不耐春夏春夏感而生病主足太陰敦敦然脾應月月有虧盈脾小大隨人唇大小上唇厚下唇薄無齶齦唇缺破此人脾不正揭聳唇者則脾高高則實實則熱熱則季脅痛滿唇垂而大不堅者則脾下下則虛虛則危危則寒寒則身重不能行步唇堅者則脾堅堅則臟安安則不病唇上下好者則脾端正端正則脾胃和利人無病唇偏舉者則脾偏痛好脹凡人分部中陷起者必有病生胃陽明為脾之部而臟氣通於內外部亦隨而應之沉濁為內浮清為外若表病外入所部則起起則前瀉陽後補陰若里病內出所部則陷陷則前治陰後治陽陽則實熱陰則虛寒寒主外熱主內凡人死生休否則臟神前變形於外人脾前病唇則焦枯無潤若脾前死唇則干青白漸縮急齒噤不開若天中等分墓色應之必死不治看色厚薄決判賒促賒則不盈四百日內促則旬朔之間脾病少愈而猝死何以知之曰青黑如拇指靨點見顏頰上此必卒死脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺其出時一曰五日死面青目黃者五日死病人著床心痛氣短脾竭內傷百日復愈欲起傍徨因坐於地其亡倚床能治此者可謂神良又面黃目赤不死黃如枳實死吉凶之色在於分部霏霏而見黑黃入唇必病不出其年其穴在鼻上當兩眼是其分部位也若年上不應三年之內禍必應也季夏土脾脈色黃主足太陰脈也其脈本在中封前上四寸之中應在背俞與舌本中封在內踝前一寸大筋里宛宛中脈本從中封上四寸是也其脈根於隱白隱白在足大趾端內側是也其筋起於足大趾之端內側上結於內踝其直者上結於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於脅散於胸中其內者著於脊其脈起於足大趾之端循趾內側白肉際過核骨後上內踝前廉上臑內循胻骨後交出厥陰之前上循膝骨內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中合足陽明為表裡陽明之本在厲兌足趺上大趾間上三寸骨解中也同會於手太陰其足太陰之別名曰公孫去本節後一寸別走陽明其別者入絡腸胃主脾生病實則胃熱熱則腹中切痛痛則陽病陽脈反大於寸口三倍病則舌強筋轉卵縮牽陰股引髀痛腹脹身重飲食不下煩心心下急注脾脾病虛則胃寒寒則腹中鼓脹脹則陰病陰脈反小於寸口一倍病則泄水不能臥而煩強立股膝內痛苦筋折扭之扭之者脈時綴綴動也發動甚者死不治四季之月各餘十八日此為四季之餘日主脾胃黃肉隨病也一作內陽病其源從太陰陽明相格節氣相移三焦寒濕不調四時關格而起則臟腑傷疴隨時受癘陽氣外泄陰氣內伏其病相反若腑虛則陰邪所加頭重頸直皮肉強痹若臟實則陽疫所傷蘊而結核起於喉頸之側布毒熱於皮膚分肉之中上散入髮際下貫顳顬隱隱而熱不相斷離故曰黃肉隨病也扁鵲曰灸肝脾二俞主治丹毒四時隨病當依源補瀉虛實之病皮肉隨熱則須鐮破敷貼方咒促治疾無逃矣脾虛實第二論一首方二十三首脈四首灸法一首脾實熱右手關上脈陰實者足太陰經者病苦足寒脛熱腹脹滿煩擾不得臥名曰脾實熱也瀉熱湯治舌本強直或夢歌樂而體重不能行方前胡茯苓龍膽細辛芒硝各三兩杏仁四兩元參大青各二兩苦竹葉切一升上九味㕮咀以水九升煮取三升分三服食後服射干煎方主治同前射干八兩大青三兩石膏十兩一作一升赤蜜一升上四味㕮咀以水五升煮取一升五合去滓下蜜煎取二升分三服治脾熱面黃目赤季脅痛滿方半夏母姜各八兩枳實梔子茯苓芒硝各三兩細辛五兩白朮杏仁各四兩生地黃淡竹葉切各一升上十一味㕮咀以水九升煮取三升去滓下芒硝分三服治脾橫方若赤黑髮如瓜大煎羊脂摩之又方赤小豆末和雞子白敷之四肢寒熱腰痛不得俯仰身黃腹滿食嘔舌根直灸第十一椎及左右各一寸五分三處各七壯脾胃俱實右手關上脈陰陽俱實者足太陰與陽明經俱實也病苦脾脹腹堅搶脅下痛胃氣不轉大便難時反泄利腹中痛上衝肺肝動五臟立喘鳴多驚身熱汗不出喉痹精少名曰脾胃俱實也三黃瀉熱湯方大黃麻黃黃芩各四兩杏仁赤茯苓甘草橘皮芒硝澤瀉各三兩上九味㕮咀以水九升煮取三升絞去滓納大黃煮兩沸去滓下芒硝分三服大黃瀉熱湯治脾脈厥逆大腹中熱切痛舌強腹脹身重食不下心注脾急痛方大黃切水一升半漬一宿甘草各三兩澤瀉茯苓黃芩細辛芒硝橘皮各二兩上八味㕮咀以水七升煮取三升三合去滓下大黃更煎二沸去滓下芒硝分三服治脾熱脅痛熱滿不歇目赤不止口唇乾裂方石膏一斤碎生地黃汁赤蜜各一升竹葉切五升上四味先以水一斗二升煮竹葉取七升去滓澄清下石膏煮取一升五合去滓下地黃汁煮兩沸次下蜜煎取三升細細服之治脾熱偏一邊痛胸滿脅偏脹方茯苓橘皮澤瀉各三兩芍藥白朮各四兩桂心人參各三兩石膏八兩半夏六兩生薑切桑根白皮各一升上十一味㕮咀以水一斗二升煮取三升去滓分三服若須利下加芒硝二兩佳脾虛冷右手關上脈陰虛者足太陰經也病苦泄注腹滿氣逆霍亂嘔吐黃疸心煩不得臥腸鳴名曰脾虛冷也治虛脹脅痛肩息有時發作悉補之方五加根皮丹參橘皮各一斤地骨皮乾薑白朮各八兩乾地黃芎藭附子各五兩豬椒根皮二斤桂心桔梗各四兩甘草三兩大棗五十枚上十四味㕮咀以酒四斗漬五七日服七八合加至一升日再服檳榔散治脾寒飲食不消勞倦氣脹噫滿憂恚不樂方檳榔八枚皮子並用人參茯苓陳曲麥糵厚朴白朮吳茱萸各二兩上八味治下篩食後酒服二方寸匕日再服一方用橘皮一兩半溫脾丸治久病虛羸脾氣弱食不消喜噫方黃柏大麥糵吳茱萸桂心乾薑細辛附子當歸曲大黃黃連各一兩上十一味為末蜜丸如梧子大每服十五丸空腹酒服日三麻豆散主脾氣弱不下食餌此以當食方大豆黃卷二升大麻子三升熬令香上二味治下篩飲和服一合日四五任意多少脾胃俱虛右手關上脈陰陽俱虛者足太陰與陽明經俱虛也病苦胃中如空狀少氣不足以息四逆寒泄注不已名曰脾胃俱虛也治腹脹善噫食則欲嘔泄澼溏下口乾四肢重好怒不欲聞人聲忘誤喉痹補之方黃連一兩禹餘糧二兩白朮乾薑各三兩大麻子五兩桑白皮八兩大棗二十枚上七味㕮咀以水一斗二升煮取三升分四次服治脾胃俱虛苦飢寒痛方人參當歸桂心茯苓桔梗芎藭各五兩厚朴甘草橘皮吳茱萸各二兩白朮五兩麥糵一升上十二味㕮咀以水一斗二升煮取三升分三服白朮散治脾胃俱虛冷方白朮厚朴人參吳茱萸茯苓麥糵曲芎藭各三兩上八味治下篩酒服方寸匕食後服日三一方加大腹橘皮平胃丸凡身重不得食食無味心下虛滿時時欲下喜臥者皆針胃脘太倉宜服建中湯及此方杏仁五十枚丹參三兩苦參元參葶藶各二兩芎藭桂心各一兩上七味為末蜜丸如梧子大酒服五丸日三以知為度又方治丈夫小兒食實不消胃氣不調或溫壯熱結大小便不利者有病冷者服露宿丸熱藥後當進此丸調胃方露宿丸見後十六卷胃腑痼冷積熱門大黃二兩小草甘草芍藥芎藭葶藶各一兩杏仁五十枚上七味為末蜜丸如梧子飲服五丸日三一歲小兒二丸漸加之翼方無杏仁有菖蒲當歸乾薑茯苓麥門冬細辛為十三味論曰凡病宿食在上脘當吐之脈數而滑者實也有宿食不消下之愈胃中有澼食冷物即痛不能食有熱物即欲食大腹有宿食寒栗發熱如瘧狀宿食在小腹者當暮發熱明旦復止寸脈緊即頭痛風寒或腹中宿食不化寸口脈緊者如轉索左右無常脾胃中有宿食不消寸口脈浮而大按之反澀尺中微而澀故知宿食大麴糵丸主消穀斷下溫和又寒冷者常服不患霍亂方大麥糵曲各一升附子乾薑當歸人參各三兩赤石脂一兩桔梗女萎各二兩吳茱萸皂莢各五兩蜀椒二兩半烏梅五十枚上十三味為末蜜酢中半漬梅一宿蒸三斗米下去核搗如泥和藥蜜和搗二千杵服十丸日三下甚者加龍骨阿膠艾各三兩消食斷下丸寒冷者常服之方曲大麥糵各一升吳茱萸四兩上三味為末蜜和服十五丸如梧子日三服乾薑散治不能食心意冥然忘食方乾薑法曲蜀椒豉大麥糵各一升上五味合治下篩食後服三方寸匕日三以能食為度消食丸治數年不能食方小麥糵曲各一升乾薑烏梅各四兩上四味為末蜜和服十五丸日再加至四十丸寒在胸中及反胃翻心者皆瘥曲糵丸主消穀能食除腸中水氣臚脹方法曲麥糵杏仁各五兩上三味治下篩食後酒服一合日三脾勞第三論一首方二首論曰凡脾勞病者補肺氣以益之肺旺則感於脾是以聖人春夏養陽氣秋冬養陰氣以順其根本矣肝心為陽脾肺腎為陰逆其根則伐其本陰陽四時者萬物之終始也半夏湯治脾勞實四肢不用五臟乖反脹滿肩息氣急不安承氣泄實熱方半夏宿姜各八兩茯苓白朮杏仁各三兩橘皮芍藥各四兩竹葉切一升大棗二十枚上九味㕮咀以水一升煮取三升