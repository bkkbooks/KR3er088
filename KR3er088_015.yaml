微弱數者為欲自止雖發熱必不死下痢脈沉而遲其人面少赤身有微熱下利清穀必鬱冒汗出而解病人必微厥所以然者面戴陽下虛故也下痢有微熱而渴脈弱者今自愈下痢脈數有微熱汗出今自愈設脈緊為未解下痢脈弦發熱身汗者自愈下痢脈大浮弦下當已下痢舌黃燥而不渴胸中實下不止者死下痢後脈絶手足厥冷晬時脈還手足溫者生不還不溫者死生死之決此之謂也下痢手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順凡六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者下利不禁下甚者手足不仁也細尋取之萬不失一下病體略例如此耳素問曰春傷於風夏為膿血凡下多滯下也夏傷於風秋必洞泄秋多下水也患是冷也夫積冷積熱及水穀實而下者以大黃湯下之強人勿過兩劑皆消息五六日更進一劑其補澀湯不效者三兩日可進一劑陟釐丸治百病下痢及傷寒身熱頭痛目赤四肢煩疼不解協熱下利或醫已吐下之腹內虛煩欲得冷飲不能消腹中急痛溫食則吐乍熱乍冷狀如溫瘧或小便不利氣滿嘔逆下痢不止方水中陟釐五兩紫石英三兩漢中木防己六兩隴西當歸四兩厚朴一兩黃連二兩上好豉三升三歲醇苦酒五升上八味以苦酒二升漬防己極令潤出之切以板瓦覆著炭火上以厚紙藉瓦上令色槁燥有餘苦酒復漬之更出熬盡苦酒止勿令火猛徐徐熬令極燥各搗為末又以余苦酒三升浸豉一宿明旦以瓦盆盛以一盆覆蒸五升土下須二氣通流出之研絞取濃汁和藥搗為丸如雞頭子大懸令陰乾勿見風塵此藥以三丸為一劑平旦服一劑晝服一劑暮服一劑皆以水服之若病重藥力未行者但益服之日可四五劑令腹中有藥力飲食消是其效也新服藥未安調當稀糜助藥力心中瞭然後可作羹臛微冷食之若有時不喜冷食正是藥力盡耳若欲不復藥者但稍溫食藥力自盡矣服藥不必強多飲水禁熱食生魚豬肉蒜生菜酒及辛物肥膩若有風病加防風一兩人虛羸加石斛一兩若宿有下痢腸胃損弱者加太一餘糧二兩半取石中黃軟香者若婦人産後疾加石硫黃一兩小便黃赤不利加蒲黃一兩依方消息之無不得效也烏梅丸下痢熱諸治不瘥方烏梅一升黃連一斤金色者上二味蜜丸如梧子服二十丸日三夜二松皮散治積久二三十年常下痢神方赤松皮去上蒼皮切一斗為散面粥和一升服之日三服瘥不過服一斗永瘥三十年痢服之百日瘥苦參橘皮丸治熱毒痢方苦參橘皮黃連黃柏鬼臼一作鬼箭羽藍青獨活阿膠甘草上九味等分為末以蜜煬膠和並手丸之如梧子候乾飲服十丸日三後稍加猝下痢者大良三黃白頭翁湯治諸熱毒下黃汁赤如爛血滯如魚腦腹痛壯熱方黃連二兩黃芩黃柏升麻石榴皮各六分艾葉三分白頭翁桑寄生當歸牡蠣犀角甘草各一兩上十二味㕮咀以水六升煮取三升分三服龍骨丸治下血痢腹痛方龍骨龍膽羚羊角當歸附子乾薑黃連各三十珠赤石脂礬石各一兩半犀角甘草熟艾各十八銖上十二味為末蜜丸如小豆先食服十五丸日三加至二十丸又方龍骨當歸乾薑熟艾牛角䚡各三兩附子黃柏赤石脂川芎阿膠厚朴甘草橘皮芍藥石榴皮各二兩蜀椒一兩升麻一兩半黃連五合大棗二十枚上十九味㕮咀以水一斗三升煮取四升去滓納牛角䚡末阿膠煬化綿絞去滓分七服日四夜三翼方無橘皮治血痢方蒲黃三合乾地黃桑耳甘草芒硝茯苓人參柏葉艾葉阿膠生薑各二兩禹餘糧黃連各一兩赤石脂五分上十四味㕮咀以水一斗煮取四升溫分五服治下雜血方干藍犀角地榆各二兩蜜二合上四味㕮咀以水五升煮取一升去滓下蜜煎取五合分二服治熱毒蠱妙治熱毒下黑血五內絞切痛日夜百行氣絶欲死方黃連一升龍骨白朮各二兩阿膠乾薑當歸赤石脂各三兩附子一兩上八味㕮咀以水一斗煮取五升分五服余以貞觀三年七月十二日忽得此熱毒痢至十五日命將欲絶處此方藥入口即定白頭翁湯治赤滯下血連月不瘥方白頭翁厚朴阿膠黃連秦皮附子黃柏茯苓芍藥各二兩乾薑當歸赤石脂甘草龍骨各三兩大棗三十枚粳米一升上十六味㕮咀以水一斗二升先煮米令熟出米納藥煮取三升分四服治下血日夜七八十行方黃連黃柏各四兩上二味㕮咀以醇醋五升煮取一升半分再服治大熱毒純血痢不可瘥者方黃連六兩㕮咀以水七升煮取二升半夜露置星月下旦起空腹頓服臥將息即止不瘥加黃芩二兩更作服之仍不瘥者以疳痢法治之治下赤連年方地榆鼠尾草各一兩上二味㕮咀以水二升煮取一升分二服如不止取屋塵水漬去滓一升分二服古今録驗云服屋塵汁一小杯又方秦皮如無以槲皮代之鼠尾草薔薇根上三味等分㕮咀以水淹煎去滓銅器中重釜煎成丸如梧子大服五六丸日三稍增瘥止亦可濃汁服半升治下痢絞痛腸滑不可瘥方黃連六兩阿膠鼠尾草當歸乾薑各三兩上五味㕮咀若大冷白多以清酒一斗煮取三升分三服若熱及不痛者去乾薑當歸以水煮之治熱痢水穀方黃連阿膠各二兩黃柏一兩烏梅四十枚梔子三十枚上五味㕮咀以水五升煮取二升半分三服亦治䘌神良茯苓湯治因下空竭欲死滯下膿血日數十行羸篤垂死老少並宜服之方茯苓黃芩黃連黃柏龍骨人參乾薑桂心當歸芍藥甘草梔子仁各半兩赤石脂一兩大棗十二枚上十四味㕮咀以水五升煮取二升分再服不瘥滿三劑此方主風虛冷痢最佳溫脾湯治下久赤白連年不止及霍亂脾胃冷實不消方大黃四兩人參甘草乾薑各二兩附子一枚大者上五味㕮咀以水八升煮取二升半分三服臨熟下大黃與後溫脾湯小異須大轉瀉者當用此方神效黃連湯治赤白痢方黃連黃柏乾薑石榴皮阿膠各三兩當歸二兩甘草一兩上七味㕮咀以水七升煮取三升分三服女萎丸治熱病時氣下赤白痢遂成䘌方女萎藜蘆各三分烏頭桂心各四分黃連雲實各三分代赭一分上七味為末蜜和丸如梧子大服二丸大下痢宿勿食清旦以冷水服之勿飲食至日中過後乃飲食若得藥力明旦更服如前亦可長服虛羸晝夜百行膿血亦瘥聖湯治下赤白痢大孔蟲生悉皆瘥方鼠尾草二兩豉一升梔子仁生薑各六兩桃皮一握上五味㕮咀以水七升煮二升分三服一本單用桃皮以酒煮服之治冷熱不調或水或膿或五色血痢方酸石榴五枚合殼子搗絞取汁二升服五合瘥止治赤白滯下方亂髮雞子大燒末水服不過三服灸法泄痢食不消不作肌膚灸脾俞隨年壯泄注五痢便膿血重下腹痛灸小腸俞百壯泄痢久下失氣勞冷灸下腰百壯三報穴在八魁正中央脊骨上灸數多尤佳三宗骨是忌針泄痢不禁小腹絞痛灸丹田百壯三報穴在臍下二寸針入五分泄痢不嗜食雖食不消灸長谷五十壯三報穴在挾臍相去五寸一名循際泄痢赤白漏灸足太陰五十壯三報久泄痢百治不瘥灸足陽明下一寸高骨上陷中去大趾歧三寸隨年壯又屈竹量正當兩胯脊上點訖下量一寸點兩旁各一寸復下量一寸當脊上合三處一灸三十壯灸百壯以上一切痢皆斷亦治濕䘌冷脊上當胯點處不灸又灸臍中稍稍二三百壯又灸關元三百壯十日灸並治冷痢腹痛在臍下三寸赤白下痢灸窮骨以灸數多為佳冷痢第八論一首方三十二首論曰舊治痢於貴勝用建脾丸多效今治積久冷痢先以溫脾湯下訖後以建脾丸補之未有不效者貧家難以克辦亦無可將息也溫脾湯治積久冷熱赤白痢方大黃桂心各三兩附子乾薑人參各一兩上五味㕮咀以水七升煮取二升半分三服與前溫脾湯小異建脾丸治虛勞羸瘦身體重脾胃冷飲食不消雷鳴腹脹泄痢不止方鍾乳粉三兩赤石脂好曲大麥糵當歸黃連人參細辛龍骨乾薑茯苓石斛桂心各二兩附子一兩蜀椒六兩上十五味為末白蜜丸如梧子大酒服十丸日三加至三十丸弱者飲服此方男女通治集驗無細辛龍骨增損建脾丸治丈夫虛勞五臟六腑傷敗受冷初作滯下久則變五色赤黑如爛腸極臭穢者方鍾乳粉赤石脂各三兩礬石乾薑蓯蓉桂心石斛五味子澤瀉遠志寄生柏子仁人參白頭翁天雄當歸石榴皮牡蠣龍骨甘草各二兩上二十味為末蜜丸酒服二十丸日三加至四十丸此二方止痢神驗駐車丸治大冷洞痢腸滑下赤白如魚腦日夜無度腹痛不可忍者方黃連六兩乾薑二兩當歸阿膠各三兩上四味為末以大醋八合煬膠和之並手丸如大豆候乾大人飲服三十丸小兒以意量減日三大桃花湯治冷白滯痢腹痛方赤石脂乾薑當歸龍骨牡蠣各三兩附子二兩人參一兩半白朮一升甘草芍藥各一兩上十味㕮咀以水一斗二升煮術取九升納諸藥煮取三升分三服膿者加厚朴三兩嘔者加橘皮三兩又方龍骨六兩厚朴當歸各三兩赤石脂五兩上四味㕮咀以水七升煮取二升半分三服熱加白頭翁二兩半牡蠣三兩桃花丸治下冷臍下攪痛方乾薑赤石脂各十兩上二味為末蜜丸如豌豆服十丸日三服加至二十丸倉米湯治小腹冷氣積聚結成冷痢日夜三四十行方倉粳米半升淨淘干漉薤白一握去青細切羊脂一升熬香豉三升以水一斗煎取五升澄清上四味先以羊脂煎薤白令黃並米納豉汁中煎取四升旦空腹溫服一升如人行十里久更進一升得快利止若利不止更服如前利後進粳米豉粥若復作更服一劑永瘥附子湯治暴下積日不住及久痢方附子一枚石榴皮一具阿膠二兩龍骨甘草芍藥乾薑黃連各一兩黃芩半兩粳米三合上十味㕮咀以水八升煮取三升分三服治猝下痢湯方黃連五兩生薑一斤上二味㕮咀以水五升煮取一升頓服未止更合服必效治久痢下純白由積臥冷處經久病發遂令脾胃俱冷日夜五六十行大小腹痛不可忍凡白痢屬冷赤痢屬熱方好曲末五升微熬令香粥清醇酒令熱和曲末一升空腹頓服日三若至食時搗蒜一升令至熟下薑椒末調和如常食之法惟須稠勿加鹽以水和曲二升作食索餅極爛煮之干漉熱納蒜齏臼中相和頓食之少與餘食至飢時仍准前食曲末酒比至瘥來少食餘食以此法治不過兩日無有不瘥治久冷或痢不痢但腰腹患苦冷方新蜀椒三升用醋漬一宿以曲三升和椒一升緊拌煮作粥空腹頓服之加蔥豉鹽任性調和不瘥更作以瘥為限不過三升椒即愈此方不但治冷大治諸虛損冷極有所益久當自知馬藺子丸治積冷痢下白膿方馬藺子一升熟熬附子二兩乾薑甘草各二兩半神麯麥糵阿膠各五兩黃連三兩蜀椒五合上九味為末蜜丸如梧子服二十丸日二以知為度或作散酒調服方寸匕亦佳厚朴湯治三十年久痢不止者厚朴乾薑阿膠各二兩黃連五兩艾葉石榴皮各三兩上六味㕮咀以水七升煮取二升分再服四續丸治三十年注痢骨立萎黃腸滑不瘥方雲實五合熬香龍骨三兩附子女萎各二兩白朮二兩半上五味為末以蠟煎煬以丸如梧子大服五丸日三不過五六服椒艾丸治三十年下痢所食之物皆不消化或青或黃四肢沉重起即眩倒骨肉消盡兩足逆冷腹中熱苦筋轉起止須扶陰冷無子方蜀椒三百枚烏梅一百枚熟艾一升乾薑三兩赤石脂二兩上五味椒姜艾下篩梅著一斗米下蒸令飯熟去核納薑椒末合搗三千杵蜜和丸如梧子服十丸日三服不瘥至二十丸加黃連一升下痢丸治數十年痢下氣消穀令人能食夏月長將服之不霍亂方大麥糵法曲各一升烏梅二升半附子乾薑黃連黃柏桂心各二兩蜀椒半兩吳茱萸四兩上十味為末蜜和丸如梧子大食後服十丸日三加至二十丸亦可至四十丸麥糵丸治數十年下痢不止消穀下氣補虛羸方大麥糵好曲各一升附子當歸桂心各二兩蜀椒一兩吳茱萸乾薑黃連烏梅肉各四兩上十味為末蜜和丸如梧子食後服二十丸日三烏梅丸治久痢諸藥不瘥數十年者消穀下氣補虛方烏梅肉黃連乾薑吳茱萸各四兩桂心二兩當歸三兩蜀椒一兩半上七味為末蜜和丸如梧子食後服十丸日三又方治冷痢久下方烏梅三百枚乾薑黃連各十兩當歸蜀椒各四兩細辛附子桂心人參黃柏各六兩一方用麥糵上十味為末以苦酒浸烏梅一宿去核蒸五升米下別搗如泥攪令相得納蜜和搗二千杵丸如梧子食前服十丸日三服稍增至二十丸七味散治痢下久不瘥神驗方黃連八分龍骨赤石脂厚朴烏梅肉各二分阿膠三分甘草一分上治下篩漿水服二方寸匕日二小兒一錢匕豬肝丸治下痢腸滑飲食及服藥俱完出者方豬肝一斤熬令乾黃連烏梅肉阿膠各二兩胡粉七棋子大上五味為末蜜丸如梧子酒服二十丸日三亦可散服方寸匕羊脂煎治久痢不瘥者方羊脂一棋子白蠟二棋子黃連一升米醋七合煎取稠蜜七合煎取五合烏梅肉二兩亂髮灰汁洗去垢膩燒末一升上七味納銅器中湯上煎之攪可丸如梧子飲服三十丸日三又方羊脂阿膠蠟各二兩黍米二升上四味合煮作粥一服食後即瘥治大下後腹中空竭胸中虛滿不下食方芍藥半夏甘草各一兩厚朴當歸桂心各三兩生薑五兩上七味以水八升煮取三升分三服二三劑最佳治下痢心胸滿不快腹中雷鳴或嘔吐方黃連五兩橘皮甘草各二兩龍骨生薑半夏各三兩人參一兩大棗十五枚上八味㕮咀以水一斗先煮水一大沸乃納藥煮取三升分四服妊婦服亦良斷痢湯治心胸下伏水方半夏一升生薑五兩茯苓甘草龍骨各二兩附子一兩人參黃連各三兩大棗十二枚上九味㕮咀以水八升煮取三升分三服瀉心湯治猝大下痢熱唇乾口燥嘔逆引飲方人參甘草黃芩栝蔞根橘皮各一兩黃連二兩半夏三兩乾薑一兩半上八味㕮咀以水六升煮取二升分三服胡洽云治老小利香蘇湯治下後煩氣暴上方生蘇一把冬用蘇子三兩香豉五兩上二味以水五升煮取二升頓服之治夏月暴冷忽壯熱泄痢引飲熱湯驟變通身浮腫成冷下結脈沉細小數方澤漆一兩半吳茱萸茯苓白朮當歸犀角桔梗青木香海藻芍藥大黃各二兩上十一味㕮咀以水九升煮取三升分三服下後消息五六日許可與女曲散女曲散治利後虛腫水腫者服此藥小便利得止腫亦消女曲一升乾薑細辛椒目附子桂心各一兩上六味治下篩酒服方寸匕不知加至二三匕日三産後虛滿者大良治猝暴冷下下部疼悶方燒磚令熱大醋沃之三重布覆坐上即瘥疳濕痢第九論二首方十首論曰凡疳濕之病皆由暑月多食肥濃油膩取冷眠睡之所得也禮云君子盛暑之月薄滋味無食肥濃煮餅此時不利人也養生者宜深戒之不爾多患疳濕耳凡所患處或著口斷咽喉下部疳與月蝕並不痛令人不覺其治以五月五日蝦蟆角蒿救月木寒食泔澱但得一事單用之燒作灰和臘月豬脂敷之隨手便瘥極須慎口味凡疳慎鹽醬醋酥油棗等一切皆忌惟白飯豉苜蓿苦苣蕪青不在禁限凡吹藥入下部沒中指許深即止治疳濕下黑醫不能治垂死者方髑髏灰熏黃硃砂青黛石鹽礬石丁香麝香莨菪子梔子鐵衣破故靴底灰乾薑細辛干蝦蟆菖蒲葶藶芥子土瓜根蜀椒各等分上二十味治下篩以竹筒吹杏仁大著大孔中所有患疳瘡上悉敷之其丁香麝香別搗著藥中合之一方有寒食泔澱救月木楸葉為二十三味若病大者用灌方如下麝香丁香甘草犀角各三分上四味治下篩和以鹽蜀椒各三合豉二合以水二升煮取一升去滓納四味散合分作二份灌大孔旦一灌酉一灌之凡久下一月不瘥成疳候大孔必寬者以此主之治疳濕久下痢赤白百療不瘥者方兔頭骨蛇頭菥蓂子故緋並作灰貍骨蜣螂百草五月五日收者倒掛草青黛晚蠶蛾青礬丁香蠍蟲屎床中桄木麝香苦參黃柏乾薑角蒿硃砂印成鹽救月木桂心鐵衣芒硝蝦蟆黃礬荏子葶藶子各等分上二十九味治下篩以筒子納下部吹著日一二度治疳濕不能食身重心熱腳冷百節疼痛方黃芩芍藥苦參甘草當歸蜀椒甘松一作甘澱青黛熏黃豉各二兩東引桃根蔥白各一握鹽一合麝香半兩豬膽二枚上十五味㕮咀以水一斗八升煮取四升分為二份一度灌一份候湯溫如人體然後著麝香豬膽即灌灌了作蔥豉粥食之後日更將一份如前灌之七日忌生冷毒物等但是油膩醬乳醋忌三十日大佳治疳蝕人諸處但是赤血痢久不瘥立著即瘥祕方干蝦蟆五月五日收者一枚作灰末人屎灰一作發灰金銀土堝各五兩麝香一分銀末小豆許上五味治下篩敷瘡上即瘥三七日忌如前痢者吹下部治疳痢不止方苦參甘草熏黃各二兩豉一升半蔥白五莖蜀椒三十粒上六味以苦參等三物各搗下篩以水五升煮蔥白椒豉取三升以三指撮苦參末等各一撮納汁中候冷暖如人體先飲少許豉汁食一口飯乃側臥徐徐灌之訖多時臥不出為佳大急乃出之於淨地當有疳濕蟲如白馬尾狀頭黑是其效也其重者肛大難瘥當取桃枝綿裹頭以前件汁適寒溫烙之須近脊一上三十度烙之乃瘥神驗又方崔氏曰晉代之地多五疳蝕人五臟通見脊骨下膿血手足煩疼四肢無力夜臥煩躁不安面失血色肩胛疼面與手足皆有浮氣或下血乃死治之之方雄黃青葙各二兩苦參三兩礬石雌黃鐵衣藜蘆各一兩麝香二分另研上八味治下篩以竹管納大孔中酸棗許吹納下部中日一不過三度小兒以大豆許此方極救死又方大麻子胡麻各一升半上二味並熬令黃瓦瓶泥表上厚一寸待泥干納大麻等令滿以四五枚葦管插口中密泥之掘地作灶倒立灶口底著瓦器承之密填灶孔中地平聚炭瓶四面著墼壘之日沒放火燒至明旦開取適寒溫灌疳濕者下部中一合尋覺咽中有藥氣為佳亦不得過多多則傷人隔日一灌重者再三灌之從旦灌至日夕極覺體中乏力勿怪也非但治疳濕凡百異同瘡疥癬並洗塗之論曰凡日月蝕時忌食飲腹中生䘌蟲及房室生子不具足必患月蝕瘡亦不得與兒乳日月生後乃不忌令人口臭齒齦宣露常有血出舌上生瘡者皆由犯此所致耳治月蝕惡瘡息肉方硫黃䕡茹斑蝥各等分上三味治下篩敷瘡上乾者以豬脂和敷之日三夜一又方地榆根薔薇根吳茱萸根各三兩上三味治下篩以鹽湯洗瘡敷之日三八物茜根湯凡下血者是蠱也以此治之方見後二十六卷蠱毒門小兒痢第十方三十六首溫中湯治小兒夏月積冷洗浴過度及乳母亦將冷洗浴以冷乳飲兒兒壯熱忽值暴雨涼加之兒下如水胃虛弱則面青肉冷目陷乾嘔宜先與此調其胃氣下即止方乾薑厚朴各一分當歸桂心甘草各三分人參白朮茯苓桔梗各二分上九味㕮咀以水二升煮取九合六十日至百日兒一服二合半余皆隨兒大小溫中大黃湯治小兒暴冷水穀下或乳冷下青結不消或冷實吐下乾嘔煩悶及冷滯赤白下者若已服諸利湯去實胃中虛冷下如水乾嘔目陷煩擾不宜利者可除大黃若中乳乳母洗浴水氣未消飲兒遂為霍亂宜利者便用大黃不須利宜溫者除之方大黃六分桂心厚朴甘草乾薑各一分人參白朮茯苓當歸各二分桔梗三分上十味以水二升半煮取八合凡兒三十日至六十日一服二合七十日至百日一服二合半二百日者服三合黃柏湯治小兒夏月傷暴寒寒折大熱熱入胃下赤白滯如魚腦壯熱頭痛身熱手足煩此太陽之氣外傷寒使熱氣入胃服此方良誤以利藥下之或以溫脾湯下之則熱痢以利藥下之便數去赤汁如爛肉者或下之不瘥復以澀熱之藥斷之下既不止倍增壯熱者服之即效或是溫病熱盛復遇暴寒折之熱入腹中下血如魚腦者服之良方黃柏黃連黃芩升麻當歸白頭翁一作白蘞牡蠣石榴皮寄生甘草各二分犀角艾葉各一分上十二味㕮咀以水三升煮取一升二合百日兒至二百一日一服三合治中結陽丸斷冷滯下赤白青色如魚腦脫肛出積日腹痛經時不斷者方赤石脂五分吳茱萸三分乾薑附子當歸厚朴白朮木蘭皮白頭翁黃連黃柏石榴皮各一分上十二味為末蜜丸如大豆二歲以上服五丸三歲以上服十丸十歲以上服二十丸暴下者服少許便瘥積下者盡一劑更合梔子丸治少小熱痢不止方梔子七枚黃柏三分黃連五分礬石四分大棗四枚炙令黑上五味為末蜜丸如小豆大服五丸日三夜二服不知稍加至十丸藜蘆丸治少小泄清痢方藜蘆二分黃連二分附子一分上三味為末蜜丸如麻子以粥飲服二丸立驗四物粱米湯治少小泄注方粱米黍米稻米各三升蠟如彈子大上四味以水五升東向灶煮粱米三沸去滓復以汁煮稻米三沸去滓復以汁煮黍米三沸去滓以蠟納汁中和之蠟消取飲之數試有驗龍骨湯治少小壯熱渴引飲下痢方龍骨甘草大黃赤石脂栝蔞根石膏寒水石桂心各二兩上八味治下篩以酒水各五合煮散二合二沸去滓量兒大小服之大黃湯治少小下痢苦熱不食傷飽不乳方大黃麥門冬甘草各一兩上三味㕮咀以水二升煮取一升二三歲兒分三四服生金牛黃湯治小兒積下不止因發癇方生金三銖一方用六銖無生金熟金亦得牛黃三銖麻黃三分黃連乾薑人參甘草各一分細辛半分上八味㕮咀以水一升六合煮取八合去滓臨服研牛黃以煮湯中嫌兒熱者用生薑代乾薑今世乏生金但用成器金亦善二三兩皆得用之澤漆茱萸湯治小兒夏月暴寒寒入胃則暴下如水四肢被寒所折則壯熱經日不除經月許變通身虛滿腹痛其脈微細服此湯一劑得效後漸安方澤漆青木香海藻各二分吳茱萸茯苓白朮桔梗芍藥當歸各五分大黃一分上十味㕮咀以水四升煮取一升半二百日至一歲兒一服二合半一歲以上至二歲一服四合枳實散治少小久痢淋瀝水穀不調形羸不堪大湯藥者宜此方枳實二兩治下篩三歲以上服方寸匕若兒小以意斟酌日三服治少小洞注下痢方蒺藜子二升搗汁溫服以瘥為度又方取木瓜汁飲之又方酸石榴燒灰為末服半錢匕日三又方搗榴汁服之又方炒倉米為末飲服又方狗頭骨燒灰水和服之又方羊骨灰鹿骨灰上二味並水和服之隨得一事即用之又方炒豉令焦水淋汁服之神驗冷則酒淋服又方五月五日百草末吹下部治小兒赤白滯下方薤白一把豉一升上二味以水三升煮取二升分三服又方柏葉麻子末各一升上二味以水五升煮三沸百日兒每服三合又方牛角䚡灰水和服三方寸匕佳又方燒蜂房灰水和服又方亂髮灰鹿角灰上二味等分三歲兒以水和服三錢匕日三治小兒赤白痢方白蘘荷根汁生地黃汁各五合上二味微火煎一沸服之又方五月五日蝦蟆灰飲服半錢匕治小兒熱痢方煮木瓜葉飲之治小兒冷痢方蓼菜搗汁量兒大小與之一方作芥菜又方搗蒜敷兩足下治小兒暴痢方小鯽魚一頭燒灰服之亦治大人又方燒鯉魚骨末服之一方作龍骨又方赤小豆末酒和塗足下日三度油和亦得治小兒蠱毒痢方藍青汁一升二合分為四服治小兒渴痢方搗冬瓜汁飲之
