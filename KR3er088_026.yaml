body:
  text: 卷二十六食治方凡五類序論第一仲景曰人體平和唯須好將養勿妄服藥藥勢偏有所助令人臟氣不平易受外患夫含氣之類未有不資食以存生而不知食之有成敗百姓日用而不知水火至近而難識余慨其如此聊因筆墨之暇撰五味損益食治篇以啓童稚庶勤而行之有如影響耳河東衛汛記曰扁鵲云人之所依者形也亂於和氣者病也理於煩毒者藥也濟命撫危者醫也安身之本必資於食救疾之速必憑於藥不知食宜者不足以存生也不明藥忌者不能以除病也是故食能排邪而安臟腑悅神爽志以資血氣若能用食平疴釋情遣疾者可謂良工長年餌老之奇法極養生之術也夫為醫者當須先洞曉病源知其所犯以食治之食療不愈然後命藥藥性剛烈猶若御兵兵之猛暴豈容妄發發用乖宜損傷處衆藥之投疾殃濫亦然高平王熙稱食不欲雜雜則或有所犯有所犯者或有所傷或當時雖無災苦積久為人作患又食啖鮭肴務令簡少魚肉果實取益人者而食之凡常飲食每令節儉若貪味多餐臨盤大飽食訖覺腹中膨脹短氣或至暴疾仍為霍亂又夏至以後迄至秋分必須慎肥膩餅臛酥油之屬此物與酒漿瓜果理極相妨夫在身所以多疾者皆因春夏取冷太過飲食不節故也又魚鱠諸腥冷之物多損於人斷之益善乳酪酥等常食之令人有筋力膽干肌體潤澤卒多食之亦令臚脹泄利漸漸自已黃帝曰五味入於口各有所走各有所病酸走筋多食酸令人癃不知何以然少俞曰酸入胃也其氣澀以收也上走兩焦兩焦之氣澀不能出入不出即流於胃中胃中和溫即下注膀胱膀胱走胞胞薄以軟得酸則縮卷約而不通水道不利故癃也陰者積一作精筋之所終聚也故酸入胃走於筋也咸走血多食鹹令人渴何也答曰鹹入胃也其氣走中焦注於諸脈脈者血之所走也與咸相得即血凝凝則胃中汁泣汁泣則胃中乾渴甲乙云凝則胃中汁注之注之則胃中竭渴則咽路焦焦故舌乾喜渴血脈者中焦之道也故鹹入胃走於血皇甫士安云腎合三焦之脈雖屬肝心而為中焦之道故鹹入而走血也辛走氣多食辛令人慍心何也答曰辛入胃也其氣走於上焦上焦者受使諸氣而榮諸陽者也姜韭之氣熏至榮衛不時受之卻溜於心下故慍慍痛也辛味與氣俱行故辛入胃而走氣與氣俱出故氣盛也苦走骨多食苦令人變嘔何也答曰苦入胃也其氣燥而湧泄五穀之氣皆不勝苦苦入下脘下脘者三焦之道皆閉則不通不通故氣變嘔也齒者骨之所終也故苦入胃而走骨入而復出齒必黧疏皇甫士安云水火相濟故骨氣通於心甘走肉多食甘令人噁心何也答曰甘入胃也甘氣弱劣不能上進於上焦而與谷俱留於胃中甘入則柔緩柔緩則蛔動蛔動則令人噁心甘氣外通於肉故甘走肉則肉多粟起而胝皇甫士安云其氣外通於皮故曰甘入走皮矣皮者肉之蓋皮雖屬肺與肉連體故甘潤肌肉並於皮也黃帝問曰谷之五味所主可得聞乎伯高對曰夫食風者則有靈而輕舉食氣者則和靜而延壽食谷者則有智而勞神食草者則愚癡而多力食肉者則勇猛而多嗔是以肝木青色宜酸心火赤色宜苦脾土黃色宜甘肺金白色宜辛腎水黑色宜咸內為五臟外主五行色配五方五臟所合法肝合筋其榮爪心合脈其榮色脾合肉其榮唇肺合皮其榮毛腎合骨其榮發五臟不可食忌法多食酸則皮槁而毛夭多食苦則筋縮而爪枯多食甘則骨痛也發落多食辛則肉胝而唇寒多食鹹則脈凝泣而色變五臟所宜食法肝病則食麻犬肉李韭心病宜食麥羊肉杏薤脾病宜食稗米牛肉棗葵肺病宜食黃黍雞肉桃蔥腎病宜食大豆黃卷豕肉栗藿素問云肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛五味動病法酸走筋筋病勿多食酸苦走骨骨病勿多食苦甘走肉肉病勿多食甘辛走氣氣病勿多食辛咸走血血病勿多食鹹五味所配方米飯甘素問云粳米甘麻酸素問云小豆酸大豆咸麥苦桃辛棗甘李酸栗咸杏苦黃黍辛葵甘韭酸藿咸薤苦蔥辛牛甘犬酸豕咸羊苦雞辛五臟病五味對治法肝苦急急食甘以緩之肝欲散急食辛以散之用酸瀉之禁當風心苦緩急食酸以收之心欲軟急食鹹以軟之用甘瀉之禁溫食厚衣脾苦濕急食苦以燥之脾欲緩急食甘以緩之用苦瀉之禁溫食飽食濕地濡衣肺苦氣上逆息者急食苦以瀉之肺欲收急食酸以收之用辛瀉之禁無寒飲食寒衣腎苦燥急食辛以潤之開腠理潤致津液通氣也腎欲堅急食苦以結之用鹹瀉之無犯焠㶼無熱衣溫食是以毒藥攻邪五穀為養五肉為益五果為助五菜為充精以食氣氣養精以榮色形以食味味養形以生力此之謂也神藏有五五五二十五種形藏有四方四時四季四肢共為五九四十五以此輔神可長生久視也精順五氣以為靈也若食氣相惡則傷精也形受味以成也若食味不調則損形也是以聖人先用食禁以存性後製藥以防命也故形不足者溫之以氣精不足者補之以味氣味溫補以存形精岐伯曰陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰味薄者為陰之陽氣厚者為陽氣薄者為陽之陰味厚則泄薄則通流氣薄則發泄厚則閉塞壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣味辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽盛則陰病陰陽調和則平安春七十二日省酸增甘以養脾氣夏七十二日省苦增辛以養肺氣秋七十二日省辛增酸以養肝氣冬七十二日省咸增苦以養心氣季月各十八日省甘增咸以養腎氣果實第二檳榔味辛溫澀無毒消穀逐水除淡澼殺三蟲去伏尸治寸白豆蔻味辛溫澀無毒溫中主心腹痛止吐嘔去口氣臭蒲桃味甘辛平無毒主筋骨濕痹益氣倍力強志令人肥健作酒常飲益人逐水利小便覆盆子味甘辛平無毒益氣輕身令發不白大棗味甘辛熱滑無毒主心腹邪氣安中養脾氣助十二經平胃氣通九竅和百藥補中益氣強志治腸澼生棗多食令人熱渴氣脹苦寒熱羸瘦者彌不可食傷人藕實味甘苦寒無毒食之令人心歡止渴去熱補中養神益氣力除百病生根寒止熱渴破留血雞頭實味甘平無毒主濕痹腰脊膝痛補中除暴疾益精氣強志意耳目聰明芰實味甘辛平無毒安中補五臟不飢輕身栗子味鹹溫無毒益氣厚腸胃補腎氣生食之良治腰腳不遂櫻桃味甘平澀調中益氣令人好顏色美志意橘柚味辛溫無毒主胸中瘕熱逆氣利水穀下氣止嘔咳除膀胱留熱停水破五淋利小便治脾不能消穀卻胸中吐逆霍亂止瀉利去寸白久服去口臭一名橘皮陳久者良梅實味酸平澀無毒下氣除熱煩滿安心去青黑痣惡疾止下利好唾口乾利筋脈多食壞人齒柿味甘寒澀無毒通鼻耳氣主火瘡金瘡止痛木瓜實味酸鹹溫澀無毒主濕痹氣霍亂大吐下後腳轉筋不止棐實味甘平澀無毒主五痔去三蟲殺蠱毒鬼疰惡毒甘蔗味甘平澀無毒下氣和中補脾氣利大腸止渴去煩解酒毒軟棗味苦冷澀無毒多食動宿病益冷氣發咳嗽芋味辛平滑無毒寬腸胃充肌膚滑中杏仁味甘苦溫冷而利有毒主咳逆上氣腸中雷鳴喉痹下氣産乳金瘡寒心奔豚驚癇心下煩熱風氣去來時行頭痛解肌消心下急殺狗毒其一核兩仁者害人去之扁鵲云杏仁不可久服令人目盲眉發落動一切宿病桃仁味苦甘辛平無毒破瘀血血閉瘕邪氣殺小蟲治咳逆上氣消心下硬除卒暴聲血破癥瘕通月水止心痛李仁味苦平無毒主僵仆躋瘀血骨痛實味苦酸微溫澀無毒除固熱調中宜心不可多食令人虛黃帝云李子不可和白蜜食蝕人五內梨味甘微酸寒澀有毒除客熱氣止心煩不可多食令人寒中金瘡産婦勿食令人萎困寒中林檎味酸苦平澀無毒止渴好唾不可多食令人百脈弱奈子味酸苦寒澀無毒耐飢益心氣不可多食令人臚脹久病人食之其病尤甚安石榴味甘酸澀無毒止咽燥渴不可多食損人肺枇杷葉味苦平無毒主啘不止下氣胡桃味甘冷滑無毒不可多食動痰飲令人噁心吐水吐食菜蔬第三枸杞葉味苦平澀無毒補虛羸益精髓瓜子味甘平寒無毒令人光澤好顏色益氣除胸滿一名白瓜子即冬瓜子也白冬瓜味甘微寒無毒除小腹水脹利小便止消渴越瓜味甘平無毒不可久食益腸胃胡瓜味甘寒有毒不可多食動寒熱多瘧病積瘀血熱凡瓜味甘寒滑無毒去渴多食令陰下癢濕生瘡發黃疸黃帝云九月勿食被霜瓜向冬發寒熱及溫病初食時即令欲吐也食竟心內作停水不能自消或為反胃凡瓜入水沉者食之得冷病終身不瘥冬葵子味甘寒無毒主五臟六腑寒熱羸瘦破五淋利小便婦人乳難血閉葉甘寒滑無毒宜脾久食利胃氣其心傷人黃帝云霜葵陳者生食之動五種流飲飲盛則吐水凡葵菜和鯉魚鮓食之害人莧菜實味甘寒澀無毒主青盲白翳明目除邪氣利大小便去寒熱殺蛔蟲一名馬莧即馬齒莧菜也治反花瘡小莧菜味甘大寒滑無毒可久食益氣力除熱不可共鱉肉食成鱉瘕蕨菜亦成鱉瘕苦菜味苦大寒滑無毒主五臟邪氣厭谷胃痹腸澼大渴熱中暴疾惡瘡薺菜味甘溫澀無毒利肝氣和中殺諸毒其子主明目目痛淚出其根主目澀痛芫菁及蘆蔔菜味苦冷澀無毒利五臟輕身益氣蕪菁子明目九蒸曝療黃疸利小便根主消風熱毒腫不可久食令人氣脹菘菜味甘溫澀無毒久食通利腸胃除胸中煩解消渴芥菜味辛溫無毒歸鼻除腎邪大破咳逆下氣利九竅明目聰耳安中其子味辛辛亦歸鼻有毒主喉痹去一切風毒腫苜蓿味苦平澀無毒安中利人四體可久食荏子味辛溫無毒主咳逆下氣溫中補髓其葉主調中去臭氣蓼實味辛溫無毒明目溫中解肌耐風寒下水氣面目浮腫卻癰疽其葉辛歸舌治大小腸邪氣利中益志黃帝云蓼食過多有毒發心痛婦人月水來不用食蓼及蒜喜為血淋帶下二月勿食蓼傷人腎扁鵲云蓼久食令人寒熱損骨髓殺丈夫陰氣少精蔥實味辛溫無毒明目補中莖白主傷寒寒熱骨肉碎痛能出汗治中風面目浮腫喉痹不通安胎殺桂其青葉歸目除肝中邪氣安中利五臟殺百藥毒根鬚主傷寒頭痛蔥中涕及生蔥汁止尿血解藜蘆及桂毒黃帝云食生蔥即啖蜜變作下利食燒蔥並啖蜜壅氣而死正月不得食生蔥令人面上起遊風樓蔥除瘴氣惡毒久食益膽氣強志其子主泄精薤味苦辛溫滑無毒主金瘡瘡敗能生肌肉除寒熱去水氣溫中散結氣利産婦病人諸瘡中風寒水腫生搗敷之鯁骨在咽不下者食之則去黃帝云薤不可共牛肉作羹食之成瘕韭亦然韭味辛酸溫澀無毒安五臟除胃中熱病人心腹有痼冷者食之必加劇其子主夢泄精尿色白根煮汁以養髮白蘘荷味辛微溫澀無毒主中蠱及瘧病搗汁服二合日二生根主諸瘡紫蘇味辛微溫無毒下氣除寒中其子尤善雞蘇味辛微溫澀無毒主吐血下氣一名水蘇胡荽子味酸平無毒消穀能復食味葉不可久食令人多忘華他云胡荽菜患胡臭人患口氣臭䘌齒人食之加劇腹內患邪氣者彌不得食食之發宿病金瘡尤忌海藻味鹹寒滑無毒主癭瘤結氣散頸下硬核痛昆布味鹹寒滑無毒下十二水腫癭瘤結氣瘻瘡破積聚茼蒿味辛平無毒安心氣養脾胃消痰飲白蒿味苦辛平無毒養五臟補中益氣長毛髮吳葵一名蜀葵味甘微寒滑無毒花定心氣葉除客熱利腸胃不可久食鈍人志性若食之被狗齧者瘡永不瘥藿味鹹寒澀無毒宜腎主大小便數去煩熱