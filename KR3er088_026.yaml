汁味甘微寒無毒補虛羸止渴入生薑蔥白止小兒吐乳補勞羊乳汁味甘微溫無毒補寒冷虛乏少血色令人熱中驢乳味酸寒無毒主大熱黃疸止渴豬乳味平無毒主小兒驚癇馬牛羊酪味甘酸微寒無毒補肺臟利大腸黃帝云食甜酪竟即食大酢者變作血瘕及尿血華他云馬牛羊酪蚰蜒入耳者灌之即出沙牛及白羊酥味甘微寒無毒除胸中客氣利大小腸治口瘡犛牛酥味甘平無毒去諸風濕痹除熱利大便去宿食醍醐味甘平無毒補虛去諸風痹百鍊乃佳甚去月蝕瘡添髓補中填骨久服增年熊肉味甘微寒無毒主風痹不仁筋急五緩若腹中有積聚寒熱羸瘦者食熊肉病永不除其脂治與肉同又去頭瘍白禿面䵟𪒟食飲嘔吐熊豬二脂不可作燈其煙氣入人目失明不能遠視羖羊角味酸苦溫微寒無毒主青盲明目殺疥蟲止寒泄心畏驚悸除百節中結氣及風傷蠱毒吐血婦人産後余痛燒之殺鬼魅闢虎狼久服安心益氣輕身勿令中濕有毒青羊膽汁冷無毒主諸瘡治青盲明目肺治嗽止渴肝補肝明目心主憂恚膈中逆氣腎補腎氣虛弱益精髓肉味苦甘大熱無毒主暖中止痛補中益氣力生脂止下利脫肛去風毒婦人産後腹中絞痛肚治胃反主虛羸小便數止虛汗凡一切羊蹄甲中有珠子白者名羊懸筋食之令人癲白羊黑頭食其腦作腸癰羊肚共飯飲常食久之成反胃作噎病羊腦豬腦男子食之損精氣少子青羊肝和小豆食之令人目少明一切生羊肝共椒食之破人五臟小兒彌忌凡六畜五臟著草自動搖及得鹽酢不變色墮地不汗又與犬犬不食者皆有毒殺人六月勿食羊肉傷人神氣沙牛髓味甘溫無毒安五臟平胃氣通十二經脈理三焦約溫骨髓補中續絶傷益氣力止泄利去消渴皆以清酒和暖服之肝明目膽可丸百藥肉主消渴止唾涎出安中益氣力養脾胃氣不可常食發宿病自死者不可食黑牯牛尿味苦辛微溫平無毒主水腫腹腳俱滿者利小便獨肝牛肉食之殺人牛肉共豬肉食之必作寸白蟲一切牛馬乳汁及酪共生魚食成魚瘕馬心主喜忘肺主寒熱莖痿肉味辛苦平冷無毒主傷中除熱下氣長筋強腰脊黃帝云白馬自死食其肉害人白馬玄頭食其腦令人癲白馬鞍下烏色徹肉裡者食之傷人五臟下利者食馬肉必加劇白馬青蹄肉不可食一切馬汗氣及毛不可入食中害人諸食馬肉心煩悶者飲以美酒則解白酒則劇五月勿食馬肉傷人神氣野馬陰莖味酸鹹溫無毒主男子陰痿縮少精肉辛平無毒主人馬癇筋脈不能自收周痹肌不仁病死者不任用驢肉味酸平無毒主風狂愁憂不樂能安心氣病死者不任用狗陰莖味酸平無毒主傷中丈夫陰痿不起腦主頭風痹下部䘌瘡瘡中息肉肉味酸鹹溫無毒宜腎安五臟補絶傷勞損犬自死不出舌者食之害人犬春月多狂若鼻赤起而燥者此欲狂其肉不任食九月勿食犬肉傷人神氣豚卵味甘溫無毒除陰莖中疼驚癇鬼氣蠱毒除寒熱奔豚五癃邪氣攣縮一名豚顛陰乾勿令敗豚肉味辛平有小毒不可久食令人遍體筋肉碎痛乏氣母豬蹄煮汁服之下乳汁甚解石藥毒腦主風眩心主驚邪憂恚虛悸氣逆婦人産後中風聚血氣驚恐腎除冷利理腎氣通膀胱肝主明目肺主凍瘡痛癢肚補中益氣止渴斷暴利虛弱腸主消渴小便數補下焦虛竭肉間脂肪主煎諸膏藥破冷結散宿血解斑蝥芫青毒豬洞腸主洞腸挺出血多者猳豬肉主狂病多日不愈凡豬肉有小毒補腎氣虛弱不可久食令人少子精發宿病弱筋骨閉血脈虛人肌肉有金瘡者食之瘡尤甚豬血主卒下血不止美酒清者和炒服之又主中風絶傷頭中風眩及諸淋露奔豚暴氣黃帝云凡豬肝肺共魚鱠食之作癰疽豬肝共鯉魚腸魚子食之傷人神豚腦損男子陽道臨房不能行事八月勿食豬肺及飴和食之至冬發疽十月勿食豬肉損人神氣鹿頭肉平主消渴多夢妄見生血治癰腫莖筋主勞損蹄肉平主腳膝骨中疼痛不能踐地骨主內虛續絶傷補骨可作酒髓味甘溫主丈夫婦人傷中脈絶筋急痛咳逆以酒和服腎主補腎氣肉味苦溫無毒補中強五臟益氣力肉生者主中風口僻不正細細銼碎以敷僻上華他云和生椒搗敷之使一人專看正則急去之不爾復牽向不僻處角主輕身益氣力強骨髓補絶傷黃帝云鹿膽白者食其肉害人白鹿肉不可和蒲白作羹食發惡瘡獐骨微溫無毒主虛損泄精肉味甘溫無毒補益五臟髓益氣力悅澤人面獐無膽所以怯弱多驚恐麋脂味辛溫無毒主癰腫惡瘡死肌寒熱風寒濕痹四肢拘攣不收風頭腫氣通腠理柔皮膚不可近男子陰令痿黃帝云生麑肉共蝦汁合食之令人心痛生麑肉共雉肉食之作痼疾虎肉味酸無毒主噁心欲嘔益氣力止多唾不可熱食壞人齒虎頭骨治風邪眼睛主驚癇也豹肉味酸溫無毒宜腎安五臟補絶傷輕身益氣久食利人貍肉溫無毒補中輕身益氣亦治諸注黃帝云正月勿食虎豹貍肉傷人神損壽兔肝主目暗肉味辛平澀無毒補中益氣止渴兔無脾所以能走蓋以屬二月建卯木位也木剋土故無脾焉馬無脾故亦能走也黃帝云兔肉和獺肝食之三日必成遁尸共白雞肝心食之令人面失色一年成疸黃共姜食變成霍亂共白雞肉食之令人血氣不行生鼠微溫無毒主踒折續筋補骨搗敷之三日一易獺肝味甘有小毒主鬼疰蠱毒卻魚鯁止久嗽皆燒作灰酒和服之獺肉味甘溫無毒主時病疫氣牛馬時行病皆煮取汁停冷服之六畜灌之狐陰莖味甘平有小毒主女子絶産陰中癢小兒陰㿗卵腫肉並五臟及腸肚味苦微寒有毒主蠱毒寒熱五臟痼冷小兒驚癇大人狂病見鬼黃帝云麝肉共鵠肉食之作癥瘕野豬青蹄不可食及獸赤足者不可食野獸自死北首伏地不可食家獸自死共鱠汁食之成疽瘡一切禽獸自死無傷處不可食丹雄雞肉味甘微溫無毒主女人崩中漏下赤白帶補虛溫中黃雌雞肉味酸鹹平無毒主傷中消渴小便數而不禁補益五臟絶傷五勞益氣力雞子黃除熱火灼爛瘡卵白汁主目熱赤痛除心下伏熱止煩滿咳逆婦人産難胞衣不出生吞之白雄雞肉味酸微寒無毒下氣去狂邪安五臟傷中消渴烏雄雞肉味甘溫無毒補中止心痛黑雌雞肉味甘平無毒除風寒濕痹五緩六急安胎黃帝云有六趾四距玄雞白頭及野鳥死不伸足爪此種食之害人雞子白共蒜食之令人短氣雞子共鱉肉蒸食之害人雞肉獺肉共食作遁尸注藥所不能治食雞子啖生蔥變成短氣雞肉犬肝腎共食害人生蔥共雞犬肉食令人穀道終身流血烏雞肉合鯉魚肉食生癰疽雞兔犬肉和食必泄利野雞肉共家雞子食之成遁尸尸鬼纏身四肢百節疼痛雉肉味酸微寒無毒補中益氣止泄利久食令人瘦嘴主蟻瘻白鵝脂主耳卒聾消以灌耳毛主射工水毒肉味辛平利五臟鶩肪味甘平無毒主風虛寒熱肉補虛乏除客熱利臟腑及水道鴛鴦肉味苦微溫無毒主瘻瘡清酒浸之炙令熱以敷上亦炙服之又治夢思慕者雁肪味甘平無毒主風攣拘急偏枯血氣不通利石蜜味甘平微寒無毒主心腹邪氣驚癇痙安五臟治諸不足益氣補中止腹痛解諸藥毒除衆病和百藥養脾氣消心煩食飲不下去肌中疼痛治口瘡聰明耳目蜜蠟味甘微溫無毒主下利膿血補中續絶傷除金瘡益氣力不飢白蠟止久泄澼瘥後重見血者補絶傷利小兒鮧魚味甘無毒主百病鰻鱺魚味甘大溫有毒主五痔瘻殺諸蟲鱔魚肉味甘大溫黑者無毒主補中養血治沈唇鱓魚徒河反平無毒主少氣吸吸足不能立地烏賊魚骨味鹹微溫無毒主女子漏下赤白經汁血閉陰蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍丈夫陰中痛而腫令人有子肉味酸平無毒益氣強志鯉魚肉味甘平無毒主咳逆上氣疸黃止渴黃帝云食桂竟食鯉魚肉害人腹中宿癥瘕病者食鯉魚肉害人鯽魚味甘平無毒主一切瘡燒作灰和醬汁敷之日二又去腸癰凡魚赤鱗者不可食魚無腮不可食鱉肉味甘平無毒主傷中益氣補不足療腳氣鱉腹下成王字不可食鱉肉和芥子醬食之損人鱉三足食之害人鱉肉共莧蕨菜食之作鱉瘕蟹黃生者解結散血愈漆瘡養筋益氣黃帝云蟹目相向足斑者食之害人十二月勿食蟹鱉損人神氣
