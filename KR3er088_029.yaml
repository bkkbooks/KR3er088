body:
  text: 卷二十九針灸上凡七類明堂三人圖第一仰人十四門伏人十門側人六門夫病源所起本於臟腑臟腑之脈並出手足循環腹背無所不至往來出沒難以測量將欲指取其穴非圖莫可預備之要非灸不精故經曰湯藥攻其內針灸攻其外則病無所逃矣方知針灸之功過半於湯藥矣然去聖久遠學徒矇昧孔穴出入莫測經源濟弱扶危臨事多惑余慨其不逮聊因暇隙鳩集今古名醫明堂以述針灸經一篇用補私闕庶依圖知穴按經識分則孔穴親疏居然可見矣舊明堂圖年代久遠傳寫錯誤不足指南今一依甄權等新撰為定云爾若依明堂正經人是七尺六寸四分之身今半之為圖人身長三尺八寸二分其孔穴相去亦皆半之以五分為寸其尺用夏家古尺司馬六尺為步即江淮吳越所用八寸小尺是也其十二經脈五色作之奇經八脈以緑色為之三人孔穴共六百五十穴圖之於後亦睹之便令瞭然仰人二百八十二穴背人一百九十四穴側人一百七十四穴穴名共三百四十九單穴四十八名雙穴三百一名仰人明堂圖四門一百五十七穴內三十二穴單一百二十五穴雙仰人頭面三十六穴遠近法第一頭部中行上星在顱上直鼻中央入髮際一寸陷容豆囟會在上星後一寸陷者中前頂在囟會後一寸半骨陷中百會在前頂後一寸半頂心中頭第二行五處在頭上去上星旁一寸半承光在五處後一寸不灸一本言一寸半頭第三行臨泣在目上眥直上入髮際五分陷者中目窗在臨泣後一寸正營在目窗後一寸正面部中行神庭在髮際直鼻不刺素髎在鼻柱端水溝在鼻下人中兌端在唇上端齦交在唇內齒上齦縫承漿在頤前下唇之下廉泉在頷下結喉上舌本面部第二行曲差挾神庭旁一寸半在髮際攢竹在眉頭陷中精明在目內眥外巨髎挾鼻旁八分直瞳子迎香在禾髎上一寸鼻孔旁禾髎在鼻孔下挾水溝旁五分面部第三行陽白在眉上一寸直瞳子承泣在目下七分直瞳子不灸四白在目下一寸地倉挾口旁四分大迎在曲頷前一寸二分骨陷中動脈面部第四行本神挾曲差旁一寸半在髮際一云直耳上入髮際四分絲竹空在眉後陷中不灸瞳子髎在目外去眥五分一名太陽一名前關面部第五行頭維在額角髮際本神旁一寸半不灸顴髎在面鼽骨下下廉陷中上關在耳前上廉起骨開口取之一名客主人下關在客主人下耳前動脈下空下廉合口有空張口則閉頰車在耳下曲頰端陷者中胸部中央直下七穴遠近法第二天突在頸結喉下五寸宛宛中璇璣在天突下一寸陷中仰而取之華蓋在璇璣下一寸陷中仰而取之紫宮在華蓋下一寸六分陷中仰而取之玉堂在紫宮下一寸六分陷中膻中在玉堂下一寸六分橫直兩乳間中庭在膻中下一寸六分陷中胸部第二行六穴遠近法第三俞府在巨骨下去璇璣旁各二寸陷者中仰而取之彧中在俞府下一寸六分陷中仰臥取之神藏在彧中下一寸六分陷中仰臥取之靈墟在神藏下一寸六分陷中仰臥取之墟或作牆神封在靈墟下一寸六分步廊在神封下一寸六分陷中仰而取之胸部第三行六穴遠近法第四氣戶在巨骨下挾俞府兩旁各二寸陷中仰而取之庫房在氣戶下一寸六分陷中仰而取之屋翳在庫房下一寸六分陷中仰而取之膺窗在屋翳下一寸六分乳中禁不灸刺乳根在乳下一寸六分陷中仰而取之胸部第四行六穴遠近法第五雲門在巨骨下挾氣戶兩旁各二寸陷中動脈應手舉臂取之中府在雲門下一寸又云一寸六分乳上三肋間動脈應手陷中周榮在中府下一寸六分陷中仰而取之胸鄉在周榮下一寸六分陷中仰而取之天溪在胸鄉下一寸六分陷中仰而取之食竇在天溪下一寸六分陷中舉臂取之腹中第一行十四穴遠近法第六鳩尾在臆前蔽骨下五分不可灸刺巨闕在鳩尾下一寸上脘在巨闕下一寸去蔽骨三寸中脘在上脘下一寸建里在中脘下一寸下脘在建里下一寸水分在下脘下一寸臍上一寸臍中禁刺陰交在臍下一寸氣海在臍下一寸半石門在臍下二寸女子不灸關元在臍下三寸中極在臍下四寸曲骨在橫骨之上中極下一寸毛際陷中腹第二行十一穴遠近法第七幽門在巨闕旁半寸陷中又心臟捲雲挾巨闕兩邊相去各一寸通谷在幽門下一寸陰都在通谷下一寸石關在陰都下一寸一名石闕商曲在石關下一寸一名高曲肓俞在商曲下一寸直臍旁各五分中注在肓俞下五分四滿在中注下一寸肺臟捲雲挾丹田氣穴在四滿下一寸婦人方上捲雲在關元左邊二寸是右邊二寸名子戶大赫在氣穴下一寸腎臟捲雲在屈骨端三寸橫骨在大赫下一寸腎臟捲雲名屈骨在陰上橫骨中央宛曲和卻月中央是腹第三行十二穴遠近法第八不容在幽門旁各一寸五分去任脈二寸直四肋端相去四寸承滿在不容下一寸梁門在承滿下一寸關門在梁門下一寸太一上太一在關門下一寸滑肉門在太一下一寸天樞一名長溪去肓俞一寸半直臍旁二寸脾臟捲雲名長谷挾臍相去五寸一名循際外陵在天樞下半寸大巨上大巨在臍下一寸兩旁各二寸長溪下二寸水道在大巨下三寸歸來在水道下二寸外臺作三寸氣衝在歸來下鼠鼷上一寸腹第四行七穴遠近法第九期門在第二肋端不容旁各一寸半上直兩乳日月在期門下五分腹哀在日月下一寸半大橫在腹哀下二寸直臍旁甲乙云三寸腹結在大橫下一寸三分府舍在腹結下三寸衝門上去大橫五寸在府舍下橫骨兩端約中手太陰肺經十穴第十少商在手大指端內側去爪甲角如韭葉魚際在手大指本節後內側散脈中大泉在手掌後陷者中此即太淵也避唐祖名當時改正今存此名不改恐後人將為別是一穴經渠在寸口陷者中不可灸列缺在腕上一寸半手太陰絡別走陽明孔最在脘上七寸手太陰郤也尺澤在肘中約上動脈俠白在天府下去肘五寸動脈天府在腋下三寸不灸臑會在臂前廉去肩頭三寸甲乙經云此穴在肩部外臺屬大腸銅人經屬三焦手厥陰心主經八穴第十一中衝在手中指端去爪甲如韭葉陷者中勞宮在掌中央動脈大陵在掌後兩骨間內關在掌後去腕二寸外臺作五寸手心主絡別走少陽間使在掌後三寸兩筋間郤門在掌後去腕五寸外臺云去內關五寸手厥陰郤也曲澤在肘內廉下陷者中屈肘得之天泉在腋下二寸舉腋取之手少陰心經八穴第十二少衝在手小指內廉之端去爪甲如韭葉少府在手小指大節後陷者中直勞宮大節一作本節神門在掌後鋭骨端陷者中陰郤在掌後動脈中去腕半寸手少陰郤也通里在腕後一寸手少陰絡別走太陽靈道在掌後一寸半少海在肘內廉節後陷中極泉在腋下筋間動脈入骨足太陰脾經十一穴第十三隱白在足大趾端內側去爪甲如韭葉大都在足大趾內本節後陷中肝臟捲雲在足大趾本節內側白肉際太白在足大趾內側核骨下陷中公孫在足大趾本節後一寸足太陰絡別走陽明商丘在足內踝下微前陷中三陰交在內踝上八寸骨下陷中漏谷在內踝上六寸骨下陷中太陰絡銅人經云亦名太陰絡地機一名脾舍在膝下五寸足太陰郤也陰陵泉在膝下內側輔骨下陷者中伸足得之血海在膝臏上內廉白肉際二寸半一作三寸箕門在魚腹上筋間動應手陰市內足陽明胃經十五穴第十四歷兌在足大趾次趾之端去爪甲角如韭葉內庭在足大趾次趾外間陷谷在足大趾次趾外間本節後去內庭二寸衝陽在足跗上五寸骨間去陷谷三寸一云二寸解溪在衝陽後一寸半豐隆在外踝上八寸足陽明絡別走太陰下廉一名下巨虛在上廉下三寸條口在下廉上一寸三里在膝下三寸胻骨外巨虛上廉在三里下三寸犢鼻在膝臏下骭上挾解大筋中陰市一名陰鼎在膝上三寸伏兔下伏兔在膝上六寸不灸髀關在膝上伏兔後交分中梁丘在膝上二寸兩筋間或云三寸足陽明郤也伏人明堂圖十門一百五穴內十六穴單八十九穴雙伏人頭上第一行五穴遠近法第一後頂在百會後一寸半強間在後頂後一寸半腦戶在枕骨上強間後一寸半不灸風府在項後入髮際一寸大筋內宛宛中不灸喑門在項後髮際宛宛中不灸頭上第二行三穴遠近法第二玉枕在絡卻後七分半挾腦戶旁一寸三分起肉枕骨上入髮際三寸絡卻在通天後一寸半天柱挾項後髮際大筋外廉陷者中頭上第三行三穴遠近法第三風池在顳顬後髮際陷中承靈在正營後一寸半腦空在承靈後一寸半挾玉枕旁枕骨下陷中一名顳顬伏人耳後六穴遠近法第四顱息在耳後青脈間瘛脈在耳本雞足青脈不灸完骨在耳後入髮際四分竅陰在完骨上枕骨下浮白在耳後入髮際一寸翳風在耳後陷中按之引耳中脊中第一行十一穴遠近法第五大椎在第一椎上陷中陶道在大椎下節間身柱在第三椎下節間神道在第五椎下節間至陽在第七椎下節間筋縮在第九椎下筋間脊中在第十一椎下節間不灸懸樞在第十三椎下節間命門在第十四椎下節間腰俞在第二十一椎下節間長強在脊骶端脊中第二行二十一穴遠近法第六大杼在項後第一椎下兩旁各一寸半陷中風門一名熱府在第二椎下兩旁各一寸半肺俞在第三椎下兩旁各一寸半對乳引繩度之心俞在第五椎下兩旁各一寸半膈俞在第七椎下兩旁各一寸半肝俞在第九椎下兩旁各一寸半一云在椎節中膽俞在第十椎下兩旁各一寸半脾俞在第十一椎下兩旁各一寸半脾俞無定所隨四季月應病即灸藏輸是脾穴胃俞在第十二椎下兩旁各一寸半三焦俞在第十三椎下兩旁各一寸半腎俞在第十四椎下兩旁各一寸半大腸俞在第十六椎下兩旁各一寸半小腸俞在第十八椎下兩旁各一寸半膀胱俞在第十九椎下兩旁各一寸半中膂俞在第二十椎下兩旁各一寸半白環俞在第二十一椎下兩旁各一寸半上髎在第一空腰髁下一寸挾脊兩旁次髎在第二空挾脊陷中中髎在第三空挾脊陷中下髎在第四空挾脊陷中會陽在陰尾骨兩旁脊中第三行十三穴遠近法第七附分在第二椎下附項內廉兩旁各三寸魄戶在第三椎下兩旁各三寸神堂在第五椎下兩旁各三寸譩嘻在肩膊內廉挾第六椎下兩旁各三寸膈關在第七椎下兩旁各三寸魂門在第九椎下兩旁各三寸外臺作十椎下陽綱在第十椎下兩旁各三寸外臺作十一椎意舍在第十一椎下兩旁各三寸外臺作九椎下胃倉在第十二椎下兩旁各三寸肓門在第十三椎下兩旁各三寸志室在第十四椎下兩旁各三寸胞肓在第十九椎下兩旁各三寸秩邊在第二十一椎下兩旁各三寸手少陽三焦經十七穴遠近法第八關衝在手小指次指之端去爪甲角如韭葉液門在手小指次指間陷者中中渚在小指次指本節後間陷者中陽池在手表腕上陷者中外關在腕後二寸陷中手少陽絡別走心主支溝在腕後三寸兩骨間陷者中會宗在腕後三寸空中手少陽郤也三陽絡在臂上大交脈支溝上一寸不刺四瀆在肘前五寸外廉陷者中天井在肘後外大骨後一寸兩筋間陷者中屈肘得之清冷泉在肘上三寸伸肘舉臂取之泉一作淵消濼在肩下臂外開腋斜肘分下行天宗在秉風后大骨下陷者中外臺屬小腸經臑俞挾肩髎後大骨下胛上廉陷下肩外俞在肩胛上廉去脊三寸陷者中肩中俞在肩胛內廉去脊二寸陷者中曲垣在肩中央曲胛陷者中按之應手痛手太陽小腸經九穴遠近法第九少澤在手小指端外側去爪甲一分陷中前谷在手小指外側本節前陷中後溪在手小指外側本節後陷中腕骨在手外側腕前起骨下陷中陽谷在手外側腕中鋭