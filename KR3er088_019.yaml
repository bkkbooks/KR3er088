上八味治下篩為粗散一服三方寸匕酒一升煮五六沸去滓頓服日再治腰疼不得立方甘遂桂心一作附子杜仲人參各二兩上四味治下篩以方寸匕納羊腎中炙令熟服之治腰痛方萆薢杜仲枸杞根各一斤上三味㕮咀好酒三斗漬之納罌中密封頭於銅器中煮一日服之無節度取醉杜仲丸補之之方杜仲二兩石斛二分乾薑乾地黃各三分上四味為末蜜丸如梧子大酒服二十丸日再丹參丸治腰痛並冷痹方凡參杜仲牛膝續斷各三兩桂心乾薑各二兩上六味為末蜜丸如梧子大每服二十丸日再夜一禁如藥法獨活寄生湯腰背痛者皆是腎氣虛弱臥冷濕當風得之不時速治喜流入腳膝或為偏枯冷痹緩弱疼重若有腰痛攣腳重痹急宜服之方見前八卷偏風門治腰脊苦痛不遂方大豆三斗熬一斗煮一斗蒸一斗酒六斗甕一口蒸令極熟豆亦熟納甕中封口秋冬二七日於甕下作孔出取服五合日夜二三服又方地黃花為末酒服方寸匕日三又方三月三日收桃花取一斗一升井花水三斗曲六升米六斗炊之一時釀熟去糟酒服一升日三服若作食飲用河水禁如藥法神良又方鹿角去上皮取白者熬令黃為末酒服方寸匕日三特禁生魚余不禁角新者良陳者不任服角心中黃處亦不中服大神良又方羊腎為末酒服二方寸匕日三治丈夫腰腳冷不遂不能行方上醇酒三斗水三斗合著甕中溫漬腳至膝三日止冷則甕下常著灰火勿使冷若手足煩者以小便三升盆中溫漬手足腰䐴痛導引法正東坐將手抱心一人於前據躡其兩膝一人後捧其頭徐牽令偃臥頭到地三臥三起止便瘥針灸法腰䐴痛宜針決膝腰勾畫中青赤路脈出血便瘥腰痛不得俯仰者令患人正立以竹柱地度至臍斷竹乃以度背脊灸竹上頭處隨年壯灸訖藏竹勿令人知腰痛灸腳跟上橫紋中白肉際十壯良又灸足巨陽七壯巨陽在外踝下又灸腰目髎七壯在尻上約左右是又灸八髎及外踝上骨約中腰卒痛灸窮骨上一寸七壯左右一寸各灸七壯補腎第八論一首方五十九首論曰補方通治五勞六極七傷虛損五勞五臟病六極六腑病七傷表裡受病五勞者一曰志勞二曰思勞三曰憂勞四曰心勞五曰疲勞六極者一曰氣極二曰血極三曰筋極四曰骨極五曰髓極六曰精極七傷者一曰肝傷善夢二曰心傷善忘三曰脾傷善飲四曰肺傷善痿五曰腎傷善唾六曰骨傷善飢七曰脈傷善嗽凡遠思強慮傷人憂恚悲哀傷人喜樂過度傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒暄失節傷人故曰五勞六極七傷也論傷甚衆且言其略後方悉主之建中湯治五勞七傷小腹急痛膀胱虛滿手足逆冷食飲苦吐酸痰嘔逆泄下少氣目眩耳襲口焦小便自利方膠飴八兩黃耆乾薑當歸各三兩人參半夏橘皮芍藥甘草各二兩附子一兩大棗十五枚上十一味㕮咀以水一斗煮取三升半去滓下膠飴煬沸分四服深師有桂心六兩生薑一斤無橘皮乾薑又方治虛損少氣腹脹內急拘引小腹至冷不得屈伸不能飲食寒熱頭疼手足逆冷大小便難或復下痢口乾夢中泄精或時吐逆恍惚面色枯瘁又復微腫百節疼酸方附子厚朴各一兩人參甘草桂心當歸茯苓各二兩麥冬黃耆龍骨各三兩白芍四兩生薑六兩飴糖八兩生地一斤大棗三十枚上十五味㕮咀以水一斗二升煮取四升去滓納飴糖每服八合日三夜一咳者加生薑一倍又方治五勞七傷小腹急臍下膨脝兩脅脹滿腰脊相引鼻口乾燥目暗䀮䀮憒憒不樂胸中氣急逆不下食飲莖中策策痛小便黃赤尿有餘瀝夢與鬼神交通去精驚恐虛乏方飴糖八兩黃耆遠志當歸翼方無澤瀉各三兩芍藥甘草人參龍骨各二兩生薑半斤大棗二十枚上十一味㕮咀以水一斗煮取二升半去滓納飴糖令煬一服八合消息又一服深師無飴糖遠志澤瀉龍骨有桂心六兩半夏一升附子一枚小建中湯治男女因積勞虛損或大病後不復常苦四肢沉滯骨肉痠疼吸吸少氣行動喘惙或小腹拘急腰背強痛心中虛悸咽乾唇燥面體少色或飲食無味陰陽廢弱悲憂慘戚多臥少起久者積年輕者百日漸至瘦削五臟氣竭則難可復振治之之方甘草一兩桂心生薑各三兩芍藥六兩膠飴一升大棗十二枚上六味㕮咀以水九升煮取三升去滓納膠飴每服一升日三服間三日復作一劑後可與諸丸散仲景云嘔家不可服肘後云加人參黃耆各二兩佳若患痰滿及溏瀉可除膠飴胡洽有半夏八兩黃耆三兩古今録驗名芍藥湯黃耆建中湯治虛勞裡急諸不足方黃耆生薑桂心各三兩甘草二兩芍藥六兩大棗十二枚飴一升上七味㕮咀以水一升煮取三升去滓納飴溫服一升日三間日再作嘔者倍加生薑腹滿者去棗加茯苓四兩佳仲景古今録驗並同深師治虛勞腹滿食少小便多者無飴有人參二兩半夏一升又治大虛不足小腹裡急勞寒拘引臍氣上衝胸短氣言語謬誤不能食吸吸氣乏悶亂必效治虛勞下焦虛冷不甚渴小便數者有人參當歸各二兩若失精加龍骨白蘞各一兩古今録驗治虛勞裡急小腹急痛氣引胸脅或心痛短氣者以乾薑代生薑加當歸四兩前胡建中湯治大勞虛羸劣寒熱嘔逆下焦虛熱小便赤痛客熱上熏頭目及骨肉疼痛口乾方前胡二兩黃耆白芍當歸茯苓桂心各二兩甘草一兩人參半夏白糖各六兩生薑八兩上十一味㕮咀以水一斗二升煮取四升去滓納糖分四服樂令建中湯治虛勞少氣心胸淡冷時驚惕心中悸動手足逆冷體常自汗五臟六腑虛損腸鳴風濕營衛不調百病補諸不足又治風裡急方黃耆人參橘皮當歸桂心細辛前胡芍藥甘草茯苓麥冬各一兩半夏二兩半生薑五兩大棗二十枚上十四味㕮咀以水二斗煮取四升每服五合日三夜一深師無橘皮細辛前胡甘草麥冬有烏頭三兩川椒二兩遠志二兩胡洽崔氏有烏頭五枚川椒一兩崔氏樂令大黃耆湯即此黃耆湯治虛勞不足四肢煩疼不欲食食即脹汗出方黃耆麥冬桂心白芍各三兩人參當歸細辛甘草五味子各一兩前胡六兩茯苓四兩半夏生薑各八兩大棗二十枚上十四味㕮咀以水一斗四升煮取三升每服八合日二服深師治虛乏四肢沉重或口乾吸吸少氣小便利諸不足無麥門冬五味子細辛前胡有桑螵蛸二十枚治丈夫虛勞風冷少損或大病後未平復而早牽勞腰背強直腳中疼弱補諸不足者無五味子細辛有遠志橘皮各二兩蜀椒一兩烏頭三枚小品治虛勞少氣小便過多者無五味子細辛人參前胡茯苓半夏有黃芩一兩地黃二兩以水九升煮取三升治虛勞胸中客氣寒冷癖痞宿食不消吐噫脅間水氣或流飲腸鳴食不生肌肉頭痛上重下輕目䀮䀮忽忽去來躁熱臥不得安小腹急小便赤餘瀝臨事不起陰下濕或小便白濁傷多者無麥門冬五味子細辛當歸前胡茯苓半夏有厚朴二兩胡洽治五臟內傷者無麥門冬五味子當歸細辛前胡茯苓名大黃耆湯延年祕録主補虛損強腎氣者無麥門冬五味子細辛前胡有防風川芎各三兩大建中湯治虛勞寒澼飲在脅下決決有聲飲已如從一邊下決決然也有頭並沖皮起引兩乳內痛裡急善夢失精氣短目䀮䀮忽忽多忘方川椒二合半夏一升生薑一斤甘草二兩人參三兩飴糖八兩上六味㕮咀以水一斗煮取三升去滓納飴溫服七合裡急拘引加芍藥桂心各三兩手足厥腰背冷加附子一枚勞者加黃耆一兩治五勞七傷虛羸不足面目黧黑手足疼痛久立腰疼起即目眩腹中懸急而有絶傷外引四肢方生薑芍藥乾地黃甘草川芎各五兩大棗三十枚上六味㕮咀以水六升漬一宿明旦復以水五升合煮取三升分三服藥入四肢百脈似醉狀是效無生薑用乾薑二兩酒漬一宿用之常行此方神妙腎瀝湯治虛勞損羸乏咳逆短氣四肢煩疼腰背相引痛耳鳴面黧黯骨間熱小便赤黃心悸目眩諸虛乏方羊腎一具桂心一兩人參澤瀉五味子甘草防風川芎地骨皮黃耆當歸各二兩茯苓元參芍藥生薑各四兩磁石五兩上十六味㕮咀以水一斗五升先煮腎取一斗去腎入藥煎取三升分三服可常服之廣濟治虛勞百病無人參甘草川芎當歸芍藥元參生薑有蓯蓉三兩牛膝五加皮各二兩胡洽治大虛傷損夢寤驚悸上氣肩息腎中風濕小腹裡急引腰脊四肢常苦寒冷大小便澀利無常或赤或白足微腫或昏僻善忘者無澤瀉防風黃耆元參磁石骨皮有黃芩一兩麥冬地黃遠志各三兩大棗二十枚崔氏治腎臟虛勞所傷補益者無川芎元參骨皮磁石有黃芩遠志各二兩乾地黃三兩麥冬四兩大棗二十枚治五勞六極八風十二痹補諸不足者無澤瀉甘草防風芍藥元參骨皮生薑五味子有附子丹皮各一兩地黃一兩半牡荊子菖蒲桑螵蛸各二兩近效方除風下氣強腰腳明耳目除痰飲理營衛永不染時疾諸風者無當歸芍藥磁石有獨活牛膝各一兩半麥冬二兩丹參五兩為煮散分作二十四帖每帖入生薑一分杏仁十四枚水三升煮取一升又方羖羊腎一具切去脂以水一斗六升煮取一斗三升大棗二十枚桑皮六兩五味子黃耆蓯蓉巴戟天防風秦艽澤瀉人參桂心山藥丹參遠志茯苓細辛牛膝各三兩石斛生薑各五兩杜仲磁石各八兩上二十二味㕮咀納腎汁中煮取三升分三服相去如人行五里再服增損腎瀝湯治大虛不足小便數噓吸焦燆引飲膀胱滿急每年三伏中常服三劑於方中商量用之羊腎一具麥冬骨皮人參石斛栝蔞根乾地黃澤瀉桑皮一作桑寄生五味子遠志生薑甘草當歸桂心茯苓各二兩大棗三十枚上十七味㕮咀以水一斗五升先煮腎取一斗二升去腎納藥煮取三升去滓分三服小品無石斛栝蔞骨皮桑皮茯苓有川芎川連龍骨各二兩螵蛸二十枚又治腎氣不足消渴引飲小便過多腰背疼痛者無石斛栝蔞桑皮骨皮甘草有川芎二兩黃芩芍藥各一兩桑螵蛸二十枚雞胵皮一兩崔氏治臟損虛勞李子豫增損者無石斛栝蔞骨皮桑皮有黃耆黃芩芍藥防風各二兩治左脅氣衝膈上滿頭上有風如蟲行手中頑痹鼻塞腳轉筋不能伸縮兩目時腫痛方豬腎一具防風川芎橘皮澤瀉桂心石斛各一兩半夏茯苓丹參通草生薑各二兩乾地黃三兩上十三味㕮咀以水一斗半煮腎減三升去腎下藥煮取二升七合去滓分三服五補湯治五臟虛竭短氣咳逆傷損悒鬱不足下氣通津液方五味子桂心人參甘草各一兩麥冬小麥各一升生薑八兩粳米三合薤白枸杞根白皮各一升上十味㕮咀以水一斗二升煮取三升每服一升日三口燥先煮竹葉一把水減一升去葉納諸藥煮之翼方無生薑凝唾湯治虛損短氣咽喉凝唾不出如膠塞喉方麥冬五兩人參茯苓各半兩前胡三兩芍藥甘草地黃桂心各一兩大棗三十枚上九味㕮咀以水九升煮取三升分溫三服補湯方車前子三兩防風桂心各二兩巴戟丹參鹿茸地黃枸杞根皮五加皮各五兩上九味㕮咀以水八升煮取三升去滓分三服人參湯治男子五勞七傷胸中逆滿害食乏氣嘔逆兩脅下脹小腹急痛宛轉欲死調中平臟理絶傷方人參當歸白芍甘草桂心麥冬白糖生薑各二兩前胡橘皮川椒茯苓五味子各一兩枳實三兩大棗十五枚上十五味㕮咀以東流水一斗五升漬藥半日用三年陳蘆梢煎取四升納糖復煎數沸服一升二十以下六十以上者服七八合雖年盛而久羸者亦服七八合日三夜一不爾藥力不接則不能救病要用勞水陳蘆不則水強火盛猛則藥力不出也貞觀初有人患羸瘦殆死余處此方一劑即瘥如湯沃雪所以記録之內補散治男子五勞六絶其心傷者令人善驚妄怒無常其脾傷者令人腹滿喜噫食竟欲臥面目萎黃其肺傷者令人少精腰背痛四肢厥逆其肝傷者令人少血面黑其腎傷者有積聚小腹腰背滿痹咳唾小便難六絶之為病皆起於大勞脈虛外受風邪內受寒熱令人手足疼痛膝以下冷腹中雷鳴時時泄痢或閉或利面目腫心下憒憒不欲語憎聞人聲方地黃菟絲子山萸肉地麥各五兩遠志巴戟天各半兩麥冬五味子甘草人參蓯蓉石斛茯苓桂心附子各一兩半上十五味治下篩酒服方寸匕日三加至三匕石斛散治大風四肢不收不能自反覆兩肩疼痛身重脛急筋腫不能行時寒時熱足腨如刀刺身不能自任此皆得之飲酒中大風露臥濕地寒從下入腰以下冷不足無氣子精虛脈寒陰下濕莖消令人不樂恍惚時悲此方除風輕身益氣明目強陰令人有子補不足方石斛十分牛膝二分杜仲附子各四分柏子仁松脂石龍芮雲母粉芍藥山萸肉菟絲子萆薢澤瀉防風細辛桂心各三分上十六味治下篩酒服方寸匕日二陰不起倍菟絲子杜仲腹中痛倍芍藥膝中痛倍牛膝背痛倍萆薢腰中風倍防風少氣倍柏子仁蹶不能行倍澤瀉隨病所在倍三分亦可棗膏為丸如梧子酒服七丸腎瀝散治虛勞百病方羖羊腎一具陰乾茯苓一兩半五味子巴戟萸肉石龍芮桂心牛膝甘草防風乾薑細辛各一兩地黃二兩人參鍾乳粉菟絲子石斛丹參肉蓯蓉附子各五分上二十味治下篩合鍾乳粉和攪更篩令勻平旦以清酒服方寸匕稍加至二匕日再又方治男子五勞七傷八風十二痹無有冬夏悲憂憔悴凡是病皆須服之方羊腎一具陰乾厚朴茯苓五味子巴戟桂心石龍芮山萸肉細辛人參石斛女萎牡荊子芍藥白蘞乾漆礬石龍膽川芎蓯蓉續斷白朮菊花川椒遠志黃耆澤瀉萆薢黃芩各一兩乾薑附子防風菖蒲牛膝各一兩半桔梗二兩半山藥秦艽各二兩上三十七味治下篩酒服方寸匕日三忌房室又方羊腎一具陰乾石龍芮續斷桔梗乾薑菖蒲山萸肉茯苓各二兩厚朴五味子巴戟天桂心細辛人參石斛女萎牡荊子芍藥白蘞龍膽川芎蓯蓉川椒白朮菊花黃耆萆薢附子天雄烏頭牛膝山藥一兩半秦艽礜石各一兩一作礬石遠志二兩半乾漆三兩上三十六味治下篩酒服方寸匕日三此比前方無澤瀉黃芩防風有烏頭天雄余俱同薯蕷散補丈夫一切病不能具述方山藥荊實一方用枸杞子續斷一方用遠志茯苓一方用茯神牛膝菟絲子巴戟杜仲各一兩蓯蓉一兩五味子山萸肉一方用防風蛇床子二分上十二味治下篩酒服方寸匕日三夜二惟禁酸蒜自外無所忌服後五夜知覺十夜力生十五夜力壯如盛年二十夜力倍若多忘加遠志茯苓體澀加柏子仁服三劑益肌肉亦可為丸服三十丸日二夜一以頭面身體暖為度其藥和平不熱調五臟久服健力不可當婦人服之面生五色補五勞方五月五日採五加莖七月七日採葉九月九日取根治下篩服方寸匕日三常服去風勞妙治五勞六極七傷虛損方蓯蓉白龍骨陽起石續斷天雄各七分五味子牡蠣蛇床子地黃天冬桑寄生白石英各二兩韭子地膚子車前子菟絲子各五合地骨皮八分上十七味治下篩酒服方寸匕日三服鍾乳散治五勞七傷虛羸無氣力傷極方鍾乳六兩無論粗細以白淨無赤黃黑為上銅鐺中可盛三兩汁並取粟粗糠二合許納鐺中煮五六沸乃納乳煮水欲減又添如故一晬時出以暖水淨淘之曝乾玉硾研不作聲止重密絹水下澄取用鹿角白者白馬莖別研硫黃別研鐵精石斛人參磁石桂心殭蠶各一兩蛇床子三兩上十味為末以棗膏和搗三千杵酒服三十丸如梧子日再慎房室及生冷醋滑雞豬魚陳敗寒食鍾乳散治傷損乏少氣力虛勞百病令人力強飲食去風冷方見十七卷肺臟門地黃散主益氣調中補絶令人嗜飲食除熱方生地黃三十斤細切曝乾又取生者三十斤搗汁漬之令相得出曝乾復如是九番曝搗末食後酒服方寸匕勿令絶三石散治風勞毒冷百治不瘥補虛方鍾乳紫石英白石英白朮桔梗防風各五分栝蔞根人參川椒乾薑附子桂心牡蠣杜仲細辛茯苓各十分上十六味治下篩酒服方寸匕日三行十數步至五十步以上服此大佳少年勿用自余補方通用老少皆宜冬日服之翼方名更生散不用紫石英川椒杜仲茯苓用赤石脂為十三味石葦丸黃帝問五勞七傷於高陽負高陽負曰一曰陰衰二曰精清三曰精少四曰陰消五曰囊下濕六曰腰一作胸脅苦痛七曰膝厥痛冷不欲行骨熱遠視淚出口乾腹中鳴時有熱小便淋瀝莖中痛或精自出有病如此所謂七傷一曰志勞二曰思勞三曰心勞四曰憂勞五曰疲勞此謂五勞黃帝曰何以治之高陽負曰石葦丸主之石葦細辛礜石遠志茯苓澤瀉菖蒲杜仲蛇床子蓯蓉桔梗牛膝天雄山萸肉柏子仁續斷山藥各二兩防風赤石脂各三兩上十九味為末取棗膏如蜜和丸如梧子酒服三十丸日三七日愈二十日百病除常服良崔氏無礜石茯苓澤瀉桔梗山藥有栝蔞根二兩半五補丸治腎氣虛損五勞七傷腰腳痠疼肢節苦痛目暗䀮䀮心中喜忘恍惚不定夜臥多夢覺則口乾食不得味心常不樂多有恚怒房室不舉心腹脹滿四體疼痹口吐酸水小腹冷氣尿有餘瀝大便不利方悉主之人服延年不老四時勿絶一年萬病除愈方杜仲巴戟各六分人參五加皮五味子天雄牛膝防風遠志石斛山藥狗脊各四分地黃蓯蓉各十二分鹿茸十五分菟絲子茯苓各五分覆盆子石龍芮各八分萆薢蛇床子石南各三分白朮三分天冬七分上二十四味為末蜜和丸如梧子酒服十丸日三有風加芎歸黃耆五加皮石南獨活天雄茯神白朮柏子仁各三分有氣加厚朴枳實橘皮各三分冷加乾薑桂心吳茱萸附子川椒細辛各三分泄精加韭子白龍骨牡蠣鹿茸各三分泄痢加赤石脂龍骨黃連烏梅肉各三分春依方服夏加地黃五分黃芩三分麥冬四分冷則去此加乾薑桂心川椒各三分若不熱不寒亦不須增損直爾服之三劑以上即覺庶事悉佳慎酸蒜膾陳臭大冷醉吐是外百無所慎稍加至三十丸不得增常以此為度無比薯蕷丸治諸虛勞百損方山藥二兩蓯蓉四兩五味子菟絲子杜仲各三兩牛膝山萸肉地黃澤瀉茯神一作茯苓巴戟赤石脂各一兩上十二味為末蜜丸如梧子食前酒服二十丸加至三十丸日再無所忌惟禁醋蒜陳臭等物服七日後令人健四肢潤澤唇口赤手足暖面有光彩消食身體安和音聲清朗是其驗也十日後長肌肉其藥通中入腦鼻必痠疼勿怪若求大肥加燉煌石膏二兩失性健忘加遠志一兩體少潤澤加柏子仁一兩古今録驗有白馬莖二兩為十六味治丈夫五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痹骨疼腰髖不遂食雖多不生肌肉或少食而脹滿體澀無光澤陽氣衰絶陰氣不行此藥能補十二經脈起陰陽通內製外安魂定魄開三焦破積聚厚腸胃消五臟邪氣除心內伏熱強筋練骨輕身明目除風去冷無所不治補益處廣常須服餌為佳七十老人服之尚有非常力況少者乎大薯蕷丸治男子女人虛損傷絶頭目眩骨節煩疼飲食減少羸瘦百病方山藥附子古今録驗作茯苓人參澤瀉各八分天冬地黃黃芩當歸各十分乾漆杏仁阿膠各二分白朮白蘞古今録驗作防風芍藥石膏前胡各三分桔梗乾薑桂心各四分大黃六分五味子十六分甘草二十分大豆卷五分古今録驗作黃耆大棗一百枚上二十四味為末蜜和棗膏搗三千杵丸如梧子酒服五丸日三漸增至十丸仲景無附子黃芩石膏乾漆五味子大黃有神麯十分川芎防風各六分茯苓五分丸如彈丸每服一丸以一百丸為劑八味腎氣丸治虛勞不足大渴欲飲水腰痛小腹拘急小便不利方地黃八兩萸肉山藥各四兩丹皮茯苓澤瀉各三兩桂心附子各二兩上八味為末蜜丸如梧子大酒服十五丸日三加至二十五丸仲景云常服去附子加五味子姚公云加五味子三兩蓯蓉四兩張文仲加五味子蓯蓉各四兩肘後方用地黃四兩澤瀉附子各一兩余各二兩腎氣丸治虛勞腎氣不足腰疼陰寒小便數囊冷濕尿有餘瀝精自出陰痿不起忽忽喜悲方地黃八分遠志防風乾薑牛膝麥冬葳蕤山藥石斛細辛骨皮甘草附子桂心茯苓山萸肉各四分蓯蓉六分鍾乳粉十分羖羊腎一具上十九味為末蜜丸如梧子酒服十五丸日三稍加至三十丸古今録驗無遠志防風乾薑葳蕤牛膝骨皮甘草鍾乳有狗脊一兩黃耆四兩人參三兩澤瀉乾薑各二兩大棗一百枚又方治男子婦人勞損虛羸傷寒冷乏力無所不治方石斛二兩紫菀牛膝白朮各五分麻仁一分人參當歸茯苓川芎大豆卷黃芩甘草各六分杏仁川椒地黃防風各四分桂心四分羊腎一具上十八味為末蜜丸如梧子酒服十丸日再漸增之一方有蓯蓉六分又方此方勝胡公腎氣丸及五石丸地黃茯苓元參各五兩澤瀉山藥山萸肉桂心芍藥各四兩附子三兩上九味為末蜜丸如梧子酒服二十丸加至三十丸以知為度翼方有丹皮四兩又方治腎氣不足羸瘦日劇吸吸少氣體重耳聾目暗百病方桂心四兩地黃一斤澤瀉薯蕷茯苓各八兩丹皮六兩半夏二兩上七味為末蜜丸如梧子酒服十丸日三服黃耆湯治五勞七傷諸虛不足腎氣虛損目視䀮䀮耳無所聞方黃耆乾薑當歸羌活一作白朮川芎甘草茯苓細辛桂心烏頭附子防風人參白芍石斛地黃蓯蓉各二兩棗膏五合羊腎一具上十九味為末以棗膏與蜜為丸如梧子大酒服十五丸日二加至三十丸一方無川芎乾薑當歸羌活為十五味古今録驗無羊腎有羌活鍾乳紫石英石硫黃赤石脂白石脂礬石各二分名五石黃耆丸又方療虛勞方黃耆鹿茸茯苓烏頭乾薑各三分地黃當歸桂心川芎各四分杞白皮菟絲子五味子柏子仁白朮各五分大棗三十枚上十五味為末蜜丸如梧子平旦酒服十丸夜十丸以知為度禁如藥法神化丸治五勞七傷氣不足陰下濕癢或生瘡小便數有餘瀝陰頭冷疼精自出小腹急繞臍痛膝重不能久立目視漠漠見風淚出脛酸精氣衰微臥不欲起手足厥冷調中利食方蓯蓉牛膝山藥各六分續斷萸肉大黃各五分遠志澤瀉天雄柏子仁菟絲人參防風栝蔞根杜仲石斛川連白朮甘草礜石當歸各一兩桂心石南乾薑蛇床子赤石脂萆薢茯苓細辛菖蒲川芎各三分上三十一味為末蜜丸如梧子酒服五丸日三加至二十丸三仁九子丸治五勞七傷補益方酸棗仁柏子仁薏苡仁菟絲子枸杞子蛇床子菴䕡子地膚子烏麻子牡荊子地黃山藥桂心各二兩蓯蓉菊花子各三兩五味子二兩上十六味為末蜜丸如梧子酒服二十丸日三夜一填骨丸治五勞七傷補五臟除萬病方人參石斛當歸杜蒙石長生石葦白朮遠志蓯蓉巴戟紫菀茯苓天雄附子乾薑蛇床子牛膝牡蠣牡丹甘草柏子仁山藥阿膠地黃五味子各二兩川椒三兩上二十六味為末蜜丸如梧子酒服三丸日三通明丸治五勞七傷六極強力行事舉重重病後骨髓未滿房室所食不消胃氣不平方麥冬三斤地黃石葦各一斤紫菀五味子蓯蓉甘草阿膠杜仲遠志茯苓天雄各半斤上十二味為末蜜丸如梧子食上飲若酒服十丸日三加至二十丸補虛益精大通丸治五勞七傷百病方地黃八兩乾薑當歸石斛蓯蓉天冬白朮甘草人參芍藥各六兩紫菀大黃黃芩各五兩防風四兩杏仁茯苓各三兩白芷一兩麻仁半兩川椒三升上十九味為末白蜜棗膏和丸如彈子空腹服一丸日三十日效赤石脂丸治五勞七傷每事不如意男子諸疾方赤石脂山萸肉各七分防風遠志栝蔞根牛膝杜仲山藥各四分菖蒲續斷天雄柏子仁蓯蓉二分石葦二分蛇床子六分上十五味為末蜜棗膏和丸如梧子大空腹服五丸日三服十日知久服不老加菟絲子四分佳鹿角丸補益方鹿角白馬莖一作鹿莖石斛山藥地黃人參菟絲子防風蛇床子各五分山萸肉杜仲赤石脂澤瀉乾薑各四分石龍芮遠志各三分五味子巴戟天牛膝各六分天雄二分蓯蓉七分上二十一味為末蜜丸如梧子酒服三十丸日二忌米醋一方無干薑五味子蓯蓉丸補虛益氣治五臟虛勞損傷陰痹陰下濕癢或生瘡莖中痛小便餘瀝四肢噓吸陽氣絶陽脈傷方蓯蓉山藥各五分蛇床子遠志各四分菟絲子六分天雄八分五味子山萸肉各七分巴戟十分上九味為末蜜丸如梧子酒服二十丸日二加至二十五丸乾地黃丸治五勞七傷六極臟腑虛弱飲食不下顏色黧黯八風所傷補虛益氣進食資顏色長陽方地黃茯苓天雄各七分蛇床子六分桂心麥冬各五分遠志蓯蓉杜仲甘草各十分五味子四分阿膠棗肉各八分上十三味為末蜜丸如梧子酒服二十丸日再加至三十丸常服彌佳治虛勞不起囊下癢汗出小便淋瀝莖中數痛尿時赤黃甚者失精劇苦溺血目視䀮䀮見風淚出莖中冷精氣衰兩膝腫不能久立起則目眩補虛方蛇床細辛天雄大黃柏子仁菟絲子杜仲茯苓防風萆薢菖蒲澤瀉各四分遠志牛膝各六分栝蔞根三分萸肉桂心蓯蓉山藥川椒石葦白朮各五分上二十二味為末蜜丸如梧子酒服十五丸日再漸加至五十丸十五日身體輕三十日聰明五十日康健復壯覆盆子丸治五勞七傷羸瘦補益令人充健方覆盆子菟絲子各十二分蓯蓉鹿茸巴戟白龍骨茯苓天雄白石英五味子續斷山藥各十分地黃八分遠志乾薑各六分蛇床子五分上十六味為末蜜丸如梧子酒服十五丸日再細細加至三十丸慎生冷陳臭張文仲無龍骨鹿茸天雄續斷白石英有石斛白朮桂心枸杞子人參柏子仁澤瀉各六分牛膝細辛各四分赤石脂甘草各八分山萸五分治五勞七傷虛羸無力傷極方菟絲子五味子各二兩蛇床子一兩上三味為末蜜丸如梧子每服十丸日三禁如常法補益方乾漆柏子仁山萸肉酸棗仁各一兩上四味為末蜜丸如梧子每服二七丸加至二十丸日二曲囊丸治風冷補虛弱亦主百病方地黃山藥牡蠣天雄蛇床子遠志杜仲鹿茸桂心五味子鹿銜草石斛車前子菟絲子蓯蓉雄雞肝未連蠶蛾等分上十七味合搗為末蜜丸如小豆大酒服三丸加至七丸日三夜一禁如常法須令常有藥氣大益人服藥十日以後少少得強崔平世治五勞七傷方鍾乳粉萆薢各一分巴戟菟絲子蓯蓉各二分乾薑三分一作乾地黃上六味為末蜜丸如梧子酒服七丸日三服訖行百步服酒三合更行三百步胸中熱定即食乾飯牛羊兔肉任為羹去肥膩余不忌明目益精長志倍力久服長生耐老方遠志茯神細辛菟絲子木蘭續斷人參菖蒲龍骨當歸川芎茯苓各五分上十二味為末蜜丸如梧子服十丸日二夜一滿三年益智磁石酒療丈夫虛勞冷骨中疼痛陽氣不足陰下疥一作痛熱方磁石石斛澤瀉防風各五兩杜仲桂心各四兩天雄桑寄生天冬黃耆各三兩石南二兩狗脊八兩上十二味㕮咀以酒四斗浸漬服三合漸加至五合日再服亦可單漬磁石服之石英煎治男女五勞七傷消枯羸瘦風虛痼冷少氣力無顏色不能動作口苦咽燥眠中不安惡夢驚懼百病方白石英碎如米以醇酒九升銅器中微火煎取三升以竹篦攪勿住手去滓澄清紫石英制同上各一斤地黃一斤白蜜三斤酥一斤桃仁三斤石斛五兩柏子仁遠志茯苓山萸肉人參麥冬桂心乾薑五味子白朮蓯蓉甘草天雄白芷細辛川芎黃耆防風山藥各二兩上二十四味治下篩納煎中如不足加酒取足為限煎令可丸丸如梧子大酒服二十丸日三稍加至四十丸為度無藥者可單服煎令人肥白充實麋角丸方取當年新角連腦頂者為上看角根有斫痕處亦堪用退角根不平者是不堪諸麋角丸方凡有一百一十方此特出衆方之外容成子羔服而羽化夫造此藥取角五具或四具三具二具一具為一劑先去尖一大寸即各長七八寸取勢截斷量把鎊得即於長流水中以竹器盛懸浸可十宿如無長流水處即於淨盆中滿注水浸每夜易換即將出削去皺皮以利鎊鎊取白處至心即止以清粟米泔浸兩宿初經一宿即干沃去舊水置新絹上曝乾淨擇去惡物粗骨皮及鎊不勻者即以無灰美酒於大白瓷器中浸經兩宿其酒及器物隨藥多少其藥及酒俱入淨釜中初武火煮一食久後即著文火微煎如蟹目沸以柳木篦長四尺闊三指者徐攪之不得住手困則易人時時更添美酒以成煎為度煎之皆須平旦下手不得經兩宿仍看屑消似稀膠即以牛乳五大升酥一斤以次漸下後藥麋角一條炙令黃為散與諸藥同制之檳榔通草秦艽人參甘草菟絲子肉蓯蓉各二兩上搗為散如不要補即不須此藥共煎又可一食時候藥似稠粥即止火少時歇熱氣即投諸藥散相和攪之相得仍待少時漸稠黏堪作丸即以新器盛貯以衆手一時丸就如梧子大若不能衆手丸就旋暖漸丸亦得之如黏手著少酥塗手其服餌之法空腹取三果漿下之如無三果漿酒下亦得初服三十丸日加一丸至五十丸為度日二服初服一百日內忌房室服經一月腹內諸疾自相驅逐有微痢勿怪漸後多泄氣能食聰耳明目補心神安臟腑填骨髓理腰腳能久立發白更黑貌老還少患氣者加枳實青木香准前各一大兩若先曾服丹石等者即以三黃丸食上壓令宣泄如飲酒食麵口乾鼻中氣粗眼澀即以蜜漿飲之即止如不止加以三黃丸使微利諸凡如此一度發動已後方使調暢服至二百日面皺自展光澤一年齒落更生強記身輕若風日行數百里二年常令人肥飽少食七十以上卻成後生三年腸作筋髓預見未明四年常飽不食自見仙人三十以下服之不輟顏一定而不變其藥修合須淨室中不得令女人孝子雞犬等見婦人服之亦佳治五臟虛勞小腹弦急脹熱方灸腎俞五十壯老少損之若虛冷可至百壯橫三間寸灸之
