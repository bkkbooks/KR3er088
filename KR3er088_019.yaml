body:
  text: 卷十九腎臟方凡八類腎臟脈論第一論一首論曰腎主精腎者生來精靈之本也為後宮內官則為女主所以天之在我者德也地之在我者氣也德流氣薄而生者也故生來謂之精精者腎之藏也耳者腎之官腎氣通於耳耳和則能聞五音矣腎在竅為耳然則腎氣上通於耳下通於陰也左腎壬右腎癸循環玄宮上出耳門候聞四遠下回玉海挾脊左右與臍相當經於上焦營於中焦衛於下焦外主骨內主膀胱腎重一斤一兩有兩枚神名䭭䭭主藏精號為精臟隨節應會故云腎藏精精舍志在氣為缺在液為唾腎氣虛則厥逆實則脹滿四肢正黑虛則使人夢見舟船溺人得其時夢伏水中若有畏怖腎氣盛則夢腰脊兩解不相屬厥氣客於腎則夢臨淵沒居水中凡腎臟象水與膀胱合為腑其經足少陰與太陽為表裡其脈沉相於秋旺於冬冬時萬物之所藏百蟲伏蟄陽氣下陷陰氣上升陽氣中出陰氣冽為霜遂不上升化為霜雪猛獸伏蟄蜾蟲匿藏其脈為沉沉為陰在裡不可發汗發汗則蜾蟲出見其霜雪陰氣在表陽氣在裡慎不可下下之者傷脾脾土弱即水氣妄行下之者如魚出水蛾入湯重客在裡慎不可熏熏之逆客其息則喘無持客熱令口爛瘡陰脈且解血散不通正陽遂厥陰不往從客熱狂入內為結胸脾氣遂弱清溲痢通冬脈如營冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病何如而反其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變赤黃腎脈來喘喘纍纍如勾按之而堅曰平冬以胃氣為本腎脈來如引葛按之益堅曰腎病腎脈來發如奪索辟辟如彈石曰腎死真腎脈至搏而絶如以指彈石辟辟然色黃黑不澤毛折乃死冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有勾曰夏病勾甚曰今病凡人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也腎藏精精舍志盛怒不止則傷志志傷則善忘其前言腰脊痛不可以俯仰屈伸毛悴色夭死於季夏足少陰氣絶則骨枯少陰者冬脈也伏行而濡滑骨髓者也故骨不濡則肉不能著骨也骨肉不相親即肉濡而卻肉濡而卻故齒長而垢發無澤發無澤者骨先死戊篤已死土勝水也腎死臟浮之堅按之亂如轉丸益下入尺中者死冬腎水旺其脈沉濡而滑曰平反得微澀而短者是肺之乘腎母之歸子為虛邪雖病易治反得弦細而長者是肝之乘腎子之乘母為實邪雖病自愈反得大而緩者是脾之乘腎土之剋水為賊邪大逆十死不治反得浮大而洪者是心之乘腎火之淩水為微邪雖病即瘥左手關後尺中陰絶者無腎脈也苦足下熱兩髀裡急精氣竭少勞倦所致刺足太陽治陽左手關後尺中陰實者腎實也若恍惚健忘目視䀮䀮耳聾悵悵善鳴刺足少陰治陰右手關後尺中陰絶者無腎脈也苦足逆冷上搶胸痛夢入水見鬼善魘寐黑色物來掩人上刺足太陽治陽右手關後尺中陰實者腎實也苦骨疼腰脊痛內寒熱刺足少陰治陰腎脈沉細而緊再至曰平三至曰離經病四至脫精五至死六至命盡足少陰脈也腎脈急甚為骨痿癲疾微急為奔豚沉厥足不收不得前後緩甚為折脊微緩為洞下洞下者食不化入咽還出大甚為陰痿微大為石水起臍下以至少腹腫垂垂然上至胃脘死不治小甚為洞泄微小為消疸滑甚為癃㿗微滑為骨痿坐不能起目無所見視見黑花澀甚為大癰微澀為不月水沉痔腎脈搏堅而長其色黃而赤當病折腰其軟而散者當病少血黑脈之至也上堅而大有積氣在少腹與陰名曰腎痹得之沐浴清水而臥扁鵲曰腎有病則耳聾腎在竅為耳然則腎氣上通於耳五臟不和則九竅不通陰陽俱盛不得相營故曰關格關格者不得盡期而死也腎在聲為呻在變動為栗在志為恐恐傷腎精氣並於腎則恐臟主冬病在臟者取之井病先發於腎少腹腰脊痛脛酸一日之膀胱背膂筋痛小便閉二日上之心心痛三日之小腸脹四日不已死冬大晨夏晏晡病在腎夜半慧日乘四季甚下晡靜假令腎病中央若食牛肉及諸土中物得之不者當以長夏時發得病以戊己日也凡腎病之狀必腹大脛腫痛喘咳身重寢汗出憎風虛即胸中痛大腹小腹痛清厥意不樂取其經足少陰太陽血者腎脈沉之而大堅浮之而大緊苦手足骨腫厥而陰不興腰脊痛少腹腫心下有水氣時脹閉時泄得之浴水中身未乾而合房內及勞倦發之腎病其色黑其氣虛弱吸吸少氣兩耳苦聾腰痛時時失精飲食減少膝以下清其脈沉滑而遲少為可治宜服內補散建中湯腎氣丸地黃煎春當刺湧泉秋刺復溜冬刺陰谷皆補之夏刺然谷季夏刺太溪皆瀉之又當灸京門五十壯背第十四椎百壯邪在腎則骨痛陰痹陰痹者撫之而不得腹脹腰痛大便難肩背頸項強痛時眩取之湧泉崑崙視有血者盡取之有所用力舉重若入房過度汗出如浴水則傷腎腎中風闕腎中寒闕腎水者其人腹大臍腫腰痛不得溺陰下濕如牛鼻頭汗其足逆寒大便反堅一云面反瘦腎脹者腹滿引背央央然腰髀一作痹並痛腎著之病其人身體重腰中冷如冰狀一作如水洗狀一作如坐水中形如水狀反不渴小便自利食飲如故是其證也病屬下焦從身勞汗出衣里冷濕故久久得之腎著之為病從腰以下冷腰重如帶五千錢診得腎積脈沉而急苦脊與腰相引痛飢則見飽則減少腹裡急口乾咽腫傷爛目䀮䀮骨中寒主髓厥善忘色黑也腎之積名曰奔豚發於少腹上至心下如豚奔走之狀上下無時久久不愈病喘逆骨痿少氣以夏丙丁日得之何也脾病傳腎腎當傳心心適以夏旺旺者不受邪腎復欲還脾脾不肯受因留結為積故知奔豚以夏得之腎病手足逆冷面赤目黃小便不禁骨節煩疼少腹結痛氣衝於心其脈當沉細而滑今反浮大其色當黑而反黃此是土之剋水為大逆十死不治羽音人者主腎聲也腎聲呻其音瑟其志恐其經足少陰厥逆太陽則營衛不通陰陽翻祚陽氣內伏陰氣外升升則寒寒則虛虛則厲風所傷語音謇吃不轉偏枯腳偏跛蹇若在左則左腎傷右則右腎傷其偏枯風體從鼻而分半邊至腳緩弱不遂口亦欹語聲混濁便利仰人耳偏聾塞腰背相引甚則不可治腎瀝湯主之方在第八卷中又呻而好恚恚而善忘恍惚有所思此為土剋水陽擊陰陰氣伏而陽氣起起則熱熱則實實則怒怒則忘耳聽無聞四肢滿急小便赤黃言音口動而不出笑而看人此為邪熱傷腎甚則不可治若面黑黃耳不應亦可治腎病為瘧者令人悽悽然腰脊痛宛轉大便難目眴眴然身掉不定手足寒恆山湯主之方在第十卷中若其人本來不吃忽然謇吃而好嗔恚反於常性此腎已傷雖未發覺已是其候見人未言而前開口笑還閉口不聲舉手柵腹一作把眼此腎病聲之候也虛實表裡浮沉清濁宜以察之逐以治之黑為腎腎合骨黑如烏羽者吉腎主耳耳是腎之餘其人水形相比於上羽黑色大頭曲面廣頤小肩大腹小手足發行搖身下尻長背延延也不敬畏善欺殆人戮死耐秋冬不耐春夏春夏感而生病主足少陰汙汙然耳大小高下厚薄偏圓則腎應之正黑色小理者則腎小小即安難傷粗理者則腎大大則虛虛則腎寒耳聾或鳴汗出腰痛不得俯仰易傷以邪耳高者則腎高高則實實則腎熱背急綴痛耳膿血出或生肉塞耳耳後陷者則腎下下則腰尻痛不可以俯仰為狐疝耳堅者則腎堅堅則腎不受病不病腰痛耳薄者則腎脆脆則傷熱熱則耳吼鬧善病消疸耳好前居牙車者則腎端正端正則和利難傷耳偏高者則腎偏欹偏欹則善腰尻偏痛凡人分部骨陷者必死不免挾膀胱並太陽為腎之部骨當其處陷也而臟氣通於內外部亦隨而應之沉濁為內浮清為外若色從外走內者病從外生部處起若色從內出外者病從內生部處陷內病前治陰後治陽外病前治陽後治陰陽主外陰主內凡人生死休否則藏神前變形於外人腎前病耳則為之焦枯若腎前死耳則為之𪒠黑焦癖若天中等分暮色應之必死不治看應增損斟酌賒促賒不出四百日內促則旬日之間腎病少愈而卒死何以知之曰黃黑色黶點如拇指應耳此必卒死腎絶四日死何以知之齒為暴黑面為正黑目中黃腰中欲折白汗出如流面黑目青一作白腎氣內傷病因留積八日當亡是死變也面黃目黑不死黑如炲死吉凶之色天中等分左右髮色不正此是陰陽官位相法若不遭官事而應死也其人面目帶黃黑連耳左右年四十以上百日死若偏在一邊最凶必死兩邊有年上無三年之內禍必至矣冬水腎脈色黑主足少陰脈也少陰何以主腎曰腎者主陰陰水也皆生於腎此脈名曰太衝凡五十七穴冬取其井滎冬者水始治腎方閉陽氣衰少陰氣堅盛太陽氣伏沉陽脈乃法故取井以下陰氣逆取滎以通素問作實陽氣其脈本在內踝下二寸應舌下兩脈其脈根於湧泉湧泉在腳心下大拇趾筋是其筋起於小趾之下入足心並太陰之筋而斜走內踝之下結於踵與太陽之筋合而上結於內輔下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與太陽之筋合其脈起於小趾之下斜趨足心出然骨之下循內踝之後別入跟中以上腨內出膕中內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中合足太陽為表裡太陽本在跟以上五寸中同會於手太陰其足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下貫腰脊主腎生病病實則膀胱熱熱則閉癃癃則陽病陽脈反逆大於寸口再倍其病則口熱舌乾咽腫上氣咽乾及痛煩心心痛黃疸腸澼脊骨內後廉痛痿厥嗜臥足下熱而痛灸則強食而生災緩帶被髮大杖重履而步虛則膀胱寒寒則腰痛痛則陰脈反小於寸口其病則飢而不欲食面黑如炭色咳唾則有血喉鳴而喘坐而欲起目䀮䀮無所見心懸若病飢狀氣不足則善恐心惕惕若人將捕之是為骨厥冬三月者主腎膀胱黑骨溫病也其源從太陽少陰相搏蘊積三焦上下壅塞陰毒內行臟腑受客邪之氣則病生矣其病相反若腑虛則為陰毒所傷裡熱外寒意欲守火而引飲或腰中痛欲折若臟實則陽溫所損胸脅切痛類如刀刺不得動轉熱彭彭若服冷藥過瘥而便洞瀉故曰黑骨溫病也扁鵲曰灸脾肝腎三俞主治丹金毒黑溫之病當依源為理調臟理腑清濁之病不生矣腎虛實第二脈八首方四首灸法一首腎實熱左手尺中神門以後脈陰實者足少陰經也病苦舌燥咽腫心煩咽乾胸脅時痛喘咳汗出小腹脹滿腰背強急體重骨熱小便赤黃好怒好忘足下熱疼四肢黑耳聾名曰腎實熱也脈經云腎實熱者病者膀胱脹閉小腹與腰脊引痛右手尺中神門以後脈陰實者足少陰經也病苦痹身熱心痛脊脅相引痛足逆熱煩名曰腎實熱也瀉腎湯治腎實熱小腹脹滿四肢正黑耳聾夢腰脊離解及伏水等氣急方芒硝茯苓黃芩各三兩生地汁菖蒲各五兩磁石八兩碎如雀頭大黃一升水密器中漬一宿元參細辛各四兩甘草二兩上十味㕮咀以水九升煮七味取二升半去滓下大黃納藥汁中更煮減二三合去大黃納生地汁微煎一二沸下芒硝分為三服治腎熱好怒好忘耳聽無聞四肢滿急腰背轉動強直方柴胡茯神外臺作茯苓黃芩澤瀉升麻杏仁大青芒硝各二兩磁石四兩羚羊角一兩地黃淡竹葉各一升上十二味㕮咀以水一斗煮取三升去滓下芒硝分為三服治腎熱小便黃赤不出出如梔子汁或如黃柏汁每欲小便莖頭即痛方榆白皮切冬葵子各一升車前草切一升滑石半斤碎子芩通草瞿麥各三兩石葦四兩上八味㕮咀以水二斗先煮車前草取一斗去滓澄清取九升下諸藥煮取三升五合去滓分四服腎膀胱俱實左手尺中神門以後脈陰陽俱實者足少陰與太陽經俱實也病苦脊強反抑戴眼氣上搶心脊痛不能自反側名曰腎與膀胱俱實也右手尺中神門以後脈陰陽俱實者足少陰與太陽俱實也病苦癲疾頭重與目相引痛厥欲走反眼大風多汗名曰腎與膀胱俱實也腎虛寒右手尺中神門以後脈陰虛者足少陰經也病苦心中悶下重足腫不可以按地名曰腎虛寒也右手尺中神門以後脈陰虛者足少陰經也病苦足脛小弱惡寒脈代絶時不至足寒上重下輕行不可按地小腹脹滿上搶胸痛引脅下名曰腎虛寒也治腎氣虛寒陰痿腰脊痛身重緩弱言音混濁陽氣頓絶方蓯蓉白朮巴戟天麥冬茯苓甘草牛膝五味子杜仲各八兩車前子乾薑各五兩生地五斤上十二味治下篩食後酒服方寸匕日三治腎風虛寒方灸腎俞百壯對臍兩邊向後挾脊相去各一寸五分腎膀胱俱虛右手尺中神門以後脈陰陽俱虛者足少陰與太陽經俱虛也病苦小便利心痛背寒時時小腹滿名曰腎膀胱俱虛也右手尺中神門以後脈陰陽俱虛者足少陰與太陽經俱虛也病苦心痛若下重不自收篡反出時時苦洞泄寒中泄腎與心俱痛名曰腎膀胱俱虛也腎勞第三論一首方五首論曰凡腎勞病者補肝氣以益之肝旺則感於腎矣人逆冬氣則足少陰不藏腎氣沉濁順之則生逆之則死順之則治逆之則亂反順為逆是為關格病則生矣梔子湯治腎勞實熱小腹脹滿小便黃赤未有餘瀝數而少莖中痛陰囊生瘡方梔子仁芍藥通草石葦各三兩石膏五兩滑石八兩子芩四兩生地榆白皮淡竹葉切各一升上十味㕮咀以水一斗煮取三升去滓分三服麻黃根粉治腎勞熱陰囊生瘡方麻黃根石硫黃各三兩米粉五合上三味治下篩安絮如常用粉法搭瘡上粉濕更搭之治腎勞熱妄怒腰脊不可俯仰屈伸煮散方丹參牛膝葛根杜仲乾地黃甘草豬苓各二兩半茯苓遠志子芩各一兩十八銖五加皮石膏各三兩羚羊角生薑橘皮各一兩淡竹茹雞子大上十六味治下篩為粗散以水三升煮兩方寸匕綿裹之時時動取八合為一服日二治虛勞陰陽失度傷筋損脈噓吸短氣漏溢瀉下小便赤黃陰下濕癢腰脊如折顏色隨落方隨一作墮萆薢麥冬生地桂心杜仲棗肉各一升上六味㕮咀以酒一斗五升漬三宿出曝乾復漬候酒盡取干治下篩食後酒服方寸匕日二治腎勞虛冷乾枯憂恚內傷久坐濕地則損腎方秦艽牛膝川芎防風桂心獨活茯苓各四兩乾薑一作乾地黃麥冬地骨皮各三兩側子杜仲各五兩石斛六兩丹參八兩五加皮十兩薏苡仁一兩大麻子二升上十七味㕮咀以酒二斗漬七日每服七合日三服精極第四論一首方十八首灸法十二首論曰凡精極者通主五臟六腑之病候也若五臟六腑衰則形體皆極眼視而無明齒焦而發落身體重則腎水生耳聾行步不正凡陽邪害五臟陰邪損六腑陽實則從陰引陽陰虛則從陽引陰若陽病者主高高則實實則熱眼視不明齒焦發脫腹中滿滿則歷節痛痛則宜瀉於內若陰病者主下下則虛虛則寒體重則腎水生耳聾行步不正邪氣入內行於五臟則咳咳則多涕唾面腫氣逆邪氣逆於六腑淫虛厥於五臟故曰精極也所以形不足溫之以氣精不足補之以味善治精者先治肌膚筋脈次治六腑若邪至五臟已半死矣扁鵲曰五陰氣俱絶不可治絶則目系轉轉則目精奪為志先死遠至一日半日非醫所及矣宜須精研以表治里以左治右以右治左以我知彼疾皆瘥矣竹葉黃芩湯治精極實熱眼視無明齒焦發落形衰體痛通身虛熱方竹葉切二升黃芩茯苓各三兩甘草麥冬大黃各二兩生薑六兩芍藥四兩生地切一升上九味㕮咀以水九升煮取三升去滓分三服治精極五臟六腑俱損傷虛熱遍身煩疼骨中㾓痛煩悶方生地汁二升麥冬汁赤蜜各一升竹瀝一合石膏八兩人參川芎桂心甘草黃芩麻黃各三兩當歸四兩上十二味㕮咀以水七升煮八味取二升去滓下地黃等汁煮取四升分四服日三夜一治五勞六極虛羸心驚尪弱多魘亡陽方茯苓四兩甘草芍藥桂心乾薑各三兩遠志人參各二兩大棗五枚上八味㕮咀以水八升煮取三升分三服治虛勞少精方鹿角為末白蜜和丸如梧子大每服七丸日三服十日大效又方漿水煮蒺藜子令熟取汁洗陰二十日大效棘刺丸治虛勞諸氣不足夢泄失精方棘刺乾薑菟絲子各二兩天冬烏頭小草防葵山藥萆薢細辛石龍芮枸杞子巴戟天葳蕤石斛厚朴牛膝桂心各一兩上十八味為末蜜丸如梧子大酒服五丸日二服深師以蜜雜雞子白各半和丸苦患風痿痹氣體不便熱煩滿少氣消渴加葳蕤天冬菟絲子身黃汗小便赤黃不利加石龍芮枸杞子關節腰背痛加萆薢牛膝寒中氣脹時泄數唾嘔吐加厚朴乾薑桂心陰囊下濕精少小便餘瀝加石斛皆以意增之古今録驗以乾地黃代乾薑以麥冬代天冬以杜仲代山藥以柏子仁代枸杞子以蓯蓉代葳蕤用治男子百病小便過多失精治夢中泄精尿後餘瀝及尿精方人參麥冬赤石脂遠志續斷鹿茸各一兩半柏子仁丹參韭子各一兩六銖茯苓龍齒磁石蓯蓉各二兩乾地黃三兩上十四味為末蜜丸如梧子大酒服二十丸日再加至三十丸治虛損小便白濁夢泄方菟絲子車前子韭子各一升礬石當歸各二兩川芎附子各三兩桂心一兩上八味為末蜜丸如梧子大酒服五丸日三又方大棗五十枚韭子五合黃耆人參甘草乾薑當歸龍骨半夏芍藥各二兩上十味為末蜜丸如梧子大酒服五丸日三服韭子丸治房室過度精泄自出不禁腰背不得屈伸食不生肌兩腳苦弱方韭子一升甘草桂心紫石