body:
  text: 卷二十八脈法凡十六類平脈大法第一論曰夫脈者醫之大業也不深究其道何以為醫者哉是以古之哲醫寤寐俯仰不與常人同域造次必於醫顛沛必於醫故能感於鬼神通於天地可以濟衆可以依憑若與常人混其波瀾則庶事墮壞使夫物類將何仰焉由是言之學者必當屏棄俗情凝心於此則和鵲之功因茲可得而致也經曰診脈之法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰可以此參伍決生死之分也又曰平脈者皆於平旦先診寸口初重指切骨定畢便漸舉指與皮毛相得於輕重之間隨人強弱肥瘦以意消息進退舉按之宜稱其浮沉諸類應於四時五行與人五臟相應輕重相薄尋狀論寒暑得失凡人稟形氣有中適有躁靜各各不同氣脈流動亦各隨其性情故一呼脈再至一吸脈再至呼吸定息之間復一至合為五至此為平和中適者也春秋日夜正等無餘分時也其餘日則其呼而脈至多吸而脈至少或吸而脈至多呼而脈至少此則不同如冬夏日夜長短之異也凡氣脈呼吸法晝夜變通效四時然於呼吸定息應五至之限無有虧僻猶晷刻與四時有長短而歲功日數無遺也若人有羸有壯其呼吸雖相壓遏而晝夜息度隨其漏刻是謂呼吸象晝夜變通效四時夫診脈當以意先自消息壓取病人呼吸以自同而後察其脈數計於定息之限五至者為平人若有盈縮尋狀論病源之所宣也問曰何為三部脈答曰寸關尺也凡人修短不同其形各異有尺寸分三關之法從肘腕中橫紋至掌魚際後紋卻而十分之而入取九分是謂尺從魚際後紋卻還度取十分之一則是寸寸十分之而入取九分之中則寸口也此處其骨自高故云陰得尺內有一寸陽得寸內九分從寸口入卻行六分為關分從關分又入六分為尺分又曰從魚際至高骨卻行一寸其中名曰寸口從寸口至尺名曰尺澤故曰尺寸寸後尺前名曰關陽出陰入以關為界如天地人為三界寸主射上焦頭及皮毛竟手上部關主射中焦腹及腰中部尺主射下焦小腹至足下部此為三部法象三才天地人頭腹足為三元也夫十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之候者何謂也然寸口者脈之大會手太陰之動脈也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於其身漏水下百刻榮衛行陽二十五度行陰亦二十五度為一周故五十度而復會於手太陰太陰者寸口也即五臟六腑之所終始故法取於寸口人有三百六十脈法三百六十日也診五臟脈輕重法第二初持脈如三菽之重與皮毛相得者肺部金秋三月庚辛之氣如六菽之重與血脈相得者心部火夏三月丙丁之氣如九菽之重與肌肉相得者脾部土旺四季季夏六月戊己之氣如十二菽之重與筋平者肝部木春三月甲乙之氣按之至骨舉之來疾者腎部水冬三月壬癸之氣心肺俱浮何以別之然浮而大散者心也象火浮散浮而短澀者肺也象金浮澀腎肝俱沉何以別之然牢而長者肝也如木生苗吐穎濡而大舉指來實者腎也濡弱如水舉重勝船脾者中州故其脈在中是陰陽之脈也千金翼云遲緩而長者脾也指下形狀第三浮脈舉之有餘按之不足浮於指下沉脈舉之不足按之有餘重按之乃得澀脈細而遲往來難且散或一止復來一曰浮而短一曰短而止或如散滑脈往來前卻流利展轉替替然與數相似一曰浮中如有力一曰漉漉如欲脫洪脈極大在指下一曰浮而大細脈小大於微常有但細耳微脈極細而軟或欲絶若有若無一曰小也一曰手下快一曰薄一曰按之如欲盡絶弦脈舉之無有按之如張弓弦狀一曰如張弓弦按之不移又曰浮緊乃為弦也緊脈數如切繩狀一曰如轉索之無常遲脈呼吸三至來去極遲一曰舉之不足按之盡牢一曰按之盡牢舉之無有數脈去來促急一曰一息脈六七至一曰數者進之名緩脈去來亦遲小快於遲一曰浮大而軟陰與陽同等弱脈極軟而沉細按之欲絶指下一曰按之乃得舉之即無動脈見於關上無頭尾大如豆厥厥動搖伏脈極重指著骨乃得一曰關上沉不出名曰伏一曰手下裁動一曰按之不足舉之無有芤脈浮大而軟按之中央空兩邊實一曰指下無兩旁有軟脈極軟而浮細一曰按之無有舉之有餘一曰細小如軟千金翼軟作濡虛脈遲大而軟按之不足隱指豁豁然空實脈大而長微強按之隱指愊愊然一曰沉浮皆得促脈來去數時一至結脈往來緩時一止復來脈結者生代脈來數中止不能自還因而復動脈代者死散脈大而散散者氣實血虛有表無里革脈有似沉伏實大而長微弦千金翼以革為牢弦與緊相類軟與弱相類浮與芤相類又曰浮與洪相類微與澀相類沉與伏相類緩與遲相類又曰軟與遲相類革與實相類翼作牢與實相類滑與數相類五臟脈所屬第四心部在左手關前寸口亦名人迎肝部在左手關上腎部在左手關後尺中肺部在右手關前寸口亦名氣口脾部在右手關上腎部在右手關後尺中脈法贊云心肝出左脾肺出右腎與命門俱出尺部魂魄穀神皆見寸口左主司官右主司府左大順男右大順女關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈諸經損減各隨其部三陰三陽一云按察陰陽誰先誰後陰病治官陽病治府府外也奇邪所舍如何捕取審而知之針入病愈脈有三部陰陽相乘榮衛氣血而行人躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尸寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為縷陳令得分明師曰子之所問道之根源脈有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝弦此自常經不失銖分出入升降漏刻周旋水下二刻脈一周身旋覆寸口虛實見焉變化相乘陰陽相干風則浮虛寒則緊弦沉潛水蓄支飲急弦動弦為痛數洪熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見終必有姦審察表裡三焦別分知邪所舍消息診看料度腑臟獨見若神分別病形狀第五脈數在腑脈遲在臟脈長而弦病在肝脈經作出於肝脈小血少病在心扁鵲云脈大而洪出於心脈下堅上虛病在脾胃脈滑一作澀而微浮病在肺脈大而堅扁鵲云小而緊病在腎脈滑者多血少氣脈澀者少血多氣脈大者血氣俱多又云脈來大而堅者血氣俱實脈小者血氣俱少又云脈來細而微者血氣俱虛脈沉細滑疾者熱脈遲緊為寒脈經云洪數滑疾為熱澀遲沉細為寒脈盛滑緊者病在外熱脈小實而緊者病在內冷脈小弱而澀謂之久病脈浮滑而疾謂之新病脈浮滑其人外熱風走刺有飲難治脈沉而緊上焦有熱下寒得冷即便下脈沉而細下焦有寒小便數時苦絞痛下利重脈浮緊且滑直者外熱內冷不得大小便脈洪大緊急病速進在外苦頭髮熱癰腫脈細小緊急病速進在中寒為疝瘕積聚腹中刺痛脈沉重而直前絶者病血在腸間脈沉重而中散者因寒食成癥脈直前而中散絶者病消渴又云病浸淫瘡脈沉重前不至寸口徘徊絶者病在肌肉遁尸脈左轉而沉重者氣微陽在胸中脈右轉出不至寸口者內有肉癥脈纍纍如貫珠不前有風寒在大腸伏留不去脈纍纍如止不至寸口軟者結熱在小腸膜中伏留不去脈直前左右彈者病在血脈中衃血也脈後而左右彈者病在筋骨中也脈前大後小頭痛目眩脈前小後大胸滿短氣上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無所苦夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細太素作滑則氣少澀則心痛渾渾革革至如湧泉病進而危弊弊綽綽其去如弦絶者死短而急者病在上長而緩者病在下沉而弦急者病在內浮而洪大者病在外脈實者病在內脈虛者病在外在上為表在下為里浮為在表沉為在裡滑為實為下又為陽氣衰數為虛為熱浮為風為虛動為痛為驚沉為水為實又為鬼疰弱為虛為悸遲則為寒澀則少血緩則為虛洪則為氣一作熱緊則為寒弦數為瘧瘧脈自弦弦數多熱弦遲多寒微則為虛代散則死弦為痛痹一作浮為風疰偏弦為飲雙弦則脅下拘急而痛其人澀澀惡寒脈大寒熱在中脈伏者霍亂安臥脈盛謂之脫血凡亡汗肺中寒飲冷水咳嗽下利胃中虛冷此等其脈並緊浮而大者為風又為中風頭重鼻寒浮而緩者皮膚不仁風寒入肌肉滑而浮散者癱瘓風滑為鬼疰澀而緊痹病浮洪大長者風眩癲疾大堅疾者癲病弦而鉤脅下如刀刺狀如蜚尸至困不死緊而急者遁尸洪大者傷寒熱病浮洪大者傷寒秋吉春成病浮而滑者宿食浮滑而疾者食不消脾不磨短疾而滑酒病浮而細滑傷飲遲而澀中寒有癥結快而緊積聚有擊痛弦急疝瘕小腹痛又為癖病一作痹病遲而滑者脹盛而緊者脹弦小者寒澼沉而弦者懸飲內痛弦數有寒飲冬夏難治緊而滑者吐逆小弱而澀胃反遲而緩者有寒微而緊者有寒沉而遲者腹臟有冷病微弱者有寒少氣實緊胃中有寒若不能食時時利者難治一作時時嘔稽難治滑數心下結熱盛滑疾胃中有熱緩而滑曰熱中沉而急病傷暑暴發虛熱浮而絶者氣病大而滑者短氣浮短者其人肺傷諸氣微少不過一年死法當咳嗽沉而數中水冬不治自愈短而數心痛心煩弦而緊脅痛臟傷有瘀血一作有寒血沉而滑為下重亦為膂痛脈細而滑按之虛因急持直者僵仆從高墮下病在內微浮者秋吉冬成病微數雖甚不成病不可勞浮滑疾緊者以合百病久易愈陽邪來見浮洪陰邪來見沉細水穀來見堅實脈來乍大乍小乍長乍短者為祟脈來洪大嫋嫋者祟脈來沉沉澤澤四肢不仁而重者土祟脈與肌肉相得久持之至者可下之弦小緊者可下之緊而數發寒熱必下乃愈弦遲者宜溫藥緊數者可發其汗三關主對法第六諸浮諸沉諸弦諸緊諸澀諸滑若在寸口膈以上病頭部若在關上胃以下病腹部若在尺中腎以下病腰腳部平寸口脈主對法手寸口脈滑而遲不沉不浮不長不短為無病左右同法寸口太過與不及寸口之脈中手短者曰頭痛中手長者曰足脛痛中手促上擊者曰肩背痛寸口脈沉而堅者病在中寸口脈浮而盛者曰病在外寸口脈沉而弱者曰寒熱及疝瘕小腹痛熱一作氣又作中寸口脈沉而弱發必墮落寸口脈沉而緊苦心下有寒時時痛有積邪寸口脈沉而滑者胸中有水氣面目腫有微熱為風水寸口脈沉大而滑沉即為血實滑即為氣實血氣相搏入臟即死入腑即愈寸口脈沉胸中短氣寸口脈沉而喘者寒熱寸口脈浮而滑者頭中痛寸口脈浮大按之反澀尺中亦微而澀故知有滯氣宿食寸口脈弦而緊弦即衛氣不行衛氣不行即惡寒水流走腸間寸口脈緊或浮膈上有寒肺下有水氣脈緊上寸口者中風風頭痛亦如之翼云亦為傷寒頭痛脈弦上寸口者宿食降者頭痛寸口脈弦大婦人半産漏下男子亡血失精寸口脈微而弱微則惡寒弱則發熱當發不發骨節疼煩當煩不煩與極汗出寸口脈微而弱氣血俱虛男子吐血婦人下血嘔汁出寸口脈動而弱動即為驚弱即為悸寸口脈緩而遲緩即為虛遲即為寒虛寒相搏則欲溫食食冷即咽痛寸口脈遲而緩遲則為寒緩即為氣寒氣相搏則絞而痛寸口脈遲而澀遲即為寒澀為少血脈來過寸入魚際者遺尿脈出魚際逆氣喘息寸口脈實者心勞寸口脈潎潎如羹上肥陽氣微連連如蜘蛛絲陰氣衰兩手前部陽絶者苦心下寒毒喙中熱寸口脈偏絶則臂僻不遂兩手俱絶者不可治寸口脈來暫大暫小者陰絡也苦陰風痹應時自發身洗洗也寸口脈來暫小暫大者陽絡也苦皮膚病汗出惡寒下部不仁寸口脈浮中風發熱頭痛宜服桂枝湯葛根湯針風池風府向火炙身摩治風膏覆令汗出寸口脈緊苦頭痛是傷寒宜服麻黃湯發汗針眉沖顳顬摩傷寒膏寸口脈微苦寒為衄宜服五味子湯麻黃茱萸膏令汗出寸口脈數為吐以有熱在胃脘熏胸中宜服藥吐之及針胃脘服除熱湯若傷寒七八日至十日熱在中間煩滿而渴者宜服知母湯寸口脈洪大胸脅滿宜服生薑湯白薇丸亦可紫菀湯下之針上脘期門章門寸口脈緩皮膚不仁風寒在肌肉宜服防風湯以藥敷尉之佳灸諸治風穴寸口脈滑陽實胸中壅滿吐逆宜服前胡湯針太陽巨闕瀉之寸口脈弦心下愊愊微頭痛心下有水氣宜服甘遂丸針期門瀉之寸口脈弱陽氣虛弱自汗出宜服茯苓湯內補散將適飲食消息勿極勞針胃脘補之寸口脈澀是胃氣不足宜服乾地黃湯自養調和飲食針胃脘一作三里補之寸口脈芤吐血微芤者衄血空虛去血故也宜服竹皮湯黃土湯灸膻中寸口脈伏胸中逆氣噎塞是諸氣上衝胸中宜服前胡湯大三建丸針巨闕瀉之寸口脈沉胸中引脅痛胸中有水氣宜服澤漆湯針巨闕瀉之寸口脈軟弱自汗出是虛損病宜服乾地黃湯薯蕷丸內補散牡蠣散並粉身針太衝補之寸口脈遲上焦有寒心痛咽酸吐酸水宜服附子湯生薑湯茱萸丸調和飲食以暖之寸口脈實即生熱在脾肺嘔逆氣塞虛則生寒在脾胃食不消化熱宜服竹葉湯葛根湯寒宜服茱萸丸生薑湯寸口脈細發熱嘔吐宜服黃芩龍膽湯吐不止宜服橘皮桔梗湯及灸中府平關脈主對法關上脈浮而大風在胃中張口肩息心下淡淡食欲嘔關上脈微浮積熱在胃中嘔吐蛔蟲心健忘關上脈滑而大小不均必吐逆是為病方欲來不出一二日復欲發動其人欲多飲飲即注利如利止者生不止者死關上脈緊而滑者蛔動關上脈弦而長翼作大有痛如刀刺之狀在臍左右上下脈經云有積在臍左右上下關上脈澀而堅大而實按之不減有力為中焦實有伏結在脾肺氣塞實熱在胃中關上脈襜襜大而尺寸細者其人必心腹冷積癥瘕結聚欲熱飲食關上脈時來時去乍大乍小乍疏乍數者胃中寒熱羸劣不欲飲食如瘧狀關上脈浮腹滿不欲食浮為虛滿宜服平胃丸茯苓湯生薑前胡湯針胃脘先瀉後補之關上脈緊心下苦滿痛為實宜服茱萸當歸湯加大黃二兩佳脈經云又大黃湯兩治之佳針巨闕下脘瀉之關上脈微為胃中冷心下拘急宜服附子湯生薑湯附子丸針巨闕補之關上脈數胃中有客熱宜服知母湯一作丸除熱湯針巨闕上脘瀉之關上脈緩不欲食此脾胃氣不足宜服平胃丸補脾湯及針章門補之關上脈滑胃中有熱滑為熱實氣滿故不欲食食即吐逆宜服朴硝麻黃湯平胃丸一作紫菀湯人參大平胃丸針胃脘瀉之關上脈弦胃中有冷心下厥逆脈弦胃氣虛宜服茱萸湯溫調飲食針胃脘補之關上脈弱胃氣虛胃中有客熱脈弱為虛熱作病且説云有熱不可大攻之熱去即寒起宜服竹葉湯及針胃脘補之關上脈虛細腹滿宜服生薑湯茱萸蜀椒湯白薇丸針灸三脘關上脈澀血氣逆冷脈澀為血虛宜服乾地黃湯四補散針足太衝上補之關上脈芤大便去血宜服生地黃並生竹皮湯灸膈俞若重下去血針關元甚者服龍骨丸關元一作巨闕關上脈伏有水氣溏泄宜服水銀丸針關元利小便止溏泄便止關上脈洪胃中熱必煩滿宜服平胃丸針胃脘先瀉後補之關上脈沉心下有冷氣苦滿吞酸宜服白薇丸茯苓丸附子湯針胃脘補之關上脈軟苦虛冷脾虛氣弱重下病宜服赤石脂湯女萎丸針關元補之關上脈遲胃中寒宜服桂枝丸茱萸湯針胃脘補之關上脈實胃中痛宜服梔子湯茱萸烏頭丸針胃脘補之關上脈牢脾胃氣塞盛熱即腹滿響響宜服紫菀丸瀉脾丸針灸胃脘瀉之平尺脈主對法尺脈浮者客陽在下焦尺脈弱者下焦冷無陽氣上熱沖頭面尺脈弱寸強胃絡脈傷尺脈偏滑疾面赤如醉外熱則病尺脈細微溏泄冷利素問云尺寒脈細謂之後泄尺脈虛小足脛寒痿痹腳疼尺脈澀下血不利多汗素問云尺澀脈滑謂之多汗尺脈沉而滑者寸白蟲尺脈細而急者筋攣痹不能行尺脈大者熱在脬中小便赤痛尺脈粗而熱者謂之熱中腰胯疼小便赤熱尺脈按之不絶婦人血閉與關相應和滑者男子氣血實婦人即為妊娠尺脈來而斷絶者男子小腹有滯氣婦人月水不利尺寸俱軟弱內慍熱手足逆冷汗出尺寸俱沉關上無有者苦心下喘尺寸俱沉關上若有苦寒心下痛陰中冷腳痹尺寸俱微少心力不欲言氣血不足其人腳弱短氣尺寸俱數手足頭面有熱俱遲有寒手足頭面有冷風尺脈浮下熱風小便難宜服瞿麥湯滑石散針橫骨關元瀉之尺脈緊臍下痛宜服當歸湯灸天樞針關元補之尺脈微厥逆小腹中拘急有寒氣宜服小建中湯針氣海尺脈數惡寒臍下熱痛小便赤黃宜服雞子湯白魚散針橫骨瀉之尺脈緩腳弱下腫一本無此四字小便難有餘瀝宜服滑石湯瞿麥散針橫骨瀉之尺脈滑氣血實經脈不利宜服朴硝煎大黃湯下去經血針關元瀉之尺脈弦小腹疼小腹及腳中拘急宜服建中湯當歸湯針氣海瀉之尺脈弱氣少發熱骨煩宜服前胡湯乾地黃茯苓湯針關元補之尺脈澀足脛逆冷小便赤宜服附子四逆湯針足太衝補之尺脈芤下焦虛小便去血宜服竹皮生地黃湯灸丹田關元尺脈伏小腹痛癥疝水穀不化宜服大平胃丸桔梗丸針關元補之尺脈沉腰背痛宜服腎氣丸針京門補之尺脈軟腳不收風痹一本無此五字小便難宜服瞿麥湯白魚散針關元瀉之尺脈牢腹滿陰中急宜服葶藶茱萸丸針丹田關元中極尺脈遲下焦有寒宜服桂枝丸針氣海關元瀉之尺脈實小腹痛小便不禁宜服當歸湯加大黃一兩利其大便針關元補之五臟積聚第七人病有積有聚有穀氣谷一作系夫積者臟病終不移也聚者腑病發作有時展轉痛移為可治也穀氣者脅下牽痛按之則愈愈而復發夫病已愈不得復發發即為穀氣也諸積大法脈來細軟附骨者為積也寸口結者積在胸中微出寸口積在喉中關上結者積在臍旁微下關者積在小腹尺中結積在氣衝上關上積在心下脈出在左積在左脈出在右積在右脈兩出積在中央各以其部處之寸口沉而橫者脅下及腹中有橫積痛脈弦腹中急痛腰背痛相引腹中有寒疝瘕脈弦緊而細微者癥也夫寒痹癥瘕積聚之脈狀皆弦緊若在心下即寸弦緊在胃脘即關弦緊在臍下即尺弦緊一云關脈長弦有積在臍左右上下又脈癥法左手脈橫癥在左右手脈橫癥在右脈頭大在上頭小在下又一法橫脈見左積在右見右積在左偏得洪實而滑亦為積弦緊亦為積為寒痹為疝痛內有積不見脈難治見一脈相應為易治諸不相應為不合治也左手脈大右手脈小上病在左脅下病在左足右手脈大左手脈小上病在右脅下病在右足脈弦而伏者腹中有癥不可轉也必死不治脈來細沉而直者身有癰腫腹中有伏梁脈來沉而虛者泄注也脈來小沉實者胃中有積聚不可下食即吐陰陽表裡虛實第八弦為少陽緩為陽明洪為太陽三陽也微為少陰遲為厥陰沉為太陰三陰也脈有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰如此言之寸口有六脈俱動耶然經言如此者非有六脈俱動也謂浮沉長短滑澀也凡脈浮滑長者陽也沉澀短者陰也所以言一陰一陽者謂脈來沉而滑也一陰二陽者脈來沉滑而長也一陰三陽者謂脈來浮滑而長時一沉也所以言一陽一陰者謂脈來浮而澀也一陽二陰者謂脈來長而沉澀也一陽三陰者謂脈來沉澀而短時一浮也各以其經所在言病之逆順也脈有陽盛陰虛陰盛陽虛何謂也然浮之損小沉之實大故云陰盛陽虛沉之損小浮之實大故曰陽盛陰虛是謂陰陽虛實之意也凡脈浮大數動長滑陽也沉澀弦弱短微陰也陽病見陰脈者逆也主死陰病見陽脈者順也主生關前為陽關後為陰陽數即吐陰微即下陽弦則頭痛陰弦則腹痛依陰陽察病也又尺脈為陰陰脈常沉而遲寸關為陽陽脈但浮而速尺脈上不至關為陰絶寸脈下不至關為陽絶陰絶而陽微死不治呼為表屬腑吸為里屬臟陽微不能呼陰微不能吸呼吸不足胸中短氣弱反在關濡反在巔微在其上澀反在下微即陽氣不足沾熱汗出澀即無血厥而且寒諸腑脈為陽主熱諸臟脈為陰主寒陽微則汗陰浮自下脈經作陰微陽數口生瘡陰數加微必惡寒煩擾而不得眠陽芤吐血脈經作陽數則吐血陰芤下血脈經作陰澀則下血無陽則厥無陰則嘔寸口脈浮大而疾者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口脈沉細者名曰陽中之陰病苦悲傷不樂惡聞人聲少氣時汗出陰氣不通不通一作並臂不能舉巢氏病源作臂偏不舉尺脈沉細者名曰陰中之陰病苦兩脛痠疼不能久立陰氣衰小便餘瀝陰下濕癢尺脈滑而浮大者名曰陰中之陽病苦小腹痛滿不能溺溺即陰中痛大便亦然尺脈牢而長關上無有此為陰乾陽其人苦兩脛重小腹引腰痛寸口壯大尺中無有此為陽干陰其人苦腰背痛陰中傷足脛寒人有三虛三實者何謂也然有脈之虛實有病之虛實有診之虛實脈之虛實者脈來濡者虛牢者實也病之虛實者出者為虛入者為實言諸者為虛不言者為實緩者為虛急者為實也診之虛實者癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛故曰虛實也問曰何謂虛實答曰邪氣盛則實精氣奪則虛何謂重實所謂重實者大熱病氣熱脈滿是謂重實也脈盛皮熱腹脹前後不通悗瞀為五實脈細皮寒氣少泄痢注前後飲食不入為五虛也何時得病第九何以知人露臥得病陽中有陰也何以知人夏月得病諸陽入陰也何以知人春得病無肝脈也無心脈夏得病無肺脈秋得病無腎脈冬得病無脾脈四季之月得病扁鵲華他察聲色要訣第十病人五臟已奪神明不守聲嘶者死病人循衣縫譫語者不可治病人陰陽俱絶掣衣掇空妄言者死病人妄語錯亂及不能語者不治熱病見此可治病人陰陽俱絶失音不能言三日半死病人兩目眥有黃色起者其病方愈病人面黃目青者不死青如草滋死病人面黃目赤者不死赤如衃血死病人面黃目白者不死白如枯骨死病人面黃目黑者不死黑如炱者死病人面目俱等者不死病人面黑目青者不死病人面青目白者死病人面赤目青者六日死病人面黃目青者九日死是謂亂經飲酒當風邪入胃經膽氣妄泄目則為青雖有天救不可復生病人面赤目白者十日死憂恚思慮心氣內索面色反好急求棺槨十日死病人面白目黑者死謂榮華已去血脈空索病人面黑目白者八日死腎氣內傷病因留積病人面青目黃者五日死病人著床心痛短氣脾竭內傷百日復愈能起倣徨因坐於地其立倚床能治此者可謂神良病人面無精光若土色不受飲食者四日死病人目無精光及牙齒黑色者不治病人耳目鼻口有黑色起入於口者必死病人耳目及顴頰赤者死在五日中病人黑色出於額上髮際下直鼻脊兩顴上者亦死在五日中病人及不病人黑色若白色起入目及鼻口者死在三日中病人及健人面忽如馬肝色望之如青近之如黑者死病人面黑目直視惡風者死病人面黑唇青者死病人面青唇黑者死病人面黑兩脅下滿不能自轉側者死病人目回回直視肩息者一日死病人陰結陽絶目精脫恍惚者死病人陰陽絶竭目眶陷者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不返者死病人口張者三日死病人唇青人中反者三日死病人唇反人中滿者死病人唇口忽乾者不治病人唇腫齒焦者死病人齒忽變黑者十三日死病人舌卷卵縮者必死病人汗出不流舌卷黑者死病人髮直者十五日死病人發如干麻善怒者死病人發與眉衝起者死病人爪甲青者死病人爪甲白者不治病人手足爪甲下肉黑者八日死病人榮衛竭絶面浮腫者死病人卒腫其面蒼黑者死病人手掌腫無紋者死病人臍腫反出者死病人陰囊莖俱腫者死病人脈絶口張足腫者五日死病人足趺腫嘔吐頭重者死病人足趺上腫兩膝大如斗者十日死病人臥遺屎不覺者死病人尸臭者不可治肝病皮白肺之日庚辛死心病目黑腎之日壬癸死脾病唇青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫唇黃脾之日戊己死青欲如蒼璧之澤不欲如藍赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽黑欲如重漆不欲如炭黃欲如羅裹雄黃不欲如黃土診五臟六腑氣絶證候第十一病人肝絶八日死何以知之面青但欲伏眠目視不見人汗一作泣出如水不止一曰二日死病人膽絶七日死何以知之眉為之傾病人筋絶九日死何以知之手足爪甲青呼罵不休一曰八日死病人心絶一日死何以知之肩息回視立死一曰目亭亭二日死病人腸云小腸絶六日死何以知之髮直如干麻不得屈伸自汗不止病人脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度一曰五日死病人胃絶五日死何以知之脊痛腰中重不可反復一曰腓腸平九日死病人肉絶六日死何以知之耳干舌腫溺血大便赤泄一曰足腫九日死病人肺絶三日死何以知之口張但氣出而不還一曰鼻口虛張短氣病人大腸絶不治何以知之泄利無度利絶則死病人腎絶四日死何以知之齒為暴枯面為正黑目中黃色腰中欲折自汗出如流水一曰人中平七日死病人骨絶齒黃落十日死諸浮脈無根者皆死以上五臟六腑為根也診四時相反脈第十二春三月木旺肝脈治當先至心脈次之肺脈次之腎脈次之此為王相順脈也到六月土旺脾脈當先至而反不至反得腎脈此為腎反脾也七十日死何謂腎反脾夏火旺心脈當先至肺脈次之而反得腎脈是謂腎反脾期五月六月忌丙丁脾反肝三十日死何謂脾反肝春肝脈當先至而反不至脾脈先至是謂脾反肝期正月二月忌甲乙腎反肝三歲死何謂腎反肝春肝脈當先至而反不至腎脈先至是謂腎反肝期七月八月忌庚辛腎反心二歲死何謂腎反心夏心脈當先至而反不至腎脈先至是謂腎反心期六月忌戊己此中不論肺金之氣疏略未諭指南又推五行亦頗顛倒待求別録上凡療病察其形貌神氣色澤脈之盛衰病之新故乃可治之形氣相得色澤以浮脈從四時此為易治形氣相失色夭不澤脈實堅甚脈逆四時此為難治逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶澀者曰逆春夏沉澀秋冬浮大病熱脈靜泄痢脈大脫血脈實病在中脈堅實病在外脈不實名逆四時皆難療也凡四時脈皆以胃氣為本雖有四時王相之脈無胃氣者難瘥也何為胃氣脈來弱而滑者是也命曰易治診脈動止投數疏數死期年月第十三脈一動一止二日死一經云一日死脈二動一止三日死脈三動一止四日死或五日死脈四動一止六日死脈五動一止七日死或五日死脈六動一止八日死脈七動一止九日死脈八動一止十日死脈九動一止九日死又云十一日死一經云十三日死或立春死脈十動一止立春死一經云立夏死脈十一動一止立夏死一經云夏至死又云立秋死脈十二動十三動一止立秋死一經云立冬死脈十四動十五動一止立冬死一經云立夏死脈二十動一止一歲死或立秋死脈二十一動一止二歲死脈二十五動一止二歲死一經云一歲死又云立冬死脈三十動一止二歲死或三歲死脈三十五動一止三歲死脈四十動一止四歲死脈五十動一止五歲死不滿五十動一止五歲死五行氣畢陰陽數同榮衛出入經脈通流晝夜百刻五德相生脈來五十投而不止者五臟皆受氣即無病也脈來四十投而一止者一臟無氣卻後四歲春草生而死脈來三十投而一止者二臟無氣卻後三歲麥熟時而死脈來二十投而一止者三臟無氣卻後二歲桑椹赤而死脈來十投而一止者四臟無氣歲中死得節不動出清明死遠不出穀雨死矣脈來五動而一止者五臟無氣卻後五日而死脈一來而久住者宿病在心主中治脈二來而久住者病在肝枝中治脈三來而久住者病在脾下中治脈四來而久住者病在腎間中治脈五來而久住者病在肺枝中治五臟病虛羸人得此者死所以然者藥不得而治針不得而及盛人可治氣全故也扁鵲診諸反逆死脈要訣第十四扁鵲曰夫相死脈之氣如群鳥之聚一馬之馭系水交馳之狀如懸石之落出筋之上藏筋之下堅關之裡不在榮衛伺候交射不可知也脈病人不病脈來如屋漏雀啄者死屋漏者其來即絶而止時復起而不相聯續也雀啄者脈來數而疾絶止復頓來也又經言得病七八日脈如屋漏雀啄者死脈彈人手如黍米也脈來如彈石去如解索者死彈石者辟辟急也解索者動數而隨散亂無復次緒也脈困病人脈如蝦之遊如魚之翔者死蝦遊者苒苒而起尋復退沒不知所在久乃復起起輒遲而沒去速也魚翔者似魚不行而但掉尾動頭身搖而久住者是也脈如懸薄卷索者死脈如轉豆者死脈如偃刀者死脈湧湧不去者死脈忽去忽來暫止復來者死脈中侈者死脈分絶者死上下分散也脈有表無里者死經名曰結去即死何為結脈在指下如麻子動搖屬腎名曰結去死近也脈五來不復增減者死經名曰代何謂代脈五來一止也脈七來是人一息半時不復增減亦名曰代正死不疑經言病或有死或有不治自愈或有連年月不已其死生存亡可切脈而知之耶設病者閉目不欲見人脈當得肝脈弦急而長若反得肺脈浮短而澀者死病若開目而渴心下牢者脈當得緊實而數反得沉滑而微者死病吐血鼽衄者脈當得沉細而反得浮大牢者死病若譫言妄語身當有熱脈當洪大而反得手足四逆脈反沉細微者死病大腹而泄脈當微細而澀反得緊大而滑者死經言形脈與病相反者死奈何然病若頭痛目痛脈反短澀者死病若腹痛脈反浮大而長者死病腹滿而喘脈反沉而滑利者死病四肢厥逆脈反浮大而短者死病耳聾脈反浮大而澀者死翼云脈大者生沉細遲者難治病目䀮䀮脈反大而緩者死左有病而右痛右有病而左痛下有病而上痛上有病而下痛此為逆逆者死不可治脈來微細而絶者人病當死脈來沉而絶濡浮而不止推手者半月死一作半日人病脈不病者生脈病人不病者死人病尸厥呼之不應脈絶者死脈當大反小者死肥人脈細小如絲欲絶者死羸人脈躁者死人身澀而脈來往滑者死人身滑而脈來往澀者死人身小而脈往來大者死人身大而脈來往小者死人身短而脈來往長者死人身長而脈來往短者死尺脈上應寸口太遲者半日死脈經云尺脈不應寸時如馳半日死診五臟六腑十二經脈皆有相反有一反逆即為死候也診百病死生要訣第十五凡診脈當視其人大小短長及性氣緩急脈之遲速大小長短皆如其人形性者吉反之者凶診傷寒熱盛脈浮大者生沉小者死傷寒己得汗脈沉小者生浮大者死溫病三四日以下不得汗脈大疾者生脈細小難得者死不治溫病時行大熱其脈細小者死脈經云時行作穰穰溫病下利腹中痛甚者死不治溫病汗不出出不至足者死厥逆汗出脈堅強急者生虛緩者死熱病二三日身體熱腹滿頭痛食飲如故脈直而疾者八日死四五日頭痛腹痛而吐脈來細強十二日死八九日頭不疼身不痛目不赤色不變而反利脈來牒牒按之不彈手時大心下堅十七日死熱病七八日脈不軟一作喘不散一作數者當喑喑後三日汗不出者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦枯黑者死熱病未得汗脈盛躁疾得汗者生不得汗者難瘥熱病已得汗脈靜安者生脈躁者難治熱病脈躁盛而不得汗者此陽氣之極也十死不治熱病已得汗脈常躁盛此陰氣之極也亦死太素作陽極熱病已得汗常大熱不去者亦死大一作專熱病已得汗熱未去脈微躁者慎不得刺治也熱病發熱甚者其脈陰陽皆竭慎勿刺不汗出必下利診人被風不仁痿蹶其脈虛者生巢氏病源云虛數者生堅急疾者死診癲病虛則可治實則死又云脈實堅者生脈沉細小者死癲病脈搏大滑者久久自已其脈沉小急實不可治小堅急亦不可療診頭痛目痛久視一作卒視無所見者死診人心腹積聚其脈堅強急者生虛弱者死又實強者生沉者死其脈大腹大脹四肢逆冷其人脈形長者死腹脹滿便血脈大時絶極下血脈小疾者死心腹痛痛不得息脈細小遲者生堅大疾者死腸澼便血身熱則死寒則生腸澼下白沫脈沉則生浮則死腸澼下膿血脈懸絶則死滑大則生腸澼之屬身熱脈不懸絶滑大者生弦澀者死以臟期之腸澼下膿血脈沉小流連者生數疾且大有熱者死腸澼筋攣脈小細安靜者生脈浮大緊者死洞泄食不化下膿血脈微小者生緊急者死泄注脈緩時小結者生浮大數者死𧈟蝕陰疰其脈虛小者生緊急者死咳嗽脈沉緊者死浮直者生浮軟者生小沉伏匿者死咳嗽羸瘦脈形堅大者死咳脫形發熱脈小堅急者死肌瘦下脫形熱不去者死咳而嘔腹脹且泄脈弦急欲絶者死吐血衄血脈滑小弱者生實大者死汗出若衄脈小滑者生大躁者死唾血脈緊強者死滑者生吐血而咳上氣其脈數有熱不得臥者死傷寒家咳而上氣脈數散者死謂其人形損故也上氣喘息低昂脈滑手足溫者生脈澀四肢寒者死上氣面浮腫肩息其脈大不可治加利必死一作又甚上氣注液其脈虛寧寧伏匿者生堅強者死寒氣上攻脈實而順滑則生實而逆澀則死太素云寒氣暴上脈滿實何如曰實而滑則生實而逆則死其形盡滿何如曰舉形盡滿者脈急大堅尺滿而不應如是者順則生逆則死何為順則生逆則死曰所謂順者手足溫也所謂逆者手足寒也消渴脈數大者生細小浮短者死痟疸脈實大病久可治弦小堅急病久不可治消渴脈沉小者生實堅大者死水病脈洪大者可治微細者不可治水病脹閉其脈浮大軟者生沉細虛小者死水病腹大如鼓脈實者生虛者死卒中惡吐血數升脈浮大疾快者生沉細數者死卒中惡腹大四肢滿脈大而緩者生浮而緊者死緊細而微者亦生病瘡腰脊強急瘛瘲者皆不可治寒熱瘛瘲其脈代絶者死金瘡血出太多其脈虛細者生數實大者死金瘡出血脈沉小者生浮大者死斫瘡出血一二石脈來大者二十日死斫刺俱有病多少血出不自止斷者脈止脈來大者七日死從高頓僕內有血腹脹滿其脈堅強者生小弱者死人為百藥所中傷脈洪大而速脈經作遲者生微細者死人病甚而脈不調者難瘥人病甚而脈洪者易瘥人陰陽俱結者見其上齒如熟小豆其脈躁者死結一作竭人內外俱虛身體冷而汗出微嘔煩擾手足厥逆體不得安靜者死脈實滿手足寒頭熱春秋生冬夏死老人脈微陽羸陰強者生脈焱大加息者死陰弱陽強脈至而代奇月而死尺脈澀而堅為血實氣虛其病腹痛逆滿氣上行此為婦人胞中絶傷有惡血久成結瘕得病以冬時黍穄赤而死尺脈細而微者血氣俱不足細而有力者是穀氣不足病得節輒動棗葉生而死此病秋時得之左手寸口脈偏動乍大乍小不齊從寸口至關關至尺三部之位處處動搖各異不同其人病在仲夏得之此脈桃花落而死花一作葉右手寸口脈偏沉伏乍小乍大朝來浮大暮夜沉伏浮大即太過上出魚際沉伏即下不至關中往來無常時時復來者榆葉一作莢落而死右手尺部脈三十動一止有頃更還二十動一止乍動乍疏不與息數相應其人雖食谷猶不愈蘩草生而死左手尺部脈四十動而一止止而復來來逆如循直木如循張弓弦絙絙然如兩人共引一索者至立春而死脈經作立冬死診三部脈虛實決死生第十六凡三部脈大都欲等只如小人細人婦人脈小軟小兒四五歲者脈呼吸八至細數吉千金翼云人大而脈細人細而脈大人樂而脈實人苦而脈虛性急而脈緩性緩而脈躁人壯而脈細人羸而脈大此皆為逆逆則難治反此為順順則易治凡婦人脈欲常濡弱於丈夫小兒四五歲者脈自快疾呼吸八至也三部脈或至或不至冷氣在胃中故令脈不通三部脈虛其人長病得之死虛而澀長病亦死虛而滑亦死虛而緩亦死虛而弦急癲病亦死三部脈實而長長病得之死實而滑長病得之生卒病得之死實而緩亦生實而緊亦生實而緊急癲病可治三部脈強非稱其人病便死三部脈羸非其人病得之死三部脈粗長病得之死卒病得之生三部脈細而軟長病得之生細而數亦生微而緊亦生三部脈微而伏長病得之死三部脈軟長病得之不治自愈治之反死卒病得之生三部脈浮而結長病得之死三部脈芤長病得之生三部脈弦而數長病得之生卒病得之死三部脈革長病得之死卒病得之生三部脈堅而數如銀叉股蠱毒必死數而軟蠱毒病得之生三部脈潎潎如羹上肥長病得之死卒病得之生三部脈連連如蜘蛛絲長病得之死卒病得之生三部脈如霹靂長病得之死三部脈如角弓長病得之死三部脈纍纍如貫珠長病得之死三部脈如水淹然流長病不治自愈治之反死三部脈如屋漏長病十四日死脈經云十日死三部脈如雀啄長病七日死三部脈如釜中湯沸朝得暮死夜半得日中死日中得夜半死三部脈急切腹間病又婉轉腹痛針上下瘥
