body:
  text: 卷四婦人方下凡四類補益第十八論一首方十四首論曰凡婦人欲求美色肥白罕比年至七十與少不殊者勿服紫石英令人色黑當服鍾乳澤蘭丸也柏子仁丸治婦人五勞七傷羸冷瘦削面無顏色飲食減少貌失光澤及産後斷緒無子能久服令人肥白補益方柏子仁黃耆乾薑白石英鍾乳各二兩川椒一兩半杜仲當歸甘草芎藭各四十二銖厚朴桂心桔梗赤石脂蓯蓉五味子白朮細辛獨活人參石斛白芷芍藥各一兩澤蘭二兩六銖藁本蕪荑各十八銖紫石英二兩乾地黃烏頭一方作牛膝防風各三十銖上三十味為末蜜和酒服二十丸如梧子不知加至三十丸千金翼無烏頭有龍骨防葵茯苓秦艽各半兩為三十三味並治産後半身枯悴大五石澤蘭丸治婦人風虛寒中腹內雷鳴緩急風頭痛寒熱月經不調繞臍惻惻痛或心腹痞堅逆害飲食手足常冷多夢紛紜身體痹痛榮衛不和虛弱不能動搖及産後虛損並宜服方鍾乳禹餘糧紫石英甘草黃耆各二兩半石膏白石英川椒乾薑各二兩澤蘭二兩六銖當歸桂心川芎厚朴柏子仁乾地黃細辛茯苓五味子龍骨各一兩半石斛遠志人參續斷白朮防風烏頭各三十銖山茱萸紫菀各一兩白芷藁本蕪荑各十八銖上三十二味為末蜜丸梧子大酒服二十丸加至三十丸千金翼有陽起石二兩小五石澤蘭丸治婦人勞冷虛損飲食減少而無光色腹中冷痛經候不調呼吸少氣無力補益溫中方鍾乳紫石英礬石各一兩半白石英赤石脂當歸甘草各四十二銖石膏陽起石乾薑各二兩澤蘭二兩六銖蓯蓉龍骨桂心各二兩半白朮芍藥厚朴人參川椒山茱萸各三十銖柏子仁藁本各一兩蕪荑十八銖上二十三味為末蜜和丸如梧子大酒服二十丸加至三十丸日三增損澤蘭丸治産後百病理血氣補虛勞方澤蘭甘草當歸川芎各四十二銖附子乾薑白朮白芷桂心細辛各一兩防風人參牛膝各三十銖柏子仁乾地黃石斛各三十六銖厚朴藁本蕪荑各半兩麥門冬二兩上二十味為末蜜丸如梧子大空心酒下十五丸至二十丸大補益當歸丸治産後虛羸不足胸中少氣腹中拘急疼痛或引腰背痛或所下過多血不止虛極乏氣晝夜不得眠及崩中面目脫色唇乾口燥亦治男子傷絶或從高墮下內有所傷臟虛吐血及金瘡傷犯皮肉方當歸川芎續斷乾薑阿膠附子白朮吳茱萸芍藥各二兩白芷三兩桂心乾地黃十兩甘草四兩上十三味為末蜜和丸如梧子大酒服二十丸日三夜一不知加至五十丸若有真蒲黃加一升絶妙白芷丸治産後所下過多及崩中傷損虛竭少氣面目脫色腹中痛方白芷五兩乾地黃四兩續斷乾薑當歸阿膠各三兩附子一兩上七味為末蜜丸如梧子大酒服二十丸日四五服無當歸川芎代入蒲黃一兩妙無續斷大薊根代紫石英柏子仁丸治女子遇冬天時行溫風至春夏病熱頭痛熱毒風虛百脈沉重下赤白不思飲食而頭眩心悸酸𢠹恍惚不能起居方紫石英柏子仁各三兩烏頭桂心當歸山茱萸澤瀉川芎石斛遠志寄生蓯蓉乾薑甘草各二兩川椒杜蘅一作杜仲辛夷各一兩細辛一兩半上十八味為末蜜和丸如梧子酒服二十丸漸加至三十丸日三服一方用牡蠣一兩鍾乳澤蘭丸治婦人久虛羸瘦弱甚肢體煩痛臍下結冷不能食面目瘀黑憂恚不樂百病方鍾乳三兩澤蘭三兩六銖防風四十二銖人參柏子仁麥門冬乾地黃石膏石斛各一兩半川芎甘草白芷牛膝山茱萸薯蕷當歸藁本各三十銖細辛桂心各一兩蕪荑半兩艾葉十八銖上二十一味為末蜜丸如梧子酒服二十丸加至四十丸日二服大澤蘭丸治婦人虛損及中風余病疝瘕陰中冷痛或頭風入腦寒痹筋攣緩急血閉無子面上遊風去來目淚出多涕唾忽忽如醉或胃中冷逆胸中嘔不止及泄痢淋瀝或五臟六腑寒熱不調心下痞急邪氣咳逆或漏下赤白陰中腫痛胸脅支滿或身體皮膚中澀如麻豆苦癢痰癖結氣或四肢拘攣風行周身骨節疼痛目眩無所見或上氣惡寒灑淅如瘧或喉痹鼻齆風癇癲疾或月水不通魂魄不定飲食無味併産後內衄無所不治服之令人有子方澤蘭二兩六銖藁本當歸甘草各一兩十八銖紫石英三兩川芎乾地黃柏子仁五味子各一兩半桂心石斛白朮各一兩六銖白芷蓯蓉厚朴防風薯蕷茯苓乾薑禹餘糧細辛卷柏各一兩川椒人參杜仲牛膝蛇床子續斷艾葉蕪荑各十八銖赤石脂石膏各二兩上三十二味為末蜜和丸如梧子大酒服二十至四十丸久赤白痢去幹地黃石膏麥門冬柏子仁加大麥糵陳曲龍骨阿膠黃連各一兩半有鍾乳加三兩良一方有枳實十八銖麥冬一兩半小澤蘭丸治産後虛羸勞冷身體尪瘦方澤蘭二兩六銖當歸甘草各一兩十八銖川芎柏子仁防風茯苓各一兩白芷川椒藁本細辛白朮桂心蕪荑人參食茱萸厚朴各十八銖石膏二兩上十八味為末蜜和丸如梧子大酒服二十丸日三服稍加至四十丸無疾者依此方春秋二時常服一劑甚良有病虛羸黃瘦者服如前一方無茯苓石膏有芍藥乾薑紫石英天門冬丸治風冷在子宮有子常墮落或始為婦便患心痛仍成心疾月水都未曾來服之肥充令人有子方紫石英天門冬禹餘糧各三兩蕪荑烏頭蓯蓉桂心甘草五味子柏子仁石斛人參澤蘭遠志杜仲各二兩川椒卷柏寄生石南雲母當歸烏賊骨各一兩上二十二味為末蜜丸如梧子酒服二十丸日二服加至四十丸三石澤蘭丸治風虛不足通血脈補寒冷方亦名石斛澤蘭丸鍾乳白石英各四兩紫石英防風藁本茯神各一兩六銖澤蘭二兩六銖黃耆石斛石膏各二兩甘草當歸川芎各一兩十八銖白朮桂心人參乾薑獨活乾地黃各一兩半白芷桔梗細辛柏子仁五味子川椒黃芩蓯蓉芍藥秦艽防葵各一兩厚朴蕪荑各十八銖上三十二味為末蜜丸如梧子大酒服二十丸加至三十丸日二三服大平胃澤蘭丸治男子女人五勞七傷諸不足定志意除煩滿手足虛冷羸瘦及月水往來不調體不能動等病方澤蘭細辛黃耆鍾乳各三兩柏子仁乾地黃各二兩半大黃前胡遠志紫石英各二兩川芎白朮川椒各一兩半白芷丹參枳實一作梔子芍藥桔梗秦艽沙參桂心厚朴石斛苦參人參麥門冬乾薑各一兩附子一枚吳茱萸麥糵各五合陳曲一升棗五十枚作膏上三十二味為末蜜丸梧子大酒服二十丸加至三十丸令人肥健一本無干姜有當歸三兩澤蘭散治産後風虛方澤蘭五分禹餘糧防風石膏白芷乾地黃赤石脂肉蓯蓉鹿茸川芎各八分藁本川椒白朮柏子仁各五分桂心甘草當歸乾薑各七分蕪荑細辛厚朴各四分人參三分上二十二味為末治下篩酒服方寸匕日三以意增之月水不通第十九方三十三首乾薑丸治婦人寒熱羸瘦酸消怠惰胸中支滿肩背脊重痛腹裡堅滿積聚或痛不可忍引腰小腹痛四肢煩疼手足厥逆寒至肘膝或煩滿手足虛熱意欲投水中百節盡痛心下常苦懸痛時寒時熱噁心涎唾喜出每愛鹹酸甜苦之物身體或如雞皮月經不通大小便苦難食不生肌方乾薑川芎茯苓硝石杏仁水蛭虻蟲桃仁蠐螬柴胡䗪蟲各一兩芍藥人參大黃川椒當歸各二兩上十六味為末蜜丸梧子大空心飲下三丸不知加至十丸千金翼以療婦人瘕結脅肋下疾桃仁湯治婦人月水不通方桃仁朴硝牡丹皮射干土瓜根黃芩各三兩芍藥大黃柴胡各四兩牛膝桂心各二兩水蛭虻蟲各七十枚上十三味㕮咀以水九升煮取二升半去滓分三服又方桃仁一升當歸土瓜根大黃水蛭虻蟲芒硝各二兩牛膝麻子仁桂心各三兩上十味㕮咀以水九升煮取三升半去滓納硝令煬分為三服肘後無當歸麻子仁用牡丹射干黃芩芍藥柴胡各三兩千金翼無虻蟲芒硝湯治同前芒硝丹砂末當歸芍藥土瓜根水蛭各二兩大黃三兩桃仁一升上八味㕮咀以水九升煮取三升去滓納丹砂芒硝分三服硝石湯治血瘕月水留瘀血大不通下病散堅血方硝石附子虻蟲各三兩大黃細辛乾薑黃芩各一兩芍藥土瓜根丹參代赭蠐螬各二兩大棗十枚桃仁二升牛膝一斤朴硝四兩上十六味㕮咀以酒五升水九升漬藥一宿明旦煎取四升去滓下朴硝硝石煬盡分四服相去如炊頃去病後食黃鴨羹勿見風乾漆湯治月水不通小腹堅痛不得近方乾漆葳蕤芍藥細辛附子甘草各一兩當歸桂心芒硝黃芩各二兩大黃三兩吳茱萸一升上十二味㕮咀以清酒一斗浸一宿煮取三升去滓納硝煬盡分三服相去如一炊頃治月經不通心腹絞痛欲死通血止痛方當歸大黃芍藥各三兩吳茱萸乾地黃乾薑川芎虻蟲水蛭各二兩細辛甘草桂心各一兩梔子十四枚桃仁一升上十四味㕮咀以水一斗五升煮取五升分五服一本有牛膝麻仁各三兩前胡牡丹湯治婦人盛實有熱在腹月經瘀閉不通及勞熱熱病後或因月經來得熱不通方前胡牡丹元參桃仁黃芩射干旋覆花栝蔞根甘草各二兩芍藥茯苓大黃枳實各三兩上十三味㕮咀以水一斗煮取三升分三服黃芩牡丹湯治婦人從小至大月經未嘗來顏色萎黃氣力衰少飲食無味方黃芩牡丹桃仁瞿麥川芎各二兩芍藥枳實射干海藻大黃各三兩虻蟲七十枚蠐螬十枚水蛭五十枚上十三味㕮咀以水一斗煮取三升分三服服兩劑後灸乳下一寸黑圓際各五十壯牡丹丸治婦人女子諸病後月經閉絶不通及從小來不通並新産後瘀血不消服諸湯利血後余疢未平宜服之取平復方牡丹三兩芍藥元參桃仁當歸桂心各二兩虻蟲水蛭各五十枚蠐螬三十枚瞿麥川芎海藻各一兩上十二味為末蜜和丸如梧子大酒下十五丸加至二十丸血盛者作散服方寸匕腹中當轉如沸血自化成水去如小便赤少除桂心用地膚子一兩乾地黃當歸丸治月水不通或一月再來或隔月不至或多或少或淋瀝不斷或來而腰腹刺痛不可忍四體噓吸不欲飲食心腹堅痛有青黃黑色水下或如清水不欲行動舉體沉重惟思眠臥欲食酸物虛乏黃瘦方乾地黃三兩當歸甘草各一兩半牛膝芍藥乾薑澤蘭人參牡丹各一兩六銖丹參川椒白芷黃芩桑耳桂心各一兩䗪蟲四十枚川芎一兩十八銖桃仁二兩水蛭虻蟲各七十枚蒲黃二合上二十一味為末蜜丸如梧子每日空心酒下十五丸漸加至三十丸以知為度治月經不通方取葶藶一升為末蜜丸如彈子大綿裹納陰中入三寸每丸一宿易之有汗出止乾漆丸治月經不通百療不瘥方乾漆土瓜根射干芍藥各一兩半牡丹牛膝黃芩桂心吳茱萸大黃柴胡各一兩桃仁鱉甲各二兩䗪蟲蠐螬各四十枚水蛭虻蟲各七十枚大麻仁四合亂髮雞子大二枚菴䕡子二合上二十味為末以蜜和為丸每日酒下十五丸梧子大漸加至三十丸日三仍用後浸酒服前丸藥浸酒方大麻子三升菴䕡子二升桃仁一升桂心灶屋炱煤各四兩土瓜根射干各六兩牛膝八兩上八味㕮咀以清酒三斗絹袋盛藥浸五宿以一盞下前丸藥甚良或單服之亦好當歸丸治女人臍下癥結刺痛如蟲所齧及如錐刀所刺或赤白帶下十二疾腰背疼痛月水或在月前或在月後方當歸葶藶附子吳茱萸大黃各二兩黃芩桂心乾薑牡丹川芎各一兩細辛秦椒柴胡厚朴各一兩六銖牡蒙一方無甘草各一兩虻蟲水蛭各五十枚上十八味為末蜜丸如梧子空心酒下十五丸日再有胎勿服之又方治腰腹痛月水不通利方當歸川芎各四兩虻蟲烏頭丹參乾漆各一兩人參牡蠣土瓜根水蛭各二兩桃仁五十枚上十一味為末以白蜜丸如梧子大酒下三丸日三服鱉甲丸治女人小腹中積聚大如七八寸盤面上下周流痛不可忍手足苦冷咳噫腥臭兩脅熱如火炙玉門冷如風吹經水不通或在月前或在月後服之一月