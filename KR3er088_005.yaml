如膿痂六曰如豆汁七曰如葵羹八曰如凝血九曰如清血血似水十曰如米泔十一曰如月浣乍前乍卻十二曰經度不應期也何謂九痛一曰陰中痛傷二曰陰中淋瀝痛三曰小便即痛四曰寒冷痛五曰經來即腹中痛六曰氣滿痛七曰汁出陰中如有蟲齧痛八曰脅下分痛九曰腰胯痛何謂七害一曰竅孔痛不利二曰中寒熱痛三曰小腹急堅痛四曰臟不仁五曰子門不端引背痛六曰月浣乍多乍少七曰害吐何謂五傷一曰兩脅支滿痛二曰心痛引脅三曰氣結不通四曰邪思泄利五曰前後痼寒何謂三痼一曰羸瘦不生肌膚二曰絶産乳三曰經水閉塞病有異同具治之方白堊丸治女人三十六疾方又方見後白堊龍骨芍藥各十八銖黃連當歸茯苓黃芩瞿麥白蘞石葦甘草牡蠣細辛附子禹餘糧白石脂人參烏賊骨藁本甘皮大黃各半兩上二十一味為末蜜和丸如梧子大空腹飲服十丸日再不知加至二十日知一月百病除若十二癥倍牡蠣禹餘糧烏賊骨白石脂龍骨若九痛倍黃連白蘞甘草當歸若七害倍細辛藁本甘皮加椒茱萸各一兩若五傷倍大黃石葦瞿麥若三痼倍人參加赤石脂礬石巴戟天各半兩合藥時隨病增減之赤石脂丸治女人腹中十二疾一曰經水不時二曰經來如清水三曰經水不通四曰不周時五曰生不乳六曰絶無子七曰陰陽減少八曰腹苦痛如刺九曰陰中冷十曰子門相引痛十一曰經來凍如葵汁狀十二曰腰急痛凡此十二病得之時因與夫臥起月經不去或臥濕冷地及以冷水洗浴當時取快而後生百病或瘡痍未瘥便合陰陽及起早作勞衣單席薄寒從下入方赤石脂半夏各一兩六銖川椒乾薑吳茱萸當歸桂心丹參白蘞防風各一兩雚蘆半兩上十一味為末蜜和丸如梧子大每日空心酒服十丸日三不知稍加以知為度白石脂丸治婦人三十六疾胞中痛漏下赤白方白石脂烏賊骨禹餘糧牡蠣各十八銖赤石脂乾地黃乾薑龍骨桂心石葦白蘞細辛芍藥黃連附子當歸黃芩川椒鍾乳白芷川芎甘草各半兩上二十二味為末蜜和丸如梧子大每日空心酒下十五丸日再一方有黃柏半兩小牛角䚡散治帶下五賁一曰熱病下血二曰寒熱下血三曰經脈未斷為房事則血漏四曰經來舉重傷任脈下血五曰産後臟開經利五賁之病外實內虛方牛角䚡一枚燒令赤鹿茸禹餘糧當歸乾薑續斷各二兩阿膠三兩烏賊骨龍骨各一兩赤小豆二升上十味治下篩空腹以酒服方寸匕日三千金翼無鹿茸烏賊骨龍骨散治淳下十二病絶産一曰白帶二曰赤帶三曰經水不利四曰陰胎五曰子臟堅六曰臟癖七曰陰陽患病痛八曰內強九曰腹寒十曰臟閉十一曰五臟痠痛十二曰夢與鬼交宜服之淳下一本作腹下龍骨三兩黃柏半夏灶中黃土桂心乾薑各二兩石葦滑石各一兩烏賊骨代赭各四兩白殭蠶五枚上十一味治下篩酒服方寸匕日三白多者加烏賊骨殭蠶各二兩赤多者加代赭五兩小腹泠加黃柏二兩子臟堅加乾薑桂心各二兩以上各隨病增之服藥三月有子即住藥藥太過多生兩子當審方取好藥寡婦童女不可妄服治女子帶下諸病方大黃蒸三斗米下附子茯苓牡蒙牡丹桔梗葶藶各三兩厚朴川芎人參當歸虻蟲川椒吳茱萸柴胡乾薑桂心各半兩細辛二兩半上十八味為末蜜和丸如梧子大每日空心酒服二丸不知加之以腹中溫溫為度一本有麻子澤蘭無川椒葶藶治帶下百病無子服藥十四日下血二十日下長蟲及青黃汁出三十日病除五十日肥白方大黃破如豆粒熬令黑色柴胡朴硝各一斤川芎五兩乾薑川椒各一升茯苓如雞子大一枚上七味為末蜜和丸如梧子大先食米飲服七丸不知加至十丸以知為度治帶下方枸杞根一升生地黃五升上二味㕮咀以酒一斗煮取五升分為三服治婦人及女子赤白帶下方禹餘糧當歸川芎各一兩半赤石脂白石脂阿膠龍骨石葦各一兩六銖烏賊骨黃柏白蘞黃芩一用黃連續斷桑耳牡蠣各一兩上十五味為末蜜和丸如梧子大空心飲下十五丸日再加至三十丸為度白馬蹄丸治女人下焦寒冷成帶下赤白浣方白馬蹄鱉甲附子龜甲川椒各一兩磁石甘草杜仲當歸續斷萆薢禹餘糧桑耳川芎鯉魚甲各二兩上十五味為末蜜和丸如梧子大以酒服十丸加至三十丸日三服一本無龜甲白馬䭷散治帶下方下白者取白馬䭷下赤者取赤馬䭷隨色取之白馬䭷二兩龜甲四兩鱉甲十八銖牡蠣一兩十八銖上四味下篩空心酒下方寸匕日三服加至一匕半治五色帶下方服大豆紫湯日三服方見前三捲風篇中又方燒馬左蹄為末以酒服方寸匕日三服又方燒狗頭和毛皮骨為末以酒服方寸匕又方煮甑帶汁服一杯良又方燒馬蹄底護干為末酒服方寸匕日三雲母芎藭散衛公治五崩身瘦咳逆煩滿少氣心下痛面生瘡腰痛不可俯仰陰中腫如有瘡狀毛中癢時痛與子臟相通小便不利常拘急頭眩頸項急痛手足熱氣逆沖急心煩不得臥腹中急痛食不下吞酸噫苦上下腸鳴漏下赤白青黃黑汁大臭如膠汙衣狀皆是內傷所致中寒即下白熱即下赤多飲即下黑多食即下黃多藥即下青或喜或怒心中常恐或憂勞便發動大惡風寒方雲母芎藭代赭東門邊木燒各一兩白殭蠶烏賊骨白堊蝟皮各六銖鱉甲一作龜甲桂心伏龍肝生鯉魚頭各十八銖上十二味治下篩酒服方寸匕日三夜一一方有龍骨乾葛慎火草散治崩中漏下赤白青黑腐臭不可近令人面黑無顏色皮骨相連月經失度往來無常小腹弦急或苦絞痛上至心兩脅腫脹食不生肌膚令人偏枯氣息乏少腰背痛連脅不能久立嗜臥困懶方又方見後慎火草白石脂禹餘糧鱉甲乾薑細辛當歸川芎石斛芍藥牡蠣各二兩黃連薔薇根皮乾地黃各四兩熟艾桂心各一兩上十六味治下篩空腹酒服方寸匕日三稍加