body:
  text: 卷十四小腸腑方凡七類小腸腑脈論第一論一首論曰小腸腑者主心也舌是其候也心合於小腸小腸者受盛之腑也號監倉吏重二斤十四兩長二丈四尺廣二寸四分難經甲乙云長二丈二尺大二寸半徑八分分之少半也後附脊左回疊積其注於回腸者外傅臍上回運環反十六曲常留水穀二斗四升其一斗二升是水一斗二升是谷應主二十四氣也難經云十六曲盛谷二斗四升水六升三合合之大半甲乙云受三斗三合合之大半唇厚人中長以候小腸小腸病者小腹痛腰脊控睪而痛時窘之復耳前熱若寒甚獨肩上熱及手小指次指之間熱若脈滑者脈經作陷甲乙亦同此其候也小腹控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝肺散於盲結於臍故取之盲原以散之刺太陰以與之取厥陰以下之取巨虛下廉以去之按其所過之經以調之左手關前寸口陽絶者無小腸脈也苦臍痹小腹中有疝瘕主月即冷上搶心刺手心主治陰心主在掌後橫紋中入一分左手關前寸口陽實者小腸實也苦心下急熱痹小腸內熱小便赤黃刺手太陽治陽手太陽在手小指外側本節陷中小腸有寒其人下重便膿血有熱必痔小腸有宿食常暮發熱明日復止小腸脹者小腹䐜脹引腹痛心前受病移於小腸心咳不已則氣與咳俱出厥氣客於小腸夢聚邑街衢心應皮皮厚者脈厚脈厚小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結扁鵲云手少陰與太陽為表裡所以表清裡濁清實濁虛故食下腸實而胃虛故腑實而不滿實則傷熱熱則口張口為之生瘡虛則傷寒寒則便泄膿血或發里水其根在小腸先從腹起方見治水篇中小腸絶不治六日死何以知之髮直如干麻不得屈伸自汗不止手太陽之脈是動則咽腫痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰頷腫項肩臑肘臂外後廉痛經脈支別已見心臟門中小腸虛實第二脈二首方三首灸法二首小腸實熱左手寸口人迎以前脈陽實者手太陽經也病苦身熱來去汗不出心中煩滿身重口中生瘡名曰小腸實熱也柴胡澤瀉湯治小腸熱脹口瘡方柴胡澤瀉橘皮一作桔梗黃芩枳實旋覆花升麻芒硝各二兩生地黃切一升上九味㕮咀以水一斗煮取三升去滓納硝分二服大黃丸治小腸熱結滿不通方大黃芍藥葶藶各二兩大戟朴硝各三兩巴豆七枚杏仁五十枚上七味為末蜜和丸如梧子飲服七丸小兒服二三丸日二熱去日一服灸法小腸熱滿灸陰都隨年壯穴在挾中脘兩邊相去一寸是小腸泄痢膿血灸魂舍一百壯小兒減之穴在挾臍兩邊相去各一寸又灸小腸俞七壯小腸虛寒左手寸口人迎以前脈陽虛者手太陽經也病苦顱際偏頭痛耳頰痛名曰小腸虛寒也治小腸虛寒痛下赤白腸滑胸中懊憹補之方乾薑三兩當歸黃柏地榆各四兩黃連阿膠各二兩石榴皮三枚上七味㕮咀以水七升煮取二升五合去滓下膠煮取膠煬盡分三服舌論第三論一首論曰舌者心主小腸之候也善用機衡能調五味也凡有所啖若多咸則舌脈凝而變色多食苦則舌皮槁而外毛焦枯多食辛則舌筋急而爪枯乾多食酸則舌肉肥而唇揭多食甘則舌根痛而外發落又曰心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味內合五臟之氣也若臟熱則舌生瘡引唇揭赤若腑寒則舌本縮口噤唇青寒宜補之熱宜瀉之不寒不熱依臟腑調之風眩第四論一首方九首灸法一首食禁一首前卷既有頭面風方風眩不當分出蓋以此是徐嗣伯方不可以余方相雜故此特立風眩方條專出徐氏方焉徐嗣伯曰余少承家業頗習經方名醫要治備聞之矣自謂風眩多途諸家未能必驗至於此術鄙意偏所究也少來用之百無遺策今年將衰暮恐淹忽不追故顯明證論以貽於後云爾夫風眩之病起於心氣不定胸上蓄實故有高風面熱之所為也痰熱相感而動風風火相亂則悶瞀故謂之風眩大人曰癲小兒則為癇其實則一此方療治萬無不愈但恐證候不審或致差違大都忌食十二屬肉而奔豚為患發多氣急氣急則死不可救故此一湯是輕重之宜勿因此便謂非患所治風眩湯散丸煎共有十方凡人初發宜急與續命湯困急時但度灸穴便火針針之無不瘥者初得針竟便灸最良灸法次列於後餘業以來三十餘年所救活者數十百人無不瘥矣後人能曉此方幸勿參以余術焉續命湯治風眩發則煩悶無知口沫出四體角弓目反上口噤不得言方竹瀝一升二合生地黃汁一升龍齒生薑防風麻黃各四兩防己三兩石膏七兩桂心二兩附子三分上十味㕮咀以水一斗煮取三升分三服有氣加附子作一兩紫蘇子五合橘皮半兩已服續命湯口開四肢尚未好定而心中尚不除者紫石湯主之方見後紫石煮散是也奔豚湯治氣奔急欲絶方吳茱萸一升石膏人參半夏芎藭各三分桂心芍藥生薑各四分生葛根茯苓各六分當歸四兩李根皮一斤上十二味㕮咀以水七升清酒八升煮取三升分三服防己地黃湯治言語狂錯眼目霍霍或言見鬼精神昏亂方防己甘草各二兩桂心防風各三兩生地黃五斤別切勿合藥漬疾小輕二斤上五味㕮咀以水一升漬一宿絞汁著一面取滓著竹簀上以地黃著藥滓上於五鬥米下蒸之以銅器承取汁飯熟以向前藥汁合絞取之分再服薯蕷湯治心中驚悸而四肢緩頭面熱心胸痰滿頭目眩冒如欲動搖方薯蕷麥門冬人參各四兩芍藥生地黃前胡各八分枳實遠志生薑各三分茯苓茯神各六分半夏五分甘草黃芩竹葉各一分秫米三合上十六味㕮咀取江水高舉手揚三百九十下量取三斗煮米減一斗納半夏復減九升去滓下藥煮取四升分四服無江水處以千里東流水代之防風湯服前湯後四體尚不涼頭目眩轉服此湯大勝宜常服但藥中小小消息隨冷暖耳仍不除瘥者依此方防風石膏人參赤石脂生薑龍骨寒水石白石脂茯苓各三分桂心二分紫石英一分上十一味㕮咀以水八升煮取三升分三服凡用井花水取清淨也今用江水者無泥沙穢源泉遠涉順勢歸海不逆上流用以治頭必歸於下故也薯蕷丸治頭目眩冒心中煩郁驚悸狂癲方薯蕷二十八分甘草二十分鹿角膠金匱作阿膠大豆黃卷桂心各七分乾地黃神麯當歸人參各十分麥門冬防風黃芩金匱無芍藥白朮各六分柴胡桔梗茯苓杏仁川芎各五分白蘞乾薑各三分大棗一百枚取膏上二十二味為末棗膏和白蜜丸如彈丸先食服一丸日三薯蕷煎薯蕷二十分甘草十四分澤瀉人參黃芩各四分當歸白蘞桂心防風各三分麥門冬山茱萸桔梗芍藥紫菀大豆黃卷乾地黃白朮川芎乾薑蜀椒各二分以上二十味並用搗篩生地黃十八斤搗絞取汁煎令余半獐鹿髓鹿角膠各半斤麻子仁研蜜各三升大棗八十枚桑根白皮五升忌岡上自出土者大毒大忌近籬屋垣牆下溝瀆邊者皆不中用也上二十七味以清酒二斗四升煮桑白皮麻子仁大棗得一斗去滓次下地黃汁鹿膠髓蜜煎減半納諸末並煎令可丸如雞子黃大飲服一枚日三稍加至三丸天雄散治頭目眩暈屋轉旋倒方天雄防風川芎人參獨活桂心葛根各三分莽草四分白朮遠志薯蕷茯神山茱萸各六分上十三味治下篩先食以菊花酒服方寸匕日三漸加至三匕以知為度菊花酒法九月九日取甘菊花曝乾作末於米饙中蒸作酒人參丸治心中恍惚不定方上黨人參鬼臼鐵精牛黃雄黃大黃丹砂菖蒲防風各一兩蜥蜴赤足蜈蚣各一枚上十一味為末蜜丸如梧子大用前菊花酒服七丸日三夜一稍加之合藥勿用青紙忌見婦人青衣人喪孝不具足人及濁穢六畜雞犬等灸法其法以繩橫度口至兩邊既得口度之寸數便以其繩一頭更度鼻盡其兩邊兩孔間得鼻度之寸數中屈之取半合於口之全度中屈之先覓頭上回發當回發灸之以度度四邊左右前後當繩端灸前以面為正並依年壯多少一年凡三灸皆須瘡瘥又灸壯數如前若連灸火氣引上其數處回發者則灸其近當鼻也若回發近額者亦宜灸若指面為瘢則闕其面處然病重者亦不得計此也食禁十二屬相肉物皆不得食其為藥則牛黃龍骨齒用不可廢風癲第五論四首方三十六首針灸法五十八首論曰黃帝問曰人生而病癲疾者安所得之岐伯對曰此得之在腹中時其母數有所大驚也氣上而不下精氣並居故令子發為癲疾病在諸陽脈且寒且熱名曰狂刺之虛脈視分盡熱病已而止病癲初發歲一發不治月一發不治四五日一發名曰癲疾刺諸分其脈尤寒者以針補之病已止癲疾始生先不樂頭重直視舉目赤其作極己而煩心候之於顏取手太陽陽明太陰血變而已癲疾始發而反強因而脊痛候之足太陽陽明太陰手太陽血變而已癲疾始作而引口啼呼甲乙作喘悸者候之手陽明太陽右強者攻其左左強者攻其右血變而止治癲疾者常與之居察其所當取之處病至視之有過者即瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者尾骶也骨癲疾者頷齒諸腧分肉皆滿而骨倨強直汗出煩悶嘔多涎沫氣下泄不療筋癲疾者身拳攣急脈大刺項大經之本杼嘔多涎沫氣下泄不療脈癲疾者暴僕四肢之脈皆脹而從滿脈盡刺之出血不滿挾項灸太陽又灸帶脈於腰相去三寸諸分肉本腧嘔多涎沫氣下泄不療治癲者病發而狂面皮厚敦敦者死不療凡癲發則臥地吐涎沫無知若強掠起如狂及遺糞者難療癲疾脈搏大滑久自已脈沉小急實死不療小牢急亦不可治脈虛可療實則死矣厥成為癲疾五臟不平六腑閉塞之所生也厥成為癲故特附厥於此條也陰衰發熱厥陽衰發寒厥論曰黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則寒厥陰氣衰於下則為熱厥問曰熱厥必起於足下者何也對曰陽氣起於足五趾之表集於足下而聚於足心故陽盛則足下熱也問曰寒厥必起於五趾而上於膝者何也對曰陰氣起於五趾之裡集於膝而聚於膝上故陰氣盛則從五趾至膝上寒其寒也不從外而從內也厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也陰氣盛於上則下虛下虛則腹滿腹滿則下氣重上而邪氣逆氣逆則陽氣亂亂不知人巨陽之厥腫首頭重足不能行發為眴僕陽明之厥闐疾欲走呼腹滿不得臥面赤而熱妄見而妄言少陽之厥暴聾頰腫而熱脅痛髀不可以運太陰之厥腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥舌乾溺赤腹滿心痛厥陰之厥小腹腫痛腹脹涇溲不利好臥屈膝陰縮腫胻內一作外熱盛則瀉之虛則補之不盛不虛以經取之上寒下熱先刺其項太陽久留之已則火尉項與肩胛令熱下冷乃止所謂推而上之者也上熱下寒視其虛脈而陷下於經絡者取之氣下而止所謂引而下之者也刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也所謂二陽者二刺陽也論曰溫病熱入腎中亦為痙小兒病癇熱盛亦為痙凡風喑暴尸厥及鬼魘不寤皆相似宜察之故經言久厥則成癲是以知似也論曰癲病有五一曰陽癲發時如死人遺溺有頃乃解二曰陰癲坐初生小時臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反急強羊鳴食頃方解由熱作汗出當風因以房室過度醉飲飽滿行事令心氣逼迫短氣脈悸得之四曰濕癲眉頭痛身重坐熱沐發濕結腦汗未止得之五曰馬癲發時反目口噤手足相引身皆熱坐小時風氣腦熱不和得之治五癲方銅青雄黃空青東門上雞頭水銀各一兩豬苓茯苓人參白芷石長生白蘞白薇各二兩卷柏烏扇各半兩硫黃一兩半上十五味為末以青牛膽和著銅器中於甑中五斗大豆上蒸之藥成丸如麻子先食服三十丸日二夜一虎睛丸治風癲掣瘲口眼張大口出白沫或作聲或死不知人方虎睛一具酒浸一宿炙鬼箭羽露蜂房各二分獨活遠志細辛貫衆麝香白蘞一作白薇升麻白蘚皮各三兩牛黃防風秦艽防葵龍齒黃芩雄黃山茱萸防己茯苓鐵精鬼臼乾地黃一作乾薑人參大黃銀屑各四分茯神石膏天雄各五兩寒水石六分蛇蛻皮一尺上三十二味為末蜜丸如梧子大酒服十五丸日再稍加至二十五丸神效凡癲發之候其狀多端口邊白沫動無常者治方秦艽人參防葵一作防風茯神一作牡丹甘草各二兩鉛丹一兩貫衆一枚上七味㕮咀以水九升煮取三升半分三服雄雌丸治風癲失性顛倒欲死五癲驚癇方雄黃雌黃真珠各一兩鉛二兩熬令成屑丹砂一分水銀八分上六味為末以蜜和搗三萬杵丸如胡豆先食服三丸日二稍加以知為度古今録驗云療五癲牛癲則牛鳴馬癲則馬鳴狗癲則狗鳴羊癲則羊鳴雞癲則雞鳴病五癲狂病者臟腑相引盈氣起寒厥不識人氣靜瘛瘲吐沫久而得蘇者續命風引湯治中風癲眩不知人狂言舌腫出方麻黃川芎石膏人參防風各三兩甘草桂心獨活各二兩防己附子當歸各一兩杏仁三十枚陳姜五兩一本無陳字上十三味㕮咀以酒三升水一斗合煎取四升分四服日三夜一紫石煮散治大人風引小兒驚癇瘛瘲日數十發醫所不療者方紫石英滑石白石脂凝水石石膏赤石脂各六兩甘草桂心牡蠣各三兩大黃乾薑龍骨各四兩上十二味治下篩為粗散盛以葦囊懸高涼處欲用取三指撮以新汲井水三升煮取一升二合大人頓服未百日兒服一合未能服者以綿沾著口中熱多者日四五服以意消息之深師方只龍骨牡蠣乾薑滑石白石脂五味治百二十種風癇癲驚狂發即吐沫不識人者四月五月宜服之方紫石英芍藥龍骨一作黃芩青石脂白蘚皮麻黃當歸甘草栝蔞根桂心人參各二兩牡蠣三兩大黃五兩上十三味治下篩為粗散分作七裹每以大棗十枚水三升煮取二升半去滓下一裹大棗汁中煎取一升去滓頓服相去七日一服服訖即瘥治癲癇厥時發作方防葵代赭石人參鉛丹白殭蠶鉤藤茯神雷丸虎骨生豬齒遠志桂心防風各六兩卷柏茛菪子升麻附子牡丹龍齒光明砂各一分牛黃二分白蘞四分蚱蟬十四枚蛇蛻皮白馬睛各一具上二十五味治下篩酒服方寸匕日二亦可為丸良驗川芎湯治風癲引脅牽痛發則吐耳如蟬鳴方川芎藁本䕡茹各五兩上三味㕮咀納酒一斗煮取三升頓服羸者分三服取大汗鴟頭丸治風癲方鴟頭一枚葶藶子鉛丹虎掌烏頭栝蔞根各三分甘遂天雄蜀椒大戟各二分白朮一分䕡茹鐵精各一兩上十三味為末蜜丸如梧子酒下二丸日三服又方治癲癇瘛瘲方鉛丹一斤飛鴟頭二枚上二味為末蜜丸先食服三丸日三劇者夜一稍加之又方茛菪子三升搗篩以酒一斗漬半日絞去滓湯中煎令可丸先食服如小豆二丸加至如梧子二丸以知為度額上手中從紋理中赤起是知也無此候更服病日發者三日愈間日發者十日愈五日發者二十日愈半歲發者一月愈地黃門冬酒治陰虛癇妄方地黃三十斤天門冬十斤上二味搗取汁作煎服之瘥天門冬酒通治五臟六腑大風洞泄虛弱五勞七傷癥結滯氣冷熱諸風癲癇惡疾耳聾頭風四肢拘攣猥退歷節萬病久服身輕延年齒落更生發白變黑方天門冬搗絞取汁二斗曲二升曲發以糯米二斗准家釀法造酒春夏極冷下飯秋冬溫如人肌酘之酒熟取服一盞常令酒氣相接勿至醉吐慎生冷醋滑雞豬魚蒜特慎鯉魚及忌油膩此是二斗汁法一石二斗亦准此服十日覺身體癮疹大癢二十日更大癢三十日漸止此皆風氣出故也四十日即覺身心朗然大快五十日當風坐臥覺風不著人身中諸風悉盡用米法先淨淘米曝乾臨欲用時別取天門冬汁漬米干漉炊之余汁拌飯密封壓取天門冬汁法淨洗天門冬去心皮漉去水切壓取汁三四遍滓干乃止此酒初熟味酸仍作臭泔腥氣但依式服之久停則香美封四七日佳凡八九月少少合至十月多合擬至來年五月三十日相續服之入四月不得合服酒時若得散服得力更倍速散方如下散方天門冬去皮心曝乾搗作末以上件酒服方寸匕日三加至三匕久服長生凡酒亦得服灸法大人癲小兒驚癇灸背第二椎及下窮骨兩處以繩度中折繩端一處是脊骨上也凡三處畢復斷繩作三折令參合如字以一角注中央灸下二角挾脊兩邊便灸之凡五處故畫圖法以丹注所灸五處各百壯削竹皮為度勝繩也猝癲灸陰莖上宛宛中三壯得小便通即瘥翼云當尿孔上是穴又灸陰莖頭三壯又灸足大趾上聚毛中七壯又灸囊下縫二七壯又灸兩乳頭三壯又灸督脈三十壯三報穴在直鼻中上入髮際又灸天窗百會各漸灸三百壯炷惟小作又灸耳上髮際各五十壯論曰黃帝問曰有病怒狂者此病安生岐伯對曰生於陽也曰陽何以使人狂曰陽氣因暴折如難決故善怒名曰陽厥問曰何以知之對曰陽明常動太陽少陽不動不動而動大疾此其候也曰治之奈何曰衰其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵落為後飯夫生鐵落者下氣疾也論曰凡發狂則欲走或自高賢稱神聖皆須備諸火灸乃得永瘥若或悲泣呻吟者此為邪非狂自依邪方治之邪入於陽則為狂邪入於陰則為血痹邪入於陽傳即為癲狂邪入於陰傳則為痛喑陽入於陰病靜陰入於陽病怒鼉甲湯治邪氣夢寐寤時涕泣不欲聞人聲體中酸削乍寒乍熱腰脊強痛腹中拘急不欲飲食或因疾病之後勞動疲極或觸犯忌諱衆諸不節婦人産生之後月經不利時下青赤白肌體不生肉虛羸瘦小便不利或頭身發熱旋覆解散或一度交接彌日困極皆主之方鼉甲七枚甘草白薇一作白芷貝母黃芩各二兩麻黃白朮芍藥各二兩半防風三兩凝水石桂心茯苓知母各四兩石膏六兩上十四味㕮咀以水二斗煮取四升溫服一升日三夜一九物牛黃丸治男子沾鬼魅欲死所見驚怖欲走時有休止皆邪氣所為不自絶方牛黃土精荊實人精龍骨水精空青天精雄黃地精曾青蒼龍精玉屑白虎精赤石脂朱雀精元參玄武精上九味名曰九精上通九天下通九地各一兩治下篩蜜丸和如小豆先食服一丸日三稍加以知為度翼方云凡邪病當服五邪湯九精丸瘥十黃散治五臟六腑血氣少亡魂失魄五臟覺不安忽忽喜悲心中善恐怖如有鬼物此皆發於大驚及當風從高墜下落水所致悉主之方雄黃人參各五分黃芩大黃黃柏黃耆細辛桂心各三分黃連黃昏蒲黃麻黃各一分黃環澤瀉山茱萸各二分上十五味治下篩未食溫酒服方寸匕日三不知加至二匕羸劣者更加人參五分一方有生黃三分崔氏有蜀椒五分乾薑四分別離散治男女風邪男夢見女女夢見男悲愁憂恚怒喜無常或半年數月一發動方桂心茵芋天雄菖蒲細辛茜根附子乾薑各一兩白朮桑寄生各三兩上十味治下篩酒服方寸匕日三凡修合勿令婦人雞犬及病者病者家人知見令邪氣不去禁之為驗四物鳶頭散治鬼魅方東海鳶頭即由跋根黃牙石一名金牙莨菪子防葵各一分上四味治下篩酒服方寸匕欲令病人見鬼加防葵一分欲令知鬼疰者復增一分立有驗防葵莨菪並令人迷惑恍惚如狂不可多服五邪湯治邪氣啼泣或歌或哭方禹餘糧防風桂心芍藥遠志獨活甘草人參白朮石膏牡蠣秦艽各二兩防己菖蒲茯神雄黃深師作黃丹蛇蛻皮各一兩上十七味㕮咀以水二斗煮取四升分四服亦可如煮散法服之茯神湯治五邪氣入人體中見鬼妄語有所見聞心悸跳動恍惚不定方茯神茯苓菖蒲人參各三兩赤小豆四合上五味㕮咀以水一斗煮取二升半分三服人參湯治風邪鬼氣往來發作有時或無時方人參防風烏頭乾薑栝蔞根翼作桔梗澤瀉豬脊遠志附子黃芩獨活各五分秦艽牡蠣山茱萸五味子前胡細辛石膏川芎蜀椒牛膝甘草石南桂心桑白皮麻黃竹皮白朮橘皮各十八銖鬼箭羽翼作澤蘭茯苓各二十銖大棗十六枚上三十二味㕮咀以水六升酒六升合煮取四升分五服日三夜二虎睛湯治狂邪發無常披髮大叫喚欲殺人不避水火方虎睛鴟頭露蜂房各一具茯苓桂心防風各三兩人參甘草天雄獨活各一兩石長生六分楓上寄生五分上十二味㕮咀以水一斗二升煮取三升分四服日三夜一又方防葵人參貫衆各五兩防風桂心各三兩上五味㕮咀以水一斗煮汁三升分四服稍服亦可治猝發狂方苦參五斤為末蜜和丸如酸棗大單服十丸治魅方水服鹿角末方寸匕日三又方水服獺肝末日三治狐貍諸色精魅作種種惡怪令人恐怖狂癲風邪方雄黃六斤油一斗二升上二味破雄黃如棋子並油納大鐺中以盆合頭作灶微火煎九日九夜不得少時火絶亦不是火冷須火熱微微不絶闢諸精魅神驗治風邪方商陸根三十斤去皮細切以水八斗東向灶煎減半去滓更煎令可丸如梧子大服一丸合時勿令人見更有莨菪方大豆紫湯皆可取汗出佳莨菪方見此篇前大豆紫湯見前三卷婦人門又方燒蝦蟆末水服方寸匕日三又方水服伏龍肝末方寸匕日三針灸法論曰凡諸百邪之病源起多途其有種種形相示表癲邪之端而見其病或有默默而不聲或復多言而漫說或歌或哭或吟或笑或眠坐溝渠啖食糞穢或裸形露體或晝夜遊走或嗔罵無度或是蜚蠱精靈手亂目急如斯種類癲狂之人今針灸與方藥並主治之凡占風之家亦以風為鬼斷扁鵲曰百邪所病針有十三穴凡針先從鬼宮起次針鬼信次至鬼壘又至鬼心針至五六穴即可知矣若是邪蠱之精便自言說論其由男從左起針女從右起針若數處不言便遍穴針也仍須依掌訣捻目而治之萬不失一黃帝掌訣別是術家祕要第一針人中名鬼宮從左邊下針右邊出第二針手大指爪甲下名鬼信入肉三分第三針足大趾爪甲下名鬼壘入肉二分第四針掌後橫紋名鬼心入肉半寸即太淵穴也第五針外踝下白肉際足太陽名鬼路火針七針針三下即申脈穴也第六針大椎上入髮際一寸名鬼枕火針七針針三下第七針耳前髮際宛宛中耳垂下五分名鬼床火針七針針三下第八針承漿名鬼市從左出右第九針手橫紋上三寸兩筋間名鬼路即勞宮穴也第十針直鼻上入髮際一寸名鬼堂火針七針針三下即上星穴也第十一針陰下縫灸三壯女人即玉門頭名鬼藏第十二針尺澤橫紋外頭接白肉際名鬼臣火針七針針三下即曲池穴也第十三針舌頭一寸當舌中下縫刺貫出舌上名鬼封仍以一板橫口吻安針頭令舌不得動以前若是手足皆相對針兩穴若是孤穴即單針之邪鬼妄語灸懸命十四壯穴在口唇里中央弦弦者是一名鬼祿又以剛力決斷絃乃佳邪病臥瞑瞑不自知風府主之一名鬼穴邪病大喚罵走灸十指端去爪一分一名鬼城邪病大喚罵走遠三里主之一名鬼邪邪病鬼癲四肢重囟上主之一名鬼門邪病四肢重痛諸雜候尺澤主之尺中動脈一名鬼受邪病語不止及諸雜候人中主之一名鬼客廳倉公法狂癇不識人癲病眩亂灸百會九壯狂走掣瘲灸玉枕上三寸一法項後一寸灸百壯狂邪鬼語灸天窗九壯狂走癲疾灸頂後二寸十二壯或灸大幽百壯狂言恍惚灸天樞百壯狂走癲癇灸季肋端三十壯或灸河口五十壯穴在腕後陷中動脈是狂癇哭泣灸手逆注三十壯穴在左右手腕後六寸狂癲風癇吐舌灸胃脘百壯狂邪發無常披髮大喚欲殺人不避水火及狂言妄語灸間使三十壯穴在腕後五寸臂上兩骨間亦治驚恐歌哭狂走喜怒悲泣灸臣覺一作巨攪穴在背上胛內側反手所不及骨芒穴上捻之痛者是也隨年壯狂邪鬼語灸伏兔百壯悲哭鬼語灸天府五十壯悲泣邪語鬼忙歌哭灸慈門五十壯狂邪驚癇灸承命三十壯穴在內踝後上行三寸動脈上狂癲風驚厥逆心煩灸巨陽五十壯狂癲鬼語灸足太陽四十壯狂走驚恍惚灸足陽明三十壯狂癲癇易疾灸足少陽隨年壯狂走癲厥如死人灸足大趾三毛中九壯一云灸大敦狂走易罵灸八會穴在陽明下五分隨年壯狂癲驚走恍惚嗔喜笑罵歌哭鬼語悉灸腦戶風池手陽明太陽太陰足陽明陽蹺少陽太陰陰蹺足跟皆隨年壯驚怖心忪少力灸大橫五十壯狂瘋罵詈撾斫人名為熱陽風灸兩吻邊燕口處赤白際各一壯又灸陰囊縫三十壯令人正臥核卵上灸之勿近前中卵恐傷陽氣也狂走刺人或欲死罵詈不息稱神鬼語灸口吻頭赤白際一壯又灸兩肘屈中五壯又灸背胛中間三壯報灸之倉公法神效鬼魅灸入發一寸百壯又灸間使手心各五十壯狐魅合手大指縛灸合間三七壯當狐鳴即瘥猝狂言鬼語以甑帶急合縛定兩手大指便灸左右脅下對屈肋頭兩處火齊起各七壯須臾鬼自道姓名乞去徐徐問之乃解其手猝中邪魅恍惚振噤灸鼻下人中及兩手足大指爪甲本令艾丸半在爪上半在肉上各七壯不止十四壯炷如雀屎大風邪灸間使隨年壯又灸承漿七壯又灸心俞七壯又灸三里七壯猝狂鬼魘針其足大拇趾爪甲下入少許即止風虛驚悸第六方二十三首遠志湯治心氣虛驚悸善忘不進食補心方遠志乾薑白朮桂心黃耆紫石英各三兩人參茯苓甘草芎藭茯神當歸羌活防風各二兩麥門冬半夏各四兩五味子二合大棗十二枚上十八味㕮咀以水一斗三升煮取三升半分五服日三夜二又方治中風心氣不足驚悸言語謬誤恍惚憒憒心煩悶耳鳴方遠志黃耆茯苓甘草芍藥當歸桂心一方無麥門冬人參各二兩附子一兩獨活四兩生薑五兩上十二味㕮咀以水一斗二升煮取四升每服八合羸人服五合日三夜一茯神湯治風經五臟大虛驚悸安神定志方茯神防風各三兩人參遠志甘草龍骨桂心獨活各二兩白朮一兩酸棗一升細辛乾薑各六兩上十二味㕮咀以水九升煮取三升分三服又方治風虛滿頸項強心氣不定不能食方茯神麥門冬各四兩人參遠志羌活當歸甘草紫石英五味子各一兩半夏黃耆防風各三兩酸棗三升生薑五兩上十四味㕮咀以水一斗三升煮棗仁至一斗去棗納余藥煎取三升半每服七合日三夜二補心湯治心氣不足病苦驚悸汗出心中煩悶短氣喜怒悲憂悉不自知常苦咽喉痛口唇黑嘔吐血舌本強不通水漿方紫石英人參茯苓遠志當歸茯神深師作桂紫菀甘草各二兩麥門冬一升赤小豆三合大棗三十枚上十一味㕮咀以水一斗二升煮取三升分三服又方治心氣不足多汗心煩喜獨語多夢不自覺咽喉痛時吐血舌本強水漿不通方紫石英人參茯苓桂心各二兩麥門冬三兩紫菀甘草各一兩赤小豆二十四枚大棗七枚上九味㕮咀以水八升煮取二升半分三服春夏服佳又方治奄奄忽忽朝瘥暮劇驚悸心中憧憧胸滿不下食陰陽氣衰脾胃不磨不欲聞人聲定志下氣方人參茯苓遠志甘草枳實當歸龍齒桔梗各三兩半夏桂心各五兩黃耆四兩茯神二兩生薑六兩大棗二十枚上十四味㕮咀以水一斗二升先煮粳米五合令熟去滓納諸藥煮取四升分服八合日三夜二又方治心氣不足心痛驚恐方遠志蒲黃一方用菖蒲人參茯苓各四兩上四味㕮咀以水一斗煮取三升半分三服又方治心氣不足腹背相引痛不能俯仰方茯神遠志黃芩乾地黃麥門冬石膏各四兩半夏桂心附子生薑各二兩甘草阿膠糖各一兩大棗三十枚上十四味以十二味㕮咀水一斗煮取三升去滓納糖及膠更煎取二升二合分三服此方與前心虛實篇大補心湯相重分兩不同小定心湯治虛羸心氣驚弱多魘方茯苓四兩桂心三兩甘草芍藥乾薑人參遠志各二兩大棗十五枚上八味㕮咀以水八升煮取三升分四服日三夜一大定心湯治心氣虛悸恍惚多忘或夢驚魘志少不足方人參茯苓茯神遠志赤石脂龍骨乾薑當歸甘草白朮芍藥桂心紫菀防風各二兩大棗二十枚上十五味㕮咀以水一斗二升煮取三升半分五服日三夜二治驚勞失志方甘草桂心各二兩龍骨防風麥門冬牡蠣遠志各一兩茯神五兩大棗二十枚上九味㕮咀以水八升煮取三升分二服相去如人行九里久再進荊瀝湯治心虛驚悸不定羸瘦病方荊瀝三升茯神白蘚皮各三兩人參二兩白銀十兩以水一斗煮取二升上五味㕮咀以荊瀝銀汁中煮取一升四合分三服相去如人行十里久進一服又方荊瀝二升緩火煎取一升六合分溫四服日三夜一又方單用荊瀝煮服功力尤專鎮心湯治風虛勞冷心氣不足善忘恐怖神志不定方防風當歸大黃各五分麥門冬五兩澤瀉大豆黃卷白蘞各四分菖蒲人參桔梗遠志桂心薯蕷石膏各三分乾薑茯苓紫菀各一兩甘草白朮各十分附子茯神各二兩秦艽六分粳米半升大棗十五枚上二十四味㕮咀以水一斗二升先煮粳米令熟去滓納諸藥煮取四升分服日三夜一翼方不用粳米蜜丸如梧子酒服十丸加至二十丸大鎮心散治心虛驚悸夢寐恐畏方紫石英茯苓防風人參甘草澤瀉各八分黃耆白朮薯蕷秦艽白蘞各六分麥門冬當歸各五分桔梗大豆黃卷柏子仁桂心遠志大黃石膏各四分乾薑蜀椒芍藥細辛各三分上二十四味治下篩酒服三方寸匕日三一方無紫石英茯苓澤瀉乾薑有大棗四分蜜丸如梧子大酒下十五丸又方治風虛心氣驚弱恍惚失常忽嗔恚悲志意不樂方紫石英白石英硃砂龍齒乾地黃一本無人參白朮茯苓桂心乾薑天雄附子細辛防風遠志各三兩上十五味治下篩酒服兩方寸匕日三小鎮心散治心氣不足虛悸恐畏悲思恍惚心神不定惕惕然驚者方人參白朮遠志附子桂心黃耆細辛乾薑乾地黃赤小豆龍齒防風菖蒲各二兩茯苓四兩上十四味治下篩酒服二方寸匕日三鎮心丸治男子婦人虛損夢寤驚悸或失精神婦人赤白注漏或月水不利風邪鬼疰寒熱往來腹中積聚憂恚結氣諸病方紫石英茯苓菖蒲肉蓯蓉麥門冬遠志大黃當歸細辛大豆黃卷卷柏乾薑各五分人參丹參防風秦艽澤瀉各六分柏子仁芍藥石膏各三分烏頭桂心桔梗甘草薯蕷前胡白蘞鐵精銀屑牛黃各二分白朮半夏各三分䗪蟲十二枚乾地黃十二分大棗五十枚上三十五味為末蜜棗和搗五千杵丸如梧子酒服五丸日三加至二十丸一本無豆卷大棗大鎮心丸治同前凡是心病悉主之方乾地黃六分牛黃五分一用牛膝羌活桂心秦艽芎藭人參遠志麥門冬丹砂阿膠甘草大黃紫石英銀屑白蘞當歸乾薑防風各八分杏仁蜀椒各五分澤瀉黃耆大豆黃卷茯苓薯蕷茯神前胡柏子仁鐵精各五分桑螵蛸十一枚大棗四十枚上三十二味為末白蜜棗和丸酒服七丸日三加至二十丸小鎮心丸治心氣少弱驚虛振悸胸中逆氣魘夢參錯謬忘恍惚方紫石英硃砂茯神銀屑雄黃菖蒲人參桔梗乾薑遠志甘草當歸桂心各二兩防風防己細辛鐵精各一兩上十七味為末蜜丸如大豆飲服十丸日三加至二十丸一方有茯苓二分為十八味定志小丸治心氣不定五臟不足甚者憂愁悲傷不樂忽忽善忘朝瘥暮劇暮瘥朝發狂眩者方人參茯苓各三兩菖蒲遠志各二兩上四味為末蜜丸如梧子大飲服七丸日三加茯神為茯神丸散服之亦佳紫石英酒治久風虛冷心氣不足或時驚怖方紫石英一斤鍾乳防風遠志桂心各四兩麻黃茯苓白朮甘草各三兩上九味㕮咀以酒三斗春漬三日每服四合日三亦可至醉常令有酒氣好忘第七方十六首枕中方常服令人大聰龜甲龍骨菖蒲遠志上四味等分治下篩酒服方寸匕日三治多忘令人不忘方菖蒲二分遠志七分茯苓茯神人參各五分上五味治下篩酒服方寸匕日二夜一五日後智神良開心散治好忘方菖蒲一兩遠志人參各十分茯苓二兩上四味治下篩飲服方寸匕日三又方菖蒲遠志茯苓各三分續斷肉蓯蓉各二兩上五味治下篩酒服方寸匕日三至老不忘菖蒲益智丸治善忘恍惚破積聚止痛安神定志聰耳明目方菖蒲附子遠志人參桔梗牛膝各五分茯苓七分桂心三分上八味為末蜜丸如梧子一服七丸加至二十丸日二夜一禁如藥法養命開心益智方乾地黃人參茯苓各二兩遠志肉蓯蓉菟絲子各三兩蛇床子二分上七味治下篩服方寸匕日二忌食兔肉余無忌八味散方天門冬六分桂心茯苓各一兩乾地黃四分菖蒲遠志石葦五味子各三分上八味治下篩後食酒或水服方寸匕三十日力倍六十日氣力強志意足治健忘方天門冬遠志茯苓乾地黃上四味等分為末蜜丸如梧子大酒服二十丸日三加至三十丸常服勿絶治好忘久服聰明益智方龍骨虎骨遠志等分上三味治下篩食後服方寸匕日二又方七月七日取菖蒲酒服三方寸匕飲酒不至醉又方常以甲子日取石上菖蒲一寸九節者陰乾百日治下篩服方寸匕日三耳目聰明不忘出衢州石橋寺南山又方七月七日麻勃一升人參三兩為末蒸令氣遍臨夜臥服一刀圭盡知四方之事又方戊子日取東邊桃枝二七枚縛著臥床中枕之不忘又方常以五月五日日未出時取東向桃枝作三寸木人著衣帶中令人不忘又方丁酉日自往市買遠志裹著衣中角頭還作末服之不復忘治人心昏塞多忘易誤方七月七日取蜘蛛網著衣領中勿令人知不忘
