草有芍藥治天行熱病生疱瘡疼痛及解肌出汗治時病表裡大熱欲死方大黃寒水石芒硝石膏升麻麻黃葛根各等分上八味治下篩水服方寸匕日三發汗湯第五例一首方十九首例曰大法春夏宜發汗凡發汗欲令手足皆周至漐漐然一時間許益佳但不可如水流離霢霂耳若病不解當更重發汗汗出多則亡陽陽虛不可重發汗也凡服湯藥發汗中病便止不必盡劑也凡云可發汗而無湯者丸散亦可用要以汗出為解然不及湯隨證良驗凡病無故自汗出復發其汗愈衛復和故也夫脈浮者病在外可發汗宜桂枝湯夫脈浮大而數者亦可發汗宜桂枝湯夫病常自汗出者此為營氣和營氣和而外不解此為衛氣不和也營行脈中衛行脈外復發其汗衛和則愈宜桂枝湯夫病人臟無他病時時發熱自汗出而不愈者此衛氣不和故也先其時發汗則愈宜桂枝湯太陽病發熱汗出者此為營弱衛強故令汗出欲救邪風宜桂枝湯太陽病頭痛發熱汗出惡風寒宜桂枝湯太陽病下之微喘者表未解也宜桂枝加厚朴杏仁湯太陽病外證未解者不可下宜桂枝湯太陽病先發其汗不解而復下之其脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解表則愈宜桂枝湯太陽病下之氣上衝者可與桂枝湯不上衝不可與凡桂枝本為解肌若脈浮緊發熱無汗者勿與之常知此勿誤也桂枝湯治中風其脈陽浮而陰弱陽浮者熱自發陰弱者汗自出澀澀惡風淅淅惡寒翕翕發熱鼻鳴乾嘔方桂枝芍藥生薑各三兩甘草二兩大棗十二枚上五味㕮咀三物切薑擘棗以水七升煮棗令爛去滓乃納諸藥水少者益之煮令微沸得三升去滓服一升日三小兒以意減之初服少多便得汗出者小闊其間不得汗者小促其間令藥勢相及汗出自護如法特須避風病若重宜夜服若服一劑不解病證不變者當復服之至有不肯汗出服兩三劑乃愈服此藥食頃飲熱粥以助藥力麻黃湯治傷寒頭及腰痛身體骨節疼發熱惡寒不汗而喘方麻黃三兩桂枝甘草各一兩杏仁七十枚喘不甚用五十枚上四味㕮咀以水九升煮麻黃減二升去沫納諸藥煮取二升半絞去滓服八合覆令汗大青龍湯治中風傷寒脈浮緊發熱惡寒身體疼痛汗不出煩躁方麻黃六兩桂心甘草各二兩石膏如雞子一枚碎生薑三兩杏仁四十枚大棗十二枚上七味㕮咀以水九升煮麻黃去沫乃納諸藥煮取三升分服一升厚覆當大汗出溫粉粉之即止不可再服服之則筋惕肉瞤此為逆也不汗乃再服陽毒升麻湯治傷寒一二日便成陽毒或服藥吐下之後變成陽毒身重腰背痛煩悶不安狂言或走或見鬼或吐血下痢其脈浮大數面赤斑斑如錦文咽喉痛唾膿血五日可治至七日不可治宜服方升麻甘草各半兩當歸蜀椒雄黃桂心各六銖上六味㕮咀以水五升煮取二升半分三服如人行五里進一服溫覆手足毒出則汗汗出則解不解重作服之得吐亦佳仲景無桂心有鱉甲手大一片肘後與千金同古今録驗有梔子六銖鱉甲如手一片陰毒甘草湯治傷寒初起一二日便結成陰毒或服藥六七日以上至十日變成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數仲景云此陰毒之候身如被打五六日可治至七日不可治也方甘草升麻各半兩當歸蜀椒各六銖鱉甲一兩上五味㕮咀以水五升煮取二升半分三服如人行五里頃更進一服溫覆發汗毒當從汗出汗出則愈若不汗則不除重作服仲景方無蜀椒陰旦湯治傷寒肢節疼痛納寒外熱虛煩方芍藥甘草各二兩乾薑黃芩各三兩桂心四兩大棗十五枚上六味㕮咀以水一斗煮取五升去滓溫服一升日三夜二覆令小汗陽旦湯治傷寒中風脈浮發熱往來汗出惡風頭項強鼻鳴乾嘔桂枝湯主之隨病加減如下方以泉水一斗煮取四升分服一升日三自汗者去桂枝加附子一枚渴者去桂加栝蔞根三兩利者去芍藥桂加乾薑三纍附子一枚炮心下悸者去芍藥加茯苓四兩虛勞裡急正陽旦主之煎得二升納膠飴半斤為再服若脈浮緊發熱者不可與之六物解肌湯治傷寒發熱身體疼痛方葛根四兩茯苓三兩麻黃牡蠣生薑各二兩甘草一兩上六味㕮咀以水八升煮取三升分三服再服後得汗汗通即止古今録驗無生薑甘草解肌湯治傷寒溫病方葛根四兩麻黃一兩黃芩芍藥甘草各二兩大棗十二枚上六味㕮咀以水一斗煮取三升飲一升日三三四日不解脈浮者宜重服發汗脈沉實者宜以駃豉丸下之延年祕録有桂心一兩治疫氣傷寒三日以前不解者方香豉一升綿裹蔥白切一升童子小便三升上三味先熬豉蔥令相得則投小便煮取二升分再服徐徐服之覆令汗神驗治傷寒時氣溫疫頭痛壯熱脈盛始得一二日者方丹砂一兩末之以水一斗煮取一升頓服之覆取汗解肌升麻湯治時氣三四日不解方升麻芍藥石膏麻黃甘草各一兩杏仁三十枚貝齒三枚一作貝母十八銖上七味㕮咀以水三升煮取一升盡服溫覆發汗便愈葛根龍膽湯治傷寒三四日不瘥身體煩毒而熱方葛根八兩龍膽大青各半兩升麻石膏葳蕤各一兩甘草桂心芍藥黃芩麻黃各二兩生薑二兩上十二味㕮咀以水一斗煮葛根取八升納余藥煮取三升分四服日三夜一治傷寒四五日頭痛壯熱四肢煩疼不得飲食方梔子仁黃連黃柏大黃各半兩好豉一升蔥白七莖上六味㕮咀以水八升煮上四物六七沸納後蔥白豉煮得三升頓服一升日三服湯訖溫覆令汗出粉之得汗便止後服勿復取汗不得汗者復服重發此藥無忌特宜老小神良七物黃連湯治夏月傷寒四肢煩疼發熱其人喜煩嘔逆支滿劇如禍祟寒熱相搏故令喜煩方黃連茯苓黃芩各十八銖芍藥葛根各一兩甘草一兩六銖小麥三合上七味㕮咀以水七升煮取三升冷分三服不能一升者可稍稍服之湯勢安乃臥藥主毒氣服湯之後胸中熱及咽喉痛皆瘥明日復煮一劑如法服之此湯無毒但除熱下氣安病人小兒服者取三分之一以水四升煮得二升稍稍服之三匕湯治傷寒中風得之三日至七八日不解胸脅痛四肢逆乾嘔水漿不下腹中宿食不消重下血一日數十行方茯苓如雞子大黃芩人參各三兩栝蔞根四兩芒硝乾地黃各一升大黃麻黃寒水石各半斤上九味搗篩令相得以散三方寸匕水一升煮令三沸絞去滓服之日三溫覆汗出即愈病劇與六七匕五香麻黃湯治傷寒忽發腫或著四肢或在胸背虛腫浮如吹狀亦著頭面唇口頸項劇者偏著腳脛外如軸大而不痛不赤著四肢者乃欲不遂悉主之方麝香半兩薰陸香雞舌香各一兩沉香青木香麻黃防風獨活秦艽葳蕤甘草各二兩白薇枳實各二兩上十三味㕮咀以水九升煮取三升分三服覆取汗後外摩防己膏治傷寒三日外與前藥不瘥脈勢仍數者陽氣猶在經絡未入臟腑方桂枝黃芩甘草各二兩升麻葛根生薑各三兩芍藥六兩石膏八兩梔子二七枚上九味㕮咀以水九升煮取二升七合分三服相去十里久若前兩服訖即得汗後服即停不得汗更進一服得汗即止不得汗者明日去梔子加麻黃二兩足水二升再依方服雪煎治傷寒方麻黃十斤大黃一斤十三兩杏仁一斗四升上三味㕮咀以雪水五斛四斗漬麻黃於東向灶釜中三宿納大黃攪令調炊以桑薪煮得二斛去滓復納釜中搗杏仁納汁中復炊之可餘六七斗汁絞去滓置銅器中又以雪水三斗合煎之攪令調得二斗四升藥成可丸冷凝丸如彈丸有病者以三沸白湯五合研一丸入湯中適寒溫服之立汗出若不愈者復服一丸密盛藥勿泄氣發汗丸第六方二首神丹丸治傷寒敕澀惡寒發熱體疼者方附子烏頭各四兩人參茯苓半夏各五兩硃砂一兩上六味末之蜜丸以真丹為色先食服如大豆二丸生薑湯下日三須臾進熱粥二升許重覆出汗止若不得汗汗少不解復服如前法若得汗足應解而不解者當服桂枝湯此藥多毒熱者令飲水寒者溫飲解之治瘧先發服二丸要略用細辛不用人參別有射罔棗大一枚名赤丸主寒氣厥逆麥奴丸治傷寒五六日以上不解熱在胸中口噤不能言惟欲飲水為壞傷寒醫所不能治成為死人精魂已竭心下才溫以杖發其口開灌藥咽中藥得下即愈麥奴丸一曰黑奴丸二曰水解丸釜底墨灶突墨梁上塵麥奴黃芩大黃芒硝各一兩麻黃二兩上八味末之蜜丸如彈子大以新汲水五合研一丸破漬置水中當藥消盡服之病者渴欲飲水極意不問升數欲止復強飲能多飲為善不欲飲水當強飲服藥須臾當寒寒竟汗出便解若服藥日移五尺許不汗復服如前法不過再三服佳小麥黑勃名麥奴宜吐第七例一首方二首例曰大法春宜吐凡服吐藥中病便止不必盡劑也病如桂枝證頭不痛項不強而脈寸口浮胸中硬滿氣上衝咽喉不得息者此以內有久痰宜吐之病胸上諸寒胸中鬱郁而痛不能食欲得使人按之反有涎出下利日十餘行而其人脈遲寸脈微滑者此宜吐之吐之利即止少陰病飲食入口即吐心中慍慍然欲吐復不能吐者宜吐之宿食在上脘宜吐之病手足逆冷脈乍結者客氣在胸中心下滿而煩飢不能食者以病在胸中宜吐之瓜蒂散病如桂枝證頭不痛項不強寸脈微浮胸中痞堅氣上衝咽喉不得息者此為胸有寒也宜吐之方瓜蒂赤小豆各一兩上二味治下篩取一錢匕香豉一合熟湯七合煮作稀粥去滓取汁和散溫頓服之不吐者少少加得快吐乃止張文仲以白湯三合和服水道散治時氣病煩熱如火狂言妄語欲走方甘遂半兩白芷二兩大黃四兩厚朴八兩枳實五枚芒硝三合上六味㕮咀以水一斗先煮厚朴枳實取五升去滓納大黃煎取二升去滓下芒硝更煎一兩沸分再服得快利止宜下第八方八首大承氣湯治熱盛腹中有燥屎讝語者方大黃四兩厚朴八兩枳實五枚芒硝五合上四味㕮咀以水一斗先煮二物取五升去滓納大黃煎取二升去滓納芒硝更上微火一二沸分溫再服得下余勿服抵當丸下血方水蛭虻蟲各二十枚桃仁二十二枚大黃三兩上四味為末蜜和合分為四丸以水一升煮一丸取七合頓服之晬時當下血不下更服抵當湯治同前水蛭虻蟲各三十枚桃仁二十三枚大黃三兩上四味㕮咀以水五升煮取三升去滓服一升不下更服承氣湯方枳實五枚芒硝半斤大黃四兩甘草二兩上四味㕮咀以水五升煮取二升去滓適寒溫分三服如人行五里進一服取下利為度若不得利盡服之生地黃湯治傷寒有熱虛羸少氣心下滿胃中有宿食大便不利方生地黃三斤大黃四兩甘草一兩芒硝二合大棗二枚上五味合搗令相得蒸五升米下熟絞汁分再服大柴胡加葳蕤知母湯治傷寒七八日不解默默心煩腹中有干屎讝語方柴胡半斤葳蕤知母各二兩大黃甘草各一兩人參黃芩芍藥各三兩生薑五兩半夏半升上十味㕮咀以水一斗煮取三升去滓服一升日三取下為效集驗用枳實四枚不用芍藥治傷寒頭痛壯熱百節疼痛方柴胡梔子仁芍藥知母各四兩升麻黃芩大青杏仁各三兩石膏八兩香豉一升上十味㕮咀以水九升煮取二升七合分溫三服若熱盛加大黃四兩駃豉丸治傷寒留飲宿食不消方豉一升杏仁六十枚黃芩黃連大黃麻黃各四兩芒硝甘遂各三兩巴豆去油二百枚上九味為末以蜜和丸如大豆服二丸不得下者增之崔氏云此黃素方發汗吐下後第九脈證七首方十七首灸法一首傷寒已解半日許復心煩熱其脈浮數者可更發汗宜桂枝湯凡發汗後飲水者必喘宜慎也竹葉湯治發汗後表裡虛煩不可攻者但當與此方竹葉二把半夏半升麥冬一斤人參甘草各二兩生薑四兩石膏一斤上七味㕮咀以水一斗煮取六升去滓納粳米半升米熟去之分服一升日三張文仲不用生薑桂枝麻黃湯服桂枝湯大汗後脈洪大者與桂枝湯若形如瘧一日再發汗出便解者屬桂枝二麻黃一湯方桂枝一兩十七銖麻黃十六銖芍藥生薑各一兩六銖甘草一兩二銖杏仁十六枚大棗五枚上七味㕮咀以水五升煮麻黃再沸去沫納諸藥煮取二升適寒溫分再服取微汗而已小青龍湯治傷寒表未解心下有水氣乾嘔發熱而咳或渴或痢或噎或小便不利小腹滿或喘者方桂心麻黃甘草乾薑芍藥細辛各三兩五味子半夏各半兩上八味㕮咀以水一斗煮麻黃減二升去上沫納諸藥煮取三升分三服相去十里許復服之若渴者去半夏加栝蔞根三兩若微痢去麻黃加蕘花如一雞子大熬令赤色若噎加附子一枚若小便不利小腹滿者去麻黃加茯苓四兩若喘去麻黃加杏仁半升數用神效四物甘草湯治傷寒發汗出而喘無大熱與此方甘草二兩麻黃四兩石膏半斤杏仁五十枚上四味㕮咀以水七升先煮麻黃去沫令減二升納諸藥煎取三升分三服梔子湯治發汗若下後煩熱胸中窒氣逆搶心者方梔子十四枚香豉四合綿裹上二味以水四升先煮梔子取二升半次納豉煮取一升半分二服溫進一服得快吐止後服厚朴湯治發汗後腹脹滿方厚朴八兩人參一兩甘草二兩生薑八兩半夏半升上五味㕮咀以水一斗煮取三升分三服玄武湯治太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地方茯苓芍藥生薑各三兩白朮二兩附子一枚上五味㕮咀以水八升煮取二升溫服七合葛根黃連湯治太陽病反下之利遂不止脈促者表未解喘而汗出者方葛根半斤黃連黃芩各三兩甘草二兩上四味㕮咀以水八升先煮葛根減二升納諸藥煮取二升去滓分再服茯苓湯治傷寒發汗吐下後心下逆滿氣上衝胸起即頭眩其脈沉緊發汗則動經身為振搖者方茯苓四兩白朮桂心各三兩甘草二兩上四味㕮咀以水六升煮取三升去滓分三服大陷胸丸治結胸病項亦強如柔痙狀下之即和方大黃八兩芒硝杏仁熬葶藶各五兩上四味搗篩大黃葶藶餘二味別研如脂和散取如彈丸大一枚甘遂末一錢匕白蜜二合水一升煮取八合溫頓服之病乃自下如不下更服取下為效傷寒六七日結胸熱實其脈沉緊心下痛按之正堅宜大陷胸湯太陽病重發汗而復下之不大便五六日舌上干而渴日晡小有潮熱心胸大煩從心下至小腹堅滿而痛不可近其方如下大陷胸湯甘遂末一錢匕大黃切六兩芒硝一升上三味以水六升先煮大黃取二升去滓納芒硝一沸次納甘遂分再服一服得快利止後服生薑瀉心湯治傷寒發汗後胃中不和心下痞堅乾噫食臭脅下有水氣腹中雷鳴下利者方生薑四兩甘草人參黃芩各三兩乾薑黃連各一兩半夏半升大棗十二枚上八味㕮咀以水一斗煮取六升去滓分服一升日三甘草瀉心湯治傷寒中風醫反下之其人下痢日數十行穀不化腹中雷鳴心下痞堅結滿乾嘔心煩不能得安師見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆使之然也宜治之方甘草四兩黃芩乾薑各二兩黃連一兩半夏半升大棗十二枚上六味㕮咀以水一斗煮取六升去滓分服一升日三白虎湯治傷寒吐下後七八日不解結熱在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者方石膏一升知母六兩甘草二兩粳米六合上四味㕮咀以水一斗煮米熟去滓分服一升日三諸亡血及虛家不可與白虎湯若立夏後至立秋前得用之立秋後不可服春三月尚凜冷亦不可與之與之則嘔利腹痛傷寒無大熱而口乾渴心煩背微惡寒宜服白虎湯傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證宜白虎湯若渴欲飲水口燥舌乾者宜白虎湯青葙子丸治傷寒後結熱在內煩渴者方青葙子五兩黃芩栝蔞根苦參各一兩黃柏二兩龍膽梔子仁黃連各三兩上八味為末蜜丸如梧子大先食服七丸日三不知稍加一本云餳和為丸大青湯治傷寒熱病十日以上發汗不解及吐下後諸熱不除及下痢不止斑出皆治之方大青四兩甘草阿膠各二兩豆豉一升上四味㕮咀以水八升煮取三升去滓煮三沸去豉納阿膠令煬頓服一升日三服欲盡復作常使有餘渴者當飲但除熱止吐下無毒深師治勞復肘後有赤石脂三兩胡洽集驗同治傷寒後不了了朝夕有熱如瘧狀方知母二兩麻黃甘草芍藥黃芩桂心各一兩上六味㕮咀以水七升煮取二升半服五合日三溫覆令微汗若心煩不得眠其人欲飲水當稍稍飲之令胃中和則愈灸法初得病或先頭痛身寒熱或澀澀欲守火或腰背強直面目如飲酒狀此傷寒初得一二日但烈火灸心下三處第一處去心下一寸名巨闕第二處去心下二寸名上脘第三處去心下三寸名胃脘各灸五十壯然或人形大小不同恐寸數有異可繩度隨其長短寸數最佳取繩從心頭骨名鳩尾頭度取臍孔中屈繩取半當繩頭名胃脘又中屈半繩更分為二分從胃脘向上度一分即是上脘又上度取一分即是巨闕大人可灸五十壯小兒可三壯亦隨其年灸之大小以意斟量也若病者三四日以上宜先灸胸上二十壯以繩度鼻正上盡髮際中屈繩斷去半便從髮際入發中灸繩頭名天聰又灸兩顳顬又灸兩風池又灸肝俞百壯余處各二十壯又灸太衝三十壯神驗
