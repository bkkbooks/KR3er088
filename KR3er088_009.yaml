body:
  text: 卷九傷寒方上凡九類傷寒例第一論三首論曰易稱天地變化各正性命然則變化之迹無方性命之功難測故有炎涼寒懊風雨晦冥水旱妖災蟲蝗怪異四時八節種種施化不同七十二候日月運行各別終其晷度方得成年是謂歲功畢矣天地尚且如然在人安可無事故人生天地之間命有遭際時有否泰吉凶悔吝苦樂安危喜怒愛憎存亡憂畏關心之慮日有千條謀身之道時生萬計乃度一日是故天無一歲不寒暑人無一日不憂喜故有天行溫疫病者即天地變化之一氣也斯蓋造化必然之理不得無之故聖人雖有補天立極之德而不能廢之雖不能廢之而能以道御之其次有賢人善於攝生能知撙節與時推移亦得保全天地有斯瘴癘還以天地所生之物以防備之命曰知方則病無所侵矣然此病也俗人謂之橫病多不解治皆云日滿自瘥以此致枉者天下大半凡始覺不佳即須救療迄至於病愈湯食競進折其毒勢自然而瘥必不可令病氣自在恣意攻人拱手待斃斯為誤矣今博採群經以為上下兩卷廣設備擬好養生者可得詳焉小品曰古今相傳稱傷寒為難治之疾時行溫疫是毒病之氣而論治者不判傷寒與時行溫疫為異氣耳云傷寒是雅士之辭天行溫疫是田舍間號耳不説病之異同也考之衆經其實殊矣所宜不同方説宜辨是以略述其要經言春氣溫和夏氣暑熱秋氣清涼冬氣冰冽此四時正氣之序也冬時嚴寒萬類深藏君子周密則不傷於寒或觸冒之者乃為傷寒耳其傷於四時之氣皆能為病而以傷寒為毒者以其最為殺癘之氣也中而即病名曰傷寒不即病者其寒毒藏於肌骨中至春變為溫病至夏變為暑病暑病熱極重於溫也是以辛苦之人春夏多溫病熱病者皆由冬時觸冒寒冷之所致非時行之氣也凡時行者是春時應暖而反大寒夏時應熱而反大冷秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中病無長少多相似者此則時行之氣也傷寒之病逐日深淺以施方治今世人得傷寒或始不早治或治不主病或日數久淹困乃告師師苟依方次第而療則不中病皆宜臨時消息制方乃有效耳華他曰夫傷寒始得一日在皮當摩膏火炙之即愈若不解者二日在膚可依法針服解肌散發汗汗出即愈若不解至三日在肌復一發汗即愈若不解者止勿復發汗也至四日在胸宜服藜蘆丸微吐之則愈若病困藜蘆丸不能吐者服小豆瓜蒂散吐之則愈也視病尚未醒醒者復一法針之五日在腹六日入胃入胃乃可下也若熱毒在外未入於胃而先下之者其熱乘虛入胃即爛胃也然熱入胃要須下去之不可留於胃中也胃若實熱為病三死一生皆不愈胃虛熱入爛胃也其熱微微者赤斑出此候五死一生劇者黑斑出者此候十死一生但論人有強弱病有難易得效相倍也得病無熱但狂言煩躁不安精彩言語不與人相主當者勿以火迫之但以豬苓散一方寸匕服之當逼與新汲水一升若二升強飲之令以指刺喉中吐之病隨手愈若不能吐者勿強與水水停則結心下也當更以余藥吐之皆令相主不爾更致危矣若此病輩不時以豬苓散吐解之者其死殆速耳亦可先以去毒物及法針之尤佳夫飲膈實者此皆難治此三死一生也病者過日不以時下則熱不得泄亦胃爛斑出春夏無大吐下秋冬無大發汗發汗法冬及始春大寒時宜服神丹丸亦可摩膏火炙若春末及夏月始秋此熱月不宜火炙及重覆宜服六物青散若崔文行度瘴散赤散雪煎亦善若無丸散及煎者但單煮柴胡數兩傷寒時行亦可服以發汗至再三發汗不解當與湯實者轉下之其脈朝夕快者為澼實也朝平夕快者非澼也轉下湯為可早與但當少與勿令大下耳少與當數其間也諸虛煩熱者與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脈不緊數故知非裡實不可下也如此內外皆不可攻而強攻之必遂損竭多死難全也此虛煩但當與竹葉湯若嘔者與橘皮湯一劑不愈為可重與也此法數用甚有效驗傷寒後虛煩亦宜服此湯王叔和曰夫陽盛陰虛外臺作表和里病汗之則死下之則愈陽虛陰盛外臺作里和表病下之則死汗之則愈夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治外臺作表裡之治相背千里吉凶之機應若影響然則桂枝下咽陽盛則斃外臺作表和則斃承氣入胃陰盛以亡外臺作里平以亡若此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹不知不識病者殞沒自謂其分至令冤魂塞於冥路夭死盈於曠野仁愛鑑茲能不傷楚夫傷寒病者起自風寒入於腠理與精氣分爭營衛痞隔周行不通病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒腰背強重此邪氣在表發汗則愈三日以上氣浮在上部填塞胸心故頭痛胸中滿當吐之則愈五日以上氣沉結在臟故腹脹身重骨節煩疼當下之則愈明當消息病之狀候不可亂投湯藥虛其胃氣也經言脈微不可吐虛細不可下又夏月亦不可下也此醫之大禁也脈有沉浮轉能變化或人得病數日方以告醫雖云初覺視病已積日在身其疹瘵結成非復發汗解肌所除當診其脈隨時形勢救解求免也不可苟以次第為固失其機要乃致禍矣此傷寒次第病三日以內發汗者謂當風解衣夜臥失覆寒溫所中並時有疾疫賊風之氣而相染易為惡邪所中也至於人自飲食生冷過多腹藏不消轉動稍難頭痛身溫其脈實大者便可吐下之不可發汗也陳廩丘云或問得病連服湯藥發汗汗不出如之何答曰醫經云連發汗汗不出者死病也吾思也可蒸之如蒸中風法熱溫之氣於外迎之不得不汗出也後以問張苗苗云曾有人做事疲極汗出臥單簟中冷得病但苦寒踡諸醫與丸散湯四日之內凡八過發汗汗不出苗令燒地布桃葉蒸之即得大汗於被中就粉敷身使極燥乃起便愈後數以此發汗汗皆出也人性自有難汗出者非唯病使其然也蒸之則無不汗出也諸病發熱惡寒脈浮洪者便宜發汗溫粉粉之勿令遇風當發汗而其人適失血及大下利則不可大汗也數少與桂枝湯使體潤漐漐汗出連日當自解也論曰凡人有少苦似不如平常即須早道若隱忍不治冀望自瘥須臾之間以成痼疾小兒女子益以滋甚若時氣不和當自戒謹若小有不和即須治療尋其邪由及在腠理以時早治鮮不愈者患人忍之數日乃説邪氣入臟則難可制止雖和緩亦無能為也癰疽疔腫喉痹客忤尤為其急此自養生之要也凡作湯藥不可避晨夜時日吉凶覺病須臾即宜便治不等早晚則易愈矣服藥當如方法若縱意違師不須治之也凡傷寒多從風寒得之始表中風寒入里則不消矣未有溫覆而當不消也凡得時氣病五六日而渴欲飲水飲不能多不當與也所以爾者腹中熱尚少不能消之便更為人作病矣若至七八日大渴欲飲水者猶當依證而與之與之勿令極意也言能飲一斗者與五升若飲而腹滿小便澀若喘若噦不可與之忽然大汗出者欲自愈也人得病能飲水欲愈也凡溫病可針刺者五十九穴又身之穴六百五十有五其三十六穴灸之有害七十九穴刺之為災論曰夫尋方學之要以救速為貴是以養生之家常須預合成熟藥以備倉卒之急今具之於下闢溫第二方三十三首濕𧈟病證條屠蘇酒闢疫氣令人不染溫病及傷寒之方大黃十五銖白朮桂心各十八銖桔梗蜀椒各十五銖烏頭六銖菝葜十二銖上七味㕮咀絳袋盛以十二月晦日日中懸沉井中令至泥正月朔旦平曉出藥置酒中煎數沸於東向戶中飲之屠蘇之飲先從小起多少自在一人飲一家無疫一家飲一里無疫飲藥酒得三朝還滓置井中能仍歲飲可世無病當家內外有井皆悉著藥闢溫氣也一方有防風一兩又正月旦取東行桑根如指大長七寸以丹塗之懸門戶上又令人帶之又方正旦吞麻子赤小豆各二七粒又以二七粒投井中又方常以七月七日閣家吞赤小豆向日吞二七枚又方七月七日男吞大豆七枚女吞小豆二七枚又方神仙教人立春後有庚子日溫蕪菁菹汁合家大小並服不限多少太乙流金散闢溫氣方雄黃三兩雌黃二兩礬石一兩半鬼箭羽一兩半即衛茅羖羊角燒二兩上五味治下篩三角絳袋盛一兩帶心前並挂門戶上若逢大疫之年以月旦青布裹一刀圭中庭燒之溫病人亦燒熏之雄黃散闢溫氣方雄黃五兩硃砂菖蒲鬼臼各二兩上四味治下篩以塗五心額上鼻人中及耳門殺鬼燒藥方闢溫氣雄黃丹砂雌黃各一斤羚羊角羖羊角亦得蕪荑虎骨鬼臼鬼箭羽野丈人即白頭翁石長生猳豬屎馬懸蹄各三兩青羊脂菖蒲白朮各八兩蜜蠟八斤上十六味末之以蜜蠟和為丸如彈許大朝暮及夜中戶前微火燒之虎頭殺鬼丸闢溫方虎頭五兩硃砂雄黃雌黃各一兩半鬼臼皂莢蕪荑各一兩上七味末之以蜜蠟和為丸如彈子大絳袋盛係臂男左女右懸屋四角晦望夜半中庭燒一丸闢溫殺鬼丸熏百鬼惡氣方雄黃雌黃各二兩龍骨龜甲鯪鯉甲蝟皮各三兩羖羊角虎骨各七兩樗雞十五枚空青一兩芎藭真珠各五兩東門上雞頭一兩上十三味末之煬蠟二十兩並手丸如梧子正旦門戶前燒一丸帶一丸男左女右闢百惡獨宿弔喪問病各吞一丸小豆大天陰大霧日燒一丸於戶牖前佳雄黃丸漢建寧二年太歲在酉疫氣流行死者極衆有書生丁季回從蜀青城山來東過南陽從西市門入見患疫癘者頗多遂於囊中出藥人各惠之一丸靈藥沾唇疾無不瘥市中疫鬼數百千餘見書生施藥悉皆驚怖而走乃有鬼王見書生謂有道法兼自施藥感衆鬼等奔走若是遂詣書生欲求受其道法書生曰吾無道法乃囊中之藥呈於鬼王鬼王睹藥驚惶叩頭乞命而走此方藥帶之入山能闢虎狼蟲蛇入水能除水怪蛟蜃雄黃雌黃曾青鬼臼真珠丹砂虎頭骨桔梗白朮女青川芎白芷鬼督郵蕪荑鬼箭羽藜蘆菖蒲皂莢各一兩上十八味末之蜜丸如彈子大絹袋盛男左女右帶之卒中惡病及時疫吞如梧子一丸燒彈大一丸戶內赤散闢溫疫氣傷寒熱病方藜蘆躑躅花各一兩丹皮皂莢各一兩六銖附子桂心真珠各一兩細辛乾薑各十八銖上九味末之納真珠合治之分一方寸匕置絳囊中帶之男左女右著臂自隨覺有病之時便以粟米大納著鼻中又酒服一錢匕覆取汗日三服當取一過汗耳又方凡時行疫癘常以月望日細銼東引桃枝煮湯浴之粉身散闢溫病常用方川芎白芷藁本各等分上三味治下篩納米粉中以粉身斷溫疫轉相染著乃至滅門延及外人無敢視者方赤小豆鬼箭羽鬼臼雄黃各二兩上四味末之以蜜和服如小豆一丸可與病人同床無妨預備一物柏枝散天氣不和疾疫流行方取南向社中柏東南枝曝令乾搗末酒服方寸匕神良治溫病令不相染方以桃樹中蠹屎末之水服方寸匕又方術豉等分酒漬服之妙又方赤豆一升新布袋盛納井中三日出舉家服二七枚又方松葉末之酒服方寸匕日三服治溫令不相染方新布袋盛大豆一升納井中一宿出服七枚又方白蜜和上色硃砂粉一兩以太歲日平旦大小勿食向東方立吞服三七丸如麻子大勿令齒近之併吞赤小豆七枚投井泉中治瘴氣方蒜五十子並皮碎之豉心一升上二味以三歲男兒尿二升煮五六沸去滓服之蒜疑蔥之誤又方青竹茹二升以水四升煮取三升分作三服治患霧氣者心內煩悶少氣頭痛項急起則眼眩欲倒身微熱戰掉不安時復憎寒心中欲吐吐時無物方新豬屎二升半納好酒一升攪令散以生布絞取汁更以綿濾頓服之取盡即地鋪暖臥覆蓋鋪前著火當汗出若得汗當細細去上衣勿使心寒寒即不瘥看汗自干乃起慎風冷亦治瘧