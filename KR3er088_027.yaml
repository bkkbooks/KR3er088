body:
  text: 卷二十七養性凡八類養性序第一夫養性者欲所習以成性性自為善不習無不利也性既自善內外百病自然不生禍亂災害亦無由作此養性之大經也善養性者則治未病之病是其義也故養性者不但餌藥餐霞其在兼於百行百行周備雖絶藥餌足以遐年德行不充縱服玉液金丹未能延壽故老子曰善攝生者陸行不遇虎兕此則道德之指也豈假服餌而祈遐年哉聖人所以製藥餌者以救過行之人也故愚者抱病歷年而不修一行纏疴沒齒終無悔心此其所以歧和長逝彭跗永歸良有以也嵇康曰養生有五難名利不去為一難喜怒不除為二難聲色不去為三難滋味不絶為四難神慮精散為五難五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不回其操不夭其年也五者無於胸中則信順日躋道德日全不祈善而有福不求壽而自延此養生之大旨也然或有服膺仁義無甚泰之纍者抑亦其亞歟黃帝問於岐伯曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作皆衰者時代異耶將人失之也岐伯曰上古之人其知道者法則陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人則不然以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教也下皆為之虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來是以其志閒而少欲其心安而不懼其形勞而不倦氣從以順各從其欲皆得所願故甘其食美其服樂其俗高下不相慕故其民曰朴是以嗜欲不能勞其目淫邪不能惑其心愚智賢不肖不懼於物合於道數故皆能度百歲而動作不衰者以其德全不危也是以人之壽夭在於撙節若消息得所則長生不死恣其情欲則命同朝露也岐伯曰人年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣力大衰九竅不利下虛上實涕泣俱出矣故曰知之則強不知則老故同出名異智者察同愚者察異愚者不足智者有餘有餘則耳目聰明身體強健年老復壯壯者益理是以聖人為無為之事樂恬淡之味能縱欲快志得虛無之守故壽命無窮與天地終此聖人之治身也春三月此為發陳天地俱生萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺與而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒為變則奉長者少夏三月此為蕃莠天地氣交萬物華實夜臥早起毋厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧則奉收者少冬至重病秋三月此為容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平毋外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄則奉藏者少冬三月此為閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫毋泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥則奉生者少天有四時五行以生長收藏以寒暑燥濕風人有五臟化為五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽故喜怒不節寒暑失度生乃不固人能依時攝養故得免其夭枉也仲長統曰王侯之宮美女兼千卿士之家侍妾數百晝則以醇酒淋其骨髓夜則房室輸其血氣耳聽淫聲目樂邪色宴內不出遊外不返王公得之於上豪傑馳之於下及至生産不時字育太早或童孺而擅氣或疾病而構精精氣薄惡血脈不充既出胞臟養護無法又蒸之以綿纊爍之以五味胎傷孩病而脆未得堅剛復縱情欲重重相生病病相孕國無良醫醫無審術奸佐其間過謬常有會有一疾莫能自免當今少百歲之人者豈非所習不純正也抱朴子曰或問所謂傷之者豈色欲之間乎答曰亦何獨斯哉然長生之要其在房中上士知之可以延年除病其次不以自伐若年當少壯而知還陰丹以補腦採七益於長俗一作谷者不服藥物不失一二百歲也但不得仙耳不得其術者古人方之於凌杯以盛湯羽苞之蓄火又且才所不逮而強思之傷也力所不勝而強舉之傷也深憂重恚傷也悲哀憔悴傷也喜樂過度傷也汲汲所欲傷也戚戚所患傷也久談言笑傷也寢息失時傷也挽弓引弩傷也沉醉嘔吐傷也飽食即臥傷也跳走喘乏傷也歡呼哭泣傷也陰陽不交傷也積傷至盡盡則早亡盡則非道也故養性之士唾不至遠行不疾走耳不極聽目不極視坐不久處立不至疲臥不至懻先寒而衣先熱而解不欲極飢而食食不可過飽不欲極渴而飲飲不欲過多不欲啖生冷不欲飲酒當風不欲數數沐浴不欲廣志遠願不欲規造異巧冬不欲極溫夏不欲窮涼不欲露臥星月不欲眠中用扇大寒大熱大風大霧皆不得冒之五味不欲偏多故酸多則傷脾苦多則傷肺辛多則傷肝咸多則傷心甘多則傷腎此五味克五臟五行自然之理也凡言傷者亦不即覺也謂久則損壽耳是以善攝生者臥起有四時之早晚興居有至和之常制調利筋骨有俯仰之方祛疾閒邪有吐納之術流行營衛有補瀉之法節宣勞逸有與奪之要忍怒以全陰抑喜以養陽然後先服草木以救虧缺後服金丹以定無窮養性之理盡於此矣夫欲快意任懷自謂達識知命不泥異端極情肆力不勞持久者聞此言也雖風之過耳電之經目不足喻也雖身枯於留連之中氣絶於綺紈之際而甘心焉亦安可告之以養性之事哉非唯不納乃謂妖訛也而望彼信之所謂以明鑑給矇瞽以絲竹娛聾夫者也魏武與皇甫隆令曰聞卿年出百歲而體力不衰耳目聰明顏色和悅此盛事也所服食施行導引可得聞乎若有可傳想可密示封內隆上疏對曰臣聞天地之性唯人為貴人之所貴莫貴於生唐荒無始劫運無窮人生其間忽如電過每一思此罔然心熱生不再來逝不可追何不抑情養性以自保惜今四海垂定太平之際又當須展才布德當由萬年萬年無窮當由修道道甚易知但莫能行臣嘗聞道人蒯京已年一百七十八而甚丁壯言人當朝朝服食玉泉琢齒使人丁壯有顏色去三蟲而堅齒玉泉口中唾也朝旦未起早漱津令滿口乃吞之琢齒二七遍如此者乃名曰練精嵇康曰穰歲多病饑年少疾信哉不虛是以關中土地俗好儉嗇廚膳肴饈不過菹醬而已其人少病而壽江南嶺表其處饒足海陸鮭肴無所不備土俗多疾而人早夭北方仕子游官至彼遇其豐贍以為福佑所臻是以尊卑長幼恣口食啖夜常醉飽四體熱悶赤露眠臥宿食不消未逾期月大小皆病或患霍亂腳氣脹滿或寒熱瘧痢惡核疔腫或癰疽痔漏或偏風猥退不知醫療以至於死凡如此者比肩皆是唯云不習水土都不知病之所由靜言思之可為太息者也學者先須識此以自誡慎抱朴子曰人之一身猶一國之象也胸腹之位猶宮室也四肢之列猶郊境也骨節之分猶百宮也神猶君也血猶臣也氣猶民也知治身則能治國也夫愛其民所以安其國惜其氣所以全其身民散則國亡氣竭則身死死者不可生也亡者不可存也是以至人消未起之患治未病之疾醫之於無事之前不追於既逝之後夫人難養而易危也氣難清而易濁也故能審威德所以保社稷割嗜欲所以固血氣然後真一存焉精神守焉百病卻焉年壽延焉道林養性第二真人曰雖常服餌而不知養性之術亦難以長生也養性之道常欲小勞但莫大疲及強所不能堪耳且流水不腐戶樞不蠹以其運動故也養性之道莫久行久立久坐久臥久視久聽蓋以久視傷血久臥傷氣久立傷骨久坐傷肉久行傷筋也仍莫強食莫強酒莫強舉重莫憂思莫大怒莫悲愁莫大懼莫跳踉莫多言莫大笑勿汲汲於所欲勿悁懷忿恨皆損壽命若能不犯者則得長生也故善攝生者常少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少者養性之都契也多思則神殆多念則志散多欲則志昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則意溢多喜則忘錯昏亂多怒則百脈不定多好則專迷不理多惡則憔悴無歡此十二多不除則營衛失度血氣妄行喪生之本也唯無多無少者得幾於道矣是知勿外緣者真人初學之法也若能如此者可居瘟疫之中無憂疑矣既屏外緣會須守五神肝心脾肺腎從四正言行坐立言最不得浮思妄想心念欲事惡邪大起故孔子曰思無邪嘗習黃帝內視法存想思念令見五臟如懸磬五色了了分明勿輟也仍於每旦初起面向午展兩手於膝上心眼觀氣上入頂下達湧泉旦旦如此名曰迎氣常以鼻引氣口吐氣小微吐之不得開口復欲得出氣少入氣多每欲食送氣入腹每欲食氣為主人也凡心有所愛不用深愛心有所憎不用深憎並皆損性傷神亦不可用深贊亦不可用深毀常須運心於物平等如覺偏頗尋改正之居貧勿謂常貧居富勿謂常富居貧富之中常須守道勿以貧富易志改性識達道理似不能言有大功德勿自矜伐美藥勿離手善言勿離口亂想勿經心常以深心至誠恭敬於物慎勿詐善以悅於人終身為善為人所嫌勿得起恨事君盡禮人以為諂當以道自平其心道之所在其德不孤勿言行善不得善報以自怨仇居處勿令心有不足若有不足則自抑之勿令得起人知止足天遺其祿所至之處勿得多求多求則心自疲而志苦若夫人之所以多病當由不能養性平康之日謂言常然縱情恣欲心所欲得則便為之不拘禁忌欺罔幽明無所不作自言適性不知過後一一皆為病本及兩手摸空白汗流出口唱皇天無所逮及皆以生平粗心不能自察一致於此但能少時內省身心則自知見行之中皆長諸疴將知四百四病身手自造本非由天及一朝病發和緩不救方更誹謗醫藥無效神仙無靈故有智之人愛惜性命者當自思念深生恥愧戒勒身心常修善事也至於居處不得綺糜華麗令人貪婪無厭乃患害之源但令雅素淨潔無風雨暑濕為佳衣服器械勿用珍玉金寶增長過失使人煩惱根深廚膳勿使脯肉豐盈當令儉約為佳然後行作鵝王步語作含鐘聲眠作獅子臥右胠脅著地坐腳也每日自詠歌云美食須熟嚼生食不粗吞問我居止處大宅總林村胎息守五臟氣至骨成仙又歌曰日食三個毒不嚼而自消錦繡為五臟身著糞掃袍修心既平又須慎言語凡言語誦讀常想聲在氣海中臍下也每日初入後勿言語誦讀寧待平旦也旦起當專言善事不當先計較錢財又食上不得語語而食者常患胸背痛亦不用寢臥多言笑寢不得語言者言五臟如鐘磬不懸則不可發聲行不得語若欲語須住腳乃語行語則令人失氣冬至日只可語不可言自言曰言答人曰語言有人來問不可不答自不可發言也仍勿觸冷開口大語為佳言語既慎仍節飲食是以善養性者先飢而食先渴而飲食欲數而少不欲頓而多則難消也當欲令如飽中飢飢中飽耳蓋飽則傷肺飢則傷氣咸則傷筋酸則傷骨故每學淡食食當熟嚼使米脂入腹勿使酒脂入腸人之當食須去煩惱暴數為煩侵觸為惱如食五味必不得暴嗔多令神氣驚夜夢飛揚每食不用重肉喜生百病常須少食肉多食飯及少菹菜並勿食生菜生米小豆陳臭之物勿飲濁酒食麵使塞氣孔勿食生肉傷胃一切肉須煮爛停冷食之食畢當漱口數過令人牙齒不敗口香熱食訖以冷酢漿漱口者令人口氣常臭作䘌齒病又諸熱食鹹物後不得飲冷酢漿水喜失聲成尸咽凡熱食汗出勿當風發痙頭痛令人目澀多睡每食訖以手摩面及腹令津液通流食畢當行步躊躇計使中數里來行畢使人以粉摩腹上數百遍則食易消大益人令人能飲食無百病然後有所修為為快也飽食即臥乃生百病不消成積聚飽食仰臥成氣痞作頭風觸寒來者寒未解食熱成刺風人不得夜食又云夜勿過醉飽食勿精思為勞苦事有損余虛損人常須日在巳時食訖則不須飲酒終身無干嘔勿食父母本命所屬肉令人命不長勿食自己本命所屬肉令人魂魄飛揚勿食一切腦大損人茅屋漏水墮諸脯肉上食之成瘕病暴肉作脯不肯幹者食之害人祭神肉無故自動食之害人飲食上蜂行住食之必有毒害人腹內有宿病勿食鯪鯉魚肉害人濕食及酒漿臨上看視不見人物影者勿食之成卒注若已食腹脹者急以藥下之每十日一食葵葵滑所以通五臟壅氣又是菜之主不用合心食之又飲酒不欲使多多則速吐之為佳勿令至醉即終身百病不除久飲酒者腐爛腸胃漬髓蒸筋傷神損壽醉不可以當風向陽令人發狂又不可當風臥不可令人扇涼皆得病也醉不可露臥及臥黍穰中發癩瘡醉不可強食或發癰疽或發喑或生瘡醉飽不可以走車馬及跳躑醉不可以接房醉飽交接小者面䵟咳嗽大者傷絶臟脈損命凡人飢欲坐小便飽則立小便慎之無病又忍尿不便膝冷成痹忍大便不出成氣痔小便勿努令兩足及膝冷大便不用呼氣及強努令人腰痛目澀宜任之佳凡遇山水塢中出泉者不可久居常食作癭病又深陰地冷水不可飲必作痎瘧飲食以調時慎脫著濕衣及汗衣皆不可久著令人發瘡及風瘙大汗能易衣佳不易者急洗之不爾令人小便不利凡大汗勿偏脫衣得偏風半身不遂春天不可薄衣令人傷寒霍亂食不消頭痛脫著既時須調寢處凡人臥春夏向東秋冬向西頭勿北臥及牆北亦勿安床凡欲睡勿歌詠不祥起上床坐先脫左足臥勿當舍脊下臥訖勿留燭燈令人魂魄及六神不安多愁怨人頭邊勿安火爐日久引火氣頭重目赤睛及鼻乾夜臥當耳勿有孔吹入即耳聾夏不用露面臥令人面皮厚善成癬或作面風冬夜勿覆頭得長壽凡人眠勿以腳懸踏高處久成腎水及損房足冷勿順牆臥風吹入人發癲及體重人臥勿跂床懸腳久成血痹兩足重腰疼又不得晝眠令人失氣臥勿大語損人氣力暮臥常習閉口口開即失氣且邪惡從口入久而成消渴及失血色屈膝側臥益人氣力勝正偃臥按孔子不尸臥故曰睡不厭蹙覺不厭舒凡人舒睡則有鬼痛魔邪凡眠先臥心後臥眼人臥一夜當作五度反覆常逐更轉凡人夜魘勿燃燈喚之定死無疑暗喚之吉亦不得近前急喚夜夢惡不須說旦以水面東方噀之咒曰惡夢著草木好夢成寶玉即無咎矣又夢之善惡並勿說為吉衣食寢處皆適能順時氣者始盡養生之道故善攝生者無犯日月之忌毋失歲時之和一日之忌暮無飽食一月之忌晦無大醉一歲之忌暮無遠行終身之忌暮無燃燭行房暮常護氣也凡氣冬至起於湧泉十一月至膝十二月至股正月至腰名三陽成二月至膊三月至項四月至頂純陽用事陰亦仿此故四月十月不得入房避陰陽純用事之月也每冬至日於北壁下厚鋪草而臥云受元氣每八月一日以後即微火暖足勿令下冷無生意常欲使氣在下不欲泄於上春凍未泮衣欲下厚上薄養陽收陰繼世長生養陰收陽禍至滅門故云冬時天地氣閉血氣伏藏人不可作勞出汗發泄陽氣有損於人也又云冬日凍腦春秋腦足俱凍此聖人之常法也春欲晏臥早起夏及秋侵夜乃臥早起冬欲早臥晏起皆益人凡冬月忽有大熱之時夏月忽有大涼之時皆勿受之人有患天行時氣者皆由犯此也即須調氣息使寒熱平和則免患也每當臘日勿歌舞犯者必凶常於正月寅日燒白髮吉凡寅日剪手甲午日剪足甲及燒白髮吉居處法第三凡人居止之室必須周密勿令有細隙致有風氣得入小覺有風勿強忍久坐必須急急避之久居不覺使人中風古來忽得偏風四肢不隨或如角弓反張或失音不語者皆由忽此耳身既中風諸病總集邪氣得便遭此致卒者十中有九是以大須周密無得輕之慎焉慎焉所居之室勿塞井及水瀆令人聾盲凡在家及外行卒逢大飄風暴雨震電昏暗大霧此皆是諸龍鬼神行動經過所致宜入室閉戶燒香靜坐安心以避之待過後乃出不爾損人或當時雖未苦於後不佳矣又陰霧中亦不可遠行按摩法第四天竺國按摩法天竺國按摩此是婆羅門法兩手相捉扭捩如洗手法兩手淺相叉翻覆向胸兩手相捉共按䏶左右同以手如挽五石力弓左右同兩手相重按䏶徐徐捩身左右同作拳向前築左右同作拳卻頓此是開胸法左右同如拓石法左右同以手反捶背上左右同兩手據地縮身曲脊向上三舉兩手抱頭宛轉䏶上此是抽脅大坐斜身偏欹如排山左右同大坐伸兩腳即以一腳向前虛掣左右同兩手拒地回顧此虎視法左右同立地反拗身三舉兩手急相叉以腳踏手中左右同起立以腳前後虛踏左右同大坐伸兩腳用當相手勾所伸腳著膝中以手按之左右同上十八勢但是老人日別能依此三遍者一月後百病除行及奔馬補益延年能食眼明輕健不復疲乏老子按摩法兩手捺䏶左右捩身二七遍兩手捻䏶左右扭肩二七遍兩手抱頭左右扭腰二七遍左右挑頭二七遍兩手托頭三舉之一手抱頭一手托膝三折左右同一手托頭一手托膝從下向上三遍左右同兩手攀頭下向三頓足兩手相捉頭上過左右三遍兩手相叉托心前推卻挽三遍兩手相叉著心三遍曲腕築肋挽肘左右三遍左右挽前右拔各三遍舒手挽項左右三遍反手著膝手挽肘覆手著膝上左右亦三遍手摸肩從上至下使遍左右同兩手空拳築三遍兩手相叉反復攪各七遍外振手三遍內振三遍覆手振亦三遍摩扭指三遍兩手反搖三遍兩手反叉上下扭肘無數單用十呼兩手上聳三遍兩手下頓三遍兩手相叉頭上過左右申肋十遍兩手拳反背上掘脊上下三遍掘揩之也兩手反捉上下直脊三遍覆掌搦腕內外振三遍覆掌前聳三遍覆掌兩手相叉交橫三遍覆掌橫直即聳三遍若有手患冷從上打至下得熱便休舒左足右手承之左手捺腳聳上至下直腳三遍右手捺腳亦爾前後捩足三遍左捩足右捩足各三遍前後卻捩足三遍直腳三遍扭䏶三遍內外振腳三遍若有腳患冷者打熱便休扭䏶以意多少頓腳三遍卻直腳三遍虎據左右扭肩三遍推天托地左右三遍左右排山負山拔木各三遍舒手直前頓申手三遍舒兩手兩膝各三遍舒腳直反頓申手三遍捩內脊外脊各三遍調氣法第五彭祖曰道不在煩唯能不思衣食不思聲色不思勝負不思曲直不思得失不思榮辱心無煩形勿極而助之以導引行氣不已亦可得長年千歲不死凡人不可無思當以漸遣除之彭祖曰和神導氣之道當得密室閉戶安床暖席枕高二寸半正身偃臥瞑目閉氣於胸膈中以鴻毛著鼻上而不動經三百息耳無所聞目無所見心無所思如此則寒暑不能侵蜂蠆不能毒壽三百六十歲此鄰於真人也每旦夕旦夕者是陰陽轉換之時凡旦五更初暖氣至頻頻眼閉是上生氣至名曰陽息而陰消暮日入後冷氣至凜凜然時乃至床坐睡倒是下生氣至名曰陽消而陰息且五更初暖氣至暮日入後冷氣至常出入天地日月山川河海人畜草木一切萬物體中代謝往來無時休息一進一退如晝夜之更迭如海水之潮汐是天地消息之道也面向午展兩手於腳膝上徐徐按捺肢節口吐濁氣鼻引清氣凡吐者去故氣亦名死氣納者取新氣亦名生氣故老子經云玄牝之門天地之根綿綿若存用之不勤言口鼻天地之間可以出納陰陽死生之氣也良久徐徐乃以手左托右托上托下托前托後托瞑目張口叩齒摩眼押頭拔耳挽發放腰咳嗽發陽振動也雙作只作反手為之然後掣足仰振數八十九十而止仰下徐徐定心作禪觀之法閉目存思想見空中太和元氣如紫雲成蓋五色分明下入毛際漸漸入頂如雨初晴云入山透皮入肉至骨至腦漸漸下入腹中四肢五臟皆受其潤如水滲入地若徹則覺腹中有聲汩汩然意專思存不得外緣斯須即覺元氣達於氣海須臾則自達於湧泉則覺身體振動兩腳蜷曲亦令床坐有聲拉拉然則名一通一通二通乃至日別得三通五通則身體悅懌面色光輝鬢毛潤澤耳目精明令人食美氣力強健百病皆去五年十歲長存不忘得滿十萬遍則去仙不遠矣人身虛無但有遊氣氣息得理即百病不生若消息失宜即諸疴竟起善攝養者須知調氣方焉調氣方療萬病大患百日生眉須自余者不足言也凡調氣之法夜半後日中前氣生得調日中後夜半前氣死不得調調氣之時則仰臥床鋪厚軟枕高下其身平舒手展腳兩手握大拇指節去身四五寸兩腳相去四五寸數數叩齒飲玉漿引氣從鼻入腹足則停止有力更取久住氣悶從口細細吐出盡還從鼻細細引入出氣一如前法閉口以心中數數令耳不聞恐有誤亂兼以手下籌能至千則去仙不遠矣若天陰霧惡風猛寒勿取氣也但閉之若患寒熱及卒患癰疽不問日中疾患未發前一食間即調如其不得好瘥明日依式更調之若患心冷病氣即呼出若熱病氣即吹出若肺病即噓出若肝病即呵出若脾病即唏出若腎病即呬出夜半後八十一雞鳴七十二平旦六十三日出五十四辰時四十五巳時三十六欲作此法先左右導引三百六十遍病有四種一冷痹二氣疾三邪風四熱毒若有患者安心調氣此法無有不瘥也凡百病不離五臟各有八十一種疾冷熱風氣計成四百四病事須識其相類善以知之心臟病者體冷熱相法心色赤患者夢中見人著赤衣持赤刀杖火來怖人療法用呼吹二氣呼療冷吹治熱肺臟病者胸背滿脹四肢煩悶相法肺色白患者喜夢見美女美男詐親附人共相抱持或作父母兄弟妻子療法用噓氣出肝臟病者憂愁不樂悲思喜頭眼疼痛相法肝色青夢見人著青衣捉青刀杖或獅子虎狼來恐怖人療法用呵氣出脾臟病者體上游風習習遍身痛煩悶相法脾色黃通土色夢或作小兒擊歷人邪猶人或如旋風團欒轉治法用唏氣出腎臟病者體冷陰衰面目惡痿相法腎色黑夢見黑衣及獸物捉刀杖相怖用呬氣出冷病者用大呼三十遍細呼十遍呼法鼻中引氣入口中吐氣出當令聲相逐呼字而吐之熱病者用大吹五十遍細吹十遍吹如吹物之吹當使字氣聲似字肺病者用大噓三十遍細噓十遍肝病者用大呵三十遍細呵十遍脾病者用大唏三十遍細唏十遍腎病者用大呬五十遍細呬三十遍此十二種調氣法若有病依此法恭敬用心無有不瘥皆須左右導引三百六十遍然後乃為之服食法第六論一首法七首方十八首論曰凡人春服小續命湯五劑及諸補散各一劑夏大熱則服腎瀝湯三劑秋服黃耆等丸一二劑冬服藥酒兩三劑立春日則止此法終身常爾則百病不生俗人見淺但知鉤吻之殺人不信黃精之益壽但識五穀之療飢不知百藥之濟命但解施瀉以生育不能閉固以頤養故有服餌方焉郤愔曰夫欲服食當尋性理所宜審冷暖之適不可見彼得力我便服之初御藥皆先草木次石是為將藥之大較也所謂精粗相代階粗以至精者也夫人從少至長體習五穀卒不可一朝頓遺之凡服藥物為益遲微則無充飢之驗然積年不已方能骨髓填實五穀居然而自斷今人多望朝夕之效求目下之應腑臟未充便以絶粒穀氣始除藥未有用又將御女形神與俗無別以此致弊可不怪哉服餌大體皆有次第不知其術者非止交有所損卒亦不得其功故服餌大法必先去三蟲三蟲既去次服草藥好得藥力次服木藥好得力訖次服石藥依此次第及得遂其藥性庶事安穩可以延齡矣去三蟲丸方生地黃汁三斗東向灶葦火煎三沸納清漆二升以荊匕攪之日移一尺納真丹鉛粉三兩復移一尺納瓜子末三升即冬瓜子復移一尺納大黃末三兩微火勿令焦候可丸丸如梧子大先食服一丸日三濁血下鼻中三十日諸蟲皆下五十日百病愈面色有光澤又方漆二升大黃六兩蕪菁子三升末酒一升半上四味以微火合煎令可丸如梧子大先食服三丸十日濁血下出鼻中三十日蟲皆爛下五十日身光澤一年行及奔馬消息四體安穩乃可服草藥服天門冬方天門冬曝乾搗下篩食後服方寸匕日三可至十服小兒服尤良蜜丸服之益善唯多彌佳又方天門冬搗取汁微火煎取五斗下白蜜一斗胡麻炒為末二升合煎攪勿息手可丸即止火下大豆黃末和為餅徑三寸厚半寸一服一枚日三百日以上得益此方最上妙包衆方一法釀酒服始傷多無苦多即吐去病也方見第十六卷小腸腑門蒯道人年近二百而少常告皇甫隆云但取天門冬去心皮切干之酒服方寸匕日三令人不老補中益氣愈百病也久服令人長生氣力百倍治虛勞絶傷年老衰損羸瘦偏枯不遂風濕不仁冷痹心腹積聚惡瘡癰疽腫癩疾重者周身膿壞鼻柱敗爛服之皮脫蟲出顏色肥白此無所不治亦治陰痿耳聾目暗久服白髮黑齒落生延年益命入水不濡服二百日後恬泰疾損拘急者緩羸劣者強三百日身輕三年走及奔馬又三年心腹痼疾皆去服地黃方生地五十斤搗絞取汁澄去滓微火上煎減過半納白蜜五升棗脂一升攪令相得可丸乃止每服如雞子一枚日三令人肥白又方地黃十斤細切以醇酒二斗漬三宿出曝乾反復納漬取酒盡止加甘草巴戟厚朴乾漆覆盆子各一斤搗下篩食後酒服方寸匕日三加至二匕使人老者還少強力無病延年作熟乾地黃法采地黃去須葉及細根搗絞取汁以漬肥者著甑中蒸之一時出曝燥更納汁中又蒸至汁盡止曝乾之亦可直切蒸之半日數以酒灑之使周匝至夕出曝乾可搗蜜丸服之種地黃法先擇好地黃赤色虛軟者深耕之臘月逆耕凍地彌好擇肥大好地黃根切長四五分至一二寸許一斛可種一畝二三月種之作畦畔相去一尺生後隨鋤壅數耘之至九月十月視其葉小衰乃掘取一畝得二十許斛擇取大根水淨洗其細根乃剪頭尾輩亦洗取之日曝令極燥乃以竹刀切長寸余許蒸之從旦至暮當黑不盡黑者明日又擇取蒸之先時已搗其細碎者取汁銅器煎之如薄飴遂以地黃納汁中周匝出曝乾又納汁盡止率百斤生者令得一二十斤取初八月九月中掘者其根勿令太老強蒸則不消盡有筋脈初以地黃納甑中時先用銅器承其下以好酒淋地黃上令匝汁後下入器中取以並和煎汁佳黃精膏方黃精一石去鬚毛洗令淨潔打碎蒸令好熟壓得汁復煎去游水得一斗納乾薑末三兩桂心末一兩微火煎看色鬱郁然欲黃便去火待冷盛不津器中酒五合和服二合常未食前日二服舊皮脫顏色變光花色有異鬢髮更改欲長服者不須和酒納生大豆黃絶穀食之不飢渴長生不老服烏麻法取黑皮真檀色烏麻隨多少水拌令潤勿過濕蒸令氣遍即出曝乾如此九蒸九搗去上皮未食前和水若酒服二方寸匕日三漸漸不飢絶谷久服百病不生常服延年不老餌柏實方柏子仁二升搗令細醇酒四升漬攪如泥下白蜜二升棗膏三升搗令可丸入乾地黃末白朮末各一升攪和丸如梧子每服三十丸日二服二十日萬病皆愈餌松子方七月七日採松子過時即落不可得治服方寸匕日三四一云一服三合百日身輕三百日行五百里絶谷久服升仙渴飲水亦可和脂服之若丸如梧子大服十丸服松脂方百鍊松脂下篩以蜜和納桶中勿令中風日服如博棋子一枚博棋長二寸方一寸日三漸漸不飢延年亦可醇酒和白蜜如餳日服一二兩凡取松脂老松皮自有聚脂者最第一其根下有傷折處不見日月者得之名曰陰脂彌良採松脂法以日入時破其陰以取其膏破其陽以取其脂脂膏等分食之可以通神靈鑿其陰陽為孔令方五寸深五寸還以皮掩其孔毋令風入風入則不可服以春夏時取之取訖封塞勿泄以泥塗之東北行丹砂穴有陰泉水可飲此弘農車君以元封元年入此山食松脂十六年夏下居長安東市在上谷牛頭谷時往來至秦嶺上年常如三十者煉松脂法松脂七斤以桑灰汁一石煮脂三沸接置冷水中凝復煮之凡十遍脂白色可服衡州東南攸縣界有松脂與天下松脂不同餌茯苓方茯苓十斤去皮酒漬密封下十五日出之取服如博棋日三亦可屑服方寸匕凡餌茯苓皆湯煮四五沸或以水漬六七日茯苓酥方茯苓五斤灰汁煮十遍漿水煮十遍清水煮十遍松脂五斤煮如茯苓法每次煮四十遍白蜜三斤煎令沫盡生天門冬五斤去心皮曝乾作末蠟牛酥各三斤煉三十遍上六味各搗篩以銅器重湯上先納酥次蠟次蜜消訖納藥急攪勿住手務令大均納瓷器中密封勿令泄氣先一日不食欲不食先須吃好美食令極飽然後絶食即服二兩二十日後服四兩又二十日後八兩細丸之以咽得下為度第二度服以四兩為初二十日後八兩又二十日二兩第三度服以八兩為初二十日二兩又二十日四兩合一百八十日藥成自後服三丸將補不服亦得恆以酥蜜消息之美酒服一升為佳合藥須取四時王相日特忌刑殺厭及四激休廢等日大凶此彭祖法茯苓膏方千金翼名凝靈膏茯苓淨去皮松脂各二十四斤松子仁柏子仁各十二斤上四味依法煉之松柏仁不煉搗篩白蜜二斗四斤納銅器中湯上微火煎一日一夕次第下藥攪令相得微火煎七日七夜丸如小棗每服七丸日三欲絶谷頓服取飽即得輕身明目不老此方後一本有茯苓酥杏仁酥地黃酥三方然諸本並無又千金翼中已有今更不添録服枸杞根方枸杞酒方枸杞根一百二十斤切以東流水四石煮一日一夜取清汁一石漬曲一如家醞法熟取清貯不津器中納乾地黃末二升半桂心乾薑澤瀉蜀椒末各一升商陸末二升以絹袋貯納酒底緊塞口埋入地三尺堅覆上三七日平曉開之其酒赤如金色旦空腹服半升十日萬病皆愈三十日瘢痕滅惡疾人以水一升和酒半升分五服愈千金翼云若欲服石者取河中青白石如棗杏大者二升以水三升煮一沸以此酒半合置中須臾即熟可食餌雲母水方療萬病上白雲母二十斤薄擘以露水八斗作湯分半洮洗雲母如此再過又取二斗作湯納芒硝十斤以雲母木器中漬之二十日出絹袋盛懸屋上勿使見風日令燥以水漬鹿皮為囊揉挻之從旦至日中乃以細絹下篩滓復揉挻令得好粉五斗余者棄之取粉一斗納崖蜜二斤攪令如粥納生竹筒中薄削之漆固口埋北垣南岸下入地六尺覆土春夏四十日秋冬三十日出之當如澤為成若洞洞不消者更埋三十日出之先取水一合納藥一合攪和盡服之日三水寒溫儘自任服十日小便當變黃此先療勞氣風疹也二十日腹中寒癖消三十日齲齒除更新生四十日不畏風寒五十日諸病皆愈顏色日少久服不已長生神仙吾自驗之所以述録煉鍾乳粉法鍾乳一斤不問厚薄但取白淨光色好者任用先泥鐵鐺可受四五斗者為灶貯水令滿去口三寸納乳著金銀瓷㼜中乃下鐺中令水沒㼜上寸余勿使出水也微火燒日夜不絶水欲竭即添暖水每一周時輒易水洗鐺並洮乳七日七夜出之淨洮干納瓷鉢中少著水研之一日一夜急著水攪令大濁澄取濁汁其乳粗者自然著底作末者即自作濁水經宿澄取其粗著底者准前法研之凡五日五夜皆細逐水作粉好用澄煉取曝乾即更於銀鉢中研之二日候入肉水洗不落者佳鍾乳散治虛羸不足六十以上人瘦弱不能食者百病方上黨人參石斛乾薑各三分鍾乳粉成煉者三兩上四味搗三味下篩與乳合和相得均分作九帖平旦空腹溫醇酒服一帖日午後服一帖黃昏後服一帖三日後准此服之凡服此藥法皆三日一劑三日內只用一升半飯一斤肉肉及飯唯爛不得服蔥豉問曰何故三日少餐勿得飽也答曰三夜乳在腹中熏補臟腑若此飽食即推藥出腹所以不得飽食也何故不得生食由食生即損藥力藥力既損脂肪亦傷所以不得食生食也何故不得食蔥豉蔥豉殺藥故不得食也三日服藥既盡三日內須作羹食補之任意所便仍不用蔥豉及硬食也三日補訖還須準式服藥如前盡此一斤乳訖其氣力當自知耳不能具述一得此法其後服十斤任意所便可知也西嶽真人靈飛散方雲母粉一斤茯苓八兩鍾乳粉柏子仁人參續斷桂心各七兩菊花十五兩乾地黃十二兩上九味為末生天門冬十九斤取汁溲藥納銅器中蒸一石太清經云一斤二斗黍米下米熟曝乾為末先食飲服方寸匕日一旦服無毒三日力倍五日血脈充盛七日身輕十日面色悅澤知慮聰明十五日行及奔馬力作不知二十日耳目聰明力不復當三十日夜視有光太清經作三十五日七十日白髮盡落故齒皆去更取二十一匕白蜜和搗三百杵丸如梧子大此仙人隨身常所服藥也入山日吞七丸絶谷不飢余服此方以來將逾三紀頃面色美而悅之疑而未敢措手積年詢訪屢有名人曾餌得力遂常服之一如方說但能業之不巳功不徒棄耳太清經無人參有白朮四兩千金翼多白朮四兩黃帝雜忌法第七旦起目不開洗面令人目澀失明饒淚清旦常言善事勿惡言勿聞惡事勿嗔怒勿叱吒咄呼勿嗟嘆勿唱奈何勿立膝坐而交臂膝上勿令發覆面皆不祥勿舉足向火勿對灶罵詈凡行立坐勿背日吉勿面北坐久思不祥起凡欲行常存魁綱在頭上所向皆吉若征戰存斗柄在前以指敵吉勿面北冠帶凶勿向西北唾犯魁綱神凶勿咳唾唾不用遠成肺病令人手足重及背痛咳嗽勿向西北大小便勿殺龜蛇勿怒目視日月善令人失明行及乘馬不用回顧凡過神廟慎勿輒入入必恭敬不得舉目恣意顧瞻亦不得返首顧視神廟見龍蛇勿與心驚怪亦勿注意瞻視忽見鬼怪變異之物即強抑之勿怪又路行於衆中見殊妙美女慎勿熟視而愛之此當魑魅之物無問空山曠野稠人廣衆之中皆亦如之凡山水有沙蝨處勿在中浴害人欲渡者隨驢馬後急渡不傷人有水弩處射人影即死欲渡水者以物打水其弩即散急渡不傷人諸山有孔穴入採寶者唯三月九月余月山閉氣交犯之死凡空腹不用見尸臭氣入鼻舌上白起口常臭欲見尸者皆須飲酒見之能闢毒遠行觸熱途中逢河勿洗面生烏䵟房中補益第八論曰人生四十以下多有放恣四十以上即頓覺氣力一時衰退衰退既至衆病蜂起久而不治遂至不救所以彭祖曰以人療人真得其真故年至四十須識房中之術夫房中術者其道甚近而人莫能行其法一夕御十人閉固而已此房中之術畢矣兼之藥餌四時勿絶則氣力百倍而智慧日新然此方之作也非欲務於淫佚苟求快意務存節欲以廣養生此房中之微旨也是以人年四十以下即服房中之藥者皆所以速禍故年未滿四十者不可與論房中之事欲心未止兼餌補藥倍力行房不過半年精髓枯竭唯向死近少年極須慎之四十以上常固精養氣不耗可以不老又餌雲母足以愈疾延年勿服泄藥常餌補藥大佳凡御女之道不欲令氣未感動陽氣微弱即以交合必須先徐徐調和使神和意感良久乃可令得陰氣推之須臾自強所謂弱而內迎堅急出之進退欲令疏遲情動而止不可高自投擲顛倒五臟傷絶精脈致生百病但數交而慎密者諸病人皆愈能百接而不施瀉者長年矣凡人精少則病精盡則死不可不思不可不慎數交而一瀉精氣隨長不能使人虛也若不數交交而即瀉則不得益瀉之精氣自然生長但遲微不如數交接不瀉之速也凡人習交合之時常以鼻多納氣口微吐氣自然益矣交會畢蒸熱是得氣也以菖蒲末三分白粱粉敷摩令燥既使強盛又濕瘡不生也凡欲施瀉者當閉口張目閉氣握固兩手左右上下縮鼻取氣又縮下部及吸腹小偃脊膂急以左手中兩指抑屏翳穴長吐氣並琢齒千遍則精上補腦使人長生若精妄出則損神也仙經曰令人長生不老先與女戲飲玉漿玉漿口中津也使男女感動以左手握持思存丹田中有赤氣內黃外白變為日月徘徊丹田中俱入泥垣兩半合成一因閉氣深納勿出但入上下徐徐咽氣情動欲出急退之此非上士有智者不能行也其丹田在臍下三寸泥垣者在頭中對兩目直入內思作日月想合徑三寸許兩半放形則一為日月相㩉者也雖出入仍思念所作者勿廢佳也又曰男女俱仙之道深納勿動精思臍中赤色大如雞子形乃徐徐出入情動乃退一日一夕可數十為定令人益壽男女各息意共存思之可猛念之御女之法能一月再泄一歲二十四泄皆得二百歲有顏色無疾病若加以藥則可長生也人年二十者四日一泄三十者八日一泄四十者十六日一泄五十者二十日一泄六十者閉精勿泄若體力猶壯者一月一泄凡人氣力自有強盛過人者亦不可抑忍久而不泄致生癰疽若年過六十而有數旬不得交合意中平平者自可閉固也昔貞觀初有一野老年七十餘詣余曰數日來陽氣益盛自思氣血已衰何有此盛未知垂老有此為善惡耶余答之曰是大不祥子獨不聞膏火乎夫膏火之將竭也必先暗而後明明止則滅今足下年邁桑榆久當閉精息欲茲忽春情猛發豈非反常耶竊謂足下憂之子其勉歟後四旬發病而死此其不慎之效也如斯之輩非一且疏一人以勖將來耳所以善攝生者凡覺陽事輒盛必謹而抑之不可縱心竭意以自賊也若一度製得則一度火滅一度增油若不能制縱情施瀉即是膏火將滅更去其油可不深自防所患人少年時不知道知道亦不能信行之至老乃知道便已晚矣病難養也晚而自保猶得延年益壽若年少壯而能行道者神仙速矣或曰年未六十當閉精守一為可爾否曰不然男不可無女女不可無男無女則意動意動則神勞神勞則損壽若念真正無可思者則大佳長生也然而萬無一有強抑鬱閉之難持易失使人漏精尿濁以致鬼交之病損一而當百也其服食藥物見本卷服篇中御女之法交會者當避丙丁日及弦望晦朔大風大雨大霧大寒大暑雷電霹靂天地晦冥日月薄蝕虹霓地動若御女則損人神不吉損男百倍令女得病有子必癲癡頑愚喑啞聾聵攣跛盲眇多病短壽不孝不仁又避日月星辰火光之下神廟佛寺之中井灶圊廁之側冢墓尸柩之旁皆所不可夫交合如法則有福德大智善人降托胎中仍令性行調順所作和合家道日隆祥瑞競集若不如法則有薄福愚癡惡人來托胎中仍令父母性行凶險所作不成家道日否殃咎屢至雖生成長家國滅亡夫禍福之應有如影響此乃必然之理可不再思之若欲得子者但待婦人月經後一日三日五日擇其王相日生氣時夜半後乃施泄有子皆男必壽而賢明高爵也以月經絶後二日四日六日施泄有子必女過六日後勿得施泄既不得子亦不成人黃帝雜禁忌法曰人有所怒血氣未定因以交合令發癰疽又不可忍小便交合使人淋莖中痛面失血色及遠行疲乏來入房五勞虛損少子且婦人月事未絶而與交合令人成病得白駁也水銀鹿脂不可近陰令陰痿縮
