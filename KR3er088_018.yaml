body:
  text: 卷十八大腸腑方凡七類大腸腑脈論第一論曰大腸腑者主肺也鼻柱中央是其候也肺合氣於大腸大腸者為行道傳瀉之腑也號監倉掾重二斤十二兩長一丈二尺廣六寸當臍右回疊積還反十二曲貯水穀一斗二升主十二時定血脈和利精神千金明堂外臺同難經云長二丈一尺大四寸徑一寸之少半十六曲盛谷一斗水七升半鼻遂以長以候大腸右手關前寸口陽絶者無大腸脈也若少氣心下有水氣立秋節即咳刺手太陰治陰在魚際間右手關前寸口陽實者大腸實也若腸中切痛如針刀所刺無休息時刺手陽明治陽在手腕中瀉之大腸病者腸中切痛而鳴濯濯冬日重感於寒則泄當臍而痛不能久立與胃同候取巨虛上廉腸中雷鳴氣上衝胸喘不能久立邪在大腸刺盲之原巨虛上廉三里大腸脹者腸鳴而痛寒則泄食不化大腸有寒鶩溏有熱便腸垢大腸有宿食寒栗發熱有時如瘧狀肺前受病移於大腸肺咳不已咳則遺矢便利厥氣客於大腸則夢田野肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裹大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結扁鵲云手太陰與陽明為表裡大腸若病實則傷熱熱則脹滿不通口為生瘡食下入腸腸實而胃虛食下胃胃實而腸虛所以實而不滿乍實乍虛乍來乍去虛則傷寒寒則腸中雷鳴泄青白之痢而發於氣水根在大腸方在治水篇中大腸絶不治何以知之泄利無度利絶則死手陽明之脈起於大指次指之端外側循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉循臑外前廉上肩出髃骨之前廉上出柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆直而上頸貫頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頰腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣盛有餘則當脈所過者熱腫虛則寒栗不復盛者則人迎大三倍於寸口虛者則人迎反小於寸口也大腸虛實第二脈二條方二首灸法七首大腸實熱右手寸口氣口以前脈陽實者手陽明經也病苦腸滿善喘咳面赤身熱喉咽中如核狀名曰大腸實熱也生薑泄腸湯治大腸實熱腹脹不通口為生瘡者方生薑橘皮青竹茹白朮黃芩梔子仁各三兩桂心一兩茯苓芒硝各二兩地黃十兩大棗十四枚上十一味㕮咀以水七升煮取三升去滓下芒硝分二服治腸中臚脹不消方灸大腸俞四十九壯大腸有熱腸鳴腹滿挾臍痛食不化喘不能久立巨虛上廉主之大腸虛冷右手寸口氣口以前脈陽虛者手陽明經也病苦胸中喘腸鳴虛渴唇乾目急善驚泄白名曰大腸虛冷也黃連補湯治大腸虛冷痢下青白腸中雷鳴相逐方黃連四兩茯苓川芎各三兩地榆五兩酸石榴皮五片伏龍肝雞子大一枚上六味以水七升煮取二升半去滓下伏龍肝末分三服治腸中雷鳴相逐痢下方灸承滿五十壯穴在挾巨闕相去五寸巨闕在心下一寸灸之者挾巨闕兩邊各二寸半治腸中常鳴時上衝心方灸臍中食飲不下腹中雷鳴大便不節小便赤黃陽綱主之腹脹腸鳴氣上衝胸不能久立腹中痛濯濯冬日重感於寒則泄當臍而痛腸胃間遊氣切痛食不化不嗜食身腫挾臍急天樞主之腸鳴而痛溫溜主之肛門論第三論一首論曰肛門者主大行道肺大腸候也號為通事令史重十二兩長一尺二寸廣二寸二分應十二時若臟傷熱則肛門閉塞大行不通或腫縮入生瘡若腑傷寒則肛門開大行洞泄肛門凸出良久乃入熱則通之寒則補之虛實和平依經調理方見二十四卷中皮虛實第四論一首方二首論曰夫五臟六腑者內應骨髓外合皮毛膚肉若病從外生則皮毛膚肉關格強急若病從內發則骨髓痛疼然陰陽表裡內髓外皮其病源不可不詳之也皮虛者寒皮實者熱凡皮虛實之應主於肺大腸其病發於皮毛熱則應臟寒則應腑蒴藋蒸湯治皮虛主大腸病寒氣關格方蒴藋根葉切三升菖蒲葉切三升桃葉皮枝三升細粳一斗秫米三升上五味以水一石五斗煮取米熟為度大盆器貯於盆上作小竹床子罩盆人身坐床中周回四面將席薦障風身上以衣被蓋覆若氣急時開孔對中泄氣取通身接汗可得兩食久許如此三日蒸還溫藥足汁用之若盆裡不過熱盆下安炭火非但治寒但是皮膚一切勞冷悉治之梔子煎治皮實主肺病熱氣方梔子仁枳實大青杏仁柴胡芒硝各二兩生地黃淡竹葉切各一升生元參五兩石膏八兩上十味以水九升煮取三升去滓下芒硝分三服咳嗽第五論二首方五十五首灸法十四首論曰經云五臟六腑皆令咳肺居外而近上合於皮毛皮毛喜受邪故肺獨易為咳也邪客於肺則寒熱上氣喘汗出咳動肩背喉鳴甚則唾血肺咳經久不已傳入大腸其狀咳則遺糞腎咳者其狀引腰背痛甚則咳涎腎咳經久不已傳入膀胱其狀咳則遺尿肝咳者其狀左脅痛甚者不得轉側肝咳經久不已傳入膽其狀咳則清苦汁出心咳者其狀引心痛喉中介介如梗甚者喉痹咽腫心咳經久不已傳入小腸其狀咳則矢氣脾咳者其狀右脅痛陰陰引肩背甚者不得動動則咳劇經久不已傳入胃其狀咳而嘔嘔甚則長蟲出久咳不已三焦受之三焦咳之狀咳而腹滿不能食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也若順時有風寒冷人觸冒解脫傷皮毛間入腑臟為咳上氣如此也有非時忽然暴寒傷皮膚中與肺合則咳嗽上氣或胸脅支痛咳唾有血者是其熱得非時之寒暴薄之不得漸散伏結深喜肺癰也因咳服溫藥咳尤劇及壯熱吐膿血汗出惡寒是也天有非時寒者急看四時方也問曰咳病有十何謂也師曰有風咳有寒咳有支咳有肝咳有心咳有脾咳有肺咳有腎咳有膽咳有厥陰咳問曰十咳之證以何為異師曰欲語因咳言不得竟謂之風咳飲冷食寒因之而咳謂之寒咳心下堅滿咳則支痛其脈反遲謂之支咳咳則引脅下痛謂之肝咳咳而唾血引手少陰謂之心咳咳而涎出續續不止引少腹謂之脾咳咳引頸項而唾涎沫謂之肺咳咳則耳無所聞引腰並臍中謂之腎咳咳而引頭痛口苦謂之膽咳咳而引舌本謂之厥陰咳風咳者不下之寒咳支咳肝咳刺足太衝心咳刺手神門脾咳刺足太白肺咳刺手太淵腎咳刺足太溪膽咳刺足陽陵泉厥陰咳刺手大陵夫久咳為㽷咳而時發熱脈在九菽一作卒弦者非虛也此為胸中寒實所致也當吐之夫咳家其脈弦欲行吐藥當相人強弱而無熱乃可吐耳咳家其人脈弦為有水可與十棗湯下之見下第十二方不能臥出者陰不受邪故也留飲咳者其人咳不得臥引項上痛咳者如小兒掣縱狀夫酒家咳者必致吐血此坐久極飲過度所致也其脈沉者不可發汗久咳數歲其脈弱者可治實大數者死其脈虛者必善冒其人本有支飲在胸中故也治屬飲家上氣汗出而咳屬飲家咳而小便利若失溺不可發汗汗出即厥逆冷夫病吐血喘咳上氣其脈數有熱不得臥者死寒家咳而上氣其脈數者死謂其人形損故也脈大而散散者為氣實而血虛名曰有表無里上氣面胕腫肩息其脈浮大不治加痢尤甚上氣躁而喘者屬肺脹欲作風水發汗愈小青龍湯治咳逆倚息不得臥方見第九卷傷寒上小青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者與桂苓五味甘草湯治其氣衝方茯苓四兩桂心甘草各三兩五味子半升上四味㕮咀以水八升煮取三升去滓溫分三服沖氣即低而反更咳胸滿者苓甘五味薑辛湯以治其咳滿方茯苓四兩甘草乾薑細辛各三兩五味子半升上五味㕮咀以水八升煮取三升去滓溫服半升日三咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲法當冒冒者必嘔嘔者復納半夏以去其水桂苓五味甘草去桂加薑辛半夏湯方半夏五味子各半升茯苓四兩細辛乾薑甘草各二兩上六味㕮咀以水一斗煮取三升去滓溫服半升日三水去嘔止其人形腫者應用麻黃以其人遂痹故不納麻黃納杏仁茯苓甘五味加薑辛半夏杏仁湯方杏仁半夏五味子各半升茯苓四兩細辛乾薑甘草各三兩上七味㕮咀以水一斗煮取三升去滓溫服半升日三若逆而納麻黃其人必厥所以然者以其人血虛麻黃髮其陽故也若面熱如醉此為胃熱上衝熏其面加大黃利之芩甘五味加薑辛半杏大黃湯方大黃細辛乾薑甘草各三兩茯苓四兩杏仁半夏五味子各半升上八味㕮咀以水一斗煮取三升去滓溫服半升日三咳而上氣肺脹其脈浮心下有水氣脅下痛引缺盆設若有實者必躁其人常倚伏小青龍加石膏湯主之方石膏乾薑桂心細辛各二兩麻黃四兩芍藥甘草各三兩半夏半升五味子一升上九味㕮咀以水一斗先煮麻黃減二升去沫下藥煮取二升半強者服一升羸者減之小兒服四合仲景治肺脹咳而上氣煩躁而喘脈浮者心下有水外臺同射干麻黃湯治咳而上氣喉中如水雞聲者方射干細辛款冬花紫菀各三兩麻黃生薑各四兩半夏五味子各半升大棗七枚上九味㕮咀以東流水一斗二升先煮麻黃去上沫納藥煮取三升去滓分三服日三厚朴麻黃湯治咳逆上氣胸滿喉中不利如水雞聲其脈浮者方厚朴五兩麻黃四兩石膏三兩細辛乾薑各二兩小麥一升杏仁半夏五味子各半升上九味㕮咀以水一斗二升先煮麥熟去麥納藥煮取三升去滓分三服日三澤漆湯治上氣而脈沉者方澤漆三斤細切以東流水五斗煮取一斗五升去滓澄清半夏半升生薑紫菀一作紫參白前各五兩黃芩甘草桂心人參各三兩上九味納澤漆汁中煮取五升每服五合日三夜一麥門冬湯下氣止逆治大逆上氣咽喉不利方麥門冬汁三升半夏一升粳米二合人參甘草各三兩大棗二十枚上六味以水一斗二升煮取六升去滓分四服日三夜一麻黃石膏湯治上氣胸滿方麻黃四兩石膏如雞子大厚朴五兩小麥一升杏仁半升上五味以水一斗先煮小麥熟去麥下藥煮取三升去滓分三服深師用此治久逆上氣喉中如水雞鳴咳者加半夏五味子各半升乾薑三纍十棗湯夫有支飲家咳煩胸中痛者不卒死至一百日一歲可與此方大棗十枚大戟甘遂芫花等分上大戟甘遂芫花搗為末以水一斗五合煮棗取八合去滓納藥末強者一錢匕羸者半匕頓服平旦服而不下者明旦更加半匕下後自補養咳而引脅下痛亦十棗湯主之溫脾湯治食飽而咳者方甘草四兩棗十枚上二味㕮咀以水五升煮取二升分三服若咽中痛而聲鳴者加乾薑一兩百部根湯治嗽不得臥兩眼突出方百部根生薑各半斤細辛甘草各三兩貝母白朮五味子各一兩桂心四兩麻黃六兩上九味㕮咀以水一斗二升煮取三升去滓分三服古今録驗有杏仁四兩紫菀三兩海藻湯治咳而下利胸中痞而短氣心中時悸四肢不欲動手足煩不欲食肩背痛時惡寒方海藻四兩半夏五味子各半升生薑一兩細辛二兩茯苓六兩杏仁五十枚上七味㕮咀以水一斗煮取三升去滓分三服日三一方無五味子生薑白前湯治水咳逆上氣身體浮腫短氣脹滿晝夜倚壁不得臥咽中作水雞鳴方白前紫菀半夏大戟各二兩上四味㕮咀以水一斗浸一宿明旦煮取三升分為三服治九種氣嗽欲死百病方乾薑半夏細辛紫菀蕘花一作芫花吳茱萸茯苓甘草甘遂防葵人參烏頭大黃杏仁各一分葶藶二分巴豆厚朴白薇各三分遠志菖蒲五味子前胡枳實蜀椒皂莢當歸大戟桂心各半分上二十八味為末蜜丸如梧子大先食服二丸日二服以知為度不知增之麻黃散治上氣嗽方麻黃半斤杏仁百枚甘草三兩桂心一兩上四味治下篩別研杏仁如脂納藥末和合臨氣上時服一方寸匕食久氣未下重服一方寸匕可至三匕氣發便服即止一方去桂心甘草蜀椒丸治上氣咳嗽太醫令王叔和所撰御服甚良方蜀椒五分烏頭杏仁石菖蒲礜石一云礬石皂莢各一分款冬花細辛紫菀乾薑各三分麻黃吳茱萸各四分上十二味為末蜜丸如梧子大暮臥吞二丸治二十年久嗽不過二十丸通氣丸治久上氣咳嗽咽中腥臭虛氣攪心痛眼疼耳中嘈嘈風邪毒疰時氣食不生肌肉胸中膈塞嘔逆多唾噁心心下堅滿飲多食少惡疰淋痛病方蜀椒二升飴糖三斤杏仁一升天門冬十分乾薑人參各四分烏頭七分桂心六分大附子五枚蜈蚣五節上十味為末別治杏仁如脂稍稍納藥末搗千杵煬飴乃納藥末中令調和含如半棗一枚日六七夜三四服以胸中溫為度若夢與鬼交通乃飲食者全用蜈蚣食不消加杏仁五合小腹急腰痛加天門冬杜仲有風加烏頭三枚附子一枚立夏後勿加也有停飲加葶藶三兩治咳逆上氣方蜀椒桂心海蛤各四分昆布海藻乾薑細辛各六分麥冬十分上八味為末蜜丸如梧子大飲服十丸加至二十丸日三服有人風虛中冷胸中滿上氣喉中如吹管聲吸吸氣上欲咳服此方得瘥治咳嗽胸脅支滿多唾上氣方礜石一作礬石烏頭一方不用菖蒲各一分細辛黃環各二分杏仁款冬花紫菀各三分吳茱萸四分乾薑五分蜀椒五合上十一味為末蜜丸如梧子大每服一丸著牙上咽汁日五六服劇者常含不止又方薑汁一升半砂糖五合上二味煎薑汁減半納糖更煎服之又方白糖五合皂莢末一方寸匕上二味先微暖糖令消納皂莢末合和相得丸如小豆先食服三丸又方酒一升半浸肥皂莢兩挺經宿煮取半升分三服七日忌如藥法若吐多以醋飯三四口止之又方巴豆炮去皮勿傷破肉白飲吞下初日二枚二日三枚又方服芥子七丸以油酒下之射干煎治咳嗽上氣方生射干款冬花各二兩紫菀細辛桑白皮附子甘草各二分白蜜竹瀝生薑汁各一升一云乾薑五兩飴糖五兩上十一味先以射干納白蜜竹瀝中煮五六沸去之㕮咀六物以水一升合浸一宿煎七上七下去滓乃合飴糖薑汁煎如餔服如酸棗一丸日三劇者夜二不止加之以止為度杏仁煎治冷嗽上氣鼻中不利方杏仁五合五味子款冬花各三合紫菀乾薑各二兩桂心三兩甘草四兩麻黃一斤上八味以水一斗煮麻黃取四升治諸藥為末又納膠飴半斤白蜜一斤合納汁中攪令相得煎如飴先食服如半棗許日三服不知者加之以知為度又方治忽暴嗽失聲語出方杏仁薑汁砂糖蜜各一升紫菀五味子各三兩通草貝母各四兩桑皮五兩上九味㕮咀以水九升煮取三升去滓納杏仁脂薑汁蜜糖和攪微火煎取四升初服三合日再夜一後稍加之通聲膏方五味子款冬花通草各三兩人參青竹皮細辛桂心菖蒲各二兩杏仁薑汁各一升白蜜二升棗膏三升酥五升上十三味㕮咀以水五升微火煎三上三下去滓納薑汁棗膏酥蜜煎令調和酒服棗大二丸杏仁飲子治暴熱嗽方杏仁四十枚紫蘇子一升橘皮一兩柴胡四兩上四味㕮咀以水一斗煮取三升分三服蘇子煎治上氣咳嗽方蘇子杏仁生薑汁地黃汁白蜜各二升上五味搗蘇子以薑汁地黃汁澆之以絹絞取汁澆又絞令味盡去滓熬杏仁令黃黑治如脂又以向汁澆之絹絞往來六七度令味盡去滓納蜜合和置銅器中於湯上煎之令如飴每服方寸匕日三夜一崔氏無地黃汁又方乾薑末五兩膠飴一升上二味和令調蒸五升米下冷以棗大含化稍稍咽之日五夜二芫花煎治新久嗽方芫花乾薑各二兩白蜜一升上二味為末納蜜中令相合微火煎令如糜每服如棗核大一枚日三夜一以知為度欲利者多服深師以治冷飲嗽又治三十年久嗽者以水五升煮芫花取三升去滓納薑加蜜合煮如糜服之款冬煎治同前款冬花乾薑紫菀各三兩五味子二兩芫花一兩熬令赤上五味㕮咀以水一斗煮三味取三升半去滓納芫花乾薑末加蜜三升合投湯中令調於銅器中微火煎令如飴每服半棗許日三治三十年咳嗽或飲或咳寒氣嗽雖不同悉主之方細辛款冬花防風紫菀各三兩藜蘆二兩蜀椒五合上六味㕮咀取藜蘆先著銅器中次紫菀次細辛次款冬次椒以大棗百枚間著諸藥間以水一斗二升微火煮令汁盡出棗曝令燥雞鳴時服半棗不知明旦服一枚以胸中溫溫為度若強人欲嗽吐者可小增服之便吐膿囊裹結吐後勿冷飲食咳愈止藥藥勢靜乃食不爾令人吐不止治三十年久嗽方百部根二十斤搗取汁煎如飴服一方寸匕日三服外臺和飴一斤煎成煎以溫粥調下深師方以白蜜二斤更煎五六沸服二合又方紫菀二兩款冬花三兩上二味治下篩先食飲服方寸匕日三服七日瘥又方白蜜一斤生薑二斤取汁上二味先稱銅銚斤兩訖納蜜復稱知數次納薑汁以微火煎令薑汁盡惟有蜜斤兩乃止旦服如棗大含一丸日三服禁一切雜食治久嗽不瘥方兔屎四十九枚硇砂二分胡桐律一分上三味為末蜜丸如梧子大每服三丸以粥飲下日三服吐令物盡即瘥紫菀丸治積年咳嗽喉中呀聲一發不得坐臥方紫菀貝母半夏桑白皮百部射干五味子各五分皂莢乾薑款冬花細辛橘皮鬼督郵各四分白石英杏仁各八分蜈蚣二枚上十六味為末蜜和丸如梧子大飲服十丸日再服稍加至二十丸崔氏無半夏射干乾薑橘皮鬼督郵細辛白石英有麻黃二兩芫根白皮一兩半以煮棗湯送下款冬丸治三十年上氣咳嗽唾膿血喘息不得臥方款冬花乾薑蜀椒吳茱萸桂心菖蒲人參細辛蕘花各五分紫菀甘草桔梗防風芫花茯苓皂莢各三分上十六味為末蜜丸如梧子大酒服三丸日三又方款冬花紫菀細辛蜀椒桂心菖蒲人參甘草防風石斛川芎當歸藁本白朮半夏天雄鍾乳麻黃各三兩獨活二兩烏頭附子芫花各一兩桃仁二十枚大棗二十五枚上二十四味為末蜜丸如梧子大酒服二十丸日二服不知加之酒漬服亦得又方款冬花紫菀乾薑桂心各三兩細辛二分杏仁皂莢礜石菖蒲烏頭各一分川椒五合吳茱萸六合上十二味為末蜜丸如梧子大酒服五丸日三夜一二十年嗽不過五十日愈患咳嗽喉鳴上氣服一劑永瘥治肺傷咳唾膿血腸澀背痛不能食惡風目暗䀮䀮足脛寒冷方白膠生薑各五兩桂心人參紫菀各二兩地黃切半升桑白皮切二升川芎大麻仁飴糖各一升大麥二升大棗二十枚上十二味㕮咀以水一斗五升煮麥取一斗去麥納藥煮取三升分五服五味子湯治唾中有膿血牽胸脅痛方五味子桔梗紫菀甘草川斷各三兩桑皮地黃各五兩竹茹三兩赤小豆一升上九味㕮咀以水九升煮取二升七合分三服竹皮湯治咳逆下血不息方生竹皮三兩紫菀二兩飴糖一斤生地黃切一斤上四味㕮咀以水六升煮取三升去滓分三服百部丸治諸嗽不得氣息唾膿血方百部根三兩升麻半兩桂心五味子甘草乾薑紫菀各一兩上七味為末蜜丸如梧子大每服三丸日三以知為度治上氣咳嗽喘息喉中有物唾血方生薑汁杏仁各二升豬膏二合蜜飴糖各一升上五味先以豬膏煎杏仁色黃出之以紙拭令盡搗如膏合薑汁糖蜜等合煎令可丸每服如杏核大一枚日夜六七服漸漸增加之治一切肺病咳嗽膿血及唾血不止方好酥三十斤三遍煉停取凝當出醍醐服一合日三服瘥止一切藥皆不出此神方又方三煉酥如雞子黃適寒溫灌鼻中日二夜一鍾乳七星散一名吸散治寒冷咳嗽上氣胸滿唾膿血方鍾乳礬石款冬花桂心等分上四味治下篩作如大豆七聚七星形以小筒吸取酒送下先食服日三不止加之數試大驗又云臨臥吸服之又方鍾乳細辛款冬花天雄紫菀石膏等分上六味治下篩取如大豆七聚如前法吸之日二只得食粥七日嗽愈乃止若大豆聚不知小益之勿太多七星散治三十年咳嗽方款冬花紫菀桑白皮代赭細辛伏龍肝各一兩上六味治下篩作七星聚如扁豆者以竹筒口當藥上一一吸咽之令藥入腹中先食日三丸凡服四日日復作七星聚以一臠肉炙令熟以展轉藥聚上令藥悉遍肉上仰臥咀嚼肉細細咽汁令藥力歆歆割割然毒氣入咽中藥力盡總咽即取瘥止未瘥作之如初羊牛鹿肉皆可勿用豬肉治嗽熏法以熟艾薄敷布紙上紙廣四寸後以硫黃末敷布艾上務令調勻以荻一枚如紙長卷之作十枚先以火燒纏下去荻煙從孔出口吸煙咽之取吐止明旦復熏之如前日一二止自然可瘥得食白粥余皆忌又方熏黃一兩研令細以蠟紙並上熏黃相入調勻卷之如前法熏之亦如上法日一二止以吐為度七日將息後以羊肉羹補之又方爛青布廣四寸上布艾艾上布青礬末礬上布少熏黃末又布少鹽又布少豉末急卷之燒令著納燥罐中以紙矇頭便作一小孔吸取煙細細咽之以吐為度若心胸悶時略歇煙盡止日一二用用三卷不盡瘥三七日慎油膩論曰凡上氣多有服吐藥得瘥者亦有針灸得除者宜深體悟之灸法嗽灸兩乳下黑白際各百壯即瘥又以蒲當乳頭周匝圍身令前後正平當脊骨解中灸十壯又以繩橫量口中折繩從脊灸繩兩頭邊各八十壯三報三日畢兩邊者是口合度灸從大椎數下行第五節下第六節上穴在中間即神道穴隨年壯並主上氣灸手屈臂中橫紋外骨捻頭得痛處十四壯上氣咳嗽短氣氣滿食不下灸肺募五十壯上氣咳逆短氣風勞百病灸肩井二百壯上氣短氣咳逆胸背痛灸風門熱府百壯上氣咳逆胸滿短氣牽背痛灸巨闕期門各五十壯上氣胸滿咳逆短氣灸雲門五十壯上氣咳逆胸痹背痛灸胸堂百壯不針上氣咳逆灸膻中五十壯上氣氣閉咳逆咽冷聲破喉猜灸天瞿五十壯一名天突逆氣虛勞寒損憂恚筋骨攣痛心中咳逆泄疰腹滿喉痹頸項強腸痔痔血陰急鼻衄骨痛大小便澀鼻中干煩滿狂走易氣凡二十二病皆灸絶骨五十壯穴在外踝上三寸宛宛中痰飲第六論一首方四十一首灸法一首論曰夫飲有四何謂師曰有痰飲有懸飲有溢飲有支飲問曰四飲之證何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水過多水行歸於四肢當汗出而汗不出身體疼重謂之溢飲其人咳逆倚息短氣不得臥其形如腫謂之支飲凡心下有水者築築而悸短氣而恐其人眩而癲先寒即為虛先熱即為實故水在於心其人心下堅築築短氣惡水而不欲飲水在於肺其人吐涎沫欲飲水水在於脾其人少氣身體盡重水在於肝脅下支滿嚏而痛水在於腎心下悸夫病人卒飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後喜虛耳脈偏弦者飲也肺飲不弦但喜喘短氣支飲亦喘而不能眠加短氣其脈平也留飲形不發作無熱脈微煩滿不能食脈沉滑者留飲病病有留飲者脅下痛引缺盆嗽轉甚其人咳而不得臥引項上痛咳者如小兒掣瘲狀夫胸中有留飲其人短氣而渴四肢歷節痛其脈沉者有留飲也心下有留飲其人背寒冷大如手病人肩息上引此皆有溢飲在胸中久者缺盆滿馬刀腫有劇時此為氣飲所致也膈上之病滿喘咳吐發則寒熱背痛惡寒目泣自出其人振振身瞤劇必有伏飲病人一臂不遂時復轉移在一臂其脈沉細此非風也必有飲在上焦其脈虛者為微勞營衛氣不周故也冬自瘥一本作久久自瘥病痰飲者當以溫藥和之小半夏湯病心腹虛冷遊痰氣上胸脅滿不下食嘔逆者方半夏一升生薑一斤橘皮四兩上三味㕮咀以水一斗煮取三升分三服若心中急及心痛納桂心四兩若腹滿痛納當歸三兩羸弱及老人尤宜服之一方用人參二兩仲景無橘皮人參又方半夏一升生薑一斤桂心三兩甘草一兩上四味㕮咀以水七升煮取二升半分三服甘草湯治心下痰飲胸脅支滿目眩方甘草二兩桂心白朮各三兩茯苓四兩上四味㕮咀以水六升宿漬煮取三升去滓服一升日三小便當利十棗湯治病懸飲者若下後不可與也凡上氣汗出而咳者此懸飲也方見本卷咳嗽篇中小青龍湯病溢飲者當發其汗小青龍湯主之方見本卷咳嗽篇中範汪用大青龍湯木防己湯治膈間有支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈者用此方木防己三兩桂心二兩人參四兩石膏雞子大十二枚上四味㕮咀以水六升煮取二升分二服虛者即愈實者三日復發發則復與若不愈去石膏加茯苓四兩芒硝三合微下利即愈一方不加茯苓厚朴大黃湯夫酒客咳者必致吐血此坐久飲過度所致其脈虛者必胸滿胸中有支飲此方主之厚朴一尺大黃六兩枳實四兩上三味㕮咀以水五升煮取二升溫服分二服嘔家不渴渴為欲解今反不渴心下有支飲故也小半夏湯主之又有先渴即嘔者此為水停心下小半夏加茯苓湯主之小半夏加茯苓湯治卒嘔吐心下痞膈間有水目眩悸方半夏一升生薑半斤茯苓三兩上三味㕮咀以水七升煮取一升五合去滓溫分再服胡洽不用茯苓用桂心四兩五苓散假令瘦人臍下有悸者吐涎沫而癲眩水也此方主之方見前九卷傷寒上椒目丸治腹滿口乾燥此腸間有水氣此方主之椒目木防己大黃各一兩葶藶二兩上四味為末蜜丸如梧子大先食飲服一丸日三後稍增口中有津液止渴者加芒硝半兩甘遂半夏湯病者脈伏其人欲自利利者反快雖利心下續堅滿此為留飲欲去故也此方主之甘遂大者三枚半夏十二枚以水一升煮取半升芍藥三枚甘草一枚如指大以水一升煮取半升上四味以蜜半升納二藥汁合一升半煎取八合頓服之大茯苓湯主胸中結痰飲澼結臍下弦滿嘔逆不得食亦主風水方茯苓白朮各三兩半夏桂心細辛一作人參生薑各四兩橘皮附子當歸各二兩上九味㕮咀以水一斗煮取三升去滓分三服服三劑良茯苓湯主胸膈痰滿方茯苓四兩半夏一升生薑一斤桂心八兩上四味㕮咀以水八升煮取二升半分四服冷極者加大附子四兩若氣滿者加檳榔三七枚大半夏湯治冷痰飲澼胸膈中氣不運方半夏一升白朮三兩茯苓人參甘草桂心附子各二兩生薑八兩上八味㕮咀以水八升煮取三升分三服半夏湯治痰飲澼氣吞酸方半夏吳茱萸各三兩生薑六兩附子一枚上四味以水五升煮取二升半分三服老少各半日三干棗湯治腫及支滿澼飲方大棗十枚大戟大黃甘草甘遂黃芩各一兩芫花蕘花各半兩上八味㕮咀以水五升煮取一升六合分四服空心服以快下為度當歸湯治留飲宿食不消腹中積聚轉下方當歸人參桂心黃芩甘草芍藥芒硝各二兩大黃四兩澤瀉生薑各三兩上十味㕮咀以水一斗煮取三升分三服治痰飲飲食不消乾嘔方人參旋覆花橘皮細辛各一兩澤瀉白朮杏仁枳實各一兩茯苓半夏生薑柴胡芍藥各三兩上十三味㕮咀以水九升煮取二升七合分三服日二治胸中痰飲腸中水鳴食不消嘔吐水方檳榔十二枚生薑杏仁白朮各四兩半夏八兩茯苓五兩橘皮三兩上七味㕮咀以水一斗煮取三升去滓分三服吳茱萸湯治胸中積冷心嘈煩滿汪汪不下飲食心胸應背痛方吳萸三兩半夏四兩人參桂心各二兩甘草一兩生薑三兩大棗二十枚上七味㕮咀以水九升煮取三升去滓分三服日三治胸膈心腹中痰水冷氣心下汪洋嘈煩或水鳴多唾口中清水自出脅肋急脹痛不欲飲食此皆胃氣弱受冷故也其脈來沉弦細遲悉主之方半夏生薑各五兩芍藥三兩茯苓四兩旋覆花細辛橘皮桂心人參甘草桔梗各二兩上十一味㕮咀以水一斗煮取三升分三服病先有時喜水下者用白朮三兩去旋覆花若欲得利者加大黃二兩須微調者用乾地黃治冷熱久澼實不能飲食心下虛滿如水狀方前胡半夏茯苓生薑各四兩枳實白朮甘草各三兩桂心二兩上八味㕮咀以水八升煮取三升分三服前胡湯治胸中久寒澼實隔塞胸痛氣不通利三焦冷熱不調飲食減少無味或寒熱身重臥不欲起方前胡三兩人參當歸半夏甘草各二兩大黃防風麥冬吳萸黃芩各一兩生薑四兩杏仁四十枚上十二味㕮咀以水一斗煮取三升去滓分三服深師方云若脅下滿加大棗十二枚此利水亦佳旋覆花湯治胸膈痰結唾如膠不下食者方旋覆花細辛前胡茯苓甘草各二兩生薑八兩桂心四兩半夏一升烏頭三枚上九味㕮咀以水九升煮取三升去滓分三服薑椒湯治胸中積聚痰飲飲食減少胃氣不足咳逆嘔吐方薑汁七分川椒三合桂心附子甘草各一兩橘皮桔梗茯苓各二兩半夏三兩上九味㕮咀以水九升煮取二升半去滓納薑汁煮取二升分三服服三劑止若飲服大散諸五石丸必先服此湯及進黃耆丸佳一方不用甘草薑附湯治痰冷澼氣嘔沫胸滿短氣頭痛飲食不消化方生薑八兩附子四兩生用四破上二味㕮咀以水八升煮取二升分四服亦主卒風撩膈散治心上結痰飲實寒冷心悶方瓜丁二十八枚赤小豆二七枚人參甘草各一分上四味治下篩為末酒服方寸匕日二亦治諸黃斷膈湯治胸中痰澼方恆山三兩甘草松蘿各一兩瓜蒂二十一枚上四味㕮咀以水酒各二升半煮取一升半分三服後漸減之得快吐後須服半夏湯方見本卷前篇松蘿湯治胸中痰積熱皆除方松蘿二兩烏梅梔子各十四枚恆山甘草各三兩上五味㕮咀以酒三升浸一宿平旦以水三升煮取一升半去滓頓服之亦可分二服一服得快吐即止杜蘅湯治吐百病方杜蘅松蘿各三兩瓜丁二七枚上三味㕮咀以酒一升二合漬二宿去滓分二服若一服即吐者止未吐者重服相去如人行十里久令藥力盡服稀糜一升即定老小用之亦佳蜜煎主寒熱方蜜五合恆山甘草各一兩一方用半兩上三味取二味㕮咀以水一斗煮取二升去滓納蜜溫服七合吐即止不吐更服七合勿與冷水又方蜜二合醋八合上二味調和平旦頓服須臾猥猥然欲吐擲之若意中不盡明旦更服無不大嘔安穩治卒頭痛如破非中冷又非中風其痛是胸膈中痰厥氣衝所致名為厥頭痛吐之即瘥方單煮茗作飲二三升許適冷暖飲二升須臾擲令吐吐畢又飲如此數過劇者須吐膽汁乃止不損人而渴則瘥蔥白湯治冷熱膈痰發時頭痛悶亂欲吐不得者方蔥白二七莖桃葉一握一作枇杷葉真珠恆山烏頭甘草各半兩上六味㕮咀以酒水各四升和煮取三升去滓納珠末每服一升吐即止大五飲丸主五種飲一曰留飲水停在心下二曰澼飲水澼在兩脅下三曰痰飲水在胃中四曰溢飲水溢在膈上五臟間五曰流飲水在腸間動搖有聲夫五飲者由飲酒後及傷寒飲冷水過多所致方蓯蓉遠志苦參藜蘆烏賊骨白朮甘遂大黃石膏栝蔞根桔梗半夏紫菀前胡五味子芒硝桂心芫花大戟葶藶黃芩貝母人參茯苓當歸芍藥各一兩甘草恆山山藥厚朴細辛附子各三分巴豆三十枚上三十三味治下篩蜜和丸如梧子大飲服三丸日三稍稍加之以知為度旋覆花丸治停痰澼飲結在兩脅腹脹滿羸瘦不能食食不消化喜唾乾嘔大小便或澀或利腹中搖動作水聲腹內熱口乾好飲水漿卒起頭眩欲倒脅下痛方旋覆花桂心枳實人參各五分甘遂三分吳茱萸細辛大黃黃芩葶藶厚朴芫花橘皮各四分乾薑芍藥白朮各六分茯苓狼毒烏頭礜石各八分上二十味為末蜜丸如梧子大酒服五丸日二後加以知為度延年方無白朮狼毒烏頭礜石細辛黃芩厚朴吳茱萸芫花橘皮甘遂有皂莢附子各二分蜀椒杏仁防葵各三分地黃四分中軍候黑丸治澼飲停結滿悶目暗方芫花三兩巴豆八分杏仁五分桂心桔梗各四分上五味為末蜜丸如胡豆每服三丸稍增得快下止順流紫丸治心腹積聚兩脅脹滿留飲痰癖大小便不利小腹切痛膈上塞方石膏五分桂心四分巴豆七枚代赭烏賊骨半夏各三分上六味為末蜜丸如胡豆平旦服一丸加至二丸胡洽有藜蘆蓯蓉當歸各三分範汪方無石膏半夏有當歸一分蓯蓉二分茯苓三分藜蘆五分治停痰澼飲結在兩脅腹滿羸瘦不能飲食食不消喜唾乾嘔大小便或澀或利方旋覆花大黃附子茯苓椒目桂心芫花狼毒乾薑芍藥枳實細辛各八分上十二味為末蜜丸如梧子大飲下三丸日三服後漸增治風氣膈上痰飲方用不開口苦瓠一枚湯煮三五沸以物裹尉心膈上治結積留飲澼囊胸滿飲食不消方灸通谷五十壯九蟲第七論三首方四十五首論曰人腹中有尸蟲此物與人俱生而為人大害尸蟲之形狀似大馬尾或如薄筋依脾而居乃有頭尾皆長三寸又有九蟲一曰伏蟲長四分二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶六曰胃蟲狀如蝦蟆七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲狀伏蟲則群蟲之主也蛔蟲貫心則殺人白蟲相生子孫轉多其母轉大長至四五丈亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸之間多則為痔劇則為癩因人瘡痍即生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無類婦人常多其蟲凶惡人之極患也常以白筵草沐浴佳根葉皆可用既是香草且是尸蟲所畏也論曰凡欲服補藥及治諸病皆須去諸蟲並痰飲宿澼醒醒除盡方可服補藥不爾必不得藥力治肝勞生長蟲在肝為病恐畏不安眼中赤方蠟吳茱萸東行根皮各二兩乾漆四兩雞子五枚去黃粳米粉半斤上五味搗吳茱萸皮為末和藥銅器中煎可丸如小豆大宿勿食平旦飲服一百丸小兒服五十丸蟲當爛出集驗方無吳萸根名雞子丸治心勞熱傷心有長蟲名曰蠱長一尺貫心為病方雷丸橘皮桃仁一作桃皮石蠶各五分狼牙六分貫衆二枚殭蠶三七枚蕪荑青葙乾漆各四分亂髮如雞子大燒吳茱萸根皮七分上十二味為末蜜丸如梧子大空腹飲或酒下七丸加至二七丸日二服一方無石蠶治脾勞熱有白蟲在脾中為病令人好嘔下蟲方大麻子八升東引吳茱萸根一尺大者橘皮二兩上三味㕮咀以水煎臨時量服凡合禁聲勿語道作藥蟲當聞便不下切忌之治肺勞熱生蟲在肺為病方狼牙三兩東行吳茱萸根白皮五合東行桑根白皮切一升上三味㕮咀以酒七升煮取一升平旦頓服之治腎勞熱四肢腫急蟯蟲狀如菜蟲在腎中為病方蕪荑胡粉槐皮各一兩乾漆二兩貫衆三枚杏仁四十枚吳萸五十枚上七味治下篩平旦以井花水服方寸匕加至一匕半瘥止治蟯蟲方以好鹽末二兩苦酒半升合銅器中煮數沸宿不食空心頓服之又方真珠二兩亂髮如雞子大燒末上二味治下篩以苦酒調旦起頓服之肘後方用治三蟲蘼蕪丸治少小有蛔蟲結在腹中數發腹痛微下白汁吐悶寒熱飲食不生肌皮肉痿黃四肢不相勝舉方蘼蕪貫衆雷丸山茱萸天冬狼牙各八分雚蘆甘菊各四分上八味為末蜜丸如大豆三歲飲服五丸五歲以上以意加之漸至十丸加雚蘆六分名雚蘆丸治老小及婦人等萬病腹內冷熱不通急滿痛胸膈堅滿手足煩熱上氣不得飲食身體氣腫腰腳不遂腹內狀如水雞鳴女人月經不調無所不治治蛔蟲方雚蘆末以飲臛和服方寸匕不覺加之備急方治蟯蟲治熱患有蛔蟲懊惱方雚蘆十分乾漆扁竹各二分上三味治下篩米飲和一合服之日三治蛔蟲在胃中漸漸羸人方乾漆外臺作鹽醇酒白蜜各一升上三味納銅器中微火煎令可丸如桃核一枚溫酒中宿勿食旦服之蟲必下未下更服外臺治蟯蟲又方取楝實納醇苦酒中浸再宿用綿裹納穀道中入三寸一日易之集驗方用治長蟲治蛔蟲攻心腹痛方銼薏苡根三斤以水七升煮取三升先食服之蟲即死出又方鶴蝨為末苦酒空腹服方寸匕佳又方七月七日採蒺藜子陰乾燒灰先食服方寸匕日三即瘥治寸白蟲方吳茱萸細根一握熟搗大麻子三升熬搗末上二味以水三升和搦取汁平旦頓服至巳時與好食令飽須臾蟲出不瘥明旦更合服之不瘥三日服肘後治三蟲以酒漬取汁服又方蕪荑六分狼牙四分白蘞二分上三味治下篩以苦酒二合和一宿次早空腹服之又方胡麻一升胡粉一兩上二味為末平旦空腹以豬肉臛汁啖盡即瘥又方以棐子四十九枚去皮月上旬平旦空腹服七枚七日服盡蟲消成水永瘥又方以吳茱萸北陰根干去土切一升以酒一升浸一宿平旦分二服凡茱萸皆用細根東引北陰者良若如指以上大不任用又方用石榴根如茱萸法亦可水煮服又方大麻搗取汁五升分五服亦治小兒蛔蟲又方以好麻油二升煎令熟納蔥白三寸令黑便熟冷頓服之又方熬餳令十分燥作末以方寸匕納羊肉臛中服之又方桑根白皮切三升以水七升煮取二升宿勿食平旦空腹頓服之又方檳榔二七枚治下篩以水二升半先煮其皮取一升半去滓納末頓服暖臥蟲出出不盡更合服取瘥止宿勿食旦服之論曰凡得傷寒及天行熱病腹中有熱又人食少腸胃空虛三蟲行作求食蝕人五臟及下部若齒齦無色舌上盡白甚者唇里有瘡四肢沉重忽忽喜眠當數看其上唇內有瘡唾血唇內如粟瘡者心內懊惱痛悶此蟲在上蝕其五臟下唇內生瘡者其人喜眠此蟲在下蝕其下部人不能知可服此蝕蟲藥不爾𧈟蟲殺人又曰凡患濕𧈟者多是熱病後或久下不止或有客熱結在腹中或易水土溫涼氣著多生此病亦有干𧈟不甚泄痢而下部瘡癢不問乾溼久則殺人凡濕得冷而苦痢單煮黃連及艾葉苦參之屬皆可用之若病人齒齦無色舌上白者或喜眠煩憒不知痛癢處或下痢急治下部不曉此者但攻其上不以下部為意下部生瘡蟲蝕其肛肛爛見五臟便死燒艾於竹筒熏之治傷寒𧈟蟲病方取生雞子小頭叩出白入漆一合熟和攪令極調當沫出更納著殼中仰吞之食頃或半日乃吐下蟲劇者再服蟲盡熱除病愈治濕𧈟方黃連十分生薑十分苦參四分艾葉八分上四味㕮咀以水一斗煮取三升分三服久者服三劑懊惱散治濕𧈟瘡爛殺除蟲𧈟方扁竹半兩雚蘆雷丸青葙子女青桃仁各三兩上六味治下篩粥飲服方寸匕日三加至二匕亦可酒服青葙散治熱病有𧈟下部生瘡方青葙子一兩橘皮扁竹各二兩雚蘆四兩甘草一分狼牙三分上六味治下篩米飲和每服一合日三不知稍加之小品無甘草薑蜜湯治濕𧈟方生薑汁五合白蜜三合黃連三兩上三味以水二升別煮黃連取一升去滓納薑蜜更煎取一升二合五歲兒平旦空腹服四合日二治𧈟蟲蝕下部癢穀道中生瘡方阿膠當歸青葙子各二兩艾葉一把上四味㕮咀以水八升煮取二升半去滓分三服杏仁湯治𧈟方杏仁五十枚苦酒二升鹽一合上三味和煮取五合頓服之小兒以意量之桃皮湯治蟯蟲蛔蟲及痔𧈟蟲食下部生瘡方桃皮艾葉各一兩槐子三兩大棗三十枚上四味㕮咀以水三升煮取半升頓服之良豬膽苦酒湯治熱病有𧈟上下攻移殺人方豬膽一具苦酒半升和之火煎令沸三上三下藥成放溫空腹飲三滿口蟲死便愈治溫病下部有瘡蟲蝕人五臟方雄黃皂莢各一分麝香硃砂各二分上四味為末蜜和搗萬杵初得病酒服如梧子大一丸日二若下部有瘡取梧子大末納下部日二雄黃兌散治時氣病𧈟下部生瘡方雄黃半兩桃仁一兩青葙子黃連苦參各三兩上五味為末綿裹如棗核大納下部亦可棗汁服方寸匕日三治濕𧈟方青黛二兩黃連黃柏丁香各一兩麝香二分上五味治下篩以小棗大納下部中日一度重者棗大和車脂二三合灌下部中日二度治下部生瘡方濃煮桃皮煎如飴取納下部若口中有瘡含之治濕𧈟方取生薑刮去皮斷理切之極熟研取汁一升半又以水一升半合和相得平旦空腹服之仍削生薑二枚如繭大以楸葉桃葉數重裹訖於煻灰火中燒令極熱納下部中食頃若濕盛者三旦作頻服無有不瘥治蟲蝕下部方胡粉雄黃上二味等分為末著穀道中亦治小兒治病𧈟蟲方燒馬蹄灰作末以豬脂和敷綿繩上納下部中日五度治大孔蟲癢方蒸大棗取膏以水銀捻和長三寸綿裹訖宿納大孔中明旦蟲皆出水銀損腸宜慎之治傷寒熱病多睡變成濕𧈟四肢煩疼不得食方羊桃十斤切搗令熟暖湯三斗淹浸之日正午時入中坐一炊久不過三度瘥治熱病蛄毒令人喜寐不知痛處面赤如醉下利膿血當數視其人下部孔稷稷然一云搜搜然赤即𧈟瘡也劇因殺人見人肝肺服藥不瘥可熏之方以泥作小罌令受一升竹筒一枚如指大一頭橫穿入罌腹中一頭納入穀道中淺入可取熟艾如雞子大著罌中燃之於罌口吹煙令入人腹艾盡乃止大人可益艾小兒減之羸者勿多多亦害人日再熏不過三作蟲則死下斷亦可末燒雄黃如此熏之
