body:
  text: 卷十傷寒方下凡七類傷寒雜治第十論一首方五十一首灸法一首論曰凡除熱解毒無過苦酸之物故多用苦參青葙艾梔子葶藶苦酒烏梅之屬是其要也夫熱盛非苦酸之物不解也熱在身中既不時治治之又不用苦酸之藥此如救火不以水也必不可得脫免也又曰今諸療多用辛甘薑桂人參之屬此皆貴价難得常有比行求之轉以失時而苦參葶藶青葙艾之屬所在盡有除熱解毒最良勝於向之貴价藥也前後數參並用之得病內熱者不必按藥次也便以青葙苦參艾苦酒療之但稍與促其間無不解也扁鵲曰病在腠理湯熨之所及病在血脈針石之所及病在骨髓無可奈何而凡醫治病或言且待使病成乃頓去之此為妄矣當預約束家中及所部曲具語解此意使有病者知之為要治溫氣病欲死方苦參一兩以酒二升煮取一升盡飲之當吐則除諸毒病服之覆取汗皆愈張文仲及肘後云治熱毒氣垂死破棺千金湯苦參湯治熱病五六日以上方苦參三兩黃芩二兩生地黃八兩上三味㕮咀以水八升煎取二升適寒溫服一升日再凝雪湯治時行毒病七八日熱積聚胸中煩亂欲死起死人拓湯方芫花一升以水三升煮取一升半漬故布敷胸上不過三敷熱即除當溫暖四肢護厥逆也栝蔞湯治傷寒中風五六日以上但胸中煩乾嘔方栝蔞實一枚黃芩甘草各三兩生薑四兩大棗十二枚柴胡八兩上六味㕮咀以水一斗二升煮取五升絞去滓適寒溫服一升日三蘆根飲子治傷寒後嘔噦反胃及乾嘔不下食方生蘆根切青竹茹各一升生薑三兩粳米三合上四味以水七升先煮千里鞋底一隻取五升澄清下藥煮取二升半隨便飲不瘥重作取瘥治傷寒後嘔噦方通草三兩生蘆根切一升橘皮一兩粳米三合上四味㕮咀以水五升煮取二升隨便稍飲不瘥更作取瘥止治傷寒後虛羸少氣嘔吐方石膏麥冬半夏各一升竹葉二把人參二兩上五味㕮咀以水一斗煮取六升去滓納粳米一升米熟湯成飲一升日二服一方加生薑五兩此方是仲景竹葉湯方前卷汗後門中已有但少甘草分兩小別治毒熱攻手足赤腫焮熱疼痛欲脫方煮馬屎若羊屎汁漬之日三度又方濃煮虎杖根適寒溫以漬手足令至踝上一尺止又方稻穰灰汁漬之又方取好酒煮苦參漬之又方豬膏和羊屎塗之亦佳又方取常思草絞取汁漬之一名蒼耳漏蘆連翹湯治時行熱毒變作赤色癰疽丹疹熱毒赤腫及眼赤痛生障翳方漏蘆連翹黃芩麻黃白蘞甘草各二兩枳實大黃各三兩升麻二兩上九味㕮咀以水九升煮取三升分三服相去如人行五里久更服熱盛者可加芒硝二兩豬膽湯治傷寒五六日斑出方豬膽苦酒各三合雞子一枚上三味合煎三沸強者盡服之羸者須煎六七沸分為二服汗出即愈治人及六畜時氣熱病豌豆瘡方濃煮黍穰汁洗之一莖是穄穰即不瘥瘡若黑者搗蒜封之又方煮蕓薹洗之治熱病後豌豆瘡方黃連三兩以水二升煮取八合頓服之又方真波斯青黛大如棗水服之瘥又方青木香二兩以水三升煮取一升頓服之愈又方小豆末雞子白和敷之木香湯治瘡出煩疼者方青木香二兩薰陸香礬石丁香各一兩麝香半兩上五味㕮咀以水四升煮取一升半分再服熱毒盛者加犀角一兩無犀角以升麻代之病輕者去礬石神驗又方芒硝和豬膽塗上勿動痂落無痕仍臥黃土末上良此病小便澀有血者內壞瘡皆黑靨不出膿者死不治也治內發瘡盛方酢四合大豬膽一具上二味合煎三沸服一合日五服之良治豌豆瘡初發覺欲作者方煮大黃五兩服之愈治時行病發瘡方取好蜜遍身摩瘡上亦可以蜜煎升麻摩之並數數食之又方灸兩手腕研子骨尖上三壯男左女右治傷寒鼻衄肺間有餘熱故也熱因血自上不止用此方牡蠣一兩半石膏一兩六銖上二味治下篩酒服方寸匕日三四亦可蜜丸如梧子大用治大病瘥後小勞便鼻衄者治傷寒熱病喉中痛閉塞不通方生烏扇一斤切豬脂一斤上二味合煎藥成去滓取如半雞子大薄綿裹之納喉中稍稍咽之取瘥又方升麻芍藥羚羊角各三兩通草四兩射干二兩生蘆根切一升上六味㕮咀以水七升煮取二升半分作三服治熱病口中苦下氣除熱喉中鳴煎方石膏半升蜜一升上二味以水三升先煮石膏取二升次納蜜復煎取如餳含如棗核許盡復含之大良治傷寒熱病後口乾喜唾咽痛方大棗二十枚烏梅十枚上二味合搗蜜和含如杏核大咽其汁甚驗赤石脂禹餘糧湯傷寒服湯藥而下利不止心下痞堅服瀉心湯竟復以他藥下之利不止醫以理中與之而利益甚理中治中焦此利在下焦治之方禹餘糧赤石脂各一斤碎上二味以水六升煮取二升分三服複利不止者當利其小便治傷寒後下利膿血方阿膠一兩黃柏二兩黃連四兩梔子仁十四枚上四味㕮咀以水六升煮取二升去滓納阿膠更煎令消分為三服甲乙方無黃柏有黃芩治赤白下膿小兒得之三日皆死此有䘌蟲在下部方麝香礬石巴豆附子真珠雄黃等分上六味治合取桑條如箭竿長三寸以綿纏頭二寸唾濡綿展取藥著綿上納穀道中半日復易之日再神效麻黃升麻湯治傷寒六七日其人大下後脈沉遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止為難治者方麻黃知母葳蕤亦作菖蒲黃芩各三兩升麻芍藥當歸乾薑石膏茯苓白朮桂心甘草麥冬各二兩傷寒論作天門冬上十四味㕮咀以水一斗先煮麻黃減二升去上沫納諸藥煮取三升分服一升微取汗愈治溫毒及傷寒內虛外熱攻胃下黃赤汁及爛肉汁赤滯下伏氣腹痛諸熱毒方梔子二十枚豉一升薤白一握上三味以水四升先煮梔子薤白令熟次納豉煮取二升半分三服頻服取瘥治病後虛腫方豉五升醇酒一斗上二味煮三沸及熱頓服不耐酒者隨性覆取汗治汗不止方地黃三斤切以水一斗煮取三升分作三服又方白朮葉作飲飲之又方白朮方寸匕以飲服之治卒得汗不止方以溫酒服牛羊脂愈一云服牛羊屎亦止治盜汗及汗無時方以韭根四十九枚水二升煮一升頓服之又方豉一升以酒二升漬三日服不瘥更合服不過三劑即止止汗方杜仲牡蠣等分上二味治下篩臨夜臥以水服五錢匕牡蠣散治臥即盜汗風虛頭痛方牡蠣白朮防風各三兩上三味治下篩酒服方寸匕日二此方一切泄汗服之三日皆愈又方牡蠣雷丸麻黃根各三兩乾薑甘草各一兩米粉二升上六味治下篩隨汗處粉之勞復第十一論二首方十八首食忌九條論曰凡熱病新瘥及大病之後食豬肉及羊血肥魚油膩等必當大下利醫所不能治也必至於死若食餅餌粢黍飴哺膾炙棗慄諸果物脯脩及堅實難消之物胃氣尚虛弱不能消化必更結熱適以藥下之則胃氣虛冷大利難禁不下之必死下之復危皆難救也熱病及大病之後多坐此死不可不慎也病新瘥後但得食糜粥寧少食令飢慎勿飽不得他有所食雖思之勿與之也引日轉久可漸食羊肉白糜若羹汁雉兔鹿肉不可食豬狗肉也新瘥後當靜臥慎勿早起梳頭洗面非但體勞亦不可多言語用心使意勞煩凡此皆令人勞復故督郵顧子獻得病已瘥未健請華佗視脈曰雖瘥尚虛未得復陽氣不足慎勿勞事余勞尚可女勞則死當吐舌數寸其婦聞其夫瘥從百餘里來省之經宿交接中間三日發熱口噤臨死舌出數寸病新瘥未滿百日氣力未平復而犯房室略無不死有士蓋正者疾愈後六十日已能行射獵犯房室即吐涎而死及熱病房室名為陰陽易之病皆難治多死近者有一士大夫小得傷寒瘥已十餘日能乘馬往來自謂平復犯房室即小腹急痛手足拘攣而死時病瘥後未滿五日食一切肉面者病更發大困時病瘥後新起飲酒及韭菜病更發時病新瘥食生魚鮓下利必不止時病新瘥食生菜令顏色終身不平復時病新瘥汗解飲冷水者損心包令人虛不復時病新瘥食生棗及羊肉者必膈上作熱蒸時病新瘥食羊犬等肉者必作骨中蒸熱時病新瘥食魚肉與瓜生菜令人身熱一本作腫時病新瘥食蒜膾者病發必致大困黃龍湯治傷寒瘥後更頭痛壯熱煩悶方仲景名小柴胡湯柴胡一斤半夏半斤黃芩三兩人參二兩甘草二兩生薑四兩大棗十二枚上七味㕮咀以水一斗煮取五升去滓服五合日三不嘔而渴者去半夏加栝蔞根四兩補大病後不足虛勞方萬病虛勞同用取七歲以下五歲以上黃牛新生者乳一升以水四升煎取一升如人體溫稍稍飲之不得過多十日服不絕為佳枳實梔子湯治大病瘥後勞復者方枳實三枚梔子十四枚豉一升綿裹上三味㕮咀以酢漿七升先煎減三升次納枳實梔子煮取二升次納豉煮五六沸去滓分再服覆取汗如有宿食者納大黃如博棋子五六枚治傷寒溫病後勞復或食或飲或動作方梔子仁三七枚石膏五兩香豉一升鼠屎尖頭大者二十枚上四味㕮咀以水七升煮取三升分三服治食大飽不消勞復脈實者方豉一升鼠屎二十枚梔子七枚大黃三兩上四味㕮咀以水六升煮取二升分三服微取汗應小鴨溏者止不溏者復作治新瘥早起及食多勞複方豉五合鼠屎尖頭者二十一枚上二味以水二升煮取一升盡服之溫臥令小汗愈崔氏加梔子七枚尤良肘後有麻子仁一升加水一升亦可納枳實三枚蔥白一虎口治重病新瘥早起勞及飲食多致發欲死方燒鱉甲末飲服方寸匕治病新瘥遇美飲食食過多食復者方取所食余燒為末飲調服二錢匕日三服麥門冬湯治勞復氣欲絕起死人方麥門冬一兩甘草二兩京棗二十枚竹葉切一升上四味㕮咀以水七升煮粳米一升令熟去米納諸藥煎取三升分三服不能服者綿滴湯納口中用之有效治食勞方面二升煮取汁服之又方杏仁五十枚以酢二升煎取一升服之取汗欲令病人不復方燒頭垢如梧桐子大服之治傷寒瘥後一年心下停水不能食者方生地黃五斤白朮一斤好曲二斤上三味合搗令相得曝乾下篩酒服方寸匕日三加至二匕論曰婦人溫病雖瘥若未平復血脈未和尚有熱毒而與之交接得病者名為陰易病其人身體重熱上衝胸頭重不能舉眼中生眵䁾一作膜來四肢一云膝脛拘急小腹絞痛手足拳者即死其亦有不即死者病苦少腹裡急熱上衝胸頭重不欲舉百節解離經脈緩弱血氣虛骨髓竭便噓噓吸吸氣力轉少著床不能動搖起止仰人或引歲月方死醫者張苗說有婢得病瘥後數十日有六人奸之皆死治婦人得病易丈夫丈夫得病易婦人方取女人中褌近隱處燒服方寸匕日三小便即利陰頭微腫此為愈矣女人病可取男褌一如此法治交接勞復陰卵腫縮腹中絞痛便欲死方取所交接婦人衣服以覆男子立愈令病人不復方取女人手足爪二十枚女人中衣帶一尺燒以酒若米飲汁服之治男子新病起近房內復者方取女人月經赤帛燒服方寸匕亦治陰卵腫縮入腹絞痛欲死治病後發亂不可理通頭法生麻油二斤將頭髮解開安銅沙羅中用油淹漬之細將釵子理髮斯須並自通矣百合第十二論二首方七首論曰百合病者謂無經絡百脈一宗悉致病也皆因傷寒虛勞大病已後不平復變成斯病其狀惡寒而嘔者病在上焦也二十三日當愈其狀腹滿微喘大便堅三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋瀝難者病在下焦也三十三日當愈各隨其證以治之百合之為病令人意欲食復不能食或有美時或有不用聞飲食臭時如有寒其實無寒如有熱其實無熱常默默欲臥復不得眠至朝口苦小便赤澀欲行復不能行諸藥不能治治之即劇吐利如有神靈所為也百合病身形如和其脈微數其候每溺時即覺頭痛者六十日乃愈百合病候之溺時頭不覺痛淅淅然寒者四十日愈百合病候之溺時覺快然但覺頭眩者二十日愈百合病證其人或未病而預見其候者或已病四五日而出或一月二十日後見其候者治之善誤也依證治之論曰百合病見在於陰而攻其陽則陰不得解也復發其汗為逆也見在於陽而攻其陰則陽不能解也復下之其病不愈要略云見於陽者以陽法救之見於陰者以陰法解之見陽攻陰復發其汗此為逆其病難治見陰攻陽乃復下之此亦為逆其病難治百合知母湯治百合病已經發汗後更發之方百合七枚擘知母三兩上二味以泉水先洗漬百合一宿當沫出水中明旦去水取百合更以泉水二升煮取一升置之復取知母切以泉水二升煮取一升汁合和百合汁中復煮取一升半分再服不瘥更依法合服百合滑石代赭湯治百合病下後更發者方百合七枚擘滑石三兩代赭一兩上三味先以泉水漬百合一宿明旦去水更以泉水二升煮百合取一升去滓又以水二升煮餘二味取一升納百合汁如前法復煎取一升半分再服百合雞子湯治百合病已經吐後更發者方以百合七枚擘漬一宿去汁以泉水二升煮取一升取雞子黃一枚納汁中攪令調分再服百合地黃湯治百合病始不經發汗吐下其病如初者方以百合七枚擘漬一宿去汁以泉水二升煮取一升納生地黃汁一升復煎取一升半分再服大便當去惡沫為驗也治百合病經月不解變成渴者方百合根一升以水一斗漬一宿以汁先洗病人身後食白湯餅勿與鹽豉也渴不瘥可用栝蔞根並牡蠣等分為散飲服方寸匕日三治百合病變而發熱者方百合根一兩干滑石三兩上二味治下篩飲服方寸匕日三當微利利止勿復服熱即除一本云治百合病小便赤澀臍下堅急治百合病變腹中滿痛者方但取百合根隨多少熬令黃色搗篩為散飲服方寸匕日三滿消痛止傷寒不發汗變成狐惑第十三論一首方三首論曰狐惑之病其氣如傷寒默默然欲眠目不得閉起臥不安其毒在咽喉為惑病在陰肛為狐病狐惑之病並惡飲食聞食臭其面目翕赤翕白翕黑毒食於上者則聲喝也喝一作嗄毒食下部者則乾嚥也此由溫毒氣所為食於上者瀉心湯主之食於下者苦參湯淹洗之食於肛外者熏之並用雄黃三片稍置瓦瓶中炭火燒向肛熏之並服湯也治狐惑湯方黃連四兩薰草四兩上二味㕮咀白酢漿一斗漬一宿煮取二升分三服赤小豆當歸散其人脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼得之七八日其四眥黃黑能食者膿已成也治之之方以赤小豆三升漬之令生牙足乃復干之加當歸三兩為末漿水服方寸匕日三即愈瀉心湯其病形不可攻不可灸因火為邪血散脈中傷脈尚可傷臟則劇井輸益腫黃汁出經合外爛肉腐為癰膿此為火疽醫所傷也夫脈數者不可灸因火為邪即為煩因虛逐實血走脈中火氣雖微內攻有力焦骨傷筋血難復也應在瀉心瀉心湯兼治下痢不止腹中愊堅而嘔吐腸鳴者方半夏半升黃芩人參乾薑各三兩黃連一兩甘草三兩大棗十二枚上七味㕮咀以水一斗煮取六升分服一升日三傷寒發黃第十四論三首證五首方三十四首針灸圖論曰黃有五種有黃汗黃疸谷疸酒疸女勞疸黃汗者身體四肢微腫胸滿不渴汗出如黃柏汁良由大汗出卒入水中所致黃疸者一身面目悉黃如橘由暴得熱以冷水洗之熱因留胃中食生黃瓜熏上所致若成黑疸者多死谷疸者食畢頭眩心忪怫鬱不安面發黃由失飢大食胃氣衝熏所致酒疸者心中懊惱足脛滿小便黃面發赤斑黃黑由大醉當風八水所致女勞疸者身目皆黃發熱惡寒小腹滿急小便難由大勞大熱而交接竟入水所致但依後方治之黃汗之為病身體浮腫發熱汗出不渴狀如風水汗沾衣色正黃如柏汁其脈自沉從何得之此病以汗出入水中浴水從汗孔入得之黃耆芍藥桂酒湯治黃汗方黃耆五兩芍藥三兩桂心三兩上三味㕮咀以苦酒一升水七升合煎取三升飲一升當心煩也至六七日稍稍自除心煩者苦酒阻故也桂枝黃耆湯治諸病黃疸宜利其小便假令脈浮當以汗解方桂枝芍藥生薑各三兩甘草二兩黃耆五兩大棗十二枚上六味㕮咀以水八升微火煎取三升去滓溫服一升覆取微汗須臾不汗者飲稀熱粥以助湯若不汗更服湯麻黃醇酒湯方治傷寒熱出表發黃疸方麻黃三兩以醇酒五升煮取一升半盡服之溫覆汗出愈冬月寒時用清酒春月宜用水治黃疸方瓜蒂秫米赤小豆各二七枚上三味治下篩病重者取如大豆二枚納注鼻孔中痛縮鼻須臾當出黃汁或從口中出汁升余則愈病輕者如一豆不瘥間日復用又下里間以筒使人極吹鼻中無不死大慎之刪繁療天行毒熱通貫臟腑沉伏骨髓之間或為黃疸黑疸赤疸白疸谷疸馬黃等病喘息須臾不絕大黃丸治同前大黃葶藶子各二兩上二味為末蜜和丸如梧子大未食每服十丸日三病瘥止又方大黃二兩黃連三兩黃柏黃芩各一兩曲衣五合上五味為末蜜丸如梧子大先食服三丸日三不知加至五丸茵陳湯治黃疸身體面目盡黃方茵陳黃連各三兩黃芩二兩大黃甘草人參各一兩梔子二七枚上七味㕮咀以水一斗煮取三升分三服日三亦治酒疸酒癖三黃散治同前大黃黃連黃芩各四兩上三味治下篩先食服方寸匕日三亦可為丸五苓散治黃疸利小便方豬苓茯苓澤瀉白朮桂心各三十銖上五味搗篩為散渴時水服方寸匕極飲水即利小便及汗出愈此方與第九卷方相同以分兩不同故重出秦椒散治黃疸飲少溺多方秦椒六銖瓜蒂半兩上二味治下篩水服方寸匕日三小半夏湯治黃疸小便色不異欲自利腹滿而喘者不可除熱熱除必噦方半夏生薑各半斤上二味㕮咀以水七升煮取一升五合分再服有人常積氣結而死其心上暖以此湯少許汁入口遂活治黃疸方取生小麥苗搗絞取汁飲六七合晝夜三四飲三四日便愈無小麥穬麥亦得用之治黃疸變成黑疸醫所不能治者方土瓜根搗汁一小升頓服日一平旦服至食時病從小便出先須量病人氣力不得多服力衰則起不得治發黃身面目悉黃如金色小便如濃煮柏汁眾醫不能療者方茵陳梔子各二兩黃芩大黃柴胡升麻各三兩龍膽二兩上七味㕮咀以水八升煮取二升七合分三服若身體羸去大黃加梔子仁五六兩生地黃一升延年秘錄無茵陳有梔子四兩栝蔞三兩芒硝二兩近效方加枳實二兩夫黃髮已久變作桃皮色心下有堅嘔逆不下飲食小便極赤少四肢逆冷脈深沉極微細遲者不宜服此方得下必變啘也宜與大茵陳湯除大黃加生地黃五兩服盡湯消息看脈小浮出形小見不甚沉微便可治也脈浮見者黃當明不復作桃皮色心下自寬也大茵陳湯治內實熱盛發黃黃如金色脈浮大滑實緊數者夫發黃多是酒客勞熱食少胃中熱或溫毒內熱者故黃如金色方茵陳黃柏各一兩半大黃白朮各三兩黃芩甘草茯苓栝蔞根前胡枳實各一兩梔子二十枚上十一味㕮咀以水九升煮取三升分三服得快下消息三四日更治之苦參散治人無漸忽然振寒發黃皮膚黃麴塵出小便赤少大便時閉氣力無異飲食不妨已服諸湯散餘熱不除久黃者宜吐下方苦參黃連瓜蒂黃柏大黃各一兩葶藶二兩上六味治下篩飲服方寸匕當大吐吐者日一服不吐日再亦得下服五日知可消息不覺退更服之小折便消息之治發黃方茵陳黃柏梔子大黃各三兩黃連二兩上五味㕮咀以水九升煮取三升分三服先服湯後服丸大黃五兩茵陳梔子各三兩黃芩黃柏各二兩黃連二兩上六味為末蜜丸如梧子大飲服二十丸令微利麻黃連翹赤小豆湯治傷寒瘀熱在裡身體必發黃方麻黃連翹甘草各二兩生薑三兩大棗十二枚杏仁三十枚赤小豆一升生梓白皮二升切上八味㕮咀以勞水一斗先煮麻黃去沫次納諸藥煎取三升分三服茵陳湯治傷寒七八日內實瘀熱結身黃如橘小便不利腹微脹滿宜下之方茵陳六兩大黃三兩梔子十四枚上三味㕮咀以水一斗二升先煮茵陳取五升去滓次納梔子大黃煎取三升分服一升日三小便當利如皂莢沫狀色正赤當腹減黃悉隨小便去也範汪用療谷疸小品方用石膏一斤大黃黃柏梔子芒硝湯治發黃腹滿小便不利而赤自汗出此為表和裡實當下之方大黃三兩黃柏芒硝各四兩梔子十五枚上四味㕮咀以水六升煮取二升去滓納芒硝緩煎取一升先食頓服之茵陳丸治時行病急黃並瘴癘疫氣及痎瘧方茵陳梔子芒硝杏仁各三兩巴豆半兩恆山鱉甲各二兩豉五合大黃五兩上九味為末以餳和丸如梧子大飲服三丸以吐利為佳不知加一丸初覺體氣有異急服之即瘥神效治急黃熱氣骨蒸兩目赤脈方芒硝一兩大黃一兩半末生地黃汁八合上三味合和一服五合日二以利為度不須二服治風疸小便或黃或白洒洒寒熱好臥不欲動方三月艾一束搗取汁銅器中煎如漆密封之苦參大黃黃連凝水石栝蔞根葶藶各六銖上七味以六味為末艾煎和丸如梧子大先食服五丸日二可加至二十丸有熱加苦參渴加栝蔞小便澀加葶藶小便多加凝水石小便白加黃連大便難加大黃寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行趺陽脈緊而數數則為熱熱則消穀緊則為寒食則滿也尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其塞熱流膀胱身故盡黃名曰谷疸治勞疸谷疸丸苦參三兩龍膽一兩上二味為末牛膽和為丸如梧子大先食以麥粥飲服五丸日三不知稍加之刪繁方加梔子仁三七枚以豬膽和為丸夫人病酒疸者或無熱靖言了了腹滿欲吐嘔者宜吐之方前苦參散七味者是酒疸必小便不利其候當心中熱足下熱是其證也夫酒疸下之久久為黑疸目青面黑心中如啖蒜薤狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之枳實大黃梔子豉湯治傷寒飲酒食少飲多痰結髮黃酒疸心中懊惱而不甚熱或乾嘔方枳實五枚大黃三兩豆豉半升梔子七枚上四味㕮咀以水六升煮取二升分三服心中熱疼懊惱皆主之凝水石散治肉疸飲少小便多如白泔色此病得之從酒方凝水石白石脂栝蔞根桂心各三十銖菟絲子知母各十八銖上六味治下篩麥粥飲服五分匕日三服五日知十日瘥茯苓丸治心下縱橫堅而小便赤是酒疸者方茯苓茵陳乾薑各一兩白朮熬枳實各三十銖半夏杏仁各十八銖甘遂六銖蜀椒當歸各十二銖上十味為末蜜和丸如梧子大空腹服三丸日三稍稍加以小便利為度翼方加黃連一兩大黃十八銖名茵陳丸治黑疸身體暗黑小便澀半夏湯治酒澼蔭胸心脹滿骨肉沉重逆害飲食乃至小便赤黃此根本虛勞風冷飲食衝心由脾胃內痰所致方半夏一升生薑黃芩當歸茵陳各一兩前胡枳實甘草大戟二兩茯苓白朮各三兩上十一味㕮咀以水一斗煮取三升分作三服牛膽丸治酒疸身黃麴塵出方牛膽一枚芫花一升蕘花半升瓜蒂三兩大黃八兩上五味四味㕮咀以清酒一斗漬一宿煮減半去滓納牛膽微火煎令可丸如豆大服一丸日移六七尺不知復服一丸至八丸膈上吐膈下下或不吐而自愈茵陳丸治氣淋臚脹腹大身體面目悉黃及酒疸短氣不得息方茵陳天門冬梔子各四兩大黃桂心各三兩通草石膏各二兩半夏半升上八味蒸大黃通草天冬梔子半夏曝令乾合搗篩蜜丸如大豆服三丸日三忌生魚以豆羹服不得用酒一方去石膏納滑石二兩不知加至十丸硝石礬石散治女勞疸方硝石礬石各半兩上二味治下篩大麥粥汁服方寸匕日三重衣覆取汗病隨大小便出小便正黃大便正黑濕疸之為病始得之一身盡疼發熱面色黑黃七八日後壯熱熱在裡有血當下去之如豚肝狀其小腹滿者礬石滑石散急下之亦治一身盡黃目黃腹滿小便不利方礬石滑石各五兩上二味治下篩以大麥粥汁服方寸匕先食服之日三便利如血者已當汗出瘥滑石石膏散滑石石膏等分上二味治下篩大麥粥汁服方寸匕日三小便極利則瘥針灸黃疸法正面圖第一寅門上齦里上齶挾人中挾承漿舌下唇里顳顬巨闕上脘陰縫寅門穴從鼻頭直入髮際度取通繩分為三斷繩取一份入髮際當繩頭針是穴治馬黃黃疸等病上齦里穴正當人中及唇針三鋥治馬黃黃疸等病上齶穴入口裡邊在上縫赤白脈是針三鋥治馬黃黃疸四時等病舌下穴挾舌兩邊針治黃疸等病唇里穴正當承漿裡邊逼齒齦針三鋥治馬黃黃疸寒暑溫疫等病顳顬穴在眉眼尾中間上下有來去絡脈是針灸之治四時寒暑所苦疸氣溫病等挾人中穴火針治馬黃黃疸疫通身並黃語音已不轉者挾承漿穴去承漿兩邊各一寸治馬黃急疫等病巨闕穴在心下一寸灸七壯治馬黃黃疸急疫等病上脘穴在心下二寸灸七壯治馬黃黃疸等病男陰縫穴撥陰反向上灸治馬黃黃疸等病若女人玉門頭門頭是穴男女針灸無灸無在覆面圖第二風府熱府肺俞心俞肝俞脾俞腎俞腳後跟風府穴在項後入髮際一寸去上骨一寸針之治頭中百病馬黃黃疸等病熱府穴在第一節下兩旁相去各一寸五分針灸無在治馬黃黃疸等病肺俞穴從大椎數第三椎兩旁相去各一寸五分灸主黃疸通治百毒病心俞穴從肺俞數第二椎兩旁相去各一寸五分肝俞穴從心俞數第四椎兩旁相去各一寸五分脾俞穴從肝俞數第二椎兩旁相去各一寸五分腎俞穴從脾俞數第三椎兩旁相去各一寸五分腳後跟穴在白肉後際針灸隨便治馬黃黃疸寒暑諸毒等病側面圖第三耳中頰裡手太陽臂石子頭錢孔太衝耳中穴在耳門孔上橫梁是針灸治馬黃黃疸寒暑疫毒等病頰裡穴從口吻邊入往對頰裡去口一寸針主治馬黃黃疸寒暑溫疫等病頰兩邊同法手太陽穴手小指端灸隨年壯治黃疸臂石子頭穴還取病人手自捉臂從腕中太澤澤當作淵紋向上一夫接白肉際灸七壯治馬黃黃疸等病錢孔穴度乳至臍中屈肋頭骨是灸百壯治黃疸太衝穴針灸隨便治馬黃黃疸溫疫毒等病溫瘧第十五論一首方三十一首灸刺法十九首禳瘧法一首符二首論曰夫瘧者皆生於風夏傷於暑秋為痎瘧也問曰瘧先寒而後熱者何也對曰夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧問曰先熱而後寒者何也對曰先傷於風而後傷於寒故先熱而後寒也亦以時傷名曰溫瘧其但熱而不寒者陰氣先絕陽氣獨發則少氣煩悶手足熱而欲嘔名曰癉瘧問曰夫病溫瘧與寒瘧而皆安舍舍於何臟對曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣獨發邪氣不能自出因遇大暑腦髓鑠肌肉消腠理發泄因有所用力邪氣與汗皆出此病邪氣先藏於腎其氣先從內出之於外也如是則陰虛而陽盛盛則病矣衰則氣復反入入則陽虛虛則寒矣故先熱而後寒名曰溫瘧問曰癉瘧何如對曰癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰癉瘧夫瘧之旦發也陰陽之且移也必從四肢始也陽已傷陰從之故氣未並先其時一食頃用細左索緊束其手足十指令邪氣不得入陰氣不得出過時乃解夫瘧脈自弦也弦數者多熱弦遲者多寒弦小緊者可下之弦遲者可溫之若脈緊數者可發汗針灸之脈浮大者吐之瘥脈弦數者風發也以飲食消息止之瘧歲歲發至三歲或連月發不解者以脅下有痞也治之不得攻其痞但得虛其津液先其時發其汗服湯已先小寒者引衣自覆汗出小便利即愈瘧者病人形瘦皮上必粟起也病瘧以月一日發當以十五日愈設不瘥當月盡解也今不愈當云何師曰此病結為瘕名曰瘧母急當治之鱉甲煎丸主治方成死鱉十二斤治如食法要略作鱉甲三兩半夏人參大戟各八銖瞿麥阿膠紫葳一作紫菀牡丹皮石葦乾薑大黃厚朴桂心海藻要略作赤硝葶藶蜣螂各十二銖蜂窩桃仁芍藥各一兩烏羽燒一作烏扇黃芩各十八銖䗪蟲虻蟲各三十銖要略作鼠婦柴胡一兩半上二十四味為末取煅灶下灰一斗清酒一斛五斗以酒漬灰取酒煮鱉甲盡爛泯泯如漆絞去滓下諸藥煎為丸如梧子大未食服七丸日三仲景方無大戟海藻多赤硝柴胡栝蔞根湯治瘧而發渴者方柴胡八兩黃芩人參甘草生薑各三兩大棗十二枚栝蔞根四兩上七味㕮咀以水一斗二升煮取六升去滓煎取三升溫服一升日三蜀漆散多寒者牡瘧也治之方蜀漆雲母龍骨等分上三味治下篩先未發一炊頃以酢漿服半錢臨發服一錢溫瘧加蜀漆半分雲母燒三晝夜牡蠣湯牡瘧者多寒治之方牡蠣麻黃各四兩甘草二兩蜀漆三兩無以恆山代之上四味先洗蜀漆三過去腥㕮咀以水八升煮蜀漆麻黃得六升去沫乃納余藥煮取三升飲一升即吐出勿復飲之有癉瘧者陰氣孤絕陽氣獨發而脈微其候必少氣煩滿手足熱欲嘔但熱而不寒邪氣內藏於心外舍於分肉之間令人消爍脫肉也有溫瘧者其脈平無寒時病六七日但見熱也其候骨節疼煩時嘔朝發暮解暮發朝解名溫瘧白虎加桂湯治之方石膏一斤知母六兩甘草二兩粳米六合上四味㕮咀以水一斗二升煮米爛去滓加桂心三兩煎取三升分三服覆令汗先寒發熱汗出者愈麻黃湯治瘧鬚髮汗方麻黃栝蔞根大黃各四兩甘草一兩上四味㕮咀以水七升煮取二升半分三服未發前食頃一服臨發一服服後皆厚覆服汗治瘧或間日發者或夜發者方恆山竹葉各一兩秫米一百粒石膏八兩上四味㕮咀以水八升銅器中漬藥露置星月下高淨處橫刀其上明日取藥於病人房中以銅器緩火煎取三升分三服清旦一服未發前食頃一服臨發一服三服訖靜室中臥莫共人語當一日勿洗面手及漱口勿進食取過時不發乃澡洗進食並用藥汁塗五心胸前頭面藥滓置頭邊曾用神效救急方用烏梅二七枚又方先作羊肉臛麵餅飽食之並進少酒隨所能令欣欣有酒氣入密室中燃炭火厚覆取大汗即瘥又方燒黑牛尾頭毛作灰酒服方寸匕日三恆山丸治痎瘧說不可具方恆山知母甘草大黃各十八銖麻黃一兩上五味為末蜜和丸如梧子大未食服五丸日二不知漸增以瘥為度肘後無大黃又方治瘧經數年所不瘥者兩劑瘥一月以來一劑瘥方恆山三兩為末為雞子白和並手丸如梧子大置銅器中於湯中煮令熟殺腥氣則止以竹葉飲服二十丸欲吐但吐至發令得三服時早可斷食而晚不可斷食可竹葉汁煮糜少食之梔子湯治同前梔子十四枚秫米十四粒恆山三兩車前葉二七枚炙乾上四味㕮咀以水九升煮取三升分三服未發一服發時一服發後一服以吐利四五行為度不止冷飯止之又方恆山三兩烏賊骨升麻鱉甲附子各一兩上五味㕮咀絹袋盛以酒六升漬之小令近火轉之一宿成一服一合比發可數服或吐下治瘧方鱉甲方寸炙烏賊骨二寸附子炮甘草各一兩恆山二兩上五味㕮咀以酒二升半漬之露一宿明日塗五心手足過發時瘧斷若不斷可飲一合許瘥治瘧無問新久者方小便一升半蜜三匕上二味煮三沸頓服每發日平旦時服自至發勿食重者漸退不過三服瘥又方車前子鼠尾草各一虎口上二味以水五升煮取二升未發前服盡又方馬鞭草汁五合酒三合分三服又方搗莨菪根燒為灰和水服一合量人大小強弱用之又方瓜蒂二七枚搗水漬一宿服之又方常以七月上寅日採麻花為末酒服方寸匕蜀漆丸治勞瘧並積勞寒熱發有時似瘧方蜀漆麥冬知母白薇地骨皮升麻各三十銖甘草鱉甲烏梅肉葳蕤各一兩恆山一兩半石膏二兩豉一合上十三味為末蜜和丸如梧子大飲服十丸日再服之稍稍加至二三十丸此神驗無不瘥也一方加光明砂一兩烏梅丸治寒熱勞瘧形體羸瘦痰結胸中食飲減少或因行遠久經勞役患之積年不瘥方烏梅肉豆豉各一合升麻地骨皮柴胡前胡鱉甲恆山各一兩元參肉蓯蓉百合蜀漆人參知母桂心各半兩桃仁八十一枚上十六味為末蜜丸空心煎細茶下三十丸日二服老少孩童量力通用無所忌治勞瘧積時不斷眾治無效方生長大牛膝一握切以水六升煮取二升分再服第一服取未發前食頃第二服取臨發時大五補湯治時行後變成瘴瘧方人參白朮茯苓甘草乾地黃黃耆當歸芍藥各三兩芎藭遠志桔梗各二兩桂心三十銖竹葉五兩大棗二十枚生枸杞根生薑各一斤半夏麥冬各一升上十八味㕮咀以水三斗煮竹葉枸杞取二斗次納諸藥煎取六升分六服一日一夜令盡鯪鯉湯治乍寒乍熱乍有乍無山瘴瘧方鯪鯉甲十四枚鱉甲烏賊骨各一兩恆山三兩附子一枚上五味㕮咀以酒三升漬一夕發前稍稍啜飲勿絕吐之兼以塗身斷食過時乃食飲烏梅丸治肝邪熱為瘧令人顏色蒼蒼氣息喘悶戰掉狀如死者或久熱勞微動如瘧積年不瘥方烏梅肉蜀漆鱉甲葳蕤知母苦參各一兩恆山一兩半石膏二兩香豉一合甘草細辛各十八銖上十一味為末蜜丸如梧子大酒服十丸日再飲服亦佳治心熱為瘧不止或止後熱不歇乍來乍去令人心煩甚欲飲清水反寒多不甚熱者方甘草一兩蜀漆三兩恆山鱉甲各四兩石膏五兩香豉一合梔子烏梅各三十枚竹葉切二升上九味㕮咀以水九升煮取三升分三服恆山丸治脾熱為瘧或渴或不渴熱氣內傷不泄令人病寒腹中痛腸中鳴汗出方恆山三兩甘草半兩知母鱉甲各一兩上四味為末蜜丸如梧子未發前酒服十丸臨發時一服正發時一服恆山湯治肺熱痰聚胸中來去不定轉而為瘧其狀令人心寒甚則發熱熱間則善驚如有所見者方恆山三兩甘草半兩秫米三百二十粒上三味㕮咀以水七升煮取三升分三服至發時令三服盡又方治腎熱發為瘧令人悽悽然腰脊痛宛轉大便難目眴眴然身掉不定手足寒方恆山三兩烏梅三七枚竹葉切一升香豉八合蔥白一握上五味㕮咀以水九升煮取三升分三服至發令盡藜蘆丸五臟並有瘧候六腑則無獨胃腑有之胃腑瘧者令人且病也善飢而不能食食而支滿腹大治之方藜蘆恆山皂莢牛膝各一兩巴豆三十枚上五味先熬藜蘆皂莢色黃合搗為末蜜和丸如小豆大旦服一丸正發時一丸一日勿飽食肘後無恆山牛膝刺灸法肝瘧刺足厥陰見血心瘧刺手少陰脾瘧刺足太陰肺瘧刺手太陰陽明腎瘧刺足少陰太陽胃瘧刺足太陰陽明橫脈出血凡灸瘧必先問其病之所先發者先灸之從頭項發者於未發前預灸大椎尖頭漸灸過時止從腰脊發者灸腎俞百壯從手臂發者灸三間瘧灸上星及大椎至發時令滿百壯灸艾柱如黍米粒俗人不解取穴務大柱也覺小異即灸百會七壯若後更發又七壯極難愈者不過三灸以足踏地以線圍足一匝中折從大椎向百會灸線頭三七壯炷如小豆狀又灸風池二穴三壯凡一切瘧無問遠近正仰臥以線量兩乳間中屈從乳向下灸度頭隨年壯男左女右五臟一切諸瘧灸尺澤七壯穴在肘中約上動脈是也諸瘧而脈不見者刺十指間出血血去必已先視身之赤如小豆者盡取之瘧刺足少陰血出愈痎瘧上星主之穴在鼻中央直髮際一寸陷容豆是也灸七壯先取譩譆後取天牖風池瘧日西而發者臨泣主之穴在目眥上入髮際五分陷者灸七壯瘧實則腰背痛虛則鼽衄飛揚主之穴在外踝上七寸灸七壯瘧多汗腰痛不能俯仰目如脫項如拔崑崙主之穴在足外踝後跟骨上陷中灸三壯禳瘧法未發前抱大雄雞一頭著懷中時時驚動令雞作聲立瘥治瘧符瘧小兒父字石拔母字石錘某甲著患瘧人姓名患瘧人竊讀之曰一切天地山水城隍日月五星皆敬灶君今有一瘧鬼小兒罵灶君作黑麵奴若當不信看文書急急如律令上件符必須真書前後各留白紙一行擬著灶君額上瓦石壓之不得壓字上勿令人近符若得專遣一人看符大好亦勿令灰土敷符上致使字不分明出見著符次第如後若明日日出後發須令人夜掃灶君前及額上令淨至發日旦令患人整衣帽立灶前讀符使人自讀必須分明讀符勿錯一字每一遍若別人讀一遍患人跪一拜又以手捉患人一度若患人自讀自捉衣振云人姓某甲如此是凡三遍讀三拜了以淨瓦石壓兩角字向上著灶額上勿令壓字上若瘧日西發具如上法三遍讀符至午時更三遍讀如上法如夜發日暮更三遍讀並如上法其灶作食亦得勿使動此符若有兩灶大灶上著符若有露地灶屋裡灶上著只有露灶依法著之仍須手捉符其符法如後若有客患會須客經停過三度發三度委曲著符如上法符亦云客姓名患瘧乞拘錄瘧鬼小兒如下凡治久患者一著符一漸瘥亦可五度著符如始可全瘥又須手把符如下王良符張季伯書之急急如律令上王良符依法長卷兩手握唸佛端坐如須行動檢校插著胸前字頭向上上二符各依法一時用不得闕一符萬一不瘥但得一發輕後發日更讀即瘥一一仔細依法若字參差即不瘥診溪毒證第十六江東江南諸溪源間有蟲名短狐溪毒亦名射工其蟲無目而利耳能聽在山源溪水中聞人聲便以口中毒射人故謂射工也其蟲小毒輕者及相逐者射著人影者皆不即作瘡先病寒熱身不喜冷體強筋急頭痛目疼張口欠咳嗽呼吸悶亂朝旦少甦醒晡夕輒復寒熱或似傷寒發石散動亦如中屍便不能語病候如此自非其土地人不常數行山水中不知其證便謂是傷寒發石散動作治乖僻毒盛發瘡復疑是瘭疽乃至吐下去血復恐疑蠱毒是以致禍耳今說其狀類以明其證與傷寒別也方見二十五卷備急篇中
