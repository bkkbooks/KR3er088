body:
  text: 卷二十膀胱腑方凡七類膀胱腑脈論第一論一首脈四首論曰膀胱者主腎也耳中是其候也腎合氣於膀胱膀胱者津液之府也號水曹掾名玉海重九兩二銖左回疊積上下縱廣九寸受津液九升九合兩邊等應二十四氣鼻空在外膀胱漏泄黃帝問曰夫五臟各一名一形腎乃獨兩何也岐伯對曰膀胱為腑有二處腎亦二形應腑有二處臟名一腑名二故五臟六腑也一說腎有左右而膀胱無二今用當以左腎合膀胱右腎合三焦左手關後尺中陽絕者無膀胱脈也病苦逆冷婦人月使不調旺月則閉男子失精尿有餘瀝刺足少陰經治陰在足內踝下動脈是也右手關後尺中陽絕者無子戶脈也病苦足逆寒絕產帶下無子陰中寒刺足少陰經治陰左手關後尺中陽實者膀胱實也病苦逆冷脅下邪氣相引痛刺足太陽經治陽在足小趾外側本節後陷中右手關後尺中陽實者膀胱實也病苦小腹滿引腰痛刺足太陽經治陽病先發於膀胱者背膂筋痛小便閉五日之腎小腹腰脊痛脛酸一日之小腸脹一日之脾閉塞不通身痛體重二日不已死冬雞鳴夏下晡一云日夕膀胱病者小腹偏腫而痛以手按之則欲小便而不得肩上熱若脈陷及足小趾外側及脛踝後皆熱若脈陷取委中膀胱脹者小腹滿而氣癃腎前受病傳於膀胱腎咳不已咳則遺溺厥氣客於膀胱則夢遊行腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄腠理疏者三焦膀胱緩急皮而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也扁鵲云六腑有病徹面形腎膀胱與足少陰太陽為表裡膀胱總通於五臟所以五臟有疾即應膀胱膀胱有疾即應胞囊傷熱則小便不通膀胱急尿苦黃赤傷寒則小便數清白或發石水根在膀胱四肢小其腹獨大也方見治水篇中骨絕不治齒黃落十日死足太陽之脈起於目內眥上額交巔上其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下會於後陰下貫臀入膕中其支者從膊內左右別下貫胂一作髖過髀樞循髀外後廉下合膕中以下貫腨內出外踝之後循京骨至小趾外側是也動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以曲一作回膕如結腨如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭腦項痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小趾不用盛者則人迎大再倍於寸口虛者則人迎反小於寸口也膀胱虛實第二脈四首方六首膀胱實熱左手尺中神門以後脈陽實者足太陽經也病苦逆滿腰中痛不可俯仰勞也名曰膀胱實熱也右手尺中神門以後脈陽實者足太陽經也病苦胞轉不得小便頭眩痛煩滿脊背強名曰膀胱實熱也治膀胱實熱方石膏八兩梔子仁一作瓜子仁茯苓知母各三兩蜜五合淡竹葉生地切各一升上七味㕮咀以水七升煮取二升去滓下蜜煮二沸分三服須利加芒硝三兩治膀胱熱病不已舌乾咽腫方蜜七合升麻大青各三兩射干生元參黃柏薔微根白皮各四兩上七味以水七升煮取一升去滓下蜜煮二沸細細含之膀胱虛冷左手尺中神門以後脈陽虛者足太陽經也病苦腳中筋急腹中痛引腰背不可屈伸轉筋惡風偏枯腰痛外踝後痛名曰膀胱虛冷也右手尺中神門以後脈陽虛者足太陽經也病苦肌肉振動腳中筋急耳聾忽忽不聞惡風颼颼作聲名曰膀胱虛冷也治膀胱虛冷飢不欲飲食面黑如炭腰脅疼痛方磁石六兩黃耆茯苓各三兩五味子杜仲各四兩白朮白石英各五兩上七味㕮咀以水九升煮取三升分三服治膀胱冷咳唾則有血喉鳴喘息方羊腎一具人參元參黃耆桂心川芎甘草各三兩茯苓四兩骨皮生薑各五兩白朮六兩上十一味㕮咀以水一斗二升先煮羊腎減三升去腎下藥煮取三升去滓分三服龍骨丸治膀胱腎冷坐起欲倒目䀮䀮氣不足骨痿方龍骨柏子仁地黃甘草防風各五分黃耆禹餘糧白石英桂心茯苓各七分五味子羌活人參附子各六分山萸肉元參川芎各四分磁石杜仲乾薑各八分上二十味為末蜜丸如梧子大空腹酒服三十丸日二加至四十丸治膀胱寒小便數漏精稠如白米泔方赤石脂白石脂各五分地黃三分蓯蓉六分赤雄雞腸雞肶胵各兩具桑螵蛸牡蠣龍骨川連各四分上十味治下篩納雞腸及肶胵中縫塞蒸之令熟曝乾合搗為散以酒和服方寸匕日三胞囊論第三論一首方十六首灸法八首論曰胞囊者腎膀胱候也貯津液並尿若臟中熱病者胞澀小便不通尿黃赤若腑中寒病者胞滑小便數而多白若至夜則尿偏甚者夜則內陰氣生故熱則瀉之寒則補之不寒不熱依經調之則病不生矣凡尿不在胞中為胞屈僻津液不通以蔥葉除尖頭納陰莖孔中深三寸微用口吹之胞脹津液大通即愈榆皮通滑泄熱煎治腎熱應胞囊澀熱小便黃赤苦不通方榆白皮赤蜜葵子各一升滑石通草各三兩車前子五兩上六味㕮咀以水三斗煮取七升去滓下蜜更煎取三升分三服婦人難產亦同此方滑石湯治膀胱急熱小便黃赤方滑石八兩子芩三兩車前子冬葵子各一升榆白皮四兩上五味㕮咀以水七升煮取三升分三服治虛勞白濁方榆白皮切二升水二斗煮取五升分五服又方搗干羊骨為末服方寸匕日二凡飽食後或忍小便或走馬或忍小便大走及入房皆致胞轉臍下急滿不通治之方用亂髮急纏如兩拳大燒為末醋四合和二方寸匕服之訖即炒熟黑豆葉蹲坐上治胞轉方石葦一兩葵子通草甘草各二兩鬼箭羽三兩滑石四兩榆白皮一升上七味㕮咀以水一斗煮取三升分三服治胞轉不得小便八九日者方葵子一升滑石寒水石各一斤上三味㕮咀以水一斗煮取五升分三服治胞轉小便不得方蔥白四七莖阿膠一兩琥珀二兩車前子一升上四味㕮咀以水一斗煮取三升分三服又方阿膠三兩水二升煮取七合頓服之又方豉五合以水三升煮數沸頓服之又方以麻子煮汁頓服之又方連枷關燒灰水調服之又方筆頭燒灰水服之又方燒死蜣螂二枚為末水服之又方納白魚子莖孔中又方酒和豬脂雞子大頓服之灸法灸脾俞百壯又灸三焦俞百壯又灸腎俞百壯又灸章門百壯在季肋端治腰痛小便不利苦胞轉方灸玉泉七壯穴在關元下一寸大人從心下度取八寸是玉泉穴小兒斟酌取之又灸第十五椎五十壯又灸臍下一寸又灸臍下四寸各隨年壯三焦脈論第四論一首論曰夫三焦者一名三關也上焦名三管反射中焦名霍亂下焦名走哺合而為一有名無形主五臟六腑往還神道周身貫體可聞而不可見和利精氣決通水道息氣腸胃之間不可不知也三焦名中清之腑別號玉海水道出屬膀胱合者雖合而不同上中下三焦同號為孤腑而營出中焦衛出上焦營者絡脈之氣道也衛者經脈之氣道也其三焦形相厚薄大小並同膀胱之形云三焦病者腹脹氣滿少腹尤堅不得小便窘急溢則為水留則為脹候在足太陽之外大絡在太陽少陽之間亦見於脈取委陽小腹腫痛不得小便邪在三焦約取太陽大絡視其結脈與厥陰小絡結而血者腫上及胃脘取三里三焦脹者氣滿於皮膚殼殼而不堅疼一云殼殼而堅久咳不已傳之三焦咳而腹滿不欲飲食也手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆交膻中散絡心包下膈遍屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下額至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾煇煇焞焞咽腫喉痹是主氣所生病者汗出目銳眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也三焦虛實第五論三首方十八首灸法七首論曰夫上焦如霧霧者霏霏起上也其氣起於胃上脘並咽以上貫膈布胸中走腋循足太陰之分而行還注於手陽明上至舌下注足陽明常與營衛俱行於陽二十五度行於陰亦二十五度為一周日夜五十周身周而復始大會於手太陰也主乎少陽心肺之病內而不出人有熱則飲食下胃其氣未定汗則出或出於面或出於背身中皆熱不循衛氣之道而出者何也此外傷於風內開腠理毛蒸理泄衛氣走之固不得循其道此氣剽悍滑疾見開而出故不得從其道名曰漏氣其病則肘攣痛食先吐而後下其氣不續膈間厭悶所以飲食先吐而後下也寒則精神不守泄下便痢語聲不出若實則上絕於心若虛則引氣於肺也澤瀉湯通脈瀉熱治上焦飲食下胃胃氣未定汗出面背身中皆熱名曰漏氣方澤瀉半夏柴胡生薑各三兩桂心甘草各一兩人參茯苓各二兩骨皮五兩石膏八兩竹葉五合蓴心一升上十二味㕮咀以水二斗煮取六升分五服麥門冬理中湯治上焦熱腹滿不欲飲食或食先吐而後下肘攣痛方麥冬生蘆根竹茹廩米各一升蓴心五合甘草茯苓各二兩橘皮人參葳蕤各三兩生薑四兩白朮五兩上十二味㕮咀以水一斗五升煮取三升分三服治胸中膈氣聚痛好吐方灸厥陰俞穴在第四椎兩邊各相去一寸五分隨年壯黃耆理中湯治上焦虛寒短氣不續語聲不出方黃耆桂心各二兩五味子桔梗乾薑茯苓甘草川芎各三兩丹參杏仁各四兩上十味㕮咀以水九升煮取三升分為三服黃連丸治上焦冷下痢腹內不安食即注下方川連烏梅肉各八兩桂心二兩乾薑附子阿膠各四兩櫸皮川芎黃柏各三兩上九味為末蜜丸如梧子大飲下二十丸加至三十丸厚朴湯治上焦閉塞乾嘔嘔而不出熱少冷多好吐白沫清涎吞酸方厚朴茯苓川芎白朮元參各四兩桔梗附子人參橘皮各三兩生薑八兩吳茱萸八合上十一味㕮咀以水二斗煮取五升分為五服論曰中焦如漚漚者在胃中如漚也其氣起於胃中脘在上焦之後此受氣者主化水穀之味秘糟粕蒸津液化為精微上注於肺脈乃化而為血奉以生身莫貴乎此故獨行於經隧名曰營氣主足陽明陽明之別號曰豐隆在外踝上去踝八寸別走太陰絡諸經之脈上下絡太倉主腐熟五穀不吐不下實則生熱熱則閉塞不通上下隔絕虛則生寒寒則腹痛洞泄便痢霍亂主脾胃之病夫血與氣異形而同類衛氣是精血氣是神故血與氣異名同類焉夫脫血者無汗此是神氣奪汗者無血此是精氣故人有兩死而無兩生猶精神之氣隔絕也若虛則補於胃實則瀉於脾調其中和其源萬不遺一也大黃瀉熱湯開關格通隔絕治中焦實熱閉塞上下不通不吐不下腹滿膨膨喘急方川大黃切以水一升浸黃芩澤瀉升麻芒硝各三兩羚羊角梔子各四兩元參八兩地黃汁一升上九味㕮咀以水七升煮取二升三合下大黃更煮兩沸去滓下硝分三服藍青丸治中焦熱下痢水穀方藍青汁三升川連八兩黃柏四兩烏梅肉地膚子地榆白朮各二兩阿膠五兩上八味為末以藍青汁和微火煎丸如杏仁大飲服三丸日二以七月七日合大良當並手丸之黃連煎治中焦寒洞泄下痢或因霍亂後瀉黃白無度腹中虛痛方黃連酸石榴皮地榆阿膠各四兩黃柏當歸厚朴乾薑各三兩上八味㕮咀以水九升煮取三升去滓下阿膠更煎取烊分三服治四肢不可舉動多汗洞痢方灸大橫隨年壯穴在挾臍兩邊各二寸五分論曰下焦如瀆瀆者如溝水決泄也其氣起胃下脘別迴腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸主足太陽灌滲津液合膀胱主出不主入別於清濁主肝腎之病候也若實則大小便不通利氣逆不續嘔吐不禁故曰走哺若虛則大小便不止津液氣絕人飲酒入胃谷未熟而小便獨先下者何蓋酒者熟谷之液也其氣悍以滑故後谷入而先谷出也所以熱則瀉於肝寒則補於腎也柴胡通塞湯治下焦熱大小便不通方柴胡羚羊角黃芩橘皮澤瀉各三兩香豉一升別盛生地一升芒硝一兩梔子四兩石膏六兩上十味㕮咀以水一斗煮取三升去滓納芒硝分為三服赤石脂湯治下焦熱或下痢膿血煩悶恍惚方赤石脂八兩烏梅二十枚梔子十四枚廩米一升白朮升麻各三兩乾薑二兩上七味㕮咀以水一斗煮米取熟去米下藥煮取二升半分為三服止嘔人參湯治下焦熱盛氣逆不續嘔吐不禁名走哺方人參葳蕤黃芩知母茯苓各三兩生蘆根梔子仁白朮橘皮各四兩石膏八兩上十味㕮咀以水九升煮取三升去滓分三服香豉湯治下焦熱毒痢魚腦雜痢赤血臍下小腹絞痛不可忍欲痢不出方香豉薤白各一升川連黃柏白朮茜根各三兩梔子黃芩地榆各四兩上九味㕮咀以水九升煮取三升分三服治膀胱三焦津液下大小腸中寒熱赤白泄痢及腰脊痛小便不利婦人帶下方灸小腸俞五十壯黃柏止泄湯治下焦虛冷大小便洞泄不止方黃柏人參地榆阿膠各三兩川連五兩茯苓櫸皮各四兩艾葉一升上八味㕮咀以水一斗煮取三升去滓下膠消盡分三服人參續氣湯治下焦虛寒津液不止短氣欲絕方人參橘皮茯苓烏梅麥冬黃耆乾薑川芎各三兩吳茱萸三合桂心二兩白朮厚朴各四兩上十二味㕮咀以水一斗二升煮取三升分為三服茯苓丸治下焦虛寒損腹中瘀血令人喜忘不欲聞人語胸中噎塞而短氣方茯苓地黃當歸各八分甘草乾薑人參各七分黃耆六分川芎五分桂心四分厚朴三分杏仁五十枚上十一味為末蜜丸如梧子大初服二十丸加至三十丸為度日二清飲湯下伏龍肝湯治下焦虛寒損或先見血後便轉此為近血或利不利方伏龍肝五合末地黃五兩一方用黃柏阿膠牛膝一作牛蒡根甘草乾薑黃芩地榆各三兩發灰三合上九味㕮咀以水九升煮取三升去滓下膠煮消下發灰分為三服治下焦虛寒損或先便轉後見血此為遠血或利或不利好因勞冷而發宜續斷止血方續斷當歸桂心蒲黃阿膠各一兩甘草二兩乾薑地黃各四兩上八味㕮咀以水九升煮取三升半去滓下膠取烊下蒲黃分三服當歸湯治三焦虛損或上下發泄吐唾血皆從三焦起或熱損發或因酒發宜此方當歸乾薑小薊阿膠羚羊角地黃柏枝皮各三兩芍藥白朮各四兩蒲黃五合青竹茹半升伏龍肝一升發灰雞子大一枚黃芩甘草各二兩上十五味㕮咀以水一斗二升煮取三升半去滓下膠取烊次下發灰蒲黃分為三服灸法五臟六腑心腹滿腰背疼飲食吐逆寒熱往來小便不利羸瘦少氣灸三焦俞隨年壯腹疾腰痛膀胱寒澼飲注下灸下極俞隨年壯三焦膀胱腎中熱氣灸水道隨年壯穴在挾屈骨相去五寸屈骨在臍下五寸屈骨端水道挾兩邊各二寸半三焦寒熱灸小腸俞隨年壯霍亂第六論二首證四條方二十八首灸法十八首論曰原霍亂之為病也皆因飲食非關鬼神夫飽食肫膾復餐乳酪海陸百品無所不啖眠臥冷席多飲寒漿胃中諸食結而不消陰陽二氣壅而反戾陽氣欲升陰氣欲降陰陽乖隔變成吐痢頭痛似破百節如解遍體諸筋皆為迴轉論證雖小而卒病之中最為可畏雖臨深履危不足以喻之養生者宜達其旨庶可免於夭橫矣凡霍亂務在溫和將息若冷即遍體轉筋凡此病定一日不食為佳須三日少少粥食三日以後可恣意食息七日勿雜食為佳所以養脾氣也大凡霍亂皆中食膾酪及飽食雜物過度不能自裁夜臥失覆不善將息所致以此殞命者眾人生稟命以五臟為主夫五臟者即是五行內為五行外為五味五行五味更宜扶抑所以春夏秋冬逆調理之食啖不可過度凡飲食於五臟相剋者為病相生無他經曰春不食辛夏不食鹹季夏無食酸秋無食苦冬無食甘此不必全不食但慎其太甚耳諺曰百病從口生蓋不虛也四時昏食不得太飽皆能生病從夏至秋分忌食肥濃然熱月人好冷食更與肥濃兼食果菜無節極遂逐冷眠臥冷水洗浴五味更相剋賊雖欲無病不可得也所以病苦人自作之非關運也書曰非天夭人人中自絕命此之謂也凡諸霍亂忌與米飲胃中得米即吐不止但與厚朴葛根飲若冬瓜葉飲沾漬咽喉而不可多與若服湯時隨服吐者候吐定乃止診脈絕不通以桂合葛根為飲吐下心煩內熱汗不出不轉筋脈急數者可犀角合葛根為飲吐下不止發熱心煩欲飲水可少飲米粉汁為佳若不止可與葛根薺苨飲服之問曰病有霍亂者何師曰嘔吐而利此謂霍亂問曰病者發熱頭痛身體疼惡寒而復吐利當屬何病師曰當為霍亂霍亂吐利止而復發熱也傷寒其脈微澀本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也霍亂吐多者必轉筋不渴即臍上築霍亂而臍上築者為腎氣動當先治其築治中湯主之去朮加桂心去朮者以術壅故也加桂者恐作奔豚也霍亂而臍上築吐多者及下多者霍亂而驚霍亂而渴霍亂而腹中痛嘔而吐利嘔而利慾得水者皆用治中湯主之治中湯治霍亂吐下脹滿食不消化心腹痛方人參乾薑白朮甘草各三兩上四味㕮咀以水八升煮取三升分三服不瘥頓服三劑遠行防霍亂依前作丸如梧子大服三十丸如作散服方寸匕酒服亦得若轉筋者加石膏三兩仲景云若臍上築者腎氣動也去朮加桂心四兩吐多者去朮加生薑三兩下多者復用術悸者加茯苓三兩渴欲得水者加朮合前共四兩半腹中痛者加人參合前共四兩半若寒者加乾薑合前成四兩半腹滿者去朮加附子一枚服湯後一食頃服熱粥一升微自溫勿發揭衣被也桂枝湯治吐利止而身痛不休者當消息和解其外以此湯小和之見十一卷篇中當歸四逆加吳茱萸生薑湯治多寒手足厥冷脈細欲絕方生薑五兩當歸芍藥細辛桂心各三兩甘草通草各二兩吳茱萸二升大棗二十五枚上九味㕮咀以水六升酒六升合煮取五升分五服舊方用棗三十枚今以霍亂病法多痞故除之如退棗入葛根二兩佳霍亂四逆加半夏一合附子小者一枚若惡寒乃與大附子四逆湯治吐下而汗出小便複利或下利清穀裡寒外熱脈微欲絕或發熱惡寒四肢拘急手足厥冷方甘草一兩乾薑一兩半附子一枚上三味㕮咀以水三升煮取一升二合溫分再服強者可與大附子一枚乾薑至三兩廣濟方云若吐後吸吸少氣及下而腹滿者加人參一兩通脈四逆湯治吐利已斷汗出而厥四肢拘急不解脈微欲絕方大附子一枚甘草一兩半乾薑三兩強者四兩上三味㕮咀以水三升煮取一升二合分二服脈出即愈若面色赤者加蔥白九莖腹中痛者去蔥加芍藥二兩嘔逆加生薑三兩咽痛去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩皆與方相應乃服之仲景用通脈四逆加豬膽汁湯四順湯治霍亂轉筋肉冷汗出嘔啘者方附子一枚人參乾薑甘草各三兩上四味㕮咀以水六升煮取二升分三服竹葉湯治霍亂吐利已服理中四順等湯熱不解者方竹葉一撮小麥一升生薑十累甘草人參附子芍藥各一兩橘皮桂心當歸各二兩白朮三兩上十一味㕮咀以水一斗半先煮竹葉小麥取八升去滓下藥煮取三升分三服上氣者加吳茱萸半升即瘥理中四順等皆大熱若有熱宜此湯古今錄驗無芍藥甘草瀉心湯治婦人霍亂嘔逆吐涎沫醫反下之心下即痞當先治其涎沫可服小青龍湯涎沫止次治其痞可與此方甘草四兩乾薑黃芩各三兩黃連一兩半夏半斤大棗十二枚上六味㕮咀以水一斗煮取六升分六服小青龍湯治霍亂嘔吐方見九卷傷寒上附子粳米湯治霍亂四逆吐少嘔多者方中附子一枚粳米半夏各半升乾薑仲景方無甘草各一兩大棗十枚上六味㕮咀以水八升煮取米熟去滓分三服理中散治老年羸劣冷氣噁心食飲不化心腹虛滿拘急短氣霍亂嘔逆四肢厥冷心煩氣悶流汗扶老方麥門冬乾薑各六兩人參白朮甘草各五兩附子茯苓各三兩上七味治下篩以白湯三合服方寸匕常服將蜜丸如梧子大酒服二十丸人參湯治毒冷霍亂吐利煩嘔轉筋肉冷汗出手足指皆腫喘息垂死絕語音不出百方不效脈不通者服此湯取瘥乃止隨吐續服勿止並灸之方人參附子厚朴茯苓甘草橘皮當歸葛根乾薑桂心各二兩上十味㕮咀以水七升煮取二升半分三服治霍亂蠱毒宿食不消積冷心腹煩滿鬼氣方用極鹹鹽湯三升熱飲一升刺口令吐宿食使盡不吐更服吐訖復飲三吐乃住靜止此法大勝諸治俗人以為田舍淺近之法鄙而不用守死而已凡有此證即須先用之治霍亂方扁豆香薷各一升上二味以水六升煮取二升分服單用亦得治霍亂洞下不止者方艾一把水三升煮取一升頓服之良又方香葇一把水四升煮取一升頓服之青木香亦佳治霍亂吐下腹痛方桃葉煎汁服一升立止冬用皮治霍亂引飲輒乾嘔方生薑五兩切以水五升煮取二升半分二服高良薑亦佳杜若丸治霍亂人將遠行預備方杜若藿香白朮橘皮吳茱萸乾薑人參厚朴木香雞舌香瞿麥桂心薄荷女萎茴香上十五味等分為末蜜丸如梧子酒下二十丸治霍亂永不發丸方虎掌薇銜各二兩枳實附子人參檳榔乾薑各三兩厚朴六兩白朮五兩皂莢三寸上十味為末蜜丸如梧子大每服酒下二十丸日三武德中有德行尼名淨明患此已久或一月一發或一月再發發即至死時在朝太醫蔣許甘巢之徒亦不能識余以霍亂治之處此方得愈故疏而記之凡先服石藥人因霍亂吐下服諸熱藥吐下得止因即變虛心煩手足熱口乾燥欲得水嘔逆迷悶脈急數者及時行熱病後毒未盡因霍亂吐下仍發熱心胸欲裂者以此解之方薺苨人參厚朴知母栝蔞根茯苓犀角藍子枳實桔梗橘皮葛根黃芩甘草各一兩上十四味㕮咀以水一斗煮取三升分三服治中熱霍亂暴利心煩脈數欲得冷水者方新汲井水頓服一升立愈先患胃口冷者勿服之治霍亂醫所不治秘方以童女月經衣合血燒末酒服方寸匕百方不瘥者用之治霍亂轉筋方用蓼一把去兩頭水三升煮取一升頓服之一作梨葉又方燒舊木梳灰為末酒服一枚小者永瘥又方車轂中脂塗足心下瘥治霍亂轉筋入腹無奈何者方作極鹹鹽湯於槽中暖漬之又方以醋煮青布拓之冷即易治轉筋不止者方男子則以手挽其陰牽之女子則挽其乳近左右邊灸法論曰凡霍亂灸之或雖未能立瘥終無死憂不可逆灸或但先腹痛或先下吐後當隨病狀灸之若先心痛及先吐者灸巨闕七壯在心下一寸不效更灸如前數若先腹痛者灸太倉二七壯穴在心厭下四寸臍上一夫不止更灸如前數若吐下不禁兩手陰陽脈俱疾數者灸心蔽骨下三寸又臍下三寸各六七十壯若干嘔者灸間使各七壯在手腕後三寸兩筋間不瘥更灸如前數若嘔啘者灸心主各七壯在掌腕上約中吐不止更灸如前數若手足逆冷灸三陰交各七壯在足內踝直上三寸廉骨際末瘥更灸如前數若先下利者灸谷門二七壯在臍旁二寸男左女右一名大腸募不瘥更灸如前數若下不止者灸大都七壯足大趾本節後內側白肉際若泄利所傷煩欲死者灸慈宮二十七壯在橫骨兩邊各二寸半橫骨在臍下橫門骨是轉筋在兩臂及胸中者灸手掌白肉際七壯又灸膻中中府巨闕胃脘尺澤並治筋拘頭及足皆愈走哺轉筋灸踵踝白肉際各三七壯又灸小腹下橫骨中央隨年壯轉筋四厥灸兩乳根黑白際各一壯轉筋灸湧泉六七壯在足心下當𧿹趾大筋上又大趾下約中一壯轉筋不止灸足踵聚筋上白肉際七壯立愈轉筋入腹痛欲死四人持手足灸臍上一寸十四壯自不動勿復持之又灸股里大筋去陰一寸霍亂轉筋令病人合面正臥伸兩手著身以繩橫量兩肘尖頭依繩下挾脊骨兩邊相去各一寸半灸一百壯無不瘥此華佗法霍亂已死有暖氣者灸承筋七壯起死人取繩量圍足從趾至跟捻取等折一半以度令一頭至跟踏地處引綖上至度頭即是穴又以鹽納臍中灸二七壯雜補第七論一首方三十首論曰彭祖云使人力壯不老房室不勞損氣力顏色不衰者莫過麋角其法刮為末十兩用生附子一枚合之酒服方寸匕日三大良亦可熬令微黃單服之亦令人不老然遲緩不及附子者又以雀卵和為丸彌佳服之二十日大效琥珀散治虛勞百病除陰痿精清力不足大小便不利如淋狀腦門受寒氣結在關元強行陰陽精少餘瀝腰脊痛四肢重咽乾口燥食無常味乏氣力遠視䀮䀮驚悸不安五臟虛勞上氣喘悶方琥珀一兩研蕪菁子胡麻子車前子蛇床子菟絲子枸杞子菴䕡子麥門冬各一升橘皮肉蓯蓉松脂牡蠣各四兩松子柏子荏子各三兩桂心石葦石斛滑石茯苓川芎人參杜蘅續斷遠志當歸牛膝牡丹各三兩通草三兩半上三十味各治下篩合搗二千杵盛以葦囊先食服方寸匕日三夜一用牛羊乳汁煎令熟常服令人強性輕身益氣消穀能食耐寒暑百病除愈雖御十女不勞損令精實如膏服後七十日可得行房久服老而更少發白反黑齒落重生蓯蓉散主輕身益氣強骨補髓不足能使陰氣強盛方肉蓯蓉五味子遠志甘草各一升生地黃三十斤取汁楮實子慎火草乾漆各二升上八味以地黃汁浸一宿出曝乾復浸令汁盡為散空腹酒服方寸匕日三服三十日力倍常雖御十女無損禿雞散有房室人常服勿絕方蛇床子菟絲子五味子遠志防風巴戟杜仲蓯蓉等分上八味治下篩酒服方寸匕日二無室勿服天雄散治五勞七傷陰痿不起衰損者方天雄五味子遠志各一兩蓯蓉二兩半蛇床子菟絲子各六兩上六味治下篩酒服方寸匕日三常服勿止治陰下濕癢生瘡失精陰痿方牡蒙菟絲子蛇床子蓯蓉柏子仁各二兩上五味治下篩酒服方寸匕日三以知為度治陰痿精薄而冷方蓯蓉鍾乳蛇床子遠志續斷薯蕷鹿茸各三兩上七味治下篩酒服方寸匕日二欲多房室倍蛇床欲堅倍遠志欲大倍鹿茸欲多精倍鍾乳治五勞七傷庶事衰惡方巴戟天蛇床子天雄薯蕷各三分雄蠶蛾十枚五味子石斛蓯蓉各三分菟絲子牛膝遠志各二分上十一味治下篩酒服方寸匕日三石硫黃散極益房勞補虛損方石硫黃白石英鹿茸遠志蛇床子五味子天雄殭蠶白馬莖菟絲子女萎各等分上十一味治下篩酒服方寸匕日三無房勿服又方蘿摩六兩五味子酸棗仁柏子仁乾地黃枸杞根皮各三兩上六味治下篩酒服方寸匕日三又方車前子莖葉根治下篩服方寸匕強陰益精常餌補方枸杞子一斤天雄三兩蓯蓉石斛乾薑菟絲子遠志續斷各五兩乾地黃十兩上九味治下篩酒服方寸匕日二服食無所忌服藥十日候莖頭紫色乃可行房治男子陰氣衰腰背痛苦寒莖消少精小便餘瀝出失精囊下濕癢虛乏服此令人充實肌膚肥悅方巴戟天菟絲子杜仲桑螵蛸石斛各等分上五味治下篩酒服方寸匕日一常服佳又方薯蕷巴戟天山茱萸丹參人參各五分蛇床子五味子各四分天雄細辛各三分桂心二分乾地黃七分上十一味治下篩酒服方寸匕日二夜一又方五味子蛇床子各二兩續斷牛膝各三兩車前子蓯蓉各四兩上六味治下篩酒服方寸匕日二杜仲散益氣補虛治男子羸瘦短氣五臟痿損腰痛不能房室方杜仲蛇床子五味子乾地黃各六分蓯蓉遠志各八分木防己巴戟各七分菟絲子十分上九味治下篩食前酒服方寸匕日三常服不絕佳蓯蓉散補虛益陽治陽氣不足陰囊濕癢尿有餘瀝漏泄虛損云為不起方蓯蓉續斷蛇床子各八分天雄薯蕷五味子各七分遠志六分乾地黃巴戟天各五分上九味治下篩酒服方寸匕日三凡病皆由醉飽後或疲極之後而合陰陽致成此病也白馬莖丸治空房獨怒見敵不興口乾汗出失精囊下濕癢尿有餘瀝卵偏大引疼膝冷脛酸目中䀮䀮小腹急腰脊強男子百病方白馬莖石葦天雄遠志赤石脂蛇床子菖蒲薯蕷杜仲栝蔞根蓯蓉石斛續斷牛膝山茱萸柏子仁細辛防風各八分上十八味為末白蜜丸如梧子大酒服四丸日二服漸加至二十丸七日知一月日百病愈治陰痿方雄雞肝一具鯉魚膽四枚上二味陰乾為末雀卵和丸如小豆大吞一丸又方菟絲子一升雄雞肝二具上二味為末雀卵和丸如小豆大每服一丸日三又方乾漆白朮甘草菟絲子蓯蓉牛膝巴戟天五味子桂心各三兩石南石龍芮各一兩乾地黃四兩上十二味為末蜜和丸如梧子酒服二十丸日三又方用蜂房灰夜臥敷之又方用原蠶蛾末連者一升去頭足毛羽陰乾為末蜜丸如梧子每服一丸夜臥鹽湯下之又方磁石五斤研清酒三斗漬二七日每服三合日三夜一又方常服天門冬亦佳又方五味子一升新好者治下篩酒服方寸匕日三稍加至三匕無所慎忌食豬魚大蒜大醋盡一劑即得力百日以上可見功效服藥常令相續不絕四時勿廢功能自知又方菟絲子蛇床子五味子各等分上三味為末蜜丸如梧子大先食飲服三丸日三又方蛇床子菟絲子杜仲蓯蓉五味子各等分上五味為末蜜和丸如梧子大酒服十四丸日二夜一又方蛇床子末三兩菟絲汁二合上二味相和塗上日五遍又方蛇床子蓯蓉遠志各三分附子一分上四味為末以唾和丸如梧子大實莖頭內玉泉中又方蛇床子三分天雄遠志各二分桂心一分無食子一枚上五味為末唾丸如梧子塗莖頭內玉泉中稍時遍體熱
