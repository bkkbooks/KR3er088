body:
  text: 卷七風毒腳氣方凡五類論風毒狀第一論曰考諸經方往往有腳弱之論而古人少有此疾自永嘉南渡衣纓士人多有遭者嶺表江東有支法存仰道人等並留意經方偏善斯術晉朝仕望多獲全濟莫不由此二公又宋齊之間有釋門深師師道人述法存等諸家舊方為三十卷其腳弱一方近百餘首魏周之代蓋無此病所以姚公集驗殊不殷勤徐王撰錄未以為意特以三方鼎峙風教未一霜露不均寒暑不等是以關西河北不識此疾自聖唐開闢六合無外南極之地襟帶是重爪牙之寄作鎮於彼不習水土往者皆遭近來中國士大夫雖不涉江表亦有居然而患之者良由今代天下風氣混同物類齊等所致之耳然此病發初得先從腳起因即脛腫時人號為腳氣深師云腳弱者即其義也深師述支法存所用永平山敷施連範祖耀黃素等諸腳弱方凡八十餘條皆是精要然學者尋覽頗覺繁重正是方集耳猝欲救急莫測指南今取其所經用灼然有效者以備倉猝余者不復具述論何以得之於腳問曰風毒中人隨處皆得作病何偏著於腳也答曰夫人有五臟心肺二臟經絡所起在手十指肝腎與脾三臟經絡所起在足十趾夫風毒之氣皆起於地地之寒暑風濕皆作蒸氣足常履之所以風毒之中人也必先中腳久而不瘥遍及四肢腹背頭項也微時不覺痼滯乃知經云次傳間傳是也論得已便令人覺不凡腳氣病皆由感風毒所致得此病多不令人即覺會因它病一度乃始發動或奄然大悶經三兩日不起方乃覺之諸小庸醫皆不識此疾漫作余病治之莫不盡斃故此病多不令人識也始起甚微食飲嬉戲氣力如故惟猝起腳屈弱不能動有此為異耳黃帝云緩風濕痹是也論風毒相貌夫有腳未覺異而頭項臂膊已有所苦有諸處皆悉未知而心腹五內已有所困又風毒之中人也或見食嘔吐憎聞食臭或有腹痛下痢或大小便秘澀不通或胸中衝悸不欲見光明或精神昏憒或喜迷忘語言錯亂或壯熱頭痛或身體酷冷疼煩或覺轉筋或腫不腫或䏶腿頑痹或時緩縱不隨或復百節攣急或小腹不仁此皆腳氣狀貌也亦云風毒腳氣之候也其候難知當須細意察之不爾必失其機要一朝病成難可以理婦人亦爾又有婦人產後春夏取涼多中此毒宜深慎之其悶熱掣瘲驚悸心煩嘔吐氣上皆其候也又但覺臍下冷痞愊愊然不快兼小便淋瀝不同生平即是腳氣之候頑弱名緩風疼痛為濕痹論得之所由凡四時之中皆不得久立久坐濕冷之地亦不得因酒醉汗出脫衣靴襪當風取涼皆成腳氣若暑月久坐久立濕地者則濕熱之氣蒸人經絡病發必熱四肢痠痛煩悶若寒月久坐久立濕冷地者則冷濕之氣上入經絡病發則四體酷冷轉筋若當風取涼得之者病發則皮肉頑痹諸處瞤動漸漸向頭凡常之日忽然暴熱人皆不能忍得者當於此時必不得頓取於寒以快意也卒有暴寒復不得受之皆生病也世有勤功力學之士一心注意於事久坐行立於濕地不時動轉冷風來擊入於經絡不覺成病也故風毒中人或先中手足十指因汗毛孔開腠理疏通風如急箭或先中足心或先中足趺或先中膝以下腨脛表裡者若欲使人不成病者初覺即灸所覺處二三十壯因此即愈不復發也黃帝云當風取涼醉已入房能成此疾論冷熱不同問曰何故得者有冷有熱答曰足有三陰三陽寒中三陽所患必冷暑中三陰所患必熱故有表裡冷熱不同熱者治以冷藥冷者療以熱藥以意消息之脾受陽毒即熱頑腎受陰濕即寒痹論因腳氣續生諸病雖患腳氣不妨乳石動發皆須服壓石藥療之夫因患腳氣續生諸病者則以諸藥對之或小便不利則以豬苓茯苓及諸利小便藥治之大便極堅者則以五柔麻仁丸等治之遍體腫滿成水病者則取治水方中諸治水之藥治之余皆效此更無拘忌論須療緩急凡小覺病候有異即須大怖畏決意急治之勿緩傷緩氣上入腹或腫或不腫胸脅逆滿氣上肩息急者死不旋踵寬者數日必死不可不急治也但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者皆死論虛實可服藥不可服藥凡腳氣之疾皆由氣實而死終無一人以服藥致虛而殂故腳氣之人皆不得大補亦不可大瀉終不得畏虛故預止湯不服也如此者皆死不治也論看病問疾人世間大有病人親朋故舊交遊來問疾其人曾不經一事未讀一方自騁了了詐作明能談說異端或言是虛或道是實或云是風或云是蠱或道是水或云是痰紛紜謬說種種不同破壞病人心意不知孰是遷延未定時不待人欻然致禍各自散走是故大須好人及好名醫識病深淺探賾方書博覽古今是事明解者看病不爾大誤人事竊悲其如此者眾故一一顯析具述病之由狀令來世病者讀之以自防備也但有一狀相應則須依方急治勿取外人言議自貽憂悔但詳方意人死不難莫信他言以自誤也余嘗為人撰門冬煎方見十二卷膽腑門名天門冬煎此方治腳氣大有驗病者須用之論脈候法凡腳氣雖復診候多塗而三部之脈要須不違四時者為吉其逆四時者勿治余如脈經所說此中不復具載其人本黑瘦者易治肥大肉厚赤白者難愈黑人耐風濕赤白不耐風瘦人肉硬肥人肉軟肉軟則受疾至深難愈也論腫不腫凡人久患腳氣不自知別於後因有他疾發動治之得瘥後直患嘔吐而復腳弱余診之乃告為腳氣病者曰某平生不患腳腫何因名為腳氣不肯服湯余醫以為石發狐疑之間不過一旬而死故腳氣不得一向以腫為候亦有腫者有不腫者其以小腹頑痹不仁者腳多不腫小腹頑後不過三五日即令人嘔吐者名腳氣入心如此者死在旦夕凡患腳氣到心難治以其腎水克心火故也論須慎不慎凡腳氣之病極須慎房室羊肉牛肉魚蒜蕺菜菘菜蔓菁瓠子酒面酥油乳糜豬雞鵝鴨有方用鯉魚頭此等並切禁不得犯之並忌大怒惟得食粳粱粟米醬豉蔥韭薤椒姜橘皮又不得食諸生果子酸醋之食犯者皆不可瘥又大宜生牛乳生栗子矣論善能治者幾日可瘥凡腳氣病枉死者眾略而言之有三種一覺之傷晚二驕狠恣傲三狐疑不決此三種正當枉死之色故世間誠無良醫雖有良醫而病人有性靈堪受入者更復鮮少故雖有騏驥而不遇伯樂雖有尼父而人莫之師其為枉橫亦猶此也今有病者有受入性依法使余治之不過十日可得永瘥矣若無受入性者亦不須為治縱令治之恐無瘥日也非但腳氣諸病皆然良藥善言觸目可致不可使人必服法為信者施不為疑者說論灸法凡腳氣初得腳弱便速灸之並服竹瀝湯灸訖可服八風散無不瘥者惟急速治之若人但灸而不能服散服散而不灸如此者半瘥半死雖得瘥者或至一二年復更發動覺得便依此法速灸之及服散者治十十愈此病輕者登時雖不即惡治之不當根源不除久久期於殺人不可不精以為意初灸風市次灸伏兔次灸犢鼻次灸膝兩眼次灸三里次灸上廉次灸下廉次灸絕骨凡灸八處第一風市穴可令病人起正身平立垂兩臂直下舒十指掩著兩髀便點當手中央指頭髀大筋上是灸之百壯多亦任人輕者不可減百壯重者乃至一處五六百壯勿令頓灸三報之佳第二伏兔穴令病人累夫端坐以病人手夫掩橫膝上夫下旁與曲膝頭齊上旁側夫際當中央是灸百壯亦可五十壯第三犢鼻穴在膝頭蓋骨上際外骨邊平處以手按之得節解則是一云在膝頭下近外三骨箕踵中動腳以手按之得窟解是灸之五十壯可至百壯第四膝眼穴在膝頭骨下兩旁陷者宛宛中是第五三里穴在膝頭骨節下一夫附脛骨外是一云在膝頭骨節下三寸人長短大小當以病人手夫度取灸之百壯第六上廉穴在三里下一夫亦附脛骨外是灸之百壯第七下廉穴在上廉下一夫一云附脛骨外是灸之百壯第八絕骨穴在腳外踝上一夫亦云四寸是凡此諸穴灸不必一頓灸盡壯數可日日報灸之三日之中灸令盡壯數為佳凡病一腳則灸一腳病兩腳則灸兩腳凡腳弱病皆多兩腳又一方云如覺腳惡便灸三里及絕骨各一處兩腳惡者合四處灸之多少隨病輕重大要雖輕不可減百壯不瘥速以次灸之多多益佳一說灸絕骨最要人有患此腳弱不即治及入腹腹腫大上氣於是乃須大法灸隨諸輸及諸管開節腹背盡灸之並服八風散往往得瘥諸管輸節解法並在第二十九卷中覺病入腹若病人不堪痛不能盡作大灸但灸胸心腹諸穴及兩腳諸穴亦有得好瘥者凡量一夫之法覆手並舒四指對度四指上中節上橫過為一夫夫有二種有三指為一夫者此腳弱灸以四指為一夫也亦依支法存舊法梁丘犢鼻三里上廉下廉解谿太衝陽陵泉絕骨昆倉陰陵泉三陰交足太陰復溜然谷湧泉承山束骨等此一十八穴舊法多灸百會風府五臟六腑俞募頃來灸者悉覺引氣向上所以不取其法氣不上者可用之其要病已成恐不救者悉須灸之其足十趾去趾奇一分兩足凡八穴曹氏乃曰八沖極下氣有效其足十趾端名曰氣端日灸三壯並大神要其八沖可日灸七壯氣下即止病者非深相委悉慎勿為人灸之慎之凡灸八沖艾炷須小作之論服湯藥色目風毒之氣入人體中脈有三品內外證候相似但脈有異耳若脈浮大而緩宜服續命湯兩劑應瘥若風盛宜作越婢湯加白朮四兩若脈浮大緊轉快宜作竹瀝湯若病人脈微而弱宜服風引湯此人脈多是因虛而得之若大虛短氣力乏可其間作補湯隨病冷熱而用之若未愈更服竹瀝湯若病人脈浮大而緊快此是三品之中最惡脈也或沉細而快者此脈正與浮大而緊者同是惡脈浮大者病在外沉細者病在內治亦不異當消息以意耳其形尚可而手腳未容至弱數日之中氣上即便命終如此之脈往往有人得之無一存者急服竹瀝湯日服一劑切要湯勢常令相及勿令半日之中空無湯也此湯竹汁多服之若不極熱輒停在胸心更為人患每服當使極熱若服竹瀝湯得下者必佳也若已服三劑竹瀝湯病及脈勢未折而苦脹滿可以大鱉甲湯下之湯勢盡而不得下可以丸藥助湯令下下後更服竹瀝湯趣令脈勢折氣息料理便停服三十二物八風散佳凡初得病便摩野葛膏日再頑痹腳弱都愈乃止若服竹瀝湯脈勢折如未病時氣力轉勝腳故未能行體力充足然後漸微行步病重者瘥後半年始能扶人行耳既覺脈及體內瘥但當勤服八風散勿以腳未能行輕加余治未必全得益更生諸惡失此諸治也猥人邊亦勿行野葛膏有人聞竹瀝湯云恐傷腰腳者即勿與治宜知此法此皆人無受入性不可與醫故也不為疑者說此之謂也竹瀝湯有三首輕者服前方重者以次第後方此風毒乃相注易病人宜將空缺服小金牙散以少許塗鼻孔耳門病困人及新亡人喜易人強健人宜將服之亦以塗耳鼻乃可臨近亡人及視疾者絳囊帶一方寸匕男左女右臂上此散毒宜從少為始金牙散方在十四卷膽腑門病人惟宜飲赤小豆散冬服側子金牙酒續命湯治風毒病初得似時行毒病而脈浮緩終不變快此不治或數日而死或十日而死或得便不識人或發黃或發斑或目赤或下部穿爛者此最急得之即先服續命湯一劑須服葛根湯麻黃湯下之若此不折更與續命湯兩三劑必瘥此病大急常令湯勢相接不可使半日缺湯即便殺人續命湯方見十卷諸風門湯液第二第一竹瀝湯治兩腳痹弱或轉筋皮肉不仁腹脹起如腫按之不陷心中惡不欲食或患冷方竹瀝五升甘草秦艽葛根黃芩麻黃防己細辛桂心乾薑各一兩茯苓三兩防風升麻各一兩半附子二枚杏仁五十枚上十五味㕮咀以水七升合竹瀝煮取三升分三服取汗千金翼方無茯苓杏仁有白朮一兩第二大竹瀝湯治猝中風口噤不能言四肢緩縱偏痹攣急風經五臟恍惚恚怒無常手足不隨方竹瀝一斗四升獨活芍藥防風茵芋甘草白朮葛根細辛黃芩川芎各二兩桂心防己人參石膏麻黃各一兩生薑茯苓各三兩烏頭一枚上十九味㕮咀以竹瀝煮取四升分六服先未汗者取汗一狀相當即服第三竹瀝湯治風毒入人五內短氣心下煩熱手足煩疼四肢不舉皮肉不仁口噤不能言方竹瀝一斗九升防風茯苓秦艽各三兩當歸黃芩人參川芎細辛桂心甘草升麻千金翼作通草麻黃白朮各二兩附子二枚川椒一兩葛根五兩生薑八兩上十八味㕮咀以竹瀝煮取四升分五服初得病即須摩膏日再痹定止千金翼無麻黃川椒生薑麻黃湯治惡風毒氣腳弱無力頑痹四肢不仁失音不能言毒氣衝心有人病者但一病相當即服此第一服次服第二第三第四方麻黃一兩大棗二十枚茯苓三兩杏仁三十枚防風白朮當歸升麻川芎芍藥黃芩桂心麥冬甘草各二兩上十四味㕮咀以水九升清酒二升合煮取二升半分四服日三夜一覆令小汗粉之莫令見風第二服獨活湯方獨活四兩乾地黃三兩生薑五兩葛根桂心甘草麻黃芍藥各二兩上八味㕮咀以水八升清酒二升合煎取二升半分四服日三夜一腳弱特忌食瓠子蕺菜犯之一世治不愈第三服兼補厚朴湯並治諸氣咳嗽逆氣嘔吐方厚朴川芎桂心乾地黃芍藥當歸人參各二兩黃耆甘草各三兩吳茱萸二升半夏七兩生薑一斤上十二味㕮咀以水二斗煮豬蹄一具取汁一斗二升去上肥納清酒三升合煮取三升分四服相去如人行二十里久第四服風引獨活湯兼補方獨活四兩茯苓甘草各三兩升麻一兩半人參桂心防風芍藥當歸黃耆乾薑附子各二兩大豆二升上十三味㕮咀以水九升清酒三升合煮取三升半分四服相去如人行二十里久更進服防風湯治腳痹並治毒氣上衝心胸嘔逆宿癖積氣疝氣一病相當即服此方防風麻黃川芎人參芍藥當歸茯苓半夏甘草橘皮各一兩鱉甲生薑桂心各二兩杏仁一兩半赤小豆一升貝子烏梅各五枚大棗二十枚吳茱萸五合犀角羚羊角各半兩薤白十四枚上二十二味㕮咀以水一斗煮取三升分三服一日令盡一方用水一斗二升間食糜一方半夏三兩隨時用獨活湯治腳痹方獨活四兩當歸防風茯苓芍藥黃耆葛根人參甘草各二兩大豆二升附子一枚乾薑三兩上十二味㕮咀以水一斗清酒二升合煮取三升分三服越婢湯治風痹腳弱方麻黃六兩石膏八兩白朮四兩大附子一枚生薑三兩甘草二兩大棗十五枚上七味㕮咀以水七升先煮麻黃再沸掠去沫入諸藥煮取三升分三服覆取汗胡洽方只五味若惡風者加附子一枚多痰水者加白朮四兩治腳弱神驗方防己川椒細辛桂心麻黃石膏獨活防風黃芩茵芋葛根川芎芍藥甘草各一兩生薑茯苓各三兩烏頭二枚上十七味㕮咀以竹瀝一斗煮取四升分六服令一日一夜服盡其間可常作赤小豆飲有人腳弱先服常用竹瀝湯四劑未覺增損作此方後覺得力又云脈沉細快風在內者作此湯也風引湯治兩腳疼痹腫或不仁拘急屈不得行方麻黃石膏獨活茯苓各二兩吳茱萸附子秦艽細辛桂心人參防風川芎防己甘草各一兩乾薑一兩半白朮三兩杏仁六十枚上十七味㕮咀以水一斗六升煮取三升分三服取汗大鱉甲湯治腳弱風毒攣痹氣上及傷寒惡風溫毒山水瘴氣熱毒四肢痹弱方鱉甲二兩防風麻黃白朮石膏知母升麻茯苓橘皮川芎杏仁人參半夏當歸芍藥葳蕤甘草麥門冬各一兩羚羊角六銖大黃一兩半犀角青木香雄黃各半兩大棗二十枚貝齒烏頭各七枚生薑三兩薤白十四枚麝香三銖赤小豆三合吳茱萸五合上三十一味㕮咀以水二斗煮取四升分六服相去十里久得下止一方用大黃半兩畏下可只用六銖一方用羚羊角半兩毒盛可用十八銖胡洽有山茱萸半升為三十二味千金翼無知母升麻橘皮川芎人參當歸玉竹小鱉甲湯治身體虛脹如微腫胸心痞滿有氣壯熱小腹厚重兩腳弱方鱉甲黃芩升麻麻黃羚羊角桂心杏仁各三兩前胡四兩烏梅二十枚薤白三十枚上十味㕮咀以水一斗煮取二升七合分三服此常用若體強壯欲須利者加大黃二兩風緩湯治腳弱舉體痹不仁熱毒氣入臟胸中滿塞不通食即嘔吐方獨活麻黃犀角各三兩一方用羚羊角半夏一升大棗烏梅各二十枚桂心鱉甲升麻橘皮枳實甘草吳茱萸大黃各一兩生薑石膏各六兩貝齒七枚上十七味㕮咀以水一斗四升煮取四升分五服日三夜二不瘥至三劑必瘥治腳氣初發從足起至膝脛骨腫痛者方取蜱麻葉切搗蒸薄裹之日二三易即消蜱麻子似牛蜱蟲故名蜱麻也若冬月無蜱麻取蒴藋根搗研和酒糟三分根一分合蒸熱及熱封裹腫上如前法日二即消亦治不仁頑痹此方非湯不當見此然以前後三方俱出蘇長史更不分出若腫毒已入䏶至小腹脹小便澀少者方取烏特牛尿一升一服日二取消乃止千金翼云羸瘦人二分尿一分牛乳合煮乳浮結乃服之若腫已消仍有此候者急服此湯方蘇長史方神驗麻黃射干人參茯苓防己前胡枳實各二兩半夏犀角羚羊角青木香橘皮杏仁升麻各一兩生薑五兩獨活三兩吳茱萸一升上十七味㕮咀以水一斗二升煮取四升分五服相去二十里久中間進少粥以助胃氣此湯兩日服一劑取病氣退乃止以意消息之若熱盛喘煩者加石膏六兩生麥冬一升去吳茱萸若心下堅加鱉甲一兩夫腳氣之病先起嶺南稍來江東得之無漸或微覺疼痹或兩脛腫滿或行起澀弱或上入腹不仁或時冷熱小便秘澀喘息氣衝喉氣急欲死食嘔不下氣上逆者皆其候也若覺此證先與犀角旋覆花湯方方列後犀角旋覆花湯方犀角旋覆花各二兩橘皮茯苓生薑各三兩大棗七枚香豉一升紫蘇莖葉一握上八味㕮咀以水八升煮取二升七合分三服相去十里久服之以氣下小便利為度崔氏名小犀角湯如其不下服後大犀角湯大犀角湯療腳氣毒衝心變成水身體遍腫悶絕欲死方犀角旋覆花防己白朮桂心橘皮黃芩生薑桑白皮前胡茯苓各二兩香豉一升大棗十枚紫蘇莖葉一握上十四味㕮咀以水九升煮取二升七合分三服相去十里久取下氣為度若得氣下小便利腳腫即消能食若服湯竟不下氣急不定仍服後犀角麻黃湯崔氏又以白前代白朮無防己黃芩桑白皮名旋覆花湯犀角麻黃湯犀角麻黃防風獨活崔氏用茯苓防己川芎白朮羚羊角崔氏用附子當歸黃芩各二兩石膏四兩生薑甘草杏仁崔氏用細辛桂心各三兩上十五味㕮咀以水二斗煮麻黃去沫取汁八升下藥煎取三升分三服相去十里久服訖覆取汗若不瘥五日後更服一劑取汗同前茱萸湯治腳氣入腹困悶欲死腹脹方蘇長史方吳茱萸六升木瓜兩顆切上二味以水一斗三升煮取三升分三服相去如人行十里久進一服或吐或汗或利或大熱悶即瘥此起死回生方小風引湯治中風腰腳疼痛弱者方胡洽名大風引湯獨活茯苓人參各三兩防風當歸甘草乾薑石斛各二兩胡洽作黃耆附子一枚大豆二升上十味㕮咀以水九升酒三升煮取三升分四服服別相去如人行十里久胡洽云南方治腳弱與此別用升麻一兩半夏芍藥各二兩合十三味本只有十味減當歸石斛名小風引湯刪繁方無石斛以療肉極寒肌肉變舌萎名曰惡風腰痛腳弱四物附子湯風濕相搏骨節煩疼四肢拘急不可屈伸近之則痛自汗出而短氣小便不利惡風不欲去衣或頭面手足時時浮腫方附子二枚桂心四兩白朮三兩甘草二兩上四味㕮咀以水六升煮取三升分三服微汗愈大汗煩者一服五合體腫者加防己四兩悸氣小便不利加茯苓三兩既有附子今加生薑三兩治腳弱風毒實及嶺南瘴氣面腫乍寒乍熱似瘧狀腳腫氣上心悶咳嗽癱緩頑痹方麻仁升麻麻黃射干菖蒲芒硝甘草大黃各半兩豉三合上九味㕮咀以水六升煮取二升半納芒硝又煎三沸分三服微利一二行解毒熱有腫滓敷之凡覺氣滿輒服一劑佳道人深師增損腎瀝湯治風虛勞損挾毒腳弱痛痹或不隨下焦虛冷胸中微有客熱心虛驚悸不得眠食少失氣味日夜數過心煩迫不得臥小便不利又時復下湘東王至江州王在嶺南病悉如此極困篤余作此湯令服即得力病似此者服無不瘥隨宜增損之方黃耆甘草芍藥麥冬人參肉蓯蓉乾地黃赤石脂茯神地骨白皮當歸遠志磁石枳實防風龍骨各一兩桂心川芎各二兩生薑四兩五味子三合大棗三十枚白羊腎一具半夏一升上二十三味㕮咀以水二斗煮羊腎取汁一斗二升納諸藥煮取四升分五服不利下者除龍骨赤石脂小便澀以赤茯苓代茯神加白朮三兩多熱加黃芩一兩遺溺加桑螵蛸二十枚胡洽方無黃耆肉蓯蓉赤石脂地骨皮磁石枳實防風龍骨半夏有黃芩為十五味石膏湯治腳氣風毒熱氣上衝頭面面赤矜急鼻塞去來來時令人昏憒心胸恍惚或苦驚悸身體戰掉手足緩縱或酸痹頭目眩重眼反鼻辛熱氣出口中或患味甜諸惡不可名狀者方石膏龍膽升麻芍藥貝齒甘草鱉甲黃芩羚羊角各一兩橘皮當歸各二兩上十一味㕮咀以水八升煮取三升分三服半夏湯治腳氣上入腹腹急上衝胸氣急欲絕方半夏一升桂心八兩乾薑五兩甘草人參細辛附子各二兩川椒二合上八味㕮咀以水一斗煮取三升分三服初稍稍進恐氣衝上格塞不得下小小服通人氣耳烏頭湯治風冷腳痹疼痛攣弱不可屈伸方烏頭細辛川椒各一兩甘草秦艽附子桂心芍藥各二兩乾薑茯苓防風當歸各三兩獨活四兩大棗二十枚上十四味㕮咀以水一斗二升煮取四升分五服若熱毒多服益佳追毒湯治腳弱風熱上入心腹煩悶欲絕方半夏生薑各四兩黃耆甘草當歸人參厚朴獨活橘皮各一兩枳實麻黃乾地黃芍藥各二兩桂心三兩貝子七枚大棗二十枚上十六味㕮咀以水一斗二升煮取三升六合分四服日三夜一風緩湯治腳弱體痹不仁毒氣上入臟胸中滿塞不通食輒吐失味方獨活甘草石膏各三兩羚羊角犀角各半兩麻黃防風當歸升麻橘皮吳茱萸桂心半夏鱉甲各二兩枳實一兩生薑六兩大棗二十枚貝齒七枚烏頭二兩一作烏梅十枚上十九味㕮咀以水一斗四升煮取四升一服一升若有少虛熱者加乾地黃二兩紫蘇子湯治腳弱上氣昔宋湘東王在南州患腳氣困篤服此湯大得力方紫蘇子半夏各一升前胡厚朴甘草當歸各一兩橘皮三兩大棗二十枚生薑一斤桂心四兩上十味㕮咀以水一斗三升煮取二升半分五服日三夜二附子湯治濕痹緩風身體疼痛如欲折肉如錐刺刀割方附子三枚茯苓人參甘草桂心芍藥各三兩白朮四兩上七味㕮咀以水八升煮取三升分三服防風湯治肢體虛風微痙發熱肢節不隨恍惚狂言來去無時不自覺悟南方支法存所用多得力溫和不損人為勝於續命越婢風引等湯羅廣州一門南州士人常用亦治腳弱甚良方防風麻黃秦艽獨活生薑半夏各二兩當歸遠志甘草防己人參黃芩升麻芍藥各一兩石膏半兩麝香六銖上十六味㕮咀以水一斗三升煮取四升一服一升初服厚覆取微汗亦當兩三行下其間相去如人行十里久更服有熱加大黃二兩先有冷心痛疾者倍用當歸加桂心三兩不用大黃一方用白朮一兩甘草湯治腳弱舉身浮腫反胃食谷吐逆胸中氣結不安而寒熱下痢不止小便難服此湯即益亦服女曲散利小便腫消服大散摩膏有驗方甘草人參各一兩半夏一升桂心川椒各三兩小麥八合大棗二十枚生薑八兩吳茱萸二升上九味㕮咀以水一斗三升煮小麥取一斗去小麥納諸藥煮取三升分六服女曲散見第十五卷第八篇中恆山甘草湯若寒熱日再三發可服此方恆山三兩甘草一兩半上二味㕮咀以水四升煮取一升半分三服相去五里久一服丹參牛膝煮散治腳痹弱氣滿身微腫方丹參牛膝桑白皮杏仁升麻茯苓豬苓各四兩犀角黃芩橘皮防己白前澤瀉桂心秦艽各三兩生薑李根白皮各二兩大麻仁一升上十八味搗粗篩以水一升半納散方寸匕煮取七合輕絹濾去滓頓服日再夏月熱不得服丸散此煮散頃年常用大驗治腰髂不隨兩腳攣腫方川椒四升以水四斗煮取二斗半甕盛下著火暖之懸板為橋去湯二寸許以腳踏板柱腳坐以綿絮密塞勿令泄氣若疲即出入被以粉摩之一食久更入甕常令甕下火不絕勿使湯冷如此消息不過七日得伸展並腫亦消諸散第三例一首方七首例曰大法春秋宜服散八風散治風虛面青黑土色不見日月光腳氣痹弱准經面青黑主腎不見日月光主肝宜補腎治肝方菊花三兩石斛天雄各一兩半人參附子甘草各一兩六銖鍾乳山藥川斷黃耆澤瀉麥冬遠志細辛龍膽秦艽石葦菟絲子牛膝菖蒲杜仲茯苓乾地黃柏子仁蛇床子防風白朮乾薑萆薢山茱萸各一兩五味子烏頭各半兩蓯蓉二兩上三十三味治下篩酒服方寸匕日三不效加至二匕大八風散治諸緩風濕痹腳弱方巴戟肉黃耆桂心細辛天雄萆薢肉蓯蓉牡荊子山藥菊花葳蕤山萸秦艽黃芩石斛白朮礬石厚朴龍膽人參蜀椒各半兩附子五味子各十八銖菖蒲茯苓牛膝千金翼作乾薑烏喙遠志各一兩桔梗三十銖川芎白蘞芍藥各六銖上三十二味治下篩酒服半寸匕日三未驗稍增令微覺胡洽無桔梗內補石斛秦艽散治風虛腳弱手足拘攣疼痹不能行腳趺腫上膝小腹堅如繩約氣息常如憂恚不能食飲皆由五勞七傷腎氣不足受風濕故也此方悉主之石斛附子天雄桂心獨活天冬各一兩秦艽烏頭人參乾薑當歸防風杜仲各三十銖山萸莽草桔梗細辛麻黃前胡五味子各十八銖川椒白芷白朮各半兩上二十三味治下篩酒服方寸匕日再服不知稍增至二匕虛人三建皆炮實人亦可生用風氣者本因腎虛既得病後毒氣外滿則灸泄其氣內滿則藥馳之當其救急理必如是至於風消退四肢虛弱餘毒未除不可便止宜服此散推陳致新極為良妙此既人情可解無可疑焉三建皆炮者天雄附子烏頭若虛人乾薑亦宜秦艽散治風無久新卒得不知人四肢不仁一身盡痛偏枯不隨不能屈伸洒洒寒熱頭目眩或口面喎僻方秦艽乾薑桔梗附子各一兩天雄當歸天冬人參白朮川椒各十銖烏頭細辛各十八銖甘草白芷山萸肉麻黃前胡防風五味子各半兩上十九味治下篩酒服方寸匕日三若老人少服之胡洽方無天冬前胡有莽草桂心防己萆薢白蘞黃耆為二十三味單服松脂治一切風及大風腳弱風痹方薰陸法亦同松脂三十斤以棕皮袋盛系頭鐺底布竹木置袋於上以石五六顆壓之下水於鐺中令滿煮之膏浮出得盡以後量更二十沸接置於冷水中易袋洗鐺更煮如此九遍藥成搗篩為散以粗羅下之用酒服一方寸匕日二初和藥以冷酒藥入腹後飲熱酒行藥以知為度如覺熱即減不減令人大小便秘澀若澀宜食蔥羹仍自不通宜服生地黃汁微取泄利除忌大麻子以外無所禁服松脂三十日後即覺有驗兩腳似有水流下是效如恐秘澀和一斤松脂茯苓與棗慄許大酥即不澀服經一百日後腳氣當愈淮南八公石斛萬病散治風濕疼腰腳不隨方防風茯苓菊花細辛川椒乾薑雲母蓯蓉人參乾地黃附子石斛杜仲遠志菟絲子天雄萆薢桂心牛膝蛇床子白朮薯蕷巴戟菖蒲川斷山萸各一兩五味子半兩上二十七味治下篩酒服方寸匕日再茱萸散治冷風腳跛偏枯半身不隨晝夜呻吟醫所不治方吳茱萸乾薑白蘞牡荊千金翼作牡桂附子天雄狗脊乾漆薯蕷秦艽防風各半兩上十一味治下篩先食服方寸匕日三藥入肌膚中淫淫然三日知一月瘥酒醴第四例一首方十七首例曰凡合酒皆薄切藥以絹袋盛藥納酒中密封頭春夏四五日秋冬七八日皆以味足為度去滓服酒盡後其滓搗酒服方寸匕日三大法冬宜服酒至立春宜停石斛酒治風虛氣滿腳痛痹攣弱不能行方石斛丹參五加皮各五兩側子秦艽杜仲山萸牛膝各四兩桂心乾薑羌活川椒橘皮黃耆白前川芎茵芋當歸各三兩苡仁一升防風二兩鍾乳八兩搗碎別絹袋盛系大藥袋內上二十一味㕮咀以酒四斗漬三日初服三合日再稍稍加以知為度烏麻酒方烏麻五升微熬搗碎以酒一斗漬一宿隨所能飲之盡更作甚良鍾乳酒治風虛勞損腳疼冷痹羸瘦攣弱不能行方鍾乳八兩丹參六兩石斛杜仲天冬各五兩牛膝防風黃耆川芎當歸各四兩附子桂心秦艽乾薑各三兩山萸肉苡仁各一升上十六味㕮咀以清酒三斗漬之三日初服三合日再後稍加之以知為度枸杞菖蒲酒治緩急風四肢不隨行步不正口急及四體不得屈伸方菖蒲五十斤枸杞根一百斤上二味細銼以水四石煮取一石六斗去滓釀二斛米酒熟稍稍飲之虎骨酒治骨髓疼痛風經五臟方虎骨一具炭火炙令黃色槌刮取淨搗研得數升清酒六升漬五宿隨性多少稍飲之易云虎嘯風生龍吟云起此亦有情與無情相感治風之效故亦無疑蓼酒治胃脘冷不能飲食耳目不聰明四肢有氣冬臥腳冷服此酒十日後目既精明體又充壯方八月三日取蓼曝燥把之如五升大六十把水六石煮取一石去滓以釀酒如常法隨多少飲之已用訖效甚速小黃耆酒治風虛痰癖四肢偏枯兩腳弱手不能上頭或小腹縮痛脅下攣急心下有伏水脅下有積飲夜喜夢悲愁不樂恍惚善忘此由風虛五臟受邪所致或久坐腰痛耳聾猝起眼眩頭重或舉體流腫疼痹飲食惡冷澀澀惡寒胸中痰滿心下寒疝藥皆主之及婦人產後余疾風虛積冷不除者方黃耆附子川椒防風牛膝細辛桂心獨活白朮川芎甘草各三兩秦艽烏頭集驗用山藥三兩大黃葛根乾薑山萸肉各二兩當歸二兩半上十八味㕮咀少壯人無所熬煉虛老人微熬之以絹袋盛清酒二斗漬之春夏五日秋冬七日可先食服一合不知可至四五合日三服此藥攻痹甚佳亦不令人吐悶小熱宜冷飲食大虛加蓯蓉二兩下利加女萎三兩多忘加石斛菖蒲紫石英各二兩心下多水者加茯苓人參各二兩薯蕷三兩酒盡可更以酒二斗重漬滓服之不爾可曝滓搗下酒服方寸匕不知稍增之服一劑得力令人耐寒冷補虛治諸風冷神良黃耆酒治風虛腳疼痿弱氣悶不自收攝兼補方黃耆秦艽川椒乾薑獨活白朮川芎蓯蓉細辛牛膝各三兩葛根當歸各三兩半甘草三兩山萸桂心各二兩菖蒲二兩半柏子仁天雄鍾乳防風各二兩大黃一兩烏頭三兩石斛二兩石南一兩附子三兩上二十五味㕮咀無所熬煉清酒三斗漬之先食服一合不知可至五合日三以攻痹為佳大虛加蓯蓉下利加女萎多忘加菖蒲各三兩胡洽有茯苓二兩澤瀉三兩人參茵芋半夏栝蔞芍藥各一兩無秦艽川芎牛膝蓯蓉甘草葛根當歸菖蒲鍾乳大黃為二十二味名大黃耆湯茵芋酒治大風頭眩重目瞀無所見或仆地氣絕半日乃蘇口喎噤不開半身偏死拘急痹痛不能動搖歷節腫痛骨中痠疼手不能上頭足不得屈伸不能躡履行欲傾跛皮中動淫淫如有蟲啄疹癢搔之生瘡甚者狂走有此諸藥皆主之方茵芋烏頭石南附子細辛獨活防風川椒女萎卷柏桂心天雄秦艽防己各一兩躑躅二兩上十五味㕮咀少壯人無所熬煉虛老人薄熬之清酒二斗漬之冬七日夏三日春秋五日初服一合不知加至二合寧從少起日再以微痹為度胡洽無川椒獨活卷柏為十二味大金牙酒治瘴癘毒氣中人風冷濕痹口喎面戾半身不遂手足拘攣歷節腫痛甚者小腹不仁名曰腳氣無所不治方金牙一斤側子附子天雄人參蓯蓉茯苓當歸防風黃耆山藥細辛桂心萆薢葳蕤白芷桔梗黃芩遠志牡荊子川芎地骨皮五加皮杜仲厚朴枳實白朮牛膝丹參各三兩獨活半斤茵芋石南狗脊各二兩磁石十兩薏苡仁麥冬各一升生石斛八兩蒴藋四兩生地黃切二升上三十九味㕮咀以酒八斗漬七日溫服一合日四五夜一石藥細研別絹袋盛共藥同漬藥力和善主治極多凡是風虛四體小覺有風疴者皆須將服之無所不治也服者一依方修合不得輒信人言浪有加減鍾乳酒治虛損通順血脈極補下氣方鍾乳石斛蓯蓉各五兩附子甘菊各二兩上五味㕮咀以清酒三斗漬服二合日再稍增至一升秦艽酒治四肢風手臂不收髀腳疼弱或有拘急攣縮屈指偏枯痿躄痟小不仁頑痹者悉主之方秦艽天冬五加皮牛膝附子桂心各三兩巴戟肉杜仲石南細辛各二兩獨活五兩薏苡仁一兩上十二味㕮咀以酒二斗漬之得氣味可服三合漸加至五六合日三夜一術膏酒治腳弱風虛五勞七傷萬病皆主之方生白朮洗淨一石五斗搗取汁三斗煎取半濕荊二十五束束別三尺圍各長二尺五寸徑頭二寸燒取瀝三斗煎取半青竹三十束束別三尺圍各長二尺五寸徑一寸燒取瀝三斗煎取半生地黃根五大斗粗大者搗取汁三斗煎取半生五加根三十六斤淨洗訖銼於大釜內以水四石煎之去滓澄清取汁七斗以銅器中盛大釜內水上煎之取汁三斗五升其煎諸藥法一準五加例上件白朮等五種藥總計得汁九斗五升好糯米一石五斗上小麥曲八斤曝乾為末以藥汁六斗漬曲五日待曲起第一投淨淘米七斗令得三十遍下米置淨席上以生布拭之勿令不淨然後炊之下饙以余藥汁浸饙調強弱更蒸之待饙上痂生然後下於席上調強弱冷熱如常釀酒法醞之甕中密蓋頭三日後第二投更淘米四斗一如前法投之三日後即加藥如下桂心甘草白芷細辛防風當歸麻黃川芎各六兩附子五兩牛膝九兩乾薑五加皮各一斤上十二味㕮咀訖第三投以米四斗淨淘如前法還以余汁澆饙重蒸待上痂生下置席上調冷熱如常釀法和上件藥投之三日外然後嘗甘苦得中訖密封頭二七日乃壓取清酒一服四合日再服細細加以知為度溫酒不得過熱慎生冷醋滑豬鯉魚蒜牛肉等松葉酒主治腳弱十二風痹不能行服更生散數劑及眾治不得力服此一劑便能遠行不過兩劑方松葉六十斤㕮咀以水四石煮取四斗九升以釀五斗米如常法別煮松葉汁以漬米並饙飯泥釀封頭七日發澄飲之取醉得此力者甚眾神妙治腳氣方好豉三斗蒸一石米下曝乾如是三上以酒五斗漬七日去滓飲惟醉為佳酒盡更以二斗半漬之飲之如初側子酒治風濕痹不仁腳弱不能行方側子牛膝丹參山萸蒴藋根杜仲石斛各四兩防風乾薑川椒細辛獨活秦艽桂心川芎當歸白朮茵芋各三兩五加皮五兩薏苡仁一升上二十味㕮咀絹袋盛清酒四斗漬六宿初服三合稍加以知為度患目昏頭眩者彌精諸膏第五例一首方八首例曰凡作膏常以破除日無令喪孝汙穢產婦下賤人雞犬禽獸見之病在外火炙摩之在內溫酒服如棗核許神明白膏治百病中風惡氣及頭面諸病青盲風目爛眥管翳耳聾鼻塞齲齒齒根挺痛及癰痔瘡癬疥等方吳茱萸川椒川芎白朮前胡崔氏作白前白芷各一升附子三十銖桂心當歸細辛各二兩上十味㕮咀淳苦酒於銅器中淹浸諸藥一宿以成煎豬膏十斤炭火上煎三沸三上三下白芷色黃為候病在腹內溫酒服如彈丸一枚日三目痛取如黍米納兩眥中以目向風無風可以扇扇之諸瘡痔齲齒耳鼻百病主之皆以膏敷病在皮膚炙手摩病上日三肘後九味無桂心衛侯青膏治百病久風頭眩鼻塞清涕淚出霍亂吐逆傷寒咽痛脊背頭項強偏枯拘攣或緩或急或心腹久寒積聚疼痛咳逆上氣往來寒熱鼠漏瘰癧歷節疼腫關節盡痛男子七傷臚脹腹滿羸瘦不能飲食婦人生產余疾諸病瘑疥惡瘡癰腫陰蝕黃疸發背馬鞍牛領瘡腫方當歸栝蔞根乾地黃甘草川椒各六兩半夏七合桂心川芎細辛附子各四兩黃芩桔梗天雄藜蘆皂莢各一兩半厚朴烏頭莽草乾薑人參黃連寄生川斷戎鹽各三兩黃野葛二分生竹茹六升巴豆二十枚石南杏仁各一兩豬脂三斗苦酒一斗六升上三十一味㕮咀諸藥以苦酒漬一宿以豬脂微火上煎之三下三上膏成病在內以酒服如半棗以外摩之日三神明青膏治鼻中干灌之並摩服方川椒五合皂莢黃芩石南黃連雄黃桂心藜蘆各三銖白朮川芎大黃澤瀉各七銖烏頭川斷莽草人參各五銖半夏當歸各十二銖乾地黃十一銖葳蕤細辛各十銖附子桔梗各二銖乾薑六銖戎鹽杏子大一枚上二十五味㕮咀以苦酒一斗漬之羊髓一斤為東南三隅灶納諸藥炊以葦薪作三聚新好土藥沸即下置土聚上三沸三下訖藥成以新布絞去滓病在外火炙摩之在內溫酒服如棗核日三後稍益以知為度太傅白膏治百病傷寒咽喉不利頭項強痛腰脊兩腳疼有風痹濕腫難屈伸不能行步若風頭眩鼻塞有附息肉生瘡身體隱疹風瘙鼠漏瘰癧諸疽惡瘡馬鞍牛領腫瘡及久寒結堅在心腹痛胸痹煩滿不得眠飲食咳逆上氣往來寒熱婦人產後余疾耳目鼻口諸疾悉主之亦曰太一神膏方川椒升麻切各一升附子三兩巴豆川芎各三十銖杏仁五合貍骨細辛各一兩半白芷半兩甘草二兩白朮六兩一方用當歸三兩上十二味㕮咀苦酒淹漬一宿以豬脂四斤微火煎之先削附子一枚以繩繫著膏中候色黃膏成去滓傷寒心腹積聚諸風腫疾頸項腰脊強偏枯不仁皆摩之日一癰腫惡瘡鼠漏瘰癧炙手摩之耳聾取如大豆灌之目痛炙緲縹白翳如珠當瞳視無所見取如糜米敷白上令其人自以手掩之須臾即愈便以水洗視如平復且勿當風三十日後乃可行鼻中痛取如大豆納鼻中並以摩之齲齒痛以綿裹如大豆著痛齒上咋之中風面目鼻口喎僻以摩之若晨夜行闢霜霧眉睫落數數以鐵漿洗用膏摩之曲魚膏治風濕痛痹四肢軃弱偏跛不仁並癰腫惡瘡方大黃黃芩莽草巴豆野葛牡丹躑躅芫花川椒皂莢藜蘆附子各一兩上十二味㕮咀以苦酒漬藥一宿以成煎豬膏三斤微火煎三沸一下另納白芷一片三上三下白芷色黃藥成去滓微火炙手摩病上日三野葛膏治惡風毒腫疼痹不仁瘰癧惡瘡癰疽腫脛腳弱偏枯百病方野葛犀角蛇銜莽草外臺作茵芋烏頭桔梗升麻防風川椒乾薑鱉甲雄黃巴豆各一兩丹參三兩躑躅花一升上十五味㕮咀以苦酒四升漬之一宿以成煎豬膏五斤微火煎三上三下藥色小黃去滓以摩病上此方不可施之猥人慎之胡洽無丹參躑躅有細辛又蘇恭以白芷防己吳茱萸附子當歸代巴豆雄黃蛇銜防風鱉甲蒼梧道士陳元膏主一切風濕骨肉疼痛痹方當歸細辛川芎各一兩桂心五寸天雄三十枚生地三斤白芷一兩半丹砂二兩乾薑十累烏頭三兩松脂八兩豬肪十斤上十二味㕮咀以地黃汁漬藥一宿煎豬肪去滓納藥煎十五沸去滓納丹砂末熟攪用火炙手摩病上日千遍瘥胡洽有人參防風各三兩附子三十枚雄黃二兩為十五味肘後千金翼有附子二十二銖雄黃二兩半大醋三升為十五味崔氏與千金翼同裴公八毒膏治猝中風毒腹中絞刺痛飛屍入臟及魘寢寐不寤屍厥奄忽不知人宿食不消溫酒服如棗核大得下止若毒氣甚咽喉閉塞不能咽者折齒納蔥葉口中以膏灌蔥葉中令下病腫者向火摩腫上若歲中多溫欲省病及行霧露中酒服之納鼻中亦得方川椒當歸雄黃丹砂各二兩烏頭巴豆各一升薤白一斤莽草四兩上八味㕮咀以苦酒三升漬一宿用豬脂五斤東向灶葦薪火煎之五上五下候薤白黃色絞去滓研雄黃丹砂如粉納之攪至凝乃止膏成盛不津器中諸蜈蚣蛇蜂等毒者以膏置瘡上病在外悉敷之摩之以破除日合一方用礜石一兩蜈蚣二枚是名八毒膏肘後不用巴豆莽草名五毒膏
