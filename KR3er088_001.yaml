front:
  text: 備急千金要方序夫清濁剖判上下攸分三才肇基五行俶落萬物淳朴無得而稱燧人氏出觀斗極以定方名始有火化伏羲氏作因之而畫八卦立庖廚滋味既興疴瘵萌起大聖神農氏憫黎元之多疾遂嘗百藥以救療之猶未盡善黃帝受命創制九針與方士岐伯雷公之倫備論經脈旁通問難詳究義理以為經論故後世可得依而暢焉春秋之際良醫和緩六國之時則有扁鵲漢有倉公仲景魏有華他並皆探賾索隱窮幽洞微用藥不過二三灸炷不逾七八而疾無不愈者晉宋以來雖復名醫間出然治十不能愈五六良由今人嗜欲太甚立心不常淫放縱逸有闕攝養所致耳余緬尋聖人設教欲使家家自學人人自曉君親有疾不能療之者非忠孝也末俗小人多行詭詐倚傍聖教而為欺紿遂令朝野士庶咸恥醫術之名多教子弟誦短文枸小策以求出身之道醫治之術闕而弗論籲可怪也嗟乎深乖聖賢之本意吾幼遭風冷屢造醫門湯藥之資罄盡家産所以青襟之歲高尚茲典白首之年未嘗釋卷至於切脈診候採藥合和服餌節度將息避慎一事長於己者不遠千里伏膺取決至於弱冠頗覺有悟是以親鄰國中外有疾厄者多所濟益在身之患斷絶醫門故知方藥本草不可不學吾見諸方部帙浩博忽遇倉猝求檢至難比得方訖疾已不救矣嗚呼痛夭枉之幽厄惜墮學之昏愚乃博採群經刪裁繁重務在簡易以為備急千金要方一部凡三十卷雖不能究盡病源但使留意於斯者亦思過半矣以為人命至重有貴千金一方濟之德逾於此故以為名也未可傳於士族庶以貽厥私門張仲景曰當今居世之士曾不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生而但競逐榮勢企踵權豪孜孜汲汲唯名利是務崇飾其末而忽棄其本欲華其表而悴其內皮之不存毛將安附進不能愛人知物退不能愛躬知己卒然遇邪風之氣嬰非常之疾患及禍至而後震栗身居厄地濛濛昧昧戇若遊魂降志屈節欽望巫祝告究歸天束手受敗齎百年之壽命將至貴之重器委付庸醫恣其所措咄嗟喑嗚厥身已斃神明消滅變為異物幽潛重泉徒為涕泣夫舉世昏迷莫能覺悟自棄若是夫何榮勢之云哉此之謂也
