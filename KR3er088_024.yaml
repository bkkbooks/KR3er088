body:
  text: 卷二十四解毒雜治方凡八類解食毒第一論一首方三十九首論曰凡人跋涉山川不諳水土人畜飲啖誤中於毒素不知方多遭其斃豈非枉橫耶然而大聖久設其法以救活之正為貪生樂藥忽而不學一朝逢遇便自甘心竟不識其所以今述神農黃帝解毒方法好事者可少留意焉治諸食中毒方飲黃龍湯及犀角汁無不治飲馬尿亦良治飲食中毒煩悶方以苦參三兩㕮咀以酒二升半煮取一升頓服取吐愈治食百物中毒方掘廁旁地深一尺以水滿坑中取廁籌七枚燒令煙以投坑中乃取水汁飲四五升即愈急者不可得但掘地著水即取飲之又方服生韭汁數升又方含貝子一枚須臾吐食物瘥治食六畜肉中毒方各取六畜干屎為末水服佳若自死六畜肉毒水服黃柏末方寸匕須臾復與服佳又方燒小豆一升為末服三方寸匕神良又方水服灶底黃土方寸匕治食生肉中毒方掘地深三尺取下土三升以水五升煮土五六沸取上浮清者飲一升立愈治食牛肉中毒方狼牙燒灰水服方寸匕良一作豬牙又方溫湯服豬脂良又方水煮甘草汁飲之治食牛馬肉中毒方飲人乳汁良治食馬肉血洞下欲死方豉二百粒杏仁二十枚上二味㕮咀蒸五升米下飯熟搗之再服令盡又方飲蘆根汁即解治生食馬肝毒殺人方牡鼠屎二七枚兩頭尖者是以水研飲之不瘥更作治食野菜馬肝肉諸脯肉毒方取頭垢如棗核大吞之起死人又方燒狗屎灰水和絞取汁飲之立愈又方燒豬骨為末水服方寸匕日三服治食百獸肝中毒方頓服豬脂一斤佳亦治陳肉毒治食狗肉不消心中堅或腹脹口乾大渴心急發熱狂言妄語或洞下方杏仁一升合皮研以沸湯三升和絞取汁分三服狗肉完片皆出即安良驗治食豬肉中毒方燒豬屎為末水服方寸匕犬屎亦佳治漏脯毒方張文仲云茅室漏水沾脯為漏脯搗韭汁服之良大豆汁亦得治郁肉濕脯毒方張文仲云肉閉在密器中經宿者為郁肉燒狗屎為末水服方寸匕凡生肉熟肉皆不用深藏密蓋不泄氣皆殺人又肉汁在器中密蓋氣不泄者亦殺人治脯在黍米中毒方陳曲一兩鹽二撮以水一升煮服之良治牛肝諸脯毒及餅臛中毒方取貝子為末水服如豆佳不瘥更服人以雉肉作餅臛因食吐下治方以犀角為末服方寸匕得安甚良治食鵝鴨肉成病胸滿面赤不下食者方服秫米泔良治食魚中毒方煮橘皮停極冷飲之立驗肘後云治食魚中毒面腫煩亂者治食魚中毒面腫煩亂及食鱸魚中毒欲死者方銼蘆根舂取汁多飲良並治蟹毒亦可取蘆葦茸汁飲之治食魚鱠及生肉在胸膈中不化吐之不出便成癥瘕方厚朴三兩大黃二兩上二味以酒二升煮取一升頓服之治食魚鱠不消方大黃三兩切朴硝二兩上二味以酒二升煮取一升頓服之仲景有橘皮一兩肘後方云治食豬肉遇冷不消必成癥下之方亦無橘皮又方舂馬鞭草飲汁一升即消生薑亦良肘後方云亦宜服諸吐藥又方鮐魚皮燒灰水服無完皮以壞刀裝取之一名鮫魚皮古今録驗治食鯸鮧魚傷毒又方魚皮燒灰水服方寸匕又方魚鱗燒灰水服方寸匕食諸鮑魚中毒亦用之治食蟹中毒方冬瓜汁服二升冬瓜亦可食治食諸菜中毒方甘草貝齒胡粉等分上三味治下篩水服方寸匕小兒尿乳汁共服二升亦好治食樹菌中毒方人屎汁服一升良治食諸菌中毒方掘地作坑以水沃中攪令濁澄清飲之名地漿解百藥毒第二論一首方十二首解毒品味二十八條論曰甘草解百藥毒如湯沃雪有同神妙有人中烏頭巴豆毒甘草入腹即定中藜蘆毒蔥湯下咽便愈中野葛毒土漿飲訖即止如此之事其驗如反掌要使人皆知之然人皆不肯學誠可嘆息方稱大豆汁解百藥毒余每試之大懸絶不及甘草又能加之為甘豆湯其驗尤奇有人服玉壺丸治嘔不能已百藥與之不止藍汁入口即定如此之事皆須知之此成規更不須試練也解毒方中條例極多若不指出一二學者不可卒知余方例爾石藥毒用白鴨屎人參汁雄黃毒用防己鐵粉毒用磁石礜石毒用大豆汁白鵝膏防葵毒用葵根汁大戟毒用菖蒲汁桔梗毒用白粥甘遂毒用大豆汁躑躅毒用梔子汁雞子毒用醇醋馬刀毒用清水野芋毒用土漿人糞汁杏仁毒用藍子汁百藥毒用甘草薺苨大小豆汁藍葉根實汁金銀毒用水銀服數兩即出或雞子清及屎白燒豬脂和服水淋雞屎汁煮蔥汁芫花毒用防己防風甘草桂汁野葛毒用雞子清葛根汁甘草汁鴨頭熱血豬膏雞屎人屎藜蘆毒用雄黃溫湯煮蔥汁烏頭天雄附子毒用大豆汁飴糖防風遠志棗肉射罔毒用藍汁大小豆汁竹瀝大麻子汁藕汁薺汁六畜血貝齒屑蚯蚓屎半夏毒用生薑汁及煮乾薑汁莨菪毒用薺苨甘草犀角蟹汁升麻狼毒毒用杏仁藍汁白蘞鹽汁木占斯巴豆毒用黃連煮汁大豆汁菖蒲汁生藿汁肘後云小豆藿煮寒水石汁蜀椒毒用葵子汁蒜汁豉汁桂汁人尿冷水土漿雞毛燒吸煙及水調服斑蝥芫青毒用豬膏戎鹽大豆汁藍汁巴豆鹽湯煮豬膏服藥過劑悶亂者用水和胡粉水和葛粉地漿豉汁蘘荷汁粳米沈乾薑黃連飴糖藍汁吞雞子黃上解毒諸藥一例中有數味者但得一味即是不必悉具解一切毒藥發不問草石始覺惡即服此方豉二升生麥門冬蔥白各八兩上三味以水七升煮取二升半分三服雞腸草散解諸毒方雞腸草三分薺苨升麻各四分芍藥當歸甘草各一分坌土一分藍子一合上八味治下篩水服方寸匕多飲水為佳若為蜂蛇等毒蟲所螫以針刺螫上血出著藥如小豆許於瘡中令濕瘥若為射罔箭所中削竹如叉股長一尺五寸以綿纏繞水沾濕取藥納瘡中隨瘡深淺令至底止有好血出即休若服藥有毒水服方寸匕毒解痛止愈解毒藥散方薺苨一分藍並花二分上二味七月七日取藍陰乾搗篩水服方寸匕日三又方取秦燕毛二七枚燒灰服解一切毒方母豬屎水和服之又水三升三合和米粉飲之解鴆毒及一切毒藥不止煩悶方甘草蜜各四分粱米粉一升上三味以水五升煮甘草取二升去滓歇大熱納粉湯中攪勻調納蜜更煎令熟如薄粥適寒溫飲一升治食莨菪悶亂如卒中風或似熱盛狂病服藥即劇方飲甘草汁藍青汁即愈治野葛毒已死口噤者方取青竹去兩節柱兩脅臍上納冷水注之暖即易須臾口開開即服藥立活唯須數易水治鉤吻毒困欲死面青口噤逆冷身痹方肘後方云鉤吻茱萸食芹相似而鉤吻所生之旁無他草又莖有毛若人誤食之殺人薺苨八兩㕮咀以水六升煮取三升冷如人體服五合日三夜二凡煮薺苨唯令濃佳又方煮桂汁飲之又方啖蔥涕佳蔥涕治諸毒治腹中有鐵方白折炭刮取末以井花水服三錢不過再服解五石毒第三論三首證十八條方三十七首論曰人不服石以庶事不佳惡瘡疥癬溫疫瘧疾年年常患寢食不安興居常惡非只己事不康生子難育所以石在身中萬事休泰要不可服五石也人年三十以上可服石藥若素肥充亦勿妄服四十以上必須服之五十以上三年可服一劑六十以上二年可服一劑七十以上一年可服一劑又曰人年五十以上精華消歇服石猶得其力六十以上轉惡服石難得力所以常須服石令人手足溫暖骨髓充實能消生冷舉措輕便復耐寒暑不著諸病是以大須服之凡石皆熟煉用之凡石之發當必惡寒頭痛心悶發作有時狀如溫瘧但有此兆無過取冷水淋之得寒乃止一切冷食唯酒須溫其諸解法備如後説其發背疽腫方見二十二卷中又曰凡服石人慎不得雜食口味雖百品具陳終不用重食其肉諸雜既重必有相賊積聚不消遂動諸石如法持心將攝得所石藥為益善不可加餘年三十八九嘗服五六兩乳自是以來深深體悉至於將息節度頗識其性養生之士宜留意詳焉然其乳石必須土地清白光潤羅紋鳥翮一切皆成乃可入服其非土地者慎勿服之多致殺人甚於鴆毒紫石白石極須外內映徹光淨皎然非爾亦不可服寒石五石更生散方舊説此藥方上古名賢無此漢末有何侯者行用自皇甫士安以降有進餌者無不發背解體而取顛覆余自有識性以來親見朝野仕人遭者不一所以寧食野葛不服五石明其有大大猛毒不可不慎也有識者遇此方即須焚之勿久留也今但録主對以防先服者其方已從煙滅不復須存為含生害也蔥白豉湯凡鍾乳對術又對栝蔞其治主肺上通頭胸術動鍾乳胸塞短氣鍾乳動術頭痛目疼又鍾乳雖不對海蛤海蛤能動鍾乳鍾乳動則目疼短氣有時術動鍾乳直頭痛胸塞然鍾乳與術為患不過此也雖所患不同其治一也發動之始要有所由始覺體中有異與上患相應宜速服此方蔥白半斤豉二升甘草三兩人參三兩外臺用吳茱萸一升上四味先以水一斗五升煮蔥白作湯澄取八升納藥煮取三升分三服才服便使人按摩搖動口中嚼物然後仰臥覆以暖衣汗出去衣服湯熱歇即便冷淘飯燥脯而已若服此不解復服甘草湯甘草湯方甘草三兩桂心二兩豉二升蔥白半斤上四味合服如上法若服此已解肺家猶有客熱餘氣復服桂心湯桂心湯方桂心麥門冬各三兩人參甘草各二兩豉二升蔥白半斤上六味合服如前法此方與次後散發身體生瘡麥門冬湯分兩小異杜仲湯硫黃對防風又對細辛其治主脾腎通主腰腳防風動硫黃煩熱腳疼腰痛或嗔忿無常或下利不禁防風細辛能動硫黃而硫黃不能動彼始覺發便服此方杜仲三兩枳實甘草李核仁各二兩香豉二升梔子仁十四枚上六味合服如上法若不能解復服大麥奴湯大麥奴湯方大麥奴四兩甘草人參芒硝桂心各二兩麥門冬半斤上六味合服如上法若服已解脾腎猶有餘熱氣或冷復服人參湯人參湯方人參乾薑甘草當歸各一兩附子一枚上五味合服如上法生麥門冬湯白石英對附子其治主胃通主脾腎附子動白石英煩熱腹脹白石英動附子嘔逆不得食或口噤不開或言語難手腳疼痛始覺宜服此湯方生麥門冬四兩甘草麻黃各二兩豉二升上四味合服如上法不解再服大黃湯大黃湯方若煩加細辛五兩大黃三兩豉二升甘草二兩梔子仁三十枚上合服如上法頻服得下便止不下服盡若熱勢未除視瞻高而患渴者復服栝蔞根湯栝蔞根湯方栝蔞根大麥奴各四兩甘草二兩豉二升蔥白半斤上五味合服如上法稍稍一兩合服之隱約得一升許便可食少糜動口若已解胃中有餘熱復服芒硝湯芒硝湯方芒硝桂心各二兩李核仁二十一枚白朮一兩大棗二十枚甘草通草各三兩上七味合服如上法若腹脹去芒硝用人參二兩人參湯紫石英對人參其治主心肝通主腰腳人參動紫石英外臺作細辛人參心急而痛或驚悸不得眠臥恍惚忘誤失性發狂昏昏欲眠或憒憒喜嗔或瘥或劇乍寒乍熱或耳聾目暗又防風雖不對紫石英而能動防風外臺云防風雖不對紫石英為藥中有人參緣防風動人參轉相發動令人心痛煩熱令人頭項強始覺服此方外臺服麻黃湯人參白朮各三兩甘草外臺無桂心各二兩細辛一兩豉三升上六味合服如上法若嗔盛加大黃黃芩梔子各三兩若忘誤狂發猶未除復服後列第一生麥門冬湯生麥門冬湯方外臺此方治礜石發生麥門冬蔥白各半斤甘草三兩人參一兩豉二升上五味合服如上法溫床暖覆床下著火口中嚼物使身稍汗一日便解若心有餘熱更服參桂湯參桂湯方人參防風甘草各三兩桂心二兩白朮生薑各一兩上六味合服如上法大麥麨湯赤石脂對桔梗其治主心通主胸背桔梗動石脂心痛寒噤手足逆冷心中煩悶赤石脂動桔梗則頭痛目赤身體壯熱始覺發宜溫清酒飲之隨能否須酒勢行則解亦可服此方大麥熬令汗出燥止勿令大焦舂去皮細搗絹篩以冷水和服之翼方云炒去皮淘淨蒸令熟曝乾熬令香為末蔥白豉湯礜石無所偏對其治主胃發則令人心急口噤骨節疼強或節節生瘡始覺發即服此方外臺云服麥門冬湯蔥白半斤豉二升甘草二兩上三味以水六升煮取二升半分三服若散發身體卒生瘡宜服後方生麥門冬湯方生麥門冬五兩甘草三兩桂心二兩人參一兩半蔥白半斤豉二升上六味服如解鍾乳湯法術對鍾乳術發則頭痛目疼或舉身壯熱解如鍾乳法附子對白石英亦對赤石脂附子發則嘔逆手腳疼體強骨節痛或項強面目滿腫發則飲酒服麨自愈若不愈與白石英同解大黃黃芩湯桔梗對赤石脂又對牡蠣又對茯苓桔梗發則頭痛目赤身體壯熱牡蠣發則四肢壯熱心腹煩悶極渴解法並與赤石脂同茯苓發則壯熱煩悶宜服此方大黃黃芩梔子仁各三兩蔥白切豉各一升上五味㕮咀以水六升煮取二升半分三服栝蔞根湯海蛤對栝蔞海蛤先發則手足煩熱栝蔞先發則噤寒清涕出宜服此方栝蔞根甘草各二兩大黃一兩梔子仁十四枚上四味合煎服如解鍾乳法浴法初熱先用暖水後用冷水浴時慎不可洗頭垂沐可二三升灌之凡藥宜浴便得解即佳如不瘥可余治之寒食散發動者云草藥氣力易盡石性沉滯獨主胃中故令數發欲服之時以絹袋盛散一匕著四合酒中塞其口一宿後飲盡之其酒用多少將御節度自如舊法梔子豉湯治食宿飯陳臭肉及羹宿菜發者方梔子三七枚豉三升甘草三兩上三味㕮咀以水八升煮取三升分三服方可加人參蔥白蔥白豉湯治因失食發及飲酒過醉發者方蔥白一升豉二升乾薑五兩甘草二兩上四味㕮咀以水七升煮取三升分三服不解宜服理中湯人參白朮甘草各三兩乾薑二兩上四味㕮咀以水六升煮取三升分三服人參湯治因嗔怒太過發者方人參枳實甘草各九分白朮乾薑栝蔞根各六分上六味㕮咀以水九升煮取三升分三服若短氣者稍稍數飲千金翼云主散發氣逆心腹絞痛不得氣息命在轉燭者情色過多發宜服黃耆湯方本闕將冷太過發則多壯熱以冷水洗浴然後用生熟湯五六石灌之已食少暖食飲少熱酒行步自勞將熱太過發則多心悶時時食少冷食若夏月大熱時發動多起於渴飲多所致水和少麨服之不瘥復作以瘥為度冷熱尉法若大小便閉塞不通或淋瀝溺血陰中疼痛此是熱氣所致用此法即愈其法先以冷物尉小腹已次以熱物尉之又以冷物尉之若小便數此亦是取冷所為暖調理自愈治藥發下利者方干服豉即斷能多益佳檳榔湯凡服散之後忽身體浮腫多是取冷過所致治之方檳榔三十枚搗以水八升煮取二升分二服治凡散發瘡腫方蔓菁子熬杏仁黃連胡粉各一兩水銀二兩上五味別搗蔓菁子杏仁如膏以豬脂合研令水銀滅塗上日三夜一治散發赤腫者方生地黃五兩大黃一兩生商陸三兩杏仁四十枚上四味切醋漬一宿豬膏一升煎商陸令黑去滓摩腫上日三夜一治散發生細瘡者方黃連芒硝各五兩上二味㕮咀以水八升煮黃連取四升去滓納芒硝令煬漬布貼瘡上數數易換多少皆著之治散發瘡痛不可忍方冷石即滑石三兩治下篩粉瘡上日五六度即燥須臾痛亦定治服散忽發動方乾薑五兩㕮咀以水五升煮取三升去滓納蜜一合和絞頓服不瘥重作鴨通湯解散除熱方白鴨通五升沸湯二斗半淋之澄清取汁二斗豉三升麻黃八兩梔子仁二十枚石膏三兩甘草五兩冷石二兩上七味五味㕮咀以鴨通汁煮取六升去滓納豉煮三沸分服五合若覺體冷小便快止後服若熱猶盛小便赤促服之不限五合宜小勞當漸進食不可令食少但勿便多耳解散治盛熱實大小便赤方升麻大黃黃連黃柏甘草各三兩黃芩四兩芍藥六兩梔子仁十四枚竹葉切豉各一升白鴨通五合上十一味㕮咀以水三斗先煮鴨通竹葉取一斗二升去滓澄清取一斗次納藥煮取三升分三服若上氣者加杏仁五合腹滿加石膏三兩下散法治藥發熱困方翼方云凡散數發熱無賴下去之又云諸丹及金石等同用之黍米三升作糜以成煎豬脂一斤和令調宿不食旦空腹食之令飽晚當下藥神良不盡熱發更合服之又方肥豬肉五斤蔥白薤各半斤上三味合煮治如食法宿不食旦服之令盡不盡明日更服又方治壓藥發動數數患熱困下之之方以豬腎脂一具不令中水以火炙承取汁適寒溫一服三合每日夜五六服多至五六升二日稍隨大便下又方作肥豬肉臛一升調如常法平旦空腹頓服令盡少時腹中雷鳴鳴定藥隨下以器盛取用水淘石不盡更作如前服之蠱毒第四論論一首六條方二十首論曰蠱毒千種種種不同或下鮮血或好臥暗室不欲光明或心性反常乍嗔乍喜或四肢沉重百節痠痛狀貌説不可盡亦有得之三年乃死急者一月或百日即死其死時皆從九孔中或於脅下肉中出去所以出門常須帶雄黃麝香神丹諸大辟惡藥則百蠱貓鬼狐貍老物精魅永不敢著人養生之家大須慮此俗亦有灸法初中蠱於心下捺便大炷灸一百壯並主貓鬼亦灸得愈又當足小趾尖上灸三壯當有物出酒上得者有酒出飯上得者有飯出肉菜上得者有肉菜出即愈神驗皆於灸瘡上出凡中蠱毒令人心腹絞痛如有物齧或吐下血皆如爛肉若不即治蝕人五臟盡乃死矣欲驗之法當令病人唾水沉者是蠱不沉者非蠱也凡人患積年時復大便黑如漆或堅或薄或微赤者是蠱也凡人忽患下血以斷下方治更增極者此是中盅者也凡卒患血痢或赤或黑無有多少此皆是蠱毒粗醫以斷痢藥處之此大非也世有拙醫見患蠱脹者遍身腫滿四肢如故小便不甚澀以水病治之延日服水藥經五十餘日望得痊愈日復增加奄至殞歿如此者不一學者當細尋方意消息用之萬不失一醫方千卷不盡其理所以不可一一備述凡人中蠱有人行蠱毒以病人者若服藥知蠱主姓名當使呼喚將去若欲知蠱主姓名者以敗鼓皮燒作末飲服方寸匕須臾自呼蠱主姓名者可語令去則愈又以蛇涎合作蠱藥著飲食中使人得瘕病此一種積年乃死療之各自有藥江南山間人有此不可不信之太上五蠱丸治百蠱吐血傷中心腹結氣堅塞咽喉語聲不出短氣欲死飲食不下吐逆上氣去來無常狀如鬼祟身體浮腫心悶煩疼寒戰夢與鬼交狐貍作魅卒得心痛上叉胸脅痛如刀刺經年纍歲著床不起悉主之方雄黃椒目巴豆莽草芫花真珠即丹砂外臺作木香鬼臼礬石藜蘆各四分附子五分獺肝一分蜈蚣二枚斑蝥三十枚上十三味為末蜜和更搗二千杵丸如小豆先食飲服一丸余密封勿泄藥氣十丸為一劑如不中病後日增一丸以下痢為度當下蠱種種狀貌不可具述下後七日將息服一劑三十年百病盡除忌五辛太乙追命丸治百病若中惡氣心腹脹滿不得喘息心痛積聚臚脹疝瘕宿食不消吐逆嘔啘寒熱瘰癧蠱毒婦人産後余疾方蜈蚣一枚丹砂即真珠附子礬石一作礜石雄黃藜蘆鬼臼各一分巴豆二分上八味為末蜜丸如麻子一服二丸日一服傷寒一二日服一丸當汗出綿裹兩丸塞耳中下利服一丸一丸塞下部蠱毒服二丸在外膏和摩病上在膈上吐在膈下利有瘡一丸塗之毒自出産後余疾服一丸耳聾綿裹塞耳中治人得藥雜蠱方斑蝥六枚桂心藜蘆各如指大釜月下土如彈丸大上四味治下篩水服一錢匕下蟲蛇蝦蟆蜣螂毒俱出萬病丸治蠱疰四肢浮腫肌膚消索咳逆腹大如水狀死後轉易家人一名蠱脹方小品名雄黃丸雄黃巴豆莽草鬼臼各四兩蜈蚣三枚上五味為末蜜和搗三千杵丸如小豆密封勿泄氣宿勿食平旦空腹服一丸一炊久不知更加一丸當先下清水次下蟲長數寸及下蛇又下毈雞子或白如膏下後作蔥豉粥補之百種暖將息治中蠱毒腹內堅如石面目青黃小便淋瀝病變無常處方肘後古今録驗俱云用鐵精烏雞肝和丸如梧子酒服三丸日再甚者不過十日千金用後湯疑誤羖羊皮方五寸犀角芍藥牡丹黃連各一兩蘘荷四兩半梔子仁七枚上七味㕮咀以水九升煮取三升分三服葛氏崔氏俱無牡丹芍藥梔子有苦參升麻當歸犀角丸治蠱毒百病腹暴痛飛尸惡氣腫方犀角屑鬼臼屑桂心末羚羊角屑各四錢匕天雄莽草真珠即丹砂雄黃各一兩貝子五枚燒蜈蚣五節巴豆五十枚麝香射罔各如雞子黃大一枚上十三味為末蜜丸如小豆服一丸日二含咽不知少增之卒得腹滿蜚尸服如大豆許二丸若惡氣腫以苦酒和塗上絳囊盛藥系左臂闢不祥鬼疰蠱毒可以備急治蠱毒方茜根蘘荷根各三兩上二味㕮咀以水四升煮取二升頓服肘後云治中蠱吐血或下血如爛肝者自知蠱主姓名又方蝟皮灰亂髮灰各一方寸匕生麻子汁五升桃根皮向陽者槲樹背陰白皮各五兩上五味先煮桃根槲皮取濃汁一升和麻子汁發灰等令勻患人宿少食旦服一大升須臾著盆中以雞翎擲吐水中如牛涎犢胎及諸蟲並出又方槲樹背陰白皮一大握長五寸水三升煮取一升空腹服即吐蟲出亦治中蠱下血又方蝟皮灰水服方寸匕亦出蟲又方大戟斑蝥五月五日桃白皮各四分必效方云取東引者火烘之上三味治下篩旦空腹以水一鍾服八捻用二指相著如開頓服之若指頭相離取藥太過恐能損人肘後方云服棗核大不瘥十日更一服必效方云服半方寸匕其毒即出不出更一服李饒州云若酒中得則以酒服若食中得以飲服之治蛇蠱方蛇毒入菜果中食之令人得病名曰蛇蠱大豆末以酒漬絞取汁服半升治諸熱毒或蠱毒鼻中及口中出血醫所不治方取人屎尖七枚燒作火色置水中研之頓服即愈亦解百毒時氣熱病之毒服極神驗治蠱吐下血方櫸皮廣五寸長一尺蘆荻根如足大趾五寸小品方用薔薇根上二味㕮咀以水二升煮取一升頓服極下蠱治中蠱下血日數十行者方巴豆二七枚芫青藜蘆附子礬石各二分上五味為末別治巴豆合和相得以綿裹藥如大豆許納下部中日三瘥又方苦瓠一枚以水二升煮取一升稍稍服之當下蠱及吐蝦蟆蝌蚪之狀一月後乃盡肘後方云用苦酒二升煮八物茜根湯治下血狀如雞肝腹中絞痛難忍者方茜根升麻犀角各三兩桔梗黃柏黃芩各二兩地榆白蘘荷各四兩上八味㕮咀以水九升煮取二升半分三服此蠱利血用之又方桔梗犀角等分上二味為末酒服方寸匕日三不能自服絞口與之藥下心中當煩須臾自靜有頃下服至七日止可食豬脾臟自補養治蠱下血如雞肝日夜不解欲死者皆可用治腸蠱先下赤後下黃白沫連年不瘥者方牛膝一兩捶散切以醇清酒一升漬一宿平旦空腹服之再服便愈北地太守酒治萬病蠱毒風氣寒熱方烏頭甘草芎藭黃芩桂心藜蘆附子各四兩白蘞桔梗半夏前胡麥門冬柏子仁各六兩上十三味㕮咀以曲十斤秫米一斛如醞酒法藥以絹囊盛之沉於甕底酒熟去糟還取藥滓以青布袋盛沉著酒底泥封秋七日冬十日夏五日空腹服一合日三以知為度因藥有毒故以青布盛之服勿中止二十日大有病出其狀如漆五十日即悉愈婦人年五十被病連年腹中積聚冷熱不調時時切痛繞臍絞急上氣胸滿二十餘年服藥二七日所下四五升即愈又有女人病偏枯絶産服二十日吐黑物大如刀帶長三尺許即愈其年生子又有女人小得癲病服十八日出血二升半愈有人被杖崩血內瘀臥著九年服藥十三日出黑血二三升愈有人耳聾十七年服藥三十五日鼻中出血三升耳中出黃水五升而愈古方云熹平二年北地太守臣光上然此偏主蠱毒有人中蠱毒者服無不愈極難瘥者不過二七日所有效莫不備出曾有一女人年四十餘偏枯羸瘦不能起長臥床枕耳聾一無所聞兩手不收已經三載余為合之遂得平復如舊有人中蠱毒而先患風服茵芋酒傷多吐出蠱數十枚遂愈何況此酒而不下蠱也嘉其功效有異常方故具述焉胡臭漏腋第五論一首方十五首論曰有天生胡臭有為人所染臭者天生臭者難治為人所染者易治然須三年醋敷礬石散勿止並服五香丸乃可得瘥勿謂一度敷藥即瘥只一敷時暫得一瘥耳五香丸見前第六卷中凡胡臭人通忌食蕓薹五辛治之終身不瘥石灰散治胡臭方石灰一升楓香一作沉香丁香薰陸香青木香各二兩礬石四兩橘皮陽起石各三兩上八味治下篩以綿作篆子粗如指長四寸展取藥篆上以絹囊盛著腋下先以布揩令痛然後夾之又方以三年苦酢和石灰敷之治胡臭方辛夷芎藭細辛杜蘅藁本各二分上五味㕮咀以醇苦酒漬一宿煎取汁敷之欲敷取臨臥時以瘥為度又方青木香附子石灰各一兩礬石半兩上四味為散著粉中常粉之又方赤銅屑以酢和銀器中炒極熱布裹尉腋下冷復易又方槲葉切三升以水五升煮取一升洗腋下即以白苦瓠燒令煙出熏之數數作用又方辛夷細辛芎藭青木香各四分上四味治下篩熏竟粉之又方馬齒菜一束搗碎以蜜和作團以絹袋盛之以泥紙裹厚半寸曝乾以火燒熟破取更以少許蜜和使熱勿令冷先以生布揩之夾藥腋下痛久忍之不能然後以手勒兩臂又方牛脂胡粉等分上二味煎令可丸塗腋下一宿即愈不過三劑又方伏龍肝作泥敷之六物散治漏腋腋下及足心手掌陰下股里常如汗濕臭者方干枸杞根干薔薇根甘草各半兩商陸根胡粉滑石各一兩上件藥治下篩以苦酒少少和塗當微汗出易衣復更塗上不過三著便愈或一年復發發覆塗之又方水銀胡粉外臺作粉霜上二味以面脂研和塗之良驗又方石灰三升銀屑一升一作銅屑上二味合和絹囊盛汗出粉之佳又方黃礬石燒令汁盡治為末以絹袋盛粉之即瘥又方正旦以尿洗腋下神妙脫肛第六方十三首灸法三首肛門主肺肺熱應肛門熱則閉塞大便不通腫縮生瘡兌通方白蜜三升煎令燥冷水中調可得為丸長六七寸納肛門中倒向上頭向下少時取煬斯須即通洞泄豬肝散肛門主大腸大腸寒應肛門寒則洞泄肛門滯出方豬肝一斤熬令燥黃連阿膠芎藭各二兩艾葉一兩烏梅肉五兩上六味治下篩溫清酒一升服方寸匕半日再服若不能酒與清白米飲亦得又方磁石四兩桂心一尺蝟皮一枚上三味治下篩飲服方寸匕日一服即縮慎舉動及急帶衣斷房室周年乃佳肘後方云治女人陰脫出外用鱉頭一枚為四味壁土散治肛門滯出方故屋東壁土一升研皂莢三挺各長一尺二寸上二味先搗土為散挹粉肛頭出處次取皂莢炙暖更遞尉取入則止又方鱉頭故敗麻履底各一枚上二味燒鱉頭搗為散敷肛門滯出頭次將履底按入即不出矣又方女萎一升以器中燒坐上熏之即入治脫肛方蒲黃二兩以豬脂和敷肛上納之二三度愈治腸隨肛出轉廣不可入方生栝蔞根為粉以豬脂為膏溫塗隨手抑按自得縮入治積冷利脫肛方枳實一枚石上磨令滑澤鑽安柄蜜塗炙令暖尉之冷更易取縮入止又方鐵精粉納上按令入即愈治脫肛歷年不愈方生鐵三斤水一斗煮取五升去鐵以汁洗日再又方鱉頭一枚燒令煙絶治作屑以敷肛門上進以手按之又方炙故麻履底按令入頻按令入永瘥灸法病寒冷脫肛出灸臍中隨年壯脫肛歷年不愈灸橫骨百壯又灸龜尾七壯龜尾即後窮骨是也癭瘤第七方十三首證一條灸法十首治石癭氣癭勞癭土癭憂癭等方海藻海蛤龍膽通草昆布礜石一作礬石松蘿各三分麥曲四分半夏二分上九味治下篩酒服方寸匕日三禁食豬魚五辛生菜諸難消之物十日知二十日愈又方小麥面一升海藻一兩特生礜石十兩上三味以三年米醋漬小麥面曝乾各搗為散合和服一方寸匕日四五服藥含極乃咽之禁薑五辛豬魚生菜大吹大讀誦大叫語等又方昆布松蘿海藻各三兩海蛤桂心通草白蘞各二兩上七味治下篩酒服方寸匕日三又方海藻海蛤各三兩昆布半夏細辛土瓜根松蘿各一兩通草白蘞龍膽各二兩上十味治下篩酒服方寸匕日二不得作重用方又方昆布二兩洗切如指大醋漬含咽汁盡愈又方海藻一斤小品作三兩小麥曲一斤上二味以三年醋一升溲麵未曝乾往反醋盡合搗為散酒服方寸匕日三服忌努力崔氏云療三十年癭瘤又方菖蒲海蛤白蘞續斷海藻松蘿桂心蜀椒倒挂草半夏各一兩神麯三兩羊靨百枚上十二味治下篩以牛羊髓脂為丸如梧子日服三丸五癭丸方取鹿靨以佳酒浸令沒炙乾納酒中更炙令香含咽汁味盡更易盡十具愈陷腫散治二三十年癭瘤及骨瘤石瘤肉瘤脂瘤膿瘤血瘤或息肉大如杯杆升斗十年不瘥致有漏潰令人骨消肉盡或堅或軟或潰令人驚悸寤寐不安身體瘛縮愈而復發方烏賊骨石硫黃各一分鍾乳紫石英白石英各二分丹參三分琥珀附子胡燕屎大黃乾薑各四分上十一味治下篩以韋囊盛勿泄氣若瘡濕即敷若瘡干豬脂和敷日三四以干為度若汁不盡至五劑十劑止藥令人不痛若不消加芒硝二兩佳治癭瘤方昆布桂心各一兩逆流水柳須一兩海藻乾薑各二兩羊靨七枚陰乾上六味為末蜜丸如小彈子大含一丸咽津又方礬石芎藭當歸大黃黃連黃芩白蘞芍藥各二分吳茱萸一分上九味治下篩雞子黃和塗故細布上隨瘤大小厚薄貼之干則易著藥熟當作膿脂細細從孔中出須探膿血盡著生肉膏若膿不盡復起如故生肉膏治癰瘤潰漏及金瘡百瘡方當歸附子甘草白芷芎藭各一兩薤白二兩生地黃三兩上七味㕮咀以豬脂三升半煎白芷黃去滓稍以敷之日三又方狗屎毈雞子敷之去膿水如前方説敷生肉膏取瘥方見前二十二卷癰疽門灸法癭惡氣灸天府五十壯千金翼云又灸胸堂百壯癭上氣短氣灸肺俞百壯癭勞氣灸衝陽隨年壯癭氣面腫灸通天五十壯癭灸天瞿三百壯橫三間寸灸之又灸中封隨年壯在兩足趺上曲尺宛宛中諸癭灸肩髃左右相對宛宛處男左十八壯右十七壯女右十八壯左十七壯或再三取瘥止又風池百壯挾項兩邊又兩耳後髮際一百壯又頭沖一作頸沖頭沖在伸兩手直向前令臂著頭對鼻所注處各隨年壯千金翼一名臂臑凡肉瘤勿治治則殺人慎之肘後方云不得針灸陰㿗第八論二首方二十五首灸法四首論曰㿗有四種有腸㿗卵脹氣㿗水㿗其腸㿗卵脹難瘥氣㿗水㿗針灸易治治㿗丸方蜘蛛熬桃仁各五十枚桂心蒺藜子地膚子澤瀉防風五味子橘皮茯苓防葵芍藥各二兩牡丹皮細辛海藻各一兩狐陰一具上十六味為末蜜丸如梧子大服十丸稍加至三十丸灸法陰㿗灸足大趾下理中十壯隨腫邊灸之肘後方云灸足大趾第二節下橫紋正中央五壯姚氏云足大趾本三壯男兒㿗先將兒至碓頭祝之曰坐汝令兒某甲陰囊㿗故灸汝三七壯灸訖便牽小兒令雀頭下向著囊縫當陰頭灸縫上七壯即消已驗艾炷蝟簪頭許大凡男㿗當騎碓軸以莖伸置軸上齊陰頭前灸軸木上隨年壯論曰有人自少至長陰下常有乾癬者宜依癬方主之有五勞七傷而得陰下癢濕搔之黃汁出者宜用補丸散主之仍須敷藥治之亦有患妒精瘡者以妒精方治之夫妒精瘡者男子在陰頭節下婦人在玉門內並似疳瘡作臼齊食之大痛疳即不痛也蒺藜子湯治虛熱石藥發熱當露臥冷濕傷肌熱聚在裡變成熱及水病腫滿腹大氣急大小便不利腫如皮紙盛水晃晃如老蠶色陰莖堅腫為瘡水出此皆腎熱虛損強取風陰濕傷脾胃故也治之之法內宜依方服諸利小便藥外以此湯洗四肢竟以蔥白膏敷之別以豬蹄湯洗莖上方蒺藜子蔥心青皮赤小豆各一升菘菜子二升蒴藋五升巴豆一枚連皮殼上六味㕮咀以水二斗煮取八升以淋洗腫處豬蹄湯治服石發熱因勞損熱盛當風露臥莖腫方豬蹄一具蒴藋三升蒺藜子一升碎葶藶子半斤黃柏五兩上五味㕮咀以水一斗煮取三升冷浴陰莖日三蔥白膏方蔥白菘菜子葶藶子蒴藋根蒺藜子丹參各半升豬膏五升上七味㕮咀煎如煎膏法去滓用之治男子陰腫大如升斗核痛人所不能療者方雄黃一兩研礬石二兩研甘草一尺切上三味以水五升煮減半洗腫痛處集驗方無礬石只二味治陰腫皮癢方熬桃仁令香為末酒服方寸匕日三有人陰冷冷氣漸入陰囊腫滿恐死日夜疼悶外臺作夜即痛悶不得眠方取生椒擇令淨以布帛裹著丸囊令厚半寸須臾熱氣通日再易取消瘥止又方搗莧菜根敷之又方以釜月下土雞子白和敷之又方醋和熱灰尉之又方車前子為末飲之又方醋和麵尉之又方煮大薊根汁服一升日三不過三劑愈治陰腫痛方灸大敦三壯治卒陰痛如刺汗出如雨方小蒜韭根楊柳根各一斤上三味合燒以酒灌之及熱以氣蒸之即愈治陰痛方甘草末石蜜等分上二味和乳塗之治妒精瘡方用銀叉綿裹以臘月豬脂熏黃火上暖以叉烙瘡上令熱取干槐枝燒𣿉塗之又方麝香黃礬青礬等分上三味為末小便後敷上不過三度治陰蝕瘡方蒲黃一升水銀二兩上二味研成粉小便後即敷之瘥止又方狼牙兩把切以水五升煮取一升溫洗之日五度又方肥豬肉五斤水三斗煮令極爛去肉以湯令極熱便以漬瘡中冷即愈治陰蝕生瘡或癢方雄黃礬石各二分麝香半分上三味為末粉瘡上即瘥治陰惡瘡方蜜煎甘草末塗之葛氏云此見有人患莖頭腫坎下瘡欲斷者以豬肉湯漬洗之並黃柏黃連末塗之治男女陰瘡方石硫黃為末以敷瘡上治男女陰癢生瘡方嚼胡麻敷之佳治陰下生瘡洗湯方地榆黃柏各半斤上二味㕮咀以水一斗五升煮取六升去滓適冷暖便洗瘡日再或只煮黃柏汁洗亦佳
