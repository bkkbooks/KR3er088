body:
  text: 卷二十三痔漏方凡五類九漏第一論一首方八十三首灸法十六首論曰夫九漏之為病皆寒熱瘰癧在於頸腋者何氣使生此皆鼠瘻寒熱之毒氣堤留於脈而不去者也鼠瘻之本皆根在於臟其末上出於頸腋之下其浮於脈中而未著於肌肉而外為膿血者易去去之奈何曰請從其末引其本可使衰去而絶其寒熱審按其道以豫之徐往來以去之其小如麥者一刺知三刺已決其死生奈何曰反其目視其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死赤脈不下貫瞳子者可治也凡項邊腋下先作瘰癧者欲作漏也宜禁五辛酒面及諸熱食凡漏有似石癰纍纍然作癧子有核在兩頸及腋下不痛不熱治者皆練石散敷其外內服五香連翹湯下之二方並見二十二卷癰疽門已潰者治如癰法諸漏結核未破者火針針使著核結中無不瘥者何謂九漏一曰狼漏二曰鼠漏三曰螻蛄漏四曰蜂漏五曰蚍蜉漏六曰蠐螬漏七曰浮沮漏八曰瘰癧漏九曰轉脈漏空青商陸散治狼漏始發於頸腫無頭有根起於缺盆之上連延耳根腫大此得之憂恚氣上不得下其根在肝一作肺空青主之商陸為之佐方空青蝟腦各二分蝟肝一具商陸獨活黃芩當歸乾薑婦人蓐草鱉甲斑蝥地膽茴香礬石各一分芎藭半分蜀椒三十粒上十六味治下篩酒服方寸匕日三服十五日服之貍骨知母散治鼠漏始發於頸無頭尾如鼷鼠使人寒熱脫肉此得之食有鼠毒不去其根在胃以貍骨主之知母為之佐方貍骨知母桂心鯪鯉甲山龜殼雄黃甘草乾薑等分上八味治下篩飲服方寸匕日三仍以蜜和納瘡中無不瘥者先灸作瘡後以藥敷之已作瘡不用灸治鼠漏方用蛇虺所吞鼠燒末服方寸匕日二不過三服此大有驗但難得耳並敷瘡中佳又方死鼠一枚中形者亂髮如雞子大一枚上二味以臘月豬脂煎令消盡膏成分作二分一分稍稍塗瘡一分稍稍酒服之瘥鼠子當從瘡中出良地黃膏治鼠漏瘡瘥復發及不愈出膿血不止方以不中水豬脂㕮咀生地黃納脂中令脂與地黃相淹和煎六七沸其瘡先用桑灰汁洗去惡汁次以地黃膏敷上日一易荏子桔梗丸治螻蛄漏始發於頸項狀如腫此得之食瓜果實毒不去其根在大腸荏子主之桔梗為之佐方荏子龍骨各半兩附子一兩蜀椒百粒桂心桔梗乾薑礬石獨活芎藭各一分上十味為末以棗二十枚合搗醋漿和丸如大豆溫漿下五丸加至十丸雄黃黃芩散治蜂漏始發於頸瘰癧三四處俱相連以潰此得之飲流水中有蜂毒不去其根在脾雄黃主之黃芩為之佐方雄黃黃芩各一兩蜂房一具茴香吳茱萸乾薑各半兩蜀椒二百粒鱉甲一枚上八味治下篩敷瘡口上日一度十日止礜石防風散治蚍蜉漏始發於頸初得之如傷寒此得之食中有蚍蜉毒不去其根在腎礜石主之防風為之佐方礜石防風知母雌黃桃白皮乾地黃獨活青黛斑蝥白芷松脂一作柏脂芍藥海藻當歸各二分白朮蝟皮各四分蜀椒百粒上十七味治下篩飲服一錢匕日三礬石白朮散治蠐螬漏始發於頸下無頭尾如棗核塊纍移在皮中使人寒熱心滿此得之喜怒哭泣其根在心礬石主之白朮為之佐方礬石白朮空青當歸各二分細辛一兩蝟皮斑蝥枸杞地膽各一分干烏腦三大豆許上十味為末以醋漿服方寸匕日三病在上側輪臥在下高枕以便藥流下地膽甘草散治浮沮漏始發於頸如兩指使人寒熱欲臥此得之憂愁思慮其根在膽地膽主之甘草為之佐方地膽雄黃乾薑續斷石決明菴䕡根龍膽草各三分甘草一分細辛二分大黃半分上十味治下篩敷瘡日四五度古今録驗無雄黃有硫黃雌黃芍藥丸治瘰癧漏始發於頸有根初苦痛令人寒熱此得之因新沐濕結髮汗流於頸所致其根在腎雌黃主之芍藥為之佐方雌黃芍藥茯苓續斷乾地黃空青礜石乾薑桔梗蜀椒恆山虎腎貍肉烏腦斑蝥礬石各一分附子一兩上十七味為末蜜丸如大豆酒服十丸日二斑蝥白芷丸治轉脈漏始發於頸濯濯脈轉苦驚惕身振寒熱此得之因驚臥失枕其根在小腸集驗作心斑蝥主之白芷為之佐方斑蝥白芷緑青大黃各二分升麻鍾乳甘草防風地膽續斷麝香礜石各一分人參當歸桂心各二分白朮麥冬各一兩上十七味為末蜜丸如大豆酒服十丸日二勿食菜慎房室百日外臺無大黃桂心麥門冬白朮鍾乳治九漏方空青商陸知母貍骨桔梗防風荏子礬石黃芩白芷芍藥甘草雌黃白朮礜石地膽斑蝥雄黃等分上十八味為末蜜丸如大豆以酢服三丸三十日知四十日愈六十日平復百日內慎房室一方為散酢服一刀圭日二服老小減半又方蝟皮半枚鯪鯉甲樗雞各四枚鶴骨六分蜥蜴蜈蚣各一枚蜀椒附子當歸蜂房桂心地榆通草乾漆牡丹皮薏苡仁蒺藜子漏蘆一作雚蘆龍膽一作龍骨土瓜各二分斑蝥四分蛇床子苦參大黃蛇蛻皮雄黃䕡茹細辛各二分上二十八味為末酒服五分匕以知為度日一服又方斑蝥七枚蝟皮真珠雄黃各一分上四味治下篩酒服半錢匕日三又方未成煉松脂填瘡孔滿日三四度七日瘥有神驗又方斑蝥二七枚雄黃桂心犀角各一兩上四味為末酒服一錢匕日二服病從小便出又方馬齒莧陰乾臘月燭燼等分上二味為末以臘月豬脂和其瘡先以暖泔清洗淨拭乾後以藥敷日三又方干牛屎幹人屎等分上二味搗先以綿幕瘡上綿上著屎蟲聞屎氣即出若癢即以綿去之更別取屎及綿著其上如前蟲盡乃止又方苦瓠四枚大如盞者各穿一孔如指大置湯中煮數沸取一竹筒長一尺一頭納瓠孔中一頭注瘡孔冷則易之治一切漏方斑蝥四十枚豉四十九枚芫青二十枚生大豆黃地膽各十枚蜈蚣一寸半犀角牛黃各棗核大上八味為末蜜丸如梧子大飲服二丸須臾多作酸漿粥冷飲之病從小便出視尿盆中如有蟲形狀又似膠汁乃病出也間日一服飲粥如常小弱者隔三四日侯無蟲出瘡漸瘥特忌油膩一切器物皆須灰洗乃作食崔氏云治九漏初服藥夜少食明旦服二丸至七日甚虛悶可煮食蔓菁菜羹其餘脂膩酸物果子之類並不得食人強隔日一服瘥後仍作二十日將息不能將息便不須服又方煮鹽花以面擁病上納鹽花面匡中厚二寸其下以桑葉三重籍鹽候冷熱得所可忍冷則無益熱則傷肉一日一度候瘰癧根株勢消則止若已作瘡者搗穄谷為末粉之又方槲背陰白皮三十斤銼碎以水一石煮取一斗去滓煎如糖又取都廁上雄雌鼠屎各十四枚燒令汁盡為末納煎中又溫酒一升投煎中合攪之羸人服半升當有蟲出又方霜下瓠花曝乾為末敷之又方搗土瓜根敷之燥則易不限時節又方死蛇去皮肉取骨為末合和封瘡上大痛以杏仁膏摩之痛止又方死蛇和臘月豬脂合燒為末納孔中又方燒死蜣螂為末醋和塗之又死蛇灰醋和敷之又方故布裹鹽如彈丸大燒令赤為末酒服之又方服白馬屎汁一升又方豬脂一升酒五合煎沸頓服之又方水研杏仁服之又方鹽面和燒灰敷之又方正月雄狐屎陰乾搗末水和服治漏作瘡孔方用露蜂房為末以臘月豬脂和敷孔中治漏發心胸以下者方松脂武都雄黃各三兩上二味和為塊刀子刮為散飲服一方寸匕日二不瘥更合治漏方煅落鐵屑狗頰車連齒骨炙虎屎鹿皮帶毛燒為灰上四味等分治下篩以豬脂和納瘡中須臾即易日五六度治一切冷瘻方用人所吐蛔蟲燒灰先用甘草湯洗去瘡惡然後著灰無不瘥慎口味治鼠瘻腫核痛未成膿者方以柏葉敷腫上熬鹽著葉上尉之令熱氣下即消治風漏及鼠漏方赤小豆白蘞黃耆牡蠣等分上四味為末酒服方寸匕日三治螻蛄瘻方先以泔清煮槲葉取汁洗瘡拭乾次以槲葉灰納瘡中治蜂瘻方論初生狀如桃而癢搔之則引大如雞子如覆手者熬鹽尉之三宿四日不瘥至百日成瘻其狀大如四五寸石廣三寸中生蜂作孔乃有數百以石硫黃隨多少燃燭燒令汁出著瘡孔中須臾間見蜂數十蜂盡乃瘥治蜂瘻方以人屎蛇蛻灰臘月豬膏和敷之又方鴉頭燒灰敷之又方取蜂窠燒灰臘月豬脂和敷孔中治蟻漏孔容針亦有三四孔者方用蝟皮肝心燒灰為末酒服一錢匕又方死蛇腹中鼠以臘月豬脂煎候焦去滓敷之又方取大鮆鮓燒耕垡土令赤以苦酒浸垡土時合壁土故熱以鮆鮓著壁土上展轉令熱敷瘡上又方鯪鯉甲二七枚燒末以豬脂和敷瘡上又方半夏一枚搗末以鴨脂和敷上治瘰癧瘻橫闊作頭狀若杏仁形亦作瘰癧方雄雞糞燒灰臘月豬脂和封之治蜣螂瘻方用牛屎燒灰臘月豬脂和敷之又方蜣螂丸即蜣螂所食之屎為末敷之又方干牛屎為末敷之癢即撥卻更厚封瘥乃止又方熱牛屎塗之數易應有蜣螂出治蚯蚓瘻方雞屎蚯蚓屎等分上二味為末用壯豬下頜髓和敷之治蠍瘻五六孔皆相通者方搗茅根汁著孔中治蝦蟆瘻方用五月五日蛇頭及野豬脂同水衣封之治蛇瘻方用蛇蛻皮燒灰臘月豬脂和封之治蛙瘻方用蛇腹中蛙燒灰封之治顛當瘻方搗土瓜根敷瘥慎口味治雀瘻方取母豬屎燒灰臘月豬脂和敷上當有蟲出如雀形治膿瘻方以桃花為末豬脂和封之治石瘻兩頭出者其狀堅實令人寒熱方以大鈹針破之次用鼠黏葉二分為末和雞子白一枚封之又方搗槐子和井花水封之又方搗生商陸根捻作餅子如錢大厚三分安漏上以艾灸餅上干易之灸三四升艾瘥外臺灸瘰癧又方七月七日日未出時取麻花五月五日取艾等分合搗作炷用灸瘡上百壯外臺灸瘰癧灸法九漏灸肩井二百壯漏灸鳩尾骨下宛宛中七十壯諸漏灸瘻周圍四畔瘥諸惡漏中冷息肉灸足內踝上各三壯二年六壯寒熱胸滿頸痛四肢不舉腋下腫上氣胸中有音喉中鳴天池主之寒熱頸頜腫後溪主之寒熱酸痟痛四肢不舉腋下腫瘻馬刀喉痹髀膝脛骨搖酸痹不仁陽輔主之寒熱頸腋下腫申脈主之胸中滿腋下腫馬刀瘻善自嚼舌頰天牖中腫寒熱胸脅腰膝外廉痛臨泣主之寒熱頸腫丘墟主之腋下腫馬刀肩腫吻傷太衝主之寒熱頸瘰癧大迎主之五白膏治鼠漏及瘰癧方白牛皮白馬屎白豬屎白羊屎白雞屎各一升漏蘆二斤上六味各於石上燒作灰研篩以豬膏一升三合煎亂髮一兩半令極沸盡消乃納諸末微火上煎五六沸藥成去瘡痂以鹽湯洗淨帛拭乾敷此膏若無痂亦須湯洗日再敷若著膏當以帛裹上勿令中風冷神驗曾青散治寒熱瘰癧及鼠瘻方曾青荏子礬石一作礜石附子各半兩栝蔞根露蜂房當歸防風芎藭黃耆黃芩貍骨甘草各二兩細辛乾薑各一兩斑蝥芫青各五枚上十七味治下篩酒服一方寸匕日再又方治寒熱瘰癧方土瓜根連翹龍膽黃連栝蔞根苦參芍藥恆山各一兩上八味為末酒服五分匕日三翼方及外臺有貍骨一枚翼一方有當歸無栝蔞恆山薔薇丸治身體有熱瘰癧及常有細瘡並口中生瘡方薔薇根三兩黃耆黃芩鼠李根皮栝蔞根芍藥苦參石龍芮防風一作防己白蘞龍膽各一兩梔子仁四兩上十二味為末蜜丸如梧子大飲服十五丸日再冀方有黃柏一兩治瘰癧方用白殭蠶治下篩水服五分匕日三服十日瘥又方貍頭一枚炙搗篩飲服方寸匕日二又方故履內氈替燒末五匕和酒一升平旦向日服之強行須臾吐鼠出三朝服又方貍頭蹄骨等炙黃搗篩為散飲服一錢匕日再又方貓兩眼陰乾燒灰井花水服方寸匕日再又方干貓舌為末敷瘡上又方狼屎灰敷之又方狐頭貍頭灰敷之又方五月五日取一切種種雜草煮取汁洗之又方貓腦莽草等分上二味為末著癧孔中灸漏方葶藶子一合豉一升上二味和搗令極熟作餅子如大錢厚二分許取一枚當瘡孔上作大艾炷如小指大灸餅上三炷一易三餅九炷隔三日復一灸外臺灸瘰癧古今録驗云不可灸頭瘡葶藶氣入腦殺人灸瘰癧方一切瘰癧在項上及觸處但有肉結凝似作瘻及癰癤者以獨頭蒜截兩頭留心大作艾炷稱蒜大小貼癧子上灸之勿令上破肉但取熱而已七壯一易蒜日日灸之取消止一切瘰癧灸兩胯里患癧處宛宛中日一壯七日止神驗又灸五里人迎各三十壯又灸耳後髮際直脈七壯又灸患人背兩邊腋下後紋上隨年壯腸癰第二論三首方二十九首灸法二首論曰卒得腸癰而不曉其病候愚醫治之錯則殺人腸癰之為病小腹重而強抑之則痛小便數似淋時時汗出復惡寒其身皮皆甲錯腹皮急如腫狀其脈數者小有膿也巢氏病源云洪數者已有膿也其脈遲緊者未有膿也甚則腹脹大轉側聞水聲或繞臍生瘡或膿從臍中出或小便出膿血問曰宮羽林婦病醫脈之何以知婦人腸中有膿為下之即愈師曰寸口脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為濁敗小腹痞堅小便或澀或復汗出或復惡寒膿為已成設脈遲緊即為瘀血血下則愈大黃牡丹湯大黃四兩牡丹三兩芒硝二兩瓜子一升桃仁五十粒上五味㕮咀以水五升煮取一升頓服當下膿血金匱方用牡丹一兩瓜子半升芒硝二合刪繁方用瓜子半升芒硝半合劉涓子用硝石三合云腸癰之病小腹痞堅或在膀胱左右其色或白堅大如掌熱小便欲調時自汗出其脈遲堅者未成膿可下之當有血脈數膿成不復可下肘後名瓜子湯腸癰湯方牡丹甘草敗醬生薑茯苓各二兩桔梗薏苡仁麥門冬各三兩丹參芍藥各四兩生地黃五兩上十一味㕮咀以水一斗煮取三升分三服日三又方薏苡仁一升牡丹桃仁各三兩瓜瓣二升上四味㕮咀以水六升煮取二升分二服姚氏不用桃仁用李仁崔氏有芒硝二兩云腹中㽲痛煩滿不安或脹滿不下飲食小便澀此病多是腸癰人多不識婦人産後虛熱者多是此證縱非癰疽但是便服此方無傷損也凡腸癰其狀兩耳輪紋理甲錯初患腹中苦痛或繞臍有瘡如粟皮熱便膿血出似赤白下不治必死方以馬蹄灰雞子白和塗即拔毒氣不過再塗瘥又方以瓜子三升搗末水三升煮取一升半分三服又方以馬牙燒灰雞子和塗干即易灸腸癰方屈兩肘正灸肘頭鋭骨各百壯則下膿血即瘥論曰産後宜勤擠乳不宜令汁蓄積蓄積不去便結不復出惡汁於內引熱溫壯結堅牽掣痛大渴引飲乳急痛手不得近成妒乳非癰也急灸兩手魚際各二十七壯斷癰脈也不復惡手近乳汁亦自出便可手助迮捋之則乳汁大出皆如膿狀內服連翹湯外以小豆薄塗之便瘥婦人女子乳頭生小淺熱瘡搔之黃汁出浸淫為長百種治不瘥者動經年月名為妒乳婦人飲兒者乳皆欲斷世謂苟抄乳是也宜以赤龍皮湯及天麻湯洗之敷二物飛烏膏及飛烏散佳若始作者可敷黃芩漏蘆散及黃連胡粉散並佳赤龍皮湯方槲皮切三升以水一斗煮取五升夏冷用之冬溫用之分洗乳亦洗諸敗爛久瘡洗竟敷膏散天麻湯方用天麻草切五升以水一斗半煮取一斗隨寒熱分洗乳以殺癢也此草葉如麻冬生夏著花赤如鼠尾花也亦洗浸淫黃爛熱瘡癢疽濕陰蝕小兒頭瘡洗竟敷膏散飛烏膏方傾粉是燒硃砂作水銀上黑煙是也一作湘粉礬石各三兩上二味為末以甲煎和如脂敷乳瘡日三敷之作散者不須和汁自著者可用散其諸熱瘡黃爛瘡浸淫汁癢丈夫陰蝕癢濕瘡小兒頭瘡月蝕口邊肥瘡瘑瘡等並皆主之黃連胡粉散黃連二兩胡粉二兩半水銀一兩上三味為末相和軟皮果熟搜之自能和合縱不得成一家亦得水銀細散入粉中也以敷乳瘡諸濕瘡黃爛肥瘡等若干著甲煎為膏治妒乳乳生瘡方蜂房豬甲中土車轍中土各等分上三味為末苦酒和敷之鹿角散治婦人乳生瘡頭汁出疼痛不可忍者方鹿角二分甘草一分上二味治下篩和以雞子黃於銅器中置溫處炙上敷之日再即愈治妒乳方以葵莖灰搗篩飲服方寸匕日三即愈集驗方直搗為散不為灰又方燒自死蛇為灰以豬脂和塗大良灸法以蒲橫度口以度從乳上行灸度頭二七壯論曰産後不自飲兒並失兒無兒飲乳乳蓄結癰不飲兒令乳上腫者以雞子白和小豆散敷乳房令消結也若飲兒不泄者數捻去之亦可令大孩子含水使口中冷為嗍取滯乳汁吐去之不含水漱去熱喜令乳頭作瘡乳孔塞也凡婦人多患乳癰年四十以下治之多瘥年五十以上慎勿治治之多死不治自得終天年連翹湯治妒乳乳癰方連翹芒硝各二兩芍藥射干升麻防已杏仁黃芩大黃柴胡甘草各三兩上十一味㕮咀以水九升煮取二升五合分三服治乳癰方麥門冬一升黃芩芍藥茯苓各二兩桑寄生人參黃耆防風甘草各三兩飴糖八兩大棗五枚上十一味㕮咀以水一斗煮取三升去滓納糖一沸分四服又方先服前湯五日後服此丸即愈方天門冬五兩澤蘭五分大黃十分升麻六分羌活桑寄生防風人參黃耆乾地黃白芷通草各二分黃芩枳實五味子茯神天雄芎藭當歸各一分上十九味為末蜜丸酒服二十丸日二加至四十丸治乳癰始作方廣濟方云治乳癰大堅硬赤紫色衣不得近痛不可忍者大黃楝實芍藥馬蹄各等分上四味治下篩飲服方寸匕取汁出瘥廣濟方云酒服方寸匕覆取汗當睡著覺後腫處散而不痛經宿乃消又方黃芩白蘞芍藥等分上三味為末以漿水飲服半錢匕日三若左乳汁結者即捋去右乳汁若右乳汁結者可捋去左乳汁小品云治妒乳又方鹿角治下篩以豬脂上清汁服方寸匕不過再服亦可醋漿水服蒺藜丸治婦人乳腫痛除熱方蒺藜子大黃各一兩敗醬一分薏苡仁桂心人參附子黃耆黃連雞骨當歸芍藥枳實通草各三分上十四味為末蜜丸和梧子大未食飲服三丸不知益至五丸日三無所忌一方無大黃敗醬黃連通草為散酒服方寸匕排膿散治乳癰除惡肉方蓯蓉鐵精桂心細辛黃芩芍藥人參防己一作防風當歸芎藭乾薑各二分甘草五分上十二味治下篩酒服方寸匕日三夜一服藥十日膿血出多勿怪又方生地黃三升芒硝三合豉一升上三味合搗敷上熱即易之取瘥止一切乳癰皆用之一方單用地黃敷之治乳癰方大黃鼠屎新者各一分黃連二分上三味為末以黍米粥清和敷乳四圍痛止即愈無黍米即粟米粳米亦可又方大黃莽草生薑各二分伏龍肝十二分上四味搗為末以酢和塗乳痛即止又方取蔥白搗敷之並絞汁一升頓服即愈治乳癰二三百日衆療不瘥但堅紫色青柳根尉方以柳根削取上皮搗令熟熬令溫盛著練囊中尉乳上干則易之一宿即愈治妒乳乳癰腫方取研米槌二枚炙令熱以絮及故帛㩉乳上以槌更互尉之瘥止已用立效治乳癰堅方以水罐中盛醋泔清燒石令熱納中沸止更燒如前少熱納乳漬之及冷更燒石納漬不過三度燒石愈五痔第三論一首方二十六首灸法二首論曰夫五痔者一曰牡痔二曰牝痔三曰脈痔四曰腸痔五曰血痔牡痔者肛邊如鼠乳時時潰膿血出牝痔者肛腫痛生瘡脈痔者肛邊有瘡癢痛腸痔者肛邊核痛發寒熱血痔者大便清血隨大便汙衣又五痔有氣痔寒溫勞濕即發蛇蛻皮主之牡痔生肉如鼠乳在孔中頗出見外妨於更衣鱉甲主之牝痔集驗作酒痔從孔中起外腫五六日自潰出膿血蝟皮主之腸痔更衣挺出久乃縮母豬左足懸蹄甲主之脈痔更衣出清血蜂房主之五藥皆下篩等分隨其病倍其主藥為三分旦以井花水服半方寸匕病甚者旦暮服之亦可四五服禁寒冷食豬肉生魚菜房室唯食乾白肉病瘥之後百日乃可通房內又用藥導下部有瘡納藥瘡中無瘡納孔中又用野葛燒末刀圭納藥中服藥五日知二十日若三十日愈痔痛通忌蓴菜治五痔衆醫所不能愈者方秦艽白芷厚朴紫參亂髮紫菀各一兩雷丸藁本各二兩石南䗪蟲各半兩貫衆虻蟲各八兩豬後懸蹄十四枚上十三味合搗下篩以羊髓脂煎和丸如梧子大空腹飲下十五丸日二若劇者夜一服四日肛邊癢止八日膿血盡鼠乳悉瘥滿六十日終身不復發久服益善忌魚豬肉等槐子丸治燥濕痔痔有雄雌皆主之方槐子乾漆秦艽吳茱萸根白皮各四兩白芷桂心黃芩黃耆白蘞牡蠣龍骨雷丸丁香木香蒺藜子附子各二兩上十六味為末蜜丸如梧子大飲服二十丸日三千金翼無白蘞深師無黃耆云治苦暴有乾燥腫痛者有崩血無數者有鼠乳附核者有腸中煩癢者三五年皆殺人主忌飲酒及作勞犯之即發小槐實丸治五痔十年者方槐子三斤白糖二斤礬石硫黃各一斤大黃乾漆龍骨各十兩上七味以四味搗篩其二種石細切及糖納銅器中一石米下蒸之以綿絞取汁以和藥末並手丸如梧子大陰乾酒服二十丸日三稍增至三十丸槐子酒治同前槐子二斗槐東南枝細銼一石槐東南根細銼三石上三味納大釜中以十六斛水煮取五斛澄取清更煎取一石六斗炊兩斛黍米上曲二十斤釀之攪冷調封泥七日酒熟取清飲適性常令小小醉合時更取滓煮取汁淘米及洗器不得用水忌生水故也又方塗熊膽取瘥止神良一切方皆不及此又方七月七日多采槐子熟搗取汁納銅器中重綿密蓋著宅中高門上曝二十日以上煎成如鼠屎大納穀道中日三亦主瘻及百種瘡又方取生槐白皮十兩熟搗丸如彈丸綿裹納下部中此病宜常食扁竹葉及煮羹粥大佳又方取鯉魚腸三具以火炙令香綿裹納穀道一食久蟲當出食魚腸數數易之盡三具瘥一方炙腸令香坐上蟲出經用有效又方虎頭犀角上二味為末和不中水豬脂大如雞子塗瘡上取瘥治五痔及脫肛方槐白皮二兩豬脂半斤漆子十枚桃仁十枚巴豆七粒薰草一作薰黃辛夷白芷甘草各半兩野葛六銖上十味㕮咀煎三上三下去滓以綿沾膏塞孔中日四五過蟲死瘥止癢痛大佳治五痔方蝟皮方三指大切熏黃如棗大末熟艾如雞子大上三味穿地作孔調和取便熏之口中熏黃煙氣出為佳火氣消盡即停停三日將息更熏之凡三度永瘥勿犯風冷羹臛將補慎豬雞等又方取槐根煮洗之又方用桃根煮洗之治五痔方散瘀祛毒蝟皮三味熏痔透毒槐根取其化䘌桃根取其散血皆外治法也蝟皮丸治痔方亦治漏蝟皮一具礬石當歸連翹乾薑附子續斷黃耆各二兩槐子三兩乾地黃五兩上十味為末蜜丸如梧子大飲服十五丸日再加至四十丸集驗方無礬石地黃又方治崩中及痔方蝟皮人參茯苓白芷禹餘糧乾地黃槐耳續斷各三兩蒲黃黃耆當歸艾葉橘皮白蘞甘草各二兩白馬蹄酒浸一宿熬黃牛角䚡各四兩鰻鱺魚頭二十枚豬懸蹄甲二十一枚熬上十九味為末蜜丸如梧子大酒服二十丸日再稍加治痔方槐耳赤雞一斤即槐檽為末飲服方寸匕日三又方蒲黃水服方寸匕日三外臺云治腸痔每大便常有血者又方桑耳作羹空腹飽食之三日食佳治痔下血及新産漏下方附子礬石各一兩上二味為末白蜜丸如梧子大酒服二丸日三稍加不過數日便斷百日服之終身不發崔氏方有乾薑一兩治外痔方亦治惡瘡瘑瘡真珠雄黃雌黃各一兩竹茹三兩豬膏一斤上五味為末納豬膏中和調又切亂髮半雞子大和東向煎三上三下發焦出其痔先用鹽湯洗拭乾後敷之治痔下部出膿血有蟲旁生孔竅方以槐白皮一擔銼納釜中煮令味極出置大盆中適寒溫坐其中如浴狀蟲悉出冷又易之不過二三度瘥治穀道癢痛繞緣腫起里許欲生肉突出方大豆三升以水七升急火煮取四升槐白皮三升甘草三兩上三味以豆汁煮取二升浸故帛敷之冷則易日三五度槐皮膏治穀道癢痛痔瘡方槐皮楝實各五兩外臺作塵豉白芷二兩當歸三兩桃仁六十一枚甘草一兩刪繁作蜂房赤小豆二合上七味㕮咀以成煎豬膏一斤微火煎白芷色黃膏成取摩瘡上日再並導下部刪繁無當歸治腎勞虛或酒醉當風所損腎臟病所為肛門腫生瘡因酒勞傷發瀉清血肛門疼痛蜂房膏治穀道痛方菟絲子熬黃黑和雞子黃敷之日二度又方杏仁熬令黃搗作脂敷之治大便孔卒痛如鳥啄方大小豆各一斗和搗納二袋中蒸令極熱更互坐之瘥灸法久冷五痔便血灸脊中百壯五痔便血失屎灸回氣百壯穴在脊窮骨上疥癬第四論二首方六十七首灸法四首論曰凡瘡疥小秦艽散中加烏蛇肉二兩主之黃耆酒中加烏蛇脯一尺亦大效千金翼云黃耆酒中加烏蛇脯一尺烏頭附子茵芋石南莽草各等分大秦艽散中加之亦大效小小疥瘙十六味小秦艽散亦相當黃耆酒見前七卷中凡諸疥瘙皆用水銀豬脂研令極細塗之治凡有瘡疥腰胯手足皆生疵疥者方栝蔞根四兩薔薇根雀李根皮黃連黃柏芍藥各三兩黃耆黃芩當歸苦參石龍芮各二兩大黃續斷各一兩上十三味為末蜜丸如梧子大以薔薇飲服二十丸日三加至三十丸瘥乃止若干疥白癬勿服千金翼云癰疽皆可服之治寒熱瘡及風疥諸雜瘡方韭根礬石雄黃藜蘆瓜蒂胡粉各一分水銀三分上七味以柳木研水銀使盡用豬脂一升煮藜蘆韭根瓜蒂三沸去滓納諸藥和調令相得即成以敷之神良救急方以此用治癬瘡䕡茹膏治一切惡瘡疥癬疽漏瘑方䕡茹狼牙青葙地榆藜蘆當歸萹蓄羊蹄根各二兩蛇床子白蘞各六分漏蘆二分上十一味搗以苦酒漬一宿明旦以成煎豬膏四升煎之三上三下膏成絞去滓納後藥如下雄黃雌黃硫黃礬石胡粉松脂各二兩水銀三兩上七味細研看水銀散盡即傾前膏中以箸十隻攪數百遍止用瓷器密貯勿令泄氣煎膏法取微火熬急則不中用敷藥不可近眼及陰先研雄黃等令細俟膏小冷即和攪敷之治疥疽諸瘡方水銀胡粉各六兩黃連黃柏各八分薑黃十分礬石附子蛇床子苦參各三分上九味水銀胡粉別研如泥余為末以成煎豬膏合和研令調敷之翼方無薑黃治久疥癬方丹砂雄黃雌黃劉涓子無亂髮洗淨松脂白蜜各一兩䕡茹三兩豬脂二升巴豆十四枚上九味先煎發令消盡納松脂白蜜三上三下去滓納諸末更一沸止敷之翼方用蠟不用蜜又方水銀礬石一作礜石黃連一作雄黃蛇床子各一兩上四味為末以豬脂七合和攪不見水銀為熟敷之一方加藜蘆一兩又云䕡茹治諸瘡疥癬久不瘥者方水銀一斤臘月豬脂五升上二味以鐵器中壘灶用馬通火七日七夜勿住火出之停冷取膏去水銀不妨別用以膏敷一切瘡無不應手立瘥千金翼用水銀粉和豬脂塗之又方特牛尿羊蹄根各五升上二味以牛尿漬羊蹄根一宿日曝乾復納尿中取盡止作末敷諸瘡千金翼云和豬脂用更精又方拔取生烏頭十枚切煮汁洗之瘥論曰凡諸瘡癬初生時或始痛癢即以種種單方救之或嚼鹽塗之又以谷汁敷之又以蒜墨和敷之翼方以蒜作酥又以薑黃敷之又以鯉魚鮓摻敷之又以牛李子汁敷之若以此救不瘥乃以前諸大方治之治細癬方蛇床子白鹽一作白堊羊蹄根各一升赤葛根苦參菖蒲各半斤黃連莽草各三兩上八味㕮咀以水七升煮取三升適寒溫洗身如炊一石米頃為佳澄清後當微溫用之滿三日止又方以羊蹄根於石上苦酒磨敷之欲敷先刮瘡以火炙乾後敷四五遍翼方云搗羊蹄根著瓷器中以白蜜和臨用先刮瘡令傷敷之如炊一石米又拭去更以三年大醋和塗之若瘡處不傷即不瘥又方羊蹄根五升以桑柴灰汁煮四五沸以洗之凡方中用羊蹄根皆以日未出時採之佳又方菖蒲末五斤以酒五升漬釜中蒸之使味出先絶酒一日每服一升或半升又方干荊子燒中央以器承兩頭取汁刮瘡令傷塗之治癬方取煎餅熱拓不限多少日一遍良亦治浸淫瘡又方淨洗瘡取醬瓣雀屎和敷之瘥止翼方云取醬和尿塗之又方水銀蕪荑和酥敷之又方日中午搗桃葉汁敷之又方搗刺薊汁敷並服之又方燒蛇蛻一具酒調服之又方服地黃汁佳又方服驢尿良又方搗羊蹄根和乳塗之又方醋煮艾塗之又方搗莨菪根蜜和敷之翼方無根字治濕癬肥瘡方用大麻𣿉敷之五日瘥治癬久不瘥者方取自死蛇燒作灰以豬脂和塗即瘥治小兒癬方以蛇床子搗末豬脂和敷之治瘙癢方以水銀和胡粉敷之治身體瘙癢白如癬狀者方楮子三枚豬胰一具鹽一升礬石一兩上四味以苦酒一升合搗令熟拭身日三治癧易方以三年醋磨烏賊骨先以布摩肉令赤敷之又方醋磨硫黃塗上集驗方磨硫黃附子使熟將臥以布拭病上乃以藥敷之又方取蜣螂搗爛塗之當揩令熱封上一宿瘥又方白蘞薰陸香上二味為末揩上井水服之又方硫黃雌黃槲皮燒等分蛇蛻一具上四味搗篩以清漆合和薄塗白處欲塗時先以巴豆半截拭白處皮微破然後敷之不過三兩度又方硫黃水銀礬石灶墨等分上四味搗末納坩子中以蔥涕和研臨臥敷病上九江散治白癜風及二百六十種大風方當歸七分石南六分附子躑躅秦艽菊花乾薑防風雄黃丹砂麝香斑蝥各十六分蜀椒連翹鬼箭羽各一分石長生知母各八分鬼臼十一分人參王不留行石斛天雄烏頭獨活防己莽草各十二分水蛭百枚蜈蚣三枚虻蟲地膽各十枚上三十味諸蟲皆去足翹熬炙令熟為散酒服方寸匕日再其病入發令發白服之百日愈發還黑又方天雄白蘞黃芩各三兩乾薑四兩附子一兩商陸躑躅各一升上七味治下篩酒服五分匕日三又方酒服生胡麻油一合日三稍稍加至五合慎生冷豬雞魚蒜等百日服五斗瘥治白癜方礬石硫黃等分上二味為末醋和敷之又方平旦以手掉取韭頭上露塗之極效又方取羅摩草煮汁拭之亦揩令傷擲白汁塗之又方石灰松脂酒主之方見卷末又方以蛇蛻皮熬摩數百過棄置草中又方樹空中水洗桂末唾和塗之日三又方以水銀數數拭之令熱即消瘥乃止治凡身諸處白駁漸漸長似癬不瘥方取鰻鱺魚脂塗之先揩病上使痛然後塗之又方灸左右手中指節去延外宛中三壯未瘥報之治皮中紫赤疵痣去靨穢方乾漆雌黃礬石各三兩雄黃五兩巴豆十五枚炭皮二斤上六味治下篩雞子白和塗故帛貼病上日二易治赤疵方用京墨大蒜鱔血合塗之治贅疵痣方雄黃硫黃真珠礬石巴豆䕡茹藜蘆各一兩上七味治下篩以真漆合和如泥以塗點病上須成瘡及去面䵟皮中紫不耐漆人不得用以雞子白和之去疣目方松柏脂合和塗之一宿失矣又方以石硫黃揩六七遍又方以杏仁燒令黑研膏塗上又方以豬脂癢處揩之令少許血出即瘥又方苦酒漬石灰六七日滴取汁點疣上小作疣即落又方取牛口中涎數塗自落又方著艾炷疣目上灸之三壯即除惡疾大風第五論一首方十首論曰惡疾大風有多種不同初得雖遍體無異而眉發已落有遍體已壞而眉須儼然有諸處不異好人而四肢腹背有頑處重者手足十指已有墮落有患大寒而重衣不暖有尋常患熱不能暫涼有身體枯槁者有津汁常不止者有身體干癢徹骨搔之白皮如麩手下作瘡者外臺作卒不作瘡有瘡痍荼毒重疊而生晝夜苦痛不已者有直置頑鈍不知痛癢者其色亦有多種有青黃赤白黑光明枯暗此候雖種種狀貌不同而難療易療皆在前人不由醫者何則此病一著無問賢愚皆難與語何則口順心違不受醫教直希望藥力不能求已故難療易療屬在前人不關醫藥豫嘗手療六百餘人瘥者十分有一莫不一一親自撫養所以深細諳委之姑與其語覺難與語不受入即不須與療終有觸損病既不瘥乃勞而無功也又神仙傳有數十人皆因惡疾而致仙道何者皆由割棄塵纍懷穎陽之風所以非止瘥病乃因禍而取福故余所睹病者其中頗有士大夫乃至有異種名人及遇斯患皆愛戀妻孥繫著心髓不能割捨直望藥力未肯近求諸身若能絶其嗜欲斷其所好非但愈疾因茲亦可自致神仙余嘗問諸病人皆云自作不仁之行久久併為極猥之業於中仍欲更作云為雖有悔言而無悔心但能自新受師教命食進藥餌何有不除余以貞觀年中將一病士入山教服松脂服至百日鬚眉皆生由此觀之唯須求之於己不可一仰醫藥者也然有人數年患身體頑痹羞見妻子不告之令知其後病成狀貌分明乃云犯藥卒患此皆自誤然斯疾雖大療之於微亦可即瘥此疾一得遠者不過十年皆死近者五六歲而亡然病者自謂百年不死深可悲悼一遇斯疾即須斷鹽常進松脂一切公私物務釋然皆棄猶如脫屐凡百口味皆須斷除漸漸斷谷不交俗事絶乎慶弔幽隱岩谷周年乃瘥瘥後終身慎房事犯之還發茲疾有吉凶二義得之修善即吉若還同俗類必是凶矣今略述其由致以示後之學者可覽而思焉菵豆治惡疾方用細粒烏豆擇取摩之皮不落者取三月四月天雄烏頭苗及根淨去土勿洗搗絞取汁漬豆一宿漉去曝乾如此七番始堪服初服三枚漸加至六七枚日一服禁房室豬魚雞蒜畢身毛髮即生犯藥不瘥岐伯神聖散治萬病癰疽癩疹癬風痿骨肉疽敗百節痛眉毛髮落身體淫淫躍躍痛癢目痛眥爛耳聾齒齲痔瘻方天雄附子茵芋外臺作菵草躑躅細辛烏頭石南乾薑各一兩蜀椒防風菖蒲各二兩白朮獨活各三兩上十三味治下篩酒服方寸匕日三勿增之狼毒散治惡疾方狼毒秦艽等分上二味治下篩酒服方寸匕日三服五十日愈又方煉松脂投冷水中二十遍蜜丸服二丸遇飢即服之日三鼻柱斷離者二百日服之瘥斷鹽及雜食房室又以天門冬酒服百日愈石灰酒主生毛髮鬚眉去大風方石灰一石水拌濕蒸令氣足松脂成煉十斤為末上曲一斗二升黍米一石上四味先於大鍋中炒石灰以木札著灰中火出為度以枸杞根銼五斗水一石五斗煮取九斗去滓以淋石灰三遍澄清以石灰汁和漬曲用汁多少一如釀酒法訖封四七日開服常令酒氣相及為度百無所忌不得觸風其米泔及飯糟一事以上不得使人畜犬鼠食之皆令深埋卻此酒九月作二月止恐膈上熱者服後進冷飯三五口壓之婦人不能飲食黃瘦積年及蓐風不過一石即瘥其松脂末初酘釀酒攤飯時均散著飯上待飯冷乃投之此酒飯宜冷不爾即醋宜知之治大風眉發落赤白癩病八風十二痹筋急肢節緩弱飛尸遁注水腫癰疽疥癬惡瘡腳攣手摺眼暗洞泄痰飲宿澼寒冷方曲二十五斤商陸根二十五斤馬耳切之上二味合於甕中水一斛漬之炊黍米一石釀如家法使曲米相淹三酘畢密封三七日開視曲浮酒熟澄清溫服三升輕者二升藥發吐下為佳宜食軟煮飯牛羊鹿肉羹禁生冷醋滑及豬犬雞魚等治風身體如蟲行方用鹽一斗水一石煎減半澄清溫洗浴三四遍並療一切風又方以淳灰汁洗面不過一月又方以大豆漬飯漿水旦旦溫洗面洗頭髮不淨加少面勿以水濯之不過十度又方成煉雄黃松脂等分蜜和丸如梧子大飲下十丸日三服百日愈慎酒肉鹽豉等
