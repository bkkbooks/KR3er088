body:
  text: 卷十六胃腑方凡十類胃腑脈論第一論一首論曰胃腑者主脾也口唇者是其候也脾合氣於胃胃者水穀之腑也號倉庫守內嗇吏重二斤十四兩迂曲屈伸長二尺六寸大一尺五寸徑五寸受水穀三斗五升其中當留谷二斗水一斗五升廣胲大頸張胸五穀乃容而滿上焦泄氣出其精微剽悍滑疾下焦下溉泄諸小腸此腸胃所受水穀之數也平人則不然胃滿則腸虛腸滿則胃虛更滿更虛氣得上下五臟安定血脈和利精神乃居故神者水穀精氣也五臟不足調於胃故腸胃之中當留谷二斗四升水一斗一升故人一日再至後甲乙作圊後二升半一日中五升七日五七三斗五升而留水穀盡故平人不飲不食七日而死者水穀精氣津液皆盡故七日而死矣右手關上陽絶者無胃脈也若吞酸頭痛胃中有冷刺足太陰治陰在足大趾本節後一寸右手關上陽實者胃實也若腸中伏伏一作幅幅不思食得食不能消刺足陽明治陽在足上動脈脈浮而芤浮則為陽芤則為陰浮芤相搏胃氣生熱其陽則絶趺陽脈浮大者此胃家微虛煩圊必日再行動作頭痛重熱氣朝者屬胃胃脈搏堅而長其色赤當病折髀其軟而散者當病食痹髀痛病先發於胃脹滿五日之腎少腹腰脊痛脛酸三日之膀胱背膂筋痛小便閉五日上之心脾心痛閉塞不通身痛體重靈樞云上之心三日不已死冬夜半後夏日昳胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通飲食不下下取三里飲食不下膈塞不通邪在胃脘在上脘則抑而刺之在下脘則散而去之胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難胃瘧令人旦病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血胃中有癖食冷物者痛不能食食熱則能食脾前受病移於胃脾咳不已嘔吐長蟲厥氣客於胃則夢飲食診得胃脈病形何如曰胃脈實則脹虛則泄脾應肉䐃肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱其身者胃下胃下者脘約肉䐃不堅者胃緩肉䐃無小果纍標緊者胃急肉䐃多小果纍者胃結胃結者胃上脘約不利扁鵲云足太陰與陽明為表裡脾胃若病實則傷熱熱則引水漿常渴虛則傷寒寒則苦飢常痛發於風水其根在胃先從四肢起腹滿大通身腫方見治水篇中胃絶不治五日死何以知之舌腫溺血大便赤泄足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起胃下口循腹裡下至氣街中而合以下髀關抵伏兔下膝入臏中下循胻外廉下足跗入中趾內間其支者下膝三寸而別以下入中趾外間其支者別跗上入大趾間出其端也是動則病悽悽振寒善伸數缺顏黑病至䛩人與火聞木音則惕然而驚心動欲獨閉戶牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇緊頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中趾不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿盛者則人迎大三倍於寸口虛者則人迎反小於寸口也胃虛實第二脈二首方三首灸法一首胃實熱右手關上脈陽實者足陽明經也病苦頭痛脈經作腹中堅痛而熱汗不出如溫瘧唇口乾善噦乳癰缺盆腋下腫痛名曰胃實熱也瀉胃熱湯方梔子仁射干升麻茯苓各二兩芍藥四兩白朮五兩赤蜜生地汁各一升上八味㕮咀以水七升煮取一升半去滓下地黃汁煮兩沸次下蜜煮取三升分三服老少以意加減胃中熱病灸三里三十壯穴在膝下三寸胃虛冷右手關上脈陽虛者足陽明經也病苦脛寒不得臥惡風寒灑灑目急腹痛虛鳴外臺作耳虛鳴時寒時熱唇口乾面目浮腫名曰胃虛冷也補胃湯治少氣口苦身體無澤方柏子仁防風細辛桂心橘皮各二兩川芎吳茱萸人參各三兩甘草一兩上九味㕮咀以水一斗煮取三升分為三服人參散補胃虛寒身枯絶諸骨節皆痛方人參甘草細辛各六分麥冬桂心當歸各七分乾薑二兩遠志一兩吳茱萸二分川椒三分上十味治下篩食後溫酒服方寸匕喉嚨論第三論一首論曰喉嚨者脾胃之候也重十二兩長一尺二寸廣二寸其層圍十二重應十二時主通利水穀之道往來神氣若臟熱喉則腫塞氣不通烏翣膏主之方見第六卷中若腑寒喉則耿耿如物常欲窒癢痹涎唾母姜酒主之方見第六卷中熱則開之寒則通之不熱不寒依臟調之反胃第四脈二首方十三首灸法三首寸緊尺澀其人胸滿不能食而吐吐止者為下之故不能食設言未止者此為胃反故尺為之微澀趺陽脈浮而澀浮即為虛澀即傷脾脾傷即不磨朝食暮吐暮食朝吐宿穀不化名為胃反趺陽脈緊而澀其病難治治胃虛反食下喉便吐方人參一兩澤瀉甘草桂心各二兩橘皮乾薑各三兩茯苓四兩竹茹五兩大黃六兩上九味㕮咀以水八升煮取三升一服七合日三夜一已利者去大黃治胃反吐逆不消食吐不止方人參桂心澤瀉各二兩茯苓四兩橘皮甘草黃耆各三兩大黃一兩半生薑八兩半夏一升麥冬三升上十一味㕮咀以水一斗二升煮取三升二合一服八合日三夜一羸人六合已利去大黃治反胃而渴方茯苓澤瀉半夏各四兩桂心甘草各二兩上五味㕮咀以水五升煮取二升分三服一方入生薑四兩治胃反朝食暮吐食訖腹中刺痛此由久冷方橘皮三兩甘草厚朴茯苓桂心細辛杏仁竹皮各二兩檳榔十枚前胡八兩人參一兩生薑五兩上十二味㕮咀以水一斗三升煮取三升分為三服一方有甘皮二兩又方橘皮三兩人參白朮各二兩桂心一兩川椒一百二十枚薤白一握上六味㕮咀以水二升漬一宿納羊肚中縫合以三升水煮水盡出之決破去滓分三服又反胃大驗方前胡生薑各四兩橘皮三兩阿膠一兩大麻仁五合桂心三寸甘草五寸吳茱萸四合大棗十枚上九味㕮咀以水三升酒二升煮取一升七合分三服華他治胃反為病朝食暮吐心下堅如杯升往來寒熱吐逆不下食此為關上寒澼所作將成肺痿治之之方真珠丹砂雄黃各三兩朴硝五兩乾薑十纍上五味為末蜜和丸如梧子大先食服三丸若小煩者飲水自解然無所忌神良無比一方用桂心一兩治胃反食即吐方搗粟米作面水和作丸楮子大七枚爛煮納醋中細細吞之即下便已面亦得用之大半夏湯治胃反不受食食已即嘔吐方半夏三升白朮白蜜各一升人參二兩生薑三兩上五味㕮咀用水五升和蜜揚之二三百下煮取一升半分三服治胃反食即吐出上氣方蘆根茅根各二兩切細上二味以水四升煮取二升頓服之得下良又方飲白馬尿即止又方燒雞肶胵灰酒服男雄女雌又方淘小芥子曝乾為末酒服方寸匕日三灸法灸兩乳下各一寸以瘥為度又臍上一寸灸二十壯又灸內踝下三趾稍斜向前有穴三壯外臺祕要云三趾作一趾也治醋咽方曲末一斤地黃三斤上二味合搗日乾酒服三方寸匕日三治噫醋咽方吳茱萸半斤生薑三兩人參二兩大棗十二枚上四味㕮咀以水六升煮取二升先食服一升日再治中散食後吐酸水方乾薑食茱萸各二兩上二味治下篩酒服方寸匕日二胃冷服之驗嘔吐噦逆第五論一首脈一首方二十四首灸法十五首夫吐家脈來形狀如新臥起陽緊陰數其人食已即吐陽浮而數亦為吐寸口脈緊而芤緊即為寒芤即為虛寒虛相搏脈為陰結而遲其人即噎關上數其人則吐趺陽脈微而澀微即下利澀即吐逆谷不得入趺陽脈浮者胃氣虛也寒氣在上憂氣在下二氣並爭但出不入其人即嘔而不能食恐怖如死寬緩即瘥嘔而脈弱小便復利身有微熱見厥難治論曰凡服湯嘔逆不入腹者先以甘草三兩水三升煮取二升服之得吐但服之不吐益佳消息定然後服余湯即流利更不吐也凡嘔者多食生薑此是嘔家聖藥半夏湯治逆氣心中煩悶氣滿嘔吐氣上方一名小茯苓湯半夏一升生薑一斤茯苓桂心各五兩上四味㕮咀以水八升煮取二升半分三服若少氣加甘草二兩小半夏加茯苓湯治諸嘔噦心下堅痞膈間有水痰眩悸方見後十八卷大腸腑痰飲門前胡湯治寒熱嘔逆少氣心下堅聚膨脝滿不得食寒熱消渴補不足方前胡生薑各二兩甘草朴硝湯成下大黃別浸各三兩茯苓半夏麥冬當歸芍藥滑石石膏栝蔞根黃芩附子人參各一兩上十六味㕮咀以水一斗二升煮取六升分四服治嘔吐四肢痹冷上氣腹熱三焦不調方前胡川芎甘草當歸石膏人參桂心橘皮各二兩芍藥三兩半夏四兩生薑五兩大棗三十枚上十二味㕮咀以水一斗三升下黃芩三兩合煮取三升分三服一方不用黃芩小麥湯治嘔吐不止方小麥一升人參厚朴各四兩茯苓三兩甘草一兩青竹茹二兩薑汁三合上七味㕮咀以水八升煮取三升去滓分三服豬苓散治嘔而膈上寒方豬苓茯苓白朮各三兩上三味治下篩以飲服方寸匕日三渴者多飲水犀角人參飲子治嘔逆胃氣虛邪風熱不下食並皆治之方犀角人參各三兩薤白五兩粟米一合上四味㕮咀以水五升煮至二升下米煮令米熟分四服相去人行七里久進一服治嘔噦方人參一兩大麻子八合一作胡麻仁橘皮一分枇杷葉八兩上四味㕮咀以水一斗煮枇杷葉取五升下藥煮取三升納麻仁稍飲之治氣厥嘔噦不得息方豉一升半夏八兩生薑二兩人參前胡桂心甘草各一兩上七味㕮咀以水九升煮取三升分為三服又方豉一升橘皮二兩生薑甘草各一兩附子一枚大棗十五枚上六味㕮咀以水九升煮取三升分為三服日三橘皮湯治乾嘔噦若手足厥冷者方橘皮四兩生薑半斤上二味㕮咀以水七升煮取三升分三服不止更合服之半夏乾薑散治乾嘔吐逆吐涎沫者方半夏乾薑等分上二味為散取方寸匕漿水一升半煮取七合頓溫服之日三大黃甘草湯治食已即吐方大黃四兩甘草二兩上二味㕮咀以水三升煮取一升半分再服治春夏時行傷寒寒傷於胃胃冷變啘方橘皮桂心葛根各二兩白茅根一升上四味㕮咀以水六升煮取三升分三服數進服盡更合有熱去桂治傷寒後噦乾嘔不下食方生蘆根青竹茹各一升粳米三合生薑一兩上四味㕮咀以水五升煮取二升分三服不止服三劑又方蘆根切一升橘皮通草各三兩粳米三合上四味㕮咀以水四升煮取一升半分三服治病人乾嘔方取羊乳汁飲一杯治噦方煮豉三升飲汁佳又方空腹服薑汁一升又方煮蘆根濃汁飲之治噁心方苦瓠穰並子一升碎以酒水三升煮取一升頓服須臾吐並下如蝦蟆衣三升又方服童子小便百日佳又方麻子一升熬令香熟搗取酒三升熟研濾取一升飲盡日二服服盡一石瘥治食飲輒吐方頓服生熟湯三升即止灸法乾嘔不止粥食湯藥皆吐灸手間使三十壯若四厥脈沉絶不至者灸之便通病人乾嘔灸心主尺澤佳又法灸乳下一寸三十壯治噦灸承漿七壯炷如麥大又灸臍下四指七壯吐逆嘔不得食灸心俞百壯吐嘔逆不得下食今日食明日吐者灸膈俞百壯吐變不得下食灸胸堂百壯吐逆不得食灸巨闕五十壯吐逆食不止灸胃脘百壯三報吐逆飲食卻出灸脾募百壯三報章門穴也吐嘔宿汁吞酸灸神光一名膽募百壯三報甲乙經云日月膽募也在期門下五分吐逆霍亂吐血灸心主五十壯噫噦膈中氣閉塞灸腋下聚毛下附肋宛宛中五十壯噫噦嘔逆灸石關百壯噎塞第六論一首方三十五首五噎丸治胸中久寒嘔逆逆氣飲食不下結氣不消方古今録驗云五噎者氣噎憂噎勞噎食噎思噎氣噎者心悸上下不通噫噦不徹胸脅苦痛憂噎者天陰苦厥逆心下悸動手足逆冷勞噎者苦氣膈脅下支滿胸中填塞手足逆冷不能自溫食噎者食無多少惟胸中苦塞常痛不得喘息思噎者心悸動善忘目視䀮䀮此皆憂恚嗔怒寒氣上入胸脅所致也乾薑川椒食茱萸桂心人參各五分細辛白朮茯苓附子各四分橘皮六分上十味為末蜜丸如梧子大酒服三丸日三不止稍加至十丸又方治五種之氣皆令人噎方人參半夏桂心防風一作防葵小草附子細辛甘草各二兩紫菀乾薑食茱萸芍藥烏頭各六分枳實三兩上十四味為末蜜丸如梧子大酒服五丸日三不止加至十五丸烏頭與半夏相反但去一味合之竹皮湯治噎聲不出方竹皮一用竹葉細辛各二兩甘草生薑通草人參茯苓桂心麻黃五味子各一兩上十味㕮咀以水一斗煮竹皮減二升去竹皮下藥煮取三升分三服乾薑湯治飲食輒噎方集驗名半夏湯乾薑石膏各四兩人參桂心栝蔞根集驗作桔梗各二兩甘草一兩半夏小麥各一升吳茱萸二升赤小豆三十粒上十味㕮咀以酒五升水一斗煮棗二十枚去滓合煮取三升分三服通氣湯治胸滿氣噎方半夏八兩生薑六兩桂心三兩大棗三十枚上四味㕮咀以水八升煮取三升分五服日三夜二羚羊角湯治氣噎不通不得食方羚羊角通草橘皮各二兩吳茱萸厚朴乾薑各三兩烏頭五枚上七味㕮咀以水九升煮取三升分三服日三又方杏仁桂心各三兩上二味為末蜜丸如棗大稍稍咽之臨食先含彌佳治卒噎方滿口著蜜食之即下又方刮舂杵頭細糠含之即下神驗治諸噎方常食干粳米飯即不噎又方末火炭蜜丸如彈子大含少少咽即下又方老牛涎如棗核大納水中飲之終身不復噎論曰凡療病者皆以其類至如治鯁之法豈宜以鸕鷀治骨鯁貍虎治魚鯁至於竹篾薤白爵筋綿蜜等事乃可以通為諸鯁用耳治諸鯁方以鹿筋漬令濡合而索之大如彈丸以線系持筋端吞之入喉推至鯁處徐徐引之鯁著筋出又方以竹篾刮令滑淨綿裹納咽中令至鯁處可進退引之鯁即隨出又方用綿二兩以蜜煎使熱外敷鯁所在處灼瓠以尉綿上若故未出復煮一段綿代用並以皂莢屑少少吹鼻中使得嚏鯁出又方薤白煮令半熟小嚼之以線系薤中央捉線吞薤下喉至鯁處牽引鯁即出矣治鯁咽方虎骨末或貍骨服方寸匕又方服瞿麥末方寸匕治魚骨鯁方鸕鷀屎服方寸匕又方服橘皮湯又方服沙糖水又方魚網燒灰服方寸匕必效方云取魚網覆頭立下治骨鯁在喉衆治不出方取飴糖丸如雞子黃大吞之不去更吞漸大作丸可至十丸又方燒虎狼屎服之又方吞豬膏如雞子不瘥更吞治食中吞發咽不去繞喉方取亂髮燒灰酒服一錢匕治吞錢方艾蒿五兩以水五升煮取一升頓服即下又方服蜜二升即出又方末火炭酒服方寸匕水服亦得治吞金銀叉環方白糖二斤一頓漸漸食之多食亦佳誤吞環及指彄方燒雁毛二七枚末服之鵝羽亦得誤吞叉方曝韭令萎蒸熟勿切食一束即出或生麥葉筋縷如韭法皆可用但力意多食自消誤吞銅鐵方燒銅弩牙令赤納酒中飲之立愈誤吞釘針及箭鏃方但多食豬脂肥肉令飽自裹出誤吞針方取懸針磁石末飲服方寸匕即下古今録驗云吞針在喉中而服磁末入腹若含磁石於口中吸針而出脹滿第七論一首方八首灸法十一首論曰病者腹滿按而不痛者為虛按之痛者為實也夫腹中滿不減減不足言此當下之舌黃未下者下之黃自去腹滿時減復如故此為寒當得溫藥腹滿口中苦幹燥腹中有水是飲趺陽脈微弦法當腹滿不滿者必下部閉塞大便難兩胠下疼痛此虛寒氣從下上也當以溫藥服之取瘥腹滿轉痛來趨小腹為欲自下利也一云腹中痛若轉氣下趨小腹為欲自利溫胃湯治胃氣不平時脹咳不能食方附子當歸厚朴人參橘皮芍藥甘草各一兩乾薑五分川椒三合上九味㕮咀以水九升煮取三升分三服大半夏湯治胃中虛冷腹滿塞下氣方半夏一升大棗二十枚甘草附子當歸人參厚朴茯苓枳實各二兩桂心五兩生薑八兩川椒二百粒上十二味㕮咀以水一斗煮取三升分二服附子粳米湯治腹中寒氣脹滿腸鳴切痛胸脅逆滿嘔吐方附子一枚半夏粳米各半升甘草一兩大棗十枚上五味㕮咀以水八升煮米熟去滓每服一升日三服集驗方加乾薑二兩厚朴三物湯治腹滿發熱數十日脈浮而數飲食如故方厚朴半斤大黃四兩陳枳實大者五枚上三味㕮咀以水一斗二升煮取五升納大黃煎取三升去滓服一升腹中轉動者勿服不動者更服一方加芒硝二兩厚朴七物湯治腹滿氣脹方厚朴半斤甘草大黃各三兩大棗十枚枳實五枚桂心二兩生薑五兩上七味㕮咀以水一斗煮取五升去滓納大黃煮取四升服八合日三嘔逆者加半夏五合利者去大黃寒多者加生薑至半斤吳茱萸湯治久寒胸脅逆滿不得食方吳茱萸半夏小麥各一升甘草人參桂心各二兩生薑八兩大棗二十枚上八味㕮咀以酒五升水三升煮取三升分三服大桂湯治虛羸胸膈滿方桂心生薑各一斤半夏一升黃耆四兩上四味㕮咀以水一斗半煮取五升分五服日三夜二治男子卒勞內傷汗出中風腹脹大飢食不下心痛小便赤黃時白大便不利方大黃葶藶寒水石苦參黃連栝蔞根等分上六味為末蜜丸以豉汁和飲服如梧子大二丸日三加至十丸灸法臚脹脅腹滿灸膈俞百壯三報胸滿心腹積聚痞痛灸肝俞百壯三報脹滿水腫灸脾俞隨年壯三報腹中氣脹引脊痛多飲食身羸瘦名曰食晦先取脾俞後取季脅臟腑積聚脹滿羸瘦不能飲食灸三焦俞隨年壯脹滿雷鳴灸大腸俞百壯三報脹滿氣聚寒冷灸胃脘百壯三報穴在鳩尾下三寸腹滿脹繞臍結痛堅不能食灸中守百壯穴在臍上一寸一名水分脹滿瘕聚滯下痛冷灸氣海百壯穴在臍下一寸忌不可針脹滿氣如水腫狀小腹堅如石灸膀胱募百壯穴在中極臍下四寸脹滿腎冷瘕積泄利灸天樞百壯穴在臍旁相對橫去臍兩旁各二寸痼冷積熱第八論一首脈一條方二十首灸法一首附寒疝骨蒸論曰凡人中寒者喜缺其人清涕出發熱色和者善嚏凡瞻病者未脈望之口燥清涕出善嚏缺此人中寒其人下痢以裡虛故也欲嚏不能此人腹中痛凡寒脈沉弦脈雙弦者寒也弦脈狀如張弓弦按之不移脈弦數者當下其寒脈雙弦而遲者心下堅脈大而緊者陽中有陰可下之右手寸口脈弦者即脅下拘急而痛其人澀澀惡寒師曰遲者為寒澀為無血寸口脈微尺中緊而澀緊即為寒微即為虛澀即為血不足故知發汗而復下之大露宿丸主寒冷百病方在第十七卷中露宿丸主寒冷積聚方礜石桂心附子乾薑各二兩上四味為末蜜丸如梧子大每服十丸日三後稍加之又方治遇冷氣心下結緊嘔逆寒食不消並主傷寒晨夜觸寒冷惡氣方礜石桂心附子烏頭各四兩上四味為末蜜丸如胡豆大以酒服三丸日三加至十丸藥耐寒忌熱食近火宜冷飲食大露宿丸方見第十七卷肺臟氣極門治痼冷風眩寒中手足冷胃口寒臍下冷百病五勞七傷第一令人能食二強盛三益氣四有子神驗方大豆三升半生地十五斤取汁烏頭一百五十枚上三味以除日㕮咀烏頭以酒一斗半和生地汁浸烏頭至破日絞去滓納豆藥汁中至除日出曝之有汁更浸曝之至汁盡藥成初服從二豆起可至二十豆酒服之有病空腹服無病食後服四時合並得二月三月為上時藥令人能食益氣強盛有子發白反黑齒落重生先病熱人不可服治心腹痼冷百治不瘥方曲末三升白朮五兩乾薑桂心各三兩川椒吳茱萸各二兩上六味治下篩以米飲服方寸匕日二不過五劑諸冷頓瘥無忌空腹服之治積年冷病方川椒二兩香豉一升上二味搗椒為末和豉更搗三千杵丸如彈丸大食前酒服七丸日再治諸冷極醫所不治方馬藺子九升淨治去土空腹服一合日三飲及酒下之服訖須臾以食壓之取瘥乃止赤丸治寒氣厥逆方茯苓桂心各四兩細辛一兩烏頭附子各二兩射罔如棗大一枚上六味為末納真珠為色蜜丸如麻子空腹酒服一丸日再夜一不知加至二丸以知為度一方用半夏四兩而不用桂半夏湯治胸滿有氣心腹中冷方半夏一升桂心四兩生薑八兩上三味㕮咀以水七升煮取二升一服七合日三服生薑湯溫中下氣方生薑一斤甘草三兩桂心四兩上三味㕮咀以水六升煮取一升半一服五合日三服甘草湯治虛羸惙惙氣欲絶方甘草五味子生薑各二兩人參一兩吳茱萸一升上五味㕮咀以水四升煮茱萸令小沸去滓納藥煮取一升六合分二服服數劑佳茱萸硝石湯治久寒不欲飲食數十年澼飲方吳茱萸八合硝石一升生薑一斤上三味以酒一斗水解令得二斗煮藥取四升服二升病即下去勿更服也初下如泔後如汙泥若如沫滓吐者更可服養如乳婦法大建中湯治心胸中大寒大痛嘔不能飲食飲食下咽自知偏從一面下流有聲決決然若腹中寒氣上衝皮起出見有頭足上下而痛其頭不可觸近方川椒二合乾薑四兩人參二兩膠飴一升上四味㕮咀以水四升煮取二升去滓納飴微火煮令得一升半分三服服湯如一炊頃可飲粥二升許更服當一日食糜更服之大黃附子湯治脅下偏痛發熱其脈緊弦此寒也當以溫藥下之之方大黃三兩附子三枚細辛二兩上三味㕮咀以水五升煮取二升分再服論曰寸口脈弦而緊弦則衛氣不行衛氣不行即惡寒緊則不欲飲食弦緊相搏即為寒疝趺陽脈浮而遲浮即為風虛遲即為寒疝凡瘦人繞臍痛必有風冷穀氣不行而反下之其氣必沖不沖者心下則痞大烏頭湯主寒疝繞臍苦痛發即自汗出手足厥寒其脈沉弦者方仲景名二物烏頭煎烏頭大者五枚熬黑不切以水三升煎取一升去滓納白蜜二斤煎令水氣盡得二升強人服七合羸人五合一服未效明日更服每日只一服不可再也烏頭桂枝湯治寒疝腹中痛逆冷手足不仁若一身盡痛灸剌諸藥不能治方秋干烏頭實中者五枚除去角白蜜一斤上二味以蜜煎烏頭減半去滓以桂枝湯五合解之令得一升許初服二合不知更進三合復不知加至五合其知者如醉狀得吐者為中病也桂枝湯方見傷寒門中外臺方以水二升半煮桂提取一升和蜜合煎一升許服論曰凡人患大熱皆須候脈若大大熱者不得一準方用藥皆準病用藥大熱不可那者當兩倍三倍大大熱者乃至十倍用之乃可制之爾有人苦熱不已皆由服石所致種種服餌不能制止惟朴硝煎可以定之武德中有貴高人師市奴謂之金石凌非也此方直用二硝寒水石石膏可也即不勞金有金者貴高人所加也朴硝煎方朴硝一斤芒硝半斤石膏金各二兩寒水石四兩如無石鹽代之上五味先納二硝於八升湯中攪令消以紙密封一宿取清納銅器中別搗寒水石石膏碎如豆粒以絹袋盛之納汁中以微火煎候其上有沫起以箸投中著箸如凌雪凝白急下瀉貯盆中待凝取出烈日曝乾積熱困悶不已者以方寸匕白蜜一合和冷水五合攪和令消頓服之日三熱定即止之五石湯治胃間熱熱病後不除煩悶口中乾渴方寒水石硝石赤石脂栝蔞根龍骨牡蠣黃芩甘草各五分知母石膏桂心各三分大黃二分上十二味㕮咀以水七升煮取三升分四服日三夜一諸本只有四石竹葉湯治五心熱手足煩疼口乾唇燥胸中熱方竹葉小麥各一升知母石膏各三兩茯苓黃芩麥冬各二兩人參一兩半栝蔞根半夏甘草各一兩生薑五兩上十二味㕮咀以水一斗二升煮竹葉小麥取八升去滓納藥煮取三升分三服老少分五服半夏湯治胸中客熱心一下煩滿氣上大小便難方半夏一升生薑八兩前胡四兩茯苓白朮各五兩杏仁枳實各三兩人參黃芩各二兩甘草一兩上十味㕮咀以水九升煮取三升分三服胸中大熱者沉冷服之大小便澀者加大黃三兩一方用梔子仁二兩為十一味承氣湯治氣結胸中熱在胃脘飲食嘔逆渴方前胡枳實桂心大黃寒水石知母甘草各一兩硝石栝蔞根石膏各二兩上十味㕮咀以水一斗煮取三升分三服治熱氣手足心煩熱如火方竹葉二升枳實三兩青葙子白前各一兩吳茱萸黃芩各二分栝蔞根麥冬各二兩生薑六兩前胡一作芍藥半夏各五兩上十一味㕮咀以水八升煮取二升分三服地黃煎治熱方地黃汁四升三合茯神知母葳蕤各四兩栝蔞根五兩竹瀝三合一用竹葉薑汁白蜜麥冬汁鮮骨皮各二升石膏八兩上十一味㕮咀以水一斗二升先煮諸藥取汁三升去滓下竹瀝地黃麥冬汁微火煎四五沸下蜜薑汁微火煎取六升初服四合日三夜一加至六七合四月五月作散服之治積熱方枳實黃芩大黃黃連芒硝各二兩上五味為末蜜丸如梧子大空心酒服三十丸加至四十丸日一服治膈上熱方苦參十兩元參五兩麥冬三兩車前子二兩上四味末蜜丸如梧子大一服十五丸日二服細丸治客熱結塞不流利方大黃葶藶各三兩香豉三合杏仁巴豆各三分上五味為末蜜丸如梧子大每日飲服二丸以利為度治骨蒸羸瘦煩悶短氣喘息鼻張日西即發方龍膽川連栝蔞根各四分芒硝二分梔子十枚苦參大黃黃芩芍藥青葙子各二兩上十味為末蜜丸如梧子大飲服二丸日二以知為度一方無苦參以下只五味張文仲為散飲方寸匕治骨蒸方天靈蓋如梳大炙令黃碎以水五升煮取二升分三服起死人神方又方水服芒硝一方寸匕日二服神良
