body:
  text: 卷二十五備急方凡四類卒死第一方八十七首針灸法十首治卒死無脈無他形候陰陽俱竭故也治之方牽牛臨鼻上二百息牛舐必瘥牛不肯舐著鹽汁塗面上即牛肯舐又方牛馬屎絞取汁飲之無新者水和乾者亦得肘後方云乾者以人尿解之此扁鵲法又方炙尉斗尉兩脅下備急方云又治尸厥針灸法針間使各百餘息又灸鼻下人中一名鬼客廳肘後方云又治尸厥治魘死不自覺者方慎燈火勿令人手動牽牛臨其上即覺若卒不能語取東門上雞頭為末以酒服之治卒魘死方搗韭汁灌鼻孔中劇者灌兩耳仲景云灌口中治鬼魘不悟方伏龍肝為末吹鼻中又方皂莢為末如大豆許吹鼻中嚏則氣通起死回生集驗方云治中惡闢魘方雄黃如棗大系左腋下令人終身不魘女系右腋又方灸兩足大趾叢毛中各二七壯肘後云華他法又救卒死中惡治中惡方蔥心黃刺鼻孔中血出愈肘後方云使目中血出佳崔云男左女右又方大豆二七粒為末雞子黃並酒相和頓服又方使人尿其面上可愈肘後方云此扁鵲法又方灸胃脘五十壯愈治中惡並蠱毒方冷水和伏龍肝如雞子大服之必吐又方豬脂二升溫頓服之又方車釭脂如雞子大酒服治卒忤方此病即今人所謂中惡者與卒死鬼擊亦相類為治皆參取而用之鹽八合以水三升煮取一升半分二服得吐即愈備急方云治鬼擊若小便不通筆頭七枚燒末水和服之即通又方犢子屎半盞酒三升煮服之亦治霍亂肘後方治鬼擊又方書墨為末水服一錢匕又方臘月野狐腸燒末以水服方寸匕死鼠灰亦佳灸法治卒忤死灸手十指爪下各三壯余治同上方備急方云治卒死而張目反折者又灸人中三壯肩井百壯間使七壯巨闕百壯還魂湯治卒感忤鬼擊飛尸諸奄忽氣絶無復覺或已死絞口噤不開去齒下湯湯入口不下者分患人發左右捉踏肩引之藥下復增取盡一升須臾立蘇方麻黃三兩桂心二兩甘草一兩杏仁七十枚上四味㕮咀以水八升煮取三升分三服仲景方桂不用治卒中鬼擊及刀兵所傷血漏腹中不出煩滿欲絶方雄黃粉一刀圭酒服日三血化為水治鬼擊病方鬼擊之病得之無漸卒著人如刀刺狀胸脅腹內絞急切痛不可抑按或即吐血或口鼻血出或下血一名鬼排雞屎白如棗大青花麻一把上二味以酒七升煮取三升熱服須臾發汗若不汗尉斗盛火炙兩脅下使熱汗出愈又方艾如雞子大三枚以水五升煮取二升頓服又方吹醋少許鼻中灸法灸人中一壯立愈不瘥更灸又灸臍上一寸七壯及兩踵白肉際取瘥又灸臍下一寸三壯治五絶方夫五絶者一曰自縊二曰牆壁壓迮三曰溺水四曰魘寐五曰産乳絶半夏一兩細下篩吹一大豆許納鼻中即活心下溫者一日亦可治治自縊死方凡救縊死者極須按定其心勿截繩手抱起徐徐解之心下尚溫者以氍毹覆口鼻令兩人吹其兩耳又方強臥以物塞兩耳竹筒納口中使兩人痛吹之塞口旁無令氣得出半日得噫噫即勿吹也又方搗皂莢細辛末如胡豆大吹兩鼻中又方刺雞冠血出滴著口中即活男雌女雄又方雞屎白如棗大酒半盞和灌口及鼻中佳又方皂莢為末以蔥葉吹入兩鼻中逆出更吹又方梁上塵如大豆許各納一小竹筒中四人各捉一筒同時吹入兩耳兩鼻即活又方尿鼻口眼耳中並捉頭髮一撮如筆管大掣之立活又方雞血塗喉下又方藍青汁灌之又方灸四肢大節陷大指本紋名曰地神名七壯治熱暍方取道上熱塵土以壅心上少冷即易氣通止又方令暍人仰臥以熱土壅臍上令人尿之臍中溫即愈又方可飲熱湯亦可納少乾薑橘皮甘草煮飲之稍稍咽勿頓使飽但以熱土及熬灰土壅臍上佳又方濃煮蓼取汁三升飲之即愈不瘥更灌又方開死人口令通以暖湯徐徐灌口中小舉死人頭令湯入腹須臾即蘇又方使人噓其心令暖易人為之又方抱狗子若雞著心上尉之又方屋上南畔瓦熱尉心冷易之又方灌地漿一盞即愈又方地黃汁一盞服之又方水半升和麵一大抄服之治落水死方以灶中灰布地令厚五寸以甑側著灰上令死者伏於甑上使頭小垂下炒鹽二方寸匕納竹管中吹下孔中即當吐水水下因去甑下死者著灰中壅身使出口鼻即活又方掘地作坑熬數斛灰納坑中下死人覆灰溫徹即易勿令大熱爆人灰冷即易半日即活又方取大甑傾之死人伏其上令死人口臨甑中燃葦火二七把燒甑中當死人心下令煙出小入死人鼻口中鼻口中水出盡則活火盡復益之常以手候死人身及甑勿令甚熱當令火氣能使死人心下足得暖卒無甑者於岸側削地如甑空下如灶燒令暖以死人著上亦可用車轂為之勿令隱其腹令死人低頭水得出並炒灰數斛令暖以粉其身濕更易又方埋死人暖灰中頭足俱沒唯開七孔又方倒懸死人以好酒灌鼻中又灌下部又醋灌鼻亦得又方灶中灰二石埋死人以頭至足出七孔即活又方綿裹皂莢納下部中須臾出水又方裹石灰納下部中水出盡即活又方倒懸解去衣去臍中垢極吹兩耳起乃止又方熬沙覆死人面上下有沙但出口鼻耳沙冷濕即易又方屈兩腳著生人兩肩上死人背向生人背即負持走行吐出水便活又方解死人衣灸臍中凡落水經一宿猶可活治冬月落水凍四肢直口噤尚有微氣者方以大器中熬灰使暖盛以囊敷其心上冷即易心暖氣通目得轉口乃開可溫尿粥稍稍吞之即活若不先溫其心更持火炙身冷氣與火爭即死治凍爛瘡方豬後懸蹄以夜半時燒研細篩以豬脂和敷亦治小兒治入水手足腫痛方搗生胡麻敷之治酒醉中酒恐爛五臟方以湯著槽中漬之冷復易夏亦用湯又方搗茅根汁飲三升又方凡醉不得安臥不動必須使人搖轉不住特忌當風席地及水洗飲水交接治飲酒頭痛方竹茹五兩以水八升煮取五升去滓令冷納破雞子五枚攪勻更煮二沸飲二升使盡瘥治飲酒腹滿不消方煮鹽湯以竹筒灌大孔中治飲酒中毒方煮大豆三沸飲汁三升又方酒漬干椹汁服之治酒病方蔥白豉各二升上二味以水四升煮取二升頓服治飲酒房勞虛受熱積日不食四月中熱飲酒不已酒入百脈心氣虛令人錯謬失常方芍藥人參白薇栝蔞根枳實知母各二兩甘草一兩生地黃八兩酸棗仁半升茯神三兩外臺作茯苓上十味㕮咀以水一斗煮取三升分三服治連月飲酒咽喉爛舌上生瘡方大麻仁一升黃芩二兩肘後千金翼方俱作黃柏上二味為末蜜和丸含之治酒醉不醒方飲葛根汁一斗二升取醒止肘後云治大醉連日煩毒不堪飲酒令人不醉方柏子仁麻子仁各二兩上二味治下篩為一服進酒三倍又方葛花小豆花等分上二味合為末服三方寸匕飲時仍進葛根汁芹汁及枇杷葉飲並能倍酒又方九月九日菊花為末臨飲服方寸匕又方小豆花葉陰乾百日為末服之又方五月五日取井中倒生草枝陰乾為末酒服之飲酒令無酒氣方干蔓菁根二七枚三遍蒸為末取兩錢許酒後水服治惡酒健嗔方空井中倒生草燒灰飲之勿令知又方取其人床上塵和酒飲之斷酒方柳花臘月鼠頭灰上二味等分為末黃昏時酒服一杯又方白豬乳汁一升飲之永不飲酒又方鸕鷀屎燒灰水服方寸匕永斷又方蠐螬干搗末和酒與飲永世聞酒名即嘔神驗又方刮馬汗和酒與飲終身不飲又方虎屎中骨燒末和酒與飲又方白狗乳汁酒服之又方臘月馬腦和酒服之又方驢駒衣燒灰酒飲方寸匕蛇蟲等毒第二論六首方一百二十七首灸法二首治因熱逐涼睡熟有蛇入口中挽不出方以刀破蛇尾納生椒二三枚裹著須臾即出肘後方云艾灸蛇尾即出若無火以刀周匝割蛇尾截令皮斷乃將皮倒脫即出治蛇入口中並七孔中者割母豬尾頭瀝血著口中即出又方以患人手中指等截三歲大豬尾以器盛血傍蛇瀉血口中拔出之治卒為蛇繞不解方以熱湯淋之無湯令人尿之治蛇蠍螫方服小蒜汁滓敷上肘後方云治蝮蛇螫又方熟搗葵取汁服之治蛇齧方人屎厚塗帛裹即消治蛇毒方消蠟注瘡上不瘥更消注之又方以母豬耳中垢敷之肘後方云牛耳中垢亦可敷之治蝮蛇毒方以射罔塗腫上血出即愈又方生麻楮葉合搗以水絞去滓漬之又方令婦人尿瘡上又方末薑敷之干即易又方雞屎二七枚燒作灰投酒中服之又方以面圍上令童男尿著中燒鐵令赤投中冷復燒著二三度瘥又方雄黃為末敷之日一易又方鹽四兩水一斗煮十沸沸定以湯浸冷易之又方紫莧搗取汁飲一升以滓封瘡上以少水灌之又方梳中垢如指大長一寸尿和敷之又方取合口椒同葫荽苗等分搗敷無不瘥又方用銅青敷瘡上又方搗大蒜和胡粉敷之又方嚼大豆葉塗之良又方豬脂和鹿角灰塗之又方炙梳汗出尉之治諸蛇毒方雄黃乾薑各等分上二味為末和射罔著竹筒中帶行有急用之入山草闢衆蛇方雄黃乾薑麝香各等分上三味搗為粗末以小絳袋盛帶之男左女右蛇毒塗瘡集驗方云如無麝香以射罔和代之救急方云以蜜和為膏敷螫處良又方常燒羖羊角使煙出蛇則去矣治蛇螫人瘡已愈餘毒在肉中淫淫痛癢方大蒜小蒜各一升上二味合搗以熱湯淋汁灌瘡大良治蛇骨刺人毒痛方鐵精如大豆許納管中吹入瘡中良又方燒死鼠為末敷之治衆蛇螫方灸上三七壯無艾以火頭稱瘡孔大小爇之治虎咬瘡方濃煮葛根汁洗十數遍及搗為散以葛根汁服方寸匕日五甚者夜二又方青布急卷為繩只一物燒一頭燃納竹筒中注瘡口熏之妙又方煮鐵令濃洗瘡又方嚼生栗子塗之良闢虎法凡入山燒水牛羖羊角虎狼蛇皆走論曰凡見一切毒螫之物必不得起噁心向之亦不得殺之若輒殺之於後必遭螫毒治亦難瘥慎之慎之治蠍毒方凡蠍有雌雄雄者痛只在一處雌者痛牽諸處若是雄者用井底泥塗之溫則易雌者用當瓦屋溝下泥敷之若值無雨可用新汲水從屋上淋下取泥又方取齒中殘飯敷之又豬脂封之又射罔封之又硇砂和水塗上立愈治蠍螫方若著手足以冷水漬之水微暖即易之著余處者冷水漬故布㩉之少暖則易又方生烏頭為末唾和敷之治蜂螫毒方取瓦子摩其上唾二七遍置瓦子故處治蜂螫方豬脂蜜各半升蠟二兩上三味和煎如膏候冷以塗之又方燒蜂房為末豬膏和塗之肘後方云先煮蜂房洗之又燒塗之又方酥脂塗之立愈又方燒牛屎灰以苦酒和塗之又方齒垢塗之又方醇醋沃地取泥塗之又方嚼鹽塗之又方以人尿新者洗之又方尿泥塗之論曰凡蠼螋蟲尿人影著處便令人病瘡其狀身中忽有處瘮痛如芒刺亦如刺蟲所螫後起細㾦㿔作聚如茱萸子狀四邊赤中央有白膿如黍粟亦令人皮肉急舉身惡寒壯熱劇者連起竟腰脅胸治之法初得之磨犀角塗上止其毒治如火丹法余以武德中六月得此疾經五六日覺心悶不佳以他法治不愈又有人教畫地作蠼螋形以刀子細細盡取蠼螋腹中土就中以唾和成泥塗之再塗即愈方知天下萬物相感莫曉其由矣治蠼螋尿方羖羊髭燒灰臘月豬脂和封之又方搗豉封之又方醋和胡粉塗之治蠼螋尿瘡方燒鹿角為末以苦酒和敷瘡上已有汁者燒道旁弊蒲席敷之又方槐白皮半斤切以苦酒二升漬半日刮去瘡處以洗日五六遍仍以赤小豆末以苦酒和敷之燥復易小兒以水和又方嚼大麥以敷之日三又方燕窠中土以豬脂和敷之又方熟嚼梨葉以水和塗燥復易之又方馬鞭草熟搗爛以敷上燥則易之又方取吳茱萸東行根下土醋和塗之治三種射工蟲毒方論曰江南有射工毒蟲一名短狐一名蜮其蟲形如甲蟲外臺云正黑狀如大飛生無目利耳有一長角在口前如弩以氣為矢因水勢以射人人聞其在水中鉍鉍作聲要須得水沒其口便以口中毒射人此蟲畏鵝鵝能食之其初見證有似傷寒先惡寒噤瘮寒熱筋急亦似中尸便口噤不能語朝旦小蘇晡夕輒劇寒熱悶亂是其證也如得三四日急治之治稍遲七日死射著人影者不即作瘡但惡寒噤瘮自非其地之人不知其證便謂傷寒每多誤治及成瘡似蠼螋尿亦似瘭疽瘡射工中瘡有三種其一種瘡正黑如黶子皮周邊悉赤或衣犯之如有芒刺痛其一種作瘡久久穿或晡間寒熱其一種如火灼熛起似此者最急數日殺人中人頭面又急腰以上去人心近多死腰以下稍緩不治亦死備急方云有四種其一種突起如癰治射工中人寒熱或發瘡在一處有異於常者方取鬼臼葉一把漬苦酒中熟搗絞汁服一升日三又方取生吳茱萸莖葉一握斷去前後取中熟搗以水二升煮取七合頓服又方取葫荽切貼瘡灸七壯又方取蜈蚣大者一枚火炙治為末苦酒和敷瘡上又方取赤莧菜熟搗絞取汁每服一升日四五服又方取白雞屎白者三枚湯和塗中毒處又方升麻三兩烏扇根犀角各二兩上三味㕮咀以水四升煮取一升半去滓分再服相去如一炊頃盡更作治射工中人三種瘡方升麻三兩烏扇根三兩上二味㕮咀以水三升煮取一升適寒溫盡服滓敷瘡上治射工中人已有瘡者方取芥子搗爛苦酒和厚塗瘡上半日痛便止又方取狼牙葉冬取根搗令熟敷所中處又飲四五合汁五香散治江南毒氣惡核射工中人暴腫生瘡方甲香犀角鱉甲升麻薰陸香丁香沉香烏翣青木香川連黃芩羚羊角甘草牡蠣各四分吳茱萸三分黃柏六分上十六味治下篩中射工毒及諸毒皆水服方寸匕日二並以水和少許洗之仍以雞子白和塗腫上干則易野葛膏治射工惡核卒中惡毒方野葛一升巴豆烏頭川椒各半升茵芋躑躅附子丹砂各一兩雄黃大黃各一兩上十味治下篩以不中水豬膏三斤煎三上三下去滓納丹砂雄黃末攪至凝似棗核大摩痛上勿近眼凡合各膏皆無令産婦女人小兒雞犬六畜見之唯宜清淨治沙蝨毒方斑蝥二枚熬一枚熬為末服一大枚又燒一枚燒令煙絶為末著瘡中又方大蒜十枚合皮安熱灰中炮令熱去皮刀斷蒜頭取熱著毒處又方麝香大蒜上二味合搗以羊脂和著小筒中帶欲用取敷瘡上又方雄黃硃砂恆山各等分上三味取五月五日日中時令童子合之取敷瘡上治石蛭方山中陰濕草木上石蛭著人則穿齧人肌膚行人肉中浸淫墳起如蟲行道之狀凡行山路草木中常以臘月豬膏和鹽塗腳脛及足趾間趺上及著鞋襪蛭不得著人也已著者灸斷其道即愈治水毒方論曰凡山水有毒蟲人涉水之時中人似射工而無物其初得之惡寒微頭痛目眶疼心中煩懊四肢振焮腰背百節皆強兩膝痛或翕翕而熱但欲眠睡旦醒暮劇手足逆冷至肘膝二三日腹中生蟲蝕人下部肛中生瘡不痛不癢令人不覺不急治過六七日下部出膿潰蟲上食人五臟熱盛毒煩下利不禁八九日雖良醫不能治矣其毒有陰陽之異覺得之急早視其下部若有瘡正赤如截肉者為陽毒最急若瘡如鯉魚齒者為陰毒猶小緩要皆殺人不過二十日也欲知是中水與非者當作五六升湯以小蒜五升切投湯中消息勿令大熱去滓以浴之是水毒身當發赤斑無是者非也解水毒飲子治人急中水毒手足指冷或至肘膝者方吳茱萸一升生薑切一升半犀角升麻橘皮各二兩烏梅十四枚上六味㕮咀以水七升煮取二升分二服又方浮萍草曝乾為末酒服方寸匕又方梅葉桃葉搗絞取汁三升許或干以少水絞取汁飲之小兒不能飲以汁敷乳頭與之又方搗蒼耳汁服一升又以綿裹杖沾汁導下部日三瘥又方搗蓼一把以酒和絞取汁一升飲之不過三服瘥外臺肘後作梨葉又方搗鹽一把水解以塗浴面目身體令遍又方搗蛇莓根為末以飲之並導下部生者用汁凡夏月行常多齎此藥屑入水以方寸匕投水上流無所畏又闢射工凡洗浴以少許投水盆中即無毒治貓鬼野道病歌哭不自由方五月五日自死赤蛇燒作灰以井花水服方寸匕日三又方臘月死貓頭燒灰水服一錢匕日二針灸方見別卷中治貓鬼眼見貓貍及耳雜有所聞方相思子萆麻子巴豆各一枚硃砂末二銖蠟四銖上五味合搗為丸先取麻子許大含之即以灰圍患人前頭著一斗灰火吐藥火中沸即畫火上作十字其貓鬼並皆除矣治蜘蛛咬毒方人屎敷又油澱敷又炮薑貼之又猢猻屎敷之又方麻油和胡粉如泥塗上干則易之治馬齧人及踏人作瘡毒腫熱痛方馬鞭稍二寸長鼠屎二七枚上二味合燒為末以豬膏和塗之立愈外臺方云治遂成瘡爛經久不愈者肘後方云用馬鞭皮燒末豬膏和塗治馬齧人陰卵脫出方推納入以桑皮細作線縫之破烏雞取肝細銼以封之且忍勿小便即愈治犬馬齧及馬骨刺傷人及馬血入舊瘡中方取灰汁熱漬瘡常令汁器有火數易汁勿令爛人肉三數日漬之有腫者炙石尉之日二消止治馬血入瘡中方服人糞如雞子大復以糞敷瘡上又方取婦人月水敷之神良治剝死馬馬骨傷人毒攻欲死方即取馬腸中屎塗之大良治馬汗馬毛入人瘡中腫痛欲死方以水漬瘡數易水便愈又以石灰敷之又方飲醇酒取醉即愈又方燒雞毛翎末以酒服方寸匕又方以沸湯令得所浸洗之即瘥論曰凡春末夏初犬多發狂必預防之防而不免者莫出於灸百日之中一日不闕者方得免難若初見瘡瘥痛定即言平復者此最可畏大禍即至死在旦夕凡狂犬咬人著訖即令人狂精神已別何以得知但看灸時一度火下即覺心中醒然惺惺了了方知咬已即狂此病至重世皆輕之不以為意坐是死者嘗年有之吾初學醫未以為業有人遭此將已見問吾了不知報答是以經吾手而死者不一自此鋭意學之一解以來治者皆愈方知世無良醫枉死者半此言非虛故將來學者非只此法餘一方皆須沉思留心作意殷勤學之乃得通曉莫以粗解一二種法即謂知訖極自誤也凡猘犬咬人七日輒應一發三七日不發則脫也要過百日乃得免耳每到七日輒當搗韭汁飲一二升又當終身禁食犬肉蠶蛹食此即發死不可救矣瘡未愈之間禁食生魚及諸肥膩冷食但於飯下蒸魚及肥器中食便發不宜飲酒能過一年乃佳集驗方云若重發者生食蟾蜍鱠絶良亦可燒炙食之不必令其人知初得齧毒便為之則於後不發也治猘犬毒方頭髮蝟皮各等分上二味燒灰水和飲一杯服之口噤者折齒納藥又方搗地榆絞取汁塗瘡無生者可取乾者以水煮汁飲之亦可末服為方寸匕日三兼敷上過百日止又方搗韭絞取汁飲一升日三瘡愈止亦可治愈後復發者又方刮虎牙若骨服方寸匕小品方云刮狼牙或虎骨末服已發狂如猘犬者服即愈又方燒虎骨敷瘡及尉又微熬杏仁搗研取汁服之良又取燈盞殘油灌瘡口皆禁酒豬魚肉生菜又方用韭根一握故梳二枚水二升煮取一升頓服又方桃東南枝白皮一握水二升煮取一升分二服吐出犬子又方取猘犬腦敷上後不復發又方蝦蟆灰以粥飲服之又方服莨菪子七枚日一又方梅子末以酒服之又方以豆醬清塗之日三四治狂犬齧人方蛇脯一枚炙去頭搗末服五分匕日三又燒末納瘡孔中又方搗莨菪根和鹽敷日三又方青布浸汁服三升又方取驢尿一二升飲之治凡犬齧人方熬杏仁半升令黑研成膏敷之又方取灶中熱灰以粉瘡帛裹系之又方鼠屎為末臘豬膏和敷之外臺方云鼠一枚豬膏煎敷之又方飲生薑汁一升小品方云治狂犬咬韭汁亦佳外臺方云亦治已瘥後復發者又方水洗瘡任血出勿止之水洗不住取血自止以綿裹之瘥又方以沸湯和灰壅瘡上又方燒犬尾為末敷瘡日三又方以頭垢少少納瘡中又方火炙蠟以灌瘡中又方以熱牛屎塗之佳又方以苦酒和灰塗瘡中灸法凡猘犬所齧未盡其惡血毒者灸上一百壯已後當日灸一壯若不血出刺出其血百日灸乃止禁飲酒及豬犬肉治豬齧方松脂煉作餅上貼之又方以屋溜中泥塗諸般傷損第三論一首方九十二首論曰凡被打損血悶搶心氣絶不能言可擘開口尿中令下咽即醒又墮車落馬及車輾木打已死者以死人安著以手神掩其口鼻眼上一食頃活眼開與熱小便二升治被打擊頭眼青腫方炙肥豬肉令熱拓上肘後方云治血聚皮膚間不消散者又方牆上朽骨唾於石上研磨塗之干即易又方炙豬肝貼之又方新殺羊肉乘熱封之又方大豆黃為末水和塗之治被打傷破腹中有瘀血方蒲黃一升當歸桂心各二兩上三味治下篩酒服方寸匕日三夜一又方劉寄奴延胡索骨碎補各一兩上三味㕮咀以水二升煎取七合復納酒及小便各一合溫熱頓服又方蟅蟲虻蟲水蛭各三十枚桃仁五十枚桂心二兩大黃五兩上六味㕮咀以酒水各五升煮取三升分五服又方生地黃汁三升酒一升半煮取二升七合分三服肘後方治從高墮下瘀血脹心面青短氣欲死又方莨菪子為末敷瘡上白馬蹄散治被打腹中瘀血並治婦人瘀血化血為水方白馬蹄燒令煙盡搗篩酒服方寸匕日三夜一治被毆擊損傷聚血腹滿煩惱悶方豉一升以水三升煮三沸分再服不瘥重作更取麻子煮如豉法不瘥更煮豉如上法治有瘀血其人喜忘不欲聞人聲胸中氣塞短氣方甘草一兩茯苓二兩杏仁五十枚上三味㕮咀以水二升煮取九合分二服治從高墮下傷折疾痛煩躁啼叫不臥方取鼠屎燒末以豬膏和塗痛止急裹之治從高墮下及為木石所迮或因落馬凡傷損血瘀凝積氣絶欲死無不治之方取淨土五升蒸令溜分半以故布數重裹之以尉病上勿令大熱恐破肉冷則易之取痛止即已凡有損傷皆以此法治之神效已死不能言者亦治治墮車馬間馬鞍及諸物隱體肉斷方以酢和曲塗之當歸散治落馬墮車諸傷腕折臂腳痛不止方當歸桂心蜀椒附子各二分澤蘭一分芎藭六分甘草五分上七味並熬令香治下篩酒服方寸匕日三凡是傷損皆服之十日愈小兒亦同救急方云治墮馬落車被打傷腕折叫喚痛聲不絶服此散呼吸之間不復大痛十三日骨筋相連黃耆散治腕折方黃耆白芍各三兩當歸乾地黃附子續斷桂心乾薑通草各二兩大黃一兩烏頭半兩蜀椒一合上十二味治下篩先食酒服五分匕日三千金翼無大黃治折骨斷筋方乾地黃當歸羌活苦參各等分上四味治下篩酒服方寸匕日三治腕折骨損痛不可忍方以大麻根及葉搗汁飲一升無生麻煮乾麻汁服亦主墜墮撾打瘀血心腹滿短氣治被傷筋絶方取蟹頭中腦及足中髓熬之納瘡中筋即續生治腕折四肢骨碎及筋傷蹉跌方生地不限多少熟搗用敷所損傷處肘後方云小品方爛搗熬之以裹傷處以竹片夾裹令遍縛令急勿令轉動一日可十易三日瘥血聚在折處以刀子破去血治四肢骨碎筋傷蹉跌方以水二升漬豉三升取汁服之鹿角散治同前鹿角搗篩灑服方寸匕日三又方筋骨傷初破時以熱馬屎敷之無瘢又方大豆二升水五升煮取二升以醇酒六七升合和豆汁服之一日盡如湯沃雪肘後方云治墮迮瘀血無大豆用小豆亦佳又方羊腦一兩發灰胡粉胡桃脂各半兩上四味搗和調如膏敷上以生布裹之治頭破腦出中風口噤方大豆一升熬去腥勿使太熟搗末熟蒸氣遍合甑下盆中以酒一斗淋之溫服一升覆取汗敷杏仁膏瘡上黑大豆淋酒即大豆紫湯法大豆紫湯治被傷風入四體角弓反張口噤不能言或産婦墮胎凡得此者大重不過五劑方見第三卷婦人産後中風門膠艾湯治丈夫從高墮下傷五臟微者唾血甚者吐血及金瘡傷經崩中皆主之方阿膠艾葉乾薑各二兩芍藥三兩上四味㕮咀以水八升煮取三升去滓納膠令煬分二服羸人分三服兼主女人産後崩傷下血過多虛喘腹中絞痛下血不止者服之悉愈大膠艾湯治男子傷絶或從高墮下傷五臟微者唾血甚者吐血及金瘡傷經者方阿膠艾葉甘草當歸芎藭各二兩乾薑一兩芍藥地黃各三兩上八味㕮咀以水八升煮取三升去滓納膠令煬分再服羸人分三服此湯治婦人産後崩傷下血過多虛喘欲死腹中急痛下血不止者神良竹皮湯治為兵杖所加木石所迮血在胸背及脅中痛不得氣息方青竹茹亂髮灰各如雞子大二枚上二味於炭火上炙令焦燥合搗下篩酒一升煮三沸一服盡之三服愈治墮馬落車顛仆崩血腹滿短氣方大豆五升以水一斗煮取二升去豆一服令盡劇者不過三作治墮落車馬間心腹積血吐唾無數方干藕根為末以酒服方寸匕日三如無取新藕搗汁服之桃仁湯治從高墮下落大木車馬間胸腹中有血不得氣息方桃仁十四枚大棗二十枚大黃硝石甘草各一兩蒲黃一兩半上六味㕮咀以水三升煮取一升絞去滓適寒溫服盡之當下下不止漬麻汁一杯飲之即止又方治腹中瘀血痛在腹中不出滿痛短氣大小便不通方桃仁蟅蟲各三十枚荊芥五分大黃芎藭各三兩當歸桂心甘草各二兩蒲黃五兩上九味㕮咀以水一斗煮取三升分三服又方治墮落瘀血方桃仁五十枚水蛭虻蟲各二十枚甘草桂心當歸各二兩芒硝三兩大黃四兩上八味㕮咀以水八升煮取三升絞去滓適寒溫服一升日三深師方無芒硝治腕折瘀血方桃仁四十枚亂髮一握大黃如指節大一枚上三味以布方廣四寸以繞亂髮燒之㕮咀桃仁大黃以酒三升煮取一升頓服血盡出肘後方云仲景治墜馬及一切筋骨損方用大黃三兩緋帛如手大燒灰亂髮如雞子大燒灰久用炊單布一尺燒灰桃仁四十九枚去皮尖熬敗蒲席一握長三寸切甘草一枚如中指節上七味以童子小便量多少煎湯成納酒一大盞次下大黃去滓分溫三服先別銼敗蒲席半領煎湯以浴衣被重覆服藥斯須通利數行痛楚立瘥利及浴水赤勿怪即瘀血也又方桃仁六十枚大黃六兩桂心二兩上三味㕮咀以酒六升煮取三升分三服當下血瘥蒲黃散治從高墮下有瘀血方蒲黃八兩附子一兩上二味為末酒服方寸匕日三不知增之以意消息又方治腕折瘀血方蒲黃一升當歸二兩上二味治下篩先食酒服方寸匕日三又方虻蟲二十枚牡丹一兩上二味治下篩酒服方寸匕血化為水備急方云主久宿血在諸骨節及外不去者二味等分又方取菴䕡草汁飲之子亦可服又方凡被打及産後惡血一切血皆煮續骨木汁二升飲之從高墮下崩中方當歸大黃各二分上二味治下篩酒服方寸匕日三治杖瘡方石灰七斤新豬血一升上二味和丸熟燒之破更丸燒三遍止為末敷上又方釜月下土為細末以油和塗訖臥羊皮上又方服小便良治竹木刺在皮中不出方羊屎燥者燒作灰和豬脂塗刺上若不出重塗乃言不覺刺出時一云用干羊屎末又方薔薇灰水服方寸匕日三服十日刺出又方酸棗核燒末服之又方鑿柄燒灰酒服二寸匕又方頭垢塗之即出治刺在肉中不出方煮山瞿麥汁飲之日三瘥止又方用牛膝根莖生者並搗以敷之即出瘡已合猶出也又方白茅根燒末以膏和塗之亦治瘡因風致腫者又方鹿角燒末以水和塗之立出久者不過一夕又方嚼白梅以塗之肘後方用烏梅又方嚼豉塗之又方溫小便漬之治久刺不出方服王不留行即出兼取根為末貼之治惡刺方苦瓠開口納小兒尿煮兩三沸浸病上又方莨菪根水煮浸之冷復易神方也又方李葉棗葉合搗絞取汁點上即效又方濃煮大豆汁漬取瘥治惡刺並狐尿刺方以烏父驢尿漬之又方溫白馬尿漬之治因瘡腫痛劇者數日死或中風寒或中水或中狐尿刺主之方燒黍穰牛馬屎生桑條取得多煙之物燒熏汁出愈又方熱蠟納瘡中新瘡亦善又方以鳧公英草摘取根莖白汁塗之多塗為佳瘥止治瘡中水腫方胡粉炭白灰各等分上二味脂和塗瘡孔上水出痛止治手足卒中刺中水毒方搗韭及藍青置上以火炙熱徹即愈治瘡因風致腫方櫟木根皮一斤濃煮納鹽一把漬之治破傷風腫方厚塗杏仁膏燃麻燭遙灸之治因瘡腫痛者皆中水及中風寒所作腫入腹則殺人方溫桑灰汁漬冷復溫之當令熱神祕治刺傷中風水方服黑牛熱尿一服二升三服即止又方蠟一兩熱炙尉薄裹上令水出愈又方魚目燒灰敷之又方熱煮韭拓之又方刮箭羽下漆塗之治瘡犯露腫方凡八月九月中刺手足犯惡露腫殺人不可輕生桑枝三枚納煻灰中推引令極熱斫斷正以枝頭著瘡口上熱盡即易之盡三枚則瘡自爛仍取薤白搗綿裹著熱灰中使極熱去綿取薤白敷瘡上以布帛急裹之若有腫者便取之用薤白最佳治漆瘡方生柳葉三斤細切以水一斗五升煮取七升適寒溫洗之日三肘後方云老柳皮尤妙又方以磨石下滓泥塗之取瘥止大驗又方濃煮鼠查葉以洗瘡上亦可搗葉取汁塗之又方爛搗七姑草封之救急方用七姑草和芒硝塗之又方取豬膏塗之又方貫衆為末以塗上干以油和之即愈又方蓮葉燥者一斤以水一斗煮取五升洗瘡上日二又方羊乳汁塗之又方礬石著湯中令消洗之又方芒硝五兩湯浸以洗之又方宜啖豬肉嚼穄谷塗之火瘡等證第四論二首方六十九首論曰凡火燒損慎勿以冷水洗之火瘡得冷熱氣更深轉入骨壞人筋骨難瘥初被火燒急向火更炙雖大痛強忍之一食久即不痛神驗治火燒悶絶不識人以新尿冷飲之及冷水和蜜飲之口噤撬開與之然後以下方治之治火瘡方梔子四十枚白蘞黃芩各五兩上三味㕮咀以水五升油一升合煎令水氣歇去滓待冷以淋之令溜去火熱毒則肌得寬也作二日任意用膏敷湯散治之又方熬油麻為末和梔子仁塗之唯厚為佳若已成瘡者燒白糖灰粉之即燥立瘥治火燒瘡方死鼠頭一枚以臘月豬膏煎令消盡以敷干即敷之瘥亦治小兒火瘡治火瘡敗壞方柏白皮切以臘月豬膏合淹相得煮四五沸色變去滓敷瘡上肘後方云用桃白皮又方柏白皮蛇銜生地黃梔子仁黃芩苦竹葉各一分上六味㕮咀以羊髓一斤半煎三上三下去滓冷以敷之藥驗方用生地黃四兩又方以榆白皮嚼熟塗之治湯沃人肉爛壞方杏仁附子各二兩甘草一兩羊脂五兩松脂雞子大上五味㕮咀以不中水豬膏五兩煎塗之灸瘡灸及湯火所損晝夜啼呼止痛滅瘢方羊脂松脂各二分豬膏蠟各一分上四味取松脂破銚中切脂嚼蠟著松明上少傾微火令滓皆消以杯承汁敷之治灸瘡方甘草當歸各一兩胡麻外臺用胡粉羊脂各六分上四味㕮咀以豬膏五合煎去滓敷之又方松脂五兩蠟三兩上二味合煎塗紙貼之日三又方取車釭脂塗上又方凡灸瘡不瘥日別灸上六七壯自瘥治灸瘡腫痛急方搗灶下黃土以水和煮令熱漬之治灸瘡中風冷腫痛方但向火炙之瘡得熱則瘡快至痛止日六七炙愈薤白膏治灸瘡生肉止痛方薤白當歸各二兩白芷一兩羊髓一斤上四味㕮咀合煎以白芷色黃藥成去滓敷之日三又方治灸瘡膿壞不瘥方薤白一握胡粉石灰各一兩臘月豬膏一升上四味先煎薤白令黃去之綿裹石灰煎數沸去之次入胡粉納膏中令調塗故布貼上日三又方石灰一兩搗篩豬脂和令相得微火煎數沸以暖湯先洗瘡訖以布裹灰尉瘡上三過便以藥貼瘡上灸之又搗薤敷之又方白蜜一兩烏賊骨二枚一方作一兩上二味相和塗之治針灸瘡血出不止方燒人屎灰敷之又方死蜣螂為末以豬膏和塗之金瘡論曰治金瘡者無大小冬夏及始初傷血出便以右灰厚敷裹之即止痛又速愈若瘡甚深未宜速合者納少滑石令瘡不時合也凡金瘡出血其人必渴當忍之啖燥食並肥膩之物以止渴慎勿鹹食若多飲粥及漿犯即血動溢出殺人又忌嗔怒大言笑思想陰陽行動作勞多食酸鹹飲酒熱羹臛輩瘡瘥後猶爾出百日半年乃可復常也治金瘡大散方五月五日平旦使四人出四方各於五里內採一方草木莖葉每種各半把勿令漏脫一事日正午時細切碓搗並石灰極爛熟一石草斷一斗石灰先鑿大實中桑樹令可受藥取藥納孔中實築令堅仍以桑樹皮蔽之以麻搗石灰極密泥之令不泄氣又以桑皮纏之使牢至九月九日午時取出陰乾百日藥成搗之日曝令乾更搗絹篩貯之凡一切金瘡傷折出血登時以藥封裹治使牢勿令動轉不過十日即瘥不腫不膿不畏風若傷後數日始得藥須暖水洗令血出然後敷之此藥大驗平生無事宜多合以備倉卒金瘡之要無出於此雖突厥質雄黃末未能及之肘後方云用百草心五月五日作七月七日出又方燒乾梅為炭搗末敷之一宿即瘥亦治打傷又方磁石搗末敷之止痛斷血又方取桑白汁塗桑白皮裹之或石灰封之妙又方麻葉三斤以水三升熟煮取二升為一服又方飲麻子汁數升小品方云治毒箭所傷又方蚯蚓屎以水服方寸匕日三又方杏仁石灰為細末以豬脂和封之亦主犬馬金瘡大良治金瘡血出不止方煮桑根十沸服一升即止又方搗車前汁敷之血即絶連根取用亦效又方柳絮封之又方以蜘蛛幕貼之血即止又方飲人尿五升愈內補散治金瘡出血多虛竭方蓯蓉芍藥甘草各四兩蜀椒三兩乾薑三兩當歸芎藭桂心黃芩吳茱萸人參黃耆厚朴各一兩白芨一兩古今録驗作桑白皮上十四味治下篩酒服方寸匕日三又方當歸三兩乾薑三分芍藥辛夷各五分甘草二分上五味治下篩酒服方寸匕日三夜一治金瘡內漏血不出方牡丹皮為末水服三指撮立尿出血治金瘡內漏方還自取瘡中血著杯中水和服之愈又方蒲黃二兩七月七日麻勃一兩上二味為末酒服一錢匕日三夜二二物湯治金瘡腹中瘀血方大麻子三升大蔥白二十枚上使數人各搗令熟著水九升煮取一升半頓服若血出不盡腹中有膿血更合服當吐膿血內塞散治金瘡方黃耆當歸芎藭白芷乾薑黃芩芍藥續斷各二兩附子半兩細辛一兩鹿茸三兩上十一味治下篩先食酒服五分匕日三稍增至方寸匕治金瘡煩滿方赤小豆一升以苦酒漬之熬令燥復漬滿三日令色黑服方寸匕日三治金瘡苦痛方楊木白皮熬令燥為末服方寸匕日三又以敷瘡愈治金瘡苦刺痛不可忍百治不瘥者方蔥一把以水三升煮數沸取漬洗止痛良治金瘡煩痛大便不利方大黃黃芩上二味為末蜜和為丸如梧子大先食服十丸日三續斷散治金瘡中筋骨方續斷五兩細辛蛇銜地榆乾地黃各四兩當歸芍藥芎藭蓯蓉各三兩人參甘草附子各二兩乾薑蜀椒桂心各一兩半上十五味治下篩酒服一方寸匕日三治金瘡腸出方磁石滑石鐵精各三兩上三味為末粉腸上後用磁石末飲服方寸匕日五夜二腸即入又方取人屎干為末粉腸即入治被傷腸出不斷者方肘後方云治腸出欲燥而草土著腸者作大麥粥取汁洗腸推納之常研米粥飲之二十日稍稍作強糜百日後可瘥地黃膏治金瘡火瘡灸瘡不能瘥者方生地一升切搗絞取汁三合薰陸香松脂杏仁蠟各二兩羊腎脂五合烏麻油二升石鹽一兩研如粉上八味先下蠟微火令消次納羊脂令消次下油次下松脂次下杏仁次下薰陸次下生地汁次下石鹽以微火煎令生地汁水氣盡以綿濾停凝一切諸瘡初傷皆用敷之日三夜二慎生冷豬雞魚肉此膏治瘡法先除惡肉不著痂先從內瘥乃至平復無痂不畏風不膿大妙治金瘡血出不止方蒲黃一斤當歸二兩上二味治下篩酒服方寸匕日二又方取蔥葉炙取汁塗瘡上即止若為婦人所驚者取婦人中衣火炙令熱以尉瘡上又方取豉三升熱湯漬食頃絞去滓納蒲黃三合頓服及作大豆紫湯服之方見第二卷婦人門治金瘡箭在肉中不出方白蘞半夏等分上二味治下篩酒服方寸匕日三瘡淺十日出瘡深二十日出終不住肉中治箭鏃及諸刀刃在咽喉胸膈諸隱處不出者方丹皮一分白鹽二分肘後作白蘞上二味治下篩以酒服方寸匕日三服出治卒中箭不出或肉中有聚血方取女人月經布燒灰屑酒服之又方取栝蔞汁塗瘡上即出又方酒服瞿麥末方寸匕日三瘥又方煎地黃汁作丸服之百日箭出又方多飲葛根汁並治一切金瘡又方搗葛根汁飲之又葛白屑熬黃敷瘡止血又方煮蘆根汁飲三升又方貝齒末服一錢匕又方雄黃為末敷之當沸汁出愈又方納鹽臍中灸之治中射罔箭方藍子五合升麻八兩王不留行甘草各四兩上四味治下篩冷水服二方寸匕日三夜二又以水和塗瘡干易之治毒箭所中方搗藍汁一升飲之並敷瘡上若無藍取青布漬絞汁飲之並淋瘡中鏃不出搗死鼠肝塗之治針折入肉中方刮象牙為末水和聚著折針上即出又方以鼠腦塗之又方磁石吸鐵者著上即出
