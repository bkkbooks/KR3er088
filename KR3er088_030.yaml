body:
  text: 卷三十針灸下凡八類孔穴主對法第八論曰凡云孔穴主對者穴名在上病狀在下或一病有數十穴或數病共一穴皆臨時斟酌作法用之其有須針者即針刺以補瀉之不宜針者直爾灸之然灸之大法但其孔穴與針無忌即下白針若溫針訖乃灸之此為良醫其腳氣一病最宜針之若針而不灸灸而不針皆非良醫也針灸而藥藥不針灸亦非良醫也但恨下里間知針者鮮耳所以學者深須解用針燔針白針皆須妙解知針知藥固是良醫頭面第一頭病神庭水溝主寒熱頭痛喘渴目不可視頭維大陵主頭痛如破目痛如脫崑崙曲泉飛揚前谷少澤通里主頭眩痛竅陰強間主頭痛如錐刺不可以動腦戶通天腦空主頭重痛消濼主寒熱痹頭痛攢竹承光腎俞絲竹空瘛脈和髎主風頭痛又云瘛脈主風頭耳後痛上星主風頭眩顏清又云上星主風頭引頷痛囟會主風頭眩頭痛顏清天牖風門崑崙關元關衝主風眩頭痛合谷五處主風頭熱前頂後頂頷厭主風眩偏頭痛玉枕主頭半寒痛甲乙云頭眩目痛頭半寒天柱陶道大杼一作本神孔最後溪主頭痛目窗中渚完骨命門豐隆太白外丘通谷京骨臨泣小海承筋陽陵泉主頭痛寒熱汗出不惡寒項病少澤前谷後溪陽谷完骨小海崑崙攢竹主項強急痛不可以顧消濼本神通天強間風府喑門天柱風池齦交天衝陶道外丘通谷玉枕主項如拔不可左右顧天容前谷角孫腕骨支正主頸腫項痛不可顧又云天容主頸項癰不能言角孫主頸頷柱滿飛揚湧泉頷厭後頂主頸項疼歷節汗出面病攢竹齦交玉枕主面赤頰中痛上星囟會前頂腦戶風池主面赤腫巨髎主面惡風寒頰腫痛天突天窗主麵皮熱又云天窗主頰腫痛腎俞內關主面赤熱行間主面蒼黑太衝主面塵黑中渚主顳顬痛頷顱熱痛面赤懸釐主麵皮赤痛目病大敦主目不欲視太息大都主目眩承漿前頂天柱腦空目窗主目眩瞑天柱陶道崑崙主目眩又目不明目如脫腎俞內關心俞復溜大泉腕骨中渚攢竹精明百會委中崑崙天柱本神大杼頷厭通谷曲泉後頂胃俞絲竹空主目䀮䀮不明惡風寒陽白主目瞳子痛癢遠視䀮䀮昏夜無所見液門前谷後溪腕骨神庭百會天柱風池天牖心俞主目泣出又云天牖主目不明耳不聰至陰主目翳後溪主眥爛有翳丘墟主視不精了目翳瞳子不見前谷京骨主目中白翳又云京骨主目反白白翳從內眥始精明齦交承泣四白風池巨髎上星肝俞瞳子髎主目淚出多眵䁾內眥赤痛癢生白膚翳照海主目痛視如見星肝俞主熱病瘥後食五辛多患眼暗如雀目陽白上星本神大都曲泉俠溪三間前谷攢竹玉枕主目系急目上插絲竹空前頂主目上插憎風寒承泣主目瞤動與項口相引甲乙經云目不明淚出目眩瞢瞳子癢遠視䀮䀮昏夜無見目瞤動與項口參相引喎僻口不能言三間前谷主目急痛申脈主目反上視若赤痛從內眥始陽溪陽谷主目赤痛曲泉主目赤腫痛陽谷太衝崑崙主目急痛赤腫又云太衝主下眥痛束骨主眥爛赤液門主目澀暴變顴髎內關主目赤黃二間主眥傷商陽巨髎上關承光瞳子髎絡卻主青盲無所見期門主目青而嘔風池腦戶玉枕風府上星主目痛不能視先取譩嘻後取天牖風池大泉主目中白睛青俠溪主外眥赤痛逆寒泣出目癢鼻病神庭攢竹迎香風門合谷至陰通谷主鼻鼽清涕出曲差上星迎香素髎水溝齦交通谷禾髎風府主鼻窒喘息不利鼻喎僻多涕鼽衄有瘡水溝天牖主鼻不收涕不知香臭甲乙云鼻鼽不能息及衄不止齦交主鼻中息肉不利鼻頭額頞中痛鼻中有蝕瘡承靈風池風門譩嘻後溪主鼻衄窒喘息不通腦空竅陰主鼻管疽發為癘鼻風門五處主時時嚏不已肝俞主鼻中酸中脘三間偏歷厲兌承筋京骨崑崙承山飛揚隱白主頭熱鼻衄又云中脘主鼻間焦臭天柱主不知香臭復溜主涎出鼻孔中痛京骨申脈主鼻中衄血不止淋濼厲兌京骨前谷主鼻中不利涕黃耳病上關下關四白百會顱息翳風耳門頷厭天窗陽溪關衝液門中渚主耳痛鳴聲天容聽會聽宮中渚主聾嘈嘈若蟬鳴天牖四瀆主暴聾少商主耳前痛曲池主耳痛外關會宗主耳渾渾淳淳聾無所聞前谷後溪主耳鳴仍取偏歷大陵腕骨陽谷肩貞竅陰俠溪主頷痛引耳嘈嘈耳鳴無所聞商陽主耳中風聾鳴刺入一分留一呼灸三壯左取右右取左如食頃口病承注四白巨髎禾髎上關大迎顴骨強間風池迎香水溝主喎僻不能言頰車顴髎主口僻痛惡風寒不可以嚼外關內庭三里大泉甲乙云口僻刺太淵引而下之商丘主僻噤水溝齦交主口不能噤水漿喎僻齦交上關大迎翳風主口噤不開引鼻中合谷水溝主唇吻不收喑不能言口噤不開商丘曲鬢主口噤不開地倉大迎主口緩不收不能言下關大迎翳風主口失欠下牙齒痛膽俞商陽小腸俞主口舌乾飲食不下勞宮少澤三間太衝主口熱口乾口中爛又云勞宮主大人小兒口中腫腥臭曲澤章門主口乾太溪少澤主咽中干口中熱唾如膠兌端目窗正營耳門主唇吻強上齒齲痛光明臨泣主喜齧頰解溪主口痛齧舌京骨陽谷主自齧唇一作頰陽陵泉主口苦嗌中介介然舌病廉泉然谷甲乙作通谷陰谷主舌下腫難言舌瘲涎出風府主舌緩喑不能言舌急語難扶突大鐘竅陰主舌本出血魚際主舌上黃身熱尺澤主舌乾脅痛關衝主舌卷口乾心煩悶中衝主舌本痛支溝天窗扶突曲鬢靈道主暴喑不能言天突主挾舌縫脈青復溜主舌卷不能言齒病厲兌三間衝陽偏歷小海合谷內庭復溜主齲齒浮白主牙齒痛不能言大迎顴髎聽會曲池主齒痛惡寒陽谷正營主上牙齒痛陽谷液門商陽二間四瀆主下齒痛角孫頰車主牙齒不能嚼下關大迎翳風完骨主牙齒齲痛曲鬢衝陽主齒齲喉咽病風府天窗勞宮主喉嗌痛扶突天突天溪主喉鳴暴忤氣哽少商太衝經渠主喉中鳴魚際主喉中焦乾水突主咽喉腫液門四瀆主呼吸氣短咽中如息肉狀間使主嗌中如扼甲乙作行間少衝主咽中酸少府蠡溝主嗌中有氣如息肉狀中渚支溝內庭主嗌痛復溜照海太衝中封主嗌乾前谷照海中封主咽偏腫不可以咽湧泉大鐘主咽中痛不可納食然谷太溪主嗌內腫氣走咽喉不能言風池主咽喉僂引項攣不收喉痹病完骨天牖前谷主喉痹頸項腫不可俯仰頰腫引耳後中府陽交主喉痹胸滿塞寒熱天容缺盆大杼膈俞雲門尺澤二間厲兌湧泉然谷主喉痹哽咽寒熱天鼎氣舍膈俞主喉痹噎哽咽腫不得消飲食不下天突主喉痹咽乾急大陵偏歷主喉痹嗌乾璇璣鳩尾主喉痹咽腫水漿不下三間陽溪主喉痹咽如哽神門合谷風池主喉痹三里溫溜曲池中渚豐隆主喉痹不能言關衝竅陰少澤主喉痹舌卷口乾凡喉痹脅中暴逆先取衝脈後取三里雲門各瀉之又刺手小指端出血立已心腹第二胸脅病通谷章門曲泉膈俞期門食竇陷谷石門主胸脅支滿大杼心俞主胸中鬱郁本神顱息主胸脅相引不得側肝俞脾俞志室主兩脅急痛腎俞主兩脅引痛神堂主胸腹滿三間主胸滿腸鳴陽溪天容主胸滿不得息期門缺盆主胸中熱息賁脅下氣上曲池人迎神道章門中府臨泣天池璇璣府俞主胸中滿支溝主脅腋急痛腕骨陽谷主脅痛不得息豐隆丘墟主胸痛如刺竅陰主脅痛咳逆臨泣主季脅下支痛胸痹不得息陽輔主胸脅痛陽交主胸滿腫環跳至陰主胸脅痛無常處腰脅相引急痛太白主胸脅脹切痛甲乙云腸鳴切痛然骨主胸中寒咳唾有血大鐘主胸喘息脹膽俞章門主脅痛不得臥胸滿嘔無所出大包主胸脅中痛膻中天井主心胸痛膺窗主胸脅癰腫華蓋紫宮中庭神藏靈墟胃俞俠溪步廊商陽上廉三里氣戶周榮上脘勞宮湧泉陽陵泉主胸脅柱滿乳根主胸下滿痛雲門中府隱白期門肺俞魂門大陵主胸中痛又云雲門主胸中暴逆鳩尾主胸滿咳逆巨闕間使主胸中淡淡又云間使主胸痹背相引中脘承滿主脅下堅痛梁門主胸下積氣大泉主胸滿噭呼胸膺痛魚際主痹走胸背不得息關元期門少商主脅下脹經渠丘墟主胸背急胸中彭彭尺澤少澤主氣短脅痛心煩少衝主胸痛口熱凡胸滿氣短不得汗皆針補手太陰以出汗心病支溝太溪然谷主心痛如錐刺甚者手足寒至節不息者死又云然谷主心如懸少氣不足以息大都太白主暴泄心痛腹脹心痛尤甚臨泣主胸痹心痛不得反側甲乙云不得息痛無常處行間主心痛色蒼蒼然如死灰狀終日不得太息通谷巨闕太倉心俞膻中神府郤門曲澤大陵主心痛通里主卒痛煩心心中懊憹數欠頻伸心下悸而悲恐期門長強天突俠白中衝主心痛短氣尺澤主心痛彭彭然心煩悶亂少氣不足以息腎俞復溜大陵雲門主心痛如懸章門主心痛而嘔建里主心痛上搶心不欲食少衝主心痛而寒大泉主心痛肺脹胃氣上逆鳩尾主心寒脹滿不得食息賁唾血厥心痛善噦心疝太息上脘主心痛有三蟲多涎不得反側中脘主心痛難以俯仰甲乙云身寒心疝沖冒死不知人不容期門主心切痛喜噫酸盲門主心下大堅靈道主心痛悲恐相引瘛瘲間使主心懸如飢商丘主心下有寒痛又主脾虛令人病不樂好太息凡卒心痛汗出刺大敦出血立已內關主凡心實者則心中暴痛虛則心煩惕然不能動失智腹病復溜中封腎俞承筋陰包承山大敦主小腹痛又云復溜主腹厥痛石門商丘主小腹堅痛下引陰中氣海主小腹疝氣遊行五臟腹中切痛關元委中照海太溪主小腹熱而偏痛膈俞陰谷主腹脹胃脘暴痛及腹積聚肌肉痛高曲主腹中積聚時切痛一名商曲四滿主腹僻切痛天樞主腹中盡痛外陵主腹中盡痛崑崙主腹痛喘暴滿氣衝主身熱腹痛腹結主繞臍痛搶心衝門主寒氣滿腹中積疼淫濼間使主寒中少氣隱白主腹中寒冷氣脹喘鳩尾主腹皮痛瘙癢中極主腹中熱痛水分石門主小腹中拘急痛巨闕上脘石門陰蹺主腹中滿暴痛汗出行間主腹痛而熱上柱心心下滿太溪主腹中相引痛湧泉主風入腹中小腹痛豐隆主胸痛如刺腹若刃切痛脹滿病中極主小腹積聚堅如石小腹滿又云中極主腹中熱痛通谷主結積留飲癖囊胸滿飲食不消膀胱俞主堅結積聚上脘主心下堅積聚冷脹胃脘三焦俞主小腹積聚堅大如盤胃脹飲食不消三里章門京門厲兌內庭陰谷絡卻崑崙商丘曲泉陰陵泉主腹脹滿不得息又云陰陵泉主腹中脹不嗜食脅下滿腹中盛水脹逆不得臥又云商丘主腹中滿響響然不便心下有寒痛隱白主腹脹逆息又云主腹滿喜嘔尺澤主腹脹喘振栗解溪主腹大下重又云解溪主厥氣上柱腹大大鐘主腹滿便難肝俞胞盲主小腹滿水道主小腹脹滿痛引陰中日月大橫主小腹熱欲走太息委中主小腹堅腫關元主寒氣入腹懸樞主腹中積上下行懸鐘主腹滿脾俞大腸俞主腹中氣脹引脊痛食飲多而身羸瘦名曰食晦先取脾俞後取季肋陰市主腹中滿痿厥少氣丘墟主大疝腹堅京門主寒熱䐜脹高曲主腹中積聚盲俞主大腹寒疝甲乙云大腹寒中天樞主腹脹腸鳴氣上衝胸氣衝主腹中大熱不安腹有大氣暴脹滿癃淫濼太衝主羸瘦恐懼氣不足腹中悒悒期門主腹大堅不得息脹痹滿小腹尤大太陰郤主腹滿積聚太溪主腹中脹腫衝門主寒氣腹滿腹中積聚疼痛巨闕上脘主腹脹五臟脹心腹滿中脘主腹脹不通疰大便堅憂思損傷氣積聚腹中甚痛作膿腫往來上下陰交主五臟遊氣三里行間曲泉主腹䐜滿陷谷主腹大滿喜噫衝陽主腹大不嗜食五里主心下脹滿而痛上氣太白公孫主腹中脹食不化鼓脹腹中氣大滿漏谷主腸鳴強欠心悲氣逆腹䐜滿急蠡溝主數噫恐悸氣不足腹中悒悒凡腹中熱喜渴涎出是蛔也以手聚而按