丘主痔骨蝕喜魘夢天窗天突主漏頸痛勞宮主熱痔承筋承扶委中陽谷主痔痛腋下腫會陰主痔與陰相通者死俠溪陽輔太衝主腋下腫馬刀瘻竅陰主癰疽頭痛如錐刺不可以動動則煩心大陵支溝陽谷後溪主痂疥㿗疝病曲泉主㿗疝陰跳痛引臍中不尿陰痿又云痛引莖中關元主㿗疝又云主暴疝痛中都主㿗疝崩中中脘主沖疝冒死不知人合陽中郤主㿗疝崩中腹上下痛及腸澼陰暴敗痛照海主四肢淫濼身悶陰暴起疝太溪主胞中有大疝瘕積聚與陰相引痛商丘主陰股內痛氣癰狐疝走上下引小腹痛不可以俯仰肩井傍肩解與臂相接處主偏㿗巨闕主狐疝四滿主臍下疝積甲乙云主胞中有血臍中石門天樞氣海主小腹疝氣遊行五臟繞臍痛沖胸不得息甲乙云臍疝繞臍痛沖胸不得息灸臍中石門天樞主之大敦主卒暴疝痛陰跳上入腹寒疝陰挺出偏大腫臍腹中悒悒不樂小便難而痛灸刺之立已左取右右取左甲乙云照海主之衝門太陰郤主疝瘕陰疝天樞主氣疝嘔大巨主㿗疝偏枯交信主氣癃㿗疝陰急股樞膊內廉痛中封主㿗疝癃暴痛痿厥身體不仁氣衝主㿗陰腫痛陽痿莖中痛兩丸騫痛不可仰臥少府主陰痛實時挺長寒熱陰暴痛遺尿偏虛則暴癢氣逆卒疝小便不利大赫然谷主精溢陰上縮中極主失精陰市主寒疝下至腹腠膝腰痛如清水小腹諸疝按之下至膝上伏兔中寒疝痛腹滿痿少氣五樞主陰疝兩丸上下小腹痛太衝中封地機主㿗疝精不足又云太衝主狐疝嘔厥魚際主陰濕腹中余疾陰交石門主兩丸騫又云石門主腹滿疝積太衝主兩丸騫縮腹堅不得臥陰谷主陰痿不用小腹急引陰內廉痛會陰主陰頭寒行間主莖中痛雜病第七論曰膏肓俞無所不治主羸瘦虛損夢中失精上氣咳逆狂惑忘誤取穴法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得搖動從胛骨上角摸索至胛骨下頭其間當有四肋三間灸中間依胛骨之裡肋間空去胛骨容側指許摩膂肉之表肋間空處按之自覺牽引胸戶中灸兩胛中各一處至六百壯多至千壯當覺氣下礱礱然如流水狀亦當有所下處若無停痰宿疾則無所下也若病人已困不能正坐當令側臥挽上臂令前求取穴灸之求穴大較以右手從右肩上住指頭表所不及者是也左手亦然乃以前法灸之若不能久正坐當伸兩臂者亦可伏衣袱上伸兩臂令人挽兩胛骨使相離不爾胛骨覆穴不可得也所伏衣袱當令大小常定不爾則失其穴也此灸訖後令人陽氣壯旺當消息以自補養取身體平復其穴近第五椎相準望取之當以四椎下二分為準論曰夫昔秦緩不救晉侯之疾以其在膏之下肓之上針藥所不能及者此穴是也時人拙不能求得此穴所以宿疴難遣若能用心方便求得灸之無疾不愈矣三里主腹中寒脹滿腸鳴腹痛胸腹中瘀血小腹脹皮腫陰氣不足小腹堅熱病汗不出喜嘔口苦壯熱身反折口噤鼓頷腰痛不可以顧顧而有所見喜悲上下求之口僻乳腫喉痹不能言胃氣不足久泄痢食不化脅下柱滿不能久立膝痿寒熱中消穀苦飢腹熱身煩狂言乳癰喜噫惡聞食臭狂歌妄笑恐怒大罵霍亂遺尿失氣陽厥悽悽惡寒頭眩小便不利喜噦凡此等疾皆灸刺之多至五百壯少至二三百壯湧泉主喜喘喉痹身熱痛脊脅相引忽忽喜忘陰痹腹脹腰痛大便難肩背頸項痛時眩男子如蠱女子如阻身體腰脊如解不欲食喘逆足下清至膝咽中痛不可納食喑不能言小便不利小腹痛風入腸中癲疾挾脊痛急胸脅柱滿痛衄不止五疝指端盡痛足不踐地凡此諸疾皆主之婦人病第八小腹堅痛月水不通刺帶脈入六分灸五壯在季肋端一作下一寸八分漏下若血閉不通逆氣脹刺血海入五分灸五壯在膝臏上內廉白肉際二寸半漏血小腹脹滿如阻體寒熱腹遍腫刺陰谷入四分灸三壯在膝內輔骨後大筋之下小筋之上屈膝乃得之甲乙云漏血小便黃陰谷主之女子疝瘕按之如以湯沃兩股中小腹腫陰挺出痛經水來下陰中腫或癢漉青汁如葵羹血閉無子不嗜食刺曲泉在膝內輔骨下大筋上小筋下陷中屈膝乃得之刺入六分灸三壯疝瘕按之如以湯沃股內至膝飧泄陰中痛少腹痛堅急重下濕不嗜食刺陰陵泉入二分灸三壯在膝下內側輔骨下陷中伸足乃得之經逆四肢淫濼陰暴跳疝小腹偏痛刺陰蹺入三分灸三壯在內踝下容爪甲即照海穴也小腹大字難嗌乾嗜飲挾脊疝刺中封入四分灸三壯在內踝前一寸半伸足取之女子不字陰暴出經漏刺然谷入三分灸三壯在足內踝前起大骨下陷中字難若胞衣不出泄風從頭至足刺崑崙入五分灸三壯在足外踝後跟骨上月事不利見赤白而有身反敗陰寒刺行間入六分灸三壯在足大趾間動應手月閉溺赤脊強互引反折汗不出刺腰俞入二寸留七呼灸三壯在第二十一椎節下間絶子瘧寒熱陰挺出不禁白瀝痓脊反折刺上髎入二寸留七呼灸三壯在第一空腰髁下一寸挾脊赤白瀝心下積脹腰痛不可俯仰刺次髎入三寸留七呼灸三壯在第二空挾脊陷中赤淫時白氣癃月事少刺中髎入二寸留七呼灸三壯在第三空挾脊陷中下蒼汁不禁赤瀝陰中癢痛引小腹控䏚不可以俯仰刺腰尻交在兩胛痏數髮針立已一云下髎腸鳴泄注刺下髎入二寸留七呼灸三壯在第四空挾脊陷中赤白裡急瘛瘲刺五樞入一寸灸五壯在帶脈下三寸拘攣腹滿疝月事不下乳余疾絶子陰癢賁豚上䐜腹堅痛下引陰中不得小便刺陰交入八分灸五壯在臍下一寸腹滿疝積乳余疾絶子陰癢奔豚上䐜小腹堅痛下引陰中不得小便刺石門入五分在臍下二寸忌灸絶孕絶子衃血在內不下胞轉不得尿小腹滿石水痛刺關元入二寸灸七壯在臍下三寸又主引脅下脹頭痛身背熱奔豚寒小便數泄不止子門不端小腹苦寒陰癢及痛奔豚搶心飢不能食腹脹經閉不通小便不利乳余疾絶子內不足刺中極入二寸留十呼灸三壯在臍下四寸赤白沃陰中干痛惡合陰陽小腹䐜堅小便閉刺屈骨入一寸半灸三壯在中極下一寸月事不通奔泄氣上下引腰脊痛刺氣穴入一寸灸五壯在四滿下一寸胞中痛惡血月水不以時休止腹脹腸鳴氣上衝胸刺天樞入五分灸三壯去肓俞一寸半小腹脹滿痛引陰中月水至則腰背痛胞中瘕子門寒大小便不通刺水道入二寸半灸五壯在大巨下三寸月水不利或暴閉塞腹脹滿癃淫濼身熱乳難子上搶心若胞不出衆氣盡亂腹中絞痛不得反息正仰臥屈一膝伸一膝並氣衝上針入三寸氣至瀉之在歸來下一寸動脈應手産余疾食飲不下奔豚上下傷食腹滿刺期門入四分灸五壯在第二肋端乳癰驚痹脛重足跗不收跟痛刺下廉入三分灸三壯在上廉下三寸月水不利見血而有身則敗乳腫刺臨泣入二分灸三壯在足小趾次趾間去俠溪一寸半女人疝及小腹腫溏泄癃遺尿陰痛面塵黑目下眥痛漏血刺太衝入三分灸三壯在足大趾本節後二寸中動脈女子疝赤白淫下時多時少暴腹痛刺蠡溝入三分灸三壯在內踝上五寸女子無子咳而短氣刺湧泉入三分灸三壯在足心陷者中乳難子上衝心陰疝刺衝門入七分灸五壯在府舍下上去大橫五寸女子不下月水痹驚善悲不樂如墮墜汗不出刺照海入四分灸二壯在內踝下四分又主女子淋陰挺出四肢淫濼血不通刺會陰入二寸留七呼灸三壯在大便前小便後子臟中有惡血內逆滿痛刺石關入一寸灸五壯在陰都下一寸肓門主乳余疾三里主乳癰有熱神封膺窗主乳癰寒熱短氣臥不安乳根主膺腫乳癰淒索寒熱痛不可按太溪俠溪主乳癰腫潰又云俠溪主小腹堅痛月水不通大泉主妒乳膺胸痛大赫主女子赤沃四滿主子臟中有惡血內逆滿痛疝又云主胞中有血中極主拘攣腹疝月水不下乳余疾絶子陰癢氣衝主無子小腹痛支溝主女人脊忽目赤築賓主大疝絶子陰廉主絶産湧泉陰谷主男子如蠱女子如阻身體腰脊如解不欲食大泉照海主不字陰暴出淋漏月水不來多悶而心下痛又云照海主陰挺下血陰中腫或癢漉青汁若葵汁小兒病第九本神前頂囟會天柱主小兒驚癇臨泣主小兒驚癇反視顱息主癇喘不得息然谷主小兒臍風口不得開善驚瘈脈長強主小兒驚癇瘛瘲多吐泄注驚恐失精瞻視不明眵䁾懸鐘主小兒腹滿不能食飲譩嘻主小兒食晦頭痛
