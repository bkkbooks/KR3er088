上十一味㕮咀以水六升合竹瀝煎取二升七合分三服頓服三兩劑佳茵芋湯治風虛眩眼暗方茵芋一分人參甘草蓯蓉黃耆茯苓秦艽厚朴烏喙各一兩防風十兩山茱萸松實各三兩上十二味㕮咀以水一斗煮取二升半分五服強者一日夜盡羸劣者二日盡鴟頭酒治頭風眩轉面上遊風方飛鴟頭五枚茯神一方無防風川芎薯蕷各四兩葛根桂心細辛人參天雄乾薑枳實貫衆蜀椒各二兩獨活二兩山茱萸麥門冬一作天門冬石南一作石膏各五兩上十八味㕮咀絹囊盛清酒四斗漬六宿初服二合日再稍加以知為度大三五七散治頭風眩口喎目斜耳聾方天雄局方用附子細辛各三兩山茱萸乾薑各五兩薯蕷防風各七兩上六味治下篩以清酒服五分匕日再不知稍加千金翼云亦治面骨疼痛小三五七散治頭風目眩耳聾方天雄三兩山茱萸五兩薯蕷十兩上三味治下篩以清酒服五分匕日再不知稍增以知為度茯神湯治風眩倒屋轉吐逆惡聞人聲方茯神獨活各四兩黃耆遠志防風各五兩生薑三兩人參白朮甘草附子蓯蓉當歸牡蠣各二兩上十三味㕮咀以勞水一斗二升煮取三升服五合一日夜盡防風散治頭面風在眉間得熱如蟲行或頭眩目中淚出方防風五兩桂心天雄細辛人參附子烏頭乾薑硃砂各二兩莽草茯苓當歸各二兩上十二味治下篩酒服方寸匕日三又方治風頭眩惡風吐冷水心悶方防風二兩桂心一兩半天雄翼方作人參細辛附子薯蕷澤瀉一作澤蘭茯苓各一兩乾薑半兩白朮二兩半上十味治下篩酒服方寸匕常令酒氣相接則脫巾帽解發梳頭百過復投一升酒便洗手足須臾自熱解發以粉粉之快然便熟眠愈亦可洗頭面汗出翼云如服寒食散法治風眩翻倒無定方獨活六兩石膏蒴藋各四兩枳實三兩一方用松實上四味㕮咀以清酒八升煮取四升頓服之以藥滓尉頭覆眠取汗覺冷又納鐺中炒令熱尉之治患頭眩經久得瘥後四體漸羸食無味好食黃土方曲二斤白朮三斤上二味為末酒和並手丸如梧子曝乾飲服三十丸日三斷食土為效治頭中五十種病方巴戟菊花川芎乾薑栝蔞根防風石南白朮烏頭山茱萸附子細辛薯蕷蜀椒乾地黃人參桔梗秦艽澤瀉甘草天雄羌活等分上二十二味治下篩以酒服方寸匕日三摩頭散治同前䕡茹半夏蜀椒各六分烏頭八分桂心七分莽草四分附子細辛各一兩上八味治下篩以大酢和摩頭記日數三日頭膚痛四五日後一著藥如前十日以酢漿洗頭復摩藥即愈若生息肉並咽喉中息肉大如棗欲塞以藥摩之即愈耳鼻齒有疾並用之良入頂散治頭面脹滿腦瘛偏枯發作有時狀如刀刺失聲陰陰然疼面目變青方山茱萸芎藭防風獨活各一兩半細辛莽草白朮薯蕷牛膝石南甘草各一兩烏頭通草菖蒲附子麻黃天雄蜀椒桔梗各一兩六銖上十九味治下篩酒服方寸匕日三杏仁膏治上氣頭面風頭痛胸中氣滿奔豚氣上下往來心下煩熱産婦金瘡諸病方杏仁一升上一味搗研以水一斗濾取汁令盡以銅器煻火上從旦煮至日入當熟如脂膏下之空腹酒服一方寸匕日三不飲酒者以飲服之慎豬魚蒜酢大豆酒治頭風方大豆三升炒令無聲上一味以一斗二升瓶盛清酒九升乘豆熱即傾著酒中密泥頭七日溫服之治中風頭痛發熱耳頰急方麻黃葛根石膏桂心各三兩附子芍藥甘草秦艽防風各二兩生薑五兩上十味㕮咀以水一斗煮取三升分三服覆取汗薯蕷散治頭目有風牽引目睛疼痛偏視不明方薯蕷三兩細辛二兩半秦艽天雄各二兩獨活桂心山茱萸各二兩半上七味治下篩酒服方寸匕日三治頭中痛身熱風熱方竹瀝二升升麻生薑杏仁各三兩柴胡芍藥各四兩石膏生葛根各八兩上八味㕮咀以水六升合竹瀝煮取二升七合分三服菊花散治頭面遊風方菊花一兩細辛附子桂心乾薑巴戟人參石南天雄茯苓秦艽防己各二兩防風白朮山茱萸薯蕷各三兩蜀椒五合上十七味治下篩酒服方寸匕日三治頭面上風方松脂石鹽杏仁蜜蠟各一兩薰陸香二兩萆麻仁三兩上六味熟搗作餅淨剃百會上發貼膏膏上安紙三日一易若癢刺藥上不久風定頭風摩散方附子一枚中形者鹽如附子大上二味治下篩沐頭竟以方寸匕摩頂上日三治頭風方服荊瀝不限多少取瘥止又方蔓荊子一升為末絹袋盛以酒一斗浸七日溫服三合日三又方搗蒴藋根一升酒二升漬服汗出止又方臘月烏雞屎一升炒令黃為末絹袋盛以酒三升浸溫服任性常令醺酣又方七月七日以麻勃三斗麻子一石末相和蒸之沸湯一石五斗三遍淋之煮取一石漬神麯二十斤令發釀黍米二石五斗熟封三七日服清一升百日身中澀皮八風胸膈五臟骨髓伏風百病悉出治猝中惡風頭痛方搗生烏頭以大酢和塗故布上敷痛處須臾痛止日夜五六敷逐痛處敷之搗烏頭須去皮又方鹽一升為末以麻油二升煎一宿令消盡塗頭石鹽尤良又方芥子為末酢和敷頭一周時沐頭湯治肺勞熱不問冬夏老少頭生白屑瘙癢不堪然肺為五臟之蓋其勞損傷肺氣衝頭頂致使頭癢多生白屑搔之隨手起人多患此皆從肺來方大麻子秦椒各三升皂莢屑半升肘後無上三味熟研納泔中一宿漬去滓木篦攪百遍取藭乃用沐頭髮際更別作皂莢湯濯之然後敷膏又方菊花獨活茵芋防風細辛蜀椒皂莢杜蘅莽草桂心等分上十味作湯沐及尉之又方豬椒根三兩麻黃根防風各二兩細辛茵芋各一兩右五味以水三斗煮取一斗去滓溫沐頭又方蜀椒二升煮水沐發良又方葶藶子煮湯沐不過三四度愈又方以桑灰汁沐頭去屑神良治頭項強不得顧視方蒸好大豆一斗令變色納囊中枕之又方常以九月九日取菊花作枕臥良又方八月後取荊芥鋪床及作枕枕頭立春日去之又方穿地作小坑燒令赤以水沃之令小冷納生桃葉滿布席就臥令項當藥上以衣著項兩邊令氣蒸病上汗出良久愈若病大者作地坑亦大犀角湯治風毒熱頭面腫方犀角生薑各二兩苦參栝蔞根防風各一兩石膏六兩青木香黃芩升麻各三兩防己一兩半竹葉二握上十一味㕮咀以水七升煮取二升分三服相去十里久內消不利防風散治頭面遍身風腫方防風二兩白芷一兩白朮三兩上三味治下篩酒服方寸匕日三治猝中風頭面腫方搗杏仁如膏以雞子黃合搗令相得敷帛上厚裹之自干不過八九敷即瘥令白髮還黑方烏麻九蒸九曝為末棗膏為丸久服之又方旋覆花一升桂心一尺秦椒一升隴西白芷一升上四味治下篩井花水服方寸匕日三服三十日白髮還黑禁房室沐頭湯治脈極虛寒鬚髮落墮令發潤澤方桑根白皮切三升以水五升淹漬煮五六沸去滓洗沐發數數為之自不復落又方麻子三升碎白桐葉切一把上二味以米泔二斗煮五六沸去滓洗沐則髮長甚有驗治髮鬢墮落令生長方生柏葉一升切附子四枚豬膏三升上三味為末膏和作三十丸用布裹一丸納泔中煎沐髮長不落其藥密貯勿令泄氣又方柏子仁附子蔓荊子各半兩上三味以烏雞膏和搗三千杵貯新瓷器中封百日出以馬鬃膏和敷頭訖巾裹之勿令見風日三敷即生肘後不用柏子仁以酒漬澤沐又方桑葉麻葉等分上二味泔煮去滓沐發七遍長六尺又方羊糞灰淋湯三日一洗不過十次大生摩膏治頭中二十種病頭眩發禿落面中風者方蜀椒莽草各二兩桂心䕡茹附子細辛各一兩半半夏乾薑各一兩上八味㕮咀以生豬肪二十兩合搗令肪消盡藥成先沐頭令淨後以藥摩囟上日一如非十二月合則用生烏麻油和塗頭皮沐頭令淨乃用之一次生髮如昔必效方無蜀椒莽草乾薑半夏本門摩頭散多烏頭少乾薑但分兩不同生髮膏治頭中風癢白屑方蔓荊子附子細辛續斷零陵香皂莢澤蘭防風杏仁藿香白芷各二兩松葉石南各三兩莽草一兩熊脂三升松膏豬脂馬鬃膏各二升上十八味㕮咀以清醋三升漬藥一宿明旦以馬鬃膏等微火煎三上三下以白芷色黃膏成用以澤發又方烏喙三兩莽草石南細辛續斷皂莢澤蘭白朮辛夷防風白芷各二兩竹葉柏葉松葉各半升豬脂四升上十五味㕮咀以清酢三升漬一宿明旦微火以脂煎三上三下白芷色黃膏成去滓濾淨於沐發後塗之一方用生油三大升翼方無石南白芷用杏仁去白屑良又方甘松香丁香白芷澤蘭桑白皮桑寄生大麻子苜蓿杏仁辛夷仁牡荊子川芎防風莽草各一兩零陵香吳藿香細辛蜀椒各二兩竹葉松葉柏葉胡麻油臘豬膏各一升烏雞肪雁肪各一合上二十五味㕮咀以酢漬一宿納油膏中微火煎三上三下白芷色黃膏成去滓塗頭日二夜一發生又方治髮鬢禿落方莽草一兩防風升麻白芷薺苨各二兩蜣螂四枚豹膏一作狗膏熊膏一作雄雞膏豬脂馬鬃膏各半升驢鬃膏半升上十一味其六味㕮咀與諸膏合煎諸藥沸則下停冷復上火三五沸止絞去滓敷頭當澤用之又方治眉落髮落復生方白芷附子防風川芎莽草辛夷細辛黃芩當歸蜀椒各一兩大黃一兩半蔓荊子一升豬膏三升馬鬃膏五合上十四味熬膏去滓先洗頭後用膏敷如常澤法勿近面面生毛也治染鬚髮方胡粉二兩石灰六兩絹篩熬令黃上二味以榆皮作湯和之如粉先以皂莢湯洗髮令極淨不得令有膩氣曝乾夜臥以藥塗發上令勻取桑葉相綴著頭巾上遍以裹發一夜至旦取酢漿暖三遍淨洗髮又以醋泔熱暖洗髮又取生胡麻苗搗取汁三升和水煮一二沸淨濾濯發訖又用油湯濯之百日黑如漆又方黑椹水漬之塗發令黑又方鹽湯洗沐後以生麻油和蒲葦灰敷之一作治白禿又方生麻油漬烏梅常用敷頭治發黃方臘月豬油和羊屎灰蒲灰等分敷封頭三日一度又方大豆五升酢漿水二斗煮取五升沐之治髮鬢黃赤方燒梧桐灰用乳汁和塗敷髮鬢並膚肉即黑治風頭毛髮落不生方鐵上生衣研以臘月豬脂和塗之日三亦治眉落生眉毛方鐵上生衣牆上青衣右二味等分為末水和塗之即生又方七月烏麻花陰乾為末以生烏麻油漬二日一塗治眉毛鬢髮為火燒瘡瘢毛不生方蒲灰以正月狗腦和敷即生治發落不生令長方麻子一升熬黑壓取油敷頭長髮妙又方多取烏麻花瓷甕盛密蓋深埋土中百日出用塗發令發易長而黑又方用雁肪敷之治鬢黃方新剪爪甲搔令毛孔少血出蜜塗之即生黑毛治發禿者方黑桑椹子二升納缶中日中曝三七日化為水洗瘡上三七日即生髮神效松瀝煎治頭瘡及白禿方松瀝七合丹砂雄黃水銀研各二兩黃連三兩礬石一兩上六味治下篩納瀝中攪研令調以塗之先以泔清洗髮及瘡令無痂然後敷藥二日一敷三敷後當更作膿膿訖更洗凡經三度膿出訖以甘草湯洗去藥毒前後洗十度即瘥治白禿髮落生白痂終年不瘥方雌黃雄黃各一分雞屎白半分松脂蓯蓉各二分蛇床子遠志五味子各三分菟絲子五分白蜜一分上十味治下篩以豬膏一升二合先納雄黃次納雌黃次納雞屎白次納松脂及蜜又次納諸藥煎之膏成先以桑灰汁洗頭燥敷之王不留行湯治白禿及頭面久瘡去蟲止痛方王不留行東南桃枝東引茱萸根皮各五兩蛇床子牡荊子蒺藜子苦竹葉各三升大麻仁一升上八味㕮咀以水二斗半煮取一斗洗瘡日再並療癰疽妒乳月蝕瘡爛松脂膏治白禿及癰疽百瘡方松脂六兩礬石杜蘅一作牡荊雄黃真珠水銀苦參大黃木蘭石南秦艽附子各一兩上十二味㕮咀以醋漬一宿豬膏一斤半煎之以附子色黃去滓礬石雄黃水銀更著火三沸安濕地待凝敷上日三治白禿方羊肉濕脯炙令香及熱速搭上不過三四度癢勿搔之牛肉亦得又方新破豬肚去糞及熱速搭上癢慎勿搔當縛定手日中臥半日後去之又方以皂莢湯淨洗干拭後以陳久油滓塗之日三又方煮桃皮汁飲之並洗又方曲豉二種治下篩酢和敷上又方大豆炒令焦為末和臘豬脂熱暖以匙抄封上遍即裹著勿見風治赤禿方桑灰汁洗頭令淨桑椹搗敷之日中暴頭睡又方馬蹄灰為末以臘月豬脂和敷之又方燒牛角灰和豬脂敷之令發不生方蜂灰鱉脂相和新拔去毛即塗孔上永不生治鬼舐頭方燒貓兒屎以臘月豬脂和敷上又方貓兒毛燒灰以膏和敷之又方研未和蒜搗敷日一度
