body:
  text: 卷十三心臟方凡八類心臟脈論第一論一首論曰心主神神者五臟專精之本也為帝王監領四方夏旺七十二日位在南方離宮火也有生之來謂之精兩精相搏謂之神所以任物謂之心神者心之藏也舌者心之官故心氣通於舌舌和則能審五味矣心在竅為耳夫心者火也腎者水也水火相濟心氣通於舌舌非竅也其通於竅者寄見於耳左耳丙右耳丁循環炎宮上出唇口知味榮華於耳外主血內主五音心重十二兩中有三毛七孔盛精汁三合神名詬詬主藏神號五神居隨節應會故云心藏脈脈舍神在氣為吞在液為汗心氣虛則悲不已實則笑不休心氣虛則夢救火陽物得其時則夢燔灼心氣盛則夢喜笑及恐畏厥氣客於心則夢丘山煙火凡心臟象火與小腸合為腑其經手少陰與太陽為表裡其脈洪相於春旺於夏夏時萬物洪盛垂枝布葉皆下垂如曲故名曰鉤心脈洪大而長洪則衛氣實實則氣無從出大則營氣萌萌洪相薄可以發汗故名曰長長洪相得即引水漿溉灌經絡津液皮膚太陽洪大皆是母軀幸得戊己用牢根株陽氣上出汗見於頭五內乾枯胞中空虛醫反下之此為重虛脈浮有表無里陽無所使不但危身並中其母夏脈如鉤夏脈心也南方火出萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病何如而反其氣來盛去亦盛此謂太過病在外表其來不盛去反盛此謂不及病在內太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄心脈來纍纍如連珠如循琅玕曰平夏以胃氣為本心脈來喘喘連屬其中微曲曰心病心脈來前曲後居如操帶鉤曰心死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而石曰冬病石甚曰今病心藏脈脈舍神怵惕思慮則傷神神傷則恐懼自失破目䐃脫肉毛悴色夭死於冬手少陰氣絶則脈不通少陰者心脈也心者脈之合也脈不通則血不流血不流則髮色不澤面黑如漆柴者血先死壬篤癸死水勝火也心死臟浮之實如豆麻擊手按之益躁疾者死夏心火旺其脈浮大而散一作洪曰平反得弦細而長者是肝之乘心母之歸子為虛邪雖病易治反得大而緩者是脾之乘心子之乘母為實邪雖病自愈反得沉濡而滑者是腎之乘心水之剋火為賊邪大逆十死不治反得微澀而短者是肺之乘心金之凌火為微邪雖病即瘥腎乘心必癃左手關前寸口陰絶者無心脈也若心下熱痛掌中熱時時善嘔口中傷爛剌手少陽治陽左手關前寸口陰實者心實也是心下有水氣憂恚發之剌手心主治陰心脈來纍纍如貫珠滑利再至曰平三至曰離經病四至脫精五至死六至命盡手少陰脈也心脈急甚為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行有時唾血大甚為喉介微大為心痹引背善淚出小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍少腹鳴澀甚為喑微澀為血溢維厥耳鳴癲疾心脈搏堅而長當病舌卷不能言其濡而散者當病消渴自已渴一作環赤脈之至也喘而堅診曰有積氣在中時害於食名心痹得之外疾思慮而心虛故邪從之扁鵲曰心有病則口生瘡腐爛心在聲為笑在變動為憂在志為喜喜傷心精氣並於心則喜心虛則悲悲則憂實則笑笑則喜時主夏病者時間時甚知其源取其輸觀其應審其害病先發於心者心痛一日之肺喘咳三日之肝脅痛支滿五日之脾閉塞不通身痛體重三日不已死於冬半夜夏日中病在心日中慧夜半甚平旦靜假令心病北行若食豚魚得之不者當以冬時發得病以壬癸日也凡心病之狀胸內痛脅支滿兩脅下痛膺背肩胛間痛兩臂內痛虛則胸腹大脅下與腰背相引而痛取其經手少陰太陽舌下血者其變病刺郤中血者心脈沉之小而緊浮之不喘苦心下聚氣而痛食不下喜咽唾時手足熱煩滿時忘不樂喜太息得之憂思心病其色赤心痛短氣手掌煩熱或啼笑罵詈悲思愁慮面赤身熱其脈實大而數此為可治宜服闕宜服者藥春當刺中衝夏刺勞宮季夏刺大陵皆補之秋刺間使冬刺曲澤皆瀉之此是手心主心包經絡又當灸巨闕五十壯背第五椎百壯邪在心則病心痛善悲時眩僕視有餘不足而調之其俞憂愁思慮則傷心心傷則苦驚喜忘善怒心中風者翕翕發熱不能起心中飢餓欲食食則嘔心中寒者其人病心如啖蒜齏狀劇者心痛徹背背痛徹心如蠱注其脈浮者自吐乃愈心傷其人勞倦頭面赤而下重心中痛徹背自煩發熱當臍跳手其脈弦此為心臟傷所致也邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人即畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者即為癲陽氣衰者即為狂五臟者魂魄宅舍精神之依託也魂魄飛揚者其五臟空虛也即邪神居之神靈所使鬼而下之脈短而微其臟不足則魂魄不安魂屬於肝魄屬於肺肺主津液即為涕泣出肺氣衰者即泣出肝氣衰者魂則不安肝主善怒其聲呼心水者其人體腫一作重而少氣不得臥煩而躁其陰大腫真心痛手足青至節心痛甚旦發夕死夕發旦死心腹痛懊惱發作腫聚往來上下行痛有休作心腹中熱善渴涎出者是蛔咬也以手聚而堅持之無令得移以大針刺之久持之蟲不動乃出針腸中有蟲蛔咬皆不可取以小針心脹者煩心短氣臥不安凡心脈急名曰心疝小腹當有形其以心為牡藏小腸為之使故小腹當有形診得心積沉而芤時上下無常處病胸滿悸腹中熱面赤咽乾心煩掌中熱甚則唾血身瘛瘲主血厥夏瘥冬劇色赤也心之積名曰伏梁起於臍上上至心大如臂久久不愈病煩心心痛以秋庚辛日得之何也腎病傳心心當傳肺肺適以秋旺旺者不受邪心復欲還腎腎不肯受因留結為積故知伏梁以秋得之心病煩悶少氣大熱熱上湯心嘔咳吐逆狂語汗出如珠身體厥冷其脈當浮今反沉濡而滑其色當赤而反黑者此是水之剋火為木逆十死不治徵音人者主心聲也心聲笑其音竽其志喜其經手少陰厥逆太陽則營衛不通陰陽反錯陽氣外擊陰氣內傷傷則寒寒則虛虛則驚掣心悸定心湯主之方見十四卷語聲前寬後急後聲不續前混後濁口喎冒昧好自笑此為厲風入心荊瀝湯主之方見前第八卷心虛風寒半身不遂骨節離解緩弱不收便利無度口面喎斜薑附湯主之方見前第八卷此病不盈旬日宜急治之又笑而呻呻而反憂此為水剋火陰擊陽陰起而陽伏伏則實實則傷熱熱則狂悶亂冒昧言多謬誤不可採聽此心已傷若其人口唇正赤可療青黃白黑不可療也心病為虐者令人心煩甚欲得清水反寒多不甚熱方見前第十卷若其人本來心性和雅而忽弊急反於常白朮酒主之方見前第八卷或言未竟便住以手剔腳爪此人必死禍雖未及名曰行尸此心病聲之候也虛則補之實則瀉之不可治者明而察之赤為心心合脈赤如雞冠者吉心主舌舌是心之餘其人火形相比於上徵赤色廣䏖兌面小頭好肩背髀腹小手足行安地疾行搖肩背肉滿有氣輕財少信多慮見事明瞭好顧急心不壽暴死耐春夏不耐秋冬感而生病主手少陰竅竅然𩩲骭長短傾正則心應之正赤色小理者則心小小則邪弗能傷易傷以憂粗理者則心大大則虛虛則寒寒則憂不能傷易傷於邪無𩩲骭者則心高高則實實則熱熱則滿於肺中悶而善忘難開以言𩩲骭小短舉者則心下下則臟外易傷於寒易恐以言𩩲骭長者則心堅堅則臟安守固𩩲骭弱以薄者則心脆脆則善病消疸熱中𩩲骭直下不舉者則心端正端正則和利難傷𩩲骭向一方者則心偏傾偏傾則操持不一無守司也一云若𩩲骭小短薄弱而下則心下下則虛虛則傷寒病憂恚內損心暴痛而好唾清涎口臭蟲齒痛侵唇齒若𩩲骭高起則心高高則實實則熱熱則滿於心悶而善忘恐悸喉燥口痛牙癰舌傷小兒則便祕口重舌鵝口聲嘶方見頭面方中凡人部分陷起者必有病生小腸太陽為心之部其處陷起即病生矣臟舍內外部亦內外沉濁屬內浮清居外若外病內入小腹滿起內病里出所部陷沒外入內前治陽後補陰內出外前補陰後瀉陽陽則實熱陰則虛寒在陽主外在陰主內凡人死生休咎則臟神前變形於外人心前病則口為之張若心前死則枯黑聲語不轉若天中等分墓色應之必死不治看應增損斟酌賒促賒則不出四百日內促則不延旬月之間心病少愈而卒死何以知之曰赤黑色黯點如博棋見顏度年上此必卒死心絶一日死何以知之兩目回回直視肩息立死凡面赤目白憂恚思慮心氣內索麵色反好急求棺槨不過十日死又面黃目赤不死赤如衃血死吉凶之色若在於分部朏朏而見赤黑入口此必死不出其年名曰行尸若年上無應三年之中病必死矣夏火心脈色赤主手太陽也夏取盛經分腠夏者火始治心氣始長脈瘦氣弱陽氣留溢熱熏分腠內至於經故取盛經分腠絶膚而病去者邪居淺也所謂盛經者陽脈也其脈本在外踝之後應在命門之上三寸命門者心上一寸也脈根在少澤少澤在手小指端其筋起於小指之上結於腕上循臂內廉結肘內蛻骨之後彈之應小指之上入結腋下其支者後走腋後廉上繞肩胛循頸出足太陽之筋前結於耳後完骨其支者入耳中直出耳上下結於頷上屬目外眥其脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩骨之間上循臑外後廉出肩解繞肩胛交肩上入缺盆向腋絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴合手少陰為表裡少陰本在鋭骨之端應在背後同會於手太陰其手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃主心生病病實則小腸熱熱則節弛弛則陽病陽脈大反逆於寸口再倍病則嗌痛頷腫耳聾目黃臥不能言悶則急坐虛則小腸寒寒則生疣疣則陰病陰脈反小於寸口過於一倍病則短氣百節病筋急頸痛轉顧不能此盡是手太陽小腸經筋脈支別為病今取心主包絡少陰心經附於後手心主之別名曰內關去腕五寸甲乙作二寸出於兩筋間循經以上繫於心包絡心系氣實則心痛虛則為煩心取之兩筋間手心主之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱肘臂攣急腋腫甚則胸脅支滿心中淡淡大動面赤目黃善笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者則寸口大一倍於人迎虛者則寸口反小於人迎手少陰之別名曰通里在腕後一寸別而上行循經入咽中系舌本屬目系其實則大膈虛則不能言取之掌後一寸別走太陽手少陰之脈起於心中出屬心系上膈絡小腸其支者從心系上挾咽系目系系目系一作循胸出脅其直者復從心系卻上肺出腋下下循臑內後廉行太陰心主之後下肘內廉循臂內後廉抵掌後鋭骨之端入掌後內廉循小指之內出其端是動則病咽乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅滿痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之盛者則寸口大再倍於人迎虛者則寸口反小於人迎手少陰之脈獨無輸何也曰少陰者心脈也心者五臟六腑之大主也為帝王精神之所舍其臟堅固邪不能容容之則傷心心傷則神去神去則身死矣故諸邪在於心者皆在心之包絡包絡者心主之脈也故少陰無輸也少陰無輸心不病乎曰其外經腑病臟不病故獨取其經於掌後鋭骨之端也夏三月主心小腸赤脈㩌病也其源從少陰太陽之氣相搏而停則營衛不通皮肉痛起太陽動發少陰淫邪之氣因而作則臟腑隨時受夏疫病也其病相若腑虛則陰邪氣所傷身戰脈掉捉所不禁若臟實則為陽毒所侵肉熱口開舌破咽塞聲嘶故曰赤脈㩌病方見傷寒卷中扁鵲云灸腎肝心三俞主治丹一作痹毒病當依源為治表治陰陽調和臟腑疾不生矣心虛實第二脈四條方十一首灸法一首心實熱左手寸口人迎以前脈陰實者手少陰經也病苦閉大便不利腹滿四肢重身熱名曰心實熱也石膏湯治心熱實或欲吐吐而不出煩悶喘急頭痛方石膏一斤淡竹葉香豉各一升小麥三升地骨皮五兩茯苓三兩梔子仁三十枚上七味㕮咀先以水一斗五升煮小麥竹葉取八升澄清下諸藥煮取三升去滓分三服外臺名瀉心湯瀉心湯治老小下痢水穀不消腸中雷鳴心下痞滿乾嘔不安方人參黃芩甘草各一兩乾薑一兩半黃連二兩半夏三兩大棗十二枚上七味㕮咀以水八升煮取二升半分三服並治霍亂若寒加附子一枚渴加栝蔞根二兩嘔加橘皮一兩痛加當歸一兩客熱以生薑代乾薑大黃黃連瀉心湯竹瀝湯治心實熱驚夢喜笑恐畏悸懼不安方淡竹瀝一升生地黃汁一升石膏八兩芍藥白朮梔子仁人參各三兩赤石脂紫菀知母茯神各二兩上十一味㕮咀以水九升煮十味至二升七合去滓下竹瀝更煎取三升若須利入芒硝二兩去芍藥分三服茯神煮散治心實熱口乾煩渴眠臥不安方茯神麥門冬各三十六銖通草升麻各三十銖紫菀桂心各十八銖知母一兩赤石脂四十二銖大棗二十枚淡竹茹雞子大一枚上十味治下篩為粗散以綿裹方寸匕井花水二升半煮取九合時動裹子為一服日再安心煮散治心熱滿煩悶驚恐方白芍藥遠志宿薑各二兩茯苓知母赤石脂麥門冬紫菀石膏各四十二銖人參二十四銖桂心麻黃黃芩各三十銖葳蕤三十六銖甘草十銖上十五味治下篩為粗散先以水五升淡竹葉一升煮取三升去滓煮散一方寸匕牢以絹裹煮時動之煎取八合為一服日再治不能食胸中滿膈上逆氣悶熱方灸心俞二七壯小兒減半心虛寒左手寸口人迎以前脈陰虛者手少陰經也病苦悸恐不樂心腹痛難以言心如寒恍惚名曰心虛寒也茯苓補心湯治心氣不足善悲愁恚怒衄血面黃煩悶五心熱或獨語不覺咽喉痛舌本強冷涎出一作汗出茯苓四兩桂心甘草各二兩紫石英人參各一兩麥門冬三兩大棗二十枚赤小豆一十四枚上八味㕮咀以水七升煮取二升半分三服半夏補心湯治心虛寒心中脹滿悲憂或夢山丘平澤者方半夏六兩宿薑五兩茯苓桂心枳實橘皮各三兩白朮四兩防風遠志各二兩上九味㕮咀以水一斗煮取三升分三服牛髓丸通治百病虛瘠羸乏等方牛髓羊髓棗膏白蜜酥各一升麥門冬川芎桂心當歸茯苓一作茯神甘草羌活各三十銖乾地黃乾薑各三十六銖人參五味子防風各一兩白朮四十二銖細辛十八銖上十九味切搗十四味篩別研棗膏和散次納諸髓蜜和攪令相得納銅鉢中於釜湯中煎取堪作丸如梧桐子大酒服三十丸稍加至四十丸日再心小腸俱虛左手寸口人迎以前脈陰陽俱虛者手少陰與巨陽經俱虛也病苦洞泄若寒少氣四肢厥腸澼名曰心小腸俱虛大補心湯治虛損不足心氣弱悸或時妄語四肢損變氣力顏色不榮方黃芩附子各一兩甘草茯苓麥門冬乾地黃桂心阿膠各三兩半夏遠志石膏各四兩生薑六兩飴糖一斤大棗二十枚上十四味取十三味㕮咀以水一斗五升煮取五升湯成下糖分四服補心丸治臟虛善恐怖如魘狀及婦人産後余疾月經不調方當歸防風芎藭附子芍藥甘草蜀椒乾薑細辛桂心半夏厚朴大黃豬苓各一兩茯苓一作茯神遠志各二兩上十六味為末蜜丸如梧子大酒服五丸日三不知加至十丸冷加熱藥心勞第三論一首方一首論曰心勞病者補脾氣以益之脾旺則感於心矣人逆夏氣則手太陽不長而心氣內洞順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣大黃泄熱湯治心勞熱口為生瘡大便苦難閉澀不通心滿痛小腸熱方大黃澤瀉黃芩芒硝梔子仁各三兩桂心通草石膏各二兩甘草一兩大棗二十枚上十味㕮咀用水九升先以水一升別浸大黃一宿餘八升煮諸藥取二升五合去滓下大黃煮兩沸去滓下芒硝令煬分三服脈極第四論一首方一首灸法二首論曰凡脈極者主心也心應脈脈與心合心有病從脈起又曰以夏遇病為脈痹脈痹不已復感於邪內舍於心則飲食不為肌膚咳脫血色白不澤其脈空虛口唇見赤色凡脈氣衰血焦發墮以夏丙丁日得之於傷風損脈為心風心風之狀多汗惡風若脈氣實則熱熱則傷心使人好怒口為赤色甚則言語不快血脫色乾燥不澤飲食不為肌膚若脈氣虛則寒寒則咳咳則心痛喉中介介如哽甚則咽腫喉痹故曰心風虛實候也生地黃煎治脈熱極則血色脫色白乾燥不澤飲食不為肌膚消熱止極強胃氣方生地黃汁生麥門冬赤蜜各一升蓴心一作豉遠志各二升人參白朮茯苓芍藥乾地黃各三兩甘草二兩石膏六兩生葳蕤四兩上十三味十一味㕮咀以水一斗二升煮取二升七合去滓下地黃汁及蜜更煎取三升半分四服灸法胸中痛引腰背心下嘔逆面無滋潤灸上門隨年壯穴在挾巨闕兩邊相去各半寸一云一寸顏色焦枯勞氣失精肩臂痛不得上頭灸肩髃百壯穴在肩外頭近後以手按之有解宛宛中脈虛實第五論一首方三首針灸法二首論曰凡脈虛者好驚跳不定脈實者洪滿凡脈虛實之應主於心小腸若其腑臟有病從熱生則應臟寒則應腑也防風丸補虛調中治脈虛驚跳不定乍來乍去主小腸腑寒方防風桂心通草茯神遠志麥門冬甘草人參白石英各三兩上九味為末白蜜和丸如梧子大酒服三十丸日再加至四十丸升麻湯治脈實洪滿主心熱病方升麻子芩澤瀉梔子仁淡竹葉芒硝各三兩生地黃切一升上七味㕮咀以水九升煮取三升去滓下芒硝分三服麻黃調心泄熱湯調心泄熱治心脈厥大寸口小腸熱齒齲嗌痛方麻黃生薑各四兩細辛子芩茯苓芍藥各五兩白朮二兩桂心一兩生地黃切一升上九味㕮咀以水九升煮取三升去滓分三服須利加芒硝三兩針灸法脈不出針不容穴在幽門兩旁各一寸五分心悶痛上氣牽引小腸灸巨闕二七壯心腹痛第六論一首方二十六首針灸法二十五首論曰寒氣卒客於五臟六腑則發卒心痛胸痹感於寒微者為咳甚者為痛為泄厥心痛與背相引善瘛如物從後觸其心身傴僂者腎心痛也厥心痛腹脹滿心痛甚者胃心痛也厥心痛如以針錐剌其心心痛甚者脾心痛也厥心痛色蒼蒼如死灰狀終日不得太息者肝心痛也厥心痛臥若從心間痛動作痛益甚色不變者肺心痛也真心痛手足青至節心痛甚旦發夕死夕發旦死蛔心痛心腹中痛發作腫聚往來上下行痛有休止腹中熱善涎出是蛔咬也以手按而堅持之勿令得移以大針刺之復久持之蟲不動乃出針心下不可刺中有成聚不可取於俞腸中有蟲蛔咬皆不可取以小針治寒氣卒客於五臟六腑中則發心痛方大黃芍藥柴胡各四兩升麻黃芩桔梗硃砂各三兩鬼臼鬼箭羽桂心朴硝各二兩上十一味㕮咀以水九升煮取二升七合分三服先分硃砂作三份每服納一份攪勻服之得快利如痛不止宜服後方赤芍六兩桔梗杏仁各五兩上三味㕮咀以水六升煮取三升分三服九痛丸治九種心痛並療冷衝上氣落馬墮車血疾等方一蟲心痛二疰心痛三風心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九來去心痛此之謂九痛附子乾薑各二兩吳茱萸人參巴豆各一兩生狼毒四兩上六味為末蜜和丸如梧子大空腹服三丸猝中惡腹脹痛口不能言者服五丸日一服連年積冷流注心胸者亦服之好好將息神驗金匱方用附子三兩乾薑狼牙各一兩治九種心痛方取當太歲上新生槐枝一握去兩頭㕮咀以水三升煮取一升頓服桂心三物湯治心中痞諸逆懸痛方桂心生薑各二兩膠飴半斤上三味取二味㕮咀以水六升煮取三升去滓納飴分三服仲景用枳實五枚不用膠飴肘後用枳實五枚白朮二兩為五味烏頭丸治心痛徹背背痛徹心方烏頭六銖附子蜀椒各半兩乾薑赤石脂各一兩上五味為末蜜丸如梧子大先食服三丸日三不知少增之範汪不用附子服如梧子三丸崔氏用桂半兩為六味治心痛方桃白皮煮汁空腹以意服之崔氏用療疰心痛治暴心痛或如中惡口中涎出不可禁止回回欲吐方苦參十斤上一味㕮咀以水一石煮取二斗去滓下苦酒二斗更煎取五升加大豆黃末熬和煮汁中煎令可丸並手丸之如梧子大每服以酒一升進三四十丸日一當倒腹吐不吐下利更酒浸苦參二斤進丸彌佳非止腹痛心暴痛骭骨等痛凡是腹中之疾悉主之又宿冷血結癊澼頻用有效大良治猝中惡心痛方苦參三兩上一味㕮咀以好醋一升半煮取八合強者頓服老小分二服又方桂心一兩上一味㕮咀以水四升煮取一升半分三服治蟲心痛方鶴蝨為末蜜丸如梧子大服四十丸蜜湯下日一服可加至五十丸慎酒肉又方鶴蝨一兩為末溫醋一盞和空腹服之蟲當吐出又方服漆一合方見後養生服餌篇中凡蟲心痛皆用漆主之五辛湯治心腹冷痛方細辛蜀椒桂心乾薑吳茱萸芍藥防風苦參甘草當歸乾地黃各一兩梔子烏梅大棗各二七枚上十四味㕮咀以水九升煮取三升分四服犀角丸治心腹久痛積年不定不過一時間還發甚則數日不能食又便出乾血窮天下方不能瘥甄立言處此方數日即愈犀角麝香雄黃桔梗莽草鬼臼桂心芫花各半兩甘遂一兩半附子光明砂各六銖貝齒五枚巴豆二十枚赤足蜈蚣二枚上十四味為末蜜丸如梧子飲服一丸日二漸加至三丸以微利為度古今録驗無雄黃高良薑湯治卒心腹絞痛如刺兩脅支滿煩悶不可忍方高良薑五兩厚朴二兩當歸桂心各三兩上四味㕮咀以水八升煮取一升八合分二服日三若一服痛止便停不須更服強者作二服弱者分三服當歸湯治心腹絞痛諸虛冷氣滿痛方當歸芍藥厚朴半夏各二兩桂心甘草黃耆人參各三兩乾薑四兩蜀椒一兩上十味㕮咀以水一斗煮取三升二合分四服羸弱人分六服小品云人冷加附子一枚良又方治虛冷腹痛不下飲食食復不消臚脹者方當歸茯苓各五分黃耆紫菀各四分高良薑乾薑各六分鹿茸桂心肉蓯蓉昆布橘皮各三分甘草二兩烏頭二兩大棗四十枚桃仁一百枚地骨皮法曲大麥糵各一升上十八味㕮咀以水一斗五升煮取四升二合分為五服下利加赤石脂龍骨各三分渴加麥門冬一升又方治寒冷腹中痛方小品云吳茱萸湯當歸二兩桂心甘草人參各一兩生薑五兩半夏小麥各一升吳茱萸二升上八味㕮咀以水一斗五升煮取三升分三服日三亦治産後虛冷又方治冷氣脅下往來沖胸膈痛引脅背悶者方當歸桂心人參甘草吳茱萸芍藥大黃各二兩茯苓枳實各一兩乾薑三兩上十味㕮咀以水八升煮取二升半分三服日三並治尸疰亦佳外臺仲景方無茯苓枳實又方治久寒疾痼胸腹中痛時下痢方當歸三兩附子一兩乾薑甘草柑皮各二兩上五味㕮咀以水八升煮取二升分三服日三又方治久寒宿疾胸腹中痛短氣時滯下痢方當歸桂心各三兩乾薑四兩附子一兩上四味㕮咀以水八升煮取二升分三服日三範汪無附子有甘草二兩云虛冷激痛甚者加黃耆芍藥各二兩溫中當歸湯治心腹中痛發作腫聚往來上下痛有休止多熱喜涎出是蛔蟲咬也二三劑後若不效有異宜改方增