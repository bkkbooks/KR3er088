body:
  text: 卷二十二癰腫毒方凡六類疔腫第一論一首方二十九首證十五首灸法一首論曰夫稟形之類須存攝養將息失度百病萌生故四時代謝陰陽遞興二氣更相擊怒當是時也必有暴氣夫暴氣者每月之中卒然大風大霧大寒大熱若不時避人忽遇之此皆入人四體頓折皮膚流注經脈遂使腠理壅隔營衛結滯陰陽之氣不得宣泄變成癰疽疔毒惡瘡諸腫至於疔腫若不預識令人死不逮辰所以養生之士須早識此方凡是瘡痍無所逃遁凡療疔腫皆刺中心至痛又刺四邊十餘下令血出去血敷藥藥氣得入針孔中若不達瘡內療不得力又其腫好著口中頰邊舌上見赤黑如珠子磣痛應心是也是秋冬寒毒久結皮中變作此疾不即療之日夜根長流入諸脈數道如箭入身捉人不得動搖若不慎口味房室死不旋踵經五六日不瘥眼中見火神昏口乾心煩即死也一曰麻子疔其狀肉上起頭大如黍米色稍黑四邊微赤多癢忌食麻子及衣麻勿入麻田中行二曰石疔其狀皮肉相連色烏黑如黑豆甚硬刺之不入肉內隱隱微疼忌瓦礫磚石之屬三曰雄疔其狀疱頭黑黶四畔仰瘡疱漿起有水出色黃大如錢孔形高忌房室四曰雌疔其狀瘡頭稍黃向里黶亦如灸瘡四畔疱漿起心凹色赤大如錢孔忌房室五曰火疔其狀如湯火燒灼瘡頭黑黶四邊有疱漿起如赤粟米忌火炙爍六曰爛疔其狀色稍黑有白斑瘡中潰潰則有膿水流出瘡形大小如匙面忌沸熱食爛臭物七曰三十六疔其狀頭黑浮起形如黑豆四畔起大赤色今日生一明日生二後日生三乃至十若滿三十六藥所不能治如未滿三十六者可治俗名黑疱忌嗔怒蓄積愁恨八曰蛇眼疔其狀瘡頭黑皮上浮生形如小豆狀似蛇眼大體硬忌惡眼看並嫉妒人見之及毒藥九曰鹽膚疔其狀大如匙面四畔皆赤有黑粟粒起忌食鹹物十曰水洗疔其狀大如錢形或如錢孔大瘡頭白里黑黶汁出中硬忌飲漿水水洗渡河十一曰刀鐮疔其狀瘡闊狹如薤葉大長一寸左側肉黑如燒爍忌刺及鐮刀切割鐵刀所傷可以藥治十二曰浮漚疔其狀瘡體曲圓少許不合長而狹如薤葉大內黃外黑黑處刺不痛內黃處刺之則痛十三曰牛拘疔其狀肉疱起掐不破上十三種瘡初起必先癢後痛先寒後熱熱定則寒多四肢沉重頭痛心驚眼花若大重者則嘔逆嘔逆者難治其麻子疔一種始末惟癢所忌者不得犯觸犯觸者即難療其浮漚疔牛拘疔二種無所禁忌縱不療亦不能殺人其狀寒熱與諸疔同皆以此方療之萬不失一欲知犯觸之狀但脊強瘡痛極甚不可忍者是也治十三種疔方用枸杞其藥有四名春名天精夏名枸杞秋名卻老冬名地骨春三月上建日採葉夏三月上建日採枝秋三月上建日採子冬三月上建日採根凡四時初逢建日取葉子枝根等四種並曝乾若得五月五日午時合和大良如不得依法採者但得一種亦得用緋繒一片以裹藥取匝為限亂髮雞子大牛黃梧子大反鉤棘針二十七枚為末赤小豆七枚末先於緋上薄布亂髮以牛黃末等布上曝即卷緋繒作團以發作繩十字縛之熨斗中急火熬令沸沸定後自干即刮取搗為末絹篩以一方寸匕取枸杞四味合搗絹篩取二匕和合前一匕共為三匕令相得又分為二份早晨空腹酒服一份日二齊州榮姥丸凡是疔腫皆用治之方牡蠣九兩爛者鍾乳枸杞根皮各二兩白石英一兩桔梗一兩半白姜石一斤軟黃者上六味各搗絹篩合和令調先取伏龍肝九升為末以清酒一斗二升攪令渾澄清取二升和藥捻作餅子大六分厚二分其濁滓仍置盆中布餅於籠上以一幅紙藉盆上以泥酒氣蒸之仍數攪令氣散發經半日藥餅子干納瓦坩中一重紙一重藥遍布勿令相著以泥密封三七日干以紙袋貯置干處舉之用法以針刺瘡中心深至瘡根並刺四畔令血出以刀刮取藥如大豆許納瘡上若病重困日夜三四度輕者一二度著重者二日根爛始出輕者一日半日爛出當看瘡浮起是根出之候若根出已爛者勿停藥仍著之藥甚安穩令生肌易其病在口咽及胸腹中者必外有腫異相也寒熱不快疑是此病即以飲或清水和藥如二杏仁許服之日夜三四服自然消爛或以物剔露根出即瘥當看精神自覺醒悟合藥以五月五日為上七月七日為次九月九日臘月臘日皆可若急須藥他日亦得修合須清淨燒香不得觸穢無令孝子不具足人產婦六畜雞犬等見之凡有此病者忌房室豬牛雞魚生韭蔥蒜蕓薹胡荽葵酒醋面等若犯諸忌而發動者取枸杞根湯和藥服並如後方其二方本是一家智者評論以後方最是真本趙嬈方姜石二十五兩牡蠣十兩崔氏作七兩茯苓三兩枸杞根皮四兩上四味各搗篩合和先取新枸杞根合皮切六升水一斗半煎取五升去滓納狗屎崔氏云尿二升攪令調澄取清和前藥熟搗捻作餅子陰乾病者以兩根刃針當頭直刺瘡痛徹拔針出刮取藥末急納瘡孔中勿令歇氣並遍封瘡頭上即脹起針挑根即出重者半日以上即出或已消爛根挑不出亦自瘥勿憂其病在內者外當有腫相應並皆惡寒發熱以水半盞刮取藥如梧子大五枚和服之日夜三服即自消也若鬚根出服藥經一日以雞羽剔吐即隨吐根出若不出根亦自消爛在外者亦日夜三度敷藥根出後常敷勿住即生肉易瘥若犯諸忌而發動者取枸杞根合皮骨切三升以水五升煮取二升去滓研藥末一錢匕和枸杞汁一盞服之日二三服並單飲枸杞汁彌佳又以枸杞汁攪白狗屎取汁服之更良合訖即可用不待乾所言白狗屎是狗食骨其屎色如石灰故言白狗屎也如預製取五月五日七月七日九月九日臘月臘日尤良神驗或有人忽喉中痛乍寒乍熱者即是其病當即以此療之無故而痛惡寒發熱者亦是此病但依前服之立瘥前後二方同是一法其用相同亦主癰疽甚效治疔腫病忌見麻勃見之即死者方胡麻燭燼針砂等分上三味為末以醋和敷之又方石灰三分馬齒菜二分上二味搗以雞子白和敷之石灰乃壯火之餘烈善破陰毒惡瘡本經有疽瘍瘙熱惡瘡死肌之治馬齒菜散血消腫雞子白清氣解熱能使疔腫外出勿以賤而忽諸又方針刺四邊及中心塗雄黃末立愈神效一云塗黃土又方鼠新坌土以小兒尿和敷之又方鐵衣未以人乳汁和敷之立愈又方小豆花為末敷之瘥又方以人屎尖敷之立瘥又方以四神丹一枚當頭上安經宿根即出矣治一切疔切疔腫疔腫方用蒼耳根莖苗子但取一色燒為灰醋泔澱和如泥塗上干即易不過十度根即拔神良余以貞觀四年忽口角上生疔腫達耳予令十日不瘥余以此藥塗之得愈以後常作此藥以救人無不瘥者故特論之以傳後人疔腫方千首皆不及此雖齊州榮姥方亦不能勝此物之造次易得也又方取鐵漿每飲一升立瘥又方臘月豬脂以面和封上瘥又方蒺藜子一升燒灰釅醋和封上經宿便瘥或針破頭封上更良又方皂莢子取仁作末敷之五日內瘥玉山韓光方韓光治疔腫人也貞觀初衢州徐使君訪得此方用艾蒿一擔燒作灰於竹筒中淋取汁以一二合和石灰如麵漿以針刺瘡中至痛即點之點三遍其根自拔亦大神良貞觀中用治三十餘人得瘥故錄之魚臍疔瘡似新火針瘡四邊赤中央黑可針刺之若不痛即殺人治之方以臘月魚頭灰和發灰等分以雞溏屎和敷上此瘡見之效否即殺人外臺不用發灰用雞子清和敷又方以寒食餳敷之良若硬者燒灰塗貼即瘥治魚臍瘡頭白腫痛不可忍者方先以針刺瘡四畔搗白苣汁滴著瘡孔內又方水獺屎敷大良治赤根疔方熬白粉令黑蜜和敷之良又方以新坌鼠壤水和塗之熱則易又方馬牙齒搗末臘月豬脂和敷之根即拔燒灰用亦可犯疔瘡方蕪菁根生鐵衣等分上二味和搗以大針刺作孔復削蕪菁根如針大以前生鐵衣塗上刺孔中又塗所搗者封上仍以方寸匕緋帛塗貼上有膿出即易須臾拔根出立瘥忌油膩生冷醋滑五辛陳臭黏食又方刺瘡頭及四畔令汁盡出搗生慄黃敷上以面圍之勿令黃出從旦至午根拔矣又方以面圍瘡如前法以針亂刺瘡銅器煮醋令沸瀉著面圍中令容一盞冷則易之三度根即出又方取蛇蛻皮如雞子大以水四升煮三四沸去滓頓服立瘥又方燒蛇蛻皮灰以雞子清和塗瘥又方取蒼耳苗搗取汁一二升服之滓敷上立瘥灸方灸掌後橫紋後五指男左女右七壯即瘥已用得效疔腫灸法雖多然此一法甚驗出於意表也癰疽第二脈七首論一首方八十七首禁法二首灸法三首脈數身無熱即有內癰諸浮數脈當發熱而反洗洗惡寒若有痛處當結為癰脈浮而數身體無熱其形默默胃中微燥不知痛處其人當發癰腫脈微而遲必發熱脈弱而數此為振寒當發癰腫凡脈滑而數滑則為實數則為熱滑即為營數即為衛營衛相逢即結為癰熱之所過即為癰膿身有痛處時時苦有瘡問曰寸口脈微而澀法當亡血若汗出設不汗當云何答曰若身有瘡被刀器所傷亡血之故也趺陽脈滑而數法當下重少陰脈滑而數婦人陰中生瘡論曰夫癰疽初發至微人皆不以為急此實奇患惟宜速治稍遲緩即病成以此致禍者不一但發背外皮薄為癰外皮厚者為疽宜急治之凡癰疽始發或似小癤或復大痛或復小痛或發如米粒大白膿子此皆微候宜善察之見有小異即須大驚忙急為攻治及斷口味速服諸湯下去熱毒若無醫藥處即灸當頭百壯其大重者灸四面及中央二三百壯數灸不必多也復敷以冷藥種種救療必速瘥也凡用藥貼法皆當瘡頭處開孔令瀉熱氣亦當頭以火針針入四分即瘥凡癰疽瘤石癰結筋瘰癧皆不可就針角針角者少用不致禍也凡癰無問大小已覺即取膠如手掌大暖水浸令軟看大小當頭上開一孔如錢眼大貼腫上令相當須臾乾急若未有膿者即定不長已作膿者當自出若以鋒針當孔上刺出膿大好至瘥乃洗去膠凡腫根廣一寸以下名癤一寸以上名小癰如豆粒大者名疱子皆始作急服五香連翹湯下之數劑取瘥乃止凡癰高而光大者不大熱其肉正平無尖而紫者不須攻之但以竹葉黃耆湯申其氣耳肉正平為無膿也癰卒痛以八味黃耆散敷之大癰七日小癰五日其自有堅強者寧生破髮乳若熱手不可近者先內服王不留行散外摩發背膏若背生破無苦在乳宜令極熟候手按之隨手即起者瘡熟也宜針之針法要得著膿以意消息胸背不過一寸斟量不得膿即與食肉膏散著銳頭納癰口中如體氣熱歇即服木占斯散五日後癰欲著痂者即服排膿風塞散凡癰破之後便綿惙欲死內寒外熱缺文腫有似癰而非者當以手按腫上無所連乃是風毒耳勿針之但服升麻湯外摩膏破癰口當令上留三分近下一分針之務令極熱熱便不痛破後敗壞不瘥者作豬蹄湯洗之日二度夏用二日冬用六七日用湯半劑亦可凡癰壞後有惡肉者宜豬蹄湯洗去穢次敷食肉膏散惡肉淨後敷生肉膏散及摩四邊令好肉速生當斷絕房室忌風冷勿自勞煩俟筋脈平復乃可任意耳緣新肉易傷傷則里潰潰則重發發則難救慎之慎之白痂最忌凡諸暴腫一一不同無有近遠皆服五香連翹湯刺去血以小豆末敷之其間數數以針刺去血若失療已潰爛者猶服五香湯及漏蘆湯下之隨熱多少依方用之外以升麻湯拓洗熨之摩升麻膏二方俱見後丹毒篇若生息肉者以白䕡茹散敷之青黑肉去淨即停止好肉生敷升麻膏如肌不生敷一物黃耆散若敷白䕡茹青黑惡肉不盡者可用漆頭䕡茹散半錢和白䕡茹散三錢稍稍敷之其散各取當色單搗下篩成散用之此數法集驗用治緩疽或身中忽有痛處如遭打撲之狀各曰氣痛痛不可忍遊走不住發作有時痛則小熱痛定則寒此皆由冬時受溫氣至春暴寒風來折之不成溫病乃作氣痛宜先服五香連翹湯摩丹參膏又以白酒煎楊柳皮及暖熨之有赤氣點點者即刺出血也其五香連翹湯及小竹瀝湯可服數劑勿以一劑未瘥便止以謂藥無效即禍至矣中間將白薇散佳又有氣腫痛其狀如癰腫無頭虛腫色不變但皮急痛不得手近亦須服此五香湯次白針瀉之次與蒺藜散敷之胸中痛短氣者當入暗室中以手中指捺左眼視若見光者胸中有結癰若不見光者是瘭疽內發出也經云氣宿於經絡中血氣俱澀不行壅結為癰疽也又言熱之所作其後為癰又陽氣溱集寒化為熱熱盛則肉腐為膿也由人體有熱被寒冷搏之而脈凝結不行熱氣壅結成癰疽方有灸法亦有溫治法以其中冷未成熱之時其用冷藥貼敷之治熱已成以消熱令不成膿也赤色腫有尖頭者藜蘆膏敷之一云醋和蚌蛤灰塗干則易之余平生數病癰疽得效者即記之考其病源多是藥氣所作或有上世服石遂令子孫多有此疾食中尤不宜食麵及酒蒜及慎溫床厚被能慎之者可得終身無他此皆躬自驗之故特論之也五香連翹湯治一切惡核瘰癧癰疽惡腫患方青木香沉香丁香薰陸香麝香連翹射干升麻獨活寄生通草各二兩大黃三兩上十二味㕮咀以水九升煮取四升納竹瀝三升煮更取三升分三服取快利肘後有紫葛甘草無通草治惡肉惡脈惡核風結腫氣痛要籍喻義有黃耆甘草芒硝各六分千金翼云未瘥中間常服佳與小兒篇方小異黃耆竹葉湯治癰疽發背方黃耆甘草黃芩芍藥麥冬各三兩當歸人參石膏川芎半夏各二兩生薑五兩生地黃八兩大棗三十枚淡竹葉一握上十四味㕮咀以水一斗二升先煮取竹葉取一斗去滓納藥煮取三升分四服相去如人行二十里久日三夜一八味黃耆散方黃耆川芎大黃黃連芍藥莽草黃芩梔子仁等分上八味治下篩雞子白和如泥塗故帛上隨腫大小敷之干則易若已開口封瘡上須開頭令歇氣王不留行散治癰腫不能潰困苦無賴方王不留行子三合千金翼作一升龍骨當歸各二兩野葛皮半分乾薑桂心各一兩栝蔞根六分上七味治下篩食後溫酒服方寸匕日三以四肢習習為度不知稍加之令人安穩不覺膿自潰即著痂平復神良此浩仲堪方隋濟闍黎名為神散治癰腫即消千金翼云治癰疽及諸雜腫已潰皆服之內補散治癰疽發背婦人乳癰諸癤未潰者便消不消者令速潰疾愈方木占斯人參乾薑一云乾地黃桂心細辛厚朴敗醬防風栝蔞根桔梗甘草各一兩上十一味治下篩酒服方寸匕藥入咽覺流入瘡中若癰疽灸之不能發壞者可服之未壞者去敗醬已發膿者納敗醬服藥日七八夜二三以多為善若病在下當膿血出此為腸癰也病在裡痛者服此即不痛長服治諸瘡及疽痔已潰便早愈醫人不知用此藥發背無有治者若始覺背上有不好處而渴者即勤服之若藥力行覺渴止便消散若雖已壞但日夜服勿住藥腫自消散不覺欲長服者當去敗醬婦人乳癰宜速服此一方無桂心名木占斯散主癰疽堅結若已壞者速愈未壞者使不成癰便消張文仲無桂心劉涓子云此是華佗方排膿內塞散治大瘡熱退膿血不止瘡中肉虛疼痛方防風茯苓白芷桔梗遠志甘草人參川芎當歸黃耆各一兩厚朴二兩桂心二分附子二枚赤小豆五合酒浸熬之上十四味治下篩酒服方寸匕日三夜一豬蹄湯治癰疽發背方豬蹄一具治如食法黃耆黃連芍藥各三兩黃芩二兩薔薇根狼牙根各八兩上七味㕮咀以水三斗煮豬蹄令熟澄清取二斗下諸藥煮取一斗去滓洗瘡一食頃以帛拭乾貼生肉膏日二如痛加當歸甘草各二兩又方治癰疽發十指或起膀胱及發背後生惡肉者方豬蹄一具治如食法當歸芎藭芍藥大黃黃芩獨活莽草各一兩上八味㕮咀以水三斗煮豬蹄取八升去滓納諸藥取四升去滓漬瘡兩食頃洗拭乾敷麝香膏麝香膏治癰疽及發背諸惡瘡去惡肉方麝香䕡茹一作真珠雄黃礬石各一兩上四味治下篩以豬膏調和如泥塗之惡肉盡止卻敷生肉膏食惡肉膏方大黃川芎莽草真珠雌黃附子生用各一兩白蘞礬石黃芩䕡茹各二兩雄黃半兩上十一味㕮咀以豬脂一升半煎五六沸去滓納䕡茹礬石末攪調敷之瘡中惡肉盡乃止治癰腫惡肉不盡者方蒴藋灰石灰肘後作白炭灰上二味各淋取汁合煎如膏膏成敷之食惡肉亦去黑子此藥過十日不中用又方生地黃汁煎如膠作餅子貼之日四五度漆頭䕡茹散食惡肉散方漆頭䕡茹硫黃丹砂麝香馬齒礬雄黃雌黃白礬各二兩上八味治下篩以粉之吮食惡肉翼方敷貼無白礬雌黃有藜蘆云亦作膏和敷之又處療癰疽篇無丹砂廣濟方療癰腫膿潰瘡中有紫肉破不消以此散摻或內蝕之白䕡茹散䕡茹礬石雄黃硫黃各二分上四味治下篩納瘡中惡肉盡即止不得過好肉生肉膏治癰疽發背壞後生肉方生地黃一斤辛夷二兩獨活當歸大黃黃耆川芎白芷芍藥黃芩續斷各一兩薤白五兩上十二味㕮咀以臘月豬脂四升煎取白芷黃下之去滓敷立瘥又方乾地黃三兩甘草當歸白芷蓯蓉蜀椒細辛各二兩烏喙六分生用蛇銜一兩薤白二十莖上十味㕮咀以醋半升漬一宿次日以豬膏三斤煎令沸三上三下膏成塗之立瘥蛇銜生肉膏治癰疽金瘡敗壞者方蛇銜當歸各六分乾地黃三兩黃連黃耆黃芩大黃續斷蜀椒芍藥白芨川芎莽草白芷附子甘草細辛各一兩薤白一把上十八味㕮咀醋漬二宿以臘月豬脂七升煎三上三下醋盡下之去滓取敷日二夜一崔氏有大戟獨活各一兩無地黃黃耆黃連續斷白芨川芎白芷甘草五香湯治熱毒氣卒腫痛結作核或似癰癤而非使人頭痛寒熱氣急者數日不除殺人方青木香藿香薰陸香沉香丁香各二兩上五味㕮咀以水五升煮取二升分三服不瘥更作並以滓敷腫上千金翼以麝香代藿香漏蘆湯下之之方漏蘆白芨黃芩麻黃白薇枳實升麻芍藥甘草各二兩大黃三兩上十味㕮咀以水一斗煮取三升分為三服快下之無藥處單用大黃亦得肘後云治癰疽丹疹毒腫惡肉千金翼無白薇劉涓子無芍藥有連翹治時行熱毒變作赤色癰疽丹疹毒腫及目赤痛生障翳若熱盛者可加芒硝二兩經心錄無白薇作知母犀角芒硝各二兩丹參膏方丹參蒴藋莽草蜀椒躑躅各二兩秦艽獨活白芨牛膝菊花烏頭防己各一兩上十二味㕮咀以醋二升漬一宿夏半日如急用便煎豬脂四升煎令醋氣歇慢火煎去滓用敷患處日五六度肘後云用防風不用防己治惡肉惡核瘰癧風結諸腫云此膏亦可服小竹瀝湯治氣痛方淡竹瀝一升射干杏仁獨活枳實白朮防己防風秦艽芍藥甘草茵芋茯苓黃芩麻黃各二兩上十五味㕮咀以水九升煎取半下竹瀝取三升分四服白薇散方白薇防風射干白朮各六分麻黃秦艽當歸防己烏頭青木香天門冬枳實獨活葳蕤山茱萸各四分柴胡白芷各三分莽草蜀椒各一分上十九味治下篩以漿水服方寸匕日三加至二匕蒺藜散治氣腫痛方上用蒺藜子一升熬黃為末以麻油和如泥炒令焦黑敷故熟布上如腫大小勿開孔貼之無蒺藜以赤小豆為末和雞子如前敷干即易妙藜蘆膏治赤色腫有尖頭者方藜蘆二分黃連礬石雄黃松脂黃芩各八分上六味為末以豬脂三升煎令熔調和敷上瘑癬頭瘡極效又治淺瘡經年抓搔癢處成孔者瞿麥散治癰排膿止痛利小便方瞿麥一兩芍藥桂心赤小豆酒浸熬麥門冬川芎黃耆當歸白蘞各二兩上九味為末先食酒下方寸匕日三翼方有細辛苡仁白芷不用桂心麥門冬白蘞治諸癰潰及未潰瘡中疼痛膿血不絕而不可忍者薏苡仁散治癰腫令自潰長肉方薏苡仁桂心白蘞當歸蓯蓉乾薑各二兩上六味治下篩先食溫酒服方寸匕日三夜二黃耆茯苓湯治癰疽潰後膿太多虛熱方黃耆麥門冬各三兩生薑四兩五味子四合川芎茯苓桂心各二兩大棗二十枚上八味㕮咀以水一斗半煮取四升分六服翼方有遠志人參當歸各二兩甘草六兩內消散治凡是癰疽皆宜服之方赤小豆醋浸一升熬人參甘草瞿麥當歸豬苓黃芩各二兩白蘞薏仁黃耆各三兩防風一兩升麻四兩上十二味治下篩以酒服方寸匕日三夜二長服取瘥蝟皮散治癰疽膿血內漏諸漏敗壞男發背女乳房及五痔皆宜服之方蝟皮蜂房各一具地榆附子桂心當歸續斷各五分乾薑蜀椒藁本各四分厚朴六分上十一味治下篩空腹以酒服方寸匕日三取瘥加斑蝥七枚益良凡患腫皆因宿熱所致須服冷藥瘥後有患冷利不止者方人參龍骨赤石脂甘草乾薑各二兩附子一枚上六味㕮咀以水八升煮取二升半分三服梔子湯治表裡俱熱三焦不實身體生瘡及發癰癤大小便不利方梔子仁二七枚芒硝二兩黃芩甘草知母各三兩大黃四兩上六味㕮咀以水五升煮減半下大黃取一升八合去滓納芒硝分三服五利湯治年四十已還強壯常大患熱發癰疽無定處大小便不通方劉涓子名大黃湯芒硝一兩升麻黃芩各二兩大黃三兩梔子仁五兩上五味㕮咀以水五升煮取二升四合去滓下芒硝分四服快利即止乾地黃丸凡壯熱人能長服之終身不患癰疽令人肥悅耐勞苦方乾地黃五兩芍藥甘草桂心黃耆黃芩遠志各二兩石斛當歸大黃各三兩巴戟天栝蔞根人參各一兩天門冬蓯蓉各四兩上十五味為末蜜丸如桐子大酒服十丸日三加至二十丸又方治虛熱消瘡癤方乾地黃四兩大黃六兩芍藥王不留行茯苓甘草遠志麥門冬人參升麻黃芩各三兩桂心六兩上十二味為末蜜和丸如梧子大酒服十丸日三加至二十丸久服令人肥健一方有枳實三兩外臺無甘草遠志麥門冬人參升麻黃芩又方治虛勞客熱數發癰腫瘡癤經年不除方乾地黃四兩黃耆黃芩大黃黃連澤瀉細辛各三兩甘草桂心芍藥茯苓乾漆各二兩人參一兩天冬五兩上十四味為末蜜丸如梧子大酒服十丸日三夜一加至二十丸久服延年終身不發癰疽凡方中用大黃薄切五升米下蒸熟曝乾用之熱多倍大黃要籍喻義不用澤瀉地黃煎補虛除熱散乳石毒癰癤痔疾悉宜服之方生地黃隨多少三搗三壓取汁令盡銅器中湯上煮勿蓋覆令泄氣得減半出之布絞去粗滓再煎令如餳丸如彈丸許酒服日三勿加百日癰疽永不發枸杞煎治虛勞輕身益氣令人有力一切癰疽永不發方枸杞三十斤銼葉生至未落可用莖葉落至未生可用根以水一石煮取五斗去滓澱將滓更入釜與水依前煮取五斗並前澄清去澱釜中煎取二斗許更入小銅鍋子煎如餳止或器盛重湯煮更好每日旦服一合半日再漸加治風濕體痛不能飲食兼癰疽後補虛羸方薔薇根枸杞根各一百斤生地黃食蜜各十斤上四味㕮咀先以水煮二根令味濃取二斛去澱次納地黃煮令爛絞去滓微火煎令如粥次納蜜和令相得每食後服如彈丸許拓腫方大黃黃芩白蘞芒硝各三分上四味㕮咀以水六升煮取三升汁以故帛四重蘸汁中以拓腫處干即易之無度數晝夜為之又方青木香犀角大黃梔子仁紫檀香升麻黃芩羚羊角黃連甘草芒硝射干黃柏白蘞各二兩地黃汁五合麝香二分研入上十六味㕮咀以水五升煮取二升少冷以故帛兩重蘸湯中拓腫處干即易之日夜數百度又方治頸項及胸背有大腫赤發即封之令不成膿方朴硝五兩香豉生地汁各半斤上三味合搗煮令地黃爛熟敷腫處厚二分日三四易至瘥止此兼治一切腫又方治癰腫痛煩悶方用生楸葉十重貼之以帛裹令緩急得所日二易止痛兼消腫蝕膿甚良勝於他物如冬月先收乾者臨用時以鹽潤之亦可薄削楸皮用之又方治大人小兒癰腫方用生豬腦子敷紙上貼之干則易之日三度又方芥子為末湯調敷紙上貼之千金翼以豬膽和塗之又方白姜石末蒜和搗敷上又方搗馬鞭草敷上即頭出灸方灸兩足大𧿹趾歧中立瘥仍隨病左右治癰始覺腫令消方大黃通草葶藶莽草各等分上四味為末以水和敷上干則易之又方以莨菪末三指撮水和服之日三神良治癰方以芫花為末膠和如粥敷之治癰疽發腹背陰匿處通身有數十癰者方取干牛屎燒灰治下篩以雞子白調塗之干復易若已結膿使聚長方栝蔞根為末苦酒和敷燥復易赤小豆亦佳治癰有膿令潰方用雞羽三七枚燒末服之即潰又方人乳和麵敷上比曉膿血盡出不用手近治癰腫發背初作及經十日以上腫赤焮熱毒氣盛日夜疼痛百藥不效方毈雞子一枚新出狗屎如雞子大上二味攪和微火煎令稀稠得所捻作餅子於腫頭堅處貼之以紙貼上以帛抹之時時看視覺餅子熱即易勿令轉動及歇氣經一宿定如多日患者三日貼之一日一易至瘥止此方穢惡不可施之貴勝然其愈疾一切諸方皆不可及自外諸方還復備員設儀注而已學者當曉此方以備諸急爾烏麻膏治諸漏惡瘡一十三般疔腫五色遊腫癰癤毒熱狐刺蛇毒狂犬蟲狼六畜所傷不可識者二十年漏金瘡中風皆以此膏貼之惡膿盡即瘥止痛生肌一貼不換藥惟一日一度拭去膏上膿再貼之至瘥止生烏麻油一斤黃丹四兩蠟四分上三味以臘日前一日從午納油銅器中微火煎至明旦看油減一分下黃丹消盡下蠟令沫消藥成至午時出惟男子合之毋令小兒女子六畜等見治諸腫貼方紫葛十分大黃五分青木香一分元參白蘞黃芩黃連榆白皮升麻由跋各三分赤小豆一合上十一味治下篩以生地黃汁和如泥敷腫上干則易無地黃汁以米醋和之松脂膏治癰腫方松脂一斤半豬脂一合半黃芩黃連黃耆大黃當歸芍藥川芎上八味㕮咀合二脂微火煎三上三下綿絞去滓火炙敷紙上隨腫大小貼之日三易即瘥又方松脂一斤豬脂半斤白蠟四兩大黃一兩黃芩黃連黃柏當歸芍藥川芎細辛白芷防風莽草白蘞各半兩上十五味㕮咀先煎二脂白蠟令烊次納諸藥煎三上三下以綿及布絞注水中為餅取少許火炙之敷油紙上貼瘡處翼方有黃耆一兩青龍五生膏治癰疽痔漏惡瘡膿血出皆以此方導之生梧桐白皮生桑白皮生柏白皮生青竹茹生龍膽草各五兩蜂房蝟皮蛇蛻皮各一具雄黃雌黃各一兩蜀椒附子川芎各五分上十三味㕮咀以三年苦酒二斗浸一宿於炭火上炙乾搗下細篩以豬脂二升半微火煎令相得如飴以新白瓷器盛著水中隨病深淺敷之並以清酒服如棗核大日一治癰疽痔漏惡瘡婦人妒乳漆瘡方野葛芍藥薤白當歸通草各二分附子一分上六味㕮咀醋浸半日先煎豬脂八合令煙出納亂髮二分令消盡下之待冷又納松脂八分蠟二分更著火上和次納諸藥煎令沸三上三下去滓以故帛敷藥貼腫上干即易如春月去附子其發須洗盡垢不爾令瘡痛滅瘢膏治諸色癰腫惡瘡瘥後有瘢痕方安息香一作女萎礬石狼毒羊躑躅烏頭附子野葛白芷烏賊骨皂莢天雄芍藥川芎赤石脂大黃當歸莽草石膏乾地黃地榆白朮續斷鬼臼蜀椒巴豆細辛各一兩上二十六味搗末用成煎豬脂四斤和煎三上三下以好鹽一大匙下之膏成須服者與服須摩者與摩勿近目處忌妊娠人若滅瘢以布揩令傷敷之若鼻中息肉取如大豆納鼻中如瘀血者酒服如棗核大痔漏者以綿裹如梅子大納下部中風者摩患上取瘥崩中亦納之其滅瘢取少許和鷹屎白敷之取臘日合之神效翼方有礜石一兩治膿潰後瘡不合方燒鼠皮一枚為末敷瘡孔中又方熟嚼大豆敷之又方炒烏麻令黑熟搗敷之又方牛屎敷之干即易又方燒破蒲席灰臘月豬脂和納孔中治癰癤久不瘥方用馬齒菜搗汁煎敷之治癰潰後膿不斷及為諸物刺傷瘡不瘥方石硫黃粉上一味取箸一莖磓碎頭少濕納硫黃中以刺瘡孔瘡瘥為度治癰肉中如眼諸藥所不效者方取附子削令如棋子安腫上以唾貼以火炙之令附子欲焦復唾濕以火炙之如是三度令附子之熱氣徹內即瘥此法極妙練石散治癰有堅如石核者復大色不變或作石癰方粗理黃石一斤鹿角半斤燒白蘞三兩上三味以醋五升燒石赤納醋中不限數以醋減半止細搗末以余醋和如泥厚敷之干即易取消止盡更合諸漏及瘰癧其藥悉皆用之仍火針針頭破敷藥又單磨鹿角半夏末和敷之不如前方佳也治石癰堅如石不作膿者方生商陸根熟搗敷之干即易取軟為度又治濕漏諸癰癤又方蜀桑根白皮陰乾搗末烊膠酒和藥敷腫根即拔又方莨菪子為末醋和敷瘡根即拔又方蛇蛻皮貼之經宿便瘥又方櫟子一枚以醋於青石上磨之以塗腫上干更塗不過十度即愈又方梁上塵葵根莖灰等分上二味以醋和敷之即瘥又方當上灸百壯石子當碎出如不出益壯數乃佳凡發腫至堅有根者名曰石癰治惡毒腫或著陰卵或著一邊疼痛攣急引小腹不可忍者一宿殺人方取茴香草搗汁飲一升日三四服滓敷腫上冬月闕生者根亦可用治風勞毒腫疼痛攣急或牽引小腹及腰髀痛方用桃仁一升研以酒三升攪和頓服之厚衣被蓋令汗不過三劑瘥治腳腫向上至腹即殺人者方用赤小豆一斗以水三斗煮令爛出豆以汁浸腳至膝每日一度瘥止若已入腹不須浸但煮豆食之忌鹽菜米麵等渴飲汁瘥乃止麻子小豆湯治毒腫無定處或赤色惡寒或心腹刺痛煩悶者此是毒氣深重所致方麻子赤小豆各五升生商陸三升附子二兩射干三兩升麻四兩上六味㕮咀以水四斗先煮四味取二斗半去滓次研麻子碎和汁煮一沸去滓取汁煮豆爛其汁每服五合日二夜一當利小便為度腫退即瘥並食豆治一切腫毒疼痛不可忍者方取蓖麻子熟搗敷之即瘥治諸瘡著白痂復發方大蒜鼠屎香墨等分上三味為末敷之日三治癤子方凡癤無頭者吞葵子一枚不得多服又方生椒末釜下土等分上二味為末醋和塗之翼方有曲末為三味又方狗頭骨蕓薹子等分上二味為末醋和敷之又方以鼠黏根葉貼之又方雀屎水和敷之又方燒葛蔓灰封上自消牛糞灰封之亦佳發背第三論一首方十五首論曰凡發背皆因服食五石寒食更生散所致亦有單服鍾乳而發者有上世服之者其候率多於背兩胛間初起如粟米大或痛或癢仍作赤色人初不以為事日漸長大不過十日遂至於死其臨困之時已闊三寸高一寸瘡有數十孔以手按之諸孔中皆膿出尋時失音所以養生者小覺背上癢痛有異即火急取淨土水和如泥捻作餅子厚二分闊一寸半以粗艾大作炷灸泥餅子貼著瘡上灸之一炷一易餅子若粟米大時可灸七餅即瘥如榆莢大灸七七餅炷即瘥如錢大可日夜灸之不限炷數仍服五香連翹湯方見本卷癰疽門中及鐵漿諸藥攻之乃愈又法諸發背未作大膿可以冷水射之浸石令冷熨之日夜不住瘥止此病忌面酒五辛等亦有當兩肩上發者凡服石人皆須勞役四體無令自安如不爾者多有發動亦不得隨便恣意取暖稱已適情必須遺欲以取寒凍雖當時不寧於後在身多有所益無發動之慮耳凡腫起背胛間頭白如黍粟四邊相連腫赤黑令人悶亂即名發背也禁房室肉酒面蒜若不灸治即入內殺人若灸當瘡上七八百壯有人不識多作雜腫治者皆死治發背及癰腫已潰未潰方用香豉三升少與水和熟搗成如薄泥依腫作餅子厚三分以上有孔勿覆孔中布豉餅以艾列其上灸之使溫溫而熱勿令破肉如熱痛即急易之患當減快得安穩一日二度灸之如先有瘡孔孔中得汁出瘥治癰疽發背已潰未潰及諸腫毒方栝蔞根榆白皮胡燕窠鼠坌土各等分上四味為末以女人月經衣水洗取汁和如泥封腫上干即易潰者四面封之已覺即封從一日至五日令瘥治發背背上初欲結癰方大黃升麻黃芩甘草各三兩梔子三七枚上五味㕮咀以水九升煮取三升分二服取快利便止不利更進內補散治癰疽發背已潰排膿生肉方當歸桂心各二兩人參川芎厚朴防風甘草白芷桔梗各一兩上九味治下篩酒服方寸匕日三夜二未瘥更服勿絕外臺無防風甘草白芷又方治癰疽發背方蜀椒乾薑黃芩人參各二分桂心一分白蘞甘草附子防風各一兩川芎二兩小豆一合半上十一味治下篩酒服方寸匕日三夜二李根皮散治癰疽發背及小小瘰癧方李根皮一升栝蔞根半夏各五兩通草白蘞桔梗厚朴黃芩附子各一兩甘草當歸各二兩葛根三兩桂心芍藥各四兩川芎六兩上十五味治篩酒服方寸匕日三瘡大困者夜再服之曾有人患骨從瘡中出兼有三十餘癰癤服此散瘥大內塞排膿散治發背癰腫經年瘥後復發此因大風或結氣在內經脈閉塞至夏月以來出攻於背久不治積聚作膿血為瘡內漏方山茱萸五味子茯苓乾薑各一分甘草石斛人參桂心芍藥各三分巴戟天麥門冬乾地黃肉蓯蓉遠志各八分當歸石葦川芎各四分附子二分地膽菟絲子各三分上二十味治下篩酒服方寸匕日三夜一稍加之長服終身不患癰癤治發背方用亂髮灰酒服方寸匕亦治瘭疽又方豬脂敷上日四五度亦治髮乳救急方云取豬羊脂切作片冷水浸貼上暖易之五六十片瘥若初貼少許即寒寒定好眠甚妙又方三年醋滓微火煎令稠和牛脂敷上又方豬狗牙燒灰醋和敷上日三四易又方燒古蚌灰以雞子白和敷之日三易又方飲鐵漿二升取利見本論中又方蛇頭灰醋和敷日三易又方燒鹿角灰醋和敷之日四五易丹毒第四論一首方三十八首論曰丹毒一名天火肉中忽有赤如丹塗之色大者如手掌甚者遍身有癢有腫無定色有白丹者肉中腫起癢而復痛微虛腫如吹狀癮疹起也有雞冠丹者赤色而起大者如連錢小者如麻豆粒狀肉上粟粟如雞冠肌理也一名茱萸丹有水丹者由遍體熱起遇水濕搏之結丹晃晃黃赤色如有水在皮中喜著股及陰處此雖小疾不治令人至死升麻膏方升麻白薇肘後作白蘞漏蘆連翹芒硝黃芩各二兩蛇銜枳實各三兩蒴藋四兩梔子四十枚上十味微搗以水三升浸半日以豬膏五升煎令水氣盡去滓膏成敷上諸丹皆用之及熱瘡腫上日三經心錄無枳實以治諸毒腫升麻湯治丹毒方升麻漏蘆芒硝各二兩黃芩三兩蒴藋五兩梔子二十枚上六味㕮咀以水一斗浸良久煮取七升冷以故帛染汁拓諸丹毒上常令其濕拓後須服飲並漏蘆湯方並見前癰腫條中服之立瘥小品用治丹疹赤毒腫丹方水苔生蛇銜生地黃生菘菜即蕓薹蒴藋菜慎火草五葉藤豆葉浮萍以上取一味單搗塗之大黃梔子黃芩芒硝以上取一味下水和用上十三味或搗成末單用一味立瘥又方凡天下極冷無過於藻菜但有患熱毒腫並丹等取渠中藻菜細切熟搗敷之厚三分干即易治諸丹神驗方以蕓薹菜熟搗厚封之隨手即消餘熱氣未愈但三日內封之瘥止縱干亦封之不歇以絕本余以貞觀七年三月八日於內江縣飲多至夜睡中覺四體骨肉疼痛至曉頭痛目眩額左角上如彈丸大腫痛手不得近至午時至右角至夜諸處皆到目遂閉合不得開幾致殞斃縣令周公以種種藥治不瘥經七日余自處此方其驗如神故疏之以傳來世云耳治五色油丹方俗云油腫若犯者多致死不可輕之縛母豬枕頭臥甚良又方牛屎塗之干即易治赤流腫丹毒方取榆根白皮為末雞子白和敷翼方又用雞子白和蒲席灰敷又方搗大麻子水和敷之又方煎羊脂摩之得青羊脂最良集驗云治人面目身體卒赤黑丹起如疥狀不治日劇遍身即殺人也治小兒丹毒方搗馬齒莧一握取汁飲以滓敷上又方搗赤小豆五合水和取汁飲一合良滓塗五心又方濃煮大豆汁塗之良瘥後亦無瘢痕又方臘月豬脂和釜下土敷之干即易治小兒五色丹方用豬槽下爛泥敷之干即易集驗治卒赤黑丹又方搗蒴藋葉敷之又方服黃龍湯二合並敷患上佳治小兒白丹方燒豬屎灰以雞子白和敷之良治小兒赤丹方搗蕓薹葉汁服三合滓敷上良翼云蕓薹末以雞子白和塗之治小兒赤丹斑駁者方以唾和胡粉從外向內敷之又方銅鐵屎以豬脂和敷之又方以屋塵臘月豬脂和敷之治小兒火丹赤如朱走皮中方以醋和豉研敷之又方鯉魚血敷之良又方搗荏子敷之又方豬屎水和絞取汁服少許良治小兒天火丹肉中有赤如丹色大者如手甚者遍身或痛或癢或腫方赤小豆二升為末以雞子白和如薄泥敷之干即易便瘥一切丹並用此方皆瘥又方生麻油塗之治小兒骨火丹其瘡見骨方搗大小蒜厚敷之著足踝者是治小兒殃火丹毒著兩脅及腋下者方用伏龍肝為末油和敷之干則易若入腹及陰以慎火草取汁用之治小兒尿灶丹初從兩股起及臍間走入陰頭皆赤色者方桑白皮切二升以水二升煮取汁浴之良又方燒李根為灰以田中流水和敷之良治小兒朱田火丹病一日一夜即成瘡先從背起漸至遍身如棗大正赤色者方濃煮棘根汁洗之已成瘡者赤小豆末敷之未成瘡者雞子白和小豆末敷之治小兒天灶火丹病自髀間起小兒未滿百日陰頭赤腫血出方伏龍肝搗末以雞子白和敷之日三良又方鯽魚肉銼五合赤小豆末三合上二味和搗少水和敷之良治小兒野火丹病通身皆赤者方用油塗之治小兒茱萸丹病初從背起遍身如細纈一宿成瘡者方用赤小豆為末以粉之如未成瘡者雞子白和敷之治小兒廢灶火丹初從足趺起正赤色者方以棗根煮汁沐浴五六度良癮疹第五論一首方二十九首灸法一首論曰素問云風邪客於肌中則肌虛真氣發散又被寒搏皮膚外發腠理開毫毛淫氣妄行之則為癢也所以有風疹瘙癢皆由於此又有赤疹者忽起如蚊蚋啄煩癢極者重沓壟起搔之逐手起又有白疹者亦如此赤疹熱時即發冷即止白疹天陰冷即發白疹宜煮礬石汁拭之或煮蒴藋和少酒以浴之良姚氏以治赤疹或煮石南汁拭之良餘一切如治丹方法石南湯治六十四種風淫液走入皮中如蟲行腰脊強直五緩六急手足拘攣癮疹搔之作瘡風屍身癢卒面目腫起手不得上頭口噤不能言方方見第八捲風懿篇中此方但是癮疹悉服之瘥治風瘙癮疹心迷悶亂方天雄牛膝桂心知母各四分栝蔞根白朮各五分防風六分人參乾薑細辛各三分上十味為末酒服半錢匕加至一匕為度治瘙癢皮中風虛方枳實三升松葉切一升獨活蓯蓉黃耆秦艽各四兩丹參蒴藋各五兩上八味㕮咀以酒二斗浸六宿每服二合日二稍加之又方大豆三升酒六升煮四五沸每服一盞日二又方牛膝為末酒下方寸匕日三並治骨疽癩病及㾦㿔又方芥子為末漿服方寸匕日三又方白朮為末酒服方寸匕日三治小兒患癮疹入腹體腫強而舌乾方蕪菁子為末酒服方寸匕日三治風瘙癮疹方白朮三兩戎鹽礬石各半兩黃連黃芩細辛芎藭茵芋各一兩上八味㕮咀以水一斗煮取三升洗之日三良又方馬藺子蒴藋礬石茺蔚子蒺藜子茵芋羊桃扁竹各二兩上八味㕮咀以漿水二斗煮取一斗二升納礬石洗之日三又方蒴藋防風羊桃石南茵芋芫花蒺藜礬石各一兩上八味㕮咀以漿水一斗煮取五升去滓納礬石令小沸溫浴之又方蛇床子二升防風二兩生蒺藜二兩上三味㕮咀以水一斗煮取五升拭患上日三五遍治癮疹癢痛方大黃升麻黃柏當歸防風芍藥黃芩青木香甘草各二兩楓香五兩芒硝一兩地黃汁一升上十二味㕮咀以水一斗煮取三升半去滓下芒硝令消帛染拓病上一炊久日四五度治舉體癢痛如蟲齧搔之皮便脫落作瘡方蒺藜子三升蛇床子茺蔚子各二升大戟一斤大黃二兩礬石三兩防風五兩上七味㕮咀以酒四升水七升煮取四升去滓納礬石以帛染拭之治風瘙腫瘡癢在頭面拓洗方大黃芒硝各一兩莽草半兩一云甘草三兩黃連一兩半黃芩二兩蒺藜子五合上六味㕮咀以水七升煮取三升去滓下芒硝以帛染拓洗之日一度勿近目治身體赤癮疹而癢搔之隨手腫起方莽草半兩當歸芎藭大戟細辛芍藥芫花川椒附子躑躅各一兩豬膏二升半上十一味㕮咀酒漬一宿豬膏煎之候附子色黃膏成去滓敷病上日三青羊脂膏治風熱赤疹搔之隨手作瘡方青羊脂四兩甘草芍藥各三兩寒水石白芷白芨黃芩防風黃耆升麻各四分竹葉切石膏各一升上十二味㕮咀先以水八升煮石膏竹葉取四升去滓浸諸藥以不中水豬脂二升合煎膏成敷病上良治癮疹百療不瘥者方黃連切芒硝各五兩上二味以水六升煮取半去滓洗之日四五度治風瘙癮疹心迷悶亂方巴豆二兩以水七升煮取三升以故帛染汁拭之大人小兒以意加減又方礬石二兩為末酒三升漬令消以帛染拭病上又方吳茱萸一升酒五升煮取一升半帛染拭病上治風瘙癮疹方酪和鹽熟煮摩之隨手即消良又方石灰淋取汁洗之良又方白芷根葉煮汁洗之治癮疹百療不瘥者方景天一升一名慎火草細搗取汁敷上熱炙手摩之日三度瘥治暴氣在表攻皮上癮疹作瘡方槐枝葉煮洗之治小兒患癮疹八腹體腫強而舌乾方蠶沙二升水二升煮去滓洗之良又方車前子為末粉之良又方鹽湯洗過以蓼子挼敷之又方灸曲池二穴小兒隨年壯發即灸之神良瘭疽第六論一首十四條方九十三首灸法四首論曰瘭疽者肉中忽生點子如豆粒小者如黍粟劇者如梅李或赤或黑或青或白其狀不定有根不浮腫痛傷之應心根深至肌經久便四面悉腫疱黯熟紫黑色能爛壞筋骨若毒散逐脈入臟殺人南人名為拓著毒厚肉處即割去之亦燒鐵烙之令焦如炭或灸百壯或飲葵根汁或飲藍青汁若犀角汁及升麻汁竹瀝黃龍湯等諸單方治專去其熱取瘥其病喜著十指故與代指相似人不識之呼作代指不急治亦逐脈上入臟殺人南方人得之皆斬去其指初指頭先作黯疱後始腫赤黑黯瘮痛入心是也代指者先腫焮熱痛色不黯緣爪甲邊結膿劇者爪皆脫落此謂之代指病也但得一物冷藥汁拓漬之佳若熱盛服漏蘆湯方見本卷癰疽門及拓漬之敷升麻膏方見本卷丹毒門亦可針去血不妨洗漬塗膏也復有惡肉病者身上忽有肉如赤豆粒突出便長推出如牛馬乳上如雞冠狀不治自長出不止亦不痛癢此由春冬時受惡風入肌脈中變成此疾治之宜服漏蘆湯外燒鐵烙之日日為之令焦盡即以升麻膏敷上積日乃瘥又有赤脈病者身上忽有赤脈絡起隴聳如死蚯蚓之狀視之如有水在脈中長短皆逐脈所處此由春冬受惡風入絡脈中其血肉瘀所作也宜五香連翹湯方見本卷癰疽門及竹瀝等治之刺去其血仍敷丹參膏方見本卷癰疽門亦用白雞屎塗之良惡核病者肉中忽有核累累如梅李核小者如豆粒皮肉疼痛壯熱惡寒是也與諸瘡根瘰癧結筋相似其瘡根瘰癧因瘡而生是緩無毒惡核病卒然而起有毒若不治入腹煩悶殺人皆由冬月受溫風至春夏有暴寒相搏氣結成此毒也但服五香湯主之方見本卷癰疽門又以小豆末敷之亦煮湯漬時時洗之消後以丹參膏敷之令余核盡消凡惡核初似被射工毒無常定處多惻惻然痛或時不痛人不痛者即不憂不憂則救遲救遲則殺人是以宜早防之尤忌食雞魚豬牛馬驢等肉其疾初如粟米或似麻子在肉裡而堅似疱長甚速初得多惡寒須臾即短氣取吳茱萸半斤作末水一升和絞取汁頓服以滓敷上須臾服此汁令毒散止即不入腹也入腹即致禍矣切慎之凡㾫病喜發四肢其狀赤脈起如編繩急痛壯熱其發於足喜從腨起至踝亦如編繩故云㾫病也發於腎喜著腋之下皆由久勞熱氣盛為濕涼所折氣結筋中成此病也若不急治其久潰膿亦令人筋攣縮也若不消潰其熱氣不散多作趺病漏蘆湯主之瀉後鋒針數針去惡血氣針瀉其根核上敷小豆末取消為度又用治丹法治之又用治癰三味甘草散敷之無方若潰敷膏散一如癰法惡核㾫病瘭疽等多起嶺表中土鮮有南方人所食雜類繁多感病亦復不一仕人往彼深須預防防之無法必遭其毒惟五香湯小豆散即麻子小豆散本卷癰疽門吳茱萸皆其要藥凡附骨疽者以其無破外臺作故附骨成膿故名附骨疽喜著大節解中丈夫產婦喜著䏶中小兒多著脊背大人急著者先覺痛不得動搖按之應骨痛經日便覺皮肉漸急洪腫如肥狀是也小兒才手近便大呼即是肢節有痛候也大人緩著者先覺肌烘烘然經日便覺痛痹不隨小兒四肢不能動搖亦如不隨狀看肢節解中若有肌烘烘處不知是附骨疽令遍身成腫不至潰體皆有青黯大人亦有不別呼為賊風風腫不知是疽也凡人身體患熱當風取涼風入骨解中風熱相搏便成附骨疽其候嗜眠沉重忽忽耳鳴又夏秋露臥為冷所折風熱伏結而作此疾急者熱多風少緩者風多熱少小兒未知取風冷何故而有此疾由其血盛肌嫩為風折之即使凝結故也凡初得附骨疽即服漏蘆湯下之敷小豆散得消可服五香連翹湯方見本卷癰疽門中凡賊風其人體卒無熱中暴風冷即骨解深痛不廢轉動按之應骨痛久即結痛或結瘰癧其附骨疽久即腫而結膿以此為異若治附骨作賊風則增益病深膿多若治賊風作附骨則加風冷遂成瘰癧偏枯攣曲之疾也療之之效皆在善始耳此非天下至精其孰能與於此若候附骨與賊風為異者附骨之始未腫但痛而已其賊風但痛不熱附骨則其上壯熱四體乍寒乍熱小便赤大便澀而無汗若得下卻熱並開發腠理便得消也縱不消盡亦得浮淺近外凡賊風但夜痛骨不可按抑不得迴轉痛處不壯熱亦不乍寒乍熱覺身體索索然冷欲得熱熨痛處即小寬時復有汗出此為賊風證也宜針灸熨爆服諸治風藥即愈方見第八卷諸風門中又有風熱毒相搏為腫其狀先腫上生瘭漿如火灼處名曰風熱毒治之一如丹法又有洪燭瘡身上忽生瘭漿如沸湯灑劇者遍頭面亦有胸脅腰腹腫緩通體如火湯灼瘭起者是也治之法急服漏蘆湯下之外以升麻膏敷之其敷升麻膏若無效一依敷丹方凡熱瘡起便生白膿黃爛瘡起即淺但出黃汁名肥瘡浸淫瘡者淺搔之蔓延長不止瘙癢者初如疥搔之轉生汁相連者是也瘑瘡者初作亦如肥瘡喜著手足常相對生隨月生死痛癢坼裂春夏秋冬隨瘥劇者是也有久癰余瘡敗為深疽者在腨脛間喜生瘡中水惡露寒凍不瘥經年成骨疽亦名胻瘡深爛青黑四邊堅強中央膿血汁出百藥不瘥汁潰好肉處皆虛腫亦有碎骨出者可溫赤龍皮湯漬方見二十三卷腸癰篇夏月日日洗冬月四日一洗青肉多可敷白䕡茹散方見本卷癰疽門中食去惡肉可三日一敷之止後長敷家豬屎散方見本卷癰疽門得瘥止取豬屎燒灰作末如粉至瘡中令滿白汁出吮去隨更敷之瘥止若更青肉復著白䕡茹散如前法家豬屎散取平復凡骨疽百藥不瘥者可瘡上以次灸之三日三夜便瘥如瘡不瘥瘥而復發骨從孔中出者名為骨疽取先死烏雌雞一隻去肉取骨熬焦如炭取三家牛棓木刮取屑三家甑箄各一兩皆燒成灰合導瘡中碎骨當出數片瘥治瘭疽秘方射干甘草枳實升麻乾地黃黃芩各八分麝香二分前胡三分犀角六分大黃十分上十味㕮咀以水九升煮取三升下大黃一沸去滓納麝分三服瘥止亦不限劑數外臺無黃芩治瘭疽著手足肩背累累如米起色白刮之汁出瘥後復發方黃耆六分升麻四分款冬花二分附子苦參範汪無赤小豆各一分上六味為末酒服方寸匕稍加日三服豬蹄湯治瘭疽諸疽十指頭焮赤癢痛方白芷大黃芎藭黃芩黃連甘草細辛藁本當歸藜蘆莽草各一兩上十一味㕮咀以水二斗先煮豬蹄一具取一斗煮藥取五升浸瘡即瘥又方灶屋塵灶突塵釜下土各一斤上三味合研令勻以水一斗煮三沸取汁洗日三四度治瘭疽著手足肩背忽發累累如赤豆剝之汁出方又方剝去瘡痂以溫醋泔清洗之以胡燕窠和百日男兒屎如膏敷之又方臘月糖晝夜連浸數日乃愈鯽魚一枚長三寸者亂髮如雞子大豬脂一升上三味煎為膏敷之治瘭疽浸淫多汁日漸大方黃連二兩胡粉甘草䕡茹各二分上四味治下篩以粉瘡上日三四度又方青木香滑石龍骨各三兩胡粉一兩米粉一升上五味為末稍粉病上日三又方蕪菁子熬搗碎帛裹展轉敷上良又方麻子熬作末摩上良又方酒和麵敷之又方以豬膽敷之良又方亂髮灰服方寸匕日三亦治發背又方蕓薹菜煮取汁一升服之並食干熟蕓薹數頓少與鹽醬冬月研子水和服之又方枸杞根並葵根葉煮汁煎令如飴隨意服之治疽潰後方以鹽湯洗拭了燒皂莢灰粉上良又方牛耳中垢敷之良又方梁上塵和車𨊧中脂敷之又方生麻油滓綿裹布瘡上蟲出又方以沸湯灌瘡中三四遍湯一作餳治疽似癰而小有異膿如小豆汁今日去明日滿者方用蕓薹熟搗濕布袋盛之埋熱灰中更互熨之不過二三度安瘥冬用乾者又方皂莢煎湯洗瘡拭乾以柏皮為末敷勿令作痂治風疽方凡腳腨及曲䐐中癢搔則黃汁出是也灸法見後以青竹筒一枚徑一寸半長三尺中著大豆一升以糠馬屎二種燒取火當竹筒中燒之以器承兩頭取汁先以泔清和鹽熱洗瘡了即塗豆汁不過三度極效又方嚼胡麻敷以綿裹之日易神良治石疽狀如痤癤而皮厚方搗穀子敷之亦治金瘡治久癰瘡敗壞成骨疽方用龍骨末粉瘡四面厚二分以膏著瘡中日二易蟲出如發盡愈膏方如下大蝦蟆一枚自死者亂髮如雞子大豬脂一斤上三味取二味納脂中煎略消盡下待冷更納鹽一合攪和充前用治瘡久不瘥瘥而復發骨從孔中出名骨疽方以豬膽和楸葉搗封之又方搗白楊葉末敷之又方搗蕪菁子敷之帛裹日一易又方穿地作坑口小里大深二尺取乾雞屎二升以艾及荊葉搗碎和雞屎令可燃火坑中燒之令煙出納疽於坑中熏之以衣擁坑口勿泄氣半日當有蟲出甚效治附骨疽方槲皮燒為末飲服方寸匕又方新剝鼠皮如錢孔大貼腫上即膿出已潰者取豬脊上脂貼之治疽卒著五指筋急不得屈伸方灸踝骨中央數十壯或至百壯治久疽方用鯽魚一枚破腹勿損納白鹽於腹中以針縫之入銅器中火上煎令乾作末敷疽瘡中無膿者以豬脂和敷上小痛毋怪也十日瘥又方灸間使後一寸隨年壯立瘥苦瓠散治浸淫瘡方瘡表裡相當名浸淫瘡苦瓠一兩蜂房蛇蛻各半兩大豆半合梁上塵一合上五味治下篩以粉為粥和敷紙上貼之日三古今錄驗無大豆又方煎餅乘熱拓之亦治細癬又方豬牙車骨年久者槌破燒令脂出熱塗之又方苦楝皮若枝燒作灰敷上乾者以豬脂和塗之並治小兒禿瘡及諸惡瘡治瘑瘡方用醋一升溫令沸以生薤一把納中封瘡上瘥為度又方搗桃葉和鯉魚鮓糝封之亦可以鮓敷上又方炒臘月飴糖敷之又方燒故履係為末敷之又方燒松根取脂塗之治燥瘑方用醋和灰塗之又方以熱牛屎塗之治濕瘑方燒乾蝦蟆和豬脂敷之治瘑疥百療不瘥方楝實一升桃皮苦參地榆根各五兩上四味㕮咀以水一斗煮取五升溫洗之日一度治久瘑疥濕瘡浸淫日廣癢不可堪搔之黃汁出瘥後復發方用羊蹄根淨去土細切熟熬以醋和熟搗洗淨瘡敷上一時頃以冷水洗之日一度又陰乾作末癢時搔則汁出以粉之又以生蔥根揩之千金翼無蔥字治一切腨瘡凡腳腨及曲䐐中癢搔則黃汁出是名風疽灸足大指歧間二七壯又灸大趾頭亦佳治諸瘡因風致腫方燒白芋灰溫湯和厚三分敷瘡上干即易五六度瘥又方櫟根皮三十斤銼以水三斛煮令熱下鹽一把令的的然熱浸瘡當出膿血日日為之瘥止治惡露瘡方搗薤葉敷瘡口以大艾炷灸藥上令熱入內即瘥治惡瘡方礬石松脂亂髮蠟各二分豬膏四兩上五味煎發候消納礬石次納松脂次納蠟去滓先刮洗瘡令淨然後用藥塗之日二三不痛久瘡時愈新瘡遲愈瘑疥癢瘡頭禿者皆即愈生髮又方燒扁竹灰和楮白汁塗之又方羊屎麻根燒煙斷膏和封上有汁者干敷之又方以面一升作餅大小覆瘡灸上令熱汁出盡瘥治惡瘡似火爛洗湯用白馬屎曝乾以河水和煮十沸絞出汁洗之治惡瘡其大如錢名曰馬疥瘡以水漬自死蛇一頭令爛去骨以汁塗之隨瘥治惡瘡十年不瘥似癩方蛇蛻皮一具燒為末下篩豬脂和敷醋和亦得又方苦瓠一枚碎煮汁洗之日三度又煎以塗癬甚良當先以泔淨洗乃塗三日瘥又方燒猳豬屎敷之又方鹽湯洗搗地黃葉貼之又方燒莨菪子為末敷之又方燒鯽魚灰和醬清敷之烏膏治惡瘡方雄黃雌黃芎藭升麻烏頭防己竹灰黃連黃柏水銀各二兩胡粉一分蠟三兩杏仁三十枚巴豆二十枚松脂亂髮各一雞子大上十六味㕮咀以豬膏三升急煎令發消去滓停小冷入真珠三錢匕攪令相得以敷之凡用膏先淨洗瘡拭乾乃敷上敷訖以赤石脂黃連散粉之翼方無竹灰水銀蠟治種種諸瘡不愈者方水銀一兩黃連二兩經墨三分上三味治下篩以不中水豬脂和敷上不過二三度瘥神良若欲多作任人水銀大須熟研其藥惟不治金瘡治反花瘡並治積年諸瘡方取牛蒡根熟搗和臘月豬脂封上瘥止並治久不瘥諸腫惡瘡漏瘡等皆瘥又方取馬齒菜搗封上瘥止又方取蜘蛛膜貼上數易之瘥止治身瘡及頭瘡不止方取菖蒲為末敷上日三夜二治瘡久不瘥者方蕪荑藜蘆各一兩薑黃青礬雄黃各一分苦參沙參各三兩附子一枚上八味治下篩先以鹽汁洗瘡去痂干拭敷上小兒一炊久剝去之大人半日才剝再敷不過三四度愈治諸瘡久不瘥並治六畜方用棗膏三升水三斗煮取一斗半數洗取愈治代指方用甘草二兩㕮咀水五升煮取一升半漬之又方以唾和白硇砂搜面作碗子盛唾次著硇砂如棗許以爪指著中一日瘥又方以毛雜黃土作泥泥指上厚五分納煻灰中煨之令熱可忍泥干即易不過數度瘥又方刺指熱飯中二七遍又方以麻沸湯漬之即愈又方單煮地榆湯漬之半日又方取薑黃蔥葉煮沸漬之又方以蜀椒四合水一升煮三沸漬之又方先刺去膿血炙魚鮓皮令溫以纏裹周匝痛止便愈治指痛欲脫方豬脂和鹽煮令消熱納指中一食久住翼方和乾薑治手足指掣痛不可忍方用醬清和蜜溫塗之又方灸指端七壯立瘥治手足指逆臚方此緣廁上搔頭所致還坐廁上以指倒捋二七下即瘥又方真珠一分乾薑二分上二味搗以粉瘡上日三治手足皴裂逆臚代指方酒搦豬胰洗之慎風冷治冬月冒涉凍凌面目手足皴瘃及治熱痛欲瘃方用麥窠煮令濃熱洗之治凍指瘃欲墮方用馬屎三升以水煮令沸漬半日愈治手足皴劈硬裂血出疼痛方用豬脂著熱酒中洗之治手足皴痛方煮茄根洗之又方芎藭三分蜀椒二分白芷防風鹽各一兩上五味㕮咀以水四升煎取濃塗之或豬脂煎更良治屍腳方凡人腳無冬夏常拆裂者是用雞屎一升水二升煮數沸停小冷漬半日瘥止亦用馬屎忌踏酒吐及婦人穢血又方熔膠膠干以故帛貼上治割甲侵肉不瘥方以硇砂礬石為末裹之以瘥為度又方搗鬼針草苗汁鼠黏草根和臘月豬脂敷之
