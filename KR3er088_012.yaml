body:
  text: 卷十二膽腑方凡七類膽腑脈論第一論一首論曰膽腑者主肝也肝合氣於膽膽者中清之腑也難經云膽者清淨之腑甲乙雲中精之腑號將軍決曹吏重三兩三銖長三寸三分在肝短葉間下貯水精汁二合難經作三合能怒能喜能剛能柔目下窠大其膽乃橫凡腦膽髓骨脈女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之腑若胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之腑此不能久留輸瀉者也所謂五臟者藏精氣甲乙作神而不瀉故滿而不能實六腑者傳化物而不藏故實而不能滿所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也左手關上陽絕者無膽脈也苦膝疼口中苦眯目善畏如見鬼多驚少力刺足厥陰治陰在足大趾間或刺三毛中左手關上陽實者膽實也若腹中不安身軀習習也刺足少陽治陽在足上第二趾本節後一寸是膽病者善太息口苦嘔宿汁心澹澹恐如人將捕之咽中介介然數唾候在足少陽之本末亦見其脈之陷下者灸之其寒熱刺陽陵泉若善嘔有苦長太息心中澹澹善悲恐如人將捕之邪在膽逆在胃膽液則口苦胃氣逆則嘔苦汁故曰嘔膽刺三里以下胃氣逆刺足少陽血絡以閉膽卻調其虛實以去其邪也膽脹者脅下痛脹口苦太息肝前受病移於膽肝咳不已則嘔膽汁厥氣客於膽則夢鬥訟甲乙雲夢鬥訟自刳肝應筋爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪軟色赤者膽緩爪直色白無約者膽直爪惡色黑多敗者膽結扁鵲云足厥陰與少陽為表裡表清裡濁其病若實極則傷熱熱則驚動精神而不守臥起不定若虛則傷寒寒則恐畏頭眩不能獨臥發於玄水其根在膽先從頭面起腫至足方見治水篇中膽有病則眉為之傾病人眉系傾者七日死足少陽之脈是動則病口苦善太息心脅痛不能反側甚則面微塵身無膏澤足外反熱是為陽厥是主骨所生病者頭痛角頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸中脅肋髀膝外至胻絕骨外踝前及諸節皆痛小趾次趾不用盛者則人迎大一倍於寸口虛者則人迎反小於寸口也其經脈經筋支別已具第十一卷肝臟部中膽虛實第二脈二首方九首灸法二首膽實熱左手關上脈陽實者足少陽經也病苦腹中氣滿飲食不下咽乾頭痛洒洒惡寒脅痛名曰膽實熱也半夏湯治膽腑實熱精神不守瀉熱方半夏宿姜各三兩黃芩一兩生地黃五兩遠志茯苓各二兩秫米一升酸棗仁五合上八味㕮咀以千里長流水五斗煮秫米令蟹目沸揚之千餘遍澄清取九升煮藥取三升半分三服集驗方治虛煩悶不得眠無地黃遠志有麥門冬桂心各三兩甘草人參各二兩膽虛寒左手關上脈陽虛者足少陽經也病苦眩厥痿足趾不能搖躄不能起僵仆目黃失精䀮䀮名曰膽虛寒也溫膽湯治大病後虛煩不得眠此膽寒故也宜服之方半夏竹茹枳實各二兩橘皮三兩甘草一兩生薑四兩上六味㕮咀以水八升煮取二升分三服一本有茯苓二兩紅棗十二枚千里流水湯治虛煩不得眠方麥門冬半夏各三兩茯苓四兩酸棗仁二升甘草桂心黃芩遠志萆薢人參生薑各二兩秫米一升上十二味㕮咀以千里流水一斛煮米令蟹目沸揚萬遍澄清取一斗煮藥取二升半分三服酸棗湯治虛勞煩攪奔氣在胸中不得眠方酸棗仁三升人參桂心生薑各二兩石膏四兩茯苓知母各三兩甘草一兩半上八味㕮咀以水一斗先煮棗仁取七升去滓下藥煮取三升分三服日三治虛勞煩悶不得眠方大棗二七枚蔥白七莖上二味以水三升煮取一升去滓頓服梔子湯治大下後虛勞不得眠劇者顛倒懊惱欲死方仲景云發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊惱梔子湯主之大梔子十四枚豉七合上二味以水四升先煮梔子取二升半納豉更煮三沸去滓每服一升安者勿更服若上氣嘔逆加橘皮二兩亦可加生薑二兩治煩悶不得眠方枸杞白皮生地黃各五兩麥門冬甘草前胡各五兩茯苓知母各四兩人參二兩粟米豉各五合上十味㕮咀以水八升煮取三升七合分四服治虛勞不得眠方酸棗仁榆葉等分上二味為末蜜丸如梧桐子大每服十五丸日再又方乾薑四兩為末湯和頓服覆取汗愈灸法膽實熱灸濁浴隨年壯穴在挾膽俞旁相行去五寸膽虛灸三陰交各二十壯穴在內踝上一夫咽門論第三論一首論曰夫咽門者應五臟六腑往來神氣陰陽通塞之道也喉嚨包囊舌者並津液調五味之氣本也不可不研乎咽門者肝膽之候也主通五臟六腑津液神氣應十二時若臟熱則咽門閉而氣塞若腑寒則咽門破而聲嘶母姜酒主之方見六卷喉病門熱則通之寒則補之若寒熱調和病不生矣髓虛實第四論一首方二首論曰髓虛者腦痛不安實者勇悍凡髓虛實之應主於肝膽若其腑臟有病病從髓生熱則應臟寒則應腑羌活補髓丸治髓虛腦痛不安膽腑中寒方羌活川芎當歸各三兩桂心二兩人參四兩棗肉研如脂羊髓酥各一升牛髓大麻仁各二升熬研如脂上十味先搗五種干藥為末下棗膏麻仁又搗相濡為一家下二髓並酥納銅缽中重湯煎取為丸如梧子大酒服三十丸日二服稍加至四十丸柴胡發泄湯治體實勇悍驚熱主肝熱方柴胡升麻黃芩細辛枳實梔子仁芒硝各三兩淡竹葉生地黃各一升澤瀉四兩上十味㕮咀以水九升煮取三升去滓下硝分三服風虛雜補酒煎第五方十九首巴戟天酒治虛羸陽道不舉五勞七傷百病能食下氣方巴戟天牛膝各三升枸杞根白皮麥門冬地黃防風各二斤上六味並生用如無生者用乾者亦得㕮咀以酒一石四斗浸七日去滓溫服常令酒氣相續勿至醉吐慎生冷豬魚油蒜春七日秋冬二七日夏勿服先患冷者加乾薑桂心各一斤好忘加遠志一斤大虛勞加五味子蓯蓉各一斤陰下濕加五加根皮一斤有石斛加一斤佳每加藥一斤即加酒七升此酒每年九月中旬即合十月上旬即服設服余藥以此酒下之大妙滓曝乾搗為末以此酒服方寸匕日三益佳常加甘草十兩佳虛勞加黃耆一斤又方巴戟天生牛膝各三斤上二味㕮咀以酒五斗淹浸服如前法五加酒治虛勞不足方五加皮枸杞根白皮各一斗上二味㕮咀以水一石五斗煮取汁七斗分取四斗浸曲一斗餘三鬥用拌飯下米多少如常釀法熟壓取服之多少任性禁如藥法倍日將息天門冬大煎治男子五勞七傷八風十二痹傷中六極一氣極則多寒痹腹痛喘息驚恐頭痛二肺極則寒痹腰痛心下堅有積聚小便不利手足不仁三脈極則顏色苦青逆意喜恍惚失氣狀似悲泣之後苦舌強嚥喉干寒熱惡風不可動不嗜食苦眩喜怒妄言四筋極則拘攣小腹堅脹心痛膝寒冷四肢骨節皆疼痛五骨極則肢節厥逆黃疸消渴癰疽妄發重病浮腫如水病狀六肉極則發疰如得擊不復言甚者至死復生眾醫所不能治此皆六極七傷所致非獨房室之為也憂恚積思喜怒悲歡復隨風濕結氣咳時嘔吐食已變大小便不利時泄利重下溺血上氣吐下乍寒乍熱臥不安席小便赤黃時時惡夢夢與死人共飲食入塚神室魂飛魄散筋極則傷肝傷肝則腰背相引難可俯仰氣極則傷肺傷肺則小便有血目不明髓極則陰痿不起住而不交骨極則傷腎傷腎則短氣不可久立陰疼惡寒甚者卵縮陰下生瘡濕癢手搔不欲住汁出此皆為腎病甚者多遭風毒四肢頑痹手足浮腫名曰腳弱一名腳氣醫所不治此悉主之方天門冬生地黃切各三斗半搗壓盡取汁白蜜三升煉酥三升煉枸杞根切三斗洗淨以水一石五斗煮取一斗三升澄清獐骨一具搗碎以水一石煮取五斗澄清上六味並大斗銅器中微火先煎門冬地黃減半乃合煎取大斗二斗下後件散藥煎取一斗納銅器重釜煎令隱掌可丸如梧子大平旦空腹酒服二十丸日二加至五十丸慎生冷醋滑豬雞魚蒜油麵等須擇四時王相日修合其和合一如第一卷和合篇說散藥如下茯苓桂心白朮葳蕤五加皮菖蒲遠志澤瀉薯蕷柏子仁人參石斛牛膝杜仲覆盆子細辛獨活枳實川芎大豆黃卷黃耆肉蓯蓉續斷狗脊胡麻子萆薢白芷橘皮茯神巴戟天石南各二兩阿膠十兩甘草六兩蜀椒薏苡仁各一升大棗一百枚煮作膏鹿角膠五兩蔓荊子三兩上三十八味治下篩納煎中有牛髓鹿髓各加三升尤佳小便澀去柏子仁加秦艽二兩乾地黃六兩陰痿失精去葳蕤加五味子二兩頭風去柏子仁加菊花防風各二兩小便利陰氣弱去細辛防風加山茱萸二兩腹中冷去防風加乾薑二兩無他疾依方修合凡此煎九月下旬採藥立冬日合服至五月上旬止若十二月臘日合者經夏至至七月下旬止若停留經夏不壞當於舍北陰處入地深六尺填沙置藥中上加沙覆之則經夏不損也女人先患熱者得服患冷者勿服填骨萬金煎治內勞少氣寒疝裡急腹中喘逆腰脊痛方生地三十斤取汁肉蓯蓉甘草阿膠各一斤麥門冬乾地黃各三斤乾薑桑白皮茯苓桂心各八兩人參桔梗五味子附子各五兩石斛一斤五兩牛髓三斤白蜜十斤清酒四斗麻子仁三升大棗一百五十枚當歸十四兩乾漆二十兩蜀椒四兩上二十三味先以清酒二斗六升納桑根白皮麻子仁棗膠為刻識之又加酒一斗四升煮取至刻絞去滓納蜜髓地黃汁湯上銅器煎納諸藥末半日許令可丸止大甕盛飲吞如彈丸一枚日三若夏月暑熱煮煎轉味可以蜜與地黃汁和諸藥成丸如梧子服十五丸不知稍加至三十丸又方治男子風虛勞損兼時氣方甘草一斤石斛防風蓯蓉山茱萸茯苓人參薯蕷各四兩桂心牛膝五味子菟絲子巴戟天川芎各三兩併為末生地骨皮生地黃汁各一升丹參二兩生麥門冬汁牛髓白蜜各三升生薑汁一升胡麻二升以水二斗煮取四升去滓上二十二味先煮地黃地骨皮胡麻汁減半納牛髓蜜薑門冬等汁微火煎餘八升下諸藥散和令調納銅器中湯上煎令可丸如梧子大酒服三十丸日二服加至五十丸小鹿骨煎地黃小煎治五勞七傷羸瘦干削方乾地黃末一升胡麻油半升蜜二升豬脂一斤上四味銅器中煎令可丸如梧子大飲服三丸日二稍加至十丸久久常服大有所益瘦黑者肥充陸抗膏治虛冷枯瘦身無精光虛損諸不足方牛髓羊脂各二升酥經心錄用豬脂生薑汁白蜜各三升上五味先煎酥令熟次納薑汁次納蜜次納羊脂牛髓後微火煎三上三下令薑汁水氣盡即膏成攪令凝止溫酒服隨人能否不限多少令人肥健發熱也經心錄云治百病勞虛風濕補益神效男女通可服之良枸杞煎補虛羸久服輕身不老神驗方九月十日取生濕枸杞子一升清酒六升煮五六沸取出熟研濾取汁令其子極淨曝令乾搗末和前汁微火煎令可丸酒服二方寸匕日二加至三匕亦可丸服三十丸夏姬杏仁煎方太上肘后王經方名杏金丹杏仁三升納湯中去皮尖雙仁熟搗盆中水研取七八升汁以鐵釜置煻火上取羊脂四斤就釜內磨消納杏仁汁溫之四五日色如金狀餌如彈子日三服百日肥白易容人不能識也又方杏仁去皮尖熬黃搗服如梧子日三治枯瘦令人潤澤無所禁咳逆上氣喉中百病心下煩不得咽物者得茯苓款冬紫菀併力大良其藥生熱熟冷喉中如有息肉者亦服之桃仁煎方桃仁蜜各一斤酥半斤胡麻一升末牛乳五升地黃十斤取汁上六味合煎如餳旋服之治五勞七傷方白羊頭蹄一具淨治以草火燒令黃赤以淨綿急塞鼻及腦孔胡椒蓽茇乾薑各一兩蔥白一升豉三升上七味先以水煮頭及蹄半熟即納藥煮令極爛去藥冷暖任性食之日一具七日凡七具忌生冷酢滑五辛陳臭等物治虛勞補方羊肚一具切白朮一升上二味以水二斗煮取六升每服二升日三為度又方豉一升蒸三遍薤白一斤切上二味以水七升煮取三升分三服小取汗膏煎治虛羸瘦方不中水豬肪煎取一升納蔥白一握煎令黃出納盆中平旦空腹服訖暖覆臥至晡時食白粥粥不得稀過三日服補方如下羊肝一具羊脊膂肉一條曲末半斤枸杞根十斤上四味以水三斗煮枸杞取一斗去滓細切肝等納汁中著蔥豉鹽如羹法合煎看如稠糖即好食之七日禁如藥法補虛方豬肚一具人參五兩蜀椒一兩乾薑三兩半蔥白七兩白粱米半升翼用粳米上六味㕮咀諸藥令相得和米納肚中縫合勿令泄氣取水四斗半緩火煮爛空腹食之大佳兼下少飯吐血第六論二首方二十九首針灸法十五首論曰稟丘云吐血有三種有內衄有肺疽有傷胃內衄者出血如鼻衄但不從鼻孔出是近從心肺間津液出還流入胃中或如豆羹汁或如切𧗐血凝停胃中因即滿悶便吐或去數斗至一石者是也得之於勞倦飲食過常所為也肺疽者或飲酒之後毒滿悶吐之時血從吐後出或一合半升一升是也傷胃者因飲食大飽之後胃中冷則不能消化不能消化便煩悶強嘔吐使所食之物與氣共上衝蹴因傷裂胃口吐血色鮮正赤腹絞痛自汗出其脈緊而數者為難治也問曰病胸脅支滿妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之對曰病名血枯此得年少時有所大奪血若醉入房中氣竭而肝傷故使月事衰少不來也治以烏賊骨䕡茹二味併合丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也凡吐血後體中但自㤿㤿然心中不悶者輒自愈假令煩躁心中悶亂紛紛嘔吐顛倒不安醫工又以黃土湯阿膠散益加悶亂卒致不濟如此悶者當急吐之急吐方瓜蒂三分杜蘅人參各一分上三味治下篩服一錢匕或無水漿但得下即可羸人小減之吐去青黃或吐血一二升無苦黃土湯治吐血方伏龍肝雞子大二枚桂心乾薑當歸芍藥白芷甘草阿膠芎藭各一兩生地黃二兩細辛半兩吳茱萸二升上十二味㕮咀以酒七升水三升合煮取三升半去滓納膠煮取三升分三服亦治血衄又方治卒吐血及衄血方伏龍肝半升甘草乾薑仲景作地黃白朮阿膠黃芩各三兩上六味㕮咀以水一斗煮取三升去滓下膠分三服生地黃湯治憂恚嘔血煩滿少氣胸中痛方生地黃一斤大棗五十枚阿膠甘草各三兩上四味㕮咀以水一斗煮取四升分四服日三夜一堅中湯治虛勞內傷寒熱嘔逆吐血方糖三斤芍藥半夏生薑甘草各三兩桂心二兩大棗五十枚上七味㕮咀以水二斗煮取七升分七服日五夜二翼方無甘草桂心有生地黃治噫止唾血方石膏四兩厚朴三兩麻黃生薑五味子半夏杏仁各二兩小麥一升上八味㕮咀以水一斗煮麻黃去沫澄取七升納藥煮取二升半分再服治吐血胸中塞痛方芍藥乾薑茯苓桂心當歸大黃芒硝各三兩阿膠甘草人參各二兩麻黃一兩乾地黃四兩虻蟲水蛭各八十枚大棗二十枚桃仁一百枚上十六味㕮咀以水一斗七升煮取四升分五服日三夜二柏葉湯治吐血內崩上氣面色如土方乾薑阿膠柏葉各二兩艾一把上四味㕮咀以水五升煮取一升納馬通汁一升煮取一升頓服仲景不用阿膠小品肘後俱不用柏葉治吐血酒客溫疫中熱毒乾嘔心煩方蒲黃犀角栝蔞根甘草各二兩葛根桑寄生各二兩上六味㕮咀以水七升煮取三升分三服澤蘭湯治傷中裡急胸脅攣痛欲嘔血時寒時熱小便赤黃此皆傷於房勞故也澤蘭糖各一斤桂心桑根白皮人參各二兩遠志二兩生薑五兩麻仁一升上八味㕮咀以醇酒一斗五升煮取七升去滓納糖食前服一升日三夜一勿勞動治忽吐血一二口或是心衄或是內崩方蠐螬五枚牛膝生王不留行牡丹麥門冬各二兩萆薢芍藥乾地黃各四兩續斷阿膠各三兩上十味㕮咀以生地黃汁五升赤馬通汁三升煮取三升分三服不瘥更合數劑取瘥止又方熟艾三雞子許水五升煮取二升頓服又方燒亂髮灰水服方寸匕日三服集驗云治舌上忽出血如簪孔者亦治小便出血者治虛勞吐血方生地黃肥者五升搗以酒一升煮沸三上三下去滓頓服又方凡吐血服桂心末方寸匕日夜可二十服肘後亦云療下血又方生地黃五斤絞取汁微火煎三沸投白蜜一斤又煎取三升每服半升日三主胸痛百病久服佳又方柏葉一升以水六升煮取三升分三服又方生地黃汁半升川大黃末一方寸匕上二味先溫地黃汁一沸次納大黃攪和空腹頓服日三瘥犀角地黃湯治傷寒及溫病應發汗而不汗之內蓄血及鼻衄吐血不盡內余瘀血大便黑面黃消瘀血方犀角一兩生地黃八兩芍藥三兩牡丹皮二兩上四味㕮咀以水九升煮取三升分三服喜妄如狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方不須有所增加治五臟熱結吐血衄血方伏龍肝雞子大一枚生竹茹一升芍藥當歸黃芩芎藭甘草各二兩生地黃一斤上八味㕮咀以水一斗三升先煮竹茹減三升下諸藥取二升分三服翼方有桂心當歸湯治衄血吐血方當歸乾薑芍藥阿膠各二兩黃芩三兩上五味㕮咀以水六升煮取二升分三服治上焦熱膈傷吐血衄血或下血連日不止欲死並主之方艾葉竹茹各一升阿膠如手掌大乾薑二兩上四味㕮咀以水三升煮取一升去滓納馬通汁半升煮取一升頓服取新馬屎與少水和絞取汁服一方不用竹茹加乾薑作七兩治虛勞崩中吐血下血上氣短氣欲絕面黑如漆方黃耆芍藥芎藭甘草各四兩生薑一斤上五味㕮咀以酒五升浸一宿明旦更以水五升煮取四升分四服日三夜一下陰中毒如湯沃雪凡夏月不得宿浸藥酒客勞熱發痔下血穀道熱者去生薑用生地黃代之凡進三兩劑竹茹湯治吐血衄血大小便下血方竹茹二升甘草川芎黃芩當歸各六分芍藥白朮人參桂心各一兩上九味㕮咀以水一斗煮取三升分四服日三夜一治九孔出血方搗荊葉汁酒服二合一本作荊芥治吐血蠱毒痔血女子腰腹痛大便後出清血者方取東向蘘荷根搗絞取汁二升頓服立瘥赤小豆散諸下血先見血後見便為遠血宜服黃土湯方見本門七味仲景方是先見便後見血宜服赤小豆散方赤豆三升熬令折當歸三兩上二味治下篩每服方寸匕日三乾地黃丸治虛勞胸腹煩滿疼痛瘀血往來臟虛不受谷氣逆不得食補中理血方乾地黃三兩當歸乾薑麥門冬甘草黃芩各二兩厚朴乾漆枳實防風大黃細辛白朮各一兩茯苓五兩前胡六分人參五分虻蟲䗪蟲各五十枚上十八味為末蜜丸如梧子大先食服十丸日三稍加麥門冬湯治凡下血虛極方麥門冬白朮各四兩甘草一兩牡蠣芍藥阿膠各三兩大棗二十枚上七味㕮咀以水八升煮取二升分再服針灸法胸中瘀血榰滿脅膈痛不能久立膝痿寒三里主之嘔血肩脅痛口乾心痛與背相引不可咳咳引腎痛不容主之心膈下嘔血上脘主之唾血振寒咽乾太淵主之嘔血大陵及郄門主之嘔血上氣神門主之內傷唾血不足外無膏澤刺地五會虛勞吐血灸胃脘三百壯亦主勞嘔逆吐血少食多飽多唾一作多睡吐血唾血灸胸堂百壯不可針吐血酸削灸肝俞百壯吐血腹痛雷鳴灸天樞百壯吐血唾血上氣咳逆灸肺俞隨年壯吐血嘔逆灸手心主五十壯千金翼云大陵是凡口鼻出血不止名腦衄灸上星五十壯入髮際一寸是大便下血灸第二十椎隨年壯萬病丸散第七論二首方十三首論曰聖人之道以慈濟物博求眾藥以備不虞倉促之際應手皆得故有萬病方焉余以此方散在群典乃令學者難用討尋遂鳩撮要妙以為斯品庶使造次可得好事君子安不忘危無事之暇可預和合以備疴瘵也芫花散治一切風冷痰飲症癖痎瘧萬醫所不治者皆治之一各登仙酒一各三建散翼方名大排風散芫花桔梗紫菀大戟王不留行烏頭附子天雄白朮五加皮蕘花狼毒莽草俗名魚藥又名鼠藥欒荊栝蔞根躑躅麻黃白芷荊芥茵芋各十分車前子石斛人參石南石長生各七分蛇床子萆薢牛膝狗脊菟絲子蓯蓉秦艽各五分藜蘆薯蕷薏苡仁巴戟天細辛當歸川芎乾地黃食茱萸杜仲厚朴黃耆山茱萸乾薑芍藥桂心黃芩吳茱萸防己遠志蜀椒獨活五味子牡丹橘皮通草柴胡柏子仁藁本菖蒲茯苓續斷各二分上六十四味翼方無白朮食茱萸有麻花半夏赤車使者高良薑紫葳並不治不擇不炙不熬但振去塵土搗以粗羅下之即與服凡是豬雞五辛生冷酢滑任意食之無所忌惟諸豆皆殺藥不得食藥散三兩細曲末二升糯米三升真酒五升先以三大斗水煮米作粥須極熟冬月揚去火氣春月稍涼夏月揚絕火氣令極冷秋稍溫次下曲末搦使和柔相得重下藥末搦使突突然好熟乃下真酒重搦使散盛不津器中以淨杖攪散經宿即飲直以布蓋不須密封凡服藥平旦空心服之以知為度微覺發動流入四肢頭面習習然為定勿更加之如法服之常常內消非理加增必大吐利服散者細下篩服一方寸匕和水酒漿飲無知稍增以知為度服丸者細下篩蜜丸如梧子每服七丸但此藥或丸或散皆可惟不得作湯若欲得補不令吐瀉但取內消大益勝於五石兼治諸病功效一等然作酒服佳於丸散美而易服流行迅疾若有患人抱病多時積癊宿食大塊久氣癥瘕積聚一切痼結者即須一兩度增令吐下泄去惡物盡後少服內消便為補益凡服藥填勿早食早食觸藥必當大吐吐亦無損須臾還定但令人咽喉痛三兩日後始瘥服者宜知之平旦服藥至午時待藥勢定宜先食冷飯菹飲冷漿水及午後藥勢一定任意熱食無忌若藥勢未定不得強起行行即暈悶旋倒眼花闇然迷絕此是逐風所致不須疑怪風盡之後縱令多服更佳不然悶時但坐但臥須臾醒然不異於常若其定後任意所之若必便旋當策杖如廁少覺煩亂即須坐定坐定即醒醒乃可行病在膈上久冷痰癊積聚癥結疝瘕宿食堅塊咳逆上氣等一切痼結重病終日吐唾逆氣上衝胸喉此皆胃口積冷所致三焦腸間宿冷以成諸疾如此例便當吐卻此等惡物輕者一度下轉藥令吐卻若重者三五度下之令盡其吐狀法初吐冷氣沫次吐酢水須臾吐黃汁大濃甚苦似牛涎病若更多者當吐出紫痰似紫草汁非常齒齼有此者例入死道不久定死若有疰者吐血陳久黑血新者鮮血吐罷永瘥不發下此吐藥當吐時大悶須臾自定即不虛惙得冷飲食已耳不虛聾手足不痹若胃口有前件等病勢久成者正當吐時有一塊物塞胸喉吐復不出咽復不入當有異種大悶更加一二合藥酒重投藥下少時即當吐出塊物如拳大真似毈雞子黃著地以刀斫碎重者十塊輕者三五枚凡人有上件等病若服藥時不吐卻者當時雖得漸損一二年後還發為此故須下吐藥欲服取吐者當以春三月服之春宜吐故也凡膈上冷小腹滿腸鳴膀胱有氣冷利多者須加利藥於此酒內服之便去惡物利法出泔澱如清水如黃汁如青泥輕者一兩度下利藥得利以盡病源重者五度下利藥令使頻得大利以盡病根利法旦起服藥比至晡時可得兩三行即斷後服凡長病人瘦弱虛損老人貴人此等人但令少服積日漸漸加增令多內消瘥除久病不加吐利也藥若傷多吐利困極不止者水服生大豆末方寸匕即定及藍葉烏豆葉嚼以咽之登時即定此據大困時用之小困時不須也凡在世人有虛損陽衰消瘦骨立者服之非常補益旬月之間肌膚充悅顏色光澤髓溢精滿少壯一等凡眾疴萬病皆除之治一切風病癘節風二十兩和酒五斗賊風熱風大風上同偏風痹腿風癱緩風十二兩和酒三斗此七種並