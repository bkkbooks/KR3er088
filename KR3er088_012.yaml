煩滿氣短面目時赤或目中赤黃或乾嘔或吐逆或下赤白痢或熱氣如雲或欲狂走自殺或如見鬼或手足清冷或熱飲冷水而不知足或使手掇空或面目癰腫生瘡或耳聾目暗頭項背脊強不得屈伸或手足卒癢或百鬼惡疰狐魅走入皮膚痛無常處方麝香丹砂特生礜石馬目毒公即鬼臼雄黃各一兩巴豆九十粒青野葛三兩一本不用馬齒莧一兩生成起稜者上八味為末別搗巴豆如膏合搗五千杵納蜜更搗一萬杵丸如小豆大強者服二丸弱者一丸入腹云行四布通徹表裡從頭下行周遍五臟六腑魂魄靜定情性得安病在膈上吐膈下利或蛇蟲諸毒下五色熱水或不吐下便微漸除瘥萬蟲妖精狐貍鬼魅久痼癖塊皆消散在表汗出在裡直下忌名其藥故此方無名也仙人玉壺丸方雄黃藜蘆丹砂礜石巴豆八角附子各二兩上六味先搗巴豆三千杵次納礜石又搗三千杵次納藜蘆三千杵次納附子三千杵次納雄黃三千杵次納丹砂三千杵納蜜又搗萬杵佳若無丹砂納真珠四兩代之每納藥輒治五百杵納少蜜恐藥飛揚治藥用王相吉日良時童子齋戒為良天晴明無雲霧白晝藥成封密器中勿泄氣著清潔處大人服丸如小豆欲下病者宿勿食平旦服二丸不知者以粥暖飲發之令下下不止飲冷水以止之病在膈上吐膈下利或噫氣即已若欲漸漸除及將服消病者服如麻子大二丸卒中惡欲死不知人以酒若湯和二丸強開口灌喉中鬼疰病百種不可名漿水服二丸日再男女與鬼交通歌哭無常或腹大經絕狀如妊娠漿水服二丸如胡豆大日三夜一又苦酒和令如飴每旦敷手間使心主心主在手腕後第一約橫紋當中指至暮又敷足三陰三陽及鼻孔七日愈又漿水服麻子大一丸日三服三十日止惡風逆心不得氣息服一丸腹中如有蟲欲鑽脅出狀急痛一止一作是惡風服二丸憂恚氣結在胸心苦連噫及咳胸中刺痛服如麻子大三丸日三腹痛脹滿不食服二丸心腹切痛及心中熱服一丸如麻子大日三服五日瘥風疝寒疝心疝弦疝每發腹中急痛服二丸卒上氣氣但出不入並逆氣衝喉胃中暴積聚者服二丸日再澼飲痰飲平旦服一丸腹中三蟲宿勿食明旦炙牛羊肉三臠食之須臾進三丸如胡豆大日中當下過日中不下更進二丸爛蟲必下卒關格不得大小便欲死服二丸卒霍亂心腹痛煩滿吐下手足逆冷服二丸傷寒敕澀時氣熱病溫酒服一丸厚覆取汗不汗更服寒熱往來服一丸瘧未發一丸已發二丸便斷積寒熱老痞服二丸症堅結痞一丸日三取愈下痢重者一丸取斷食肉不消腹堅脹一丸立愈若淋瀝瘦瘠百節痠痛服一丸日三頭卒風腫以苦酒若膏和敷之絮裹之癰疽痤癤癧瘰及欲作瘻以苦酒和敷之若惡瘡不可名瘑疥疽以膏若苦酒和先以鹽湯洗瘡去痂拭乾敷之齒痛綿裹塞孔中鼠瘻以豬脂和敷瘡取駁舌狗子舐之中水毒服二丸若已有瘡苦酒和三丸敷之耳聾膿血汁出及卒聾以赤穀皮裹二丸納之風目赤或癢視物漠漠淚出爛眥蜜解如飴塗注目眥若為蠱毒所中吐血腹內如刺服一丸如麻子有加大如胡豆亦以塗鼻孔中又以膏和通塗腹背上亦可燒之熏口及鼻若為蛇蝮諸毒所中及猘犬狂馬所咋苦酒和敷又水服二丸婦人產後余疾及月水不通往來不時服二丸日再婦人胸中苦滯氣氣息不利小腹堅急繞臍絞痛漿水服如麻子一丸稍加之如小豆大小兒百病驚癇痞塞及有熱百日半歲者以一丸如黍米大置乳頭飲之一歲以上如麻子一丸日三飲送下小兒大腹及中熱惡毒食物不化結成積聚服一丸小兒寒熱頭痛身熱及吐哯服一丸如麻子大小兒羸瘦丁奚不能食食不能化漿水服二丸日三又苦酒和如梧子大敷腹上良一切萬病量之不過一二丸莫不立效張仲景三物備急丸司空裴秀為散用治心腹卒暴百病方大黃乾薑巴豆各等分上皆須精新多少隨意先搗大黃乾薑下篩為散別研巴豆如脂納散中合搗千杵即爾用之為散亦好用蜜為丸貯密器中莫令泄氣若中惡客忤心腹脹滿刺痛口噤氣急停屍卒死者以暖水若酒服大豆許三枚老小量與扶頭起令得下喉須臾未醒更與三枚腹中鳴轉得吐利便愈若口已噤可先和成汁傾口中令從齒間得入極良大理氣丸大麝香丸治鬼疰飛屍病方麝香三分礜石八分牛黃附子鬼臼真珠莽草犀角礬石細辛桂心獺肝藜蘆各二分雄黃一兩丹砂二兩蜈蚣蜥蜴各一枚巴豆杏仁各五十枚芫青地膽外臺作蚺蛇膽亭長斑蝥各七枚上二十三味為末蜜和合更搗三千杵丸如小豆大飲服一丸日再漸加至三丸蟲毒所螫摩之以知為度若欲入毒疫癘鄉死喪病處及惡鬼塚墓間盛絳囊中男左女右肘後系之又以少許敷鼻下人中及臥不魘小麝香丸治同前麝香莽草犀角梔子仁各三分雄黃當歸外臺不用丹砂各四分乾薑桂心芍藥細辛各五分附子烏頭各五枚蜈蚣一枚巴豆五十枚上十五味為末蜜和合搗千杵丸如小豆大服三丸日三可加至五丸一切屍疰痛悉皆主之紫葛丸治緒熱不調方紫葛石膏人參丹參紫參苦參元參細辛齊鹽代赭蓯蓉巴豆烏頭各三分乾薑桂心獨活各五分上十六味為末蜜和更搗萬餘杵丸如小豆服六丸食前三丸食後三丸忌五辛豬雞魚蒜余不在禁限若覺體中大熱各減一丸服之令人肥悅好顏色強陽道能食服藥後十日得利黃白汁大佳婦人食前食後只服二丸兩歲以下小兒服丸如米粒大令人能飲酒除百病藥之功能損益備述如下腹中積聚心腹滿心下堅痰飲宿食食吐逆上氣短氣咳嗽咽喉鳴黃疸久瘧面腫身浮腫四肢煩重坐起體重熱病濕䘌下部癢體瘡癢關格不通大腸出熱淋下利顏色不定羸瘦無力弱房少精精冷身體斑駁從高墮下絕傷墮胎後傷損血皮肉焦爛月水不定或後或前月水斷心下悶滿肩膊沉重小兒百病之小兒癖氣乳不消小兒身常壯熱腹內有病所錄諸病皆紫葛丸治之若積日服餌未愈消息准方服之取瘥止太乙神精丹治客忤霍亂腹痛脹滿屍疰惡氣癲狂鬼語蠱毒妖魅溫瘧但是一切惡毒無所不治方丹砂曾青雌黃雄黃磁石各四兩金牙二兩半上六味各搗絹下篩其丹砂雌黃雄黃三味以醶醋浸之曾青好酒於銅器中漬紙密封訖日中曝百日經夏急五日亦得無日以火暖之然後各研令如細粉以醶醋拌使乾溼得所納土釜中以六一泥固濟勿令泄氣干後安鐵環施腳高一尺五寸置釜上以漸放火初放火取熟兩秤炭各長四寸置釜上待三分二分盡即益如此三度盡用熟火然後用益生炭其過三上熟火以外皆須加火漸多及至一伏時其火已欲近釜即便滿就釜下益炭經兩度即罷火盡極冷然後出之其藥精飛化凝著釜上五色者上三色者次一色者下雖無五色但色光明皎潔如雪最佳若飛上不盡更令與火如前以雄雞翼掃取或多或少不定研如棗膏丸如黍粒治偏風大風惡疾癲癇癘節鬼打等最良服法平旦空腹一丸為度其瘧病積久百方不瘥又加心腹脹滿上氣身面腳等並腫垂死者服一丸吐即瘥亦有不吐瘥者若不吐復不瘥者更服一丸半仍不瘥者後日增半丸漸服無有不瘥氣亦定當吐出青黃白物其因瘧兩脅下有癖塊者亦當清除若心腹不脹滿者可與一丸日日加之以知為度不必專須吐亦可一丸即瘥勿並與服亦可三日一服皆須以意斟酌量得其宜或腹內有水即下者勿怪若患瘧日近精神健亦可斟酌病人藥性並與兩丸作一丸頓服之皆至午後食勿使冷勿使熱豉漿粥任意食之若病瘧盜汗虛弱者日服一丸至三日吐即止若患瘧不汗氣復不流腳冷者服一丸至三日若不汗氣復腳即暖有潤汗不至三日吐即止若患瘧無顏色者服藥後三日即有顏色亦有須吐瘥者亦有服少許而瘥者亦有殺藥強人服三四丸始覺藥行者凡人稟性不同不可一概與之但作黍米大服之為始漸加以知為度藥力驗壯勿並多服特慎油麵魚肉蒜當清淨服之若有患久不瘥在床羸瘦並腹脹滿及腫或下痢者多死但與藥救之十人中或瘥三四人也瘕症積聚服一刀圭以漿水送下諸卒死中惡客忤霍亂腹滿體帶五屍疰惡風疰忤大病相易死亡滅門狂癲鬼話已死氣絕心上微暖者扶起其頭以物撬開口不可開鑿去兩齒以漿飲送藥藥下即活諸久病者日服一刀圭覆令汗汗出即愈不愈者不過再服亦有不汗而瘥復有不汗不愈者服如上法加半刀圭以瘥為度常以絳囊帶九刀圭散男左女右小兒系頭上闢瘴毒惡時氣射工小兒患可以苦酒和之塗方寸紙上著兒心腹上令藥在上治之亦有已死者冬二日夏一日與此藥服服得下藥便活若不得入腹不活加金牙磁石者服至五服內必令人吐逆下利過此即自定其藥如小豆大為始從此漸小不得更大大風惡癩可二十服偏風癧節諸惡風癲病等亦可二十服自余諸惡病者皆止一二服量人輕重弱強不得多與若欲解殺藥但爛煮食肥豬肉服此藥後小應頭痛身熱一二日來大不能得食味後自漸得氣味五日後便能食若貪食過多者宜節之若服藥下悶亂可煮木防己湯服之即定凡言刀圭者以六粟為一刀圭一說云三小豆為一刀圭作土釜法其法取兩個瓦盆以甘土塗其內令極干其狀大小隨藥多少作六一泥法赤石脂牡蠣滑石礜石黃礬滷土蚯蚓屎各二兩上取醶酢以足為度若無滷土以鹽代之先作甘泥土以泥各別裹前黃礬等五種作團裹之勿令泄氣以火燒周三日最好一日亦得出火破團取藥各搗碎絹篩然後與蚯蚓屎滷土等分以酢和之如稠粥即得好酢可用二分酢一分水和用取前瓦盆以此泥塗之曾青如蚯蚓屎如黃連佳世少此者好崑崙碌亦得瘥病丹砂亦鮮粟砂亦得舊不用磁石金牙今加之凡雄黃皆以油煎九日九夜備乃可入丹不爾有毒慎勿生用倉公散治卒鬼擊鬼痱鬼刺心腹痛如刺下血便死不知人及臥魘齧腳踵不覺者諸惡毒氣病方北漢文帝時太倉令淳于意方故名特生礜石皂莢雄黃藜蘆各等分上四味治下篩取如大豆許納管中吹入病人鼻得嚏則氣通便活若未嚏復更吹之以得嚏為度此藥起死回生小金牙散治南方瘴癘疫氣腳弱風邪鬼疰方金牙五分雄黃萆薢黃芩蜀椒由跋桂心莽草天雄硃砂麝香烏頭各二分牛黃一分蜈蚣一枚六寸者細辛葳蕤犀角乾薑各三分黃連四分上十九味治下篩合牛黃麝香搗三千杵溫酒服錢五匕日三夜二以知為度絳囊盛帶男左女右一寸匕省病問孝不避夜行塗人中晨昏霧露亦塗之大金牙散治一切蠱毒百疰不祥醫所不治方金牙鸛骨石膏各八分斑蝥七分活草子胡燕屎白朮雷丸龍牙各六分銅鏡鼻梔子仁乾漆龜甲鱉甲鬼督郵桃白皮大黃各四分桂心芍藥徐長卿羚羊角射干升麻鳶尾馬目毒公蜂房細辛乾薑芒硝由跋犀角甘草狼毒蜣螂龍膽狼牙雄黃真珠各三分芫花莽草射罔烏梅各二分蛇蛻皮一尺鐵精赤小豆一合地膽樗雞芫青各七枚桃奴巴豆各二十枚上五十味治下篩服一刀圭稍加至二刀圭帶之闢百邪治九十九種疰一有麝香無白朮
