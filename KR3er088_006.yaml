治鼻塞常有清涕出方細辛蜀椒乾薑川芎吳茱萸附子各十八銖桂心一兩皂莢屑半兩豬膏一升上九味㕮咀以綿裹苦酒漬一宿取豬膏煎以附子色黃為度去滓綿裹納鼻孔中並摩鼻上涕出不止灸鼻兩孔與柱齊七壯治鼻塞窒香膏方白芷川芎通草各十八銖當歸細辛莽草小品並翼作薰草辛夷各三十銖上七味㕮咀以苦酒漬一宿以不中水豬肪一升煎三上三下以白芷色黃膏成去滓綿沾如棗核大納鼻中日三小品加桂心十八銖治鼻不利香膏方當歸薰草古今録驗用木香通草細辛蕤仁各十八銖川芎白芷各半兩羊髓四兩豬脂亦得上八味㕮咀以微火合煎三上三下白芷色黃膏成去滓取如小豆大納鼻中日二先患熱後鼻中生赤爛瘡者以黃芩梔子代當歸細辛治鼻窒氣息不通方小薊一把㕮咀以水三升煮取一升分二服又方瓜蒂末少許吹鼻中亦可綿裹塞鼻中又方槐葉五升蔥白切一升豉一合上三味以水五升煮取三升分溫三服治鼻塞多年不聞香臭清水出不止方取當道車輾過蒺藜一把搗以水三升煎取熟先仰臥使人滿口含取一合汁灌鼻中使入不過再度大嚏必出一兩個息肉似赤蛹一方有黃連等分同煎治鼻齆方通草細辛附子上三味各等分末之以蜜和綿裹少許納鼻中又方甘遂通草細辛附子等分上四味末之以白雄犬膽和為丸如棗核大綿裹納鼻中辛熱涕出四五升瘥亦治息肉又方炙皂莢末之如小豆以竹管吹鼻中又方乾薑末蜜和塞鼻中吹亦佳又方鐵鎖磨石取末以豬脂和綿裹納之經日肉出瘥又方以馬新屎汁仰頭含滿口灌鼻中又方伏面臨床前以新汲冷水淋玉枕上後以瓜蒂末綿裹塞之治齆鼻有息肉不聞香臭方瓜丁細辛上二味各等分末之以綿裹如豆大許塞鼻中須臾即通通草散方治鼻中息肉不通利通草半兩礬石一兩真珠一兩上三味末之捻綿如棗核取藥如小豆著綿頭納鼻中日三易之一方有桂心細辛各一兩同前搗末和使之治鼽鼻鼻中息肉不得息方礬石六銖藜蘆六銖瓜蒂二七枚附子十一銖上四味各搗篩合和以小竹管吹藥如小豆許於鼻孔中以綿絮塞鼻中日再以愈為度古今録驗葶藶半兩治鼻中息肉方炙蝟皮末綿裹塞之三日又方細篩釜底墨水服之三五日治鼻中息肉不聞香臭方燒礬石末以面脂和綿裹著鼻中數日息肉隨藥消落又方末瓜丁如小豆許吹入鼻中必消如此三數度又方細辛釜底墨上二味末之水和服方寸匕又方綿裹瓜蒂末塞鼻中治鼻中息肉梁起羊肺散方羊肺一具干之白朮四兩蓯蓉通草乾薑川芎各二兩上六味末之食後以米飲服五分匕加至方寸匕又方通草十三銖真珠六銖礬石細辛各一兩上四味末之捻綿如棗核沾散如小豆並綿納鼻中日再三鼻中息肉灸上星三百壯穴在直鼻入髮際一寸又灸挾上星兩旁相去三寸各一百壯治鼻中生瘡方燒祀灶飯末以敷鼻中又方燒故馬絆末敷鼻中又方偷孝子帽以拭之又方烏牛耳垢敷之又方以牛鼻津敷之又方搗杏仁乳敷之亦燒核壓取油敷之又方燒牛狗骨灰以臘月豬脂和敷之治疳蟲蝕鼻生瘡方燒銅箸頭以醋淬之數過取酢敷之又以人屎灰塗之瘥治鼻痛方常以油塗鼻內外酥亦得治卒食物從鼻中縮入腦中介介痛不出方牛脂若羊脂如指頭大納鼻中以鼻吸取脂須臾脂消則物逐脂俱出也論曰鼻頭微白者亡血設令微赤非時者死病人色白者皆亡血也凡時行衄不宜斷之如一二升以上恐多者可斷即以龍骨末吹之九竅出血者皆用吹之治大便出血及口鼻皆出血血上胸心氣急此是勞熱所致方生地黃八兩蒲黃一升地骨皮五兩黃芩芍藥生竹茹各三兩上六味㕮咀以水八升煮取二升七合分溫三服凡吐血衄血溺血皆臟氣虛膈氣傷或起驚悸治之方生竹皮一升芍藥二兩川芎當歸桂心甘草各一兩黃芩二兩上七味㕮咀以水一斗煮竹皮減三升下藥煎取二升分三服治衄血方伏龍肝二枚如雞子大生地黃六兩川芎一兩桂心三兩細辛六銖白芷乾薑芍藥吳茱萸甘草各三兩上十味㕮咀以水三升酒七升煮取三升分三服生地黃湯主衄方生地黃八兩黃芩一兩阿膠二兩柏葉一把甘草二兩上五味㕮咀以水七升煮取三升去滓納膠煎取二升半分三服又方生地黃三斤切阿膠二兩蒲黃六合上三味以水五升煮取三升分三服治鼻出血不止方乾地黃梔子甘草等分上三味治下篩酒服方寸匕日三如鼻疼者加豉一合鼻有風熱者以蔥涕和服如梧子五丸治鼻衄方地黃汁五合煮取四合空腹服之忌酒炙肉且服粳米飲又方飲小薊汁又方以冷水淨漱口含水以蘆管吹二孔中即止又方取亂髮五兩燒作灰以管吹鼻中棗核大不止益吹之以血斷止並水服方寸匕日三甚者夜二已困不識人者服亦佳又方取人屎尖燒灰水服並吹少許鼻中止又方五月五日取人屎燒作灰冷水服五分匕又方以膠貼鼻頭上至頂及髮際三寸止又方新馬屎汁灌鼻中及飲之又方以濕布敷胸上又方淳醋和土塗陰囊上干易之又方韭根蔥根取汁懸頭著一棗大納鼻中少時更著兩三度瘥蔥白搗汁亦得治鼻出血不止方搗楮葉汁飲三升大良又方張弓令弦向上病兒仰臥枕弦放四體如常臥法衄時癢癢便灸足大趾節橫理三毛中十壯劇者百壯衄不止灸之並治陰卵腫又灸風府一穴四壯不止又灸又灸湧泉二穴各百壯口病第三論一首方五十九首灸法二首論曰凡患口瘡及齒禁油面酒醬酸醋咸膩干棗瘥後仍慎之若不久慎尋手再發發即難瘥薔薇根角蒿為口瘡之神藥人不知之凡口中面上息肉轉大以刀決潰去膿血即愈治口中瘡久不瘥入胸中並生瘡三年以上不瘥者方濃煎薔薇根汁含之又稍稍咽之日三夜一冬用根夏用莖葉又方角蒿灰敷之一宿知二宿瘥有汁吐之不得咽也治口瘡不歇方牛膝生蘘荷根各三兩黃柏一兩上三味㕮咀以綿裹酒三升漬一宿微火煎一兩沸細細含之治膀胱熱不已口舌生瘡咽腫升麻煎方升麻玄參薔薇根白皮射干各四兩大青黃柏各三兩蜜七合上七味㕮咀以水七升煮取一升五合去滓下蜜更煎兩沸細細含咽之治口數生瘡連年不瘥方薔薇根黃芩當歸桔梗黃耆白蘞鼠李根皮大黃芍藥續斷黃柏葛根各一兩上十二味末之以酒服方寸匕日二服亦可漿水服之治胃中客熱唇口乾燥生瘡方茯苓黃芩甘草大黃薔薇根各三十銖枳實杏仁黃連各二兩桂心半兩栝蔞根十八銖上十味末之食前漿水服方寸匕日二治口熱生瘡方升麻三十銖黃連十八銖古今録驗用黃柏上二味末之綿裹含咽汁亦可去之治口瘡方薔薇根皮四兩黃柏三兩升麻三兩生地黃五兩上四味㕮咀以水七升煮取三升去滓含之瘥止含極吐卻更含治口中瘡爛痛不得食方杏仁二十枚甘草一寸黃連六銖上三味末之合和綿裹杏仁大含之勿咽日三夜一薔薇丸方治口瘡身體有熱氣痱瘰薔薇根黃芩鼠李根當歸葛根白蘞石龍芮千金翼作黃連黃柏芍藥續斷黃耆各一兩栝蔞根二兩上十二味末之蜜和服如梧子十丸日三服治口吻瘡方以楸白皮及濕貼之三四度瘥又方取經年葵根欲腐者彌佳燒作灰及熱敷之又方以新炊飯了甑及熱以唇口向甑唇上尉之二七下三兩上瘥止又方梔子甘草各十八銖細辛三十銖桂心十二銖川芎一兩上五味末之蜜丸食後服七丸日再服瘥止又方川芎白芷橘皮桂心棗肉各一兩半上五味末之以蜜和為丸食後服十五丸又含之以瘥為度此方甚驗治口肥瘡方熬灶上飯令焦末敷之治燕吻瘡方白楊枯枝鐵上燒取𣿉及熱敷之又方以木履尾納煻灰中令熱取柱兩吻各二七遍治口旁惡瘡方亂髮灰故絮灰黃連末乾薑末上四味等分合和為散以粉瘡上不過三遍治口中瘡咽喉塞不利口燥膏方豬膏白蜜各一斤黃連一兩上三味合煎去滓攪令相得含如半棗日四五夜二治熱病口爛咽喉生瘡水漿不得入膏方當歸射干升麻各一兩附子半兩白蜜四兩上五味㕮咀以豬脂四兩先煎之令成膏下著地勿令大熱納諸藥微火煎令附子色黃藥成絞去滓納蜜復上火一兩沸令相得置器中令凝取如杏仁大含之日四五遍輒咽之治失缺頰車蹉開張不合方一人以手指牽其頤以漸推之則復入矣推當疾出指恐誤齧傷人指也治失缺頰車蹉方消蠟和水敷之失缺頰車蹉灸背第五椎一日二七壯滿三日未瘥灸氣衝二百壯胸前喉下甲骨中是亦名氣堂又灸足內踝上三寸宛宛中或三寸五分百壯三報此三陰交穴也治卒口噤不開方以附子搗末納管中強開口吹口中治口中熱干甘草丸方甘草人參半夏生薑烏梅肉各二兩半棗膏二兩半上六味末之蜜丸如彈子大旋含咽汁日三治口乾方羊脂若豬脂雞子大擘之納半升醋中漬一宿絞取汁含之治口乾除熱下氣方石膏五合碎蜜二升上二味以水三升煮石膏取二升納蜜煮取二升去滓含如棗核大咽汁盡更含之治虛勞口乾方麥門冬二兩末大棗三十枚肉上二味以蜜一升和令熟五升米下蒸之任性服又方羊脂如雞子大淳酒半升棗七枚擘合漬七日取棗食之愈又方酸棗一升酸石榴子五合葛根三兩麥門冬四兩覆盆子三合烏梅五合甘草栝蔞實各三兩上八味末之以蜜丸含如棗大以潤為度五香丸治口及身臭令香止煩散氣方豆蔻丁香藿香零陵香青木香白芷桂心各一兩香附子二兩甘松香當歸各半兩檳榔二枚上十一味末之蜜和丸常含一丸如大豆咽汁日三夜一亦可常含咽汁五日口香十日體香二七日衣被香三七日下風人聞香四七日洗手水落地香五七日把他手亦香慎五辛下氣去臭治口氣臭穢常服含香丸方丁香半兩甘草三兩細辛桂心各一兩半川芎一兩上五味末之蜜和臨臥時服二丸如彈子大又方常以月旦日未出時從東壁取步七步回面垣立含水噀壁七遍口即美香又方桂心甘草細辛橘皮上四味等分治下篩以酒服一錢匕瘥止又方川芎白芷橘皮桂心各四兩棗肉八兩上五味末之次納棗肉干則加蜜和丸如大豆服十丸食前食後常含之或吞之七日大香治口中臭方桂心古今録驗用細辛甘草各等分上二味末之臨臥以三指撮酒服二十日香又方細辛豆蔻含之甚良又方蜀椒桂心各等分上二味末之酒服三指撮主口香去臭方甘草三十銖川芎二十四銖白芷十八銖上三味治下篩以酒服方寸匕日三服三十日口香又方松根白皮瓜子仁大棗上三味治下篩以酒服方寸匕日二一百日衣被香又方瓜子仁川芎藁本當歸杜蘅各六銖細辛半兩防風二兩上七味治下篩食後飲服方寸匕日三服五日口香十日身香二十日肉香三十日衣被香五十日遠聞香一方加白芷十八銖又方橘皮二十銖桂心十八銖木蘭皮一兩大棗二十枚上四味治下篩酒服方寸匕日三久服身香亦可以棗肉丸之服二十丸如梧子大稍加至三十丸一方有川芎十八銖又方濃煮細辛汁含之久乃吐之又方井花水三升漱口吐廁中良又方香薷一把水一斗煎取三升稍稍含之又方甜瓜子作末蜜和每日空心洗漱訖含一丸如棗核大亦敷齒又方熬大豆令焦及熱酢沃取汁含之治七孔臭氣皆令香方沉香五兩藁本三兩白瓜瓣半升丁香五合甘草當歸川芎麝香各二兩上八味末之蜜丸食後服如小豆大五丸日三久服令舉身皆香治身體臭令香方白芷甘子皮各一兩半瓜子仁二兩藁本當歸細辛桂心各一兩上七味治下篩酒服方寸匕日三五日口香三七日身香又方甘草松根皮甜瓜子大棗上四味各等分治下篩食後服方寸匕日三七日知一百日大香薰衣香方雞骨煎香零陵香丁香青桂皮青木香楓香鬱金香各三兩薰陸香甲香蘇合香甘松香各二兩沉水香五兩雀頭香藿香白檀香安息香艾納香各一兩麝香半兩上十八味末之蜜二升半煮肥棗四十枚令爛熟以手痛搦令爛如粥以生布絞去滓用和香乾溼如捺麨搗五百杵成丸密封七日乃用之以微火燒之以盆水納籠下以殺火氣不爾必有焦氣也又方沉香煎香各五兩雀頭香藿香丁子香各一兩上五味治下篩納麝香末半兩以粗羅之臨薰衣時蜜和用又方兜婁婆香薰陸香沉香檀香煎香甘松香零陵香藿香各一兩丁香十八銖苜蓿香二兩棗肉八兩上十一味粗下合棗肉總搗量加蜜和用之濕香方沉香二斤七兩九銖甘松檀香雀頭香一作藿香甲香丁香零陵香雞骨煎香各三兩九銖麝香二兩九銖薰陸香三兩六銖上十味末之欲用以蜜和預和歇不中用又方沉香三兩零陵香煎香麝香各一兩半甲香三銖薰陸香甘松香各六銖檀香三銖藿香丁子香各半兩上十味粗篩蜜和用薰衣瓶盛埋之久窨佳百和香通道俗用者方沉水香五兩甲香丁子香雞骨香兜婁婆香各二兩薰陸香白檀香熟捷香炭末各二兩零陵香藿香青桂皮白漸香柴也青木香甘松香各一兩雀頭香蘇合香安息香麝香燕香各半兩上二十味末之酒漉令軟再宿酒氣歇以白蜜和納瓷器中蠟紙封勿令泄冬月開取用大佳裛衣香方零陵香藿香各四兩甘松香茅香各三兩丁子香一兩苜蓿香二兩上六味各搗加澤蘭葉四兩粗下用之極美又方零陵香二兩藿香甘松香苜蓿香白檀香沉水香煎香各一兩上七味合搗加麝香半兩粗篩用如前法又方藿香四兩丁香七枚甘松香麝香沉香煎香上六味粗篩和為干香以裛衣大佳舌病第四方十一首舌主心臟熱即應舌生瘡裂破引唇揭赤升麻煎泄熱方蜀升麻射干各三兩柏葉切一升大青二兩苦竹葉切五合赤蜜八合生蘆根薔薇根白皮各五兩生玄參汁三合地黃汁五合上十味㕮咀以水四升煮取一升去滓下玄參汁令兩沸次下地黃汁兩沸次下蜜煎取一升七合綿惹取汁安舌上含細細咽之舌上瘡不得食舌本強頸兩邊痛此是心虛熱所致治之方柴胡升麻芍藥梔子仁通草各二兩黃芩大青杏仁各一兩半生薑石膏各四兩上十味㕮咀以水一斗九升煮取三升半分四服日三夜一滓可重煎服之治舌卒腫滿口溢出如吹豬胞氣息不得通須臾不治殺人方急以指刮破舌兩邊去汁即愈亦可以鈹刀決兩邊破之以瘡膏敷之又方刺舌下兩邊大脈血出勿使刺著舌下中央脈出血不止殺人不愈血出數升則燒鐵篦令赤尉瘡數過以絶血也又方半夏十二枚洗熟以醋一升煮取八合稍稍含嗽之吐出加生薑一兩佳治舌腫強滿口方滿口含糖醋少許時熱通即止治舌腫起如豬胞方釜下墨末以醋厚敷舌上下脫去更敷須臾即消若先決出血汁竟敷之彌佳凡此患人皆不識或錯治益困殺人甚急但看其舌下自有噤蟲形狀或如螻蛄或如臥蠶子細看之有頭尾其頭少白燒鐵釘烙頭上使熟即自消治舌脹滿口不得語方䗪蟲三十枚鹽一升上二味以水三升煮三沸含之稍稍咽之日三治舌強不得語方礬石桂心上二味等分末之安舌下立瘥舌上黑有數孔大如箸出血如湧泉此心臟病治之方戎鹽黃芩一作葵子黃柏大黃各五兩人參桂心甘草各二兩上七味末之蜜和以飲服十丸如梧子日三亦燒鐵烙之治舌上出血如泉方燒鐵篦熟爍孔中良唇病第五甲煎法二首方二十首灸法二首潤脾膏治脾熱唇焦枯無潤方生地黃汁一升生麥門冬四兩生天門冬切一升葳蕤四兩細辛甘草川芎白朮各二兩黃耆升麻各三兩豬膏三升上十一味㕮咀諸藥苦酒淹一宿綿裹藥臨煎下生地黃汁與豬膏共煎取膏鳴水氣盡去滓取細細含之甲煎唇脂治唇裂口臭方先以麻搗泥泥兩口好瓷瓶容一斗以上各厚半寸曝令乾甘松香五兩艾納香苜蓿香茅香各一兩藿香三兩零陵香四兩上六味先以酒一升水五升相和作湯洗香令淨切之又以酒水各一升浸一宿明旦納於一鬥五升烏麻油中微火煎之三上三下去滓納上件一口瓶中令少許不滿然後取上色沉香三斤雀頭香三兩蘇合香三兩白膠香五兩白檀香五兩丁香一兩麝香一兩甲香一兩上八味先酒水相和作湯洗香令淨各別搗碎不用絶細以蜜二升酒一升和香納上件瓷瓶中令實滿以綿裹瓶口又以竹篾交橫約之勿令香出先掘地埋上件油瓶令口與地平以香瓶合覆油瓶上令兩口相當以麻搗泥泥兩瓶口際令牢密可厚半寸許用糠壅瓶上厚五寸燒之火欲盡即加糠三日三夜勿令火絶計糠十二石訖停三日令冷出之別煉蠟八斤煮數沸納紫草十二兩煎之數十沸取一莖紫草向爪甲上研看紫草骨白出之又以綿濾過與前煎相和令調乃納硃砂粉六兩攪令相得少冷未凝之間傾竹筒中紙裹筒上麻纏之待凝冷解之任意用之計此可得五十挺甲煎口脂治唇白無血色及口臭方燒香澤法沉香甲香丁香麝香檀香蘇合香薰陸香零陵香白膠香藿香甘松香澤蘭上十二味各六兩胡麻油五升先煎油令熟乃下白膠藿香甘松澤蘭少時下火綿濾納瓷瓶中餘八種香搗作末以蜜和勿過濕納著一小瓷瓶中令滿以綿幕口竹十字絡之以小瓶覆大瓶上兩口相合密泥泥之乃掘地埋油瓶令口與地平乃聚干牛糞燒之七日七夜不須急滿十二日燒之彌佳待冷出之即成其瓶並須熟泥勻厚一寸曝乾乃可用一方用糠火燒之煉蠟合甲煎法蠟二兩紫草二兩上先煉蠟令消乃納紫草煮之少時候看以紫草於指甲上研之紫草心白即出之下蠟勿令凝即傾弱一合甲煎於蠟中均攪之訖灌筒中則勿觸動之冷凝乃取之便成好口脂也敷口面日三治緊唇方纏白布作大燈炷如指安斧刃上燃炷令刃汗出拭以敷唇上日二三度故青布亦佳並治沈唇又方青布灰以酒服之亦可脂和塗又方以蛇皮拭之燒為灰敷之又方水服蠐螬灰良又方自死螻蛄灰敷之又方又火炙蠟貼唇上瘥又方炙松脂貼上瘥緊唇灸虎口男左女右又灸承漿三壯治沈唇方以干蠐螬燒末和豬脂臨臥敷之又方燒鱉甲及頭令煙盡末敷之日三治唇生瘡方以頭垢敷之日三又方以胡粉敷之治唇邊生瘡連年不瘥方以八月藍葉十斤絞取汁洗不過三日瘥治唇生核方豬屎平量一升以水投絞取汁溫服之治唇舌忽生瘡方燒雞屎白末以布裹著病上含之治唇黑腫痛癢不可忍方取大錢四文於石上以臘月豬脂磨取汁塗之又方以竹弓彈之出其惡血瘥又方燒亂髮及蜂房六畜毛作灰豬脂和敷之亦治沈唇治冬月唇乾坼血出方搗桃仁以豬脂和敷之治遠行唇口面皴裂方熟煎豬脂將行夜常敷面臥行萬里野宿不損齒病第六論一首方三十八首灸法二首論曰凡齒齦宣露多是疳䘌及月蝕以角蒿灰夜敷齦間使滿勿食油不過二三夜瘥食油及干棗即發所以患齒者忌油干棗及桂心每旦以一捻鹽納口中以暖水含揩齒及叩齒百遍為之不絶不過五日口齒即牢密凡人齒齦不能食果菜者皆由齒根露也為此鹽湯揩齒叩齒法無不愈也神良凡人好患齒病多由月蝕夜食飲之所致也識者深宜慎之所以日月蝕未平時特忌飲食小兒亦然治齲齒及蟲痛方白附子知母細辛各六銖川芎高良薑各十二銖上五味末之以綿裹少許著齒上有汁吐出一日兩度含之亦治口氣又方切白馬懸蹄如米許以綿裹著痛處孔中不過三度治䘌齒蟲齒積年不瘥從少至老方雀麥草一名杜姥草似牛毛草以苦瓠葉四十枚淨洗露一宿平旦取草屈長二寸廣一寸厚五分以瓠葉裹縛之作五六十裹子取三年釅醋浸之至日中取兩裹納火中炮令極熱納口中齒外邊尉之冷則易之取銅器以水納中解裹於水中洗之得蟲長三分老者黃赤色小者白色多者得三四十枚少者得一二十枚治蟲齒方莨菪子三合如無蔥子韭子並得以青錢七文燒令赤取小口罌子令可口含得者將錢納罌子中取一撮許莨菪子安錢上令炮炮聲仍與半合許水淋令氣上從罌出將口含罌口令氣莫出用熏齒冷復更作取三合藥盡為劑非止蟲齒得瘥或風齒齲齒齒中病悉主之口中多津即吐之又方白楊葉切一升水三升煮取一升含之又方大醋一升煮枸杞根白皮一升取半升含之蟲立出又方取桃仁少許以叉頭穿向燈上燒之煙出經少時吹滅即納入口安蟲齒上咬之不過五六度一方作胡桃仁治疳蟲蝕齒根方地龍置石上著一撮鹽須臾化為水以面展取卻待凝厚取以納病上又以皂莢去皮塗上蟲即出又方純麻子燭燼研以井花水塗之又方黑羖羊脂莨菪子各等分先燒鐵鋤斧銎令赤納其中煙出以布單覆頭令煙氣入口熏之治齒齦腫痛及蟲痛方黃芩甘草桂心當歸細辛蛇床子各一兩上六味㕮咀以醋漿水七升煮取三升去滓含之日三夜二治齒有孔不得食面腫方莽草十葉豬椒附根皮長四寸者七枚上二味㕮咀以漿水二升煮取一升滿口含倦即吐卻日二三度治齒根腫方松葉一把切鹽一合上二味以酒三升煮取一升含之治齒根動欲脫落方生地黃綿裹著齒上咋之又㕮咀以汁漬齒根日四五著之並咽汁十日大佳治齒根動痛方生地黃獨活各三兩上二味㕮咀以酒一升漬一宿以含之治齒齦間津液血出不止方生竹茹二兩醋煮含之又方細辛二兩甘草一兩上二味㕮咀以醋二升煎取一升日夜旋含之又方礬石一兩燒水三升煮取一升先拭血乃含之已後不用朽人牙根齒落不用之可也治齒間血出方以苦竹葉濃煮之與鹽少許寒溫得所含之冷吐又方溫童子小便半升取三合含之其血即止治齒出血不止方刮生竹皮二兩苦酒浸之令其人解衣坐使人含噀其背上三過仍取竹茹濃煮汁勿與鹽適寒溫含嗽之竟日為度治酒醉牙齒湧血出方當歸二兩桂心細辛甘草各一兩礬石六銖上五味㕮咀以漿水五升煮取二升含之日五六夜三又方燒釘令赤注血孔中止治頭面風口齒疼痛不可忍方蜀椒二合莽草十葉雀李根獨活各二兩細辛川芎防風各一兩上七味㕮咀以酒二升半煮三五沸去滓含之冷吐更含之勿咽汁張文仲有白朮二兩又方雞屎白燒灰以綿裹置齒痛上咬咋之又方雞屎白以醋漬煮稍稍含之又方煮枸杞汁含之又方生地黃一節蒜一瓣上二味熟搗綿裹著痛上咬之勿咽汁汁出吐之日日為之瘥止又方含驢尿須臾止風齒疼痛灸外踝上高骨前交脈三壯又以線量手中指至掌後橫紋折為四分量橫紋後當臂中灸二壯愈隨左右含漱湯治齒痛方獨活三兩黃芩川芎細辛蓽茇各二兩當歸三兩丁香一兩上七味㕮咀以水五升煮取二升半去滓含嗽之須臾悶乃吐更含之古今録驗同有甘草二兩又方含白馬尿隨左右含之不過三五口治齒痛漱湯方腐棘刺二百枚以水二升煮取一升旋旋含之日四五度以瘥止又方川芎細辛防風礬石附子藜蘆莽草上七味各等分作末綿裹如彈丸大酒浸安所患處含之勿咽日三刺破極佳又方蚯蚓糞水和作稠泥團以火燒之令極赤如粉以臘月豬膏和敷齒齦上日三兩度永瘥又方取自死蚯蚓乾者搗末著痛處即止治齒齦痛不可食生果方生地黃桂心上二味合嚼之令味相得咽之又方馬齒莧一把嚼之即瘥治牙癰塞口噤不開方附子大者一枚黃連十八銖礬石一兩上三味末之納管中強開口吹之入喉間細細吹之喉病第七證一條方五十首針灸法二首凡卒喉痹不得語服小續命湯加杏仁一兩方出第八卷中烏翣膏喉嚨者脾胃之候若臟熱喉則腫塞神氣不通烏翣膏主之方生烏翣十兩升麻三兩羚羊角二兩薔薇根切一升艾葉六銖生者尤佳芍藥二兩通草二兩生地黃切五合豬脂二斤上九味㕮咀綿裹苦酒一升淹浸一宿納豬脂中微火煎取苦酒盡膏不鳴為度去滓薄綿裹膏似大杏仁納喉中細細吞之治喉腫痛風毒衝心胸方豉一升半犀角射干杏仁甘草各二兩羚羊角一兩半芍藥三兩梔子七枚升麻四兩上九味㕮咀以水九升煮取三升去滓納豉煮一沸分三服喉腫胸脅支滿灸尺澤百壯治風毒咽水不下及瘰癧腫方升麻芍藥各四兩射干杏仁楓香葛根麻黃各三兩甘草二兩上八味㕮咀以水八升煮取二升半分三服又方以水服莨菪子末兩錢匕神良治喉痹方荊瀝稍稍咽之又方臘月豬尾燒末水服之又方燒牛角末酒服之又方熬杏仁令黑含或末服之又方含雞屎白又方巴豆去皮針線穿咽入牽出又方馬藺子半升水二升煮取一升半服之又方煮桃皮汁三升服之又方燒荊汁服之又水三升煮荊一握取一升分三服治喉痹及毒氣方桔梗二兩水三升煮取一升頓服之又方生薑二斤搗取汁蜜五合微火煎相和服一合日五又方附子一枚剖作大片蜜塗炙令黃含咽汁甘盡更塗炙如前法又方剝大蒜塞耳鼻日二易喉痹刺手小指爪紋中出三大豆許血逐左右刺皆須慎酒面毒物治喉痹猝不得語方濃煮桂汁服一升亦可末桂著舌下漸咽之良又方煮大豆汁含之無豆用豉亦佳又方以酒五合和人乳汁半升分二服又方燒炊箅作灰三指撮水服之又方芥子末水和敷之干則易又方商陸苦酒熬令濃熱敷之又方末桂心如棗核大綿裹著舌下須臾破治喉猝腫不下食方以韭一把搗熬敷之冷則易又方含上好醋口舌有瘡亦佳治懸雍咽熱暴腫長方乾薑半夏等分末以少少著舌上又方鹽末以箸頭張口柱之日五治懸雍咽中生息肉舌腫方日初出時向日張口使婦人用左裙裾柱其頭上七下瘥又方羊蹄草煮取汁口含之又方鹽豉和塗之又方取四五歲小兒尿合鹽含之凡喉痹深腫連頰吐氣數者名馬喉痹治之方馬銜一具水三升煮取一升分三服又方氈中蒼耳三七枚燒末水服之又方馬鞭草根一握勿中風截去兩頭搗取汁服又方燒谷奴灰酒服之立破母姜酒咽門者肝膽之候若臟熱咽門則閉而氣塞若腑寒咽門則破而聲嘶母姜酒主之方母薑汁二升酥牛髓油各一升桂心秦椒各一兩防風一兩半川芎獨活各一兩六銖上九味末之納薑汁中煎取相淹濡下髓酥油等令調微火三上三下煎之平旦溫清酒一升下二合膏即細細吞之日三夜一又方丹參升麻雄黃杏仁鬼臼甘草射干各一兩麝香半兩上八味末之以蜜為丸如梧子飲下一丸加至五丸日三酒服亦佳咽痛失聲不利用之良治咽傷語聲不徹方酒一升乾薑二兩半末酥一升通草桂心石菖蒲各二兩末上六味合和服一匕日三又方酒一升酥一升乾薑末十兩上三味以酒二合酥一匕薑末二匕相和服日三食後服之亦治肺癰治啞塞咳嗽方桂心六銖杏仁十八銖上二味末之以蜜丸如杏仁大含之細細咽汁日夜勿絶治咽痛逆氣不能食方麻子一升熬令黑以酒一升淋取汁空心一服一升漸至二升多汗好覆勿觸風冷此方兼理産婦及丈夫中風如角弓反張口噤不開大驗與紫湯氣力同治猝咽痛方懸木枸燒末水服方寸匕日三又方燒炊帚一枚漿水服方寸匕治猝風咽腫面腫方杏仁末和雞子黃更搗敷上干復易之七八度若腫汁出煮醋和伏龍肝敷干更易之治猝尸咽方燒履鼻繩為灰暖水服之又方燒麻子脂服之治咽喉不利下氣方射干杏仁人參附子桂心各一兩上五味末之蜜丸如指大含一丸稍稍咽之令藥味相接治咽喉中痛癢吐之不出咽之不入似得蟲毒方含生薑五十日瘥又方以青布裹麻黃燒以竹筒盛煙燻咽中耳疾第八方五十五首治腎熱背急攣痛耳膿血出或生肉塞之不聞人聲方磁石白朮牡蠣各五兩甘草一兩生麥門冬六兩生地黃汁一升芍藥四兩蔥白一升大棗十五枚上九味㕮咀以水九升煮取三升分三服治腎熱面黑目白腎氣內傷耳鳴吼鬧短氣四肢疼痛腰背相引小便黃赤方羊腎一具治如食法白朮五兩生薑六兩玄參四兩澤瀉二兩芍藥茯苓各三兩淡竹葉切二升生地黃切一升上九味㕮咀以水二斗煮羊腎竹葉取一斗去滓澄之下藥煮取三升分三服不已三日更服一劑治腎熱耳膿血出溜日夜不止方鯉魚腦一枚鯉魚腸一具洗細切鯉魚鮓三斤烏麻子熬令香一升上四味先搗麻子碎次下余藥搗為一家納器中微火熬暖布裹敷耳得兩食頃開之有白蟲出復更作藥若兩耳並膿出用此為一劑敷兩耳若只一耳分藥為兩劑敷不過三敷耳便瘥慎風冷治腎虛寒腰脊苦痛陰陽微弱耳鳴焦枯方生地黃汁二升生天門冬汁白蜜各三升羊腎一具炙白朮麥曲各一斤甘草乾薑地骨皮各八兩桂心杜仲黃耆各四兩當歸五味子各三兩上十四味末之納盆中取前三物汁和研微火上暖盆取熱更研日曝乾常研令離盆酒服方寸匕日再治耳聾鳴汁出皆由腎寒或一二十年不瘥方故鐵二十斤燒赤水五斗浸三宿去鐵澄清柘根三十斤水一石煮取五斗去滓澄清菖蒲切五斗水一石煮取五斗去滓澄清上三味合一石五斗用米二石並曲二斗釀如常法酒用一月封頭開清用磁石吸鐵者三斤搗為末納酒中浸三宿飲之日夜飲常取小小醉而眠取聞人語乃止藥又方服天門冬酒百日瘥方在第十四卷中又方礬石少許以生菖蒲根汁和點入耳中治勞聾氣聾風聾虛聾毒聾久聾耳鳴方山茱萸乾薑巴戟天芍藥澤瀉桂心菟絲子黃耆乾地黃遠志蛇床子石斛當歸細辛蓯蓉牡丹人參甘草附子各二兩菖蒲一兩羊腎二枚防風一兩半茯苓三兩上二十三味末之蜜丸如梧子大食後服十五丸日三加至三四十丸止皆緣腎虛耳故作補腎方又作薄利九竅藥即瘥治耳聾方生地黃極粗者長一寸半巴豆杏仁各七枚印成鹽兩顆頭髮如雞子大燒灰上五味治下篩以綿薄裹納耳中一日一夜若小損即去之直以物塞耳耳中黃水及膿出漸漸有效不得更著不著一宿後更納一日一夜還去之依前又方萆麻仁五合杏仁菖蒲磁石桃仁各三分巴豆一分石鹽三分附子二分薰陸香松脂各十分蠟八分通草三分上十二味先搗草石令細別研諸仁如脂納松脂蠟合搗數千杵令可丸乃止以如棗核大綿裹塞耳一日四五度出之轉捻不過三四日易之又方磁石四兩天門冬地骨皮生薑各三兩山茱萸茯苓菖蒲川芎枳實白芷橘皮甘草土瓜根牡荊子各二兩竹瀝二升上十五味㕮咀以水八升煮減半納瀝煮取二升五合分三服五日一劑三日乃著散納耳中如後方石菖蒲白蘞牡丹山茱萸牛膝土瓜根各二兩磁石四兩上七味治下篩綿裹塞耳日一易之仍服大三五七散佳方在第十三卷中又方薰陸香萆麻松脂蠟亂髮灰石鹽上六味等分末之作丸綿裹塞耳時易之瘥止治耳聾方巴豆十四枚成煉松脂半兩上二味合治丸如黍米大綿裹以簪頭著耳中一日一易藥如硬微火炙之以汗出乃愈大效又方雄鯉魚腦二兩防風菖蒲細辛附子川芎各六銖上六味㕮咀以魚腦合煎三沸三上三下之膏香為成濾去滓冷以一棗核灌耳中以綿塞之古今録驗用療風聾年久耳中鳴者以當歸代防風以白芷代川芎又方竹筒盛鯉魚腦炊飯處蒸之令煬注耳中又方菖蒲附子各等分末之以麻油和以綿裹納耳中廣濟方以療耳猝痛求死者崔氏以苦酒和塞耳又方礬石甘草菖蒲當歸細辛防風川芎白芷附子烏賊骨皂莢各半兩巴豆十四枚上十二味薄切三升醋漬一宿以不中水雞膏九合煎三上三下以巴豆黃膏成去滓納雄黃末攪調取棗核大瀝耳中綿塞之日三易又方燒鐵令赤投酒中飲之仍以磁石塞耳中日一易夜去之旦彆著又方萆麻一百顆去皮大棗十五枚去皮核上二味熟搗丸如杏仁納耳中二十日瘥又方芥子搗碎以男兒乳和綿裹納之又方取柴胡苗汁灌耳中再度瘥又方作一坑可容二升許著炭火其中坑似窖形以磚覆口上磚上作一孔子容小指磚孔上著地黃一升以木盆覆之以泥泥盆下勿泄盆底上鑽一小孔可容箸其孔上著三重布以耳孔當盆上熏久若悶去黃水發裹鹽塞之不過二三度神效又方搗豉作餅填耳內以地黃長五六分削一頭令尖納耳中與豉餅底齊餅上著楸葉蓋之剜一孔如箸頭透餅於上灸三壯又方作泥餅子厚薄如餛飩皮覆耳上四邊勿令泄氣當耳孔上以草刺泥餅穿作一小孔於上以艾灸之百壯候耳中痛不可忍即止側耳瀉卻黃水出盡即瘥當灸時若泥干數易之又方酒三升碎牡荊子二升浸七日去滓任性服盡雖三十年久聾亦瘥又方截箭竿二寸納耳中以面擁四畔勿令泄氣灸筒上七壯又方硫黃雄黃各等分為末綿裹納耳中數日聞人語聲又方桂心十八銖野葛六銖成煎雞肪五兩上三味㕮咀於銅器中微火煎三沸去滓密貯勿泄以葦筒盛如棗核大火炙令少熱欹臥傾耳灌之如此十日耵聹自出大如指長一寸久聾不過三十日以發裹膏深塞莫使泄氣五日乃出之千金翼云治二十年耳聾治耳聾齒痛赤膏方桂心大黃白朮細辛川芎各一兩乾薑二兩丹參五兩蜀椒一升巴豆十枚大附子二枚上十味㕮咀以苦酒二升浸一宿納成煎豬肪三斤火上煎三上三下藥成去滓可服可摩耳聾者綿裹納耳中齒冷痛則著齒間諸痛皆摩若腹中有病以酒和服如棗許大咽喉痛取棗核大吞之又方以綿裹蛇膏塞耳神良又方淳酢微火煎附子一宿削令可入耳以綿裹塞之治猝耳聾方細辛菖蒲各六銖杏仁曲末各十銖上四味和搗為丸干即著少豬脂如棗核大綿裹納耳中日一易小瘥二日一易夜去旦塞之治三十年耳聾方故鐵三十斤以水七斗浸三宿取汁入曲釀米七斗如常造酒法候熟取磁石一斤研末浸酒中三日乃可飲取醉以綿裹磁石納耳中好覆頭臥酒醒去磁石即瘥治耳鳴聾方當歸細辛川芎防風附子白芷各六銖上六味末之以鯉魚腦八兩合煎三上三下膏成去滓以棗核大灌耳中旦以綿塞耳孔治耳鳴如流水聲不治久成聾方生烏頭掘得乘濕削如棗核大納耳中日一易之不過三日愈亦療癢及猝風聾治耳鳴水入方通草細辛桂心各十八銖菖蒲一兩附子六銖礬石六銖當歸甘草各十二銖獨活一兩半上九味末之以白鵝脂半合稍稍和如棗核綿裹納耳中日三旋旋和用一本用蔥涕半合治耳聾有膿散方烏賊骨釜底墨龍骨伏龍肝各半兩附子一兩禹餘糧六銖上六味末之取皂莢子大綿裹納耳中日一易取瘥不瘥者有蟲加麝香一豆大治耳聾有膿不瘥有蟲方鯉魚腸一具切醋三合上二味和搗帛裹納耳中兩食頃當悶痛有白蟲著藥去之更入新者蟲盡乃止藥擇去蟲還可用又方先以紙纏去耳中汁以礬石末粉耳中次石鹽末粉其上食久乃起不過再度永瘥又方搗桂和鯉魚腦納耳中不過三四度治聤耳出膿汁方礬石烏賊骨黃連赤石脂上四味等分末之以綿裹如棗核納耳中日三小品不用赤石脂姚氏加龍骨一兩千金翼同姚氏治聤耳耳中痛膿血出方取釜月下灰敷耳中日三易之每換以篦子去之再著取瘥止治聤耳方桃仁熟搗以故緋絹裹納耳中日三易以瘥為度治底耳方黃礬燒綿裹納耳中不過二三日愈或以葦管吹耳中肘後以療耳卒腫出膿治耳聾干耵聹不可出方搗自死白項蚯蚓安蔥葉中面封頭蒸之令熟並化為水以汁滴入耳中滿即止不過數度即挑易出瘥後發裹鹽塞之肘後以療蚰蜒入耳效又方灌酢三年者最良綿塞之半日許必有物出治百蟲入耳方末蜀椒一撮以半升醋調灌耳中行二十步即出又方取桃葉火尉卷之以塞耳立出又方車肛脂敷耳孔蟲自出肘後以療聤耳膿血又方以蔥涕灌耳中蟲即出亦治耳聾治蜈蚣入耳方炙豬肉令香掩耳即出治蚰蜒入耳方炒胡麻搗之以葛袋盛傾耳枕之即出又方以牛酪灌之滿耳即出出當半消若入腹中空腹食好酪一二升即化為黃水而出不盡更服手用神效千金翼作牛乳治耳中有物不可出方以弓弦從一頭令散敷好膠柱著耳中物上停之令相著徐徐引出面藥第九方八十一首五香散治䵟疱黶𪒟黑運赤氣令人白光潤方畢豆四兩黃耆白茯苓葳蕤杜若商陸大豆黃卷各二兩白芷當歸白附子冬瓜仁杜蘅白殭蠶辛夷仁香附子丁子香蜀水花旋覆花防風木蘭芎藭藁本皂莢白膠杏仁梅肉酸漿水萍天門冬白朮土瓜根各三兩豬胰二具曝乾上三十二味下篩以洗面二七日白一年與衆別澡豆方洗手面令白淨悅澤白芷白朮白蘚皮白蘞白附子白茯苓羌活葳蕤栝蔞子桃仁杏仁菟絲子商陸土瓜根川芎各一兩豬胰兩具大者細切冬瓜仁四合白豆麵一升面三升溲豬胰為餅曝乾搗篩上十九味合搗篩入面豬胰拌勻更搗每日常用以漿水洗手面甚良澡豆洗手面方治面黑不淨白蘚皮白殭蠶川芎白芷白附子鷹屎白甘松香木香各三兩一本用藁本土瓜根一兩一本用甜瓜子白梅肉三七枚大棗三十枚麝香二兩雞子白七枚豬胰三具杏仁三十枚白檀香白朮丁子香各三兩一本用細辛冬瓜仁五合面三升上二十味先以豬胰和麵曝乾然後合諸藥搗末又以白豆屑二升為散旦用洗手面十日色白如雪三十日如凝脂神驗千金翼無白殭蠶川芎白附子大棗有桂心三兩澡豆方洗面藥豬胰五具細切畢豆麵一升皂莢三挺栝蔞實三兩一方不用葳蕤白茯苓土瓜根各五兩上七味搗篩將豬胰拌和更搗令勻每旦取洗手面百日白淨如素洗面藥方白芷白蘞白朮桃仁冬瓜仁杏仁葳蕤各等分皂莢倍多上八味絹篩洗手面時即用洗面藥除䵟𪒟悅白方豬胰兩具去脂豆麵四升細辛白朮各一兩防風白蘞白芷各二兩商陸三兩皂莢五挺冬瓜仁半升上十味和土瓜根一兩搗絹羅即取大豬蹄一具煮令爛作汁和散為餅曝燥更搗為末羅過洗手面不過一年悅白澡豆治手乾燥少潤膩方大豆黃五升苜蓿零陵香子赤小豆各二升去皮丁香五合麝香一兩冬瓜仁茅香各六合豬胰五具細切上九味細搗羅與豬胰相合和曝乾搗絹篩洗手面澡豆方白芷青木香甘松香藿香各二兩冬葵子一本用冬瓜仁栝蔞仁各四兩零陵香二兩畢豆麵三升大豆黃面亦得上八味搗篩用如常法桃仁澡豆主悅澤去䵟𪒟方桃仁蕪菁子各一兩白朮六合土瓜根七合黑豆麵二升上五味合和搗篩以醋漿水洗手面澡豆主手乾燥常少潤膩方豬胰五具干之白茯苓白芷藁本各四兩甘松香零陵香各二兩白商陸五兩大豆末二升絹下蒴藋灰一兩上九味為末調和訖與豬胰相和更搗令勻欲用稍稍取以洗手面八九月則合冷處貯之至三月已後勿用神良玉屑面膏方治面無光澤皮肉皴黑久用之令人潔白光潤玉屑細研川芎土瓜根葳蕤桃仁白附子白芷冬瓜仁木蘭辛夷各一兩菟絲子藁本青木香白殭蠶當歸黃耆藿香細辛各十八銖麝香防風各半兩鷹屎白一合豬胰三具細切蜀水花一合白犬脂鵝脂熊脂各一升商陸一兩豬肪脂一升上二十八味先以水浸豬鵝犬熊脂數易水浸令血脈盡乃可用㕮咀諸藥清酒一斗漬一宿明旦生擘豬鵝等脂安藥中取銅鐺於炭火上微微煎至暮時乃熟以綿濾置瓷器中以敷面仍以練系白芷片看色黃即膏成其豬胰取浸藥酒挼取汁安鐺中玉屑蜀水花鷹屎白麝香末之膏成安藥中攪令勻面脂主悅澤人面耐老方白芷冬瓜仁各三兩葳蕤細辛防風各一兩半商陸川芎各三兩當歸藁本蘼蕪土瓜根去皮桃仁各一兩木蘭皮辛夷甘松香麝香白殭蠶白附子梔子花零陵香半兩豬胰三具切水漬六日欲用時以酒挼取汁漬藥上二十一味薄切綿裹以豬胰汁漬一宿平旦以前豬脂六升微火三上三下白芷色黃膏成去滓入麝收於瓷器中取塗面煉脂法凡合面脂先須知煉脂法以十二月買極肥大豬脂水漬七八日日一易水煎取清脂沒水中煉鵝熊脂皆如此法玉屑面脂方玉屑白附子白茯苓青木香葳蕤白朮白殭蠶密陀僧甘松香烏頭商陸石膏黃耆胡粉芍藥藁本防風芒硝白檀各一兩當歸土瓜根桃仁芎藭各二兩辛夷桃花白頭翁零陵香細辛知母各半兩豬脂一升羊腎脂一具白犬脂鵝脂各一合上三十三味切以酒水各一升合漬一宿出之用銅器微火煎令水氣盡候白芷色黃去滓停一宿旦以柳枝攪白乃用之又方令黑者皆白老者皆少方玉屑寒水石珊瑚川芎當歸土瓜根菟絲藁本辛夷仁細辛葳蕤商陸白芷防風黃耆白殭蠶桃仁木蘭皮藿香前胡蜀水花桂心冬瓜仁半夏白蘞青木香杏仁蘼蕪芒硝旋覆花杜蘅麝香白茯苓秦椒白頭翁礜石秦皮杜若蜀椒蕪菁子升麻黃芩白薇梔子花各六銖栝蔞仁一兩熊脂白狗脂牛髓鵝脂羊髓各五合清酒一升鷹屎白一合丁香六銖豬肪脂一升上五十四味㕮咀酒漬一宿納脂等合煎三上三下酒氣盡膏成絞去滓下麝香末一向攪至凝色變止瓷器貯勿泄氣面脂治面上皴黑凡是面上之疾皆主之方丁香零陵香桃仁土瓜根白蘞防風沉香辛夷梔子花當歸麝香藁本商陸芎藭各三兩葳蕤一本作白芨藿香一本無白芷甘松香各二兩半菟絲子三兩白殭蠶木蘭皮各二兩半蜀水花青木香各二兩冬瓜仁四兩茯苓三兩鵝脂羊腎脂各一升半羊髓一升生豬脂三大升上二十九味㕮咀先以美酒五升挼豬胰六具取汁漬藥一宿於豬脂中極微火煎之三上三下白芷色黃以綿一大兩納生布中絞去滓入麝香末以白木篦攪之至凝乃止任性用之良面膏去風寒令面光悅卻老去皺方青木香白附子芎藭白蠟零陵香香附子白芷各二兩茯苓甘松各一兩羊髓一升半煉上十味㕮咀以水酒各半升浸藥經宿煎三上三下候水酒盡膏成去滓敷面作妝如有䵟𪒟皆落豬蹄湯洗手面令光潤方豬蹄一具桑白皮川芎葳蕤各三兩白朮二兩白茯苓三兩商陸二兩一作當歸白芷三兩上八味㕮咀以水三斗煎豬蹄及藥取一斗去滓溫一盞洗手面大佳令人面白淨悅澤方白蘞白附子白朮白芷各二兩藁本三兩豬胰三具水漬去赤汁盡研上六味末之先以蕪菁子半升酒水各半升相和煎數沸研如泥合諸藥納酒水中以瓷器貯封三日每夜敷面旦以漿水洗之豬蹄漿急麵皮去老皺令人光淨方大豬蹄一具淨治如食法以水二升清漿水一升不渝釜中煮成膠以洗手面又以此藥和澡豆夜塗面旦用漿水洗面皮即急白麵方牡蠣三兩土瓜根一兩上二味末之白蜜和之塗面即白如玉旦以溫漿水洗之慎風日鹿角散令百歲老人面如少女光澤潔白方鹿角長一握牛乳三升川芎細辛天門冬白芷白附子白朮白蘞各三兩杏仁二七枚酥三兩上十一味㕮咀其鹿角先以水漬一百日出與諸藥納牛乳中緩火煎令汁盡出角以白練袋貯之余藥勿取至夜取牛乳石上摩鹿角取塗面旦以漿洗之無乳小便研之亦得令人面潔白悅澤顏色紅潤方豬胰五具蕪菁子二兩栝蔞子五兩桃仁三兩上四味以酒和熟搗敷之慎風日又方採三株桃花陰乾末之空心飲服方寸匕日三並細腰身又方以酒漬桃花服之好顏色治百病三月三日收桃花丸治面黑䵟令人潔白光悅方桃花二升桂心烏喙甘草各一兩上四味末之白蜜為丸服如大豆許十丸日二十日易形一方有白附子甜瓜子杏仁各一兩為七味鉛丹散治面黑令人面白如雪方鉛丹三十銖真女菀六十銖上二味治下篩酒服一刀圭日三男十日知女二十日知知則止黑色皆從大便中出矣面白如雪白楊皮散治面與手足黑令光澤潔白方白楊皮十八銖一方用橘皮桃花一兩白瓜子仁三十銖上三味治下篩溫酒服方寸匕日三欲白加瓜子欲赤加桃花三十日面白五十日手足俱白治面䵟𪒟內外治方成煉松脂為末溫酒服三合日三服盡三升無不瘥治外膏方白芷白蠟各二兩白附子辛夷防風烏頭藿香各半兩藁本一兩葳蕤零陵香各半兩商陸麝香各六銖牛脂鵝脂各一升羊脂五合麻油二合上十六味薄切醋漬浹浹然一宿合煎候白芷色黃膏成以皂莢湯洗面敷之日三又方白礬石硫黃白附子各六銖上三味為末以醋一盞漬之三日夜淨洗面敷之莫見風日三七日慎之白如雪又方雞子三枚丁香一兩胡粉一兩細研上三味先以醋一升漬七日後取雞子白調香粉令勻以漿水洗面敷之治面䵟方李子仁末和雞子白敷一宿即落又方白羊乳二升羊胰二具水浸去汁細擘甘草二兩末上三味相和一宿先以醋漿水洗面生布拭之夜敷藥兩遍明旦以豬蹄湯洗卻每夜洗之又方白附子末酒和敷之即落又方桂心石鹽蜜各等分上三味末之相和以敷治人面䵟𪒟黑膚色粗陋皮厚狀醜方羖羊脛骨末以雞子白和敷之旦以白粱米泔洗之三日白如珂雪又方白蜜和茯苓粉敷之七日愈又方杏仁末之雞子白上二味相和夜塗面明旦以米泔洗之又方杏仁酒浸皮脫搗絹袋盛夜拭面又方酒浸雞子三枚密封四七日成敷面白如雪治面䵟𪒟令悅澤光白潤好及手皴方豬蹄兩具治如食法白粱米一斗洗令淨上二味以水五斗合煮豬蹄爛取清汁三斗用煮後藥白茯苓商陸各五兩葳蕤一兩白芷藁本各二兩上五味㕮咀以前藥汁三斗並研桃仁一升合煮取一斗五升去滓瓷瓶貯之納甘松零陵香末各一兩入膏中攪令勻綿幕之每夜用塗手面面多䵟𪒟麵皮粗澀令人不老皆主之方硃砂雄黃各二兩水銀霜半兩黃鷹糞二升上胡粉二兩上五味並細研如粉以面脂和淨洗面夜塗之以手細摩令熱明旦不廢作妝然須五日一洗面一塗不過三遍所有惡物一切皆除數倍少嫩慎風日不傳神祕治䵟𪒟烏靨令面潔白方馬珂二兩珊瑚白附子鷹屎白各一兩上四味研成粉和勻用人乳調以敷面夜夜著之明旦以溫漿水洗之治面黑生䵟疱方白蘞十二銖生礜石救急方無礜石白石脂各六銖杏仁三銖上四味研和雞子白夜臥塗面上旦用井花水洗之治面䵟疱令人悅白方栝蔞子六合麝香半兩白石脂五合雀屎二合去黑上四味搗篩別研麝香雀糞白石脂和合取生菟絲苗汁和之如薄泥先用澡豆洗去面上膩以塗䵟上日夜三四過旦以溫漿水洗之任意作妝治䵟子面不淨方以上硃砂研細如粉和白蜜塗之旦以醋漿洗之大驗又方白附子香附子白檀馬珂紫檀各一兩上五味末之白蜜和如杏仁大陰乾用時以水研塗面旦以溫水洗忌風油七日面如蓮花治面䵟𪒟方沉香牛黃薰陸香雌黃鷹屎丁香玉屑各十二銖水銀十銖上八味末之蜜和以敷治面黑䵟𪒟皮皺皴散方白附子密陀僧牡蠣茯苓川芎各二兩上五味末之和以羖羊乳夜塗面以手摩之旦用漿水洗不過五六度一重皮脫䵟瘥矣治面䵟方水和丹砂末服方寸匕男七日女二七日色白如雪白瓜子丸治面䵟𪒟令色白方白瓜子二兩藁本遠志杜蘅各一兩天門冬三兩白芷當歸車前子雲母粉各一兩柏子仁細辛橘皮栝蔞仁鉛丹白石脂各半兩上十五味末之蜜和空腹服如梧子二十丸日三去面上靨子黑痣方夜以暖漿水洗面以生布揩靨子令赤痛水研白旃檀取汁令濃以塗靨子上旦以暖漿水洗之仍以鷹屎白粉其上治粉滓䵟𪒟方白蘞十二銖白石脂六銖上二味搗篩以雞子白和夜臥塗面旦用井花水洗去粉滓䵟𪒟皴疱及茸毛令面悅澤光潤如十四五歲時方黃耆白朮白蘞葳蕤土瓜根商陸蜀水花鷹屎白各一兩防風一兩半白芷細辛青木香川芎白附子杏仁各二兩上十五味末之以雞子白和作挺陰乾石上研之以漿水塗面夜用旦以水洗細絹羅如粉佳治麵粉滓方熬礬石以清酒和敷之不過三上又方搗生菟絲苗汁塗不過三上治面皰方羖羊膽牛膽各一具淳酒一升上三味合煮三五沸敷之治年少氣盛面生疱瘡方胡粉半兩水銀一兩上二味以臘月豬脂和熟研令水銀消散向暝以粉面旦起布拭之慎勿水洗至暝又塗之不過三上瘥一方有真珠白膏治面㾴疱疥癰惡瘡方附子十五枚野葛一尺五寸蜀椒一升上三味㕮咀以酢漬一宿豬膏一斤煎令附子黃去滓塗之日三梔子丸治酒㾴鼻皰方梔子仁三升川芎四兩大黃六兩豉三升木蘭皮半兩甘草四兩上六味末之蜜和服十丸如梧桐子日三稍加至十五丸敷鼻皰方蒺藜子梔子仁豉各一升木蘭皮半斤一本無上四味末之以醋漿水和如泥夜塗上日未出時暖水洗之亦滅瘢痕治面㾴疱方鸕鷀屎一升末之以臘月豬脂和令勻夜敷之治面上風方玉屑密陀僧珊瑚各二兩白附子三兩上四味末之以酥和夜敷面上旦洗之亦滅瘢痕治面皰甚者方冬葵子柏子仁茯苓冬瓜子上四味各等分末之酒服方寸匕食後服日三治面皰方薺苨肉桂各二兩上二味為末以醋漿服方寸匕日一服亦治䵟𪒟及滅瘢去黑痣又方枸杞根一十斤生地黃三斤上二味先搗篩枸杞又搗碎地黃曝乾合篩空腹酒服方寸匕日三久服顏如童子祕之治面㾴方木蘭皮一斤以三年醋漬令沒百日曝乾末之溫酒服方寸匕日三治面有熱毒惡瘡方胡粉熬黃柏炙黃連各等分上三味末之以粉上瘥止若瘡干以面脂調塗之日三治滅瘢痕方豬脂三斤飼烏雞一隻三日令盡後取白屎納白芷當歸各一兩煎白芷色黃去滓納以鷹屎白半兩攪調敷之日三又方禹餘糧半夏等分為末以雞子黃和先以新布拭瘢處令赤後用藥敷之勿見風日二十日瘥十年者亦滅又方鷹屎白一合辛夷一兩白附子杜若細辛各半兩上五味㕮咀以酒五合浸一宿以羊髓五兩微火煎三上三下去滓小傷瘢上敷之日三滅瘢痕無問新舊必除方以人精和鷹屎白敷之日二白蜜亦得治瘢痕凸出方春夏以大麥麨秋冬以小麥麨好細絹下篩以酥和封上又方鷹屎白一兩衣白魚二七枚上二味末之蜜和以敷日三五度良又方以熱瓦尉之又方以凍凌尉之又方鷹屎白二兩白殭蠶二兩半上二味末之以白蜜和敷日三慎五辛生菜又方臘月豬脂四升煎大鼠一枚令消盡以生布拭瘢處令赤塗之不過四五上治身及面上印紋方針刺字上破以醋調赤土敷之干又易以黑滅即止又方以未滿月兒屎敷上一月即沒
