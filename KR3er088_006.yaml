body:
  text: 卷五上少小嬰孺方上凡五類序例第一論三首方二首擇乳母法論曰夫生民之道莫不以養小為大若無於小卒不成大故易稱積小以成大詩有厥初生民傳曰聲子生隱公此之一義即是從微至著自少及長人情共見不待經史故今斯方先婦人小兒而後丈夫耆老者則是崇本之義也然小兒氣勢微弱醫士欲留心救療立功瘥難今之學者多不存意良由嬰兒在於襁褓之內乳氣腥臊醫者操行英雄詎肯瞻視靜言思之可為太息者矣小品方云凡人年六歲以上為小十六歲以上為少巢源外臺作十八以上為少三十以上為壯巢源外臺作二十以上為壯五十以上為老其六歲以下經所不載所以乳下嬰兒有病難治者皆為無所承據也中古有巫妨巢源作巫方者立小兒顱囟經以占夭壽判疾病死生世相傳授始有小兒方逮於晉宋江左推諸蘇家傳習有驗流於人間齊有徐王者也有小兒方三卷故今之學者頗得傳授然徐氏位望隆重何暇留心於少小詳其方意不甚深細少有可採未為至祕今博採諸家及自經用有效者以為此篇凡百居家皆宜達茲養小之術則無橫夭之禍也又曰小兒病與大人不殊惟用藥有多少為異其驚癇客忤解顱不行等八九篇合為此卷下痢等余方並散在諸篇可披而得之凡生後六十日瞳子成能咳笑應和人百日任脈成能自反覆一作百五十日百八十日尻骨成能獨坐二百一十日掌骨成能匍匐三百日臏骨成能獨立三百六十日膝骨成能行此其定法若不能依期必有不平之處凡兒生三十二日一變六十四日再變變且蒸九十六日三變一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百二十日小蒸畢後六十四日大蒸蒸後六十四日復大蒸蒸後一百二十八日復大蒸凡小兒自生三十二日一變再變為一蒸凡十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是榮其血脈改其五臟故一變竟輒覺情態有異其變蒸之候變者上氣蒸者體熱變蒸有輕重其輕者體熱而微驚耳冷尻冷上唇頭白泡起如魚目珠子微汗出其重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯目白睛微赤黑睛微白又云目白者重赤黑者微變蒸畢目睛明矣此其證也單變小微兼蒸小劇凡蒸平者五日而衰遠者十日而衰先期五日後之五日為十日之中熱乃除耳兒生三十二日一變二十九日先期而熱便治之如法至三十六七日蒸乃畢耳恐不解了故重說之且變蒸之時不欲驚動勿令旁多人兒變蒸或早或晚不如法者多又初變之時或熱甚者違日數不歇審計變蒸之日當其時有熱微驚慎不可治及灸刺但和視之若良久熱不可已少與紫丸微下熱歇便止若於變蒸之中加以時行溫病或非變蒸時而得時行者其診皆相似惟耳及尻通熱口上無白泡耳當先服黑散以發其汗汗出溫粉粉之熱當歇便就瘥若猶不都除乃與紫丸下之兒變蒸時若有寒加之即寒熱交爭腰腹夭糾啼不止者尉之則愈也尉法出下篇炙粉絮尉者是變蒸與溫壯傷寒相似若非變蒸身熱耳熱尻亦熱此乃為他病可作余治審是變蒸不得為余治也又一法凡兒生三十二日始變變者身熱也至六十四日再變變且蒸其狀臥端正也至九十六日三變定者候丹孔出而泄至一百二十八日四變變且蒸以能咳笑也至一百六十日五變以成機關也至一百九十二日六變變且蒸五機成也至二百二十四日七變以能匍匐也至二百五十六日八變變且蒸以知欲學語也至二百八十八日九變以亭亭然也凡小兒生至二百八十八日九變四蒸也當其變之日慎不可妄治之則加其疾變且蒸者是兒送迎月也蒸者甚熱而脈亂汗出是也近者五日歇遠者八九日歇也當是蒸上不可灸刺妄治之也紫丸治小兒變蒸發熱不解並挾傷寒溫壯汗後熱不歇及腹中有痰癖哺乳不進乳則吐哯食癇先寒後熱方代赭赤石脂各一兩巴豆三十枚杏仁五十枚上四味為末巴豆杏仁別研為膏相和更搗二千杵當自相得若硬入少蜜同搗之密器中收三十日兒服如麻子一丸與少乳汁令下食頃後與少乳勿令多至日中當小下熱除若未全除明旦更與一丸百日兒服如小豆一丸以此准量增減夏月多熱善令發疹二三十日輒一服佳紫丸無所不療雖下不虛人黑散治小兒變蒸中挾時行溫病或非變蒸時而得時行者方麻黃杏仁各半兩大黃六銖上三味先搗麻黃大黃為散別研杏仁如脂乃細細納散又搗令調和納密器中一月兒服小豆大一枚以乳汁和服抱令得汗汗出溫粉粉之勿使見風百日兒服如棗核以兒大小量之擇乳母法凡乳母者其血氣為乳汁也五情善惡悉是血氣所生也其乳兒者皆宜慎於喜怒夫乳母形色所宜其候甚多不可求備但取不胡臭癭瘻氣嗽瘑疥癡癃白禿癧瘍沈唇耳聾齆鼻癲癇無此等疾者便可飲兒也師見其故灸瘢便知其先疾之源也初生出腹第二論二首凡十二事相兒壽夭法論曰小兒初生先以綿裹指拭兒口中及舌上青泥惡血此為之玉衡一作銜若不急拭啼聲一發即入腹成百疾矣兒生落地不作聲者取暖水一器灌之須臾當啼兒生不作聲者此由難産少氣故也可取兒臍帶向身卻捋之令氣入腹仍呵之至百度啼聲自發亦可以蔥白徐徐鞭之即啼兒已生即當舉之舉之遲晚則令中寒腹內雷鳴乃先浴之然後斷臍不得以刀割之須令人隔單衣物咬斷兼以暖氣呵七遍然後纏結所留臍帶令至兒足趺上短則中寒令兒腹中不調常下痢若先斷臍然後浴者臍中水臍中水則發腹痛其臍斷訖連臍帶中多有蟲宜急剔撥去之不爾入兒腹成疾斷兒臍者當令長六寸長則傷肌短則傷臟不以時斷若挼汁不盡則暖氣漸微自生寒令兒臍風生男宜用其父舊衣裹之生女宜用其母故衣皆勿用新帛為善不可令衣過厚令兒傷皮膚害血脈發雜瘡而黃兒衣綿帛特忌厚熱慎之慎之凡小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風則令肌膚脆軟便宜中傷皆當以故絮衣之勿用新綿也凡天和暖無風之時令母將兒於日中嬉戲數見風日則血凝氣剛肌肉牢密堪耐風寒不致疾病若常藏在幃帳之中重衣溫暖譬猶陰地之草木不見風日軟脆不堪風寒也凡裹臍法椎治白練令柔軟方四寸新綿厚半寸與帛等合之調其緩急急則令兒吐哯兒生二十日乃解視臍若十許日兒怒啼似衣中有刺者此或臍燥還刺其腹當解之易衣更裹裹臍時閉戶下帳燃火令帳中溫暖換衣亦然仍以溫粉粉之此謂冬時寒也若不愈燒絳帛末粉之若過一月臍有汁不愈燒蝦蟆灰粉之日三四次若臍中水及中冷則令兒腹絞痛夭糾啼呼面目青黑此是中水之過當炙粉絮以尉之不時治護臍至腫者當隨輕重重者便灸之乃可至八九十壯輕者臍不大腫但出汁時時啼呼者搗當歸末和胡粉敷之炙絮日尉之至百日愈以啼呼止為候若兒糞青者冷也與臍中水同兒洗浴斷臍竟䙀抱畢未可與朱蜜宜與甘草湯以甘草如手中指一節許打碎以水二合煮取一合以綿纏沾取與兒吮之連吮汁計得一蜆殼入腹止兒當快吐吐去心胸中惡汁也如得吐余藥更不須與若不得吐可消息計如飢渴須臾更與之若前所服及更與並不得吐者但稍稍與之令盡此一合止如得吐去惡汁令兒心神智慧無病也飲一合盡都不吐者是兒不含惡血耳勿復與甘草湯乃可與朱蜜以鎮心神安魂魄也兒新生三日中與朱蜜者不宜多多則冷兒脾胃冷腹脹喜陰癇氣急變噤痙而死新生與朱蜜法以飛煉硃砂如大豆許以赤蜜一蜆殼和之以綿纏箸頭沾取與兒吮之得三沾止一日令盡此一豆許可三日與之則用三豆許也勿過此則傷兒也與朱蜜竟可與牛黃如朱蜜多少也牛黃益肝膽除熱定精神止驚辟惡氣除小兒百病也新生三日後應開腸胃助穀神可研米作厚飲如乳酪厚薄以豆大與兒咽之頻咽三豆許止日三與之滿七日可與哺也兒生十日始哺如棗核二十日倍之五十日如彈丸百日如棗若乳汁少不得從此法當用意小增之若三十日而哺者令兒無疾兒哺早者兒不勝穀氣令生病頭面身體喜生瘡愈而復發令兒尪弱難養三十日後雖哺勿多若不嗜食勿強與之強與之不消復生疾病哺乳不進者腹中皆有痰癖也當以四物紫丸微下節哺乳數日便自愈小兒微寒熱亦當爾利之要當下之然後乃瘥凡乳兒不欲太飽飽則嘔吐每候兒吐者乳太飽也以空乳乳之即消日四乳兒若臍未愈乳兒太飽令風中臍也夏不去熱乳令兒嘔逆冬不去寒乳令兒咳痢母新房以乳兒令兒羸瘦交脛不能行母有熱以乳兒令變黃不能食母怒以乳兒令喜驚發氣疝又令上氣疝癲狂母新吐下以乳兒令虛羸母醉以乳兒令身熱腹滿凡新生小兒一月內常飲豬乳大佳凡乳母乳兒當先極挼散其熱氣勿令汁奔出令兒噎輒奪其乳令得息息已復乳之如是十返五返視兒飢飽節度知一日中幾乳而足以為常又常捉去宿乳兒若臥乳母當以臂枕之令乳與兒頭平乃乳之令兒不噎母欲寐則奪其乳恐填口鼻又不知飢飽也浴兒法凡浴小兒湯極須令冷熱調和冷熱失所令兒驚亦致五臟之疾也凡兒冬不可久浴浴久則傷寒夏不可久浴浴久則傷熱數浴背冷則發癇若不浴又令兒毛落新生浴兒者以豬膽一枚取汁投湯中以浴兒終身不患瘡疥勿以雜水浴之兒生三日宜用桃根湯浴桃根梅根李根各二兩枝亦得㕮咀以水三斗煮二十沸去滓浴兒良去不祥令兒終身無瘡疥治小兒驚辟惡氣以艾虎湯浴艾一斤虎頭骨一枚以水三斗煮為湯浴但須浴則煮用之凡小兒初出腹有鵝口者其舌上有白屑如米劇者鼻中亦有之此由兒在胞胎中受穀氣盛故也或妊娠時嗜糯米使之然治之之法以發纏箸頭沾井花水撩拭之三日如此便脫去如不脫可煮栗荴汁令濃以綿纏箸頭拭之若春夏無栗荴可煮栗木皮如用井花水法小兒初出腹有連舌舌下有膜如石榴子中隔連其舌下後喜令兒言語不發不轉也可以爪摘斷之微有血出無害若血出不止可燒發作灰末敷之血便止也小兒出腹六七日後其血氣收斂成肉則口舌喉頰裡清淨也若喉里舌上有物如蘆籜盛水狀者若懸癰有脹起者可以綿纏長針留刃處如粟米許大以刺決之令氣泄去青黃赤血汁也一刺之止消息一日未消者來日又刺之不過三刺自消盡余小小未消三刺亦止自然得消也有著舌下如此者名重舌有著頰裡及上齶如此者名重齶有著齒齦上者名重齦皆刺去血汁也小兒生輒死治之法當候視兒口中懸雍前上齶有泡者以指摘取頭決令潰去血勿令血入咽入咽殺兒急急慎之小兒初出腹骨肉未斂肌肉猶是血也血凝乃堅成肌肉耳其血沮敗不成肌肉則使面目繞鼻口左右悉黃而啼閉目聚口撮面口中乾燥四肢不能伸縮者皆是血脈不斂也喜不育若有如此者皆宜與龍膽湯也方出本卷驚癇篇相兒壽夭法兒初生叫聲連延相屬者壽聲絶而復揚急者不壽啼聲散不成人啼聲深不成人臍中無血者好臍小者不壽通身軟弱如無骨者不壽鮮白長大者壽自開目者不成人目視不正數動者大非佳汗血者多厄不壽汗不流不成人小便凝如脂膏不成人頭四破不成人常搖手足者不成人早坐早行早齒早語皆惡性非佳人頭毛不周匝者不成人發稀少者強不聽人一作不聰額上有旋毛早貴妨父母兒生枕骨不成者能言而死尻骨不成者能倨而死掌骨不成者能匍匐而死踵骨不成者能行而死臏骨不成者能立而死身不收者死魚口者死股間無生肉者死頤下破者死陰不起者死陰囊下白者死赤者死卵縫通達黑者壽論曰兒三歲以上十歲以下視其性氣高下即可知其夭壽大略兒小時識悟通敏過人者多夭大則頂託顏回之流是也小兒骨法成就威儀回轉遲舒稍費人精神鵰琢者壽其預知人意回旋敏速者亦夭即楊修孔融之徒是也由此觀之夭壽大略可知也亦猶梅花早發不睹歲寒甘菊晚成終於年事是知晚成者壽之兆也驚癇第三論三首方十三首灸法二十六首論曰少小所以有癇病及痙病者皆由臟氣不平故也新生即癇者是其五臟不收斂血氣不聚五脈不流骨怯不成也多不全育其一月四十日以上至期歲而癇者亦由乳養失理血氣不和風邪所中也病先身熱掣瘲驚啼叫喚而後發癇脈浮者為陽癇病在六腑外在肌膚猶易治也病先身冷不驚掣不啼呼而病發時脈沉者為陰癇病在五臟內在骨髓極難治也病發身軟時醒者謂之癇也身強直反張如弓不時醒者謂之痙也諸反張大人脊下容側手小兒容三指者不可復治也凡脈浮之與沉以判其病在陰陽表裡耳其浮沉復有大小滑澀虛實遲快諸證各依脈形為治神農本草經說小兒驚癇有一百二十種其證候微異於常便是癇候也初出腹血脈不斂五臟未成稍將養失宜即為病也時不成人其經變蒸之後有病餘證並寬惟中風最暴卒也小兒四肢不好驚掣氣息小異欲作癇及變蒸日滿不解者並宜龍膽湯也凡小兒之癇有三種有風癇有驚癇有食癇然風癇驚癇時時有耳十兒之中未有一二是風驚者凡是先寒後熱發者皆是食癇也驚癇當按圖灸之風癇當與豬心湯食癇當下乃與紫丸佳凡小兒所以得風癇者緣衣暖汗出風因入也風癇者初得之時先屈指如數乃發作者此風癇也驚癇者起於驚怖大啼乃發作者此驚癇也驚癇微者急持之勿復更驚之或自止也其先不哺乳吐而變熱後發癇者此食癇早下則瘥四味紫丸逐癖飲最良去病速而不虛人赤丸方中本無赤丸詳後癖結脹滿篇第一方紫雙丸用硃砂色當赤疑即赤丸也瘥快病重者當用之凡小兒不能乳哺當與紫丸下之小兒始生生氣尚盛但有微惡則須下之必無所損及其愈病則致深益若不時下則成大疾疾成則難治矣凡下四味紫丸最善雖下不損人足以去疾若四味紫丸不得下者當以赤丸下之赤丸不下當倍之若已下而有餘熱不盡當按方作龍膽湯稍稍服之並摩赤膏方見本篇末風癇亦當下之然當以豬心湯下之驚癇但按圖灸之及摩生膏方見本篇末不可大下也何者驚癇心氣不定一作足下之內虛益令甚爾驚癇甚者特為難治故養小兒常慎驚勿令聞大聲抱持之間當安徐勿令驚怖又天雷時當塞兒耳並作余細聲以亂之也凡養小兒皆微驚以長其血脈但不欲大驚大驚乃灸驚脈若五六十日灸者驚復更甚生百日後灸驚脈乃善兒有熱不欲哺乳臥不安又數驚此癇之初也服紫丸便愈不愈復與之兒眠時小驚者一月輒一以紫丸下之減其盛氣令兒不病癇也兒立夏後有病治之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之除熱湯散見下篇傷寒條中除熱赤膏摩之又以膏塗臍中令兒在涼處勿禁水漿常以新水飲之小兒衣甚薄則腹中乳食不消不消則大便皆醋臭此欲為癖之漸也便將紫丸以微消之服法先從少起常令大便稀勿大下也稀後便漸減之不醋臭乃止藥也凡小兒冬月下無所畏夏月下難瘥然有病者不可不下下後腹中當小脹滿故當節哺乳數日不可妄下又乳哺小兒常令多少有常劑兒漸大當小小增之若減少者此腹中已有小不調也便微服藥勿復哺之但當與乳甚者十數日微者五六日止哺自當如常若都不肯食哺而但欲乳者此是有癖為疾重要當下之不可不下不下則致寒熱或吐而發癇或更致下痢此皆病重不早下之所為也此即難治矣但先治其輕時兒不耗損而病可速愈凡小兒屎黃而臭者此腹中有伏熱宜微將服龍膽湯若白而醋臭者此挾宿食不消也當服紫丸微者少與藥令內消甚者小增藥令小下皆復節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令腹脹滿再三下之尚可過則傷矣凡小兒有癖其脈大必發癇此為食癇下之便愈當審候掌中與三指脈不可令起而不時下致於發癇則難療矣若早下之此脈終不起也脈在掌中尚可早療若至指則病增矣凡小兒腹中有疾生則身寒熱寒熱則血脈動動則心不定心不定則易驚驚則癇發速也候癇法夫癇小兒之惡病也或有不及求醫而致困者也然氣發於內必先有候常宜審察其精神而探其候也手白肉魚際脈黑者是癇候魚際脈赤者熱脈青大者寒脈青細為平也鼻口乾燥大小便不利是癇候眼不明上視喜陽是癇候耳後完骨上有青絡盛臥不靜是癇候青脈刺之令血出也小兒發逆上啼笑面暗色不變是癇候鼻口青時小驚是癇候目閉青時小驚是癇候身熱頭常汗出是癇候身熱吐哯而喘是癇候身熱目時直視是癇候喜缺目上視是癇候身熱目視不精是癇候目瞳子卒大黑於常是癇候臥惕惕而驚手足振搖是癇候臥夢笑手足動搖是癇候意氣下而妄怒是癇候咽乳不利是癇候身熱小便難是癇候吐痢不止厥痛時起是癇候弄舌搖頭是癇候以上諸候二十條皆癇之初也見其候便抓其陽脈所應灸抓之皆重手令兒驟啼及足絶脈亦依方與湯直視瞳子動腹滿轉鳴下血身熱口禁不得乳反張脊強汗出發熱為臥不悟手足掣瘲善驚凡八條癇之劇者也如有此非復湯抓所能救便當時灸之論曰若病家始發便來詣師師可診候所解為法作次序治之以其節度首尾取瘥也病家已經雜治無次序不能制病病則變異其本候師便不知其前證虛實只依後證作治亦不得瘥也要應精問察之為前師所配依取其前蹤跡以為治乃無逆耳前師處湯本應數劑乃瘥而病家服一兩劑未效便謂不驗以後更問他師師不尋前人為治寒溫次序而更為治而不次前師治則弊也或前已下之後須平和療以接之而得瘥也或前人未下之或不去者或前治寒溫失度後人應調治之是為治敗病皆須邀射之然後免耳不依次第及不審察必及重弊也龍膽湯治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣發熱大吐哯者若已能進哺中食實不消壯熱及變蒸不解中客人鬼氣並諸驚癇方悉主之十歲以下小兒皆服之小兒龍膽湯第一此是新出腹嬰兒方若日月長大者以次依此為例若必知客忤及有魃氣者可加人參當歸各如龍膽多少也一百日兒加三銖二百日兒加六銖一歲兒加半兩余藥皆準耳龍膽鉤藤皮柴胡黃芩桔梗芍藥茯苓一作茯神甘草各六銖蜣螂二枚大黃一兩上十味㕮咀以水一升煮取五合為劑也服之如後節度藥有虛實虛藥宜足數合水也兒生一日至七日分一合為三服兒生八日至十五日分一合半為三服生十六日至二十日分二合為三服兒生二十日至三十日分三合為三服兒生三十日至四十日盡以五合為三服皆得下即止勿再服也大黃湯治少小風癇積聚腹痛夭矯二十五癇方大黃人參細辛乾薑當歸甘皮各三銖上六味㕮咀以水一升煮取四合服之如棗許大日三白羊蘚湯治小兒風癇胸中有痰方白羊蘚三銖即白蘚皮蚱蟬二枚大黃四銖甘草鉤藤皮細辛各二銖牛黃如大豆四枚蛇蛻皮一寸上八味㕮咀以水二升半煮取一升二合分五服日三若服已盡而癇不斷者可更加大黃鉤藤各一銖以水漬藥半日然後煮之增損續命湯治小兒猝中風惡毒及久風四肢角弓反張不隨並軃曳僻不能行步方麻黃甘草桂心各一兩川芎葛根升麻當歸獨活各十八銖人參黃芩石膏各半兩杏仁二十枚上十二味㕮咀以水六升煮麻黃去上沫乃納諸藥煮取一升二合三歲兒分為四服一日令盡少取汗得汗以粉粉之石膏湯治小兒中風惡痱不能語口眼了戾四肢不隨方石膏一合麻黃八銖甘草射干桂心芍藥當歸各四銖細辛二銖上八味㕮咀以水三升半先煮麻黃三沸去上沫納余藥煮取一升三歲兒分四服日三治少小中風狀如欲絶湯方大黃牡蠣龍骨栝蔞根甘草桂心各十二銖赤石脂寒水石各六銖上八味㕮咀以水一升納藥重半兩煮再沸絞去滓半歲兒服如雞子大一枚大兒盡服入口中即愈汗出粉之藥無毒可每日二服有熱加大黃不汗加麻黃無寒水石朴硝代之二物石膏湯治少小中風手足拘急方石膏如雞子大一枚碎真珠一兩上以水二升煮石膏五六沸納真珠煮取一升稍稍分服桂枝湯治少小中風脈浮發熱自汗出項強鼻鳴乾嘔方即傷寒篇本方見於十一卷二物驢毛散治少小新生中風方驢毛取背前交脊上會中拔取如手拇指大一把麝香二豆大上以乳汁和銅器中微火煎令焦熟出為末小兒不能飲以乳汁和之葦筒貯瀉著咽中然後飲乳令入腹茵芋丸治少小有風癇疾至長不除或遇天陰節變便發動食飲堅強亦發百脈攣縮行步不正言語不便者服之永不發方茵芋葉鉛丹秦艽鉤藤皮石膏杜蘅防葵各一兩菖蒲黃芩各一兩半松蘿半兩蜣螂十枚甘草三兩上十二味為末蜜丸小豆大三歲以下服五丸三歲以上服七丸五歲以上服十丸十歲以上可至十五丸鎮心丸治小兒驚癇百病鎮心氣方銀屑十二銖水銀二十銖牛黃六銖大黃六分茯苓三分茯神遠志防己白蘞雄黃人參芍藥各二分紫石英真珠防葵鐵精各四分上十六味先以水銀和銀屑如泥別治諸藥和丸二歲兒如麻子二丸隨兒大小增之一方無牛黃丹參赤膏治少小心腹熱除熱方丹參雷丸芒硝戎鹽大黃各二兩上五味㕮咀以苦酒半升浸四鍾一宿以成煉豬肪一斤煎三上三下去滓乃納芒硝膏成以摩心下冬夏可用一方但用丹參雷丸亦佳五物甘草生摩膏治少小新生肌膚幼弱喜為風邪所中身體壯熱或中大風手足驚掣方甘草防風各一兩白朮桔梗各二十銖雷丸二兩半上五味㕮咀以不中水豬肪一斤煎為膏以煎藥微火上煎消息視稠濁膏成去滓取如彈丸大一枚炙手以摩兒百遍寒者更熱熱者更寒小兒雖無病早起常以膏摩囟上及手足心甚闢風寒灸法論曰小兒新生無疾慎不可逆針灸之如逆針灸則忍痛動其五臟因喜成病河洛關中土地多寒兒喜病痙其生兒三日多逆灸以防之又灸頰以防噤有噤者舌下脈急牙車筋急其土地寒皆決舌下去血灸頰以防噤也吳蜀地溫無此疾也古方既傳之今人不詳南北之殊便按方而用之是以多害於小兒也所以田舍小兒任其自然皆得無有夭橫也小兒驚啼眠中四肢掣動變蒸未解慎不可針灸抓之動其百脈仍因驚成癇也惟陰癇噤痙可針灸抓之凡灸癇當先下兒使虛乃承虛灸之未下有實而灸者氣逼前後不通殺人癇發平旦者在足少陽晨朝發者在足厥陰日中發者在足太陽黃昏發者在足太陰人定發者在足陽明夜半發者在足少陰上癇發時病所在視其發早晚灸其所也夫癇有五臟之癇六畜之癇或在四肢或在腹內當審其候隨病所在灸之雖少必瘥若失其要則為害也肝癇之為病面青目反視手足搖灸足少陽厥陰各三壯心癇之為病面赤心下有熱短氣息微數灸心下第二肋端宛宛中此為巨闕也又灸手心主及少陰各三壯脾癇之為病面黃腹大喜痢灸胃脘三壯挾胃脘旁灸二壯足陽明太陰各二壯肺癇之為病面目白口沫出灸肺俞三壯又灸手陽明太陰各二壯腎癇之為病面黑正直視不搖如尸狀灸心下二寸二分三壯又灸肘中動脈各二壯又灸足太陽少陰各二壯膈癇之為病目反四肢不舉灸風府又灸頂上鼻人中下唇承漿皆隨年壯腸癇之為病不動搖灸兩承山又灸足心兩手勞宮又灸兩耳後完骨各隨年壯又灸臍中五十壯上五臟癇證候馬癇之為病張口搖頭馬鳴欲反折灸項風府臍中三壯病在腹中燒馬蹄末服之良牛癇之為病目正直視腹脹灸鳩尾骨及大椎各三壯燒牛蹄末服之良羊癇之為病喜揚目吐舌灸大椎上三壯豬癇之為病喜吐沫灸完骨兩旁各一寸七壯犬癇之為病手足攣灸兩手心一壯灸足太陽一壯灸肋戶一壯雞癇之為病搖頭反折喜驚自搖灸足諸陽各三壯上六畜癇證候小兒暴癇灸兩乳頭女兒灸乳下二分治小兒暴癇者身軀正直如死及腹中雷鳴灸太倉及臍中上下兩旁各一寸凡六處又灸當腹度取背以繩繞頸下至臍中竭便轉繩向背順脊下行盡繩頭灸兩旁各一寸五壯若面白啼聲色不變灸足陽明太陰若目反上視眸子動當灸囟中取之法橫度口盡兩吻際又橫度鼻下亦盡兩邊折去鼻度半都合口為度以額上髮際上行度之灸度頭一處正在囟上未合骨中隨手動者是此最要處也次灸當額上入發二分許直望鼻為正次灸其兩邊當目瞳子直上入髮際二分許次灸頂上回毛中次灸客主人穴在眉後際動脈是次灸兩耳門當耳開口則骨解開動張陷是也次灸兩耳上卷耳取之當卷耳上頭是也一法大人當耳上橫三指小兒各自取其指也次灸兩耳後完骨上青脈亦可以針刺令血出次灸玉枕項後高骨是也次灸兩風池在項後兩轅動筋外發際陷中是也次灸風府當項中央髮際亦可與風池三處高下相等次灸頭兩角兩角當回毛兩邊起骨是也上頭部凡十九處兒生十日可灸三壯三十日可灸五壯五十日可灸七壯病重俱灸之輕者灸囟中風池玉枕也艾使熟炷令平正著肉火勢乃至病所也艾若生炷不平正不著肉徒灸多炷故無益也若腹滿短氣轉鳴灸肺募在兩乳上第二肋間宛宛中懸繩取之當瞳子是次灸膻中次灸胸堂次灸臍中次灸薜息薜息在兩乳下第一肋間宛宛中是也次灸巨闕大人去鳩尾下一寸小兒去臍作六分分之去鳩尾下一寸是也並灸兩邊次灸胃脘次灸金門金門在穀道前囊之後當中央是也從陰囊下度至大孔前中分之上腹部十二處胸堂巨闕胃脘十日兒可灸三壯一月以上可五壯陰下縫中可三壯或云隨年壯若脊強反張灸大椎並灸諸臟俞及督脊上當中從大椎度至窮骨中屈更從大椎度之灸度下頭是督脊也上背部十二處十日兒可灸三壯一月以上可灸五壯若手足掣瘲驚者灸尺澤次灸陽明次灸少商次灸勞宮次灸心主次灸合谷次灸三間次灸少陽上手部十六處其要者陽明少商心主尺澤合谷少陽也壯數如上又灸伏兔次灸三里次灸腓腸次灸鹿溪次灸陽明次灸少陽次灸然谷上足部十四處皆要可灸壯數如上手足陽明謂人四指凡小兒驚癇皆灸之若風病大動手足掣瘲者盡灸手足十指端又灸本節後客忤第四論二首方二十七首灸法一首論曰少小所以有客忤病者是外人來氣息忤之一名中人是為客忤也雖是家人或別房異戶雖是乳母及父母或從外還衣服經履鬼神粗惡暴氣或牛馬之氣皆為忤也執作喘息乳氣未定者皆為客忤其乳母遇醉或房勞喘後乳兒最劇能殺兒也不可不慎凡諸乘馬行得馬汗氣臭未盥洗易衣裝便向兒邊令兒中馬客忤兒卒見馬來及聞馬鳴驚及馬上衣物馬氣皆令小兒中馬客忤慎護之特重一歲兒也凡小兒衣布帛綿中不得有頭髮履中亦爾白衣青帶青衣白帶皆令中忤凡非常人及諸物從外來亦能驚小兒至致病欲防之法諸有從外來人及有異物入戶當將兒避之勿令見也若不避者燒牛屎令常有煙氣置戶前則善小兒中客為病者無時不有此病也而秋初一切小兒皆病者豈是一切小兒悉中客邪夫小兒所以春冬少病秋夏多病者秋夏小兒陽氣在外血脈嫩弱秋初夏末晨夕時有暴冷小兒嫩弱其外則易傷暴冷折其陽陽結則壯熱胃冷則下痢是故夏末秋初小兒多壯熱而下痢未必皆是中客及魃也若治少小法夏末秋初常宜候天氣溫涼也有暴寒卒冷者其少小則多患壯熱而下痢也慎不可先下之皆先殺毒後下之耳玄中記云天下有女鳥名曰姑獲肘後子母祕録作烏獲一名天帝女一名隱飛鳥一名夜行遊女又名釣星鬼喜以陰雨夜過飛鳴徘徊人村裡喚得來者是也鳥純雌無雄不産陰氣毒化生喜落毛羽於人中庭置兒衣中便令兒作癇病必死即化為其兒也是以小兒生至十歲衣被不可露也七八月尤忌凡中客忤之為病類皆吐下青黃白色水穀解離腹痛天糾面色變易其候似癇但眼不上插耳其脈急數者是也宜與龍膽湯下之加人參當歸各如龍膽稱分等多少也小兒中客急視其口中懸雍左右當有青黑腫脈核如麻豆大或赤或白或青如此便宜用針速刺潰去之亦可爪摘決之並以綿纏叉頭拭去血也少小中客之為病吐下青黃赤白汁腹中痛及反倒偃側喘似癇狀但目不上插少睡耳面變五色其脈弦急若失時不治小久則難治矣欲療之方用豉數合水拌令濕搗熟丸如雞子大以摩兒囟及手足心各五六遍畢以丸摩兒心及臍上下行轉摩之食頃破視其中當有細毛即擲丸道中痛即止治少小中客忤項強欲死方取衣中白魚十枚為末以敷母乳頭上令兒飲之入咽立愈一方二枚著兒母手掩兒臍中兒吐下愈亦以摩兒項及脊強處又方吞麝香大豆許立愈治小兒卒中忤方剪取驢前膊胛上旋毛大如彈子以乳汁煎之令毛消藥成著乳頭飲之下喉即愈又方燒母衣帶三寸併發合乳汁服之又方取牛鼻津服之或牛口沫敷乳頭飲之一物豬蹄散治小兒寒熱及赤氣中人方取豬後足懸蹄燒末搗篩以飲乳汁一撮立效治少小猝中客忤不知人者方取熱馬屎一丸絞取汁飲兒下咽便愈亦治中客忤而𠸯啼面青腹強者一物馬通浴湯治少小中忤方馬通三升燒令煙絶以酒一斗煮三沸去滓浴兒即愈一物豬通浴湯治小兒中人忤𠸯啼面青腹強者方猳豬通二升以熱湯灌之適寒溫浴兒治少小客忤二物黃土塗頭方取灶中黃土蚯蚓屎等分搗合水和如雞子黃大塗兒頭上及五心良一方云用雞子清和如泥治小兒卒客忤方銅鏡鼻燒令赤著少許酒中大兒飲之小兒不能飲者含與之即愈治小兒中馬客忤而吐不止者方灸手心主間使大都隱白三陰交各三壯可用粉丸如豉法並用唾唾而咒之咒法如下咒客忤法咒曰摩家公摩家母摩家子兒苦客忤從我始扁鵲雖良不如善唾良咒訖棄丸道中又法取一刀橫著灶上解兒衣發其心腹訖取刀持向兒咒之唾輒以刀向心腹啡啡曰音非出唾貌煌煌日出東方背陰向陽葛公葛公不知何公子來不視去不顧過與生人忤梁上塵天之神戶下土鬼所經大刀環犀對灶君二七唾客愈兒驚唾啡啡如此二七啡啡每唾以刀擬之咒當三遍乃畢用豉丸如上法五六遍訖取此丸破視其中有毛棄丸道中客忤即愈矣小兒魃法論曰凡小兒有魃病者是婦人懷娠有惡神導其腹中胎妒嫉他小兒令病也魃者小鬼也音奇妊娠婦人不必悉招魃魅人時有此耳魃之為疾喜微微下痢寒熱或有去來毫毛鬢髮𩮩鬡不悅是其證也宜服龍膽湯凡婦人先有小兒未能行而母又孕使兒飲此乳亦作鬾也令兒黃瘦骨立發落壯熱是其證也治魃方炙伏翼熟咀哺之又方燒伏翼末飲服之又方以水二升煮萹蓄冬瓜各四兩取浴之白蘚皮湯治少小客魃挾實方白蘚皮大黃甘草各一兩芍藥茯苓細辛桂心各十八銖上七味㕮咀以水二升煮取九合分三服小兒夜啼龍角丸治小兒五驚夜啼方崔氏名五驚丸龍角六銖牡蠣一作牡丹川大黃各九銖黃芩半兩蚱蟬二枚牛黃如小豆五枚上六味末蜜丸如麻子蓐里兒服二丸隨兒大小增減川芎散治小兒夜啼至明即安寐方川芎白朮防己各半兩上三味治下篩以乳和與兒服之量多少又以兒母手掩臍中亦以摩兒頭及脊驗二十日兒未能服散者以乳汁和之服如麻子一丸兒大能服藥者以意斟酌之一物前胡丸治少小夜啼方前胡隨多少搗末蜜和丸如大豆服一丸日三稍加至五六丸以瘥為度千金湯治小兒暴驚啼絶死或有人從外來邪氣所逐令兒得疾衆醫不治方川椒左顧牡蠣各六銖碎上二味以醋漿水一升煮取五合每服一合又方伏龍肝交道中土各一把上二味治下篩水和少許飲之又方取馬骨燒灰敷乳上飲兒啼即止治小兒夜啼不已醫所不治者方取狼屎中骨燒灰為末水服如黍米粒大二枚即定又方燒蝟皮三寸灰著乳頭飲之治小兒驚啼方取雞屎白熬末以乳服之佳又方酒服亂髮灰良又方以妊娠時食飲偏有所思者物哺兒則愈傷寒第五論一首方三十首灸法一首論曰夫小兒未能冒涉霜雪乃不病傷寒也大人解脫之久傷於寒冷則不論耳然天行非節之氣其亦得之有時行疾疫之年小兒出腹但患斑者也治其時行節度故如大人法但用藥分劑少異藥小冷耳麥門冬湯治小兒未滿百日傷寒鼻衄身熱嘔逆方麥門冬十八銖石膏寒水石甘草各半兩桂心八銖上五味㕮咀以水二升半煮取一升每服一合日三芍藥四物解肌湯治少小傷寒方芍藥黃芩升麻葛根各半兩上四味㕮咀以水三升煮取九合去滓分五服期歲以上分三服麻黃湯治少小傷寒發熱咳嗽頭面熱者方麻黃生薑黃芩各一兩甘草桂心石膏芍藥各半兩杏仁十枚上八味㕮咀以水四升煮取一升半分二服兒若小以意減之治小兒傷寒方葛根汁淡竹瀝各六合上二味相和二三歲兒分三服百日兒斟酌服之不宜生煮服佳治小兒時氣方桃葉三兩搗以水五升煮十沸取汁日五六遍淋之若復發燒雄鼠屎二枚燒水調服之五味子湯治小兒傷寒病久不除瘥後復劇瘦瘠骨立方五味子十銖麥門冬黃連黃芩大黃前胡各六銖芒硝五銖石膏一兩甘草當歸各十二銖上十味㕮咀以水三升煮取一升半服二合得下便止計大小增減之莽草浴湯治少小傷寒方莽草半斤牡蠣四兩雷丸三十枚大黃一兩蛇床子一升上五味㕮咀以水三斗煮取鬥半適寒溫以浴兒避眼及陰又方治小兒猝寒熱不佳不能服藥方莽草丹參桂心各三兩菖蒲半斤雷丸一升蛇床子二兩上六味㕮咀以水二斗煮三五沸適寒溫以浴兒避眼及陰雷丸浴湯治小兒忽寒熱方雷丸二十枚大黃四兩黃芩一兩苦參石膏各三兩丹參二兩上六味㕮咀以水二斗煮取一斗半浴兒避眼及陰浴訖以粉粉之勿厚衣一宿復浴李葉浴湯治少小身熱方李葉隨多少㕮咀以水煮去滓浴兒良柳枝浴湯治小兒生一月至五月乍寒乍熱方柳枝細切煮取汁洗兒若渴絞冬瓜汁服之青木香浴湯治小兒壯熱羸瘠方青木香四兩麻子仁竹葉各一升虎骨五兩白芷三兩上五味㕮咀以水二斗煮取一斗稍稍浴兒十二物寒水石散治少小身體壯熱不能服藥方寒水石芒硝滑石石膏赤石脂青木香大黃甘草黃芩防風川芎麻黃根上各等分合治下篩以粉一升藥屑三合相和復以篩篩之以粉兒身日三李根湯治小兒暴有熱得之二三日者方李根桂心芒硝各十八銖麥門冬甘草各一兩上五味㕮咀以水三升煮取一升分五服升麻湯治小兒傷寒變熱毒病身熱面赤口燥心腹堅急大小便不利或口瘡者或因壯熱便四肢攣掣驚乃成癇疾時發時醒醒後身熱如火者悉主之方升麻白薇麻黃葳蕤柴胡甘草各半兩黃芩一兩朴硝大黃鉤藤各六銖上十味㕮咀以水三升先煮麻黃去上沫納諸藥煮取一升兒生三十日至六十日一服二合六十日至百日一服二合半百日至二百日一服三合大黃湯治小兒