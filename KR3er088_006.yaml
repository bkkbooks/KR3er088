加至二十丸治少小腹脹滿方燒父母指甲灰乳頭上飲之又方韭根汁和豬脂煎細細服之又方車轂中脂和輪下土如彈丸吞之立愈又方米粉鹽等分炒變色腹上摩之當歸丸治小兒胎寒𠸯啼腹中痛舌上黑青涎下方一名黑丸當歸狼毒各九銖吳茱萸一作杏仁川椒各半兩細辛乾薑附子各十八銖巴豆十枚豉七合上九味搗八種下篩稱藥末令足研巴豆如膏稍稍納藥末搗令相得蜜和桑杯盛蒸五升米飯下出搗一千杵一月兒服如黍米一丸日一夜二不知稍加以知為度亦治水癖馬齒礬丸治小兒胎寒𠸯啼驚癇腹脹不嗜食大便青黃並大人虛冷內冷或有實不可吐下方用馬齒礬一斤燒半日以棗膏和大人服如梧子二丸日三小兒以意減之以腹內溫為度有實實去神妙治小兒忽患腹痛夭矯汗出名曰胎寒方煮梨葉濃汁七合可三四度飲之半夏丸治小兒暴腹滿欲死方半夏隨多少微火炮之搗末酒和服如粟米粒大五丸日三立愈治小兒霍亂吐痢方人參一兩厚朴甘草各半兩白朮十八銖上四味㕮咀以水二升二合煮取半升六十日兒服一合百日兒分三服期歲兒分二服中間隔乳服之乳母忌生冷油膩等一方加乾薑一分或加生薑三分藿香湯治毒氣吐下腹脹逆害乳哺方藿香一兩生薑三兩青竹茹甘草各半兩上四味㕮咀以水二升煮取八合每服一合日三有熱加升麻半兩治孩子霍亂已用立驗方人參蘆籜各半兩扁豆藤二兩倉米一撮上四味㕮咀以水二升煮取八合分溫服又方人參一兩木瓜一枚倉米一撮上三味㕮咀以水煮分服以意量之立效治小兒霍亂方牛涎灌口中一合又方研尿滓乳上服之治少小吐痢方亂髮半兩燒灰鹿角六銖上二味為末米汁服一刀圭日三服治小兒癖灸兩乳下一寸各三壯癰疽瘰癧第八論一首方六十三首灸法一首漏蘆湯治小兒熱毒癰疽赤白諸丹毒瘡癤方漏蘆連翹肘後用白薇白蘞芒硝肘後用芍藥甘草各六銖大黃一兩升麻枳實麻黃黃芩各九銖上十味㕮咀以水一升半煎取五合兒生一日至七日取一合分三服八日至十五日取一合半分三服十六日至二十日取二合分三服二十日至三十日取三合分三服三十日至四十日取五合分三服肘後治大人各用二兩大黃三兩以水一斗煮取三升分三服其丹毒須針鑱去血經心録無連翹有知母芍藥犀角各等分五香連翹湯治小兒風熱毒腫腫色白或有惡核瘰癧附骨癰疽節解不舉白丹走竟身中白疹瘙不已方青木香薰陸香雞舌香沉香麻黃黃芩各六銖大黃二兩麝香三銖連翹海藻射干升麻枳實各半兩竹瀝三合上十四味㕮咀以水四升煮藥減半納竹瀝煮取一升二合兒生百日至二百日一服三合二百日至期歲一服五合一方不用麻黃連翹丸治小兒無故寒熱強健如故而身體頸項結核瘰癧及心脅腹背裡有堅核不痛名為結風氣腫方連翹桑白皮白頭翁牡丹防風黃柏桂心香豉獨活秦艽各一兩海藻半兩上十一味為末蜜丸如小豆三歲兒飲服五丸加至十丸五歲以上者以意加之治丹毒大赤腫身壯熱百治不折方寒水石十六銖石膏十三銖藍青十二銖冬用乾者犀角柴胡杏仁各八銖知母十銖甘草五銖羚羊角六銖芍藥黃芩各七銖梔子十一銖竹瀝一升生葛汁四合澄清蜜二斤上十五味㕮咀以水五升並竹瀝煮取三升三合去滓納杏仁脂葛汁蜜微火煎取二升一二歲兒服二合大者量加之麻黃湯治小兒丹腫及風毒風疹方麻黃一兩半獨活射干甘草桂心青木香石膏黃芩各一兩上八味㕮咀以水四升煮取一升三歲兒分為四服日再又方治小兒惡毒丹及風疹方麻黃升麻葛根各一兩射干雞舌香甘草各半兩石膏半合上七味㕮咀以水三升煮取一升三歲兒分三服日三拓湯治小兒數十種丹方大黃甘草當歸川芎白芷獨活黃芩芍藥升麻沉香青木香木蘭皮各一兩芒硝三兩上十三味㕮咀以水一斗二升煮取四升去滓納芒硝以綿搵湯中適寒溫拓之干則易之取瘥止治小兒溺灶丹初從兩股及臍間起走入陰頭皆赤方桑根皮切一斗以水二斗煮取一斗以洗浴之治小兒丹毒方搗慎火草絞取汁塗之良其丹毒方具在別卷第二十二卷治小兒赤遊腫若遍身入心腹即能殺人方搗伏龍肝為末以雞子白和敷干易之又方白豆末水和敷之勿令乾治小兒半身皆紅赤漸漸長引者方牛膝甘草上二味㕮咀合得五升以水八升煮三沸去滓和伏龍肝末敷之治小兒身赤腫起者方熬米粉令黑以唾和敷之又方伏龍肝亂髮灰上二味為末以膏和敷之治小兒猝腹皮青黑方以酒和胡粉敷上若不急治須臾便死又灸臍上下左右去臍半寸並鳩尾骨下一寸凡五處各三壯五香枳實湯治小兒著風熱㾦㿔堅如麻豆粒瘡癢搔之皮剝汁出或遍身頭面常常發者方青木香九銖麝香六銖雞舌香薰陸香沉香防風秦艽漏蘆各半兩升麻黃芩白蘞麻黃各一兩枳實一兩半大黃一兩十八銖上十四味㕮咀以水五升煮取一升八合兒五六歲者一服四五合七八歲者一服六合十歲至十四五者加大黃半兩足水為一斗煮取二升半分三服治小兒火灼瘡一身盡有如麻豆或有膿汁乍痛乍癢方甘草白芍白蘞黃芩黃連黃柏苦參各半兩上七味為末以蜜和敷之日二夜一亦可作湯洗之治小兒上下遍身生瘡方芍藥川連黃芩各三兩苦參八兩大黃二兩蛇床子一升黃柏五兩菝葜一斤上八味㕮咀以水二斗煮取一斗以兒洗浴治小兒瘡初起熛漿似火瘡名熛瘡亦名爛瘡方桃仁熟搗以面脂和敷之亦治遍身赤腫起又方馬骨燒灰敷之水銀膏治小兒熱瘡方水銀胡粉松脂各三兩上三味以豬脂四升煎松脂水氣盡下二物攪令勻不見水銀以敷之苦參湯浴小兒身上下百瘡不瘥方苦參八兩地榆川連王不留行獨活艾葉各五兩竹葉二升上七味㕮咀以水三斗煮取一斗以浴兒瘡上浴訖敷黃連散治三日小兒頭面瘡起身體大熱方升麻柴胡石膏各六銖甘草當歸各十二銖大黃黃芩各十八銖上七味㕮咀以水四升煮取二升分服日三夜一量兒大小用之治小兒頭面身體悉生瘡方榆白皮隨多少曝令燥下篩醋和塗綿以敷瘡上蟲自出亦可以豬脂和塗之枳實丸治小兒病風瘙癢痛如疥搔之汁出遍身㾦㿔如麻豆粒年年喜發面目虛肥手足乾枯毛髮細黃及肌膚不光澤鼻氣不利此則少時熱盛極體當風風熱相搏所得也不早治之成大風疾方枳實一兩半菊花蛇床子防風刺蒺藜白薇浮萍各一兩天雄麻黃漏蘆各半兩上十味為末蜜丸如大豆許五歲兒飲服十丸加至二十丸日二五歲以上者隨意加之兒大者可為散服治小兒風瘙癮疹方蒴藋防風羊桃石南秦椒升麻苦參茵芋芫花一云茺蔚刺蒺藜蛇床子枳實礬石各一兩上十三味㕮咀以漿水三斗煮取一斗去滓納礬令小沸浴之又方牛膝末酒服方寸匕漏瘡多年不瘥搗末敷之亦主骨疽癲疾瘰癧絶妙澤蘭湯主丹及癮疹入腹殺人方澤蘭川芎附子茵芋藁本莽草細辛各十二銖上七味㕮咀以水三升煮取一升半分四服先與此湯然後作余治論曰小兒頭生小瘡浸淫疽癢黃膏出不生痂連年不瘥者亦名妒頭瘡以赤龍皮湯及天麻湯洗之內服漏蘆湯外宜敷飛烏膏散及黃連胡粉水銀膏散方具見別卷藜蘆膏治小兒一切頭瘡久即疽癢不生痂方藜蘆黃連雄黃黃芩松脂各二兩礬石五兩豬脂半斤上七味為末煎令調和先以赤龍皮天麻湯洗訖敷之赤龍皮即槲皮治小兒頭瘡經年不瘥方松脂苦參黃連各一兩半大黃胡粉各一兩黃芩水銀各一兩六銖礬石半兩蛇床子十八銖上九味為末以臘月豬脂和研水銀不見敷之又方取屋塵末和油瓶下滓以皂莢湯洗敷之又方發中生瘡頂白者皆以熊白敷之小兒頭瘡方胡粉一兩川連二兩上二味為末洗瘡去痂拭乾敷之即瘥更發如前敷之又方胡粉連翹各一兩水銀半兩上三味以水煎連翹納胡粉水銀和調敷之又方白松脂胡粉各二兩水銀一兩豬脂四兩上四味合煎去滓納水銀粉調敷之大人患同苦參湯治小兒頭瘡方苦參黃芩川連黃柏甘草大黃川芎各一兩蒺藜子三合上八味㕮咀以水六升煮取三升漬布拓瘡上日數過治小兒禿頭瘡方取雄雞屎陳醬汁苦酒和以洗瘡了敷之又方芫花臘月豬油和如泥洗去痂敷之日一度千金翼治白禿治小兒頭禿瘡方葶藶子細末先洗敷之又方不中水蕪青葉燒灰和豬脂敷之治小兒頭禿瘡無發苦癢方野葛末豬脂羊脂各一兩上三味合煎令消待冷以敷之不過三上治少小頭不生髮一物楸葉方楸葉搗取汁敷頭上立生治小兒頭不生髮方燒鯽魚灰末以醬汁和敷之治小兒瘻瘡方冢中石灰厚敷之良又方燒桑根灰敷之並燒烏羊角作灰相和敷之治小兒瘻疽方丹砂大黃各三十銖雄黃漆頭䕡茹雌黃各二十四銖礬石莽草各十八銖川連三十六銖上八味㕮咀以豬脂一升三合微火煎三上三下膏成去滓下諸石末攪凝敷之治小兒惡瘡方熬豉令黃為末敷瘡上不過三敷愈治小兒疽極月初即生常有黃水出方以醋和油煎令如粥及熱敷之二日易欲重敷則以皂莢湯洗瘡仍敷之治小兒月蝕瘡隨月生死方以胡粉和酥敷之五日瘥治月蝕九竅皆有瘡者方燒蚯蚓屎末和豬膏敷之治小兒浸淫瘡方灶中黃土發灰上二味各等分為末以豬脂和敷之治小兒黃爛瘡方四交道中土灶下土上二味各等分為末敷之亦治夜啼又方燒艾灰敷之又方燒牛屎敷之亦可滅瘢治小兒疥方燒竹葉為灰雞子白和敷之日三亦治疥瘡又方燒亂髮灰和臘月豬脂敷之又方以臭酥和胡粉敷之治小兒頭面瘡疥方麻子五升為末以水和絞取汁與蜜和敷之若有白犬膽敷之大佳治小兒濕癬方枸杞根搗末和臘月豬脂敷之又方桃青皮搗末和醋敷之日二又方煎馬尿洗之又方燒狗屎灰和豬脂塗之又方揩破以牛鼻上津敷之治小兒身上生赤疵方取馬尿洗日四五度治小兒身上有赤黑疵方取狗熱屎敷之皮自卷落治小兒疣目方以針及小刀子決目四面令似血出取患瘡汁黃膿敷之莫近水三日即膿潰根動脫落小兒雜病第九方一百十一首灸法十三首治小兒臍中生瘡方桑汁敷乳上使兒飲之又方飲羖羊乳及血治小兒風臍遂作惡瘡歷年不瘥方取東壁土敷之大佳若汁不止燒蒼耳子粉之又方干蠐螬蟲末粉之不過三四度瘥治小兒臍不合方取車轄脂燒灰日一敷之又方燒蜂房灰為末敷之治小兒臍中生瘡方燒甑帶灰和膏敷之治小兒臍赤腫方杏仁半兩豬頰車髓十八銖上二味先研杏仁如脂和髓敷臍中腫上白石脂散治小兒臍汁不止兼赤腫方以白石脂細研熬令微暖以粉臍瘡日三四度治小兒鵝口不能飲乳方鵝屎汁瀝兒口中又方黍米汁塗之又方取小兒父母亂髮洗淨纏桃枝沾取井花水東向向日以發拭口中白乳以置水中七過瀝洗三朝作之治小兒心熱口為生瘡重舌鵝口方柘根銼五升無根弓材亦佳以水五升煮取二升去滓煎取五合細細敷之數次良治口瘡白漫漫方先以父淨髮拭口次取桑汁塗之治重舌舌強不能收唾方鹿角末如大豆許安舌下日三四度亦治小兒不能乳又方取蛇蛻燒末以雞毛沾醇醋點藥掠舌下愈治小兒重舌方取田中蜂房燒灰和酒塗喉下愈又方衣魚塗舌上又方灶月下黃土末苦酒和塗舌上赤小豆末醋和塗舌上又方黃柏以竹瀝漬取細細點舌上良治重舌方灸行間隨年壯穴在足大趾歧中又灸兩足外踝上三壯治小兒舌上瘡方蜂房燒灰屋間塵各等分和勻敷之又方桑白汁塗乳與兒飲之又方羊蹄骨中生髓和胡粉敷之治舌腫強滿方滿口含糖醋良又方飲羖羊乳即瘥治小兒口瘡不得吮乳方大青十八銖黃連十二銖上二味㕮咀以水三升煮取一升二合一服一合日再夜一又方蜜二斤甘草如指大三寸臘月豬脂一斤上三味合煎相得含如棗大稍稍咽之日三又方礬石如雞子大置醋中塗兒足下二七遍愈治小兒燕口兩吻生瘡方燒發灰和豬脂敷之治小兒口下黃肌瘡方取羖羊髭燒灰和臘月豬脂敷之角亦可用治口旁惡瘡方亂髮灰故絮灰黃連乾薑上四味等分為散以粉瘡上不過三遍治口噤赤者心噤白者肺噤方雞屎白棗大綿裹以水一合煮二沸分再服治小兒口噤方鹿角粉大豆末上二味等分和乳塗乳上飲兒又方驢乳豬乳各二升上二味合煎得一升五合服如杏仁許三四服瘥雀屎丸治小兒猝中風口噤不下一物方雀屎如麻子丸之飲下即愈雞屎白亦佳治小兒口中涎出方以白羊屎納口中又方以東行牛口中沫塗口中及頤上又方桑白汁塗之瘥治小兒卒毒腫著喉頸壯熱妨乳方升麻射干大黃各一兩上三味㕮咀以水一升五合煮取八合一歲兒分三服以滓敷腫上冷更暖以敷大兒以意加之升麻湯治小兒喉痛若毒氣盛便咽塞並治大人咽喉不利方升麻生薑射干各二兩橘皮一兩上四味㕮咀以水六升煮取二升去滓分三服治小兒喉痹腫方魚膽二七枚以和灶底土塗之瘥治小兒喉痹方桂心杏仁各半兩上二味為末以綿裹如棗大含咽汁治小兒解顱方熬蛇蛻皮為末和豬頰車中髓敷頂日三四度又方豬牙頰車髓敷囟上瘥半夏尉湯治小兒腦長解顱不合羸瘦色黃至四五歲不能行方半夏生薑川芎各一升細辛三兩桂心一尺烏頭十枚上六味㕮咀以醇苦酒五升漬之晬時煮三沸絞去滓以綿一片浸藥中適寒溫以尉囟上冷更溫之復尉如前朝暮各三四尉乃止二十日可愈治小兒解顱生蟹足敷方生蟹足白蘞各半兩上二味搗末以乳汁和敷顱上立愈治小兒解顱三物細辛敷方細辛桂心各半兩乾薑十八銖上三味為末以浮汁和敷顱上干復敷之兒面赤即愈治小兒囟開不合方防風一兩半柏子仁白芨各一兩上三味為末以乳和敷囟上日一十日知二十日即愈又方取豬牙車骨煎取髓敷囟上愈小兒囟陷方灸臍上下各半寸及鳩尾骨端又足太陰各一壯治小兒狐疝傷損生㿗方桂心十八銖白朮一兩十八銖地膚子二兩半上三味為末以蜜和丸白酒服如小豆七丸日三亦治大人又方芍藥茯苓各十八銖防葵一作防風大黃各半兩半夏桂心川椒各六銖上七味為末蜜和服如大豆一丸日五服可加至三丸五等丸治小兒陰偏大又卵核堅㿗方黃柏香豉牡丹防風桂心各二兩上五味為末蜜丸如大豆兒三歲飲服五丸加至十丸兒小以意酌量著乳頭上服之治小兒卵腫方取雞翅六莖燒灰服之隨卵左右取翮古今録驗云治陰大如斗治小兒氣㿗方土瓜根芍藥當歸各一兩上三味㕮咀以水二升煮取一升取五合日二又方三月上除日取白頭翁根搗碎隨偏處敷之一宿作瘡二十日愈治氣㿗方灸足厥陰大敦左灸右右灸左各一壯治小兒陰瘡方以人屎灰敷之又狗屎灰又狗骨灰又馬骨灰皆可敷之治小兒歧股間連陰囊生瘡汁出先癢後痛十日五日自瘥或一月或半月復發連年不瘥方灸瘡搔去痂帛拭令乾以蜜敷更溲麵作燒餅熟即以餳塗餅上尉之冷即止再度瘥治小兒陰腫方狐莖炙搗末酒服之又方灸大敦七壯又方斫桑木白汁塗之又方搗蕪菁敷上又方搗垣衣敷上又方以衣中白魚敷之又方豬屎五升水煮沸布裹安腫上治小兒陰瘡方取狼牙濃煮汁洗之又方黃連胡粉等分以香脂油和敷之治小兒核腫壯熱有實方青木香甘草石膏甘遂各十八銖麝香三銖大黃前胡各一兩黃芩半兩上八味㕮咀以水七升煮取一升九合每服三合日四夜二鱉頭丸治小兒積冷久下瘥後余脫肛不瘥腹中冷腫中疼痛不得入者方鱉頭二枚炙令焦磁石四兩桂心三兩小蝟皮一枚炙令焦上四味為末蜜丸如大豆兒二歲至五歲服五至十丸日三兒大以意加之小兒脫肛方灸頂上旋毛中三壯即入又灸尾翠骨三壯又灸臍中隨年壯治小兒疳濕瘡方鐵衣著下部中即愈又方灸第十五椎挾脊兩旁七壯未瘥加七壯治小兒疳瘡方以豬脂和胡粉敷之五六度又方嚼麻子敷之日六七度又方羊膽二枚和醬汁於下部灌之豬脂亦佳治濕瘡方濃煎地榆汁洗浴每日二度治小兒久痢膿濕䘌方艾葉五升以水一斗煮取一升半分為三服除熱結腸丸斷小兒熱下黃赤汁沫及魚腦雜血肛中瘡爛坐䘌生蟲方川連柏皮苦參鬼臼獨活橘皮芍藥阿膠各半兩上八味為末以藍汁及蜜丸如小豆日服五丸至十丸冬無藍汁可用藍子一合舂蜜和丸治小兒蛔蟲方削楝木上蒼皮以水煮取汁飲之量大小多少為此有小毒治小兒羸瘦有蛔蟲方雚蘆二兩以水一升米二合煮取米熟去滓與服又方萹蓄三兩水一升煮取四合分服之搗汁服亦佳又方桃白皮三兩東引吳茱萸根白皮四兩上二味㕮咀以酒一升二合漬之一宿漸與服取瘥又方取豬膏服之一云治蟯蟲又方搗槐子納下部中瘥一云治蟯蟲又方楝實一枚納孔中一云治蟯蟲治寸白蟲方東行石榴根一把水二升煮取三合分服又方桃葉搗絞取汁服之治小兒三蟲方雷丸川芎上二味各等分為末服一錢匕日三治大便竟出血方鱉頭一枚炙令黃黑為末以飲下五分匕多少量兒大小日三服治小兒尿血方燒鵲巢灰井花水服之亦治夜尿床又方灸第七椎兩旁各五寸隨年壯治小兒遺尿方瞿麥石葦龍膽皂莢桂心各半兩雞腸草人參各一兩車前子一兩六銖上八味為末蜜丸每食後服如小豆大五丸日三加至六七丸又方小豆葉搗汁服又方燒雞腸為末漿水服方寸匕日三又方灸臍下一寸半隨年壯又方灸大