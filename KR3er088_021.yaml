body:
  text: 卷二十一消渴淋閉方凡四類消渴第一論六首方五十三首灸法七首論曰凡積久飲酒未有不成消渴然則大寒凝海而酒不凍明其酒性酷熱物無以加脯炙鹽咸酒客耽嗜不離其口三觴之後制不由己飲啖無度咀嚼鮓醬不擇酸鹹積年長夜酣興不解遂使三焦猛熱五臟乾燥木石猶且焦枯在人何能不渴治之愈否屬在病者若能如方節慎旬月可瘳不自愛惜死不旋踵方書醫藥實多有效其如不慎者何其所慎有三一飲酒二房室三鹹食及面能慎此者雖不服藥而自可無他不知此者縱有金丹亦不可救深思慎之又曰消渴之人愈與未愈常須思慮有大癰何者消渴之人必於大骨節間發癰疽而卒所以戒之在大癰也當預備癰藥以防之有人病渴利始發於春經一夏服栝蔞豉汁得其力渴漸瘥然小便猶數甚晝夜二十餘行常至三四升極瘥不減二升也轉久便止漸食肥膩日就羸瘦喉咽唇口焦燥吸吸少氣不得多語心煩熱兩腳痠食乃兼倍於常而不為氣力者當知此病皆由虛熱所致治法可常服栝蔞汁以除熱牛乳杏酪善於補此法最有益治消渴除腸胃熱實方麥門冬茯苓黃連石膏葳蕤各八分人參龍膽黃芩各六分升麻四分枳實五分生薑屑枸杞子外臺用地骨皮栝蔞根各十分上十三味為末蜜丸如梧子大以茅根一升粟米三合煮汁服十丸日二若渴則與此飲至足大麻亦得又方栝蔞根生薑各五兩生麥冬汁蘆根切各二升茅根切三升上五味㕮咀以水一斗煮取三升分為三服茯神湯泄熱止渴治胃腑實熱引飲常渴方茯神二兩外臺作茯苓知母四兩葳蕤四兩栝蔞根生麥冬各五兩生地黃六兩小麥二升淡竹葉三升切大棗二十枚上九味㕮咀以水三斗煮小麥竹葉取九升去滓下藥煮取四升分四服不論早晚若渴即進非但只治胃渴通治渴患熱者豬肚丸治消渴方豬肚一具治如食法黃連粱米各五兩栝蔞根茯神各四兩知母三兩麥門冬二兩上七味為末納豬肚中縫塞安甑中蒸極爛乘熱入藥臼中搗可丸如硬加蜜和丸如梧子大飲服二十丸日三又方黃耆茯神栝蔞根甘草麥冬各三兩乾地黃五兩上六味㕮咀以水八升煮取二升半去滓分三服日進一劑服十劑佳浮萍丸治消渴方干浮萍栝蔞根等分上二味為末以人乳和丸如梧子大空腹飲服二十丸日三三年病者三日愈治虛熱大佳治消渴日飲水一石者方鉛丹二兩附子一兩葛根栝蔞根各三兩上四味為末蜜丸如梧子飲服十丸日三渴則服之春夏減附子黃連丸治渴方黃連生地黃各一斤張文仲云十斤上二味絞地黃汁漬黃連出曝燥復納汁中令汁盡曝燥干為末蜜丸如梧子服二十丸日三食前後無拘亦可為散以酒服方寸匕栝蔞粉枸杞湯治渴而利者方枸杞枝葉一斤黃連栝萎根甘草石膏各三兩上五味㕮咀以水一斗煮取三升分五服日三夜二劇者多合渴即飲之鉛丹散治消渴止小便數兼消中方鉛丹胡粉甘草澤瀉石膏栝蔞根赤石脂白石脂肘後作貝母上八味各五分治下篩水服方寸匕日三壯人服匕半一年病者一日愈二年病者二日愈渴甚者夜二服腹痛者減之丸服亦佳每服十丸傷多令人腹痛張文仲云腹中痛者以漿水下之備急方云不宜酒上宜麥汁下之古今録驗云服此藥了經三兩日宜爛煮羊肝肚空腹服之或作羹亦得宜湯淡食之候小便得咸更即宜蓯蓉丸兼煮散將息方見外臺第十一卷中茯神丸方集驗名除熱宣補丸治腎消渴小便數者茯神黃耆人參麥冬甘草黃連知母栝蔞根各三兩菟絲子三合蓯蓉乾地黃石膏各六兩上十二味為末牛膽汁三合和蜜為丸如梧子大以茅根煎湯服三十丸日二服漸加至五十丸酸棗丸治口乾燥內消方酸棗一升五合酸安石榴子五合覆盆子葛根各三兩栝蔞根茯苓各三兩半麥冬四兩石蜜四兩半桂心一兩六銖烏梅五十枚上十味為末蜜丸口含化不限晝夜以口中有津液為度服盡復取含無忌治消中日夜尿七八升者方用鹿角炙令焦為末以酒服五分匕日二漸加至方寸匕又方葵根如五升盆大兩束以水五斗煮取三斗宿不食平旦一服三升又方漚麻汁服一升佳論曰強中之病莖長興盛不交精液自出也消渴之後即作癰疽皆由石熱凡如此等宜服豬腎薺苨湯制腎中石熱也又宜服白鴨通湯方見後二十六卷解石毒篇中豬腎薺苨湯方豬腎一具大豆一升薺苨人參石膏各三兩茯神一作茯苓磁石綿裹知母葛根栝蔞根黃芩甘草各二兩上十二味㕮咀以水一斗五升先煮豬腎大豆取一斗去滓下藥煮取三升分三服渴即飲之下焦熱者夜輒合一劑病勢漸歇即止增損腎瀝湯治腎氣不足消渴小便多腰痛方羊腎一具遠志人參澤瀉桂心當歸茯苓龍骨乾地黃黃芩甘草川芎各二兩麥門冬一升五味子半升生薑六兩大棗二十枚上十六味以水一斗五升先煮羊腎取一斗二升次下諸藥取三升分三服治下焦虛熱上注脾胃從脾胃上注於肺好渴利方竹葉切三升甘草三兩栝蔞根生薑各五兩麥門冬茯苓各四兩大棗三十枚小麥地骨白皮各一升上九味㕮咀先以水三斗煮小麥取一斗去滓澄清取八升去上沫取七升煮藥取三升為三服治渴利虛熱引飲不止消熱止渴方竹葉切二升地骨皮切一升生地黃切一升生麥冬一升半栝蔞根石膏各八兩茯神一作茯苓葳蕤知母生薑各四兩大棗三十枚上十一味㕮咀以水一斗二升煮取四升分四服地黃丸治面黃手足黃咽中乾燥短氣脈如連珠除熱止渴利補養方生地黃汁生栝蔞根汁各二升生羊脂三升白蜜四升黃連一升為末上五味合煎令可丸如梧子大飲服五丸日二加至二十丸若苦冷而渴渴瘥宜別服溫藥治渴小便數方貝母六分一作知母茯苓栝蔞根各四分鉛丹一分雞肶胵中黃皮十四枚上五味治下篩飲服方寸匕日三瘥後常服佳長服不絶則去鉛丹以蜜丸之用麥飲下治渴利方用生栝蔞根三十斤切以水一石煮取一斗半去滓以牛脂五合煎取水盡以溫酒先食服如雞子大日三治渴小便利復非淋者方用榆白皮二斤切以水一斗煮取五升每服三合日三又方小豆藿一把搗汁頓服三升又方取薔薇根水煎服之佳肘後以治睡中遺尿又方三年重鵲巢燒末以飲服之肘後以治睡中遺尿又方桃膠如彈丸大含之咽津又方蠟如雞子大以醋一升煮二沸適寒溫頓服之論曰凡人生放恣者衆盛壯之時不自慎惜快情縱欲極意房中漸至年長腎氣虛竭百病滋生又年少懼不能房多服石散真氣既盡石氣孤立惟有虛耗唇口乾焦精液自泄或小便赤黃大便乾實或渴而且利日夜一石或渴而不利或不渴而利所食之物悉化小便皆由房室不節所致也凡平人夏月喜渴者由心旺也心旺便汗汗則腎中虛燥故渴而小便少也冬月不汗故小便多而數也此為平人之證也名為消渴但小便利而不飲水者腎實也經云腎實則消消者不渴而利是也所以服石之人小便利者石性歸腎得石則實實則能消水漿故利利多則不能潤養五臟臟衰則生諸病張仲景云熱結下焦則為溺血亦令人淋閉不通內有熱者則喜渴除熱則止渴兼虛者須除熱補虛則瘥矣治不渴而小便大利遂至於死者方用牡蠣五兩以患人尿三升煮取二升分再服神驗治小便不禁日便一二斗或如血色方麥冬乾地黃各八兩乾薑四兩續斷蒺藜子桂心各三兩甘草一兩上七味㕮咀以水一斗煮取二升五合分三服古今録驗亦治消腎腳瘦細小便數九房散治小便多或不禁方菟絲子蒲黃黃連各三兩肉蓯蓉二兩硝石一兩上五味治下篩並雞肶胵中黃皮三兩為散飲服方寸匕如人行十里久更服日三冀方有五味子三兩空腹服又方鹿茸二寸桂心一尺附子大者三枚澤瀉三兩躑躅韭子各一升上六味治下篩以漿水服五分匕日三加至一錢匕黃耆湯治消中虛勞少氣小便數方黃耆桂心芍藥當歸甘草生薑各二兩黃芩乾地黃麥冬各一兩大棗三十枚上十味㕮咀以水一斗煮取三升分三服日三棘刺丸治男子百病小便過多失精方棘刺石龍芮巴戟天各二兩厚朴麥門冬菟絲子萆薢外臺作草鞋柏子仁葳蕤小草乾地黃細辛杜仲牛膝蓯蓉石斛桂心防葵各一兩烏頭半兩上十九味為末蜜和更搗五六千杵丸如梧子大飲下十丸日三加至三十丸以知為度治尿數而多者方用羊肺一具作羹納少羊肉和鹽豉如食法任性食不過三具治消渴陰脈絶胃反而吐食者方茯苓八兩澤瀉四兩白朮桂心生薑各三兩甘草一兩上六味㕮咀以水一斗煮小麥三升取汁三升去滓下藥煮取二升半每服八合日二又方取屋上瓦三十年者碎如雀腦三升東流水二石煮取二斗納藥如下方白朮乾地黃生薑人參橘皮甘草黃耆遠志桂心當歸芍藥各二兩大棗三十枚上十二味㕮咀納瓦汁中煮取三升分四服或單飲瓦汁亦佳治熱病後虛熱渴四肢煩疼方葛根一斤人參甘草各一兩竹葉一把上四味㕮咀以水一斗五升煮取五升渴即飲之日三夜二骨填煎治虛勞渴無不效方茯苓菟絲子當歸山茱萸牛膝五味子附子巴戟天石膏麥冬各三兩石葦人參蓯蓉外臺作遠志桂心各四兩大豆卷一升天冬五兩上十六味為末次取生地黃栝蔞根各十斤搗絞取汁於微火上煎減半便作數分納藥並下白蜜三斤牛髓一斤微火煎令如糜食如雞子黃大日三亦可飲服之茯神煮散治虛熱四肢羸乏渴熱不止消渴補虛方茯神蓯蓉葳蕤各四兩生石斛黃連各八兩栝蔞根丹參各五兩甘草五味子知母當歸人參各三兩麥糵三升外臺作小麥上十三味為末以絹袋盛三方寸匕水三升煮取一升日二服一作一服枸杞湯治虛勞口中苦渴骨節煩熱或寒者方枸杞根白皮切五升麥門冬三升小麥二升上三味以水二斗煮麥熟藥成去滓每服一升日再巴郡太守奏三黃丸治男子五勞七傷消渴不生肌肉婦人帶下手足寒熱者方春三月黃芩四兩大黃三兩黃連四兩夏三月黃芩六兩大黃一兩黃連七兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩上三味隨時加減和搗以蜜為丸如大豆飲服五丸日三不知稍加至七丸取下而已一月病愈久服走逐奔馬常試有驗一本云夏三月不服治熱渴頭痛壯熱及婦人血氣上衝悶不堪者方茅根二升切三搗取汁令盡渴即飲之治嶺南山瘴風熱毒氣入腎中變寒熱腳弱虛滿而渴方黃連不限多少生栝蔞根搗汁生地黃汁羊乳汁上四味以三汁和黃連末為丸空腹飲服三十丸如梧子大漸加至四十丸日三重病五日瘥輕者三日瘥無羊乳牛乳人乳亦得若藥苦難服即煮小麥粥飲服之主虛熱張文仲云名黃連丸一名羊乳丸阿膠湯治虛熱小便利而多服石散人虛熱當風取冷患腳氣喜發動兼渴消腎脈細弱方阿膠二挺麻子一升附子一枚乾薑二兩遠志四兩上五味為末以水七升煮取二升半去滓納膠令煬分三服説云小便利多白日夜數十行至一石頻服五日良灸法論曰凡消渴病經百日以上不得灸刺灸刺則於瘡上漏膿水不歇遂至癰疽羸瘦而死亦忌有所誤傷但作針許大瘡所飲之水皆於瘡中變成膿水而出若水出不止必死慎之慎之初得患者可如方灸刺之治消渴咽喉干灸胃脘下輸三穴各百壯穴在背第八椎下橫三寸一云灸胸堂五十壯又灸足太陽五十壯治消渴口乾不可忍者灸小腸俞百壯橫三間寸灸之消渴口乾煩悶灸足厥陰百壯又灸陽池五十壯消渴咳逆灸手厥陰隨年壯消渴小便數灸兩手小指頭及兩足小趾頭並灸項椎又灸當脊梁中央解間一處與腰目上兩處凡三處又灸背上脾俞下四寸當挾脊梁兩處凡諸灸皆當隨年壯又灸腎俞二處又灸腰目在腎俞下三寸亦挾脊骨兩旁各一寸半左右以指按取關元一處又兩旁各二寸二處又陰市二處在膝上當伏兔上行三寸臨膝取之或三二列灸相去一寸名曰腎系者黃帝經云伏兔下一寸曲泉陰谷陰陵泉復溜此諸穴斷小便最佳不損陽氣又云止遺溺也太溪中封然谷太白大都趺陽行間大敦隱白湧泉凡此諸穴各一百壯腹背兩腳凡四十七處其腎俞腰目關元水道此可灸三十壯五日一報各得一百五十壯佳湧泉一處可灸十壯大敦隱白行間三處可灸三壯余悉七壯皆五日一報滿三灸可止也若發灸諸陰而不愈宜灸諸陽諸陽在腳表並灸肺俞募按流注孔穴壯數如灸陰家法小便數而少且難用力輒失精者令其人舒兩手合掌並兩大指令齊急逼之令兩爪甲相近以一炷灸兩爪甲本肉際肉際方後自然有角令炷當角中小侵入爪上此兩指共用一炷也亦灸腳大趾與手同法各三炷而已經三日又灸之淋閉第二論一首方四十九首證一首灸法十五首論曰熱結中焦則為堅下焦則為溺血令人淋閉不通此多是虛損人服大散下焦客熱所為亦有自然下焦熱者但自少可善候之凡氣淋之為病溺難澀常有餘瀝石淋之為病莖中痛溺不得卒出膏淋之為病尿似膏自出勞淋之為病勞倦即發痛引氣衝下熱淋之為病熱即發甚則尿血治之皆與氣淋同凡人候鼻頭色黃者小便難也地膚子湯治下焦結熱小便赤黃不利數起出少莖痛或血出溫病後餘熱及霍亂後當風取熱過度飲酒房勞及行步冒熱冷飲逐熱熱結下焦及散石熱動關格小腹堅胞脹如斗有此諸淋悉治之立驗方地膚子三兩知母黃芩豬苓瞿麥枳實一作松實升麻通草葵子海藻各二兩上十味為末以水一斗煮取三升分三服大小便皆閉者加大黃三兩女人房勞腎中有熱小便難不利小腹滿痛脈沉細者加豬腎一具崔氏云若加腎可用水一斗五升先煮腎取一斗汁納藥煎之小品方不用枳實治百種淋寒淋熱淋勞淋小便澀胞中滿腹急痛方通草石葦甘草王不留行各二兩冬葵子滑石瞿麥白朮芍藥各三兩上九味㕮咀以水一斗煮取三升分三服古今録驗有當歸二兩治下篩以麥粥清服方寸匕日三又方滑石石葦栝蔞根各二兩上三味治下篩大麥飲服方寸匕日三治諸種淋方葵根八兩茅根石首魚頭石各三兩甘草一兩通草二兩貝子五合大麻根五兩上七味為末以水一斗二升煮取五升分五服日三夜二亦主石淋又方榆皮車前子冬瓜子各一升鯉魚齒桃膠通草地脈各二兩瞿麥四兩上八味㕮咀以水一斗煮取三升分三服日三又方細白沙三升熬令極熱以酒三升淋取汁服一合治淋痛方滑石四兩貝子七枚燒碎茯苓白朮通草芍藥各二兩上六味為末酒服方寸匕日二服十日瘥又方葵子五合茯苓白朮當歸各二兩上四味㕮咀以水七升煮取二升分三服日三又方取豬脂酒服三合日三小兒服一合臘月者治小便不利莖中疼痛小腹急痛者方通草茯苓各三兩葶藶二兩上三味治下篩以水服方寸匕日三又方蒲黃滑石各等分上二味治下篩酒服方寸匕日三治小便不利膀胱脹水氣流腫方水上浮萍曝乾為末服方寸匕日三治小便不通方滑石三兩葵子二兩榆根白皮一兩上三味治下篩煮麻子汁一升半取一升以散二方寸匕和分三服即通又方水四升洗甑帶取汁煮葵子取二升半分二服又方胡燕屎豉各一合上二味搗丸如梧子大服三丸日三又方發去垢燒末葵子一升以飲服方寸匕日三又方石首魚頭石為末水服方寸匕日三又方鯉魚齒燒灰酒服方寸匕日三又方石槽塞灰土以井花水服之日三又方車前子一味為末服方寸匕日三服百日止治卒不得小便方吞雞子白取瘥葛氏云吞黃又方車前草一把桑白皮半兩上二味㕮咀以水三升煎取一升頓服之治婦人卒不得小便方郁李仁二十枚蒸末服之立下一本作杏仁二七枚又方紫菀為末以井花水服三指撮立通血出者四五度服之治黃疸後小便淋瀝方豬腎一具切茯苓一斤瞿麥六兩車前根切三升黃芩三兩椒目三合綿裹澤瀉地膚子各四兩上八味㕮咀以水二斗煮車前取一斗六升去滓下豬腎煮取一斗二升去腎下藥煮取三升分為三服治氣淋方水三升煮船底苔如鴨子大取二升頓服又方水三升煮豉一升一沸去滓納鹽一合頓服亦可單煮豉汁服之又方搗葵子末湯服方寸匕又方空腹單茹蜀葵一滿口又方熬鹽熱尉小腹冷復易亦治小便血肘後方治小便不通灸法臍中著鹽灸三壯葛氏治小便不通氣淋灸關元五十壯又灸挾玉泉相去一寸半三十壯石淋方車前子二升以絹袋盛水九升煮取三升隔宿不得食平旦空腹頓服之石即出備急方云治熱淋又方取浮石使滿一手許為末水三升醋一升煮取二升澄清服一升不過三服石出淳酒煮之亦治嗽又方桃膠棗許大夏以冷水三合冬以湯三合和服日三當下石子如豆卵以石盡止亦治小兒痛淋灸法石淋臍下三十六種病不得小便灸關元三十壯又灸氣門三十壯又灸水泉三十壯足大敦是也治膏淋方搗葎草汁三升醋二合和空腹頓服之當尿如小豆汁也又濃煮汁飲亦治淋瀝蘇澄用療尿血治五勞七傷八風十二痹勞結為血淋熱結為肉淋小便不通莖中痛及小腹痛不可忍者方滑石桂心冬葵子王不留行通草車前子各二分甘遂一分石葦四分上八味治下篩以麻子飲半升和服方寸匕日三尿沙石出一方加榆白皮三分灸法勞淋灸足太陰百壯穴在內踝上三寸三報之治熱淋方葵根切一升冬用子夏用苗大棗二七枚上二味以水三升煮取一升二合分二服熱者加黃芩一兩出難加滑石二兩血者加茜根三兩痛者加芍藥二兩又方白茅根切四斤以水一斗五升煮取五升服一升日三夜二又方常煮冬葵根作飲服之治血淋小便磣痛方雞蘇二兩通草滑石各五兩竹葉一把生地黃半斤小薊根一兩上六味㕮咀以水九升煎取三升去滓溫分三服石葦散治血淋方石葦當歸蒲黃芍藥等分上四味治下篩酒服方寸匕日三又方生大麻根十枚以水五升煮取二升頓服亦治小便出血又方大豆葉一把以水四升煮取二升頓服又方葵子一升以水三升煮汁取一升日三服亦治虛勞尿血灸法血淋灸丹田隨年壯又灸復溜五十壯一云隨年壯五淋不得小便灸懸泉十四壯穴在內踝前一寸斜行小脈上是中封之別名五淋灸大敦三十壯卒淋灸外踝尖七壯淋病九部諸疾灸足太陽五十壯淋病不得小便陰上痛灸足太衝五十壯腹中滿小便數起灸玉泉下一寸名尿胞一名屈骨端灸二七壯小兒以意減之治遺尿小便澀方牡蠣鹿茸各四兩桑耳三兩録驗無阿膠二兩上四味㕮咀以水七升煮取二升分二服日二又方防己葵子防風各二兩上三味㕮咀以水五升煮取二升半分三服作散服亦佳治小便失禁方以水三升煮雞腸取一升分三服又方取雞肶胵一具並腸燒末酒服男雌女雄治尿床方取羊肚系盛水令滿線縛兩頭熟煮即開取中水頓服立瘥又方取羊胞盛水滿中炭火燒之盡熟空腹服不過四五度瘥灸法遺尿失禁出不自知灸陰陵泉隨年壯遺溺灸遺道挾玉泉五寸又灸陽陵泉又灸足陽明各隨年壯小便失禁灸大敦七壯又灸行間七壯尿床垂兩手兩髀上盡指頭上有陷處灸七壯又灸臍下橫紋七壯溺血第三方十三首治房勞傷中尿血方牡蠣桂心黃芩車前子各等分上四味治下篩飲服方寸匕稍加至二匕日三服治小便血方生地黃八兩柏葉一把黃芩阿膠各二兩上四味㕮咀以水八升煮取三升去滓下膠分三服一方加甘草二兩又方菟絲子蒲黃白芷荊實乾地黃酸棗小品作敗醬川芎葵子當歸茯苓等分上十味為末蜜丸如梧子大飲服五丸日三服稍加至十丸又方戌鹽六分甘草蒲黃鹿角膠芍藥各二兩礬石三兩大棗十枚上七味㕮咀以水九升煮取二升分三服又方胡麻三升搗細末以東流水二升漬一宿平旦絞去滓煮一二沸頓服又方龍骨為細末溫水服方寸匕日五六服張文仲云酒服又方酒三升煮蜀當歸四兩取一升頓服又方搗荊葉取汁酒服二合又方煮車前根葉子多飲佳又方酒服亂髮灰蘇澄用水服又方酒服葵莖灰方寸匕日三又方豉二升酒四升煮取一升頓服又方刮滑石末水和敷繞小腹及陰際佳葛氏云治小便不通水腫第四論一首方四十九首證三首灸法二首論曰大凡水病難治瘥後特須慎於口味病水人多嗜食所以此病難愈也代有醫者隨逐時情意在財物不本性命病人欲食勸令食羊頭蹄肉如此未有一愈者又此病百脈之中氣水俱實治者皆欲令瀉之羊頭蹄極補哪得瘳愈所以治水藥多用葶藶等諸藥本草云葶藶久服令人大虛故水病非久虛不得絶其根本又有蠱脹但腹滿不腫水脹四肢面目俱腫醫者不善診候治蠱以水藥治水以蠱藥或但脹滿皆以水藥仲景所云愚醫殺之今録忌如下喪孝産乳音樂房室喧戲一切魚一切肉一切生冷醋滑蒜黏食米豆油膩其治蠱方具在雜方篇見第二十四卷蠱毒篇中上前所禁不得食不得用心其不禁者並具本方之下其房室等禁須三年慎之永不復發不爾者雖瘥復發不可更治也古方有十水丸歷驗多利大便而不利小便所以不録黃帝問岐伯曰水與膚脹鼓脹腸覃石瘕何以別之岐伯曰水之始起也目窠上微腫靈樞太素作微壅如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成也以手按其腹隨手而起如裹水之狀此其候也膚脹者寒氣客於皮膚之間殼殼然而堅太素外臺作不堅腹大身盡腫皮厚按其腹陷太素作窅而不起腹色不變此其候也鼓脹者腹脹身腫大大與膚脹等色蒼黃腹筋起此其候也腸覃者寒氣客於腸外與胃太素作衛氣相搏正氣不得營因有所繫瘕而內注惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成也如懷子之狀久者離歲月按之則堅推之則移月事時下此其候也石瘕者生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下之曰膚脹鼓脹可刺乎曰先瀉其腹之血絡後調其經刺去其血脈師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證浮腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿脈經作痛不喘黃汗其脈沉遲身體發熱胸滿四肢頭面腫久不愈必致癰膿心水者身重一作腫而少氣不得臥煩而躁其人陰腫肝水者腹大不能自轉側脅下腹中痛時時津液微生小便續通脾水者腹亦大四肢苦重津液不生但苦少氣小便難肺水者其身腫小便難時時鴨溏腎水者其人腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷其面反瘦師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈問曰病下利後渴飲水小便不利腹滿因腫者何也師曰此法當病水若小便自利及汗出者自當愈一作滿月當愈凡水病之初先兩目上腫起如老蠶色挾頸脈動股里冷脛中滿按之沒指腹內轉側有聲此其候也不即治之須臾身體稍腫腹中盡脹按之隨手而起水為已成猶可治也此病皆從虛損所致大病或下利後婦人産後飲水不消三焦決漏小便不利仍相結漸漸生聚遂流諸經故也水有十種不可治者有五第一唇黑傷肝第二缺盆平傷心第三臍出傷脾第四背平傷肺第五足下平滿傷腎此五傷必不可治凡水病忌腹上出水出水者一月死大忌之中軍候黑丸治膽玄水先從頭面至腳腫頭眩痛身虛熱名曰玄水體腫大小便澀宜此方方見第十八卷大腸腑門治小腸水小腹滿暴腫口苦幹燥方用巴豆三十枚和皮碎以水五升煮取三升綿納汁中拭腫上隨手可減日五六拭莫近目及陰集驗治身暴腫如吹治大腸水乍虛乍實上下來去方赤小豆五升桑白皮切二升鯉魚四斤白朮八兩上四味㕮咀以水三斗煮取魚爛勿用鹽去魚盡食並取汁四升許細細飲下又方羊肉一斤商陸切一升上二味以水二斗先煮商陸令爛去滓後納羊肉及蔥豉醋如臛法肘後云治卒腫滿身面洪大治膀胱石水四肢瘦腹腫方桑白皮榖白皮澤漆葉各三升大豆五升防己射干白朮各四兩上七味㕮咀以水一斗五升煮取六升去滓納好酒三升更煮取五升日二夜一余者次日更服集驗方無澤漆防己射干只四味又方桑白皮六兩射干黃芩茯苓白朮各四兩澤瀉三兩防己二升大豆三升澤漆一升上九味㕮咀以水五斗煮大豆取三斗去豆澄清取一斗下藥煮取三升空腹分三服治胃水四肢腫腹滿方豬腎一具茯苓四兩防己橘皮元參黃芩杏仁澤瀉一作澤漆桑白皮各一兩豬苓白朮各三兩大豆三升上十二味㕮咀以水一斗八升煮豬腎大豆澤瀉桑白皮取一斗共煮澄清去滓納余藥煮取三升分三服若咳加五味子三兩凡服三劑間五日服一劑常用有效有人患氣急積久不瘥遂成水腫如此者衆諸皮中浮水攻面目身體從腰以上腫以此發汗方麻黃四兩甘草二兩上二味㕮咀以水五升煮麻黃再沸去沫納甘草煮取三升分三服重覆取汗愈慎風冷等治面目手足有微腫常不能消者方以楮葉切二升水四升煮取三升去滓納米煮作粥食如常食勿絶冬則預取葉乾之準法作粥周年永瘥慎生冷一切食物治面腫小便澀心腹脹滿方茯苓杏仁各八分橘皮防己葶藶各五分蘇子三合上六味為末蜜丸如小豆服十丸以桑白皮湯送下日二服加至三十丸治大腹水腫氣息不通命在旦夕者方牛黃二分椒目三分昆布海藻牽牛子桂心各八分葶藶六分上七味為末另搗葶藶如膏蜜和丸如梧子飲服十丸日二稍加小便利為度大良貞觀九年漢陽王患水醫所不治余處此方日夜尿一二斗五六日即瘥有人患水腫腹大其堅如石四肢細小勞苦足脛腫小飲食便氣急此終身之疾服利下藥不瘥者宜服此藥微除風濕利小便消水穀歲久服之乃可得力瘥後可常服方鬼箭羽丹參白朮獨活各五兩秦艽豬苓各三兩知母海藻茯苓桂心各二兩上十味㕮咀以酒三斗浸五日服五合日三任性量力漸加之治水腫利小便酒客虛熱當風飲冷水腹腫陰脹滿方當歸四兩甘遂一兩芒硝芫花各二兩吳茱萸三兩上五味為末蜜丸如梧子大飲服三丸日三一方有大黃蕘花各二兩無茱萸加豬苓麝香各一兩大豆散治久水腹肚如鼓者方烏豆一斗熬令香勿令大熟去皮為細末篩下餳粥皆得服之初服一合稍加之若初服多後即嫌臭服盡更作取瘥止不得食肥膩渴則飲羹汁慎酒肉豬雞魚生冷醋滑房室得食漿粥牛羊兔鹿肉此病難治雖諸大藥丸散湯膏當時暫瘥過後復發惟此散瘥後不發終生服之終生不發矣其所禁食物常須少啖莫隨意食鹹物諸雜食等又方葶藶末蒼耳子灰各二十匕上二味水調和服之日二又方椒目沉水者取熬搗如膏酒服方寸匕又方水煮馬兜鈴服之治水氣腫鼓脹小便不利方莨菪子一升羖羊肺一具青羊亦佳上二味先洗羊肺湯微泄之薄切曝乾作末以三年大醋漬莨菪子一晬時出熬令變色熟搗如泥和肺末蜜合搗三千杵為丸如梧子大食後一食久以麥門冬飲服四丸日三以喉中干口黏浪語為候數日小便大利佳山連治韋司業得瘥司業侄雲表所送云數用神驗麥門冬飲方麥門冬二十五枚米二十五粒上二味以水一升和煮米熟去滓下前丸藥逐日作服用之徐王煮散治水腫利小便方牛角䚡防己羌活人參丹參牛膝升麻防風秦艽生薑屑穀皮紫菀杏仁附子石斛各三兩桑白皮六兩橘皮白朮澤瀉茯苓郁李仁豬苓黃連各一兩上二十三味治下篩為粗散以水一升半煮三寸匕取一升頓服日再不能者但一服兩三月以前可服主利多而小便澀者用之大驗褚澄漢防己煮散治水腫上氣方漢防己澤漆葉石葦澤瀉各三兩桑白皮白朮丹參赤茯苓橘皮通草各三兩生薑十兩郁李仁五合上十二味治下篩為粗散以水一升半煮三方寸匕取八合去滓頓服日三取小便利為度茯苓丸治水腫甄權為安康公處此方茯苓白朮椒目各四分木防己葶藶澤瀉各五分甘遂十二分赤小豆前胡芫花桂心各二分芒硝七分另研上十二味為末蜜丸如梧子蜜湯下五丸日一稍加以知為度治水腫利大小便方大黃白朮一作葶藶木防己各等分上三味為末蜜丸如梧子大飲下十丸大小便利為度不知加之又方牽牛子為末水服方寸匕日一以兩便利為度又方葶藶生用四兩桂心一兩上二味為末蜜丸如梧子大飲下七丸日二以知為度又方郁李仁末面各一升上二味和作餅子七枚燒熟空腹熱食四枚不知加一枚以至七枚又方水銀三兩煮三日三夜葶藶子椒目各一升芒硝三兩衣魚二十枚水萍瓜蒂滑石各一兩上八味搗葶藶令細下水銀更搗令不見水銀止別搗椒目令細搗瓜蒂水萍下篩合和余藥以蜜和更搗三萬杵成丸初服一丸如梧子大次服二丸次服三丸次服四丸次服五丸次服六丸至七日還從一丸起次服二丸如是每至六丸還從一丸起始服藥當咽喉上有癧子腫起頰車腫滿齒齦皆腫唾碎血出勿怪也不三五日即消所苦皆瘥已上服藥若下多停藥以止利藥至五下止病未瘥更服病瘥止此治諸體肉肥厚按之不陷甚者臂粗著衣袖不受及十種大水醫不治者悉主之神驗深師集驗陶氏古今録驗無衣魚水萍瓜蒂滑石澤漆湯治水氣通身浮腫四肢無力或從消渴或從黃疸支飲內虛不足營衛不通氣不消化實皮膚中喘息不安腹中響脹滿眼目不得視方澤漆根十兩鯉魚五斤生薑八兩赤小豆二兩茯苓三兩人參甘草麥冬各二兩上八味㕮咀以水一斗七升先煮魚及豆減七升去魚豆納藥煮取四升半一服三合日三人弱日二氣下喘止可至四合晬時小便利腫減或大便溏下小便若不利還增一合以大利便止若無鯉魚鮦魚亦可用若水甚不得臥臥不得轉側再加澤漆一斤渴加栝蔞根二兩咳嗽加紫菀二兩細辛一兩款冬花一兩桂心三兩增魚汁二升胡洽無小豆麥冬有澤瀉五兩杏仁一兩録驗無小豆治水在五臟令人咳逆氣喘腹大而響兩足腫目下有臥蠶狀微渴不得安臥氣奔短氣有頃乃復小便難少而數肺病胸滿隱痛宜利小便水氣迫腫翕翕寒熱豬苓散治虛滿通身腫利三焦通水道方豬苓葶藶人參元參五味子防風澤瀉桂心狼毒椒目白朮乾薑大戟甘草各二兩蓯蓉二兩半女曲三合赤小豆二合上十七味治下篩酒服方寸匕日三夜一老小一匕以小便利為度麻豆煎治水氣通身浮腫百藥不瘥待死者方大麻子皆取新肥者佳赤小豆不得一粒雜各一石上二味皆以新精者淨揀擇水淘洗曝乾蒸麻子使熟更曝令乾貯淨器中欲服取五升麻子熬令黃香以緩火勿令焦作極細末以水五升搦取汁令盡貯淨密器明旦欲服今夜以小豆一升淘浸至旦干漉去水以新水煮豆未及好熟即漉出令乾納麻子汁中煮令大爛熟空腹恣服日三服當小心悶少時即止五日後小便數或赤而唾黏口乾不足怪之服訖常須微行未得即臥十日後針灸三里絶骨下氣不爾氣不泄盡服藥後五日氣逆不可下者取大鯉魚一頭先死者去鱗尾等以湯脫去滑淨洗開肚去臟以上件麻汁和小豆完煮令熟作羹入蔥豉橘皮生薑紫蘇調和食之始終一切斷鹽渴即飲麻汁秋冬暖飲春夏冷飲常食不得至飽只得免飢而已慎房室嗔怒大語高聲酒面油醋生冷菜茹一切魚肉鹽醬五辛並治一切氣病服者皆瘥凡作一月日服之麻子熟時多收新甕貯擬施人也又方吳茱萸蓽茇昆布杏仁葶藶各等分上五味為末蜜丸如梧子服五丸勿令飽食食訖飽悶氣急服之即散苦瓠丸治大水頭面遍身腫脹方苦瓠白穰實捻如大豆以麵裹煮一沸空腹吞七枚至午當出水一升三四日水自出不止大瘦乃瘥三年內慎口味苦瓠須好無厭翳細理研淨者不爾有毒不堪用崔氏用子作餛飩服二七枚虛者牛乳服之如此隔日作服漸加至三七枚以小便利為度小便若太多即一二日停止又方苦瓠膜二分葶藶子五分上二味合搗為丸如小豆大服五丸日三又方大棗肉七枚苦瓠膜如棗核大上搗為末丸一服三丸如人行十五里久又服二丸水出更服一丸即止又方葶藶桃仁各等分上二味皆熬合搗為丸服之利小便一方用杏仁又方搗生葶藶子醋和服以小便數為度又方燒薑石令赤納黑牛尿中令熱服一升日二又方單服牛尿大良凡病水服無不瘥服法先從少起得下為度又方煎人尿令可丸服如小豆大日三治水通身腫方煎豬椒枝葉如餳空腹服一匕日三癢以汁洗之又方灸法灸足第二趾上一寸隨年壯又灸兩手大指縫頭七壯麻黃煎治風水通身腫欲裂利小便方麻黃茯苓澤瀉各四兩防風澤漆白朮各五兩杏仁大戟各一升黃耆豬苓各三兩獨活八兩大豆二升水七升煮取一升清酒一升上十三味㕮咀以豆汁酒及水一斗合煮取六升分六七服一日一夜令盡當小便極利為度大豆散治風水通身大腫眼合不得開短氣欲絶方大豆一升杏仁一升麻黃木防己防風豬苓各四兩澤瀉黃耆烏頭各三兩半夏六兩生薑七兩茯苓白朮各五兩甘遂甘草各二兩清酒一升上十六味㕮咀以水一斗四升煮豆取一斗去豆納藥及酒合煎取七升分七服日四夜三得小便快利為度腫消停藥不必盡劑若不利小便者加生大戟一升葶藶二兩無不快利萬不失一深師方無豬苓澤瀉烏頭半夏甘遂治風水腫方大豆三升桑白皮五升以水二升煮取一升去滓納後藥茯苓白朮防風橘皮半夏生薑各五兩鱉甲當歸防己麻黃豬苓各三兩大戟一兩葵子一升上十三味㕮咀納前汁中煮取五升每服八合日三相去如人行十里久再服麻子湯治遍身流腫方麻子五升赤小豆三升當陸一升即商陸防風三兩附子一兩上五味㕮咀先搗麻子令熟以水三斗煮麻子取一斗三升去滓納藥及豆煮取四升去滓食豆飲汁大豆煎治男子女人新久腫得暴惡風入腹婦人新産上圊風入臟腹中如馬鞭者噓吸短氣咳嗽方大豆一斗淨擇以水五斗煮取一斗五升澄清納釜中以一斗半美酒納中更煎取九升宿勿食平旦服三升溫覆取汗兩食頃當下去風氣腫退慎風冷十日平復除日合服佳若急不可待遂急合服腫不盡退加之腫瘥更服三升若十分瘥勿服病中亦可任性飲之使酒氣相接肘後云腫瘥後渴慎勿多飲又方楮皮枝葉一大束切煮取汁隨多少釀酒但飲醉為佳不過三四日腫少退瘥後可常服之一方用豬椒皮枝葉又方鯉魚長一尺五寸以尿淹漬一宿平旦以木篦從口中貫至尾微火炙令微熟去皮宿勿食空腹頓服之不能者分再服勿與鹽摩膏治表凡腫病須百方內外攻之不可一概方生商陸一斤豬膏一斤煎可得二升上二味和煎令黃去滓以摩腫亦可服少許並塗以紙覆上燥輒敷之不過三日瘥麝香散治婦人短氣虛羸遍身浮腫皮膚急人所稀見方麝香三銖雄黃六銖芫花甘遂各二分上四味為末酒服五匕老少以意增減亦可為丸如小豆大強者服七丸小品無雄黃深師以蜜丸如大豆服二丸日三治三焦決滿水在胸外名曰水病腹獨大在腹表用大麝香丸華他方肘後有人參二分為九服治虛勞浮腫方灸太衝百壯又灸腎俞
