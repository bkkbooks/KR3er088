body:
  text: 卷三婦人方中凡八類虛損第十論一首五條方二十首論曰婦人非只臨産須憂至於産後大須將慎危篤之至其在於斯勿以産時無他乃縱心恣意無所不犯犯時微若秋毫感病廣於嵩岱何則産後之病難治於余病也婦人産訖五臟虛羸惟得將補不可轉瀉若其有病不須駃藥若行駃藥轉更增虛就中更虛向生路遠所以婦人産後百日以來極須殷勤憂畏勿縱心犯觸及即便行房若有所犯必身反強直猶如角弓反張名曰蓐風則是其犯候也若似角弓命同轉燭凡百女人宜好思之苟或有微不慎戲笑作病一朝困臥控告無所縱多出財寶遍處求醫醫者未必解此縱得醫來大命已去何處追尋學者於此一方大須精熟不可同於常方耳特忌上廁便利宜室中盆上佳凡産後滿百日乃可合會不爾至死虛羸百病滋長慎之凡婦人皆患風氣臍下虛冷莫不由此早行房故也凡産後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯痛甚切者不在此例後兩三日消息可服澤蘭丸比至滿月丸盡為佳不爾虛損不可平復也全極消瘦不可救者服五石澤蘭丸凡在蓐須服澤蘭丸補之服法必七日外不得早服也凡婦人因暑月産乳取涼太多得風冷腹中積聚百病競起迄至於老百方治不能瘥桃仁煎主之出蓐後服之婦人縱令無病每至秋冬須服一兩劑以至年內常將服之佳四順理中丸産訖可服此方甘草人參白朮乾薑各一兩上四味為末蜜和丸如梧子大服十丸稍增至二十丸新生臟虛所以養臟氣也桃仁煎治婦人産後百疾諸氣補益悅澤方桃仁一千二百枚搗令細熟以上好酒一斗五升研濾三四遍如作麥粥法以極細為佳納長頸瓷瓶中密塞以面封之納湯中煮一伏時不停火亦勿令火猛使瓶口常出在湯上無令沉沒熟訖出溫酒服一合日再服雖丈夫亦可服也石斛地黃煎治婦人虛羸短氣胸逆滿悶風氣方石斛甘草紫菀各四兩桃仁半升桂心二兩大黃八兩麥門冬二升茯苓一斤生地黃汁醇酒各八升上十味為末於銅器中炭火上熬納鹿角膠一斤耗得一斗次納飴三斤白蜜三升和調更於銅器中釜上煎微耗以生竹攪無令著耗令相得藥成先食酒服如彈子一丸日三不知稍加至二丸一方用人參三兩地黃羊脂煎治婦人産後欲令肥白飲食平調方生地黃汁一斗生薑汁白蜜各五升羊脂二斤上四味先煎地黃令得五升次納羊脂合煎減半納薑汁復煎令減合蜜著銅器中煎如飴取雞子大一枚投熱酒中服日三地黃酒治産後百病未産前一月當預釀之産訖蓐中服之方地黃汁一升好曲一斗好米二升上三味先以地黃汁漬曲令發準家法醞之至熟封七日取清服之常使酒氣相接勿令斷絶慎蒜生冷酢滑豬雞魚一切婦人皆須忌之但夏三月熱不可合春秋冬並得合服地黃並滓納米中炊合用之一石十石一準此一升為率先服羊肉當歸湯三劑乃服之佳羊肉湯治産後虛羸喘乏自汗出腹中絞痛方肥羊肉去脂三斤當歸一兩姚氏用蔥白桂心二兩甘草二兩芎藭三兩子母祕録作豉一升芍藥子母祕録作蔥白生薑各四兩乾地黃五兩上八味㕮咀以水一斗半先煮肉取七升去肉納余藥煮取三升去滓分三服不瘥重作翼方有蔥白一斤子母祕録有胸中微熱加黃芩麥門冬各一兩頭痛加石膏一兩中風加防風一兩大便不利加大黃一兩小便難加葵子一兩上氣咳逆加五味子一兩豬腎湯治産後虛羸喘乏乍寒乍熱如瘧狀名蓐勞方豬腎去脂剖一具香豉綿裹白粳米蔥白各一斗上四味以水三斗煮取五升去滓任情服之不瘥更作廣濟方有人參當歸各二兩為六味羊肉黃耆湯治産後虛乏補益方羊肉三斤黃耆三兩大棗三十枚茯苓甘草當歸桂心麥門冬乾地黃芍藥各一兩上十味㕮咀以水二斗煮羊肉取一斗去肉納諸藥煎取三升去滓分三服日三鹿肉湯治産後虛羸勞損補乏方鹿肉四斤乾地黃甘草芎藭各三兩黃耆芍藥麥門冬茯苓各二兩人參當歸生薑各二兩半夏一升大棗二十枚上十三味㕮咀以水二斗五升煮肉取一斗三升去肉納藥煎取五升去滓分四服日三夜一獐骨湯治産後虛乏五勞七傷虛損不足臟腑冷熱不調方獐骨一具遠志黃耆芍藥乾薑防風茯苓厚朴各三兩當歸橘皮甘草獨活芎藭各二兩桂心生薑各四兩上十五味㕮咀以水三斗煮獐骨取二斗去骨納藥煎取五升去滓分五服當歸芍藥湯治産後虛損逆害飲食方當歸一兩半芍藥人參桂心生薑乾地黃甘草各一兩大棗二十枚上八味㕮咀以水七升煮取三升去滓分三服日三杏仁湯治産後氣虛方杏仁橘皮白前人參各三兩蘇葉半夏各一升桂心四兩生薑十兩麥門冬一兩上九味㕮咀以水一斗二升煮取三升半去滓分五服治婦人産後上氣奔豚積勞臟氣不足胸中煩躁關元以下如懷五千錢狀方厚朴桂心當歸細辛芍藥石膏桔梗各三兩甘草黃芩澤瀉各二兩吳茱萸五兩千金翼作大黃乾地黃四兩乾薑一兩上十三味㕮咀以水一斗二升煮取三升去滓分三服服三劑佳乳蜜湯治産後七傷虛損少氣不足並主腎勞寒冷補氣方牛乳七升無則用羊乳白蜜一升半當歸人參獨活各三兩大棗二十枚甘草桂心各二兩上八味㕮咀諸藥以乳蜜中煮取三升去滓分四服五石湯治産後虛冷七傷時寒熱體痛乏力補腎治百病方紫石英鍾乳白石英赤石脂石膏茯苓白朮桂心芎藭甘草各二兩薤白六兩人參當歸各三兩生薑八兩大棗二十枚上十五味五石併為末諸藥各㕮咀以水一斗二升煮取三升六合去滓分六服若中風加葛根獨活各二兩下痢加龍骨一兩三石湯主病如前方紫石英生薑當歸人參甘草各二兩白石英鍾乳各二兩半茯苓乾地黃桂心各三兩半夏五兩大棗十五枚上十二味三石為末㕮咀諸藥以水一斗二升煮取三升去滓分四服若中風加葛根四兩內補黃耆湯治婦人七傷身體疼痛小腹急滿面目黃黑不能飲食並諸虛乏不足少氣心悸不安方黃耆當歸芍藥乾地黃半夏各三兩茯苓人參桂心遠志麥門冬甘草五味子白朮澤瀉各二兩乾薑四兩大棗三十枚上十六味㕮咀以水一斗半煮取三升去滓一服五合日三夜一服吳茱萸湯治産後虛羸盜汗澀惡寒方吳茱萸三兩以清酒三升漬一宿煮如蟻鼻沸減得二升許半分之頓服一升日再間日再作服亦治産後腹中疾痛豬膏煎治産後體虛寒熱自汗出方豬膏生薑汁白蜜各一升清酒五合上四味煎令調和五上五下膏成隨意以酒服方寸匕當炭火上熬鯉魚湯治婦人體虛流汗不止或時盜汗方鯉魚二斤豉蔥白切各一升乾薑桂心各二兩上五味㕮咀四物以水一斗煮魚取六升去魚納諸藥微火煮取二升去滓分二服取微汗即愈勿用生魚桂枝加附子湯治産後風虛汗出不止小便難四肢微急難以屈伸者方桂枝芍藥生薑各三兩甘草一兩半附子二枚大棗十二枚上六味㕮咀以水七升煎取三升分三服虛煩第十一方十一首薤白湯治産後胸中煩熱逆氣方薤白半夏甘草人參知母各二兩石膏四兩栝蔞根三兩麥門冬半升上八味㕮咀以水一斗三升煮取四升去滓分五服日三夜二熱甚即加石膏知母各一兩竹根湯治産後虛煩方甘竹根細切一斗五升以水二斗煮取七升去滓納小麥二升大棗二十枚復煮麥熟三四沸納甘草一兩麥門冬一升湯成去滓服五合不瘥更服取瘥短氣亦服之人參當歸湯治産後煩悶不安方人參當歸麥門冬乾地黃桂心各一兩大棗二十枚粳米一升芍藥四兩淡竹葉三升上九味㕮咀以水一斗二升先煮竹葉及米取八升去滓納藥煮取三升去滓分三服若煩悶不安者當取豉一升以水三升煮取一升盡服之甚良甘竹茹湯治産後內虛煩熱短氣方甘竹茹一升人參茯苓甘草各一兩黃芩三兩上五味㕮咀以水六升煮取二升去滓分三服日三知母湯治産後乍寒乍熱通身溫壯胸心煩悶方知母三兩芍藥黃芩各二兩桂心甘草各一兩上五味㕮咀以水五升煮取二升半分三服一方不用桂心加生地竹葉湯治産後心中煩悶不解方生淡竹葉麥門冬各一升甘草二兩生薑茯苓各三兩大棗十四枚小麥五合上七味㕮咀以水一斗先煮竹葉小麥取八升納諸藥煮取三升去滓分三服若心中虛悸者加人參二兩其人食少無穀氣者加粳米五合氣逆者加半夏二兩淡竹茹湯治産後虛煩頭痛短氣欲絶心中悶亂不解方生淡竹茹一升麥門冬小麥各五合甘草一兩生薑三兩産寶用乾葛大棗十四枚産寶用石膏三兩上六味㕮咀以水一斗煮竹茹小麥取八升去滓納諸藥煮取一升去滓分二服羸人分作三服若有人參入一兩若無人參納茯苓一兩半亦佳人參茯苓皆治心煩悶及心虛驚悸安定精神有則為良無自依方服一劑不瘥更作若氣逆者加半夏二兩赤小豆散治産後虛煩不能食虛滿方赤小豆三七枚燒作末以冷水和頓服之良蒲黃散治産後煩悶方蒲黃以東流水和方寸匕服極良蜀漆湯治産後虛熱往來心胸煩滿骨節疼痛及頭痛壯熱晡時輒甚又如微瘧方蜀漆葉桂心甘草黃芩各一兩黃耆五兩知母芍藥各二兩生地黃一斤上八味㕮咀以水一斗煮取三升分三服治寒熱不傷人芍藥湯治産後虛熱頭痛方白芍藥乾地黃牡蠣各五兩潠桂心三兩上四味㕮咀以水一斗煮取二升半去滓分三服日三此湯不傷損人無毒亦治腹中拘急痛若通身發熱加黃芩二兩中風第十二論一首方三十首論曰凡産後角弓反張及諸風病不得用毒藥惟宜單行一兩味亦不得大發汗特忌轉吐瀉利必死無疑大豆紫湯産後大善大豆紫湯治産後百病及中風痱痙或背強口噤或但煩熱苦渴或頭身皆重或身癢劇者嘔逆直視此皆因虛風冷濕及勞傷所為方大豆五升清酒一斗上二味以鐵鐺猛火熬豆令極熱焦煙出以酒沃之去滓服一升日夜數服服盡更合小汗則愈一以去風二則消血結如妊娠傷折胎死在腹中三日服此酒即瘥獨活紫湯治産後百日中風痙口噤不開並治血氣痛勞傷補腎方獨活一斤大豆五升酒一斗三升上三味先以酒漬獨活再宿若急須微火煮之令減三升去滓別熬大豆極焦使煙出以獨活酒沃之去豆服一升日三夜二小獨活湯治如前狀方獨活八兩葛根生薑各六兩甘草二兩上四味㕮咀以水九升煮取三升去滓分四服微汗佳甘草湯治在蓐中風背強不得轉動名曰風痙方甘草乾地黃麥門冬麻黃各二兩栝蔞根芎藭黃芩各三兩杏仁五十枚葛根半斤上九味㕮咀以水一斗五升酒五升合煮葛根取八升去滓納諸藥煮取三升去滓分再服一劑不瘥更合良千金翼崔氏有前胡三兩獨活湯治産後中風口噤不能言方獨活生薑各五兩防風秦艽桂心白朮甘草當歸附子各二兩葛根三兩防己一兩上十一味㕮咀以水一斗二升煮取三升去滓分三服雞糞酒治産後中風及百病並男子中一切風神效方雞糞一升熬令黃烏豆一升熬令聲絶勿焦上二味以清酒三升半先淋雞糞次淋豆取汁一服一升溫服取汗病重者凡四五日服之無不愈竹葉湯治産後中風發熱面正赤喘氣頭痛方淡竹葉一握葛根三兩防風二兩桔梗甘草人參桂心各一兩大附子一枚生薑五兩大棗十五枚上十味㕮咀以水一斗煮取二升半去滓分三服日三溫覆使汗出若頸項強者用大附子若嘔者加半夏四兩防風湯治産後中風背急短氣方千金翼作裡急短氣防風獨活葛根各五兩當歸芍藥人參甘草乾薑各二兩上八味㕮咀以水九升煮取三升去滓分三服日三鹿肉湯治産後風虛頭痛壯熱言語邪僻方鹿肉三斤芍藥獨活秦艽黃芩黃耆各三兩半夏一升乾地