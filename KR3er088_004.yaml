三服後漸加之治婦人患癖按時如有三五個而作水聲殊不得寢食常心悶方牽牛子三升治下篩飲服方寸匕日一服三十服後可服好硫黃一兩治婦人忽與鬼交通方松脂二兩雄黃一兩末上二味先煬松脂乃納雄黃末以虎爪攪令相得藥成取如雞子中黃夜臥以著熏籠中燒令病人取自升其上以被自覆惟出頭勿令過熱及令氣得泄也厚朴湯治婦人下焦勞冷膀胱腎氣損弱白汁與小便俱出方厚朴如手大長四寸以酒五升煮兩沸去滓取桂一尺為末納汁中調和一宿勿食旦頓服之溫經湯治婦人小腹痛方茯苓六兩土瓜根芍藥各三兩薏苡仁半升上四味㕮咀以酒三升漬一宿旦加水七升煎取二升分再服半夏厚朴湯治婦人胸滿心下堅咽中帖帖如有炙肉臠吐之不出咽之不下方半夏一升厚朴三兩茯苓四兩生薑五兩蘇葉二兩上五味㕮咀以水七升煮取四升分四服日三夜一不瘥頻服一方無蘇葉生薑治婦人氣方平旦服烏牛尿日一止昆布丸治婦人胸中伏氣方昆布海藻芍藥桂心白石英款冬花桑白皮人參各二兩柏子仁茯苓鍾乳各二兩半紫菀甘草各一兩乾薑一兩六銖吳茱萸五味子細辛各一兩半杏仁一百枚橘皮蘇子各五合上二十味為末蜜丸如梧子酒服二十丸日再加至四十丸治婦人無故憂恚胸中迫塞氣不下方芍藥滑石黃連石膏山茱萸前胡各一兩六銖大黃細辛麥門冬生薑各一兩半夏十八銖桂心半兩上十二味為末蜜丸如梧子酒服二十丸加至三十丸日三服治婦人斷産方蠶子故紙方一尺燒為末酒服之終身不産治勞損産後無子陰中冷溢出子門閉積年不瘥身體寒冷方防風一兩半桔梗三十銖人參一兩菖蒲半夏丹參厚朴乾薑紫菀杜蘅各十八銖秦艽白蘞牛膝沙參各半兩上十四味為末白蜜和丸如小豆食後服十五丸日三服不知加至二十丸有娠止夫不在勿服之服藥後七日方合陰陽五加酒治産後癖瘦玉門冷方五加皮二升蛇床子一升杜仲一斤乳床半斤即孔公孽乾地黃二兩枸杞子二升丹參二兩乾薑三兩天門冬四兩上九味㕮咀以絹袋子盛酒三斗漬三宿一服五合日再稍加至十合佳治子門閉血聚腹中生肉癥臟寒所致方乾漆半斤生地黃汁三升生牛膝汁一斤上三味先搗漆為散納汁中攪微火煎為丸如梧子酒服三丸日再覺腹中痛食後服之治産後勞玉門開而不閉方硫黃四兩吳茱萸一兩半菟絲子一兩六銖蛇床子一兩上四味為散以水一升煎二方寸匕洗玉門日再洗治産後陰道開而不閉方石灰一斗熬令燒草以水二斗投之適寒溫入汁中坐漬之須臾復易坐如常法甚效黃芩散治婦人陰脫方黃芩蝟皮當歸各半兩芍藥一兩牡蠣竹皮各二兩半狐莖一具千金翼用松皮上七味治下篩飲服方寸匕日三禁舉重房勞冷食硫黃散治同前硫黃烏賊骨各半兩五味子三銖上三味治下篩以粉其上良日再三粉之當歸散治同前當歸黃芩各二兩蝟皮半兩牡蠣二兩半芍藥一兩六銖上五味治下篩酒服方寸匕日三服禁舉重良治産後陰下脫方蛇床子一升布裹炙尉之亦治産後陰中痛又方燒人屎為末酒服方寸匕日三又方燒弊帚頭為灰酒服方寸匕又方鱉頭五枚燒末以井花水服方寸匕日三又方皂莢半兩半夏大黃細辛各十八銖蛇床子三十銖上五味治下篩用薄絹囊盛大如指納陰中日二易即瘥又方吳茱萸蜀椒各一升戎鹽如雞子大上三味皆熬令變色為末以綿裹如半雞子大納陰中日一易二十日瘥治陰下挺出方蜀椒廣濟方不用烏頭白芨各半兩上三味為末以方寸匕綿裹納陰中入三寸腹中熱易之日一度明旦乃復著七日愈治婦人陰脫若脫肛方羊脂煎訖適冷暖以塗上以鐵精敷脂上多少令調以火炙布令暖尉肛上漸推納之然後末磁石酒服方寸匕日三當歸洗湯治産後臟中風冷陰腫痛方當歸獨活白芷地榆各三兩敗醬千金翼不用礬石各二兩上六味㕮咀以水一斗半煮取五升適冷暖稍稍洗陰日三又方熟搗桃仁敷之良日三度陰瘡膏治男女陰瘡膏方米粉一酒杯芍藥黃芩牡蠣附子白芷各十八銖上六味㕮咀以不中水豬膏一斤微火上煎三上三下候白芷黃膏成絞去滓納粉和令相得敷瘡上並治口瘡治陰中痛生瘡方羊脂一斤杏仁一斤當歸白芷川芎各一兩上五味為末以羊脂和諸藥納鉢中置甑內蒸之三升米頃藥成取如大豆許綿裹納陰中日一治男女陰中瘡濕癢方黃連梔子甘草黃柏各一兩蛇床子二兩上五味治下篩為細末以粉瘡上無汁以豬脂和塗之深者用綿裹納瘡中日二治陰瘡方蕪荑芎藭黃芩甘草礬石雄黃附子白芷黃連各六銖上九味㕮咀以豬膏四兩合煎敷之治陰中癢如蟲行狀方礬石十八銖川芎一兩丹砂少許上三味治下篩以綿裹藥著陰中蟲自死治陰中癢入骨困方大黃黃芩黃耆各一兩芍藥半兩元參丹參各十八銖吳茱萸三十銖上七味治下篩酒服方寸匕日三又方狼牙兩把以水五升煮取一升洗日五六度治男女陰蝕略盡方蛤蟆兔屎上二味等分為末取敷瘡上又方蛇床子一方用芎藭當歸芍藥甘草各一兩地榆三兩上五味㕮咀以水五升煮取二升洗日三夜二又方蒲黃一升水銀一兩上二味研以粉其上又方肥豬肉十斤以水煮取熟去肉盆中浸之冷易不過三兩度亦治陰中癢有蟲治女人交接輒血出方桂心伏龍肝各二兩上二味為末酒服方寸匕立止治童女交接陽道違理及為他物所傷血出流離不止方取釜底墨少許研胡麻以敷之又方燒繭絮灰敷之又方燒青布併發灰敷之立愈治合陰陽輒痛不可忍方黃連一兩半牛膝甘草各一兩上三味㕮咀以水四升煮取二升洗日四度治婦人傷於丈夫四體沉重噓吸頭痛方香豉蔥白各一升生地黃八兩生薑四兩甘草二兩芍藥五兩上六味㕮咀以水七升煮取二升半分三服不瘥重作慎房事集驗方無生薑甘草白玉湯治婦人陰陽過度玉門疼痛小便不通方白玉一兩半白朮當歸各五兩澤瀉蓯蓉各二兩上五味㕮咀以酒一斗煎玉五十沸去玉納藥煎取二升分再服相去一炊頃治動胎見血腰痛小腹疼月水不通陰中腫痛方蒲黃當歸切各二兩蔥白一斤切吳茱萸阿膠各一兩上五味以水九升煮取二升半去滓納膠令煬分三服治妊娠為夫所動欲死單行竹瀝汁方取淡竹斷兩頭節火燒中央器盛兩頭得汁飲之立效桑根白皮湯治傷於丈夫苦頭痛欲嘔心悶方桑根白皮半兩乾薑二兩桂心五寸大棗二十枚上四味㕮咀以水一斗煮取三升去滓分三服適衣無令汗出治嫁痛單行方大黃十八銖取好酒一升煮三沸頓服之佳治小戶嫁痛連日方甘草三兩芍藥半兩生薑十八銖桂心六銖上四味㕮咀以酒二升煮三沸去滓盡服神效又方牛膝五兩以好酒三升煮取一升半去滓分三服治小戶嫁痛方烏賊魚骨燒為屑酒服方寸匕日三治陰寬大令窄小方兔屎乾漆各半兩鼠頭骨二枚雌雞肝二枚陰乾百日上四味為末蜜丸如小豆月初七日合時著一丸陰頭令徐徐納之三日知十日小五十日如十五歲童女一本無干漆有礬石治陰冷令熱方納食茱萸於牛膽中令滿陰乾百日每取二七枚綿裹之齒嚼令碎納陰中良久熱如火灸法月水不利奔豚上下並無子灸四滿三十壯穴在丹田兩邊相去各開寸半丹田在臍下二寸是也婦人胞落頽灸臍中三百壯又灸身交五十壯三報在臍下橫紋中又灸背脊當臍五十壯又灸玉泉五十壯三報又灸龍門二十壯三報在玉泉下女人入陰內外之際此穴卑今廢不針灸婦人胞下垂注陰下脫灸挾玉泉三寸隨年壯三報婦人陰冷腫痛灸歸來三十壯三報挾玉泉五寸是其穴婦人欲斷産灸右踝上一寸二壯即斷
