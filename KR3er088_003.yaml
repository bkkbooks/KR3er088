body:
  text: 卷二婦人方上求子第一論六首方一十五首灸法六首轉女為男法三首論曰夫婦人之別有方者以其胎妊生産崩傷之異故也是以婦人之病比之男子十倍難療經言婦人者衆陰所集常與濕居十四以上陰氣浮溢百想經心內傷五臟外損姿顏月水去留前後交互瘀血停凝中道斷絶其中傷墮不可具論矣然五臟虛實交錯惡血內漏氣脈損竭或飲食無度損傷非一或瘡痍未愈便合陰陽或便利於懸廁之上風從下入便成十二痼疾所以婦人別立方也若是四時節氣為病虛實冷熱為患者故與丈夫同也惟懷胎妊而挾病者避其毒藥耳其雜病與丈夫同則散在諸卷中可得而知也然而女人嗜欲多於丈夫感病倍於男子加以慈戀愛憎嫉妒憂恚染著堅牢情不自抑所以為病根深療之難瘥故養生之家特須教子女學習此三卷婦人方令其精曉即於倉卒之秋何憂畏也夫四德者女子立身之樞機産育者婦人性命之長務若不通明於此則何以免於夭枉者哉故傅母之徒亦不可不學常宜繕寫一本懷挾隨身以防不虞也論曰人之情性皆願賢己而疾不及人至於學問則隨情逐物墮於事業詎肯專一推求至理莫不虛棄光陰沒齒無益夫婚姻養育者人倫之本王化之基聖人設教備論厥旨後生莫能精曉臨事之日昏爾若愚是則徒願賢己而疾不及人之謬也斯實不達賢己之趣而妄徇虛聲以終無用今具述求子之法以貽後嗣同志之士或可覽焉論曰夫欲求子者當先知夫妻本命五行相生及與德合並本命不在子休廢死墓中者則求子必得若其本命五行相剋及與刑殺衝破並在子休廢死墓中者則求子了不可得慎無措意縱或得者於後終亦纍人若其相生並遇福德者仍須依法如方避諸禁忌則所誕兒子盡善盡美難以具陳禁忌法受胎時日推旺相貴宿日法在二十七卷中論曰凡人無子當為夫妻俱有五勞七傷虛羸百病所致故有絶嗣之患夫治之之法男服七子散女服紫石門冬丸及坐藥蕩胞湯無不有子也七子散治丈夫風虛目暗精氣衰少無子補不足方五味子鍾乳粉牡荊子菟絲子車前子菥蓂子石斛乾地黃薯蕷杜仲鹿茸遠志各八銖附子炮蛇床子川芎各六銖山茱萸天雄人參茯苓黃耆牛膝各三銖桂心十銖蓯蓉十銖巴戟天十二銖上二十四味治下篩酒服方寸匕日二不知增至二匕以知為度禁如藥法不能酒者蜜和丸服亦得一方加覆盆子八銖求子法一依後房中篇朴硝蕩胞湯治婦人立身以來全不産及斷緒久不産三十年者方朴硝牡丹當歸大黃桃仁生用各三銖細辛厚朴桔梗人參赤芍藥茯苓桂心甘草牛膝橘皮各一銖虻蟲水蛭各十枚附子六銖上十八味㕮咀以清酒水各五升合煮取三升日三夜一分四服每服相去三時更服如常覆被取少汗汗不出冬日著火籠之必下積血及冷赤膿如赤小豆汁本為婦人子宮內有此惡物使然或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱大困不堪更服亦可二三服即止如大悶不堪可服酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著導藥千金翼不用桔梗甘草治全不産及斷緒服前朴硝湯後著坐導藥方皂莢炙山茱萸千金翼作苦瓠當歸各一兩細辛五味子乾薑各二兩大黃礬石燒戎鹽千金翼作葶藶三分蜀椒各半兩上十味為末以絹袋盛大如指長三寸盛藥令滿納婦人陰中坐臥任意勿行走急小便時去之更安新者一日一度必下青黃冷汁汁盡即止可幸御自有子若未見病出亦可至十日安之一本別有葶藶砒霜各半兩此藥為服朴硝湯恐去冷惡物出不盡以導藥下之值天陰冷不疼不須著導藥亦有著鹽為導藥者然不如此藥其服朴硝湯後即安導藥經一日外乃服紫石門冬丸紫石門冬丸治全不産及斷緒方紫石英天門冬各三兩當歸芎藭紫葳卷柏桂心烏頭乾地黃牡蒙千金翼作牡荊外臺作牡蒙禹餘糧石斛辛夷各二兩人參桑寄生續斷細辛厚朴乾薑食茱萸牡丹牛膝各二十銖柏子仁一兩薯蕷烏賊骨甘草各一兩半上二十六味為末蜜和丸如梧子大酒服十丸日三漸增至三十丸以腹中熱為度不禁房室夫行不在不可服禁如藥法比來服者不至盡劑即有娠白薇丸主令婦人有子方白薇細辛防風人參秦椒白蘞一作白芷桂心牛膝秦艽蕪荑沙參芍藥五味子白殭蠶牡丹蠐螬各一兩乾漆柏子仁乾薑卷柏附子芎藭各二十銖桃仁紫石英各一兩半鍾乳乾地黃白石英各二兩鼠婦半兩水蛭虻蟲各十五枚吳茱萸十八銖麻布叩幞頭一尺燒上三十二味為末蜜和丸如梧子大酒服十五丸日再稍加至三十丸當有所去小覺有異即停服又方治婦人久無子或斷緒上熱下冷百病皆治之方白薇乾地黃乾薑車前子蜀椒各十八銖紫石英藁本石膏菴䕡子卷柏各二十銖赤石脂一兩澤蘭白龍骨遠志麥門冬茯苓太乙餘糧各二兩當歸芎藭蛇床子各一兩白芷覆盆子桃仁人參各一兩半桂心蒲黃各二兩半細辛三兩橘皮半兩上二十八味為末蜜和丸如梧子大酒服十五丸日再漸增至四十丸以知為度亦可至五十丸慎豬雞生冷酢滑魚蒜驢馬牛肉等覺有娠即停三月正擇食時可食牛肝及心至四月五月不須但不可故殺令子短壽遇得者大良金城太守白薇丸治月水不利閉塞絶産十八年服此藥二十八日有子方白薇細辛各三十銖人參杜蘅古今録驗用牡蠣牡蒙厚朴半夏白殭蠶當歸紫菀各十八銖牛膝沙參乾薑秦艽各半兩蜀椒附子防風各一兩半上十七味為末蜜和丸如梧子大先食服三丸不知可增至四五丸此藥不可常服覺有娠即止用之大驗崔氏有桔梗丹參各十八銖論曰古者求子多用慶雲散承澤丸今代人絶不用此雖未試驗其法可重故述之慶雲散治丈夫陽氣不足不能施化施化無成方覆盆子五味子各一升天雄一兩石斛白朮各三兩桑寄生四兩天門冬九兩紫石英二兩菟絲子一升上九味治下篩先食酒服方寸匕日三素不耐冷者去寄生加細辛四兩陽氣不少而無子者去石斛加檳榔十五枚良承澤丸治婦人下焦三十六疾不孕絶産方梅核仁辛夷各一升葛上亭長七枚溲疏二兩藁本一兩澤蘭子五合上六味為末蜜丸如大豆先食服二丸日三不知稍增之若腹中無堅癖積聚者去亭長加通草一兩惡甘者和藥先以苦酒搜散乃納少蜜和為丸大黃丸治帶下百病無子服藥十日下血二十日下長蟲及青黃汁三十日病除五十日肥白方大黃破如米豆熬令黑柴胡朴硝熬乾薑各一升芎藭五兩蜀椒二兩茯苓如雞子大一枚上七味為末蜜和丸如梧桐子大先食服七丸米飲下加至十丸以知為度五日微下吉祥丸治女人積年不孕方天麻柳絮牡丹茯苓乾地黃桂心各一兩五味子桃花白朮芎藭各二兩覆盆子一升桃仁一百枚菟絲子楮實子各一升上十四味為末蜜和丸如豆大每服空心飲苦酒下五丸日中一服晚一服硝石大黃丸治十二瘕癖及婦人帶下絶産無子並服寒食藥而腹中有癖者當先服大丸下之乃服寒食藥耳大丸不下水穀但下病耳不至令人虛極方見十一卷中秦椒丸治婦人絶産生來未産蕩滌腑臟使玉門受子精方秦椒天雄各十八銖人參元參白蘞鼠婦白芷黃耆桔梗露蜂房白殭蠶桃仁蠐螬白薇細辛蕪荑各一兩牡蒙沙參防風甘草牡丹皮牛膝卷柏五味子芍藥桂心大黃石斛白朮各二十銖柏子仁茯苓當歸乾薑各一兩半澤蘭乾地黃芎藭各一兩十八銖乾漆紫石英白石英附子各二兩鍾乳二兩半水蛭七十枚虻蟲一百枚麻布叩幞頭七寸燒上四十四味為末蜜和丸如梧子大酒服十丸日再稍加至二十丸若有所去如豆汁鼻涕此是病出覺有異即停灸法婦人絶子灸然谷五十壯在內踝前直下一寸婦人絶𠻸不生胞門閉塞灸關元三十壯報之婦人妊子不成若墮落腹痛漏見赤灸胞門五十壯在關元左邊二寸是也右邊二寸名子戶婦人絶嗣不生灸氣門穴在關元旁三寸各百壯婦人子臟閉塞不受精疼灸胞門五十壯婦人絶嗣不生漏赤白灸泉門十壯三報之穴在橫骨當陰上際論曰陰陽調和二氣相感陽施陰化是以有娠而三陰所會則多生女但妊娠二月名曰始膏精氣成於胞里至於三月名曰始胎血脈不流象形而變未有定儀見物而化是時男女未分故未滿三月者可服藥方術轉之令生男也丹參丸治婦人始覺有孕養胎並轉女為男方丹參續斷芍藥白膠白朮柏子仁甘草各二兩人參芎藭乾薑各三十銖吳茱萸橘皮當歸各一兩十八銖白芷冠纓燒灰各一兩乾地黃一兩半蕪荑十八銖犬卵一具干東門上雄雞頭一枚上十九味為末蜜和丸如梧子大酒服十丸日再稍加至二十丸又方取原蠶屎一枚井花水服之日三又方取弓弩弦一枚絳囊盛帶婦人左臂一法以繫腰下滿百日去之又方取雄黃一兩絳囊盛帶之要女者帶雌黃又方以斧一柄於産婦臥床下置之仍系刃向下勿令人知如不信者待雞抱卵時依此置於窠下一窠兒子盡為雄也妊娠惡阻第二論二首方四首法二首論曰何以知婦人妊娠脈平而虛者乳子法也經云陰搏陽別謂之有子此是血氣和調陽施陰化也診其手少陰脈動甚者妊子也少陰心脈也心主血脈又腎名胞門子戶尺中腎脈也尺中之脈按之不絶法妊娠也三部脈沉浮正等按之無絶者有娠也妊娠初時寸微小呼吸五至三月而尺數也妊娠四月欲知男女者左疾為男右疾為女左右俱疾為産二子又法左手沉實為男右手浮大為女左右手俱沉實猥生二男俱浮大猥生二女尺脈若左偏大為男右偏大為女左右俱大産二子大者如實狀又法左手尺中浮大者男右手尺中沉細者女若來而斷絶者月水不利又法左右尺俱浮為産二男不然女作男生俱沉為産二女不爾男作女生又法得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮又遣妊娠人面南行遠復呼之左回首者是男右回首者是女又婦人妊娠其夫左乳房有核是男右乳房有核是女妊娠欲知將産者懷妊離經其脈浮設腹痛引腰脊為今出也但離經者不病也又法欲生其脈離經夜半覺痛日中則生也論曰凡婦人虛羸血氣不足腎氣又弱或當風飲冷太過心下有痰水者欲有胎而喜病阻所謂欲有胎者其人月水尚來顏色肌膚如常但苦沉重憒悶不欲飲食又不知其患所在脈理順時平和則是欲有娠也如此經二月日後便覺不通則結胎也阻病者患心中憒憒頭重眼眩四肢沉重懈惰不欲執作惡聞食氣欲啖鹹酸果實多臥少起世謂惡食其至三四月日以上皆大劇吐逆不能自勝舉也此由經血既閉水漬於臟臟氣不宣通故心煩憒悶氣逆而嘔吐也血脈不通經絡痞澀則四肢沉重挾風則頭目眩也覺如此候者便宜服半夏茯苓湯數劑後將茯苓丸痰水消除便欲食也既得食力體強氣盛力足養胎母便健矣古今治阻病方有十數首不問虛實冷熱長少殆死者活於此方半夏茯苓湯治妊娠阻病心中憒悶空煩吐逆惡聞食氣頭眩體重四肢百節疼煩沉重多臥少起惡寒汗出疲極黃瘦方半夏生薑各三十銖乾地黃茯苓各十八銖橘皮旋覆花細辛人參芍藥芎藭桔梗甘草各十二銖上十二味㕮咀以水一斗煮取三升分三服若病阻積月日不得治及服藥冷熱失候病變客熱煩渴口生瘡者去橘皮細辛加前胡知母各十二銖若變冷下痢者去幹地黃加桂心十二銖若食少胃中虛生熱大便閉塞小便赤少者去地黃加大黃十八銖黃芩六銖余依方服一劑得下後消息看氣力冷熱增損方調定更服一劑湯便急服茯苓丸能食便強健也忌生冷醋滑油膩菘菜海藻茯苓丸治妊