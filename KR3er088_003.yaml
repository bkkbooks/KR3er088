羊和以茱萸調以五味是謂養氣以定五臟妊娠五月足太陰脈養不可針灸其經如隱白大都公孫商邱三陰交漏谷陰陵泉等穴是也足太陰內輸於脾五月之時兒四肢皆成無大飢無甚飽無食乾燥無自炙熱無太勞倦妊娠五月多熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數猝有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲僕猝有所下宜服阿膠湯阿膠湯方阿膠四兩人參一兩生薑六兩當歸芍藥甘草黃芩各二兩旋覆花二合吳茱萸七合麥冬一升上十味㕮咀以水九升煮藥減半納清酒三升並膠微火煎取三升半分四服日三夜一先食服便愈不瘥再服一方用烏母雞一隻割取咽血納酒中以水煮雞以煎藥減半納酒並膠煎取三升半分四服安中湯若曾傷五月胎者當預服此方黃芩一兩當歸川芎乾地黃人參各二兩甘草芍藥各三兩生薑六兩麥冬一升五味子大麻仁各五合大棗三十五枚上十二味㕮咀以水七升清酒五升煮取三升半分四服日三夜一七日復服一劑妊娠六月始受金精以成其筋身欲微勞無得靜處出遊於野數觀走犬及視走馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂妊娠六月足陽明脈養不可針灸其經如萬厲豐隆陰市上下廉三里等穴是也足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美無大飽妊娠六月猝有所動不安寒熱往來腹內脹滿身體腫驚怖忽有所下腹痛如欲産手足煩疼宜服麥冬湯麥門冬湯方麥冬一升人參甘草黃芩各二兩乾地黃三兩阿膠四兩生薑六兩大棗十五枚上八味㕮咀以水七升煮減半納清酒二升並膠煎取三升分三服中間進糜粥一方用烏母雞一隻煮水以煎藥柴胡湯若曾傷六月胎者當預服此方柴胡四兩白朮芍藥一方作紫葳甘草麥冬芎藭各二兩生薑六兩乾地黃五兩大棗三十枚蓯蓉一兩上十味㕮咀以水一斗煮取三升分四服日三夜一中間進糜粥勿食生冷及堅硬之物七日更服一劑妊娠七月始受木精以成其骨勞身搖肢無使定止動作屈伸以運血氣居處必燥飲食避寒常食稻粳以密腠理是謂養骨而堅齒妊娠七月手太陰脈養不可針灸其經如少商魚際列缺尺澤天衍等穴是也手太陰內屬於肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲妊娠七月忽驚恐搖動腹痛猝有所下手足厥冷脈若傷寒煩熱腹滿短氣常苦頸項及腰背強宜服蔥白湯蔥白湯方蔥白長三四寸十四莖半夏麥冬各一升旋覆花一合黃芩一兩人參一兩半甘草當歸黃耆各三兩阿膠四兩生薑八兩上十一味㕮咀以水八升煮減半納清酒三升及膠煎取四升每服一升日三夜一溫臥當汗出若不出者加麻黃二兩煮服如前法若秋後勿強責汗一方以黃母雞一隻割咽取血納酒中煮雞取汁以煎藥杏仁湯若曾傷七月胎者當預服此方杏仁甘草各二兩紫菀一兩鍾乳乾薑各二兩麥冬吳茱萸各一升粳米五合五味子五合上九味㕮咀以水八升煮取三升半分四服日三夜一中間進食七日服一劑一方用白雞一隻煮汁煎藥妊娠八月始受土精以成膚革和心靜息無使氣極是謂密腠理而光澤顏色妊娠八月手陽明脈養不可針灸其經如商陽二間合谷上下廉三里曲池肩井肩髃等穴是也手陽明內屬於大腸主九竅八月之時兒九竅皆成無食燥物無輒失食無忍大起妊娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時時小便白如米汁或青或黃或使寒栗腰背苦冷而痛目䀮䀮宜服芍藥湯芍藥湯芍藥生薑各四兩厚朴二兩甘草當歸白朮人參各三兩薤白切一升上八味㕮咀以水五升清酒四升合煮取三升分三服日再夜一一方用烏母雞煮汁以煎藥葵子湯若曾傷八月胎者當預服此方葵子二升甘草厚朴各二兩白朮柴胡各三兩芍藥四兩生薑六兩大棗二十枚上八味㕮咀以水九升煮取三升分三服日三十日一劑一方用烏雌雞一隻煮水以煎藥妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮致才力妊娠九月足少陰脈養不可針灸其經如湧泉然谷太溪交信築賓復溜等穴是也足少陰內屬於腎腎主續縷九月之時兒脈續縷皆成無處濕冷無著炙衣妊娠九月若猝得下痢腹滿懸急胎上衝心腰背痛不可轉側短氣宜服半夏湯半夏湯半夏麥門冬各五兩吳茱萸當歸阿膠各三兩乾薑一兩大棗十二枚上七味㕮咀以水九升煮取三升去滓納白蜜八合微火上溫分四服痢即止一方用烏母雞一隻煮汁以煎藥豬腎方若曾傷九月胎者當預服此方豬腎一具茯苓桑寄生乾薑乾地黃川芎各三兩白朮四兩麥冬一升附子中者一枚大豆三合上十味㕮咀以水一斗煮腎令熟去腎納諸藥煎取三升半分四服日三夜一十日更一劑妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神皆備俟時而生妊娠一月始胚二月始膏三月始胞四月形體成五月能動六月筋骨立七月毛髮生八月臟腑具九月穀氣入胃十月諸神備日滿即産矣宜服滑胎藥入月即服丹參膏養胎臨月服令滑而易産方丹參半斤川芎當歸各三兩蜀椒五合有熱者以大麻仁五合代上四味㕮咀以清酒溲濕停一宿以成煎豬膏四升微火煎膏色赤如血膏成新布絞去滓每日取如棗許納酒中服之不可逆服至臨月乃可服舊用常驗甘草散令易生母無疾病未生一月日預服過三十日行步動作如故兒生墮地皆不自覺方甘草二兩黃芩一方用茯苓乾薑吳茱萸大豆黃卷麻子仁桂心大麥糵一方用粳米各三兩上八味治下篩酒服方寸匕日三暖水服亦得千金丸主養胎及産難顛倒胞不出服一丸傷毀不下産余病汗不出煩滿不止氣逆滿以酒服一丸良一名保生丸方甘草貝母秦椒大豆黃卷乾薑桂心黃芩粳米一作糯米石斛石膏各六銖當歸十三銖麻子三合上十二味為末蜜和丸如彈子大每服一丸日三用棗湯下一方用蒲黃一兩蒸大黃丸治妊娠養胎令易産方大黃三十銖蒸枳實川芎白朮杏仁各十八銖芍藥乾薑厚朴各十二銖吳茱萸一兩上九味為末蜜和丸如梧子大空腹酒下二丸日三不知稍加之滑胎令易産方阿膠八兩滑石二兩車前子一升上三味治下篩飲服方寸匕日再至生月乃服藥利九竅不可先服妊娠諸病第四此篇有十章方八十九首灸法三首第一胎動及數墮胎方六首灸法一首治妊娠二三月上至八九月胎動不安腰痛已有所見方艾葉阿膠川芎肘後不用當歸各三兩甘草一兩上五味㕮咀以水八升煮取三升去滓納膠令消分三服日三治妊娠胎動去血腰腹痛方阿膠二兩川芎當歸青竹茹各三兩上四味㕮咀以水一斗半煮銀二斤取六升去銀納藥煎取二升半納膠令煬分三服不瘥仍作一方用甘草二兩蔥白湯治妊娠胎動不安腹痛方蔥白切一升阿膠二兩當歸續斷川芎各三兩上五味㕮咀以水一斗先煮銀六七兩取七升去銀納藥煎取二升半下膠令煬分三服不瘥重作治妊娠胎動晝夜叫呼口噤唇搴及下重痢不息方艾葉一升㕮咀以好酒五升煮取四升去滓更煎取一升服口閉者格口灌之藥下即瘥亦治妊娠腰痛及妊娠熱病並妊娠卒下血旋覆花湯治妊娠六七月胎不安常服之方旋覆花一兩半夏芍藥生薑各二兩枳實厚朴白朮黃芩茯苓各三兩上九味㕮咀以水一斗煮取二升半分五服日三夜二先食服治妊娠數墮胎方取赤小豆為末酒服方寸匕日二亦治妊娠數月月水尚來者又方妊娠三月灸膝下一寸七壯第二漏胞方四首治妊娠下血如故名曰漏胞胞干便死方生地黃半斤㕮咀以清酒二升煮三沸絞去滓服之無時能多服佳姚大夫加黃雌雞一頭治如食法崔氏取雞血和藥中服之治妊娠血下不止名曰漏胞血儘子死方乾地黃搗末以三指撮酒服不過三服又方生地黃汁一升以清酒四合煮三四沸頓服不止頻服又方乾薑二兩乾地黃四兩上二味治下篩以酒服方寸匕日再三服第三子煩方二首竹瀝湯治妊娠常苦煩悶此是子煩竹瀝一升麥冬防風黃芩各三兩茯苓四兩上五味㕮咀以水四升合竹瀝煮取二升分三服不瘥再作又方時時服竹瀝隨多少取瘥止第四心腹腰痛及脹滿方二十首治妊娠心痛方青竹皮一升以酒二升煮三兩沸頓服之又方破生雞子一枚和酒服之又方白蜜三兩羊脂八兩青竹茹一升上三味合煎食頃服如棗核大三枚日三又方蜜一升和井底泥泥心下又方燒棗二七枚為末童便服立愈治妊娠腹中痛方生地黃三斤搗絞取汁用清酒一升合煎減半頓服良又方燒車釭脂納酒中服亦治妊娠咳嗽並難産三日不出又方取蜜一升頓服良治妊娠腹中滿痛入心不得飲食方黃芩三兩白朮六兩芍藥四兩上三味㕮咀以水六升煮取三升分三服半日令藥盡微下水令易生月飲一劑為善治妊娠忽苦心腹痛方燒鹽令赤熱三指撮酒服之立瘥治妊娠傷胎結血心腹痛方取小兒尿二升頓服之立瘥大良治妊娠中惡心腹痛方新生雞子二枚破著杯中以糯米粉和如粥頓服亦治妊娠猝胎動不安或但腰痛或胎轉搶心或下血不止又方以水三升洗夫靴剔汁溫服治妊娠中蠱心腹痛方燒敗鼓皮酒服方寸匕須臾自呼蠱主姓名治妊娠腰痛方大豆二升以酒三升煮取二升頓服之亦治常人猝腰痛又方麻子三升以水五升煮取汁三升分五服亦治心痛又方香豉二兩榆白皮三兩上二味熟搗蜜丸如桐梧子大服二七丸亦治心痛又方燒牛屎焦末水服方寸匕日三服又方地黃汁八合酒五合合煎分溫服治妊娠脹滿方稱錘燒之淬酒中服亦治妊娠猝下血第五傷寒方一十六首治妊娠傷寒頭痛壯熱肢節煩疼方石膏八兩大青黃芩各三兩蔥白切一升前胡知母梔子仁各四兩上七味㕮咀以水七升煮取二升半去滓分五服相去如人行七八里久再服治妊娠頭痛壯熱心煩嘔吐不下食方知母四兩粳米五合生蘆根一升青竹茹三兩上四味㕮咀以水五升煮取二升半緩緩飲之盡更作瘥止治妊娠傷寒服湯後頭痛壯熱不歇宜用此湯拭其身麻黃半斤竹葉切一升石膏末三升上三味以水五升煮取一升去滓冷以拭身體又以故布㩉頭額胸心燥則易之患瘧者加恆山五兩治妊娠傷寒方蔥白十莖生薑二兩切上二味以水三升煮取一升半頓服取汗治妊娠中風寒熱腹中絞痛不可針灸方鯽魚一頭燒作灰搗末酒服方寸匕取汗治妊娠遭時疾令子不落方取灶中黃土水和塗臍干復塗之一方酒和塗方五寸又泔清和塗之並佳又方犬尿泥塗腹勿令乾治妊娠熱病方蔥白五兩豆豉二升上二味以水六升煮取二升分二服取汗又方蔥白一把以水三升煮令熟服之取汗食蔥令盡亦主安胎若胎已死者須臾即出又方車轄脂酒服大良又方井底泥泥心下三寸立愈又方青羊屎塗腹上又方水服伏龍肝一雞子大治大熱煩悶者方葛根汁二升分三服如人行五里久進一服又方燒大棗七枚為末酒和服又方槐實燒灰取方寸匕酒和服第六瘧病方二首妊娠患瘧方恆山二兩甘草一兩黃芩三兩烏梅十四枚石膏八兩上五味㕮咀以酒水各一升半合漬藥一宿煮三四沸去滓初服六合次服四合後服二合凡三服又方恆山竹葉各三兩石膏八兩粳米一百粒崔氏外臺作糯米集驗救急作秫米上四味㕮咀以水六升煮取二升半去滓分三服第一服取未發前一食頃服之第二服取臨欲發服之餘一服用以塗頭額及胸前五心藥滓置頭邊當一日勿近水及進飲食過發後乃進粥食第七下血方十一首治妊娠忽暴下血數升胎燥不動方榆白皮三兩當歸生薑各二兩