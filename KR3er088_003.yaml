三味合煎取二升分再服不能再服可隨所能服之治産後惡血不除上搶心痛煩急者以地黃汁代醇酒治産難方槐枝切二升榆白皮切大麻仁各一升瞿麥通草各五兩牛膝四兩上六味㕮咀以水一斗二升煮取三升半分五服又方吞皂莢子二枚又方取廁前已用草二七枚燒灰水調服之又方令夫唾婦口中二七過立出又方針兩肩井入一寸瀉之須臾即分娩治産難三日不出方取鼠頭燒作屑井花水服方寸七日三又方車軸脂吞大豆許兩丸又方燒藥杵令赤納酒中飲之又方燒大刀環以酒一杯沃之頓服即出救死不分娩者治産難纍日氣力乏盡不能得生此是宿有病者方阿膠二兩赤小豆二升上二味以水九升煮豆令熟去滓納膠令煬一服五合不覺更服不過三服即出又方槐子十四枚蒲黃一合上二味合納酒中溫服須臾不生再服之水服亦得又方生薑汁生地黃汁各半升上二味合煎熟頓服之治産難及日月未足而欲産者方知母一兩為末蜜丸如兔屎大每服一丸痛不止更服一丸羚羊角散治産後心悶是血氣上衝心所致者方羚羊角一枚燒作灰治下篩以東流水服方寸匕若不瘥須臾再服取悶瘥乃止又方羖羊角燒作灰以溫酒服方寸匕不瘥須臾再進備急方以治産難治産乳運絶方半夏一兩搗篩丸如大豆納鼻孔中即愈此扁鵲法也又方神麯末水服方寸匕亦治難産又方赤小豆搗為散東流水服方寸匕不瘥更服又方含釅醋潠面即愈凡悶即潠之愈又方取釅醋和産血如棗大服之治心悶方産後心悶眼不得開即當頂上取發如兩指大強以人牽之眼即開子死腹中第六論一首方十七首論曰凡婦人産難死生之候母面赤舌青者兒死母活母唇口青口兩邊沫出者母子俱死母面青舌赤口中沫出者母死子活治動胎及産難子死腹中並妊娠二兒一死一生服之令死者出生胎安神驗方蟹爪一升甘草二尺阿膠三兩上三味以東流水一斗先煮蟹爪甘草得三升去滓次納膠令煬頓服之不能分再服若人困拗口納藥藥入即活煎藥作東向灶用葦薪煮之真珠湯治胎死腹中方熟真珠一兩榆白皮切一升上二味以苦酒三升煮取一升頓服之立出治子死腹中不出方以牛屎塗母腹上立出又方取灶心黃土三指撮以酒服之立出土當著兒頭上亦治逆生及橫生不出手足先見者又方取夫尿二升煮令沸飲之又方酢二升拗口開灌之又方吞槐子二七枚亦治逆生又方三家雞卵各一枚三家鹽各一撮三家水各一升合煮令産婦東向飲之立出又方瞿麥一斤以水八升煮取二升服一升不出再服治胎死腹中乾燥著背方葵子一升阿膠五兩上二味以水五升煮取二升頓服之未出再煮服治妊娠未足月而胎卒死不出其母欲死方以苦酒濃煮大豆每服一升死胎立出不能頓服分再服一方用醇酒煮大豆亦治積聚成瘕治妊娠胎死腹中若子生胞衣不出腹中引腰背痛方甘草一尺筒桂四寸雞子一枚蒲黃二合香豉二升上五味以水六升煮取一升頓服之胎胞穢惡盡去大良治妊娠得病須去胎方以雞子一枚鹽三指撮和服立下此與阮河南療難産相同又方麥芽一升為末蜜和一升服之立下又方七月七日神麯三升酢一升煮兩沸宿不食平旦頓服之即下又方大麥曲五升酒一斗煮三沸去滓分五服令盡當宿勿食其子如糜令母肥盛無疾苦逆生第七論一首方十四首論曰凡産難或兒橫生側生或手足先出可以針錐刺兒手足入一二分許兒得痛驚轉即縮自當回順也治逆生方以鹽塗兒足底又可急爪抓之並以鹽摩産婦腹上即愈又方以鹽和粉塗兒足下即順子母祕録云以鹽和胡粉又方取梁上塵如彈丸許二枚治末三指撮溫酒服之治逆生及橫生不出手足先見者方燒蛇蛻皮為末服一刀圭亦云三指撮面向東酒服即順又方取蟬殼二枚治為末三指撮許溫酒服之崔氏外臺子母祕録作彈丸二枚為末酒服又方取夫陰毛二七莖燒以豬膏和丸如大豆吞之兒手即持丸出神驗又方取蛇蛻皮燒灰豬膏和丸向東服又方以手中指取釜底墨交畫兒足下即順生又方取父名書兒足下即順生治橫生及足先出者方取梁上塵灶突墨酒服之又方取車釭中脂書兒足下及掌中治縱橫生不可出者方菟絲子末酒若米汁服方寸匕即生車前子亦好服如上法又方以若酒服灶突墨塵治産時子但趨穀道方熬鹽尉之自止胞胎不出第八方二十二首牛膝湯治産兒胞衣不出令胞爛方牛膝瞿麥各一兩當歸通草各一兩半滑石二兩一作桂心二兩葵子半升上六味㕮咀以水九升煮取三升分三服治産難胞衣不出橫倒者及兒死腹中母氣欲絶方半夏白蘞各二兩上二味治下篩服方寸匕産難一服橫生二服倒生三服兒死四服亦可加代赭瞿麥各二兩為佳治胎死腹中若母病欲下之方取榆白皮細切煮汁三升服之即下難生者亦佳又方牛膝三兩葵子一升上二味以水七升煮取三升分三服又方澤蘭葉三兩滑石五合生麻油二合上三味以水一升半煮澤蘭取七合去滓納滑石麻油頓服之治胞衣不出方取小麥合小豆煮令濃飲其汁立出亦治橫逆生者又方瓜瓣二七枚服之立出良又方取水煮弓弩弦飲其汁五合即出亦可燒灰酒服又方取宅中所埋柱掘出取坎底當柱下土大如雞子酒和服之良又方墨三寸為末酒服又方取蒲黃如棗許以井花水服又方苦酒服真珠一兩又方雞子一枚苦酒一合和飲之治逆生胎不出方取灶屋上墨以酒煮一兩沸取汁飲之治産後胞不得出方井底土如雞子中黃以井花水和服之立出治子死腹中若衣不出欲上搶心方急取蟻蛭土三升熬令熱囊盛尉心下令胎不得上搶心良又方末灶突中墨三指撮許以水若酒調服之立出當著兒頭生又方取夫內衣蓋井上立出又方取炊蔽當戶前燒服之下乳第九方二十一首鍾乳湯治婦人乳無汁方石鐘乳硝石一用滑石白石脂各六銖通草十二銖桔梗半兩切上五味㕮咀以水五升煮三沸三上三下去滓納硝石令煬分服又方石鐘乳通草各等分上二味為末粥飲服方寸匕日三後可兼養兩兒通草橫心者是勿取羊桃根色黃無益一方二味酒五升漬一宿明旦煮沸去滓服一升日三夏冷服冬溫服又方石鐘乳四兩甘草二兩一方不用漏蘆三兩通草栝蔞根各五兩上五味㕮咀以水一斗煮取三升分三服一云用栝蔞實一枚又方石鐘乳通草各一兩漏蘆半兩桂心甘草栝蔞根各六銖上六味治下篩酒服方寸匕日三最驗又方石鐘乳漏蘆各二兩上二味治下篩飲服方寸匕即下漏蘆湯治同前漏蘆通草各二兩石鐘乳一兩黍米一升上四味㕮咀米宿漬揩撻取汁三升煮藥三沸去滓作飲飲之日三漏蘆散治同前漏蘆半兩石鐘乳栝蔞根各一兩蠐螬三合上四味治下篩先食糖水服方寸匕日三單行石膏湯治同前石膏四兩研細以水二升煮三沸稍稍服一日令盡麥門冬散治同前麥門冬石鐘乳通草理石上四味各等分治下篩先食酒服方寸匕日三又方麥門冬通草理石石鐘乳土瓜根大棗蠐螬上七味等分治下篩食畢用酒服方寸匕日三又方母豬蹄一具粗切以水二斗熟煮得五六升汁飲之不出更作又方豬蹄二枚熟炙捶碎通草八兩切細上二味以清酒一斗浸之稍稍飲之不出更作外臺豬蹄不炙以水一斗煮取四升入酒四升更煮飲之又方栝蔞根切一升酒四升煮三沸去滓分三服又方栝蔞根漏蘆各三兩石鐘乳四兩白頭翁一兩滑石通草各二兩上六味治下篩以酒服方寸匕日三又方取栝蔞子尚青色大者一枚熟搗以白酒一斗煮取四升去滓溫服一升日三黃色小者用二枚亦好又方土瓜根治下篩服半錢匕日三乳如流水單行鬼箭湯治同前鬼箭五兩以水六升煮取四升每服八合日三亦可燒作灰水服方寸匕日三甘草散治同前甘草一兩通草三十銖石鐘乳三十銖雲母二兩半屋上散草二把燒成灰上五味治下篩食後溫漏蘆湯服方寸匕日三乳下止又方燒死鼠作屑酒服方寸匕日三立下勿令知又方燒鯉魚頭為末酒服三指撮鯽魚湯下乳汁方鯽魚一尾長七寸豬肪半斤切漏蘆石鐘乳各八兩上四味切豬肪魚不須洗治以清酒一斗二升合煮魚熟藥成絞去滓適寒溫分五服其間相去須臾一飲令藥力相及為佳乳即下
