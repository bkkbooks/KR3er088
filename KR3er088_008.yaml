body:
  text: 卷八治諸風方凡八類論雜風狀第一論二十五首岐伯曰中風大法有四一曰偏枯二曰風痱三曰風懿四曰風痹夫諸急猝病多是風初得輕微人所不悟宜速與續命湯依腧穴灸之夫風者百病之長岐伯所言四者説其最重也偏枯者半身不遂肌肉偏不用而痛言不變智不亂病在分腠之間溫臥取汗益其不足損其有餘乃可復也甲乙經云溫臥取汗則巨取之風痱者身無痛四肢不收智亂不甚言微可知則可治甚則不能言不可治風懿者奄勿不知人咽中塞窒窒然巢源作噫噫然有聲舌強不能言病在臟腑先入陰後入陽治之先補於陰後瀉於陽發其汗身轉軟者生汗不出身直者七日死巢源作眼下及鼻人中左右白者可治一黑一赤吐沫者不可治風痹濕痹周痹筋痹脈痹肌痹皮痹骨痹胞痹各有證候形如風狀得脈別也脈微澀其證身體不仁凡風多從背五臟俞入諸臟受病肺病最急肺主氣息又冒諸臟故也肺中風者其人偃臥而胸滿短氣冒悶汗出者肺風之證也視目下鼻上兩邊下行至口色白者尚可治急灸肺俞百壯服續命湯小兒減之若色黃者此為肺已傷化為血矣不可復治其人當妄言掇空指地或自拈衣尋縫如此數日死若為急風邪所中便迷漠恍惚狂言妄語或少氣惙惙不能復言若不求師即治宿昔而死即覺便灸肺俞及膈俞肝俞數十壯急服續命湯可救也若涎唾出不收者既灸當並與湯也諸陽受風亦恍惚妄語與肺病相似然著緩可經久而死肝中風者其人但踞坐不得低頭繞兩目連額上色微有青者肝風之證也若唇色青面黃尚可治急灸肝俞百壯服續命湯若大青黑面一黃一白者此為肝已傷不可復治數日而死心中風者其人但得偃臥不得傾側悶亂冒絶汗出者心風之證也若唇正赤尚可治急灸心俞百壯服續命湯若唇或青或白或黃或黑者此為心已壞為水面目亭亭時悚動者不可復治五六日死一云旬日死脾中風者其人但踞坐而腹滿身通黃吐咸汁出者尚可治急灸脾俞百壯服續命湯若目下青手足青者不可復治腎中風者其人踞坐而腰痛視脅左右未有黃色如餅粢大者尚可治急灸腎俞百壯服續命湯若齒黃赤鬢髮直面土色者不可復治大腸中風者臥而腸鳴不止灸大腸俞百壯可服續命湯賊風邪氣所中則傷於陽陽外先受之客於皮膚傳入於孫脈孫脈滿則入傳於絡脈絡脈滿則輸於大經中成病歸於六腑則為熱不時臥止為啼哭其脈堅大為實實者外堅充滿不可按之按之則痛也經絡諸脈旁支去者皆為孫脈也凡風之傷人或為寒中或為熱中或為癘風或為偏枯或為賊風故以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以四季戊己傷於風者為脾風以秋庚辛傷於風者為肺風以冬壬癸傷於風者為腎風風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風風氣循風府而上則為腦風風入頭則為目風眼寒飲酒中風則為酒風入房汗出中風則為內風新沐中風則為首風久風入房中風則為腸風外在腠理則為泄風故曰風者百病之長也至其變化乃為他病無常方焉是知風者善行而數變在人肌膚中內不得泄外不得散因人動靜乃變其性有風遇寒則食不下遇熱則肌肉消而寒熱有風遇陽盛則不得汗遇陰盛則汗自出肥人有風肌肉厚則難泄喜為熱中目黃瘦人有風肌肉薄則常外汗身中寒目淚出有風遇於虛腠理開則外出悽悽然如寒狀覺身中有水淋狀時如竹管吹處此是其證也有風遇於實腠理閉則內伏令人熱悶是其證也新食竟取風為胃風其狀惡風頸多汗膈下塞不通食飲不下脹滿形瘦腹大失衣則憤滿食寒即洞泄新熱食竟入水自漬及浴者令人大腹為水病因醉取風為漏風其狀惡風多汗少氣口乾喜渴近衣則身如火燒臨食則汗流如雨骨節懈情不欲自勞新沐浴竟取風為首風其狀惡風而汗多頭痛新房室竟取風為納風其狀惡風汗流沾衣勞風之為病法在肺下使人強上而目脫唾出若涕惡風而振寒候之三日及五日中不精明者是也七八日微有青黃膿涕如彈丸大從口鼻出為善不出則傷肺風邪客於肌膚虛癢成風疹瘙瘡風邪入深寒熱相搏則內枯邪客半身入深真氣去則偏枯邪客關機中即攣筋中亦然邪淫於臟夢臟大形小淫於腑夢臟小形大邪隨目系入腦則目轉眩邪中睛則散視見兩物風邪入臟寒氣客於中不能發則喑啞喉痹舌緩不時服藥針灸風逐脈流入臟使人猝喑緩縱噤痙致死風入陽經則狂入陰經則癲陽邪入陰病則靜陰邪入陽病則怒若因熱食汗浴通腠理得開其風自出則覺肉中如針刺步行運力欲汗亦如此也凡覺肌肉中如刺皆由腠理閉邪氣閉在肌中因欲出也宜解肌湯則善夫目瞤動口唇動偏喎皆風入脈故須急服小續命湯將八風散摩神明白膏丹參膏依經針灸之諸痹由風寒濕三氣並客於分肉之間迫切而為沫得寒則聚則排分肉肉裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是此內不在臟而外未發於皮膚居分肉之間真氣不能周故為痹也其風最多者不仁則腫為行痹走無常處其寒多者則為痛痹其濕多者則為著痹冷汗濡但隨血脈上下不能左右去者則為周痹也在肌中更發更止左以應左右以應右者為偏痹也夫痹其陽氣少而陰氣多者故令身寒從中出其陽氣多而陰氣少者則痹且熱也諸痹風勝者則易愈在皮間亦易愈在筋骨則難痊也久痹入深令營衛澀經絡時疏則不知痛風痹病不可已者足如履冰時如入湯腹中股胵淫濼煩心頭痛傷脾腎時嘔眩時自汗出傷心目眩傷肝悲恐短氣不樂傷肺不出三年死一云三日太陽中風重感於寒濕則變痙也痙者口噤不開脊強而直如發癇之狀搖頭馬鳴腰反折須臾十發氣息如絶汗出如雨時有脫易得之者新産婦人及金瘡血脈虛竭小兒臍風大人涼濕得痙風者皆死溫病熱盛入腎小兒癇熱盛皆痙痙喑厥癲皆相似故久厥成癲宜審察之其重者患耳中策策痛皆風入腎經中也不治流入腎則喜卒然體痙直如死皆宜服小續命湯兩三劑若耳痛腫生汁作癰癤者乃無害也惟風宜防耳針耳前動脈及風府神良諸風第二方二十九首灸法三十六首小續命湯治猝中風欲死身體緩急口目不正舌強不能語奄奄忽忽神情悶亂諸風服之皆驗不虛方令人麻黃防己崔氏外臺不用人參黃芩桂心白芍藥甘草川芎杏仁各一兩防風一兩半附子一枚生薑五兩上十二味㕮咀以水一斗二升先煮麻黃三沸去沫納諸藥煮取三升分三服甚良不瘥更合三四劑必佳取汗隨人風輕重虛實也有人腳弱服此方至六七劑得瘥有風疹家天陰節變輒合服之可以防喑一本云恍惚者加茯神遠志如骨節煩疼本有熱者去附子倍芍藥小品千金翼同深師古今録驗有白朮不用杏仁救急無川芎杏仁只十味延年無防風小續命湯治中風冒昧不知痛處拘急不得轉側四肢緩急遺矢便利此與大續命湯同偏宜産後失血並老小人麻黃桂心甘草各二兩生薑五兩人參川芎白朮前方用杏仁附子防己芍藥黃芩各一兩防風一兩半上十二味㕮咀以水一斗二升煮取三升分三服古今録驗無桂心名續命湯胡洽千金翼同又方治風歷年歲或歌或哭或大笑言語無所不及方麻黃三兩人參桂心白朮各二兩芍藥甘草防己黃芩川芎當歸各一兩上十味㕮咀以水一斗二升煮取三升分三服日三覆取汗大續命湯治肝癘風猝然喑啞依古法用大小續命二湯通治五臟偏枯賊風方麻黃八兩石膏四兩桂心乾薑川芎各二兩當歸黃芩各一兩杏仁七十枚荊瀝一升上九味㕮咀以水一斗先煮麻黃兩沸掠去沫下諸藥煮取四升去滓又下荊瀝煮數沸分四服能言未瘥後服小續命湯舊無荊瀝今增之效如神千金翼有甘草又方治大風經臟奄忽不能言四肢垂曳皮肉痛癢不自知方獨活麻黃各三兩川芎防風當歸葛根生薑桂心茯苓附子細辛甘草各一兩上十二味㕮咀以水一斗二升煮取四升分五服老小半之若初得病便自大汗者減麻黃不汗者依方上氣者加吳茱萸二兩厚朴一兩乾嘔者倍加附子一兩啘者加橘皮二兩若胸中吸吸少氣者加大棗十二枚心下驚悸者加茯苓一兩若熱者可除生薑加葛根初得風未須加減但且作三劑停四五日以後更候視病虛實平論之行湯行針依穴灸之又方治與前大續命湯同宜産婦及老小等方麻黃川芎各三兩乾薑石膏人參當歸桂心甘草各一兩杏仁四十枚上九味㕮咀以水一斗煮取三升分三服外臺名續命湯範汪同云是張仲景方本欠兩味西州續命湯治中風痱一作入臟身體不知自收口不能言冒昧不識人拘急背痛不得轉側方麻黃六兩石膏四兩桂心二兩甘草川芎乾薑黃芩當歸各一兩杏仁三十枚上九味㕮咀以水一斗二升煮麻黃再沸掠去上沫後下諸藥煮取四升初服一升猶能自覺者勿熟眠可臥厚覆小汗出已漸減衣勿復大覆可熟眠矣前服不汗者後復一升汗後稍稍五合一服安穩乃服勿頓服也汗出則愈勿復服飲食如常無禁忌勿見風並治上氣咳逆若面目大腫但得臥服之大善凡服此湯不下者人口噓其背湯則下過矣病人先患冷汗者不可服此湯若虛羸人但當稍與五合為佳有輒行此湯與産婦及羸人喜有死者皆為頓服三升傷多且湯濁不清故也但得清澄而稍稍服微取汗者皆無害也胡洽方古今録驗名大續命湯大續命散治八風十二痹偏枯不仁手足拘急疼痛不得伸屈頭眩不能自舉起止顛倒或臥苦驚如墮地狀盜汗臨事不起婦人帶下無子風入五臟甚者恐怖見鬼來收攝或與鬼神交通悲愁哭泣忽忽欲走方麻黃烏頭防風桂心甘草蜀椒杏仁石膏人參芍藥當歸䕡茹翼方作川芎黃芩茯苓乾薑各一兩上十五味治下篩以酒服方寸匕日再後加以知為度續命煮散治風無輕重皆主之方麻黃川芎獨活防己甘草杏仁各三兩桂心附子茯苓升麻細辛人參防風各二兩石膏五兩白朮四兩上十五味粗篩下以五方寸匕納小絹袋子中以水四升和生薑三兩煮取二升半分三服日日勿絶慎風冷大良吾嘗中風言語蹇澀四肢痑曳處此方日服四服十日十夜服之不絶得愈排風湯治男子婦人風虛濕冷邪氣入臟狂言妄語精神錯亂其肝風發則面青心悶亂吐逆嘔沫脅滿頭眩重耳不聞人聲偏枯筋急曲踡而臥其心風發則面赤翕然而熱悲傷嗔怒張目呼喚其脾風發則面黃身體不仁不能行步飲食失味夢寐倒錯與亡人相隨其肺風發則面白咳逆唾膿血上氣奄然而極其腎風發則面黑手足不遂腰痛難以俯仰痹冷骨疼諸有此候令人心驚志意不定恍惚多忘服此安心定志聰耳明目通臟腑諸風疾悉主之白蘚皮白朮芍藥桂心川芎當歸杏仁防風甘草各二兩獨活麻黃茯苓各三兩生薑四兩上十三味㕮咀以水一斗煮取三升每服一升覆取微汗可服三劑大八風湯治毒風頑痹軃曳手腳不遂身體偏枯或毒弱不任或風入五臟恍恍惚惚多語善忘有時恐怖或肢節疼痛頭眩煩悶或腰脊強直不得俯仰腹滿不食咳嗽或始遇病時猝倒悶絶即不能語便失音半身不隨不仁沉重皆由體虛恃少不避風冷所致方當歸一兩半五味子升麻各一兩半烏頭黃芩芍藥遠志獨活防風川芎麻黃秦艽石斛人參茯苓各一兩杏仁四十枚黃耆紫菀各一兩石膏一兩甘草桂心乾薑各二兩大豆一升翼方云二合上二十三味㕮咀以水一斗三升酒二升合煮取四升強人分四服羸人分六服八風散治八風十二痹猥退半身不遂歷節疼痛肌肉枯燥皮膚瞤動或筋緩急痛不在一處猝起目眩失心恍惚妄言倒錯身上㾦瘰面上起疱或黃汗出更相染漬或燥或濕顏色乍赤乍白或青或黑角弓反張乍寒乍熱方麻黃白朮各一斤羌活三斤黃芩一斤五兩大黃半斤栝蔞根甘草欒荊天雄白芷防風芍藥天冬石膏各十兩山萸食茱萸躑躅各五升茵芋十四兩附子三十枚細辛乾薑桂心各五兩雄黃硃砂丹參各六兩上二十五味治下篩酒服方寸匕初每日一服三十日後日再五十日知百日瘥一年平復長服不已佳先食服小八風散治迷惑如醉狂言妄語驚悸恐怖恍惚見鬼喜怒悲憂煩滿顛倒邑邑短氣不得語語則失忘或心痛徹背不嗜飲食惡風不得去帷帳時復疼熱惡聞人聲不知痛癢身悉振搖汗出猥退頭重浮腫抓之不知痛頸項強直口面喎戾四肢不隨不仁偏枯攣掣不得屈伸悉主之方天雄當歸人參各五分附子天冬防風蜀椒獨活各四分烏頭秦艽細辛白朮乾薑各三分麻黃五味子桔梗山萸柴胡莽草白芷各二分上二十味治下篩合相得酒服半方寸匕漸至全匕日三服以身中覺如針刺狀藥行也烏頭湯治八風五尸惡氣遊走胸心流出四肢來往不住短氣欲死方烏頭芍藥乾薑桂心細辛乾地黃當歸吳茱萸甘草各二兩上九味㕮咀以水七升煮取二升半分三服蒼耳散治諸風方當以五月五日午時乾地刈取蒼耳葉洗曝燥搗下篩酒若漿服一方寸匕日三作散若吐逆可蜜為丸服十丸準前計一方寸匕數也風輕易治者日再服若身體有風處皆作粟肌出或如麻豆粒此皆為風毒出也可以鈹針刺潰去之皆黃汁出盡乃止五月五日多取陰乾之著大甕中稍取用之此草辟惡若欲看病省疾者便服之令人無所畏若時氣不和舉家服之若病胃脹滿心悶發熱即服之並殺三蟲腸痔能進食一周年服之佳七月七九月九皆可採用治心風虛熱發即恍惚煩悶半身不仁攣急方荊瀝竹瀝各五升枸杞根白皮麥冬各一升香豉三合人參茯苓梔子仁黃芩川芎桂心細辛杏仁防風白蘚皮各二兩生薑石膏甘草各三兩上十八味㕮咀以水二斗和竹瀝荊瀝煮取三升分四服相去如人行六七里凡五劑間三日服一劑一用防己三兩治虛熱恍惚驚邪恐懼方荊瀝三升竹瀝三升香豉三合牛黃十八銖麥冬人參各三兩升麻鐵精各一兩天冬龍齒茯苓梔子各二兩上十二味㕮咀以水二斗煮取三升去滓下牛黃鐵精更煎五六沸取一升七合分五服相去十里久地黃煎治熱風心煩悶及脾胃間熱不下食冷補方生地黃汁二升枸杞根汁三升生薑汁酥各三升荊瀝竹瀝各五升天冬人參各八兩茯苓六兩大黃梔子仁各四兩上十一味搗篩五物為散先煎地黃等汁成煎次納散藥攪和每服一匕日再漸加至三匕覺利減之又方黃芩干藍芍藥鼠尾草各三兩梔子仁生葛各六兩羚羊角五兩豉一升綿裹上八味㕮咀以水七升煮取二升五合分三服治積熱風方地骨皮葳蕤丹參黃耆麥冬澤瀉各三兩清蜜薑汁各一合生地汁一升上九味㕮咀以水六升煮取二升去滓納生地汁更緩火煮減一升納蜜及薑汁又煮一沸藥成溫服三合日再大防風湯治中風發熱無汗肢節煩腹急痛大小便不利方防風當歸麻黃白朮甘草各十八銖黃芩三十銖乾地黃山茱萸茯苓附子各一兩上十味㕮咀以水九升煮取二升半一服七合大小便不利納大黃人參各十八銖大棗三十枚生薑三兩煮取三升分三服深師加天冬一兩大戟洗湯治中風發熱方大戟苦參等分上二味為末以藥半升白酢漿一斗煮三沸適寒溫洗之從上下寒乃止立瘥小兒三指撮漿水四升煮洗之金牙酒療積年八風五疰舉身軃曳不得轉側行步跛躃不能收攝又暴口噤失音言語不正四肢背脊筋急腫痛流走不常勞冷積聚少氣乍寒乍熱三焦不調脾胃不磨飲澼結實逆害飲食酢咽嘔吐食不生肌醫所不能治者方金牙碎如米粒小絹袋盛乾地黃地膚子無子用莖蘇恭用蛇床子蒴藋根附子防風細辛莽草各四兩羌活一斤胡洽用獨活蜀椒四合上十味㕮咀以絹袋盛用酒四斗於瓷罌中漬密閉頭勿令泄氣春夏三四宿秋冬六七宿酒成去滓日服一合此酒無毒及可小醉常令酒氣相接不盡一劑病無不愈又令人肥健酒儘自可加諸藥各三兩惟蜀椒五兩用酒如前勿加金牙也冷加乾薑四兩服此酒勝灸刺起三十年諸風軃曳神驗肘後備急用升麻乾薑各四兩人參二兩石斛牛膝各五兩不用蒴藋根為十四味蘇恭不用地黃為十三味一方用蒺藜四兩黃耆三兩胡洽用川斷四兩為十一味千金翼用茵芋四兩無莽草常山太守馬灌酒除風氣通血脈益精華定六腑聰耳明目悅澤顏色頭白更黑齒落更生服藥二十日力勢倍六十日志氣充盈八十日能夜書百日致神明房中強壯如三十時力能引弩年八十人服之亦當有子病在腰膝悉主之方天雄二兩生用商陸根躑躅蜀椒各一兩烏頭一枚大者附子五枚桂心白蘞茵芋乾薑各一兩上十味㕮咀以絹袋盛酒三斗漬春夏五日秋冬七日去滓初服半合稍加至兩三合搗滓為散酒服方寸匕日三以知為度夏日恐酒酸以油單覆之下井中近水令不酸也千金翼無商陸桂心為八味蠻夷酒治久風枯攣三十年著床及諸惡風眉毛墮落方乾地黃獨活丹參礜石各一兩麥冬附子甘遂各二兩赤石脂二兩半乾薑蕪荑芫花柏子仁各一合蘇子一升蓯蓉茯神一作茯苓金牙薯蕷白朮杜仲石南牡荊子山萸款冬各十八銖白芷烏喙烏頭人參狼毒蜀椒防風細辛礬石寒水石牛膝麻黃川芎當歸柴胡芍藥牡蠣桔梗狗脊翼作枸杞天雄各半兩石斛桂心各六銖上四十五味㕮咀以酒二斗漬夏三日春秋六日冬九日一服半合密室中合藥勿令女人六畜見之三日清齋乃合千金翼無川芎云加大棗四十枚更佳又方治八風十二痹偏枯不隨宿食久寒虛冷五勞七傷及婦