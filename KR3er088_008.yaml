冷痹緩弱疼重或腰痛攣腳重痹宜急服此方獨活三兩寄生古今録驗用續斷杜仲牛膝細辛秦艽茯苓桂心防風川芎乾地黃人參甘草當歸芍藥各二兩上十五味㕮咀以水一斗煮取三升分三服溫身勿冷風虛下利者除乾地黃服湯取蒴藋葉火燎厚安席上及熱眠上冷復燎之冬月取根春取莖熬臥之佳其餘敷尉不及蒴藋蒸為愈也諸處風濕亦用此法新産竟便患腹痛不得轉動及腰腳攣痛不得屈伸痹弱者宜服此湯除風消血肘後有附子一枚無寄生人參甘草當歸菊花酒治男女風虛寒冷腰背痛食少羸瘦無顏色噓吸少氣去風冷補不足方菊花杜仲各一斤防風附子黃耆乾薑桂心當歸石斛各四兩紫石英蓯蓉各五兩萆薢獨活鍾乳各八兩茯苓三兩上十五味㕮咀以酒七斗漬五日一服二合稍加至五合日三千金翼不用幹薑杜仲酒治腰腳疼痛不遂風虛方杜仲八兩石南二兩羌活四兩大附子五枚上四味㕮咀以酒一斗漬三宿每服二合日再偏宜冷病婦人服之風痱第五論二首方九首灸法一首論曰夫風痱者猝不能語口噤手足不遂而強直者是也治之以伏龍肝五升為末冷水八升和攪取汁飲之能盡為善肘後此方治心煩恍惚腹中痛滿絶而復蘇自此以下九方皆主此風用之次第宜細尋之論曰凡欲醫此病當知先後次第不得漫投湯藥以失機宜非但殺人因茲遂為痼疾已既得之當進三味竹瀝飲少似有勝於常更進湯也竹瀝飲子患熱風者必先用此制其熱毒竹瀝湯治四肢不收心神恍惚不知人不能言方竹瀝二升生葛汁一升生薑汁三合上三味相和溫暖分三服平旦日晡夜各一服服訖覺四體有異似好次進後湯方竹瀝一升生葛汁五合川芎防己附子人參芍藥黃芩甘草桂心各一兩生薑四兩羚羊角二兩石膏六兩杏仁四十枚麻黃防風各一兩半上十六味㕮咀以水七升煮減半納瀝煮取二升五合分三服取汗間五日更服一劑頻與三劑漸覺少減仍進後方竹瀝三升防風升麻羚羊角防己桂心芎藭各二兩麻黃三兩上八味㕮咀以水四升合竹瀝煮取二升半分三服兩日服一劑常用加獨活三兩最佳此方神良頻進三劑若手足冷者加生薑五兩白朮二兩若未除更進後方竹瀝一升甘草一本作葛根二兩人參川芎獨活升麻各一兩防風麻黃芍藥各一兩半生薑石膏羚羊角防己桂心黃芩附子一本作杏仁四十枚白朮各二兩上十七味㕮咀以水八升煮減半納瀝煮取二升半分三服相去如人行十里久更服若有氣者加橘皮牛膝五加皮一兩煮散凡風痱服前湯得瘥訖可常服此除風方防風防己獨活秦艽黃耆芍藥人參白朮茯神川芎遠志升麻石斛牛膝羚羊角丹參甘草厚朴天門冬五加皮地骨皮黃芩翼方作薯蕷桂心各一兩一云各四兩乾地黃橘皮生薑麻黃各三兩檳榔藁本翼方作附子杜仲翼方作麥門冬烏犀角各二兩翼方作山茱萸薏苡仁一升石膏六兩一云三兩上三十三味搗篩為粗散和攪令勻每服以水三升藥三兩煮取一升綿濾去滓頓服之取汗日一服若覺心中熱煩以竹瀝代水煮之荊瀝湯凡患風人多熱常宜服此方荊瀝竹瀝生薑汁各三合上三味相合溫暖為一服每日旦服煮散午後進此平復好瘥乃止獨活煮散治諸風痱方獨活八兩川芎芍藥茯苓防風防己葛根各一兩羚羊角當歸人參桂心麥門冬石膏各四兩磁石十兩甘草三兩白朮三兩上十六味各切銼分為二十四份每份入生薑生地黃切一升杏仁二七枚以水二升煮取七合或日晚或夜中或日一服或間日服無所忌五補丸凡風服湯藥多患虛熱翕翕然宜除熱方防風人參蓯蓉乾地黃羚羊角麥門冬天門冬各一兩半芍藥獨活乾薑白朮丹參食茱萸一雲山茱萸甘草茯神升麻黃耆甘菊地骨皮石斛牛膝五加皮薯蕷各三十銖秦艽川芎桂心防己生薑屑黃芩各一兩附子十八銖石膏三兩寒水石三兩上三十二味為末蜜和丸如梧子大生薑蜜湯服二十丸日三稍加至三十丸忌油麵蒜生冷酢滑及豬羊雞魚等肉論曰古人立方皆準病根冷熱制之今人臨急造次搜尋故多不驗所以欲用方者先定其冷熱乃可檢方用無不效湯酒既爾丸散亦然凡此風之發也必由熱盛故有竹瀝葛汁等諸冷藥焉後之學者不能仔細識其方意故有茲論具而述之其人無密室者不可與療風強人居室不密尚中風邪況服藥之人乎治風痱不能語手足不遂方度病者手小指內歧間至指端為度以置臍上直望心下以丹注度上端畢又作兩度續所注上合其下開其上取其本度橫置其開上令三合其狀如倒作某字形男度左手女度右手嫌不分了故上丹注三處同時起火各一百壯愈風懿第六論三首方二十三首針灸法六首獨活湯治風懿不能言四肢不收手足嚲曳方獨活四兩桂心芍藥栝蔞根生葛各二兩生薑六兩甘草三兩上七味㕮咀以水五升煮取三升分三服日三論曰脾脈絡胃挾咽連舌本散舌下心之別脈系舌本今心脾二臟受風邪故舌強不得語也治中風口噤不能言方防己桂心麻黃各二兩葛根三兩甘草防風芍藥各一兩生薑四兩上八味㕮咀以水六升煮取二升半分三服喑啞不語皆治之石南湯治六十四種風注走入皮膚中如蟲行腰脊強直五緩六急手足拘攣隱疹搔之則作瘡風尸身癢猝風面目腫起手不出頭口噤不能言方石南乾薑黃芩細辛人參各一兩桂心麻黃當歸芎藭各一兩半甘草二兩乾地黃十八銖食茱萸三十銖上十二味㕮咀以水六升酒三升煮取三升分三服大汗勿怪治中風口噤不知人者方芥子一升酢三升上二味煮取一升敷頭以布裹之日一度肘後以治猝不得語又方豉五升吳茱萸一升上二味以水七升煮取三升漸飲之肘後以治不能語又方白朮四兩以酒三升煮取一升頓服又方服荊瀝一升又方服淡竹瀝一升針灸法中風口噤不得開灸機關翼名頰車二穴穴在耳下八分小近前灸五壯即得語又灸隨年壯僻者逐僻左右灸之中風失喑不能言語緩縱不隨先灸天窗五十壯息火仍移灸百會五十壯畢還灸天窗五十壯者始發先灸百會則風氣不得泄內攻五臟喜閉伏仍失音也所以先灸天窗次百會佳一灸五十壯悉泄火勢復灸之視病輕重重者一處三百壯大效凡中風服藥益劇者但是風穴悉皆灸之三壯無不愈也論曰風寒之氣客於中滯而不能發故喑不能言及喉痹失音皆風邪所為也入臟皆能殺人故附之於治風之末凡尸厥而死脈動如故此陽脈下墜陰脈上爭氣閉故也針百會入三分補之炙尉斗尉兩脅下又灶突墨彈丸大漿水和服之又針足中趾頭去甲如韭葉又刺足大趾甲下內側去甲三分桂湯治猝失音方濃煮桂汁服一升覆取汗亦可末桂著舌下漸漸咽汁又方濃煮大豆汁含亦佳無豆用豉治猝不得語方酒五合和人乳汁中半分分為二服論曰夫眼瞤動口唇偏喎皆風入脈急與小續命湯附子散摩神明膏見前七卷腳氣門丹參膏見二十四卷癰疽門依穴灸之喉痹舌緩亦然風入臟使人喑啞卒死口眼相引牙車急舌不轉喎僻者伏龍肝散和雞冠血及鱉血塗干復塗之並灸吻邊橫文赤白際逐左右隨年壯報之至三報三日不瘥更報之附子散治中風手臂不仁口面喎僻方附子桂心各五兩細辛防風人參乾薑各六兩上六味治下篩酒服方寸匕日三稍增之甘草湯治偏風積年不瘥手腳枯細面口喎僻精神不定言語倒錯方甘草桂心川芎麻黃當歸芍藥各一兩人參二兩附子側子各二枚獨活防己各三兩生薑石膏茯神各四兩白朮黃芩細辛各一兩秦艽防風各一兩半菊花一升淡竹瀝四升上二十一味㕮咀以水一斗先煮麻黃去沫取七升納竹瀝及諸藥煮取三升分四服服三服訖間一杯粥後更進一服待藥勢自汗慎風冷醋蒜面乳酪魚等治中風面目相引口偏著耳牙車急舌不得轉方獨活三兩生地黃汁竹瀝各一升上三味合煎取一升頓服之即愈又方牡蠣礬石附子灶下黃土等分上四味為末取三年雄雞冠血和藥敷其上持鏡候之才欲復故便急洗去之不速去便過不復還也千金翼云偏右塗左偏左塗右又方竹瀝三升防風防己升麻桂心川芎各二兩麻黃四兩羚羊角三兩上八味㕮咀以水四升合竹瀝煮取一升半分三服日服一劑常用效治口耳僻方防風附子葛根各二兩柏實麻黃各三兩獨活生薑各四兩杏仁三十枚上八味㕮咀以水一斗酒二升煮取三升分四服又方青松葉一斤搗令汁出酒一斗漬二宿近火一宿初服半升漸至一升頭面汗出即止又方酒煮桂取汁以故布拓病上正則止左喎拓右右喎拓左此祕方不傳余常用大效治卒中風口喎不止方取空青末如豆大一枚含之即愈又方炒大豆三升令焦以酒三升淋取汁頓服肘後以治口噤不開又方大皂莢一兩去皮子下篩以三年大酢和左喎塗右右喎塗左干更塗之又方以葦筒長五寸以一頭刺耳孔中四畔以面密塞之勿令泄氣一頭納大豆一顆並艾燒令燃灸七壯即瘥患右灸左患左灸右耳病亦可灸之又方灸手交脈三壯左灸右右灸左其炷如鼠屎形橫安之兩頭下火枳茹酒主諸藥不能瘥者方枳實上青刮取末欲至心止得茹五升微火炒去濕氣以酒一斗漬微火暖令得藥味隨性飲之主口僻眼急大驗治緩風急風並佳肘後以治身直不得屈伸反覆者枳樹皮亦得角弓反張第七方六首治卒半身不遂手足拘急不得屈伸身體冷或智或癡或身強直不語或生或死狂言不可名狀角弓反張或欲得食或不用食或大小便不利皆療之方古今録驗名八風續命湯人參桂心當歸獨活黃芩乾薑甘草各十八銖石膏一兩半杏仁四十枚上九味㕮咀以井華水九升煮取三升分三服日三覆取汗不汗更合加麻黃五兩合服倉公當歸湯治賊風口噤角弓反張痙者方當歸防風各十八銖獨活一兩半附子一枚細辛半兩麻黃三十銖上六味㕮咀以酒五升水三升煮取三升服一升口不開者格口納湯一服當蘇二服小汗三服大汗又方酒一斗膠二斤煮令煬得六升每服一升稍服得愈又方單服荊瀝良秦艽散治半身不遂言語錯亂乍喜乍悲角弓反張皮膚風癢方秦艽獨活胡洽用烏頭黃耆人參甘菊各二兩胡洽用蜀椒茵芋十八銖胡洽用菵草防風石斛胡洽用萆薢山茱萸桂心各二兩半附子川芎胡洽用桔梗細辛當歸五味子甘草白朮乾薑白蘚皮胡洽用白蘞各三十銖麻黃天雄遠志各一兩胡洽用防己上二十二味治下篩酒服方寸匕日再漸漸加至二匕又云治風無新久並補吳秦艽散治風注入肢體百脈身腫角弓反張手足痠疼皮膚習習身體盡痛眉毛墮落耳聾驚悸心滿短氣魂志不定陰下濕癢大便有血小便赤黃五勞七傷萬病皆治方秦艽蜀椒人參茯苓牡蠣細辛栝蔞根麻黃各十八銖乾薑附子白朮桔梗桂心獨活當歸各一兩黃芩柴胡牛膝天雄石南杜仲莽草烏頭各半兩甘草川芎防風各一兩半上二十六味治下篩盛以葦袋食前溫酒一升服方寸七日三服急行七百步許更飲酒一升忌如常法風痹第八論一首方九首論曰血痹病從何而得之師曰夫尊榮人骨弱肌膚盛因疲勞汗出臥不時動搖加被微風遂得之形如風狀巢源云其狀如被微風所吹但以脈自微澀澀在寸口關上緊宜針引陽氣令脈和緊去則愈防己黃耆湯治風濕脈浮身重汗出惡風方甘草二兩黃耆五兩漢防己四兩生薑白朮各三兩大棗十二枚上六味㕮咀以水六升煮取三升分三服服了坐被中欲解如蟲行皮中臥取汗黃耆湯治血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風狀方蜀黃耆人參要略無芍藥桂心各二兩生薑六兩大棗十二枚上六味㕮咀以水六升煮取二升服七合日三服令盡治風痹遊走無定處名曰血痹大易方萆薢薯蕷牛膝澤瀉各二兩白朮地膚子各半兩乾漆蠐螬車前子狗脊天雄各十銖茵芋六銖山茱萸三十銖乾地黃二兩半上十四味為末蜜和丸如梧桐子大酒下十丸日三後稍加治遊風行走無定腫或如盤大或如甌或著腹背或著臂或著腳悉主之方海藻茯苓防風獨活附子白朮各三兩大黃五兩當歸一本作當陸鬼箭各二兩上九味㕮咀以酒二斗漬五日初服二合漸加以知為度鐵精湯治三陰三陽厥逆寒食胸脅支滿病不能言氣滿胸中急肩息四肢時寒熱不隨喘悸煩亂吸吸少氣言輒飛揚虛損方黃鐵三十斤以流水八斗揚之三千遍以炭燒令赤投冷水復燒七遍如此澄清取汁二斗煮藥人參三兩半夏麥門冬各一升白薇黃芩甘草芍藥各四兩石膏五兩生薑二兩大棗二十枚上十味㕮咀納前汁中煮取六升服一升日三服兩日令盡治諸風痹方防風甘草黃芩桂心當歸茯苓各一兩秦艽葛根各二兩生薑五兩大棗三十枚杏仁五十枚上十一味㕮咀以酒水各四升煮取三升分三服取汗白蘞散治風痹腫筋急展轉易常處方白蘞半兩附子六銖上二味治下篩酒服半刀圭日三不知增至一刀圭身中熱行為候十日便覺附子酒治大風冷痰癖脹滿諸痹方大附子一枚重二兩者亦云二枚酒五升漬春五日每服一合日再以瘥為度麻子酒治虛勞百病傷寒風濕及婦人帶下月水往來不調手足疼痹著床服之令人肥健方麻子一石法曲一斗上二味先搗麻子成末以水二石著釜中蒸麻子極熟炊一石米頃出滓隨汁多少如家醞法候熟取清酒隨性飲之
